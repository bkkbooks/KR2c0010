body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷三十八三月壬子朔駕駐府谷縣城南命以職事人員羸馬換各營肥馬上諭行兵部曰視緑旗兵之馬俱肥伊等並不出行俟至神木令將隨駕人員羸馬換營馬一百匹至榆林換營馬二百匹鼠瘡鼻濕瘸損者勿換止換無病瘦馬令本主每馬各增銀五兩則馬瘦者得肥馬乘坐而緑旗兵又得價值兩皆有利著開明換馬人員旗隊所換何營馬匹緑旗兵丁姓名馬數奏聞著該管大臣大學士兵部會同核議具奏僉議以為皇上職事人員及緑旗兵丁兩得其便之旨甚是俱當敬奉施行查職事人員內現有馬羸者共七十人著伊等各主出銀五兩給換營馬後至榆林如有換馬者另行奏聞亦照此例換給上命內大臣福善索額圖護軍統領托倫蘇丹杜什希孫扎齊宋柱親近侍衛關保伍什會同兵部及該管神木營副將公閲換給癸丑駕至孤山堡西駐蹕擢知府李杰為道員理驛站事陜西巡撫黨愛等來朝上諭黨愛曰神木道缺可選擇知府補授黨愛曰西安知府李杰長於辦事人材可用上又曰目下此路無人料理驛站爾可速舉料理驛站之人黨愛奏曰應速取李杰前來料理驛務上從之查明神木邊外至榆林路程先是上諭侍郎安布祿曰著撥爾部能員一人出神木邊將從外至榆林之路計幾宿水草何如至寧夏之路計幾宿水草何如問明鄂爾多斯之蒙古著在神木候駕隨差主事薩哈連往查至是覆奏曰臣出邊問鄂爾多斯多羅貝勒汪舒克旗下四等台吉洪和等據言自神木由口外往榆林之路自神木至俄爾几和泉為一宿有五十里自俄爾几和泉至商所爾河為一宿有六十里自商所爾河至伊克博東泉為一宿有六十里自伊克博東泉至楚兒哈齊井為一宿有八十里自楚兒哈齊井至榆林有七十里餘自邊關至榆林俱砂路又問到寧夏之路據言自邊關外至寧夏之正路無人知之但由神木過我貝勒汪舒克所居阿都海之地接擺站大道有一路若從此而往則自神木至俄爾几呼泉為一宿有五十里自俄爾几呼泉至塔拉泉為一宿有四十里自塔拉泉至摩都圖湖為一宿有七十里自摩都圖湖至俄欽湖為一宿有八十里自俄欽湖至貝勒汪舒克所居阿都海為一宿有七十里自阿都海至大路察罕扎達海五十家驛為一宿有七十里自察罕扎達海驛至貝勒宋喇卜所居西拉布里都為一宿有七十里自西拉布里都至博羅扎喇克井為一宿有六十里自博羅扎喇克井至默賽井為一宿有六十里自默賽井至沙克舒爾井為一宿有六十里自沙克舒爾井至拜都井為一宿有六十里自拜都井至祁他特泉為一宿有五十里自祁他特泉至橫城口為一宿有四十里自橫城口至寧夏城三十餘里自神木邊至察罕扎達海五十家驛路中水草柴薪無誤行道砂多自察罕扎達海至橫城口路平水略少報聞著薩哈連親出榆林邊問蒙古自榆林至寧夏之路併水草亦照此開明量駕到之日至榆林伺候甲寅上駐蹕卞家水口厄魯特多爾濟等來降多爾濟者乃諾爾布寨桑屬下人三十五年十二月初九日自格格特哈郎古特挈其妻子駝馬等物來降大將軍費揚古為之奏報上命傳多爾濟至行在其男婦馬駝交歸化城副都統阿迪安插乙卯上駐蹕神木縣俘獻逆寇噶爾丹之子塞卜騰巴兒珠爾護軍校阿奇納等解到塞卜騰巴兒珠爾上御行宫一等侍衛學士以上諸臣侍立引噶爾丹之子塞卜騰巴兒珠爾入伏地不敢仰視上呼左右舉其首問曰爾父噶爾丹窮困已極降乎否耶塞卜騰巴兒珠爾兢兢奏曰臣稚子無知想皇上神威自必降也問以他事皆戰栗不能對上問護軍校阿竒納曰爾地之路須行幾日可到噶爾丹所在阿竒納奏曰自布隆吉爾行二十日方到水草稀少大兵不可並行必分隊而進上曰爾地現有兵三千能討噶爾丹否阿竒納奏曰噶爾丹大敗窮困已極聞風逃竄仰仗天威倘遇我兵定然蕩滅矣上問孫思克歸云何阿竒納奏曰孫思克蒙皇上殊恩重賞頂戴不盡標下兵丁歸告衆人曰皇上親臨賜食加賞衆兵卒俱鼓舞奮發但思效命當發緑旗兵一千之時數千人爭先願往不肯相讓該管將辨不知所措議政諸臣奏曰有功大將效勞兵卒蒙皇上格外加恩誰不舍命自效以冀功名乎是日上諭皇太子曰渡黃河入陜西界視山河土地形勢大異朕所經地方無可比擬者城堡俱在山巔不見一村舍懸崖之下穴居而處平地少山之上無不耕之土民風近朴兵強獸多而跬步難行山平而溪壑甚險水土佳人鮮疾病距神木縣邊上有四口鄂爾多斯蒙古多入邊來迎者董羅卜王之母王之妃俱來請安是日初四薄暮噶爾丹之子塞卜騰巴兒珠爾至視其身甚短小人亦庸下初五日即遣送京師至京後暫緩處分俟其父噶爾丹聲息其到京之日當如何集衆宣示皇太子可與滿漢大臣詳議遣奏再遵旨而行特諭敬請皇太后安以此事奏聞併諭宫中知之臣謹按哈密絶域荒區服屬於噶爾丹者亦已久矣至噶爾丹謀逞不軌為我師所敗摧殘之餘羣下無食四散採捕其子塞卜騰巴兒珠爾亦遊獵至哈密近地回回頭目達爾漢白克額貝都拉即擒之來獻夫前既陳斬其妻所存僅一子今又被擒本根固已盡剃雖彼離人父子拆人夫婦罪惡貫盈干天之怒報之若此實皇上恩威逺播故哈密回子亦感德畏威而抒恭順之忱也丙辰上渡屈野河駐蹕自榆林至橫城口安設驛站理藩院奏曰駕至榆林由口外至寧夏應自榆林起設驛至橫城口設此驛也以前次內路增驛預備之馬照鄉導官所分宿頭每驛設馬三十匹筆帖式一員蒙古台吉一員章京一員披甲十名此坐驛筆帖式以現在隨行部院筆帖式充之駕至寧夏後即撤此驛將巡撫所備馬增置內驛中上準行大賚哈密回子理藩院奏請酌賞額貝都拉達爾漢白克其解送塞卜騰巴兒珠爾之回子併截留肅州回子已蒙御賜伊什噶噶蠎袍蠎褂銀二百兩外至沙達里當如何行賞及拉巴里等十二人請各賞銀一百兩雅噶齊等五人請各賞銀五十兩伊等僕從十六人請每人各賞銀二十兩上命賜額貝都拉達爾漢白克大蠎棉袍一件粧縀棉褂一件各色彩縀二十匹郭帕白克大蠎棉袍一件粧縀棉褂一件各色彩縀十匹白竒衣服一襲縀四十匹不來人沙達里銀百兩二等來人銀八十兩不來人五十兩三等來人五十兩不來人三十兩僕從如議丁巳駕次柏林堡西南諭青海諸台吉及䇿旺拉卜灘保護哈密議政諸臣奏言哈密回子頭目額貝都拉達爾漢白克疏稱聞噶爾丹之子塞卜騰巴兒珠爾在巴喇思庫兒地方捕獸遣臣長子郭帕白克率三百人擒之而來兹遣臣子白竒解噶爾丹之子塞卜騰巴兒珠爾乳父徽特和朔齊噶爾丹乳母及乳母之子丹津札卜俄羅代達爾札併噶爾丹使人土克齊哈什哈達什里俄摩克圖哈什哈滾占使人達爾漢寨桑等進京今噶爾丹倘親至近地可擒則擒之如不來則探其所在奏聞惟視力之所能仰報皇上而已但噶爾丹之子被擒臣必為四部厄魯特所仇其中左翼之怨尤深我哈密微弱且危且懼乞安之定之所尤懼者䇿旺拉卜灘也祈皇上諭以哈密業已歸誠勿得侵擾之旨竊謂額貝都拉達爾漢白克誠心向化擒噶爾丹之子塞卜騰巴兒珠爾噶爾丹使人土克齊哈什哈達什里俄摩克圖哈什哈及滾占使人達爾漢寨桑等來獻且言噶爾丹倘來至近地則擒之當竭力以報皇上殊屬可嘉額貝都拉達爾漢白克理應議敘俟彼到京之日查例議奏應照達爾漢白克所請著理藩院移文青海諸台吉及䇿旺拉卜灘言哈密回子額貝都拉達爾漢白克既已歸誠皇上爾等勿得侵擾俟命下之日理藩院備文呈覽上從之調各路兵禦噶爾丹上諭議政諸臣曰朕至寧夏後方調甘肅兵前行似乎少遲此時噶爾丹窮極之際西安滿兵二千甘肅緑旗兵一千俱在甘肅久備馬畜亦肥機會不可失宜速進薩克薩特呼里克搜𠞰噶爾丹此項進𠞰滿漢兵各帶百日米嘉峪關至薩克薩特呼里克地方甚近不必運糧噶爾丹如已逺遁此軍計糧而回上項進𠞰滿漢兵俱各賞銀十兩其外更有當行之事當奏之事孫思克博濟阿南達等公議具奏將哈密所解俄摩克圖哈什哈遣至伊等軍中如有可行之機則不必差俄摩克圖哈什哈往噶爾丹處即行進𠞰如噶爾丹已遁則差俄摩克圖哈什哈至噶爾丹處諭之曰吾非來征討特來招撫爾可來降至遣寧夏兵駐郭多里巴兒哈孫地方備禦之事當檄知將軍孫思克著會議具奏共議以為皇上籌畫周詳俱當敬奉而行請檄孫思克知之上從之戊午上駐蹕髙家堡南申飭陜西巡撫黨愛按察使納雷時黨愛納雷來迎駕上諭曰爾等皆地方大僚凡事當身先率下朕巡狩親臨見爾等竟不盡力驛中備馬五百匹而並無到者緊急事務豈可誤乎若謂爾等老病又未嘗早陳今正有事之際朕豈使爾等晏然罷去乎著小心效力此後仍前不改斷不輕恕加恩故將軍趙良棟命保護其妻子原任將軍趙良棟病故將軍馬思喀報至上召集隨駕總兵官白斌等諭曰趙良棟乃偉男子也行間著有勞績但性躁心窄與人不合有時奏事朕前亦語言粗糲朕保全功臣始終容之後有疾朕嘗遣賜藥食彼所奏請無不準行此特欲有疾者喜説而速愈耳今忽聞奄逝朕中殊為惻然聞趙良棟存日與總兵官王化行不相能朕至寧夏務為趙良棟妻子區處使之安生斷不使受害於其仇白斌及衆武辨俱叩首曰自古以來功臣能保其身者甚少雖天下開創之人或不能免趙良棟幸遇聖明之世一生榮顯病時屢荷殊恩身殁之後至妻子皆上煩聖慮真天地父母之心不但趙良棟感戴於九泉之下凡為臣子者無不傾心感戴皇恩也留厄魯特吳克爾於柏林堡養病上諭理藩院曰蒙古吳克爾病著同其弟布達俱交柏林堡守備好生調養病愈則乘散秩大臣諾爾布來赴行在之時交諾爾布帶來此際即愈則交京來便人帶來或不得生則交其弟用蒙古禮收殮大將軍費揚古奏報厄魯特達喇什等來降費揚古奏曰坐哨副都統邁達禮等解到厄魯特達喇什等言我等乃杜噶爾阿喇卜灘屬下人本年正月初五日自札巴喀之察罕托會地方逃出來降聖上我等現來男子三十一人婦子七十八口帶有馬一百三十七匹駱駝五十四頭撒袋十七副鳥鎗八桿腰刀四口我等逃來時阿喇卜灘在札巴喀朱爾庫朱地方聞噶爾丹在格格特哈郎古特地方去年秋噶爾丹之車里木布木至阿喇卜灘所而去其事我不得而知阿喇卜灘下人有七八百許阿喇卜灘本身及下人除駝馬之外並無牛羊奉差筆帖式黑色馬尼圖在我等未逃出之前十二月二十六日經我等所居札巴喀之察罕拖會而去尚離有五六日程曾指示黑色馬尼圖道路使之前往我等逃來之前阿喇卜灘部下寨桑等言根敦帶青在喀喇塔兒地方議謂朱爾庫朱地方不可安處宜往向西七日程者爾格什喇葫蘆蘇地方居住噶爾丹回子阿喇卜灘回子往俄羅斯貿易歸丹津俄木布遇之縱阿喇卜灘回子盡虜噶爾丹回子已往洪果羅去矣問之曰奉差出使噶爾丹之博什希等及厄魯特格壘沽英等汝等曾見之否據言途路各異我等未嘗相遇問之曰阿喇卜灘亦通使於噶爾丹否除爾等以外阿喇卜灘下人猶有來降者否據言阿喇卜灘並不遣人於噶爾丹我等因逃來故不敢向他人言問之曰噶爾丹曾聞其子塞卜騰巴兒珠爾聖上已差人擒獲否據言聞塞卜騰巴兒珠爾離噶爾丹他往捕獵不聞其被擒又問曰爾等厄魯特每人俱有馬否其臕何如據言每人雖有馬數匹俱驅馳捕獵是以馬臕羸瘦若不得獸則又互相偷盜殺以為食除將達喇什解赴行在外俟其妻子馬畜解到日交歸化城副都統阿迪解往為此奏聞上命示議政諸臣將軍孫思克請增兵從之議政諸臣奏曰據將軍孫思克疏言奉旨命臣率兵一千與滿兵一路進𠞰但遇敵交戰則營中輜重食物不可不守請此兵千名外再取兵五百名倘遇敵交戰以此兵守營臣率精兵一千酌量調用可以破敵決勝現有馬五千匹此一千五百之兵每人給馬三匹需四千五百匹尚餘五百匹應照該將軍所請除現發兵一千外再增發五百名此增發五百兵亦照前例每人給馬三匹拴帶百日糧每名賞銀十兩至此項進𠞰之兵前已奉旨帶百日口糧其隨運米糧無庸議者也奉旨著照議速行核查倒斃官馬鑲黃旗親隨護軍頗斂馬斃內大臣奏聞得旨嗣後騎官馬者其馬倒斃訊明醫人見證報該管大臣官員職事首領啓奏是日上又諭皇太子曰朕躬安好皇太子佳否自神木縣往榆林之路皆大磧崇山甚為險惡非行兵之地觀此則古人拓地興師築長城竭天下脂膏於西北者未可謂非必非今人之所能也特仁者所不為耳朕隨行諸臣侍衛護軍執事人員不過四百人尚不勝其勞將數萬兵如何可行溝壑多而砂又深故從榆林出邊取徑於鄂爾多斯而往寧夏趙良棟三月初二日身故將軍馬思喀奏報其子為天津道速令急歸宣化府知府范時崇居官好而行事不茍可授為天津道宣化府亦係要地捕盜同知祖允泰昔為霸州知州時居官好而行事不茍可補授俱著星速赴任朕行程已逺奏報間隔嗣後行在寄京之札即於次日答奏此際如有諭旨每事亦於次日內答奏各省來京者問今年春景如何雨水如何寄聞朕躬雖在軍中而慮周天下刻不能忘此心此意何時可釋此奏於初七日午後到立將進獻皇太后諸物親視包褁閲本批報匆匆書寫至給燭時始畢隨即發行嗣後報到日時務開本上發來朕巡行秦晉但恐萬人非議行事或有不當日自兢兢如南巡禮不敢隕越遺羞幸而兵民感朕積恩無不來集莫之却避念朕躬不德如所行稍有不協何能掩萬人之耳目乎皇太子勿為朕慮如效明武宗之所為何以還歸也己未上駐蹕建安堡東嚴禁強買搶奪民財上諭大學士伊桑阿等曰隨駕人員搶奪強買民物朕皆差官查拿被獲則從重治罪但恐京城後來者及離大營在一二日後至者搶奪強買民財亦未可知著曉諭經過沿途地方官員如有此等事查拿指參從重治罪係誰家人其主一併治罪其衆人車輛不得攔阻著通行傳諭庚申上駐蹕王關澗止總督吳赫迎駕上諭行兵部曰羅大虎報云總督吳赫總兵官王化行於本月初六日自寧夏來迎駕督撫料理糧餉馬匹事甚緊要如起行前來不論已到何處此旨一到即刻歸去王化行照常來迎著兵部作速檄知辛酉駕次榆林主事薩哈連查明榆林至寧夏路程來奏薩哈連奏曰臣出榆林邊外問鄂爾多斯多羅貝勒汪舒克旗下四等台吉噶爾馬等曰自榆林由邊外至寧夏之路須幾宿乃至寧夏及水草何如噶爾馬對曰往寧夏之正道自榆林至馬齊圗扎達海為一站八十里有小泊一方自馬齊圗扎達海至海流圖河為一站八十里有大河水自海流圖河至拖河圖為一站六十里有小泊一方井一口自拖河圖至納林河為一站六十里有小河水自納林河至古壘為一站八十里有井一口自古壘至阿兒灘噶達素為一站八十里有井一口自阿兒灘噶達素至烏喇素為一站九十里有井一口自烏喇素至察罕拖羅海為一站七十里有井一口自察罕拖羅海至哈沙圖為一站五十里有井一口自哈沙圖至橫城口為一站八十里此路分為九宿第十站至橫城共七百三十餘里水甚少路亦大砂又有沿邊外至安邊一路自榆林至他喇泉為一站七十里有泉水自他喇泉至海流圖河為一站八十里有大河水自海流圖河至什喇泉為一站八十里有泉水自什喇泉至扎哈泉為一站七十里有泉水自扎哈泉至哈達俄羅木為一站五十里有河水自哈達俄羅木至蘇海阿魯為一站六十里有河水自蘇海阿魯至安邊為一站六十里此路自榆林起宿六宿至第七宿到安邊共四百七十餘里路雖小有砂而水草足用及問安邊以外由邊外到寧夏之路無人知之為此奏聞奉旨報聞爾既來效力再差爾一次爾今即往視安邊至寧夏之路如或可行則告之鄉導官布達等從口外擺站爾身至蘇海阿魯候駕命擺站馬由口外送寧夏理藩院奏曰前因駕出榆林由邊外幸寧夏是以自榆林起擺站至橫城口止以內路所備驛馬每站設三十匹候駕臨寧夏撤去等因具奏奉旨依議今駕出榆林進安邊應不必設驛至橫城口但設至安邊俟駕進安邊撤去其驛中所設之馬仍各交坐塘筆帖式蒙古台吉官兵趕解至安邊交地方官酌撥官兵護送筆帖式同監每站喂以空草遞送至寧夏交上駟院或從邊外視水草佳處放青而去直赴寧夏交上駟院請旨定奪上準行邊外草佳此馬從外趕赴寧夏壬戌上出邊至他喇布喇克駐蹕命大將軍伯費揚古便宜調發蒙古兵議政諸臣奏曰大將軍伯費揚古咨言達爾漢親王四子部落毛明安三吳喇忒兩土默特旗兵披甲所携馬畜有限而欠臕萬一奉旨調遣必致有誤是以留該王貝勒貝子公部長台吉等於軍中令將官兵更換等因理藩院為之轉奏上諭凡調遣外藩部長兵馬之事俱已交大將軍如皆請旨而行則有倉卒軍機必致遲誤嗣後遇此等事俱聽大將軍便宜調遣使增置驛站上諭大學士伊桑阿等曰今日所安之塘較逺使馬勞苦其間再增一塘至明日駐扎之地其間亦增一塘每塘設馬二十匹若彼此相近僅四五十里者不必增設至西北方草美諭衆俱至其地牧放使榆林各衛堡照州縣例積貯米糧上諭大學士伊桑阿曰州縣俱論大小積貯米榖兵丁所駐沿邊衛堡亦甚緊要其榆林等處衛堡俱照州縣大小積貯之例將捐助米榖積貯預備著交該巡撫遵行皇太子奏聞措置塞卜騰巴兒珠爾事宜皇太子奏曰頃奉上諭云塞卜騰巴兒珠爾到京姑勿處置稍俟其父噶爾丹聲息其到日當如何集衆宣示皇太子可與滿漢諸臣確議遣奏再遵旨而行臣遵即召集滿漢大臣會議以為噶爾丹者乃一異國之主肆虐西域厯有年所近復猖獗侵我邊境父皇乾剛獨斷決計親征為此生民不憚勞苦整旅一臨噶爾丹遂爾大敗魂飛逺遁下人紛紛離散噶爾丹僅存一子竟不能保恰符父皇之妙算即被擒獲良由噶爾丹罪惡貫盈是以舉朝文武天下人民無不切齒當於噶爾丹之子塞卜騰巴兒珠爾解到之日臣出校射場召集諸王以下內大臣侍衛都統部院大臣以上觀之閲畢示衆自午門至東長安門召集滿漢文武官員八旗各佐領軍校押塞卜騰巴兒珠爾進東華門引之使跪而觀之仍令出東華門進左闕門出東長安門使衆觀之出東長安門外後兵民商販有欲觀者咸令觀之將塞卜騰巴兒珠爾監禁理藩院附近間房其乳父另行監禁既奉諭旨將塞卜騰巴兒珠爾略俟噶爾丹聲息應交該部支給食物至看守塞卜騰巴兒珠爾當酌撥八旗護軍參領官兵小心防守併派理藩院司官二員專理恭候父皇諭旨欽遵而行謹奏癸亥駕次哈留圖郭爾以衛徴喇嘛徒衆交大喇嘛阿齊圖綽爾濟等理藩院奏曰大將軍費揚古咨言右衛監禁罪犯衛徴喇嘛徒弟一百四十三人既奉上諭寬宥釋放交歸化城都統飼養應給伊等口糧養之但歸化城之米所以儲備軍中機務似不得遽為支給查伊等俱係彭素克喇嘛屬下徒弟應將伊等交住持大喇嘛阿齊圖綽爾濟彭素克格隆當如何安插看養之事定議報部使之養之等語此項一百四十三人俱應交阿齊圖綽爾濟彭素克格隆議定如何安插報部之日再議又咨言歸化城事務須趨赴辦理既至遲誤而驛遞亦勞苦仍請照前交土默特都統副都統辦理等語但歸化城地方緊要既係大將軍費揚古專任管理則歸化城事務不便竟交都統副都統應將常行事理交都統副都統辦理其緊要大事仍行咨大將軍可也上從之甲子上躬視隨行商販渡無定河是日渡無定河上見貿易民馱步擔衆販俱令乘近侍人員馬後而渡貨物俱在馬上運過諭曰隨來販子遇河能渡則渡如不能渡俟駕至朕將親臨渡之駐蹕庫爾祈喇地方命安邊等九處鑿井上諭大學士伊桑阿等曰安邊磚井鹽城堡摩布喇等九處水泉不多應預差人加增鑿井著大學士與兵部會議併撥鄉導一人前去伊桑阿等會議以為自安邊至花馬池俱係榆林總兵施世騄所轄地方應著總兵施世騄與派出鄉導同往自花馬池以外俱係寧夏所轄地方應交花馬池副將視鄉導法保等所指下營之地一處增鑿五口上曰行在所有鄉導俱有執事著派出學士黃謨前往併著總兵官施世騄亦去黃謨等務必追見法保商議朕亦有旨諭法保等矣若邊外有水則編次宿頭由外而往如由外往則不必鑿井如口外無水則由內路而往視法保等所指下營之地加增鑿井如有水則多鑿更妙倘鑿不得水預先星速檄報如此則駕易行矣撥馬給將軍博濟之兵甘肅巡撫郭洪奏曰將軍博濟兵二千無馬將軍孫思克緑旗兵餘馬二千匹即以此撥給博濟之兵或於採買馬駝內酌量撥給則軍務不致遲誤矣上命議政諸臣議奏共議以為西安滿兵駐防肅州者二千每人有自備馬三匹此二千兵內家貧者除去五百此兵之馬一千五百匹及孫思克撥兵餘剩之馬五百匹巡撫郭洪自行採買捐助馬駝一千許匹內選擇臕大者如或不足則令該撫與將軍孫思克於文武官員及不出征緑旗兵丁內揀擇臕大馬騾撥給滿兵一千五百每人二匹前進征𠞰毋失機會其所買牛羊俱隨軍趕解買助馬內臕瘦者給留下五百滿兵喂養上命如議速行副都統阿南達奏報驛解厄魯特恩克達爾漢寨桑阿南達奏曰二月二十二日哈密達爾漢白克額貝都拉解到恩克達爾漢寨桑乃滚占之妻奴渾達喇所差使人也臣問之恩克達爾漢寨桑據云噶爾丹自被聖上擊敗以來並無糧食難以為生故滚占之妻奴渾達喇去嵗八月間離噶爾丹各自度命採捕禽獸欲投靠青海差我先至哈密乞糧是以被執解來查前者哈密達爾漢白克額貝都拉遣使來告臣曰哈密地方厄魯特或來乞或來逃其人甚多哈密地小而貧不能養之欲解赴軍前則馬畜羸瘦不能逺解嗣後若有此等厄魯特來請驅逐之臣謂來使曰皇上好生離散之厄魯特人等陸續來歸已俱使各得生業爾等當體聖上好生之心有來降者酌量收養俟軍務既畢之時即遣人往取兹因往取此項人衆併查取恩克達爾漢寨桑同來之人先解恩克達爾漢寨桑前去上以示議政諸臣副都統阿南達奏報噶爾丹情形阿南達奏曰據噶爾旦多爾濟遣其寨桑阿好來報云我舊屬多爾濟阿兒達爾哈什哈等六口於去年十二月內來言我貧不能存去嵗八月辭噶爾丹言欲往投舊主噶爾旦多爾濟噶爾丹言汝去吾不汝阻即在吾左右吾不能養汝汝到彼可語噶爾旦多爾濟曰汝姐阿奴在日言我必以女鍾齊海嫁噶爾旦多爾濟我已允之矣今汝姐已殁此女或娶或不娶一慿尊意其言如是吾非欲娶此女而相告也但以其為噶爾丹囑我下人之言而告侍衛耳為此奏聞上以示議政諸臣乙丑駕至扎罕布喇克副都統阿南達以䇿旺喇卜灘通書於噶爾旦多爾濟之事奏聞阿南達奏曰三月初六日噶爾旦多爾濟遣其人阿爾達爾莾奈來言䇿旺喇卜灘遣人致書於我我亦遣俄産等五人答詢其安為此移知侍衛併送䇿旺喇卜灘之書閲䇿旺喇卜灘所遣噶爾旦多爾濟之書云汝與我向為婚姻互相唇齒言歸於好亦汝所知後博碩克圖之事汝所共知然與我兩人毫無干涉如仍前安好想互有利也今汗處逃來人告曰聞遣其阿兒達爾哈什哈來招爾將以其女妻之思其情殆因無定居之䇿故誑汝是實爾倘墮其計娶其女則與衆為戎首亦是實倘謂我此語是實則毋結姻倘以為謬一惟尊裁問阿兒達爾莾奈曰猶有口傳之言否據云䇿旺喇卜灘言我輩向來同好請仍前歸好恐墮其局而娶其女又前者因行人之便寄書三次欲與和好何以竟不見答特遣人羅卜藏厄林辰往詢此言之外並無他語併將䇿旺喇卜灘所寄噶爾旦多爾濟之書呈奏上聞上命示議政諸臣遣前鋒侍衛竒薩穆等往視地方形勢上諭行兵部曰著以前鋒侍衛竒薩穆長史庫濟根為首領率侍衛津巴穆扎哈爾鄉導侍衛阿南達羅卜藏什喇卜著竒薩穆選擇寧夏所有新滿洲三人帶往伊克敖拉巴漢敖拉相度地理前去十人每人帶馬夫一名每人給肥馬三匹其馬不得動官喂之馬著總督吳赫以自置肥好之馬給使騎去令伊等使無弓矢刀鎗者俱齊備遣行以喀爾喀巴爾達等遁逃俱正法副都統阿南達奏曰去年十一月初三日什喇葫蘆蘇臺坐哨之人來報見哈喇托克地方有人形蹤臣即差肅州守備馬維衡喀爾喀達爾漢他布囊班第巴圖爾額爾克濟農之雲端等帶兵百名前往屣探馬維衡等既到問係喀爾喀言爾等既係喀爾喀喝令來降竟不肯從隨即交戰殺其一人餘皆率其妻子而往走峻山馬維衡等追之其山險峻地方凶惡不可進而止獲男婦子女十七口駱駝十四頭羊三百隻其餘之人向西逃去坐哨喀爾喀台吉伊爾登和碩齊格寧等見有人蹤屣探前去又獲二十六人問擒獲之喀爾喀巴爾達等據云我等原係格春喀吞屬下人今屬公汪舒克之下因貧窮捕獵為食已五年矣聞我舊主之孫衛徴阿海在青海住劄欲往投之者有之欲於青海界上偷馬往投噶爾丹者亦有之我等原居哈喇托克地方大兵既到我等俱欲投降而吾長畢立克圖寨桑不許與戰而敗敗後畢立克圖同其子女步行往青海默爾根帶青台吉處去矣臣等欽惟皇上愛育喀爾喀等俱使之各得其所而畢立克圖寨桑等背髙厚之恩不即投降反來拒戰及至擊敗仍向青海而去殊為可惡為此將前後擒獲四十三口驛解前去上命議政諸臣會議咸以為喀爾喀畢立克圖寨桑等逃去而遇官兵喝降不降反與拒戰敗而逃往青海殊為可惡應將現獲四十三口內其男子正法其子女俱賞給擒獲喀爾喀效勞之蒙古緑旗官兵俟獲畢立克圖寨桑之日再議上從之給疾病商人醫藥駕行見路旁一人病卧遣人問之係陜西人名王以進隨大兵貿易因病故不能行上賜藥飲之又差親隨侍衛關保給王以進官馬乘坐帶至營中交與御醫治之豫授渡河之法上諭護軍統領蘇丹曰明日渡哈灘俄羅木不可亂渡恐致陷溺令於渡口魚貫而過若在他處亂渡人馬可虞著諭衆通知鄉導護軍參領孫果等失道分别議罪內大臣奏曰鑲黃旗鄉導護軍參領孫果當直率領輜重而不由修整之大道所行非路勞苦駝馬情罪殊為可惡坐此應革去孫果護軍參領之職不準折贖鞭一百鑲藍旗鄉導護軍參領顧爾喀在後射兔見孫果率輜重所行非路不即追上由修整之道而行乃從非路勞苦駝馬殊為不合坐此應革去顧爾喀所加一級併護軍參領不準折贖鞭五十正紅旗鄉導佐領署護軍參領庸帶奉親近侍衛關保伍什傳旨遣諭輜重由修整大道而來而庸帶遺漏以己意告之孫果殊為不合坐此應將庸帶革去佐領之職不準折贖鞭五十親隨侍衛關保伍什傳諭旨並不錯誤應免議得旨孫果前日已經痛責著免鞭責革職交馬五使在捕獵行走顧爾喀庸帶各罰俸一年餘如議丁卯駕至通阿喇克主事薩哈連勘明邊外之路來奏先是上諭薩哈連看明出安邊由口外至橫城之路如可行則即告之鄉導布達法保在邊外編次宿頭至是薩哈連奏曰臣勘明自安邊由口外至橫城之路自蘇海阿魯至巴顔和碩八十里井二口自巴顔和碩至班土庫木七十里井二口有一小泊水鹹自班土庫木至伊克什克爾湖七十里水鹹有井三口自伊克什克爾湖至庫克叉岔七十里井二口自庫克叉岔至哈畢圖興武營六十里井四口自興武營至科爾格湖七十里大湖自科爾格湖至橫城六十里共四百八十里此路水少而草亦惡又見安邊八十里外定邊相近有一泉自定邊至花馬池六十里邊外有一泉自花馬池至清水營一百七十里外有一大湖除此三處之水外其餘當宿之地無水邊外不可行故告之布達法保伊等前去從邊內編次宿頭為此奏聞上報聞聖祖仁皇帝親征平定朔漠方略卷三十八

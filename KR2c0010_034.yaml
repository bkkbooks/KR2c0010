body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷三十四十二月甲申大將軍伯費揚古至自軍是日上仍駐蹕薩爾虎拖會清晨費揚古將到上遣皇長子皇三子皇八子往迎費揚古至上出幔城費揚古趨進跪而請安上命入行宫與語良久續使議政諸臣前諭曰朕謂噶爾丹乃熟於戰陳之狡寇滅之必需時日孰意一戰而立至敗亡前者費揚古奏言西路兵四月二十四日可至土喇二十七日可至巴顔烏闌故朕即統軍前進後杳無聲息在察罕布拉克待之數日果西路兵如期而至兩路夾攻則噶爾丹之兵一人亦不能脫矣其時諸臣尚欲待之於拖陵朕計西路兵今將到土喇朕軍不可不前遂統軍疾進雖噶爾丹懾我軍威潰遁而西路以疲困之衆遇敵戰勝勢如破竹實為可嘉費揚古奏曰臣雖率西路之兵前往凡軍中機務皆謹遵聖上指授手書密諭而行並未能别出意見有所效力况西路兵已糧匱馬乏不能前進及聞皇上親至克魯倫衆官兵無不奮發齊言皇上出自深宫尚且先至敵境我等其可緩乎故不待催迫冒死前進不俟督責奮勇克敵若非聖駕預臨無論滅賊即臣之身命亦不可保噶爾丹之破敗皆聖謨神武之所致奈臣庸劣以皇上窮追困蹙之寇不能生擒而獻之皇上則臣之罪也議政諸臣奏曰費揚古所奏亦是皇上預料費揚古之兵必至若合符節忽防西路之兵糧匱乏預令運往接濟真至聖至明也上顧費揚古曰噶爾丹被我軍擊敗後散者散降者降是以朕親臨塞外相機而行今觀陸續降人及噶爾丹所遣格壘沽英之言噶爾丹窮蹙是真朕意悉加屠戮不如撫而活之故於爾未至之前朕即降旨招降費揚古奏曰聖意逈出非常真天地好生之仁非臣等愚昧所能及皇上出塞以來噶爾丹部落諾爾布寨桑等皆携其妻子接踵來歸噶爾丹知不能有其衆故遣格壘沽英乞憐臣意宥罪之詔既下噶爾丹必降矣檄撫厄魯特車陵伊拉古克三庫圖克圖車陵遣使來奏曰敬請聖明萬安自古以來至達賴台使往來朝請已五世矣未年欽差巴扎爾傳諭龔格額爾克轄許之恩待欽遵斯旨來投聖上而將軍劫之拆我夫婦奪我財物幾戕我身命伏乞聖鑒因將軍奪我諸物且將討我是以逃歸蒙皇上冇俯恤之意伏乞皇上即降恩綸上諭曰車陵來歸朕我緑旗兵及蒙古兵不知擊而虜之後朕聞知痛責將軍諸臣矣今車陵來奏乞降彼恩綸著理藩院備文發去令車陵作速來降朕將寵恤眷顧其離散之人盡皆查與完聚伊拉古克三庫圗克圗遣使來奏曰臣昔在太宗皇帝之時少效微勞得蒙恩旨許以世世加恩臣是以留傳宗派後奉達賴喇嘛法旨往歸天朝微軀得蒙寵恤詎意惡徒彭素克格虛詞揑告大臣不辨曲直斥逐臣身後蒙皇上寵臣為喀爾喀厄魯特不和之事奉差出使臣罔惜身命竭蹶王事緣不獲分明遂有往皈西方之想厄魯特噶爾丹博碩克圖汗奏於達賴喇嘛携臣而去臣欲遣使奏聞而未能去歲意欲往見欽差使臣侍衛克什圖而臣所居遼逺不得訴臣衷曲今欲使喀爾喀厄魯特安寧臣已奏於達賴喇嘛及博碩克圖汗矣皇上如天之仁一唯諭旨如何謹遵旨而行上諭曰伊拉古克三庫圖克圖自西域來朕待之殊加寵異想內不自安而去今可作速來歸彼乃喇嘛朕不介意當待之如初著理藩院檄諭之於是理藩院備文開列奉旨招撫原由付車陵伊拉古克三庫圖克圖使臣賫回乙酉上駐蹕湖灘河朔之南以御佩櫜鞬弓矢及各種食物賜大將軍伯費揚古遣還差尚書班第以銀賜坐塘蒙古章京披甲丙戌休養官兵馬匹上諭大學士阿蘭泰曰右衛大同官兵勿勞馬匹逺迎各於城外近地接駕可行文諭之己丑駕次殺虎口蠲免大同府地丁錢糧上諭户部曰朕惟治天下之要惟以乂安民生為急顧欲安民生必除寇虐欲除寇虐必事師旅方今寰宇升平人咸樂業獨厄魯特噶爾丹狂逞邊塞荼毒生靈朕思為邊境人民永絶後患故特發大軍分道進𠞰朕躬不憚勤勞今春親統中路大兵深入無水草之地直抵拖諾比噶爾丹聞朕親臨盡棄輜重倉皇宵遁適與西路大兵相遇大敗潰散俘獲其人口其寨桑等來歸者甚衆而噶爾丹收遺寇千餘人仍竄伏於枯倫白兒齊爾等處地方朕於冬月復統軍出邊相機𠞰撫駕抵鄂爾多斯於是厄魯特人民來歸者絡繹相屬噶爾丹力窮勢蹙亦遣格壘沽英具奏乞降隨經頒示敕諭許其歸順惟是噶爾丹乃狡詐叵測之人其果否來降猶未可定仍當厲兵秣馬待來嵗出師撲𠞰務絶根株比年以來軍前需用馬匹在大同府屬牧養者甚多措辦草料等項雖俱支用正項錢糧而供億浩繁殊勞民力但必此賊盡滅然後邊外蒙古得以安寧而在內生民亦獲休息師旅之興大非得已該郡官民尚各勉力急公勿以煩苦為慮朕兹從邊外返蹕雲中深軫民力之艱用沛特恩以示寬恤康熙三十六年大同府屬州縣衛所應征地丁銀米著全與蠲免俟噶爾丹殄滅之後朕自誕布德音渙敷庥澤爾部即行文該撫通行曉諭俾咸悉朕惠愛黎元至意庚寅使前鋒統領碩鼐屯兵右衛以待調遣內大臣馬思喀等自言京城起行時屬在出征之列今臣等所率之兵既留大同臣等亦請與同留此際倘有調遣可以效力上曰此際並無事朕與將軍費揚古商噶爾丹若於今冬來降將軍費揚古處現有察哈爾兵五百人黑龍江兵一百人再將右衛鳥鎗手二百人副將黃元鳥鎗手一百人交右衛護軍統領量給馬上炮數門及大同養馬之鎗手前鋒四百共七百人令前鋒統領碩鼐率之至右衛以備倉卒待大將軍費揚古調遣碩鼐率之而進有此七百兵加大將軍費揚古處所有六百兵再調蒙古部落兵千許共兵二千餘用之不盡矣如此則大同所有鳥鎗護軍一千炮手二百四十前鋒四百黑龍江兵五百現存護軍二百概不調動駐扎喂馬俟改歲有征行之事再用此兵爾等其集議以聞議曰聖諭已極周詳俱應欽遵上旨而行應令前鋒統領碩鼐率鳥鎗手前鋒四百來至右衛駐扎此所率前鋒四百及右衛鳥鎗手二百之該管將領扣兵數派出其副將黃元一百名鳥鎗手著彼親率前去大同喂馬之兵所留新滿洲護軍二百碩鼐率來前鋒四百自十二月正月至二月給之行糧右衛草料少侍郎阿爾拜右衛所喂馬駝著趕至大同喂養上從之辛卯以護軍統領宗室費揚固為右衛將軍上諭大學士阿蘭泰尚書馬齊曰右衛護軍統領宗室費揚固人材偉健又多勞績大將軍費揚古現有邊外之事右衛地方關係重大著以護軍統領宗室費揚固為右衛將軍其護軍統領員缺該部照例開列具奏選擇補授都統伊勒慎年邁庸劣著離任其缺以漢軍都統戈布為滿洲都統戈布員缺以副都統雷繼尊為都統雷繼尊員缺以右衛副都統馮國相調補宗室楊福材貌偉健人品優長以馮國相員缺授為右衛副都統榆林總兵官柯彩居官不善失士卒心著作速行文令柯彩乘驛星馳來赴行在張家口副將施世騄人材偉健支派亦好著升施世騄為榆林總兵官今即傳旨著施世騄自此地起程赴總兵官任又諭曰山西巡撫員缺以倭倫補授朕已票本發行著傳諭倭倫前任噶爾圖溫保居官俱不善著倭倫勿得效伊等行事今即赴任癸巳邊內安塘至寧夏上諭尚書馬齊曰今邊外蒙古馬瘦之時恐誤急務爾可前往沿邊安塘至寧夏併閲兵行之路來奏甲午給還大小官員馬匹上諭行兵部曰先因官兵無馬出兵右衛者以隨駕官員馬匹給之乘坐俟到右衛後解大同府喂養今觀所喂馬匹俱已復原著查明各還原主乙未發部議敘西路官兵功行兵部奏曰大將軍伯費揚古等以昭莫多地方大敗噶爾丹事奏聞上命將在事有功人員從優議敘欽遵在案今以此次擊賊八旗官兵及陳亡官咨送臣部應著大將軍議政大臣本隊大臣夸闌大出結咨送如以不應論功人等功牌咨送將出結大臣夸闌大及冒功人員一併嚴處命下之日施行至西安右衛當論功官兵功牌各該將軍查取亦出結照功牌另造册用印差官送臣部其外藩官兵行文理藩院議敘上從之賜哈密回子額貝都拉達爾漢白克蠎袍等物先是額貝都拉達爾漢白克奏曰臣等白帽之族自古以來皆係皇上之人向來進貢受賞詎意天使至吾地被憨都羅卜臧噶爾丹博碩克圖汗之兵所害臣等不能保護使臣使脫於厄魯特之手僅於其軍中查得所餘人衆并章京一人助以牲口衣糧令還天朝即具疏附奏恐有與臣不睦之人謂臣亦同劫掠或至上聞臣安敢行此不法之事若厄魯特則劫掠之後即可四散而去臣居有城郭豈為此悖謬之事總之皇上即天也逆天舉動之人其身必受殃伏祈睿鑒奏至上命侍衛阿南達遣人偕來使傳諭白帽等曰爾等可照常安居噶爾丹已為我軍擊敗遁逃若有一應聲息俱著來報力似可能當即擒解必加恩賞至是額貝都拉達爾漢白克聞命不勝歡忭奏曰若噶爾丹來臣等相機竭力以擒之若聞聲息陸續奏聞上以額貝都拉達爾漢白克誠心內附特賜蟒袍貂帽金帶等物併厚賚來使納林白克遣歸丁酉諸王請安發馬迎駕上騎而行顧大學士張玉書等曰朕所乘馬乃係哈薩克國之馬噶爾丹得之為我軍所敗我軍得之朕乘而試之其汗如血古所稱大宛汗血馬想即此也張玉書等奏曰史稱大宛馬為天馬其汗赤行可追風以為詳瑞入於樂歌臣等未見常謂之虛言今聖上乘之觀其汗相符茍非德威逺播何易得此非常之馬乎繼之在京諸王貝勒貝子公俱遣護衛賫馬迎駕請安諭曰今正值馬價騰貴之時爾等何必疲勞馬畜來逺迎乎朕所御馬愛惜乘用並不羸瘦此番得馬畜甚多進京之後尚將賜及汝主爾等即將送來馬匹敬慎帶回戊戌定海總兵官藍理請調要地選兵乘機效力堵𠞰不許藍理奏曰皇上聖德同天萬邦臣服下至窮壤罔不重譯來朝者考之史册聲教之隆疆隅之廣誠未有如今日者也獨厄魯特噶爾丹負髙厚之恩觀其猖狂肆橫不過窮壤無知小寇罔識天朝之威敢奮螳臂之力自取滅亡而已臣愚以為當討而不可縱皇上睿謀乾斷直搗賊巢特為邊疆久安長治之計雖古之英主亦萬不能比皇上於萬一也臣蒙恩極深並未當有以報國近者聖躬親統六師不避勞苦逺征不庭臣職在海隅不獲荷戈前驅坐視君父宵衣旰食而罔念誠人臣之最不忠者也是以臣寢食靡寧日夜憂慮但欲盡犬馬之力捐軀報效不計狂妄上干天聽伏乞皇上俯賜準行以竭臣愚忠臣前蒙特恩曽任宣府總兵略曉西北情形請皇上調臣山陜沿邊駐扎歸化城等處俾得隨軍𠞰禦厄魯特噶爾丹少效微勞以盡臣職臣尤有管見敢為皇上陳之𠞰禦厄魯特當用藤牌火器居前馬兵繼之此誠破敵之要著如欲用藤牌當用福建平時操練便捷輕巧活潑之步兵至浙兵廣東潮州鎮標兵內能用火器者多况南方之兵俱善步行臣在浙江時從軍進𠞰逆賊灼知浙兵之可用至前者恢復彭湖之後臣管福建水陸兵親加訓練者有之親率出戰者亦有之觀其中精鋭之兵多伏乞皇上調福建水陸提標步戰兵三千使用藤牌調廣東潮州鎮標步戰兵一千使用火器交臣帶至沿邊要地操練不但臣可臂指使之或出邊征𠞰或坐鎮要害請皇上指揮調遣得仗天威必能略建寸功蹈湯赴火而噶爾丹可指日𠞰滅矣又思八旗禁軍居重馭輕以保護京師者也如屢調出征必致勞頓至各省提鎮標營緑旗官兵特為征𠞰盜賊固守地方而設者也况浙江福建廣東前因海寇未除故多設官兵以備征𠞰今海寇既平歷年已久天威逺播海上無事當調南方之兵以征西北方之小醜如此一轉移調度深合用兵之道既不增兵亦不費餉大有利於地方者也事平之日上項之兵仍可發回本汛額設之處亦不煩更改臣報主心切罔計干冒謹具本密奏上曰噶爾丹敗遁以來窮困已極下人紛紛離散來降者絡繹不絶今噶爾丹差人納欵乞降朕躬現自相機調度雖不速降亦不久就擒不必調逺省官兵所奏已悉該部知之都統摩特鄂欽規避不出征革職治罪理藩院奏曰奈曼多羅達爾漢郡王班第協理旗務公格勒兒等呈稱欽差都統杜思噶爾賫文傳諭云王貝勒台吉奏請隨駕效力者率其護衛附丁追赴駕前其兵往備於烏爾揮河某等遵此起行隨駕之日謂我旗下都統摩特鄂欽云但俟别旗兵起行則令本旗兵每隊派出披甲三名遣往軍前有無馬者捐助馬五十匹給而遣之今本旗兵竟不前去問之摩特鄂欽雖供我軍無糧告之台吉班第而不遣行但班第供云我未嘗止彼不必出兵副都統阿爾納多爾濟佐領阿哈帶等可證問之伊等俱云並無告之班第而言不必出兵之事揆此則都統摩特鄂欽明係身自規避不率兵出征巧為之辨查康熙十五年定例內將領規避不出征革職罰三九牲畜發該部落披甲應照此例將摩特鄂欽革去都統罰三九牲畜發該部落披甲得旨著將摩特鄂欽革去都統解至京城發當苦差寬宥都統達什罪理藩院奏曰喀爾喀多羅貝勒羅卜臧等揭送都統達什原派本旗出兵而以無糧無馬竟不出兵達什坐規避不出征情罪擬革去都統罰三九牲畜發該貝勒披甲上諭兵丁果有無糧馬著查明遵即行文貝勒羅卜臧查覆云本旗人員甚貧而去年又復田榖無收坐馬口糧全無是實出具印結前來應將都統達仆不出兵之處免議上從之己亥給青海台吉額爾德尼台吉封號額爾德尼遣使入貢具疏奏曰曩者皇上以臣祖車陳台吉率衆效力曽加恩賞頒賜誥敕即世之後臣父墨爾根台吉亦蒙聖眷得給恩綸臣於臣父存日未獲上陳今臣與天朝封疆大吏通好往來不異曩時伏乞推臣祖父之恩給賜誥敕至黃草灘地方臣欲捕獵而守邊官吏奉旨禁阻更祈頒諭俾得捕獵上諭曰額爾德尼台吉納木扎爾懇請推其祖父之恩給之誥敕著將所給伊父土謝圖帶青之名寫敕與他至請於口外黃草灘行獵前任尚書科爾課代曽奏請黃草灘地方雖係內地而達賴喇嘛請準青海諸台吉遊牧其時即遣原任尚書科爾課代等為默爾根台吉等畫界受地不受而去今既已為內地不準給以遊擊王文雄為張家口副將上諭大學士阿蘭泰曰著將張家口協標營遊擊王文雄以原銜管張家口副將事今即宣旨庚子右衛備兵撥給馬匹草料議政諸臣奏曰將軍宗室費揚固等咨稱右衛鳥鎗手二百名現在預備前奉部文開上諭曰右衛兵丁之馬著從容置辦倘有調用將京城每佐領四匹之馬或上駟院馬太僕寺馬撥給欽遵在案右衛兵丁所有馬八百六十三匹現在大同喂養此所備鳥鎗手二百或另撥馬與乘或即取大同所喂右衛之馬撥給又右衛之馬俱倉升料三升草二束平半無給本色者目下豆攙稃殼草僅給七斤如此草料馬焉能肥請所備鳥鎗手二百名坐馬及草料照前鋒統領碩鼐所帶前鋒四百之例支給查右衛鳥鎗手二百名交前鋒統領碩鼐現在預備聽大將軍調遣而行應撥大同所喂右衛兵丁之馬給預備二百之鳥鎗手每人三匹趕至右衛照碩鼐帶往四百前鋒喂馬之例支取草料著右衛將軍費揚固監視小心喂養上從之壬寅未時上由德勝門進神武門入宫詣皇太后宫中請安癸卯大同營馬缺額著照數賠補並察議喂馬怠玩官員兵部奏曰大同總兵官康調元疏稱該營挑給兵丁馱米之馬倒斃四百八十二匹坐馬及陳傷馬匹共倒斃一千五匹乞照數補足等語查此項缺額馬匹原當取陜西茶馬補給但查近者寧夏總兵官王化行以河西營馬隨征倒斃缺額者多其營額馬缺一千匹具奏臣部與户部會議此項缺額之馬速將換茶之馬照數補給如茶馬不足則速動支錢糧採買補給其河西各營缺額馬匹亦作速補給奏準在案今若仍取茶馬則茶馬不敷亦未可定且往取茶馬往返路逺必致營馬久空應檄晉撫僅此一次動支朋銀陸續採買補足馬額除陳前傷斃七十二匹不議外其騎坐倒斃馱米倒斃者共一千四百八十七匹此皆該管官員怠玩禁令不嚴飼飲不謹以致倒斃甚多應行文該撫查明怠玩官員題參後將該鎮一併查議上從之乙巳外藩諸王請隨征止之科爾沁和碩達爾漢親王額駙班第旗下協理旗務二等台吉畢立滾達賴等奏曰臣等願得居此倘聖駕更有征討之事隨往效力又科爾沁和碩達爾漢親王額駙班第旗下協理旗務多羅郡王畢立克圖等奏曰臣等願得各自歸家備辦馬畜等物倘聖駕更有征討之事臣等從口外往會上曰著各歸本地不必預備丁未遣新滿洲祁思庫等往大同養馬議政諸臣奏曰大將軍伯費揚古疏稱蒙上以新滿洲祁思庫等十八人交臣令彼效勞若留於此地難以照顧而有誤於伊等明年之行除上賜馬二十匹外臣之羸馬俱發往歸化城喂養今祁思庫等或發往大同與黑龍江兵一同喂馬待來年之行或令遣歸伏乞皇上指示等語查祁思庫等十八人皆奉旨在將軍軍前效力聽其指揮者也應遣祁思庫等暫往大同與黑龍江兵一同喂馬俟來年出行之時仍遣赴大將軍軍前效勞上從之發總管關保等兵之馬往大同喂養議政諸臣奏曰大將軍伯費揚古疏稱總管關保官兵已預備明春出征但伊等之兵自本年四月出行至十二月在此馬匹羸瘦若不預喂則不可用請將關保等留臣軍中遣伊馬匹酌發官兵前往大同整治器械支草料以喂之查軍需馬匹關係重大應準將伊等馬匹酌發官兵至大同整治器械喂養馬匹上從之使大將軍伯費揚古嚴巡哨汛費揚古奏言近奉上諭令侍郎滿丕郎中桑格駐扎喀爾喀和碩親王善巴喀倫探聽聲息臣思今時寒冷駐扎喀爾喀喀倫者未必不避寒覓深奧之地而居且噶爾丹使人歸去經過地方所設哨汛彼俱窺見不得不將彼所窺見哨汛改使逺設嚴加巡察且內大臣䇿旺諾爾布一等侍衛鄂齊爾杜拉兒現在臣軍前令伊等往赴喀爾喀和碩親王善巴多羅郡王滾布等處駐扎不時巡查哨汛則坐哨之人不致懈惰避居深奧而皆謹嚴矣是以令內大臣䇿旺諾爾布往多羅郡王滾布處一等侍衛鄂齊爾杜拉兒往和碩親王善巴處不時巡查倘噶爾丹來降一面遷喀爾喀於喀倫內集兵護後一面報臣十二月十八日已遣行矣報聞戊申員外舍稜私歸發部議罪理藩院奏曰大將軍伯費揚古報言公衛徵車木楚克納木扎兒詳稱坐哨員外舍稜言居烏爾揮已四閲月矣並無聲息汝等當各歸我則回奏其情我等言未曽奉旨我等不敢舍稜已於十二月十四日起程而去我等當作何措置伏候裁示是以檄公衛徵車木楚克納木扎兒舍稜既去汝等亦各自歸家可也為此報知舍稜查獲厄魯特理應差人解送而親身解來殊為不合應交該部察議上以發所司庚戌議敘厄魯特降人上諭內大臣公福善等曰今當封印之後爾等會同部院諸臣將厄魯特降人為首者並所携人口幾何查明議敘嵗內具題會議得丹巴哈什哈察罕西達里哈什哈為首率領吳海丹等一百六十三口來降韓都台吉為首率領塔爾巴等二百四十三口來降米寨桑為首率領八十四口來降土謝圖諾爾布為首率領八十口來降理應議敘但俱奉特旨授以官階應無庸議土克齊寨桑為首率領五百口來降應授以二品官職古英寨桑率領一百二十口降於大將軍費揚古軍前應授以三品官職今已物故應授其子羅卜臧四品官職台吉色稜扎卜為首率領七十二口來降應授色稜扎卜四品官職綽克托巴圖爾唐古特寨桑巴當寨桑額西德克額爾克哈什哈莽鼐哈什哈都喇圖巴圖爾默爾根畢立克等稱我等七人隨車里克歸去復公同商議同心來降並無為首之人綽克托巴圖爾等既稱同心共議率領一百六十八口來降應將伊等七人俱授以六品官職楚魯克巴圖爾稱我隨噶爾丹至烏闌布通與大兵交戰後即出而欲降我主敖爾肯執我而禁之又在克魯倫地方噶爾丹之寨桑車陵布木伊巴博羅特寨桑和碩齊阿齊圖色稜共五寨桑奪前鋒之馬而歸去我遇中書阿必達賫皇上敕書並賜噶爾丹什物引至車陵布木諸寨桑所彼以我引天使至彼褫奪我馬匹財物罰我步行上項情事散秩大臣丹巴哈什哈沙克朱諾爾布中書阿必達可證詢之丹巴哈什哈阿必達等皆云果然且為首率領一百八口來降應授以三品官職晉巴雖於未戰之前為喀爾喀部長一等台吉阿里雅旗下阿爾薩闌衛寨桑所擒然奏請皇上情願效力賫敕往諭噶爾丹招巴巴奇寨桑來降應授四品官職巴巴奇寨桑為首率領六十口來降遇伊拉古克三庫圖克圖皆被虜去巴巴奇六十口雖被虜去仍復來降應授以五品官職噶爾丹管理賽賴滾之布爾奇達爾漢寨桑色稜寨桑丹巴寨桑吳勒木濟哈什哈自尚書圖納一到即為首率領一百七十九口來降應授以三品官職色稜寨桑丹巴寨桑吳勒木濟哈什哈應授以四品官職馬穆古英寨桑六口馬爾雅寨桑六口喀爾喀之哈爾巴達爾漢寨桑丹巴額爾德尼寨桑轄杜噶爾二十口畢達喇二十九口多濟二十四口阿哈魯克默爾根二十口霍代丹巴哈什哈之西爾哈達什等十九口朱兒扎哈十九口巴卜里十五口哈什哈十五口鄂齊兒十二口伊爾都齊十口巴塔噶克十一口達特拔十一口阿木呼郎九口庫濟思希九口吳默赫默爾根寨桑八口博羅特七口折西六口台吉鄂羅斯莫倫吳山岱庫喇卜畢齊克各帶五口而來布達席拉卜等各帶四口來降額林辰綽托賴孟克唐噶禮克垂扎卜曼濟思哈鄂羅斯等俱帶三口而來班秦珠爾巴哈兒納秦巴牙爾圖等各帶二口而來霍岱庫達席力察罕鄂木布薩木哈雅奈孟克杜爾伯特肯折多爾濟烏克爾多羅默丹津巴爾丹納馬爾沙等各以隻身而來查沙克朱木馬穆古英寨桑等為首而來之人三十九口以下至二口以上來降霍岱等十三人皆隻身而來伊等率來人少單身來降不及議敘之例應無庸議上曰以土克齊寨桑米寨桑韓都台吉為一等侍衛位在一等侍衛半班之上蒙古侍衛之下以馬穆古英寨桑哈爾巴達爾漢寨桑丹巴額爾德尼寨桑為四品官拔為二等侍衛晉巴巴巴奇阿穆呼郎鄂羅思拔為三等侍衛博貝台吉吳山岱杜噶爾額爾克丹巴哈什哈之弟索諾木諾爾布之弟車陵俱拔在藍翎以庫濟思希達爾漢哈什哈霍岱為七品官海呼兒該達瓦人材甚優且有勞績亦授為七品官餘如議行臣謹按聖人之所以動物者誠而已矣誠之所感豚魚可格而况心知血氣之倫乎厄魯特格心向化歸我聖朝在人情或不無疑二我皇上列之環衛使值周廬材者既備我驅䇿其他亦皆量能而使蓋不特推心置腹為招携懷逺之道而聖天子如天之度真視天下為一家朝為降虜暮為王臣至誠動物宜其接踵來歸有以平數十年未平之狡寇也辛亥蠲免甘肅所屬及榆林等沿邊州縣衛所地丁錢糧上諭户部曰朕惟治安天下唯期民生得所而民生之得所必以敷恩寬賦為要朕於一切事務稍有動用民力之處即厪懷殷切刻不能忘比年以來因厄魯特噶爾丹猖狂逆命遣發大兵分道進𠞰軍興供億不得已而煩民力甘肅所屬各州縣衛所及榆林等處沿邊各州縣衛所適當師行要道喂養軍前需用馬匹並大兵往來經過各項措辦雖俱支給正項錢糧而供億煩多閭閻勞苦朕心深用軫念著將康熙三十六年甘肅巡撫所屬州縣衛所陜西巡撫所屬榆林等沿邊州縣衛所地丁銀米盡行蠲免行文各該撫遍加曉諭務俾小民均沾實惠稱朕體恤黎元至意甘肅所屬銀米既經全免需用錢糧著於鄰近省分作速撥給爾部遵行又黑龍江雞林江地方頻嵗米榖不登著行文盛京將軍修整船隻照先噶爾圖運法將盛京食糧用本地腳力運五千石至摩爾烘阿敦地方收貯今年天津海運到盛京之米已散給科爾沁貧人矣來年宜仍自天津運米至盛京運此米者不必用福建浙江船即用天津所有船隻運一次交與侍郎陶岱可也副都統阿南達開列邊外路程進呈阿南達奏曰理藩院咨稱奉旨著行文阿南達將自寧夏至翁金之路自翁金至薩克薩特呼里克及噶爾丹現在所居通金地方路程及嘉峪關至哈密路程哈密至薩克薩特呼里克路程開明奏覽欽此查得自寧夏至翁金河二千一百餘里自翁金至薩克薩特呼里克一千餘里自寧夏至翁金之路喀爾喀部長一等台吉汪舒克丹津額爾德尼等旗下鄉導伊白格兒畢兒超海歐勒等知之薩克薩特呼里克在什爾哈之南喀喇阿濟爾罕山陽自翁金而什爾哈而通金而薩克薩特呼里克之路臣阿南達使人往噶爾丹之時充鄉導前去者乃伊拉古克三庫圖克圖之弟子滾布吳巴什彼則知之乂自嘉峪關至哈密二十日內可到巴爾呼兒在哈密之東方至此與至哈密同自巴爾呼兒至薩克薩特呼里克第九日可到為此具奏報聞聖祖仁皇帝親征平定朔漠方略卷三十四

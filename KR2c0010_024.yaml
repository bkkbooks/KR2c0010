body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷二十四丙寅上躬率前鋒兵窮追噶爾丹噶爾丹遁大獲其遺棄甲胄併所奉金佛經卷等物是日抵克勒河朔駐蹕遣人探西路大軍聲息上諭大將軍伯費揚古曰前曾兩次遣人馳書賜大將軍伯費揚古其至與未至並未奏明商南多爾濟至始知西路兵於五月初可至土喇初七可至巴顔烏闌於是又遣人賜書至今仍無音耗朕親統大軍追𠞰噶爾丹問所獲噶爾丹之人及阿拉布坦之人言於巴顔烏闌之西曾聞炮聲不知與何兵交戰而其事又未知若何因爾奏未至朕深以為憂故遣䝉古鄉導持書馳往偵探信息人到時爾即繕疏著一曉事人賫來命將軍阿密達駐劄克勒河朔上諭議政諸臣曰比者三日見噶爾丹盡棄其老弱日用諸物而遁其去之狀甚急今我選兵追之將重炮留於此站每佐領留護軍一名看守兵部隨以統領大臣奏請得㫖著阿密達率兵前來於克勒和朔駐扎此處所留之兵令其一併統轄或召使前進或遣令先回俱候㫖行申嚴押護輜重班次兵部以驍騎校西代等防護輜重曠班擬罪具奏上諭曰哨探防護之兵所關甚要各營諸王皇子大臣俱宜知悉大臣等既輪班行走此後若稱不知將諸王皇子大臣等一併議處上諭皇太子曰初九日將暮分派兵隊前往追逐初十日抵噶爾丹所住之地觀彼形跡亦不甚衆馬雖有而不多牛跡甚少羊跡亦少有之帳房釡鬵及稚子婦人所用之物鐵器鎗柄網罟帳房椽桿以至釡中之羮盡皆棄之而遁跟隨人役拾取者甚夥觀其生業可謂窮困至極矣師行之際自厄魯特投誠而來者相繼於道咸云噶爾丹住此地阿喇卜灘住於巴顔烏闌噶爾丹初不信皇帝親統兵至此於縱回厄魯特四人問此無水之地何由可至答云我等隨行聞其不待尋覔水泉但皇帝所指有水之地羣往掘取掘未畢輒水泉湧出咸足給用又我師進克魯倫河之日跟隨人於草間遺火焚燎向古爾班圖爾漢之地厄魯特人見之云康熙汗將火與兵齊進誰能抵敵即令其衆帳房輜重悉焚棄之身先逃遁衆厄魯特咸訕笑之曰始因何而來今因何而遁又有自阿喇卜灘處逃來者云阿喇卜灘在巴顔烏闌噶爾丹中夜傳來告以皇上親至阿喇卜灘云汝乃無眷屬牲畜之國我乃有眷屬牲畜之國滿洲兵誰不稔知我斷然不與之戰遂棄之而回未至之前阿喇卜灘之衆半皆離叛尋又聞西路大兵炮聲厄魯特皆倉皇潰遁不知所措至於大亂今汝等追兵於來日日中當可追及其後隊牛羊矣朕於是周詳謀畫期出萬全决不輕易朕所統之兵盡皆整齊驍勇馬悉肥壯觀厄魯特之馬如我軍下等馬者有之我軍未至克魯倫河之先旱甚草未萌茁聞此數日來草皆茂生未知果否我軍逼臨賊境每日歡躍凡大小臣工以至跟隨人役喜恱不可勝言喀爾喀等亦因以奮勇言我等從前視厄魯特人馬精壯今隨皇上大兵來此觀厄魯特之形貌舉動較我等奴僕之下更不及矣皆願效力哨探擒拿活口因闌入網城泣告求往由此觀之人心惟在於鼓舞節制洵不虛也凡在京之人焉能知如此喜悅故於少暇時將始末情事大槩櫽括書遣示之可於皇太后前奏聞并宫中及滿大學士尚書內大臣侍衛等咸令知之伊桑阿想亦有信至特諭丁卯上躬率前鋒兵窮追噶爾丹噶爾丹將器械甲胄帳房及臥病稚幼盡皆拋棄乘夜逃遁路獲一老嫗詢問言厄魯特之衆倉皇潰散彼此交怨沿途自相戰鬬有㫖檄知阿密達厄魯特今已潰散著將營伍馬匹牲口日夜謹慎防備是日駐蹕拖訥山海綏爾哈圖之東酌議班師迎糧上諭內大臣索額圖曰厄魯特噶爾丹逃竄已逺沿途潰散人亦不衆今應選兵裹糧躡跡窮追官軍米糧所關甚重今兵丁所帶八十日口糧日期將滿于成龍所運米尚未到若大兵前進則距所運米太逺回時糧餉必至窘匱應使大兵迎糧而還朕備有牛羊斷然不致缺乏西路大兵亦由中路來料理糧務甚要著議政大臣等議奏命領侍衛內大臣馬思喀為平北大將軍領兵追剿上諭曰朕今日踹賊踪跡及問所獲之人言厄魯特噶爾丹狼狽驚惶內自潰亂亡命奔逃量已至巴顔烏闌矣若我全軍追趕似不能及應選兵輕騎追逐除喀瓦爾達所領前鋒二百外其餘前鋒盡行派出滿洲火器營兵及親隨護軍亦盡派出著追至巴顔烏闌過巴顔烏闌以北不必前往昨所發大炮八門及滿洲漢軍馬匹所載之炮盡行遣發應派出大臣率領前去著將大臣等職名即行開列具奏其參謀大臣無庸多遣人多則反致煩雜諸王等所屬之人若自有二十日糧不用官糧者亦令同往其同回之兵但留其至拖陵所需五日之糧將餘糧收取著各旗大臣親驗給與前進兵丁議政大臣等列大臣等職名啓奏奉㫖著領侍衛內大臣馬思喀為將軍給與平北大將軍印都統巴渾德齊世護軍統領鄂克濟哈為參謀都統都思哈爾石文瑛王永譽噶爾馬李正宗護軍統領蘇丹蘇赫桑格副都統達禮善莫洛渾齊蘭布孫徵灝渣喇克圖雷繼尊孫渣七費揚固禪布喻維邦巴賽等令其隨征閒散宗室哈爾薩副都統張所知亦著隨行臣謹按兵者國之大事平居則足食師行而糧從是以籌畫軍餉為第一急務皇上念大兵出塞征討需餉浩繁輸挽之事關係尤重特簡于成龍總轄運務既全備車騎使飛挽不滯又足給官兵俾防護有資並以行止之節巡警之宜及酌量措置之方周詳指示于成龍等不能遵皇上之訓誡轉運稽遲致逾限期顆粒不到官兵幾至匱食皇上仍前追逋寇務期𠞰滅至數日後度米勢不能至倘再深入兩路之兵㑹集一處需糧益多大軍必致窘乏乃分兵均給所存之米交將軍馬思喀窮追噶爾丹聖躬親統餘兵迎回催趣又遣管駱駝首領官郝善圖驅駝馬趲運米糧西路官兵始得飽騰言旋以此觀之將帥能遵㫖而行者無不成功違節制者無不僨事聖明廟略真臣下所不能及萬一者也諭皇太子曰自前㫖諭汝之後於初十十一十二此三日前進窮追其潰竄狼狽之狀總不堪觀婦人稚子悉自殺戮棄之而去獲一老婦生口問之云其部落自相攻殺重被傷殘晝夜奔逃已前去四日由此觀之其去蓋已逺矣若費揚古兵得及堵𠞰此賊决不能脫若更愆期噶爾丹或得乘閒遁去然此賊膽已喪落斷不能存永永敗絶矣我師欲悉往追逐八十日之糧已盡萬一為軍食所窘我如許全盛而至官員軍士已奏成功為何因此逋誅殘寇致重困我師職此之故與諸臣僉謀公議前抵費揚古之師以追擊之不及則還酌量簡選士馬遣發前往此於伊桑阿所報之外特頒諭㫖咸令聞之朕於十三日凱旋啓行朕躬安好恭請皇太后慈安諸皇子諸王大小諸臣以至軍士皆佳以我全師歡欣愷樂風聲所至凶敵摧殘此皆上天仁愛俯垂協應也幾務至多無暇詳及此進皇太后慈覽宫中並使聞知特諭戊辰上視平北大將軍馬思喀啓行統軍回鑾上諭馬思喀曰爾等以五日程追至土喇然斷不能及也今噶爾丹已極殘破朕所目擊彼决不能復來但當於行止小心防護耳西路兵乏糧已久今朕速回拖陵凡所到米不支給御營軍取道急發土喇以濟西師俟後隊米到量撥數日糧陸續催趲致汝軍中是日駕至克勒和朔駐蹕內外諸王貝勒大臣文武各官至行宫東門跪奏曰厄魯特噶爾丹肆行暴虐剽掠臣服我之喀爾喀車陳汗皇上親統大軍出塞征討一應調遣糧餉營壘斥堠等事俱重煩聖慮籌畫周至噶爾丹震悚天威望風鼠竄廟謨駿烈超越往古今日事成回軍甚屬大喜臣等請行慶賀禮傳上諭曰朕自出師以來惟欲前進並不退却一步或因駐蹕之處稍有未妥欲退回數步安設行宫朕亦不允今大將軍費揚古兵稍遲想亦將至巴顔烏闌又給發兵衆糧米日期將滿六軍以糧餉為命關係最要凡此衆兵俱屬朕多方保全至此其中若有一二人艱於粒食心實不忍故一面以馬思喀為大將軍將衆兵糧攢足二十日給發令其追趕前去扈從兵止留七日口糧一面領兵迎接糧米向拖陵地方回軍西路兵及兩路米糧皆未完備俱不稱朕本意朕猶有憾諸王大臣各官跪奏曰大兵糧餉實係緊要向所期約之地糧餉不至致有耽誤因此預防回軍極是皇上天縱神武聞知噶爾丹所在輒親在前鋒前行深入敵境噶爾丹魂飛膽落盡棄其鎧甲器械帳房輜重老弱偷生夜遁軍威振於遐荒大事成於俄頃臣等於此毫無躊蹰之意欲即行慶賀禮諭曰朕預料噶爾丹必遁已密諭費揚古等令截其歸路今馬思喀兵又進巴顔烏闌兩路夾攻噶爾丹料應難逃大事已成爾等欲稱賀良是但從征諸王以下文武官員以上以至衆軍人等皆欲在朕前效力奮勇交戰而不得一見敵以遂其意於朕心猶有歉然著少俟馬思喀信息爾等勿固請諸王大臣各官又跪奏曰皇上神武天威噶爾丹望風狼狽逃竄皇上又預遣兵截其歸路費揚古馬思喀等雖殄滅噶爾丹亦由皇上廟謨先定並非羣策所能與臣等祈皇上俯慰衆心俞允稱賀上諭曰馬思喀信息不久即到姑暫候之藍翎侍衛殷濟納賫大將軍伯費揚古疏來覆命先是上以手敕遣殷濟納等賫送費揚古至是始以其疏至言臣等率大兵於四月二十六日至杭愛山之喀喇拖羅海口駐扎藍翎侍衛殷濟納等賫皇上手敕至著留陜西兵於塞稜格路以遏噶爾丹之逃竄仍令自領大兵隨後進發欽此臣等率領大兵隨後進發外其將軍孫思克所領陜西兵因來時途遇風雨馬匹遲悮前已奏聞令選滿洲兵二千緑旗兵二千趲隨大兵而行若留此四千兵於塞稜格以遏噶爾丹之逃竄則兵勢單弱臣等仍依前所奏一路進發今已聞噶爾丹順克魯倫河而下至達爾漢奧喇地方與皇上所統大兵相近官軍無不抵掌歡躍俱欲速躡賊後仰仗聖主天威從其後擊滅之但臣等材既庸劣而大兵行七十餘日牲口疲乏不能亟到伏乞睿鑒存西路官軍畢生顔面皇上稍緩師行費揚古又密奏言前運糧正卿喻成龍等至臣處言水草既闕牲口又直從太原來今已疲瘦臣等令將十五日糧留貯喀倫其三十五日糧以小車駱駝運送查得右衛兵所賫八十日糧于五月初四日期滿京城兵所賫八十日糧于五月十一日期滿前曾檄運糧大臣將所運口糧乘此八十日口糧未完之前速行運到而彼處回稱小車四百餘輛裝載米石於四月初九日已自喀倫起程竭力趲行於地土堅硬處一日止可行三十餘里沙磧岡阜處一日止可行二十里若遇大風衝擊不能逆風而行隨其所至天晚即宿所賫八十日糧未完之前不能運至大軍之處臣等已將駱駝七十餘匹於四月二十五日自揆宿地方遣回迎取米石令分留十五日口糧於喀倫將三十五日糧作速運至土喇雖經移文尚不能趕及大軍乃因路途遼濶馬力不及之故則土喇以北運送糧餉益難趕及大軍矣今噶爾丹既在達爾漢奧喇地方則臣等所率大兵不及待西路所運之糧但俟駱駝所載米既至之日量八十日糧一完即酌量撥給率此大兵前赴皇上行在俟至皇上行在後乞諭運糧大臣將中路大軍之糧分給臣等所率之兵命侍郎阿爾拜賫糧隨大將軍馬思喀軍上諭行兵部曰著侍郎阿爾拜留於此處俟劉暟等所運米糧一千十九石麵八千斤到日隨平北大將軍馬思喀兵前往命公常泰為將軍統領還軍上諭議政大臣等曰朕明日起程前途水少不能容八旗應與大將軍馬思喀作為後徑之勢著滿洲兵各以四旗一日起行其次著前鋒及八旗漢軍緑旗兵一日起行此兵共留一大臣為將軍議政大臣開列內大臣都統副都統等名銜入奏得㫖此畨諸大臣內公常泰行事甚善著充將軍命原任侍郎四格子赴大將軍馬思喀軍中大學士伊桑阿奏曰四格子前因革職告請效力今發兵前進應否遣四格子隨征請㫖定奪上曰著將四格子交馬思喀有差往噶爾丹之事令其差遣無則軍前效力上諭皇太子曰朕因中路兵糧每日焦勞在念多方措施皆得無悮而西路之糧甚為可慮非全力催運不能有濟是以朕躬親率師衆迎糧而還樽節已到之糧豫濟西師之用者正此意耳是日辰時五色雲由東南而起逺望如樓臺亭閣之狀輪囷離奇非煙非霧散成五彩總之皇上愛兵恤民凡事上合天心故天示此瑞兆古所謂慶雲蓋即此也己巳上自克勒河朔啓行侍衛額林辰等賫大將軍伯費揚古疏至言五月初一日侍衛額林辰奉到皇上手敕臣等欽遵上諭當即率大兵星夜前進但大兵行程遙逺牲口少疲而噶爾丹自布爾察地方以前十餘站盡焚有草之地是以遣人在前覔草地趲行臣等率大兵仍亟於初三日至土喇以搗噶爾丹之後但祈御駕稍緩留臣等畢生顔面至藍翎侍衛殷濟納等四月二十八日回時臣等曾以陜西兵不便分拆仍作一路進及西路口糧不能追及大軍之事開具兩疏付殷濟納等往奏不知殷濟納額林辰到御前者孰先故將前兩疏重繕一併奏聞又一疏言臣等率大兵而行曾委衆扎薩克在大軍兩旁稍前屣探五月初一日正行至半途喀爾喀蘇泰宜爾登公遣其子陳盆台吉來報有厄魯特男婦十餘人過南往西去矣即以前鋒一隊授署前鋒統領碩代追至十里許獲婦人五口童稚八口馬十二匹駱駝二頭有犢乳牛三頭羊及山羊十五隻其男子三人走趨山中追五十餘里盡擒之問所擒厄魯特朱爾布等據稱我等皆阿喇卜灘之弟丹巴闌之人隨噶爾丹下克魯倫到肯特山我主待我不如前是以逃回欲捕捉禽獸為生聞前者曾求援兵於俄羅斯國前月俄羅斯使者二十餘人來約至青草出後助鳥鎗手一千及車裝大炮發至克魯倫東方界上所差使者尚未歸噶爾丹聞聖上大軍來故由克魯倫而下以赴俄羅斯援兵之約我等小人聞之傳言如此謹奏上在途次於馬上閲之喜向衆大臣曰費揚古之兵於初三日已至土喇彼曾云懇祈聖恩稍加寬緩若不因等待伊等而行今且早已竣事回師矣朕統大兵追逐五日若再前追噶爾丹當為朕所獲因不得費揚古兵消息兼之于成龍所運之米又不至故凑米與馬思喀之兵遣往追逐朕即統軍回而迎糧今費揚古於初三日至土喇則於朕本計相合噶爾丹諒必不能竄去矣內大臣國舅佟國維大學士伊桑阿奏曰皇上所籌無有不合所料無有不中上適言費揚古聲息今日必到佇待再三而費揚古之信果至先見之明何其神也費揚古之兵誠為大幸皇上親追賊寇賊勢已極窮困費揚古等至彼竟可立奏成功矣上曰費揚古又曾請糧於朕朕念我兵之餉所繫至要而西路之兵又必至糧餉困乏因預給駱駝首領郝尚圖以駱駝騾匹令將頭運噶禮所運之米盡行運至已給此處兵丁又著將次到劉暟宋大業所運之米不可支動令迎接西路之兵即行給與今軍餉無復憂矣但先曾與于成龍言定八十日之內不用彼米若滿八十日時始用彼所運之米將彼米運至土喇以備向北進征之用今于成龍所運之米不但不能到土喇即克魯倫地方尚未到顆粒豈有遲悮如此者乎佟國維伊桑阿等奏曰若聖上未及周詳籌畫不但費揚古兵即此處大兵亦必甚至缺乏于成龍之米果屬遲誤駕至塔爾渾柴達木駐蹕上以大將軍伯費揚古前後奏章傳示諸大臣諭議政大臣曰彼不將西路情形早奏而朕遣侍衛由捷路往詢乃留之如許日始令來覆言西路絶糧請撥中路之米違期三次此等事朕已洞悉俱預籌之矣今此疏到汝等皆見以為何如衆咸奏曰皇上預籌已定雖兩路之糧稍有遲誤兵丁僕從無一人窘之反移中路之米撥給西路調度多方臣等不勝欣忭上諭曰御營內官軍除有糧五日以外者不查外其有一二三四日糧者幾人及竟無糧者幾人著察明具奏又諭曰大將軍費揚古疏著抄送大將軍馬思喀并諭云費揚古之兵今已至巴顔烏闌爾其儘力速往協𠞰窮寇朕親往拖陵料理爾等兩路軍餉事務今又交侍郎阿爾拜米一千餘石麵八千斤令運赴爾等軍矣命內大臣明珠駐克勒河朔趲運米糧上諭議政大臣等曰諸務俱畢但西路大軍來㑹需米甚急應多撥上駟院馬併發所餘騾匹朕營內大臣並後營諸王以下官員等有情願捐助者令捐助馬匹牲口俱交運糧官作速運到著㑹議具奏隨議上諭誠足應將上駟院馬匹及所餘騾子發出再曉諭御營官員及後營王以下官員等有情願捐助馬匹牲口者將數目送到之日交運糧官速行運送併移文左都御史于成龍其所管情願效力官員內量所有馬匹牲口取交運糧官員作速運到上曰今牲口疲乏之時雖使捐助其能幾何可以內廄駱駝三十頭馬一百匹發給移文于成龍路途遙逺可留內大臣明珠往克勒和朔地方駐扎糧米隨所到即著駝馬幫運未至糧米令頻行催促其劉暟給以才能鄉導一名從朕來路而去明珠既在克勒和朔地方駐扎著不時偵探賊寇消息上諭皇太子曰伯費揚古兵已過土喇將噶爾丹去路盡皆堵截特示知之十四日朕所遣布庫殷濟納新滿洲護軍奇雅楚鄉導波羅等至奏云伯費揚古之兵於初三日已過土喇將噶爾丹所必由之路嚴密堵截以待之精鋭驍勇之兵一萬四千人已到其地後隊又相繼而至馬之肥壯雖不及朕所統兵然亦甚健朕聞之拱手向天再拜朕之微介於懷者惟此耳今可永逺廓清矣但接續聽報噶爾丹消息賊之情形已全在目中朕今惟舒懷喜悅經理糧餉接濟朕躬何以致斯福祐克稱所懷此皆祖宗默祐天地眷顧之所致也朕在此不勝歡欣踴躍此二三日間即有成功捷報以此於皇太后前奏聞宫中以及滿洲大臣侍衛等咸令知之特諭朕班師移營已二日在拖陵布喇克駐蹕數日亦未可定此書寫於駐蹕他爾渾柴達木之地斯處水泉稀少朕躬自鑿井帷幄既設寫此書甫畢大雨傾注水遂足用朕復向天拜手以謝庚午命後軍分站緩行駕至顧圖爾布喇克諭曰由塔爾渾柴達木至顧圖爾布喇克地方甚逺朕今日自塔爾渾柴達木來駐於顧圖爾布喇克地方甚覺失宜遣鄉導波羅往後軍令其自塔爾渾柴達木來宿於布黨圖地方自布黨圖來宿於顧圖爾布喇克地方將此遞行傳諭後隊之兵命晨炊早行上諭內大臣等曰馬已疲瘦僕從人俱係步行若行李早行則得早至著乘早起行若禁舉火恐行李到遲不及炊飯著免禁舉火今日隂晦德勒素草甚多令割取預備帶往其通行曉諭內大臣明珠奏曰前因劉暟米車遲緩故以駱駝馬騾運至今應將在後陸續運來米糧交與于成龍將所管效力人等牲口並伊等預備牲口䭾米運至上是之大將軍馬思喀奏報西路捷音是夜馬思喀報至奏臣等十三日啓行行六十里許至渣喇地方駐營隨遣人行文前鋒統領碩鼐令躡噶爾丹遁去踪跡視所逃方向如後尾相近即酌量而行若有不可行之處作速遣報我即率兵隨至彼時又著新滿洲侍衛及䝉古王納木渣爾等於兩傍山躡緝並無别往踪跡止循克魯倫河逃去觀所住之處釡猶在㸑拋棄帳房銅鈸及獵犬而遁為此奏聞馬思喀又奏臣等於本月十四日至巴顔烏闌以南十五里地方遇前鋒往哨之喀瓦爾達帶得投降厄魯特人奔苐前來問其情由云噶爾丹於特勒爾濟地方遇大將軍費揚古兵交戰噶爾丹敗遁退回復列陳拒敵我軍步戰而前兩軍對壘之際見噶爾丹兵散亂有奔竄形狀即逃出投歸聖主前來臣等㑹議著前鋒即行起程臣等率兵次於額格木爾地方次日作速倍道前進又派選喀爾喀納木渣爾王盆楚克貝子十人令騎官馬賫文前赴大將軍伯費揚古處將戰後情形開明作速移文前來謹將投降奔苐一併解送得㫖此事著作速檄知京城上諭皇太子曰伯費揚古兵已將噶爾丹戰敗特示知之十五日夜四更時將軍馬思喀奏章至稱臣等于十四日距巴顔烏闌十五里追及前鋒兵探哨之喀瓦爾達將厄魯特人奔苐來問之彼云噶爾丹於特勒爾濟地方遇大將軍費揚古兵交戰噶爾丹敗北而退復列陳拒敵我師步戰衝突而入兩兵正交戰時見噶爾丹兵有潰散奔敗之狀我遂逃出投奔皇上等語并將奔苐遣來問之奔苐彼云噶爾丹不信皇上親統兵至乃復驚駭恐懼日禱於佛前雖欲慰輯其衆而不能人心遂大搖動自見聖主兵威衆厄魯特私相謂曰康熙汗其速來攻取我等似此生活有何底止交戰處噶爾丹兵不及五千馬既極疲瘦又聞聖主追逐已近諸凡器物盡皆委棄今雖遁去何以存活等語於是即以所聞于五更時寫書馳示可於皇太后前奏聞宫中及諸大臣咸令知之此後相繼報至即時遣發特諭辛未上諭大臣侍衛及僕從人等朕望爾等駱駝馬匹善為牧養勿致失棄一匹此畨特為駝馬朕親行掘井勞費心神之處皆爾等所知著遍行曉諭衆執事兵丁僕從人等知之曉諭大將軍伯費揚古以接濟西路軍糧事上諭大將軍曰爾于十三日擊敗厄魯特噶爾丹之事據厄魯特降人奔苐來告朕甚慰悅自五月初八日朕先士卒疾追五日噶爾丹窘迫拋棄器械刀鎗鳥鎗甲胄鍋釡帳房等物及羸病幼小乘夜遁竄朕親率大兵追至拖諾山再欲往追因爾各路兵㑹合不逺兩軍既㑹需米甚多糧必不繼恐至缺乏糧餉關係重大量此窮寇以爾兵自西而來此處又發兵夾攻即可𠞰滅於是朕統大兵回迎糧米以內大臣馬思喀為大將軍授之大兵凑給二十日糧隨以帶來牛羊遣繼爾後又趲運爾路兵糧留內大臣明珠於克勒河朔地方料理朕又給發馬匹駱駝充運糧之用其王以下大臣官員幫助馬匹駱駝交與明珠將現到米糧陸續運至汝軍朕帶回官兵於拖陵地方酌量稍給米糧俟到喀倫給足前行運到喀倫米糧甚多爾將軍遇將軍馬思喀將爾經行西路所有留下人畜應作何派兵帶回使無他虞與馬思喀公同議定一面施行一面奏聞爾親率餘兵由朕所行之路而來則米糧必不致缺乏也命黑龍江將軍薩布素留兵二千於索嶽爾濟山餘皆遣還上諭議政大臣等駐扎索嶽爾濟山地方盛京烏喇黑龍江兵共六千名內留黑龍江兵一千名盛京兵一千名著將軍薩布素副都統穆泰帶領駐扎索嶽爾濟山直至七月其餘兵丁令各回本處此回去兵丁酌量其可至彼處之糧給發其餘米糧盡撥給索嶽爾濟山駐扎兵丁前曾有㫖留皇長子𦙍禔料理糧務至是傳諭行兵部曰皇長子處所留大臣俱皆粗魯相應留部院衙門大臣協理各營糧務隨將侍郎安布祿等職名具奏奉㫖留常泰常綬松柱於皇長子處著協理糧務大將軍馬思喀等復報西路捷音疏言臣等兵正欲於本月十五日平明起程據噶爾丹部下丹巴哈什哈遣阿喇善來降稱噶爾丹之兵於十三日申時於特勒爾濟地方遇西路大兵交戰大潰逃竄察罕西達里哈什哈同丹巴哈什哈帶百餘人來降先遣我來明告統兵將軍及商南多爾濟臣等㑹議若不使人往迎則或致疑懼亦未可知一面遣商南多爾濟附於前鋒一百名出前鋒哨口往迎一面臣等即行起程行至三十餘里商南多爾濟帶丹巴哈什哈等前來詬據丹巴哈什哈等稱噶爾丹聞皇上親率大兵至此震懾天威正在逃竄皇上復躡跡窮追至拖訥地方選兵急擊噶爾丹聞信窘迫奔逃遇西路軍迎戰大敗僅帶四五十人逃去我因前為使臣來見聖主時得䝉恩恤故我同察罕西達里哈什哈各帶子女人口馬駝等物來歸聖主為此奏聞諭皇太子曰朕十六日駐蹕古土爾布拉克地方經理回京士馬午後將軍馬思喀奏報伯費揚古兵大破噶爾丹所倚任之丹巴哈什哈等率衆投降我師等因將此奏報抄謄發去今大事已完朕惟待大將軍費揚古奏章至拜天以謝為此特頒諭㫖可奏聞皇太后傳知宫中及衆朝臣知之壬申駕至西拖陵大將軍馬思喀復報西路捷音言十六日寅時奉到上諭臣於十五日因投誠厄魯特陸續來降以致行路無多止行八十里次於工噶勞圖之口據鄉導云父戰之特勒爾濟地方去此約二百里臣等過此一夜明日可㑹大將軍費揚古兵矣為此奏聞又移文行在兵部言本將軍十六日平明啓行至十餘里前所遣喀爾喀十人回賫大將軍伯費揚古文來內言已遣阿南達往奏但阿南達皆乘自備馬匹不能速到亦未可知將原文飛遞願皇上早聞捷音又言大將軍伯費揚古兵已回至塔闌布喇克地方我等行李亦止於文到之處等候奏至得㫖著示議政大臣俟阿南達到時即得明悉侍讀學士喇錫以降人丹巴哈什哈等來上命丹巴哈什哈等近前問之奏曰噶爾丹向來有才亦得人心自悔其深入烏闌布通之戰乃近居克魯倫土喇等處思以言語煽惑喀爾喀及內地䝉古使首尾不相自顧彼時可圖大事滿洲聞之必然出兵師少則與之戰師衆則委地而退滿兵既旋復躡襲其後如此不數年自然財賦耗竭必致疲敝是以蓄謀而來其心志本侈今不意皇上統如許大兵渡人所難行之瀚海俄頃而至厄魯特之衆望見軍容莫不喪膽於初七日早潰遁自此拋棄諸物連夜遁去噶爾丹原欲拒戰於拖諾山而不能止衆暫立又欲於額黑穆布爾哈蘇臺在柳林中臥駱駝接戰聞西路兵聲息噶爾丹乃傳令曰中路兵甚猛烈不當與戰可擊西路兵俘掠之遂向土喇行因後追者甚迫心驚而去十三日於特勒爾濟地方突遇西路大兵其時我兵有五千餘鳥鎗不及二千克魯倫河巴顔烏闌以上大旱寸草不生五晝五夜疾行於無草之地困窮已甚沿途委頓隨去者少見西路兵先據髙阜已得地利我厄魯特就一小坡徒步拒敵大兵亦發鎗炮甚整甚暇不知在前者為何物擁木而進又以圓且紅之物蔽身直前既到十步內矢下如雨噶爾丹先遁繼之丹濟喇丹津俄木布亦遁阿拉布灘之衆仍與相拒於是滿洲騎兵圍而攻之併我輜重妻子不遺駝馬無算牛二萬餘羊四萬餘盡取而有之我所目擊阿奴喀通中鳥鎗而死戴巴圖爾寨桑中炮連貫四人而死博羅和卓中箭而死後復短兵前接更有一隊非鎗非刀衝突直入所向之處人皆披靡死者無算思我主背誓得罪於聖主天實厭之至於此極我輩素行殺戮拆人妻孥故今禍及身耳我知勢之無成又念前者充使三次來京俱荷聖上深恩殆必活之再四思維自惜生命故棄主來降生之殺之一惟聖斷又問之以噶爾丹情形告曰交戰之際先衆而奔後大兵合圍我等出於未圍之先故其後情形不得而知又問滿兵如何奏言我等於烏闌布通之役已知之矣兹克魯倫土喇之來我厄魯特舉國之人皆預知滅亡僅噶爾丹不悟常自言有成耳此皆天數彼固不知其然而然矣我等四征諸國所向無敵如滿洲之兵天下所無我厄魯特自當滅矣問噶爾丹能遁出乎抑被擒乎奏言聞噶爾丹率數十人而走擾亂之際我未之親見縱使得脫無以資生亦餓而死耳尋大將軍馬思喀解丹巴哈什哈察罕哈什哈及青海博碩克圖濟農之羅壘厄木齊等二百餘戶口至內大臣公常泰等奏行慶賀禮常泰等奏聞侍讀學士喇錫解到厄魯特降人之言五月十三日賊人噶爾丹與撫逺大將軍費揚古戰噶爾丹大敗盡棄其妻子輜重僅以身免其餘紛紜竄散臣等伏思皇上欲思邊塞部落人民免於災患預定廟謨精練官兵設立火器全備糧餉諸務皇帝不憚勞苦親統中路大軍前行至克魯倫等處噶爾丹一聞天威盡棄其婦女幼稚而逃皇上出師之前早已洞知噶爾丹遇大兵必自克魯倫土喇遁走使西路大將軍費揚古整飭車馬火器兩路大兵約期而進聖上廟謨若合符節噶爾丹果自克魯倫走至土喇與大將軍軍遇大敗棄妻子破散敗走此皆皇上深謀遠慮之所致也恭遇凱音臣等不勝歡忭之至謹望行宫行慶賀禮聖祖仁皇帝親征平定朔漠方略卷二十四

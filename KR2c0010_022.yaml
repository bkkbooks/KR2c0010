body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷二十二四月丙戌朔命慎馳驛馬上諭大學士伊桑阿曰自今以後應馳驛事務須視馬力如何切勿盡力馳騁凡馳驛時遇驛站官員則馬匹必致勞苦遇蒙古則差善耳著將此曉諭驛站人等理藩院員外霍尚奏報鑿井事竣先是上命霍尚於哈必爾罕等處巡視鑿井至是霍尚奏報已於哈必爾罕鑿井七十一口池四十五口和爾和鑿井七十一口其泉已開浚格德爾庫鑿井五十六口泉已開浚塔爾竒喇鑿井四十五口僧色之泉已開浚科圗鑿井四十二口開浚兩泉博木巴圖花托羅海鑿井三十一口博木巴圗哈卜赤兒口鑿井二十口自博木巴圖哈卜赤兒口以外兩地之間鑿井十五口諭大兵馬匹牧放於左翼之地上諭內大臣曰我軍出京原議御營所牧之馬放於左翼因其時有雪是以傳令使隨水草牧放今既無雪見放馬右翼者甚多著嚴行曉諭仍照前放於左翼如有違令放於右翼者拿獲必加重處斷不姑恕著通行曉諭命侍衛馬武探視漢軍火器營兵上諭內大臣等曰出古北口之四旗漢軍火器營兵尚未到不可不待朕於明日宿處須駐蹕一日待之但今日所宿之地衆兵可以駐扎守候明日宿處衆兵不便駐候著㑹議具奏隨奏今日胡魯蘇台地方寬廣水草俱佳在後六旗之兵至此地時應令駐扎候御營啓行後六旗兵各以三旗並行明日皇上至蘇勒圗地方駐蹕一日其他處駐宿應待在後漢軍之處俱候㫖遵行俟漢軍已及鑲藍旗後隊再行奏聞得㫖著馬武往看回時再奏戊子上駐蹕蘇勒圖馬武還奏古北口一路火器營兵已接鑲藍旗後隊奉㫖著仍照常行走命以宣化府取到大炮交火器營大臣馬武傳諭曰自宣化府取來炮二十四位需用最要從古北口來漢軍四旗火器營大臣等著交付照看一同帶來遣人趣黑龍江將軍薩卜素軍上諭薩卜素曰朕今統大軍已到喀倫大約四月二十五日後當到巴顔烏闌問喀爾喀之識地里者言自庫倫行十八日許可到巴顔烏闌故以羅卜臧額爾德尼台吉諳知地里特遣赴汝軍爾可督率人馬勿使勞苦若於二十五日以內到巴顔烏䦨猶可追及同行如二十五日以內不能到則勿得急行以勞人馬當遣人至克魯倫上流來奏己丑上以賊冦形勢曉諭諸臣是日上駐蹕哈必爾漢員外郎石保住報至言蘇尼特多羅郡王額駙薩瑪渣旗下鄉導渣卜等六人步行至云我等曽隨侍衛克石圗主事保住前去侍衛克石圗於去年十二月十八日至噶爾丹所住土喇之南阿爾哈蘇台地方主事保住於正月十五日至昂阿喇海地方彼使我兩次使人同居一處至三月十七日噶爾丹遣其下尼爾巴噶卜楚喇嘛來授之奏章而不給還乘去馬駝竟令步行而回衆皆徒步至歐席希地方今先遣我等前來又侍衛克石圗亦以此事報上問議政大臣曰料噶爾丹待我兵否議政大臣奏曰前噶爾丹遣回阿爾必特祜等時一面作往工噶勞圖地方遊牧之狀却仍駐扎如故今觀其駐於土喇而遣回克石圗等或反不待我兵而竟遁走未可定也上問曰噶爾丹若不等候而即遁去當春月馬瘦能遂脫身走耶倘遁走時可被將軍費揚古兵追及否議政大臣等奏曰觀噶爾丹遣克石圖等步行而回是正欲其遲到雖出兵不能追及之意兹春月馬瘦豈能全軍皆去度必零星牽綴沿途散失費揚古曽云是月初三日至翁金二十四日至土喇臣等不知道路若噶爾丹沿土喇奔竄則必遇將軍費揚古之兵矣上曰朕熟計噶爾丹情形久矣噶爾丹之心必以為今當春令正馬匹羸瘦之際此路既無水草沙磧瀚海又甚難行大兵勢不能到至於朕躬親來彼萬難料及故搶奪我使者之馬駝令步行而回不過欲堅彼部下蒙古之心示之以不懼耳非欲使我兵遲延彼得遠遁也朕先傳諭大將軍費揚古與約師期今費揚古已預將至土喇日期奏報若依期而至兩路夾攻則噶爾丹在我掌握安能復脫若我兵先到噶爾丹不能當我軍鋒必連夜逃遁費揚古兵縱少遲緩必至土喇地方噶爾丹以疲敝乍到之兵費揚古迎擊可盡行殱滅觀彼在我使者前舉動噶爾丹早入我計中矣命議留駝馬於喀倫上諭議政大臣等曰到喀倫時應將衆人馬匹如何酌留即行議奏議政大臣等㑹議進𠞰噶爾丹應揀選馬匹臕壯者前往俱凛遵諭㫖至喀倫時應察留疲瘦駝馬自王以下大臣官員及有力者若併人存留即將所留駝馬各令所留之人看守牧放護軍驍騎執事人等不留厮役止留馬匹者現今蒙古王等奉㫖留住喀倫以此所留馬匹總付蒙古王等撥蒙古兵看守牧放每翼分派部院官二員㑹同蒙古王等總管看守務於水草佳處牧放勿致遺棄偷盜其防備盜賊應特交付蒙古王等奏入上從之命謹守井泉議敘鑿井官役鄉導護軍統領蘇丹等奏曰員外郎霍尚以掘井事畢而回若皇上回鑾仍經此路則沿途所鑿之井仍交與霍尚令所屬旗下蒙古修理看守上曰可令守之此番所鑿之井佳甚得水甚多其指示地方修理道路俱無可議深為可嘉奉差內外鄉導章京及官兵著察明俟回京時令本管大臣交與該部議敘具奏其沿途之井交付掘井章京令一體用心修理看守仍選擇何井水佳以備汲用毋僅以上用之井另行修治庚寅命速設旁驛駕至和爾和諭理藩院曰著檄尚書班第即遣賢能官員作速安設旁驛辛卯上諭皇太子曰朕沿途至喀倫觀覽草漸茂盛從四月初一日以後馬可飽飼羊亦近肥水泉給足故三旗並行雖八旗駐於一處亦得無誤㸑薪足用較之前所聞者大異矣三月內雨雪微多稍未適意緣此懷抱不暢今意已寬舒因待出古北口之火器營漢軍兵遂爾多駐時日到彼地日期未可預定前遣往噶爾丹二次使臣俱於初七日到噶爾丹今在土喇於三月十六日令伊等步回奏章大槩與前相同皆好語也彼牲畜甚瘦人所食亦罕少我師頭隊哨兵已詳悉指示遣行矣土喇地方大約距喀倫有十八宿之程京師二十日所送馬三千匹皆肥健全至惟兵部之馬不及耳塞外所産草木諸物寄往觀看并奏皇太后請視之諭督運于成龍運糧之法是日上駐蹕格德爾庫于成龍自密雲縣赴行在奏曰臣等多齎米八千石請酌留喀倫以內驛中至正項米一萬九千石則支給凱還官兵之米亦在內不知此米當貯何地上曰餘米每驛留貯正項米候朕㫖行爾等車與牲畜如何奏曰臣來時連日有雨車行泥淖中牲畜俱勞苦倒斃者有之病廢者亦有之上曰朕所攜牲畜俱無恙此皆爾等該管官員不敬慎故耳嗣後牲畜倒斃者不准支補問爾等米車已到何處奏曰頭隊米車已到巴顔烏闌初七八間可至和爾博驛上曰隨駕先行之車鮑復盛並不照管砂磧之地朕親身與諸皇子諸大臣幫車使過聞後來車上牲畜多有倒斃隨駕兵丁之牲畜俱無恙彼之牲畜何以至於倒斃乎此皆不盡心飼養之故不許增支牲口竟責成於彼可也其宣化府取到大炮可交都統諾木圗等聞炮車殊大而重著取官員存留驛中車裝載其營與前四旗炮營相距一站令勿亟驟但照常行追隨續進朕當留待一日于成龍又奏曰聞官兵攜來米掣二十日留於驛站臣等米俱計官兵食米完日用車起運今掣米留貯其短少之日臣等米車必不能追赴上曰此掣留二十日米可將爾等所解米擇駱駝三百頭每頭負倉斛一石六斗每車載四百五十斤共裝一百五十車先行解來令喀喇沁兵一人牽駝兩頭其口糧十人共給一羊勿給以米喀喇沁兵不甚諳牽駝之法著帶內府管駝首領郝尚圗往押之而來此項駱駝馬騾到後不復還汝朕將用之爾米車不能恰到勿以為懼爾竭力勤勞之處朕皆知之即或稍遲亦不罪爾凡有當行事宜必以敕諭汝至每驛所留三石之米如有當給蒙古口糧不得動支正項之米將爾等浮帶留驛米內支給于成龍又奏曰臣自京來時又有追助牲畜之人今車上所用牲畜不敷請收之上曰可于成龍又奏曰捐助銀十八萬兩零又三省巡撫銀三萬兩除分給夸蘭大外所剩銀俱齎至備用上曰齎來銀甚善朕有所用不得支動其三省銀兩爾可酌用于成龍又奏曰臣料理米車事竣請追趨駕前上曰二十四日能來則來不能則止命安插喀爾喀降人默爾根阿海滚濟扎卜於喀倫內侍郎安布祿等奏至言臣等四月初五日至科圗地方是夜有喀爾喀人塔爾拜至云我係喀爾喀多羅郡王董羅卜多爾即之族叔台吉滚濟扎卜默爾根阿海之人我台吉同扎薩克台吉車陵渣卜於搭爾吉而即等處遊牧聞噶爾丹搶掠納木渣爾拖音之信我台吉同扎薩克台吉車陵渣卜及扎薩克台吉阿里雅等往東遊牧在俄濃之竒姑爾蘇地方居住我台吉共領四十餘戶將及二百口今來歸聖上於四月初一日已至公車木楚克納木渣爾旗分地方是以將塔爾拜一併遣送為此奏聞上曰著理藩院差官一員令台吉默爾根阿海滾濟扎卜等衆進喀倫安插有好水草地方小心防護彼係逃來喀爾喀不可深信俟還師時再議措置塔爾拜亦遲遲遣去壬辰駕次塔爾竒喇諭內大臣曰此地水草甚佳明日仍駐蹕著通行曉諭命留馬匹於喀倫先是上命正黃旗內府護軍夸蘭大費揚固分别兵丁馬匹至是費揚固等奏護軍內有馬三四五匹者計八十一名有兩匹者七名有一匹者亦七名應取此七匹補給有兩馬之護軍共計隨行護軍八十八名取過馬匹護軍七名因馬瘦留下護軍二名現存馬共三百零四匹騾十五頭駱駝十二隻牛四十一頭留下之馬四十五匹上諭內大臣曰此所分别甚善以無馬之護軍留下則所留之疲馬有益將伊肥馬一匹給與前去之護軍則前去之護軍亦有益矣著議政大臣等議奏隨議諭㫖誠是應照所題傳諭後隊大兵各將所留人馬數目察明奏聞存留喀倫可也上從之先是遣往掘井官員等至塔爾竒喇地方遍視無水適有堅氷凝結之處極力浚鑿忽清泉從石下湓湧導之遂成巨流自是師行往返人馬資用不竭惟我皇上統兵𠞰寇每事皆合天心故地靈效應泉流湧溢衆軍咸獲攸濟非所謂助順佑信吉無不利者歟癸巳飭牧場謹慎火燭上諭內大臣曰牧馬之處務小心火燭倘不謹慎延燒牧草後隊之兵如何行走若獲失火之人將伊主一併嚴加議處著通行曉示命軍士留出牧地上諭行兵部曰前鋒兵鑲黃旗兵正黃旗兵察哈爾兵緑旗兵此五營現在一處同行伊等放牧馬匹俱遵法度今草甚茂著將御營相近迤西牧草留以待用行則在前一程駐扎勿相去大逺命大學士伊桑阿祭告風雨域外山河川澤之神其文曰朕撫御寰區殫心懷保遐邇中外罔不率俾乃厄魯特噶爾丹悖天方命俶擾朔漠朕特親統六軍指授撲𠞰以期蕩滌冦氛輯寧荒服兹已師次邉界惟域外百靈效順時序休和默襄撻伐之威益勵遄征之氣膚功迅奏神爽攸昭用遣專官䖍申告祭惟神鑒焉甲午駕至僧色地方優賜出使蒙古上諭理藩院曰兩次奏差䝉古同內地人員往來勞苦甚為可憫著查阿爾必特祜同差蒙古賞例更議增賞議曰察前與阿爾必特祜等同差蒙古賞以衣服布帛今隨侍衛克石圗主事保住等前往者佐領二員驍騎校二員委署驍騎校一員鄉導四人兵七十一名因在途次不便賞給衣服布帛其佐領驍騎校鄉導等人各賞銀三十兩兵丁各賞銀十五兩至僕從二人同兵丁步行前來應各賞銀五兩現在此地者由戶部取銀賞給未到者移文該部俟伊等赴京城之便由部內賞給上命佐領驍騎校鄉導各賞銀五十兩兵丁各賞銀三十兩僕從各賞銀十五兩餘依議命議散給馬匹上諭議政大臣等曰自京城取來馬三千匹現在兵丁每旗給一百五十匹乘用則趕馬之人亦覺有餘著議奏隨議今將此馬即給兵丁俾伊等得留疲乏馬匹不但兵丁有益馬亦不致遺棄凡此馬匹俱係朝廷官馬八旗兵每旗應給與一百五十匹火器營兵二千名應總給與五百匹奏入上曰馬匹以明日到著到時議奏命黑龍江將軍薩卜素率兵暫駐喀爾喀河地方行兵部奏曰據將軍薩卜素咨言奉㫖整飭軍旅於四月初六日起程向克魯倫前進應於何處㑹師乞作速行文我兵自四月初六日始計各攜三月口糧兵行以糧為要三月以外接續米糧煩部中撥支勿致斷絶上曰將軍薩卜素之兵來亦無及兵馬徒然勞頓著薩卜素於喀爾喀河相近好水草處喂養馬匹可將諭㫖移文薩卜素知之命設環營嚴禁喧譁火燭上諭內大臣曰先是諸軍未至喀倫禁止喧譁及營中火燭未甚嚴切今已至喀倫著將此嚴加禁止自明日始著列環營先是㑹議至多雲地方即結環營上命俟至察罕諾爾既至復令少緩兹已抵邉界遂有是諭命催糧運絡繹奏報上諭行兵部曰著移文于成龍將第一運之米已至何處從驛站作速報聞第二運之米至何處亦著陸續申報乙未內大臣索額圗大學士伊桑阿等奏請皇上回師上大怒切責之時駕次科圗前所遣俄齊爾使於噶爾丹還言噶爾丹有兵二萬又借俄羅斯火器兵六萬內大臣索額圗大學士伊桑阿等大驚入奏曰噶爾丹之去已逺聖上當徐還使西路兵前進上召內大臣佟國維等入行幄諭曰朕以噶爾丹侵擾喀爾喀及外藩蒙古此番秣馬厲兵整軍運餉分路進𠞰曲盡籌畫告祭天地宗廟社稷務期𠞰滅噶爾丹而後出兵自兵丁以至厮役無不思滅噶爾丹者而大臣內有怯懦不實心勇往向前之人或前經行間獲罪而不思效力自贖或因出身微賤而畏懼大臣依違行事朕惟一意前進以𠞰滅噶爾丹為念况爾大臣俱係情願效力告請從軍之人乃不奮勇前往逡巡退後朕必誅之不知索額圗伊桑阿等視朕為何如人我太祖髙皇帝太宗文皇帝親行仗劒以建丕基朕不法祖行事可乎指顧間噶爾丹可擒可滅既至此地而效婦人選蠕退縮乎且大將軍費揚古兵與朕軍約期夾擊今朕軍失約即還則西路之兵不可問矣將何如還至京城何以昭告天地宗社乎時怒甚泣下佟國維等免冠叩首奏曰皇上諭㫖極是臣等真怯懦妄奏死無地矣頃之車克楚至言噶爾丹未嘗遁去仍在克魯倫衆始曉悟命散給馬匹揀留疲馬上諭議政大臣等曰自京城每佐領下出兵七名每人給馬四匹四人共騾一頭今每旗留八十名則八旗共留六百四十名矣合緑旗兵察哈爾兵自京城趕馬來護軍二百名通共計算比原數仍多計所留八十名兵丁之馬騾共三百四十有餘於此馬匹內揀臕壯者可得馬一百五十匹再添自京城帶來馬一百五十匹則每旗三百匹矣若給火器營兵每旗一百匹二總兵官下緑旗兵各五十匹馬自有餘這所留兵八十名著留十五日口糧其餘米糧給與前去兵丁其補還此項米糧俟于成龍運米到時照數補給此馬三千匹內撥給兵丁所剩著交與上駟院其趕馬來護軍二百名令歸各旗營內行走著㑹議具奏隨議今選兵進𠞰噶爾丹視馬匹肥壯者每旗揀取一百五十匹與自京城帶來馬三千匹凑合每旗應給三百匹火器營兵每旗應給一百匹二總兵官下緑旗兵應各給五十匹將分給所餘之馬交付上駟院其􅔨馬來官兵仍歸各旗營內行走此所留八十人應留十五日口糧將所餘之米撥給前去兵丁其補還此項米數俟于成龍運米到時照數補給奏入上曰在前之兵若將趕來馬匹復趕送前去則馬匹勞苦內御馬羣有馬八百匹在前將此馬內給與前鋒兵一百匹給與兩黃旗三百匹其在前行走之緑旗兵給兵部馬五十匹給此馬時著馬思喀達禮善安布祿看給其在後六旗兵漢軍火器營兵緑旗兵馬匹著索額圖看給給此馬時內御馬羣馬一千匹不用給與著將兵部趕來馬匹取其臕壯者五百并自京城趕來旗下馬匹照數給與設或一旗馬皆堪用無可留之兵口糧馬匹俱不致有誤本旗大臣具保即不必留有欲留四五十名者亦視其本旗具保留之再所留護軍驍騎爾等親身與本旗大臣等驗視分别火器營兵有欲留幾名者聽其留下官員內有無馬者亦聽之此所留之兵不可無大臣管領著左都御史傅臘塔副都統海蘭在此駐扎總管兵馬遣人察看哨口偵探信息丙申命營門設炮內大臣等奏原㑹議營中四門每門設子母炮二位奉㫖不必用子母炮著安設內造炮後都統等奏內造炮留宣化府二十四位已將十六位交與漢軍官兵今既結環營此炮應每旗取一位安設營內奉㫖准取來安設此處現有二位著再取六位來來時勿催迫令其量力前行命內大臣公福善督催火器上諭福善曰火器甚屬緊要今俱在後設有需用之處必遣人往取爾既在後營務加意令其附近行走如有取用速送前來不可有誤福善奏曰在後火器應令都統等催趲向前俱接御營行走需用時如有所取臣親身趲送似斷不至遲誤上命議政大臣等議奏議政大臣等㑹議火器最屬要需應趣令向前接御營行走上准行曰毋勞苦兵丁可令從容前進丁酉諭坐塘人員速遞大將軍伯費揚古奏章上諭行兵部曰大將軍伯費揚古題奏事件所到驛站即作速遞送御營勿誤時刻併檄土木坐塘侍郎馬爾漢處凡大將軍所奏事件一到其地亦交驛站速送御營督運于成龍報直省頭隊夸蘭大噶禮所轄車二百輛於四月初十日已到第六驛和爾博地方今往取駝騾一到即勻裝車䭾起行戊戌駕出喀倫至蘇德圗駐蹕命趣于成龍等糧及嶽升龍軍上諭行兵部曰前遣護軍參領車克楚等偵探厄魯特踪跡頃來奏云現今噶爾丹由克魯倫河順流而來住扎之處大兵十日內可到應行文于成龍著將三百駱駝一百五十車所載糧米陸續運至勿致有誤噶禮頭運米糧亦令隨後運到總兵官嶽升龍著選所屬兵丁兼程趣御營前來命大將軍伯費揚古扼噶爾丹去路上手敕諭大將軍伯費揚古曰朕所統軍近至喀倫時即差護軍參領車克楚前鋒侍衛祁薩木往克魯倫左側屣探聲息今車克楚還奏云臣等初九日到伊扎爾地方見有寇踪於是轉回初十日遇沙津王所差俄齊爾等十五人言噶爾丹於本月初間自土喇向克魯倫移營第三日始釋我等噶爾丹在達爾漢敖拉山以此揆之噶爾丹已近朕所統大軍矣此冦乃極狡猾之人如敗遁斷不趨土喇必渡克魯倫或從俄儂巴爾濟赴塞稜格或繞巴顔烏闌之後設伏爾等兩隊兵見彼下克魯倫若隨其踪而往未必不入其伏中朕甚為此慮之特遣藍翎侍衛殷濟納等往諭大將軍費揚古爾可詳詢地理及彼脫逃之路小心堵禦不可以彼向下流行而輕之特諭以示議政諸臣復諭曰據車克楚等來奏云噶爾丹兵由克魯倫河順流已至伊渣爾矣若聞我兵信息回渡克魯倫河由俄儂巴爾濟之後繞道向塞稜格逃竄亦未可知陜西一路兵有阿南達在內彼處周圍地方阿南達悉知費揚古兵及陜西兵一聞噶爾丹由克魯倫河順流而來必隨後速進此兩路兵俱隨後進則塞稜格地方無堵截之兵矣陜西兵應預堵塞稜格費揚古兵或仍留土喇或躡噶爾丹後而來著㑹議具奏議曰皇上手敕諭大將軍費揚古極其詳備應行文大將軍費揚古令防賊兵遁走塞稜格預留陜西兵堵截去路伊仍領大兵躡後前來凡事俱欽遵訓㫖行皇上手敕謄發阿南達可也上從之命約束軍裝上諭內大臣曰今已出喀倫爾等皆久歷行間大臣甲胄器械應如何帶往著㑹議具奏議曰自明日始撤袋內各帶戰箭二十枝隨駕兩班侍衛著專尼大各背小旗穿綿甲扈從其跟隨行李專尼大亦著背小旗行走上曰善命蒙古軍合為一營設立首領上諭侍郎西喇侍讀學士喇錫曰扎薩克王台吉等及喀爾喀王台吉等著俱駐扎一營伊等不可無總領科爾沁達爾漢王班第既係親王可令為首使總領之命內大臣索額圗趣後軍上諭索額圖曰爾往傳諭後軍距此地二程有胡魯蘇台察罕諾爾地方朕駐營以待著後軍䟎赴前來毋疲勞馬匹上諭皇太子曰自出喀倫見水草尤佳地方形勢無平原曠野盡皆低山處處有沙岡凡喀倫內所常見之走獸飛禽皆無惟黃羊野騾大烏鳥白翎雀耳此地除牧養牲畜外並無佳處我軍重車所經無有阻誤看來沙行視泥行為易自獨石口至喀倫以繩量之有八百里較向日行人所量之數日見短少自京城至獨石口為路甚近約計不過四百二十三里皇太子可試使一人繩量之喀倫地方用儀器測驗北極髙度比京師髙五度以此度之里數乃一千二百五十里朕所過蘇泥特阿巴哈阿巴哈納爾等旗各皆效力浚井泉修道路治橋梁除石礫視內地甚多敬謹已極誠可嘉悅漸北行漸寒喀倫外見舊氷雪尚微存晨行時或有鬚凍之日而槩無妨於草木之生長此亦一竒也然諸䝉古以今年為大熟朕所統兵已近喀倫遣護軍參領車克楚前鋒侍衛竒薩穆盆楚克貝子護衛穆渣哈爾阿巴哈納爾布昭貝勒鄉導索納木察哈爾護軍撥什庫三人理藩院撥什庫一人給善馬各三匹往克魯倫河一帶偵探踪跡於四月十二日車克楚竒薩穆還報初九日至伊渣爾厄爾幾納地方潜入噶爾丹兩哨兵之間視其形踪併牲畜計之共約有二千餘此外更復何有為山所隔視之無所見噶爾丹哨兵見我踪跡正追尋間我等突出前來於初十日遇沙津王所遣佐領俄七里等十五人口稱噶爾丹於此月初自土喇移營向克魯倫河下流第三日遣我等歸噶爾丹至達爾漢敖喇矣汝等勿與我同行噶爾丹人相隨在後若問時難以答應汝等宜速出語訖遣之使行以此觀之噶爾丹去我軍八宿矣整肅軍旅訓備偵哨大約十日可與敵㑹此乃緊要情事應書在前前數事隨思意所及而書故將此書於後己亥駕次胡魯蘇台察罕諾爾命調盛京等處兵㑹於索約爾濟山禦噶爾丹東走之路上諭議政大臣等曰厄魯特噶爾丹由克魯倫河順流已至伊渣爾厄爾幾納克地方我西來兩路兵及中路兵俱近克魯倫河矣噶爾丹勢蹙或向東竄入亦未可知著盛京寧古塔兵前往索嶽爾濟山屯扎黑龍江兵亦赴彼㑹齊此處從直路遣檄併檄京城轉行是日督運于成龍報至言本月十二日以駱駝三百頭車一百七十三輛裝米一千石交侍郎噶禮管駱駝首領郝尚圖等起行又十二日直𨽻頭運第二隊夸蘭大逰擊劉澤寰所管糧車二百輛內一百輛已至和爾博站餘一百輛至庫勒諾爾地方頭運第三隊夸蘭大都司丁延祥所管糧車二百輛內七十五輛已至和爾博站餘一百二十五輛至庫勒諾爾地方二運頭隊夸蘭大按察使劉暟所管糧車二百輛俱至庫勒諾爾地方上曰此大喜之報也嗣是後隊米車到後發行于成龍俱節次奏報遣撥什庫諾爾布瞭望噶爾丹踪跡上又慮噶爾丹向西逺遁乃遣理藩院撥什庫諾爾布喀爾喀納木扎爾王長史庫濟根等七人哨探諭曰爾等往歐德哈爾哈地方潛度河伏於北山登髙逺望聞噶爾丹順河下流行恐我軍越過諭皇太子曰我軍將展哨前進偵探聲息以待後營齊集噶爾丹仍在車克楚所探之地實為我師之幸倘趨克魯倫河下流而往則迤東蒙古恐為所動搖故調奉天烏喇兵馬令㑹於索嶽爾濟地方已經行文汝宜促之并不時探問報聞庚子命定軍行次序上諭內大臣索額圗等曰今大兵已出喀倫應令幾旗前行幾旗後行著㑹議具奏議曰今已出喀倫應著前鋒軍在前行次八旗漢軍火器營察哈爾宣化鎮古北口緑旗兵行次御營並上三旗行次五旗行總兵官嶽升龍至亦同緑旗兵行上從之辛丑上自葫蘆蘇台察罕諾爾至喀喇芒鼐哈必爾漢駐蹕入行宫時宣化總兵官白斌等率官兵跪迎上顧謂白斌等曰爾等俱經歷戰陳之人今於朕前領兵進𠞰與他次不同果著有勞績爾等之功斷不致泯沒若遇敵時宜各加勉勵賜總兵官白斌御用帽及袍褂副將施世騄參將張維焦相聖袍褂各一件賜總兵官白斌馬進良標下兵丁每營牛二十頭羊三十隻又遣膳房章京莫洛渾等傳諭撤今日御用茶飯食物均賜衆官兵於是衆皆列坐㑹食既畢總兵官白斌等跪叩奏曰臣等係邊陲武辨行間效力乃臣等職分此次出征屢䝉重賚今既賜衆官兵牛羊又賜臣等上用食物並御用冠服臣等實不克當雖古之解衣推食何能及我皇上殊恩若遇賊寇務行𠞰滅以報皇上髙厚於萬一耳衆官兵俱鼓舞歡躍奮勇百倍壬寅命檄催大將軍伯費揚古速報軍情上諭行兵部曰朕前頒手詔與大將軍費揚古不知曽達與否其兵現抵何處至今未見題報今作速移文費揚古朕親率大兵於四月二十五日可至克魯倫地方其兵已至何處及何時可至土喇巴顔烏闌地方著明白開報由旁路驛站作速具奏申禁燈火上諭內大臣等曰火禁竟不能行著再加嚴禁以後或爾等營內或哨口或斥堠牧馬之處終夜無使張燈舉火務行禁約著派官兵巡拿僕從人等被獲將伊主從重治罪若不行拿究被傍人捕告者將伊等並行治罪癸卯駕至席喇布里圗駐蹕命皇長子𦙍禔內大臣索額圗總領前軍上諭內大臣索額圗曰朕今日至此見漢軍猶未起營如此必致誤事伊等俱不足恃應派此處大臣統領而行索額圗隨將內大臣以下侍郎以上職名入奏得㫖前行八旗前鋒兵漢軍火器營與四旗察哈爾兵及緑旗兵行走統領不可無人著皇長子與爾親行前往統領行走朕十九日在今日所駐席喇布里圗地方停留漢軍火器營察哈爾兵緑旗兵令十九日在今日所駐之西巴爾台布喇克地方停留以候皇長子皇長子在漢軍火器營內駐扎八旗前鋒照常行走每旗派出前鋒二名並酌派該管官護衛皇子所派前鋒必於十九日遣往西巴爾台布喇克地方其八旗前鋒漢軍火器營察哈爾兵緑旗兵俱著於拖陵布喇克地方停留等候御營指授後軍駐營之地上諭副都統吳達禪曰御營後五旗中著正紅旗明日近至御營聽上三旗指示劄營其四旗至御營軍所過六七里外繞湖泊劄營上諭皇太子曰朕所統兵旅區畫齊僃深入克魯倫克勒地方若無停留稽緩六七日內或可與敵相遇初聞此地僅可一二旗魚貫而行今水泉充給此數日來分派已定以前鋒營及八旗火器營兩緑旗營察哈兒兵居前為一隊次則朕之大營及鑲黃正黃正白三旗凡四營為一隊再次則以正紅鑲白鑲紅正藍鑲藍凡五營為一隊先行之前鋒與鑲藍旗尾後相去約百里四月十七日八旗緑旗及火器營俱已㑹集軍容整肅馬臕健壯至克魯倫前一日約齊而進此際彼即望風奔逃亦必為我軍所困若其順克魯倫河而下或少需時日耳因便示知之特諭丙午上駐蹕西巴爾台以撥什庫諾爾布等偵探有功授職賞賚有差時哨探撥什庫諾爾布等還奏曰臣等奉㫖到歐德哈爾哈視其踪跡敵人並未嘗過此地臣等渡河上行五十餘里至塔爾吉爾濟乃見一人臣等欲擒之以復㫖往追之厄魯特伏兵三十餘人出馳來圍逼臣等正不能脫之時忽大旋風起自北而來人不相見乃順風而出視之已到古爾班土爾罕口矣於此知皇上洪福上天助祐乃謝天而回厄魯特實在塔爾吉爾濟地方上命以諾爾布往返事諭議政大臣及兩營大臣知之又諭曰諾爾布兩次往厄魯特地方偵探信息著有勞績著給拖沙喇哈番之職俟回京日另加恩賞今暫充撥什庫行走長史庫濟根賞銀五十兩鄉導索諾木齊旺護衛博羅輝額林辰等各賞銀三十兩喀爾喀扎薩克一等台吉車陵扎卜擒厄魯特二人解至理藩院隨以其事入奏得㫖喀爾喀扎薩克台吉車陵扎卜著即加溫諭所獲二人著拘繫隨行其押解人喀爾喀等亦著隨行俟至克魯倫各遣還家尋㑹議遷車陵扎卜入喀倫內上諭皇太子曰朕所經過之處非大瀚海也西之瀚海較此更濶然觀之亦非平衍之地山阜聨綿沙石間雜自出喀倫未見寸土其沙亦堅硬履之不陷瀚海中所産石塊與砂附去觀看營中軍士鑿井甚易一人可鑿二三十處因水泊中取水嫌遠咸於近帳房處鑿之可掘之地亦易認識有謂之善達者地窪而潤掘未二尺即可及泉有謂之賽爾者山間溝徑掘僅尺餘即可及泉有謂之布里杜者乃叢草積潦水雖有而佳者少有謂之窺布爾者水流地中以手探之泉即隨出故野騾以蹄抉之而飲風土景况一無所取地盡碎石下馬偶竚立可射之處亦少我軍未曽騎射其地實未見佳也草則叢生而土髙所以縈絆馬匹又各種野鼠所穿之穴較興安一帶蚡鼠之穴更深殊覺可厭草名頗多有郁爾呼草牛羊駝馬食之最宜以此稱佳內地蒙古皆不能識又有蘇離草生最髙故將此二種亦附去觀看此番行師日期皆因火器營甚是耽閣即今猶等待而行必日期相符乃善也恐噶爾丹順克魯河遠去遣巴哈納爾之鄉導索諾等七人至克魯倫河之額古特哈爾哈偵探於四月十四日往二十一日早來覆奏噶爾丹在克魯倫河地方是實等語朕之大營距噶爾丹所在不過五程噶爾丹似茫無知覺我軍駐處山勢髙峻易設偵探故前移哨兵於古爾班圗爾漢巴爾泰哈地方特諭命檄問大將軍伯費揚古軍至土喇日期上諭行兵部曰前費揚古奏稱伊等大兵於四月初三日至翁金二十四日至土喇二十七日至巴顔烏闌俟兵至翁金之日再行馳奏朕依所奏日期親統大兵而來已與噶爾丹相近而費揚古至翁金日期尚未奏報則其至土喇日期無由得知朕兩次馳諭亦未經回奏著喀倫驛站與土木驛站各移文費揚古伊等兵見至何處何時至土喇與巴顔烏闌令作速報聞大將軍伯費揚古奏報大兵情形費揚古奏言三月十九日䝉頒上諭於本月二十八日未時已到阿爾哈林圗地方三月十六日臣等大兵所行之路並未遇雨二十二日遇雨至晚復雪道稍泥濘故遲誤一二日至於載炮之車日行不過二三十里不能隨大軍即到因是將神威等大炮留於喀倫著緑旗兵守護近蒙皇上頒發新造炮八門並景山之子母炮四門江南送到子母炮五十五門已用大同所養駱駝二百頭䭾載前來運糧正卿喻成龍等於三月二十四日至臣敖漢察罕和朔行營言糧車於二十二三日始出喀倫路上水草缺少而牲口係從太原徑至此處故皆疲瘦今將十五日口糧留於喀倫以備大軍凱旋之用又十五日口糧運至翁金等處預備其二十日口糧用小車選駕車牲口內可用者運至土喇地方支給大軍臣以大軍口糧關係甚要因㑹議將十五日口糧留貯喀倫其三十五日口糧著盡行運至土喇地方若小車及所選駕車牲口不足著將撥給䭾炮所餘空行駱駝助運議定已交付喻成龍等去訖臣自歸化城啓行時曽遣問寧夏兵幾時起行何日到翁金地方據孫思克等回稱我等之兵於二月二十二日起程行三十八日可至翁金近蒙頒到諭㫖隨遣人往令將寧夏兵行至何處作速申報臣於四月初六日屯扎翁金口之東席喇胡魯蘇台地方因大軍悉按掘井處安營故分兩隊而行於初七日留居一日俟後隊大軍至於初八日並進駐扎於烏闌厄爾幾地方若寧夏兵於初九日至烏闌厄爾幾地方臣等或一路進兵或兩路進兵㑹同定議俟商南多爾濟詣御前時明白具奏若仍不至據正月二十八日奔來喀爾喀逃人曽有噶爾丹今在土喇上流之語臣等亦不便久待即於初十日啓行進趨土喇矣其寧夏兵到時著隨後進發又鄉導等約略計云初十日自烏闌厄爾幾起程行二十二宿於次月初三日可至土喇河阿喇克山之西克勒和朔地方謹此奏聞上命議政大臣等并在三營內王大臣副都統㑹議具奏丁未命商進止之宜上諭諸王大臣曰前因大將軍伯費揚古疏言四月二十四日可到土喇二十七日可到巴顔烏闌是以中路大兵整旅安行已來至近敵之地矣費揚古沿途耽誤許久不見奏聞今忽奏稱改期目前我軍既逼近噶爾丹應不必待費揚古軍當即前行多羅信郡王鄂扎貝子蘇爾發宗室公蒲圻和碩額駙尚之隆都統都思噶爾巴渾德周卜世阿錫坦石文瑛王永譽護軍統領托倫蘇丹散秩大臣布克叨副都統噶爾必錫柱胡世巴凱音布莫洛渾阿喀納侍讀學士席爾登理事官溫達等一議曰臣等竊思噶爾丹若果有待我軍之意則我亦可俟西路之兵矣若不能禦我軍威欲行逃竄則其地方寬濶聞信預遁必相隔遼逺今量西路兵所到之期緩行以待兩路夾進似為有益事關重大伏候上裁領侍衛內大臣蘇爾達馬思喀內大臣明珠大學士伊桑阿侍郎安布祿西喇侍讀學士喇錫等一議曰臣等前因大將軍費揚古原奏內有二十四日至土喇之語度等待之期不甚久逺因曽奏請俟費揚古兵至然後進發今諭㫖言自阿喇克山之克勒和朔至土喇河上流尚有五六日之程爾等問明鄉導議奏臣等詢問鄉導萬舒克等言自阿喇克山之克勒和朔前行八宿第九日始至巴顔烏闌地方噶爾丹若由巴顔烏闌北逃竄亦有去路如此則等候日期太遠若我軍不進噶爾丹不戰而走則相去遼濶一時難於追獲今我軍似應前進酌量而行事關重大伏候上裁宗室公吞珠領侍衛內大臣公國舅佟國維副都統阿爾納學士宋柱等一議曰中路大軍前進宜近抵克魯倫河前奉諭有欲遣使往噶爾丹之語若費揚古之兵可待即往來遣使延緩日期以待費揚古之兵若有可行事宜我軍勢大可即行𠞰滅噶爾丹極其狡猾若順克魯倫河下流而去我大軍已近即可進𠞰如大軍不近抵克魯倫河而噶爾丹順克魯倫河下流過一二日則我大軍似難追及矣事關重大伏候上裁奉㫖遣乾清門侍衛馬武往皇長子營內侍讀學士喇錫往五旗營內商之皇上作手敕差侍衛額林辰賫授大將軍伯費揚古曰爾初七日疏於二十一日酉時到覽之言五月初三日可到土喇汝原奏言四月二十四日可到土喇二十七日可到巴顔烏闌是以朕軍因水草無誤定於二十五日間到克魯倫河今差前鋒視其行踪亦已獲其生口矣噶爾丹有沿克魯倫河而下之勢與我相隔五日程此際汝等理應遣奏數次則朕軍易於迎待而汝等久不來奏不知已到何地恐稽時日催趲而行遂先於汝等今或待或行係在兩可情事甚大汝等如何行路當速來報因原議兩路兵孰先到數日有務須等候之約是以朕且待且行如必不得已則當相機行事耳特諭又命催趲糧運上諭行兵部曰大將軍費揚古兵行稍遲朕緩行以待之可行文于成龍乘此時將所運米作速陸續運至侍衛喀瓦爾達探見噶爾丹哨卒還復命先是上酌遣前鋒隨喀瓦爾達等至古爾班圗爾罕地方潜覘敵哨至是喀瓦爾達還奏曰臣等奉㫖前夜往踰巴爾代哈山及清晨至西方圖爾罕山上適敵人哨卒方到臣等避而覘之見敵人哨卒立於山上覓水向克魯倫視之見其有烟厄魯特在此是實臣等恐彼知覺繞山潜歸戊申喇錫回奏言統領正紅旗兵皇四子宗室公齊克塔哈內大臣公常泰都統齊世護軍統領鄂克濟哈副都統渣喇克圖法喀原任尚書顧八代侍讀學士覺羅華顯統領鑲白旗兵僖郡王嶽希貝子吳爾占都統噶爾馬護軍統領桑格蘇赫副都統納秦統領鑲紅旗小營兵宗室公蘇努副都統烏赫統領正藍旗兵顯親王丹臻副都統崇古禮禪布侍郎常綬閒散宗室哈爾薩統領鑲藍旗兵康親王傑淑貝子魯賔內大臣阿密達都統喀代副都統鄂飛龍西庫裕親王福全恭親王常寧簡親王雅布等議臣等衆意以為大將軍費揚古兵至土喇之期尚早若中路大兵即行前進使噶爾丹知皇上已至旋即逃竄便得脫矣今視水草佳處堪容八旗兵者暫行屯駐約計將軍費揚古兵之至然後前進則噶爾丹之後已為所截因而夾擊之於事有益縱令噶爾丹依克魯倫河順流而去自有盛京烏喇黑龍江等處兵在彼而我大軍復進抵克魯倫河以斷其歸路亦復有濟事關重大伏候上裁統領鑲紅旗兵皇三子𦙍祉領侍衛內大臣公福善副都統孫渣齊侍郎席爾達學士三寶等議臣等衆意以為大將軍費揚古疏內雖稱兵行遲延五六日約計今已至翁金之路矣噶爾丹見在巴顔烏闌近處若待費揚古兵至遲延時日恐賊萬一聞風即行逃竄亦未可知今以中路大兵勦滅賊寇未為不足既已近抵克魯倫河似應一面移文催西路之兵一面使賊不及為備前往擊之事關重大伏候上裁馬武回口奏領侍衛內大臣索額圗都統諾穆圖副都統公孫徴灝雷繼尊費揚固趙鉞喻維邦張朝午等一議謂應緩行以待大將軍之兵都統公鄂倫代都統李正宗碩鼐尚書班第副都統張所知巴賽等一議謂應即行進兵奉㫖三旗營內王大臣等不必召集著見在此營內議政大臣等議奏大臣仍持兩議口奏奉㫖至明日駐營處具奏皇長子𦙍禔奏報察詢糧炮事𦙍禔等奏至言臣等十九日自席喇布里圗地方啓行駐扎西巴爾台二十日駐扎察罕布喇克二十一日至拖陵漢軍火器營所帶宣鎮神功炮二十四門於二十二日晚始至問隨炮大臣漢軍都統諾穆圗等何以遲誤據稱此三宿相距八九十里駕車騾匹已疲我等沿路休息而來故今日始至又奏臣等至拖陵地方問總兵官馬進良白斌爾等之兵有稽留處否俱言所帶八十日糧以二十日糧留貯和爾博地方現今已用五十日若糧能接濟不至稽遲矣上遣人召內大臣索額圗委以火炮事務併交大學士伊桑阿查緑旗兵二十日口糧數目具奏上諭皇太子曰朕緩進之意特示汝知前將近敵情由屢有諭㫖二十一日酉時將軍費揚古由橫設驛站奏稱五月初三日可抵土喇等語伊前疏云於四月二十四日抵土喇朕擬度時日欲於四月二十五日間抵克魯倫河前進乃許久未曽奏報忽而改期我軍難以指畫於是傳集八旗諸王及議政諸臣㑹議衆見不同有言即宜進𠞰者有言原議兩路之兵約㑹前進所關重大應少緩我師以觀局勢朕再四籌度未能適當其可姑少為相機徐行前諭㫖曽言進𠞰今復稍有濡遲若不傳示其故恐汝計日懸心因書以諭意噶爾丹情形萬不計及此路進兵猶自夢夢耳但所慮者相距匪遙噶爾丹聞知必爾逃遁機㑹可惜然彼雖逃遁諒亦未得全脫也為此特諭費揚古奏疏亦謄寫發往將此情由奏聞皇太后并轉諭大學士尚書知之辛亥定議遣使於噶爾丹上諭議政諸臣曰俟至拖陵地方再遣使於噶爾丹此際費揚古兵亦將到矣噶爾丹若亦遣使來我亦遣使頻往以待費揚古等兵彼若乘此際逃竄即聽之縱逃亦必自生內變豈能完全耶諸臣奏曰上諭至拖陵地方再行遣使甚是俟至拖陵時往來遣使以待費揚古兵若噶爾丹接戰則兩路夾擊立行𠞰滅或逃或降至彼時酌量而行上是之以𠞰滅噶爾丹之䇿曉諭諸臣上召內大臣索額圗等入行宫諭曰噶爾丹自以為無所畏憚煽惑諸蒙古竊踞克魯倫地方謂朕必不親征今我軍緊要軍器俱已備至若噶爾丹聞朕已至必先逃竄爾等欲戰耶欲使噶爾丹逃竄耶可各陳所見索額圗等奏曰觀噶爾丹來踞克魯倫之意特欲煽搖諸蒙古若遇喀爾喀即行搶掠實不料皇上親臨今已近敵我軍迎往噶爾丹聞皇上親臨不敢抗拒逃竄而去彼聲名一挫不能再振如皇上親抵克魯倫河噶爾丹竄去則我大事已畢我皇上神威不但逺播邊塞且遍播四海以外矣臣等之意聽彼逃竄似比戰為愈但所以使噶爾丹逃竄之計臣等不得而知上曰噶爾丹原係行劫小寇素無逺識信人誑言侵掠喀爾喀以為我軍不能即至故敢竄伏克魯倫今大軍已近噶爾丹西路之兵亦將至土喇我軍從歐德哈爾哈邀擊即可破滅之矣今爾等欲迎往使之逃竄朕以為無難俟其少近遣使往諭之云朕欲與親臨約盟與爾相近爾可前來與我軍㑹議朕並不爾𠞰噶爾丹聞朕親來必連夜奔逃我軍即追殺如向土喇退去則必遇費揚古之兵朕於此賊厪慮已久此次噶爾丹殄滅必矣如噶爾丹拒戰必然糜爛如或奔逃亦至破壤但于成龍所運之米恐不能應期而至耳伊桑阿安布祿西喇喇錫巴圖賴爾等可撰敕呈覽俟少近遣往旋即進兵此䇿何如爾等云何索額圗等奏曰皇上洞悉噶爾丹詭計謀極周到一遵聖謀施行實為盡善後進兵時索額圗復奏云皇長子於烏闌布通之役實有餘憾不便使居前行上以索額圗於烏闌布通自喪其膽恐遣彼為前行故恇懼而有是奏不允壬子命議進兵之䇿商南多爾濟還賫大將軍費揚古疏至疏稱將運至翁金之一月口糧內以一半留翁金一半留兵一千令副都統西爾哈達祖良璧等防護運至土喇已移文囊吉理揚琳等又稱王國昌報所運米斷不能如期運到隨經檄催外臣等率領大兵於初十日自烏闌厄爾幾起程至察罕和朔地方將軍孫思克等帶西安滿洲兵五百名輕騎前來於十一日至察罕和朔孫思克稱伊所帶緑旗兵七千名途遇風雨馬匹遲誤一半選兵二千願親率前赴大兵行走博濟稱伊所帶滿洲兵二千漢軍兵一千途遇風雨馬匹稍誤此內亦選兵二千願親率急赴大兵行走臣等㑹議俱依將軍孫思克博濟等所議其餘滿洲兵一千著防護按察使囊吉理所送米石此兵留西安副都統西爾哈達祖良璧并駐防協領等管轄其翁金所留一半米石將孫思克標下所留兵內派出五百名著副將張憲載管領看守滿洲漢軍緑旗兵四千去大兵尚有十日之程不便作兩路進發應令隨臣等進路作速前來與臣等一路行走又商南多爾濟奏稱費揚古等之兵於本月三十日可至土喇之阿喇克山克勒和朔地方來月初七日可至巴顔烏闌不便分兩路前進上命議政大臣集議議曰查大將軍費揚古等奏稱不由兩路進兵揀選人馬一路前行殊為整嚴請如所奏至商南多爾濟奏言費揚古等之兵是月三十日可到土喇阿喇克山之克勒河朔來月初七日可到巴顔烏闌應量費揚古等兵到之日聽皇上指揮遵行至大將軍費揚古等以運到翁金米一半留於翁金一半令副都統西爾哈達祖良璧等留兵千名運至土喇已檄囊吉理更無可議上曰前既以大兵獨進及俟大將軍偕行之事使前後營諸王大臣公議今亦應令公議之前軍處既交付馬武則後軍處仍令侍讀學士喇錫前去命嚴催糧運上諭行兵部曰中路大兵現今逼近噶爾丹西路大將軍費揚古兵亦已甚近大軍米糧關係甚要兩路大軍㑹合即所需米糧甚多速移文于成龍著多方設法將所運米務陸續速行運到又諭曰現今需用米糧噶禮所運米已至何處須先交與驛站申報著伊趲行作速運到並著後隊夸蘭大作速趲運前來上諭皇太子曰朕統大兵駐蹕察罕布喇克之日費揚古遣來期約之商南多爾濟喇嘛於四月二十六薄暮至彼於行路之間遇厄魯特二人擒來問之彼云噶爾丹向克魯倫下流移營問費揚古何時可至云五月初六間可至巴顔烏闌因是我師仍稍緩以待之從察罕布喇克至克魯倫河約略三百里未經量度難得其實此數日間未見汝奏章并皇太后萬安音問朕懷不勝惓切昨薩卜蘇奏事之便又未見汝請安奏章益增懸念朕躬甚安諸皇子俱佳皇太子佳否癸丑侍衛馬武賫前營奏摺回復命皇長子𦙍禔內大臣索額圗都統公鄂倫代李正宗碩鼐諾穆圗尚書班第副都統公孫徴灝張所知雷繼尊趙鉞費揚固喻維邦侍郎安布祿等議據拿獲厄魯特二人云噶爾丹現在克魯倫之拖訥山順克魯倫河下流而行商南多爾濟奏費揚古等兵於本月三十日至土喇之阿喇克山克勒和朔地方來月初七日當至巴顔烏闌皇上親統大兵特為𠞰滅噶爾丹而出又思遏賊歸路調發西來二路兵俱至正合聖上之神謨矣今大將軍費揚古與將軍孫思克博濟之兵㑹合而來兵力甚盛於本月三十日至土喇之阿喇克山克勒和朔地方來月初七日至巴顔烏闌正宜協力夾擊𠞰滅噶爾丹其遣使噶爾丹及計大將軍費揚古等兵近逼賊營夾攻𠞰滅之處俱候皇上乾斷侍讀學士喇錫回口奏云統領後隊五旗皇子王大臣於議政大臣所議外並無别議上諭議政諸臣曰朕所統大軍不勞而至人逸馬肥不但滿漢官兵即僕從無一人不得到者以此精鋭人有死志寇雖十萬朕將用䇿親御以擊之一面遣使往說倘敵人力有餘則聽與我戰力如不及則聽其走但此寇若走恐在我必有追悔之意議政諸臣奏曰噶爾丹若走則吾事已畢當遣使說之衆意合一上遂定遣使之議甲寅上仍駐蹕察罕布喇克頭運噶禮郝尚圗米車米䭾到補散官兵營外積米如山觀者如堵喀爾喀人等無不驚異命侍衛馬武賫糧赴總兵馬進良白斌軍中散給行兵部奏曰侍郎安布祿咨稱皇長子內大臣索額圗言總兵官馬進良白斌軍糧奉㫖留貯二十日今又食過六十日額米俱完馬進良標兵一千五百名白斌標兵一千二百七十名乞將伊等應給之米作速解來為此奏聞上遣侍衛馬武賫伊等應給之米前去乙卯喀爾喀扎薩克台吉車陵扎卜奏請從軍上不許車陵渣卜等至奏請隨征效力上諭曰爾等往來遊牧以避厄魯特勞苦已極免往出征各帶眷屬牲口往達里岡阿之東居住朕回鑾時指示地方安插達里岡阿地方曽留御用馬匹並兵丁馬匹牧放著爾所屬人等加意收管嚴行禁約勿使盜竊犯者必行正法車陵渣卜奏曰臣謹遵諭㫖不隨往出征願皇上准臣兄子多爾即渣爾都統嘎爾單二人隨往以充隊伍上許之又諭曰尚書班第屢次令爾等向內遊牧爾等不從納木渣爾拖音等終被厄魯特虜掠今納木渣爾拖音毫無所有釡甑皆無食用不給鬻人度日若果遵㫖向內地遊牧何得至此爾知悔否車陵渣卜奏曰我等無知貪戀水草不向內地遊牧以致納木渣爾拖音被掠臣罪何辭伏祈睿鑒上曰爾等既與土謝圗汗附近著隨征台吉多爾即渣爾都統嘎爾單與西地西里貝勒同行朕若在京必重賞爾因出征在外將朕用袍褂賜爾服之聖祖仁皇帝親征平定朔漠方略卷二十二

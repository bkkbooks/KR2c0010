body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷二十五癸酉撫逺大將軍伯費揚古奏報𠞰滅噶爾丹於昭莫多之地羣臣入賀上駐蹕中拖陵大將軍伯費揚古為𠞰滅噶爾丹事遣副都統阿南達來奏上出幔城外親閲所奏疏疏曰五月十一日遣喀爾喀鄉導隨藍翎侍衞布達躧探噶爾丹行踪仗聖上親統精鋭大兵臨巴顔烏䦨之威厄魯特噶爾丹心胆破裂魂魄迸散逃遁而來五月十三日臣軍正向昭莫多行布達等至特勒爾濟口見厄魯特踪跡遣人來報臣等即令署前鋒統領碩代副都統阿南達阿迪等率前鋒試挑之如厄魯特力寡即行𠞰滅多則徐誘之來因厄魯特勢衆碩代等誘之至大軍將及昭莫多厄魯特來逼前鋒之尾碩代等率前鋒且射且却一面遣人來報臣等令將軍孫思克綠旗官兵居中京城西安滿洲漢軍官兵察哈爾諸扎薩克䝉古就東方山之髙處右衞滿洲漢軍官兵大同總兵官康調元綠旗官兵喀爾喀扎薩克就西方沿河布陣謹遵聖上預授之䇿令官兵皆歩行噶爾丹率賊萬許對陣向前逆戰官兵奮勇發鳥鎗砲矢自未至酉敵人將潰官兵上馬鳴角仗聖上威靈擊噶爾丹而大敗之分行追逐至特勒爾濟口𠞰殺三十餘里斬首二千餘級生擒百餘人及昏黒乃鳴角收兵大獲子女駞馬牛羊兵器什物理合奏報謹具本奏聞閲畢批曰覽卿所奏率官兵至昭莫多厄魯特噶爾丹率賊萬許拒敵卿令大兵皆下馬齊列自未至酉奮勇力戰賊人將潰令我軍士上馬衝入噶爾丹大敗追逐三十餘里斬厄魯特二千餘生擒百餘人大獲子女駞馬牛羊兵器什物卿調度有方官兵奮勇殊為可嘉在事有功人員著從優議叙具奏上問阿南達交戰情形如何阿南達奏曰費揚古等前奉宻㫖截噶爾丹逃竄之路前至昭莫多地方噶爾丹被皇上親追心膽俱裂日夜奔竄困乏已極至特勒爾即地方署前鋒統領事碩代等率前鋒軍誘之前來隨令發砲賊不能當即行衝入遵皇上訓㫖令官軍俱歩戰自未至酉賊始潰亂遂令軍士乘騎進擊大敗之追奔四十里費揚古恐渉誇張故於疏内皆約略言之其實交戰處斬賊三千餘級其被創逃竄死於山谷中者屍骸枕藉生獲數百人殺噶爾丹之妻阿奴及賊之渠首甚衆獲其子女駝馬牛羊器械等物無筭惟噶爾丹引數騎逃出其零星逃散之賊投降大將軍馬思喀者千餘人問陳獲厄魯特之人皆云前經哨卒報稱皇上躬親征𠞰噶爾丹尚未信云皇上定不親征必遣將前來此何足懼故不設備後其所親信并從我軍放還之人至彼具言皇上身先八旗前鋒而行親征果真彌山布野軍威甚猛實難抵敵噶爾丹乃惶遽但云我等今不可遲遂抱頭䑕竄亡命潰遁噶爾丹所屬人多怨懟者噶爾丹云我初不欲來克魯倫地方為達賴喇嘛煽惑而來由今觀之是達賴喇嘛陷我我又陷爾衆人矣上問曰爾等之兵前若如約於四月二十四日至土喇二十七日至巴顔烏䦨則更當何如阿南達奏曰誠若是則賊盡授首即一人亦不能逃脱矣於是衆皆歡呼聲震天地衆扎薩克䝉古王貝勒台吉等及喀爾喀汗王台吉等無不踴躍歡忭上顧謂衆大臣曰此番師出即奏膚功皆上天眷佑也應先叩謝上天乃於行宫南門外設香案上親率諸王皇子等文武官員及䝉古王汗台吉等俱按次排立行三跪九叩頭禮畢上入行宫大學士伊桑阿張玉書恭捧諸王大臣文武官員慶賀表入奏表言臣康親王傑淑等竊惟帝王之師無征不服軍國之事惟斷乃成從來用兵殲冦之烈未有如我皇上今日北征之盛者也皇上統御萬方子育兆姓遐邇内外視同一體雖在荒徼絶域無一民一物不容保於天覆地載之中乃獨厄魯特噶爾丹自棄生成恣行悖逆竄伏塞外擾虐我臣服之喀爾喀屢頒諭㫖怙終弗率蠢兹頑梗難以仁綏皇上誕布天威聲討有罪遂親統六師從中路撲𠞰而以費揚古為撫逺大將軍由西路刻期並進一切調遣機宜悉經宸斷維時廷臣惕然震悚交章請留而聖意但在除殘謂非躬蒞行間不能相機從事且皇太子篤孝性成久習機務在京政事付託料理自無不協於是昭吿天地宗廟社稷禡牙軷路諏日遄征自二月出師以來皇上屢申軍約法令詳明加意拊循訓勉周至偶遇道路險隘或隂雪間作輙傳諭愛䕶馬匹並遣大臣侍衞協督車輓復頻祀山川風雨之神以迓天和百靈黙相無不立應而又日御一餐以與士卒共甘苦給衣甲廐馬以為士卒壯折衝頒賚牲畜均饗將士更時撤御饌令㑹食以示優勞其外藩諸部王汗貝勒貝子公台吉等先後會師來朝者皇上恩禮褒加錫予尤渥至于邊塞行師每憂乏水䝉皇上周覽井泉親視疏鑿因有靈源湓涌之異師徒百萬無不利濟又餽饟道逺自古為難仰厪宵旰焦勞多方籌畫趣令所轉之粟陸續達於師中而軍食不匱以此連營軍旅士馬飽騰罔不踴躍前驅爭欲滅兇頑而後朝食者矣若夫營伍之逺近進止之疾徐刁斗之嚴明皆一一稟自睿裁而斥堠哨望尤軍中所重每煩聖駕親行巡察故軍士倍加謹毖焉初大軍之分幟而行也皇上常御旌門令諸將士乘騎徐進以次簡閲於時烝徒之鋭駞馬之蕃外藩君長環立侍觀者咸歎為軍容極盛迨五月初一日師出拖陵有諜者言噶爾丹近在克魯倫河之地上迺大喜遂令八旗官兵及火器漢軍綠旗諸營並䝉古兵畢㑹申命䇿勵以鼓士氣分賜諸王駝馬及將領衣服隨酌定營制指示陣法悉教以前後左右歩伐止齊之宜變化不窮動合經緯自是師行之際諸軍萃集我武益張甲胄旗旄彌滿山谷而按列就伍無有越次仁義節制之師所向無敵豈區區小醜所足當一擊哉噶爾丹自去歲潛入巴顔烏䦨彼自以為窮荒朔漠之區天兵道阻不能驟至即使興師遣將亦必俟夏秋之交而九重至尊逺臨大漠尤所不敢預料而戀水草以住牧假食息以遷延及我兵進逼克魯倫河噶爾丹忽見天子躬統貔貅行已壓境而將軍費揚古偕舒恕孫思克等又祗遵廟算以五月初三日統西路大兵依期抵土喇河斷絶歸路乃相對愕眙謂王師殆自天而降耶師衆如此何以能猝至無水之地也遂倉皇而遁初八日皇上親統大軍追𠞰噶爾丹聖駕前行每見髙山深谷輙遣哨搜捕逃匿之賊往輙就擒其奉遣者遵上指示則獲利違即失事衆皆驚異是時諸將士無不鋭意俘馘而聖心如天好生猶以抗命者唯噶爾丹一人其餘脅從皆吾赤子不忍盡殱之於鋒鏑之下特頒勅㫖示以誠信諭以歸降且宥所擒厄魯特人賜之蟒服令隨使臣偕往而噶爾丹昏迷惶惑惟圖倖脱竟踉蹌棄輜重遁走巴顔烏䦨初九日皇上命留歩兵大礮於後躬率先鋒兵前進追至克勒河朔沿途見賊遺棄之物無算所謂狼奔䑕竄惟恐偷生之不速矣十一日上命約減器物留於克勒河朔十二日親統大軍追至拖諾山地方賊盡棄帳房盔甲刀鎗器械及老弱人口於道乘夜遁走訊之俘獲之人具言噶爾丹無晝無夜遁走者已三日今當過巴顔烏䦨於時車駕親行追冦閲五日駐蹕拖諾諭曰噶爾丹盡棄輜重宵遁求脱計西路大兵亦將抵巴顔烏䦨則噶爾丹遁無所之矣但兩路大兵會師一路需糧甚多闗係緊要輓運之米現在稽遲今宜酌遣精鋭追𠞰朕親率大軍回而迎糧經畫兩路兵食乃命馬思喀為平北大將軍授以精兵往追之諒噶爾丹必被擒就死但恐兵丁乏糧上乃於十三日班師十四日大將軍果以軍糧事馳奏與聖慮所至毫髮無爽噶爾丹因大駕統兵急追西向遁走北至昭莫多適與西路大軍相遇大將軍伯費揚古等隨布陣奮勇力戰大敗賊衆追殺三十餘里陣斬二千餘人生擒百許人獲婦子駝馬牛羊器械甚多餘黨皆潰噶爾丹辜恩負德自取滅亡逆天者天必誅之此之謂矣皇上於用兵之初即分遣西路大兵遏賊歸路至是而其效始明見焉在昔殷髙宗之伐鬼方三年乃克周宣王之伐玁狁千里旋師然皆命將徂征猶且傳為盛事我皇上六龍時邁直涖漠北從萬難進兵之地冞入其阻計程約三千餘里為時僅八十日而絶塞冦氛悉行掃蕩何成功之速也從來䝉古鳥集獸散靡有定居倐去倐來踪跡飄忽故𠞰滅最難今合諸道之兵環至夾攻一舉而盡殱之皇上料敵之奇如指掌用兵之道如神明隨征滿漢䝉古諸王大臣等咸以為聖武天授非人力所及自此沙漠永清邊圉孔固駿烈之奮揚聲靈之赫濯信為史册之所稀聞詩書之所罕載而漢於匈奴唐於突厥非所論矣臣等幸叨扈從欣聽凱歌自媿弇陋不能形容盛美欽惟皇上勤一身以綏輯烝民勞一時以貽安奕禩惟聖人之至仁乃能定大業聖人之至斷乃能建膚功勲邁百王光垂千古伏冀逺布㨗音宣示中外以上答宗社之靈下慰四海臣民之望其吿祭及頒詔事宜俟聖駕還京所司具儀題請臣等特此先奏㣲忱不勝懽躍忭舞之至奏入上曰朕為中外生民之主綏輯海㝢愛養元元惟以率土乂安為念厄魯特噶爾丹擾亂邊塞心懐狡謀逆天虐民不容不行𠞰滅朕親率大軍逺出塞外聲討有罪噶爾丹聞風遁走希圖倖脱適與西路大兵相遇大將軍費揚古等奮勇力戰大敗賊衆擒斬無算盡獲其人口牲畜從此邊境寧謐不煩逺事征討四海蒼生可共享昇平之福朕心深切喜悦覽王等奏知道了應行事宜所司詳察典例具奏諸王大臣文武官員進賀表出諸王子在幔城内諸王及文武大小官員外藩諸汗王台吉在幔城外三跪九叩頭行慶賀禮皇太子奏言為天威逺震窮冦潰亡仰申慶賀事臣竊惟噶爾丹逆天悖誓忘其死亡棲於邊塞侵掠喀爾喀等部皇父奠安生民廓清疆宇不惜勞苦親統大兵深入敵地運籌聖算布昭天威躬先將士統率前進奮揚我武跋渉徂征噶爾丹委棄輜重狼狽潰逃其所屬之人來歸者甚衆臣聞之不勝欣喜即傳集文武羣臣宣布㨗音大小人員聞知之頃罔不懽忭此皆皇父一人獨斷籌畫周至調度精詳噶爾丹何能出皇父謀略之中乎今神威逺播其所屬之人皆已流散噶爾丹必然就擒邊疆安定臣但願速見天顔不勝依戀謹請皇父萬安奉㫖朕于六月初十前可以至京臣謹按古來出塞征䝉古者徒縻糧餉疲士馬有驅逐之名未嘗有誅𠞰之實我皇上天亶至聖度敵之情偽燎若指掌鑒事之始終炳如懸鏡謂狡冦一日不除則生民一日不安爰躬統六軍進𠞰噶爾丹而滿漢大小臣工請罷親征遣將出師者甚衆䝉頒發諭㫖示以烏䦨布通前事不能已于親行之故後羣臣復謂二月方寒邊外氷雪未消請展期至三四月上念行師之道以速為貴不允所請至中途喀倫地方諸臣又以噶爾丹聲息杳然斷已逺遁大兵可不煩深入而聖意益堅嚴飭諸臣刻期前進至獲噶爾丹實音諸臣又謂當陳兵前列御駕居中而行皇上神武天授躬先八旗前鋒窮追五日噶爾丹窘迫已極狼狽西竄而皇上豫遣西路之兵適與相遇大敗之于昭莫多之地軍鋒一接立就滅亡倘果如衆請非上親涖軍中又或展期啟行稍有濡滯則噶爾丹得以早覺逺遁無踪何能七旬之中滅一大國百日以内奏凱旋都乎從此邊塞鞏固中外永寧國家享萬載無疆之福皆一人躬親勞苦之所致也皇上非常偉績誠與天地同不朽矣命收捕陜西邊塞内外噶爾丹種類上諭内大臣索額圖大學士伊桑阿曰朕率大兵至克魯倫河噶爾丹一聞風聲抛棄子女帳房鍋釡等物乘夜奔竄於五月十三日西路大將軍率大兵至特勒爾濟地方遇噶爾丹潰遁與之交戰厄魯特賊衆大潰斬殺甚多其餘逃散者陸續投順厄魯特噶爾丹止帶三十餘人逃竄而去應作速移文陜西總督巡撫提督總兵官等將邊外邊内之多巴西喇固爾等處凡有噶爾丹所屬之人俱即行收取尚書圖納習知地勢著馳驛迅速赴陜西會同總督巡撫提督總兵官等料理此事若非噶爾丹之人勿悞收取將此即作速知會命檄青海諸台吉捕噶爾丹及其餘黨諭領侍衞内大臣索額圖大學士伊桑阿曰噶爾丹先於烏䦨布通地方敗潰之時首頂威靈佛云乃鬼魅引我來進皇上喀倫不然我豈敢擅入此後不但扎薩克䝉古之在喀倫以内者即歸附皇上之喀爾喀若騷擾一人此威靈佛即誅戮我因有此盟誓朕停止大兵追𠞰使其生還噶爾丹之兇逆仍不悛改去年至克魯倫地方又侵掠歸順之喀爾喀納木渣爾拖音朕用是震怒今年調遣各路大兵朕躬統六師欲親行𠞰滅至克魯倫河厄魯特噶爾丹一聞聲息抛棄子女帳房鍋釡等物乘夜而逃西路大將軍伯費揚古率領大兵至特勒爾濟地方遇噶爾丹敗走戮力交戰厄魯特賊冦大潰斬殺甚多子女駝馬牛羊等物盡行俘獲其餘逃散者陸續來降厄魯特噶爾丹止帶三十餘人逃竄想噶爾丹冀免誅戮遁逃西去亦未可知應着理藩院遣才能官一員併筆帖式前往知會青海地方台吉等着傳諭伊等所屬可通西路地方居住人等知悉各相防備偵探信息若遇厄魯特噶爾丹即行拿送或既遇而不拿獲或既經拿獲不行遣送明知故釋此後即永以賊論再將呼户訥爾地方現在居住噶爾丹所屬人等著盡行拿送將此情節令理藩院譯䝉古字迅速馳驛往送青海地方命諸䝉古兵各歸本部侍郎安布禄奏曰昔議叙喀爾喀貝子盆蘓克之事奉㫖俟至克魯倫後再奏今貝子盆楚克出征未回應俟到京時再議奉㫖在後喀爾喀䝉古兵俱令散歸各家至秋月赴京叙功之時一併具奏上諭皇太子曰侍讀學士喇西引丹巴哈什哈於十七日到朕素識其面非下流無知識之人令喚入賜坐問之其應對言語真實明爽云噶爾丹素有謀為亦得人心每悔深入烏闌布通輕易交戰近思於克魯倫土喇諸處將喀爾喀及内地䝉古用計煽惑令之首尾不相自顧彼時希圖大舉滿洲聞知必然出師師少則與之戰師衆則委地而退待滿洲既旋復躡襲其後如此不數年自然財賦耗絶必致疲弊是以畜謀而來也伊心志本侈今不意聖躬親統如許大兵度人所難行之瀚海俄頃而至厄魯特之衆窺見軍威莫不䘮膽於初七日早即行潰遁晝夜奔馳棄其生計因追兵緊尾其後狼狽流離又於十四日在特勒爾濟地方突遇西路大兵時厄魯特兵五千有餘鳥鎗不及二千自克魯倫巴顔烏䦨以上極其亢旱莖草全無五晝夜倉皇敗走於無草之地沿途委頓隨去者少曾見西路之兵先據髙阜我厄魯特據一小坡徒歩拒敵天朝大兵亦徒歩與戰火器齊發整肅從容相逼而進其前有舉棍者有將紅圓之物遮蔽其身者漸戰漸近至十歩内箭來如雨先從噶爾丹所領之隊敗遁次則丹濟喇丹津温布亦遁阿喇卜灘一隊尚相拒未動於是滿洲騎兵將厄魯特大營圍繞其婦人稚子及馬駝俘獲甚多牛二萬頭羊四萬隻又見阿奴喀屯為鳥鎗所中而死戴巴免爾寨桑中砲連貫四人而死波羅特和卓中箭而死後復短兵前接更有一隊所持非鎗非刀衝突直入所向之處人皆披靡斃者無算思我主背其誓言獲罪聖主天實厭之至於此極我等素行殺戮離拆人之妻子今孽歸已身輾轉思維愛惜性命故背我主而圖倖免殺戮存畱皆出聖恩又以滿兵如何問之云我等會於烏䦨布通時即已畏懾今來此克魯倫土喇我厄魯特傾國之人皆豫知滅亡惟噶爾丹一人以為不然猶妄言有成此乃天之定數彼不自知其然而然矣昔噶爾丹征討諸國時所向咸剋如滿洲兵者實無敵于天下我厄魯特如何抵當適自取覆亡也又問噶爾丹得脱乎可擒獲乎對云聞噶爾丹僅率四五十人而走擾亂中未經目覩然雖得脱無以資生殆困餓以死耳書此正欲遣發十八日中副都統阿南達賫至平滅厄魯特奏章遂一併附往其陸續投誠之厄魯特二千有餘亦全獲其妻子牲畜𠞰滅厄魯特之事畢矣將此情節於皇太后前奏聞宫中咸令知之滿大學士尚書及内廷侍衞大臣亦令知悉朕已率衆望天申謝諸王大臣亦行慶賀特諭甲戌命皇長子畱駐中拖陵料理兩路大兵粮餉諸務上諭皇長子曰大兵人口逐隊回師爾可於此地酌給糧食至于成龍處著于成龍撥與到京口糧使之前往命以騎給徒行人衆收養遺畱僕從上諭皇長子曰大軍之行兵丁内或有一二無馬歩行者亦未可知有于成龍牲口可取使乘用我兵甚衆内有不能携帶僕從棄之而去者交于成龍給之飯食用其力使挽車看馬帶至家中交還原主大兵還家兵丁棄其盔甲器械什物亦未可知倘有不能帶回者有米完空車令裝載車上帶回諭八旗諸臣回師禁令上諭皇長子曰著諭八旗大臣爾等皆朕簡用之人今噶爾丹不能抗威聞風而遁諸大臣雖不得與戰惟約束官兵不擾沿途居民不飲酒不妄行搶奪善飼馬畜就水草小心牧放不盗刈田禾以飼牲畜不踐踏田禾不遺一人一騎全使到家此即汝等之所以効力也如肆行搶奪遺畱人馬事發斷不輕恕命安挿厄魯特降人於邊外上諭皇長子曰天時炎熱應令厄魯特降人暫居張家口外俟丹巴哈什哈等家口到後酌給牛羊鍋帳等物到張家口後恐糗糧有悞可自于成龍取銀五百兩交侍郎西喇小心照管暫令居張家口外候㫖撤僧古爾塔爾吉爾濟地方哨卒先是以僧古爾塔爾吉爾濟處恐有冦警上遣侍衞十五人䕶軍三十人赴明珠所以探聲息至是上謂大將軍費揚古既已擊敗噶爾丹無庸哨探矣若畱伊等徒縻糧食耳著檄明珠酌畱數人其餘遣回明珠隨奏畱新滿洲十五人其餘侍衞䕶軍俱遣回明珠報按察使劉暟運米五百石麵七千觔于五月十七日十八日陸續到克勒河朔隨給駝馬助運交侍郎阿爾拜同劉暟于十八日起行解赴大軍都司丁延祥運米五百一十九石以馬駝往迎自五月十九日起陸續到克勒河朔又原任知府于漢翔等運米八百石亦以駝馬䭾運到克勒河朔交理藩院馬爾漢押同起行解赴大軍駕至察罕布喇克命檄催于成龍䟎運上諭行兵部曰大軍運糧事務闗係甚要因于成龍才能可用選出専令督理大軍運糧事務凡所題請無不允行初在京與于成龍面議時議定八十日以内用兵丁自備之糧不用伊所運之米八十日期滿即用伊所運之米著伊運米至土喇地方為土喇以北進𠞰之需後將兵丁自備八十日口糧内又減畱二十日口糧之時伊曾奏云兵丁自備口糧原議至八十日期滿方用臣所運米今兵丁各減畱二十日口糧只餘六十日口糧至食完即用臣所運米車輛必不能至朕即命駱駝首領郝尚圖等將減畱二十日口糧照數分載運至補給兵丁今八十日已滿克魯倫去京一千九百里原議糧車日行三十里以今計之已經行過八十日矣若日行三十里應過克魯倫且至土喇今于成龍等糧米不但未運至土喇雖克魯倫亦未有顆粒運到以此觀之一日只行十里或十五里而已噶爾丹一聞朕親征信息從克魯倫河逆流遁去朕率大兵窮追五日再欲前往追𠞰因糧運未至朕不得已率領大兵而回其西路糧運全然遲悞土喇地方亦未曾運到顆粒西路大兵遇厄魯特噶爾丹大敗之盡獲其子女牛羊等物猶幸克濟若不將噶爾丹大敗與彼相持則將奈何悞事非輕現今西路大兵因糧米匱乏皆由中路而來厄魯特歸降之二千餘人其子女人口甚多已經著于成龍作速運米七千石前來伊止將米一千餘石著劉暟宋大業運過拖陵地方餘米全然未到今已行八十餘里糧車尚未見一輛詢及沿途倒斃牲口皆云係運糧馬騾觀其所駐扎地方皆不按驛站擇有水草之處俱於無水之地妄行駐扎不但兵丁雖伊等運糧人夫量亦缺乏因糧米不能多到朕營官兵止給七日口糧俟䟎行至喀倫地方將米補給况伊等運糧大臣官員無一人先到即漢官宋大業亦未令滿洲官員同行使其獨運米前來兩路大軍糧務闗係甚屬重大著作速移文于成龍文到即將糧餉迅速運來毋悞軍需若仍遲延將糧米不行速運則于成龍等於遲悞軍需之中又加遲悞矣乙亥駕至西巴爾台黒龍江將軍薩布素等報到索岳爾濟山請停收生巴爾虎薩布素等咨行兵部曰三月十六日奉㫖著盛京烏喇兵照將軍薩布素所奏前來駐扎薩布素領伊所屬一千五百名兵帶三月行糧於四月初旬起程向克魯倫而來若遇生巴爾虎等可即收取欽此我兵於五月初四日自喀爾喀河和洛思台地方起程本月初九日至索岳爾濟山後五十里之噶爾達蘓台河因興安地方之北應加防備於是相視水草在噶爾達蘓台喀爾布爾勒木布爾根等處屯兵其盛京烏喇之兵遣人先來報云十二十三日可到俟衆兵齊集之後遣人至索岳爾濟山吳爾揮地方探候大軍信息倘有厄魯特警報出兵之際宜暫停收取巴爾虎俟事畢回時將巴爾虎收取或抗拒或逃遁酌量施行乞大部一併議定報聞丙子駕至席喇布里圖畱牧喀倫䝉古王等行慶賀禮畱牧喀倫之阿覇垓王吳爾占噶喇布達馬林渣卜蒿齊忒王達爾馬幾禮第雅木披爾阿霸哈納爾貝勒卜昭貝子額林辰達席協理吳爾占噶喇布王旗分事務貝子車林敦多布協理旗分事務台吉德木楚克等來迎聖駕慶賀𠞰滅噶爾丹在行宮前三跪九叩頭禮畢傳上諭曰爾等意中曾料朕此行所乘之馬可直抵克魯倫立奏大功而還如是之速乎其直陳之朕尊為天子富有四海在京時飲食宴樂無不備具皆爾等所共知此番出征朕日食一餐羊肉以外並無猪鵞等物夙興夜寐櫛風塵而沐雨雪每至一處朕皆歩行及聞噶爾丹確信朕親率前鋒窮追凡此特欲速滅兇冦使爾等衆扎薩克得安生之故耳今噶爾丹已滅喜奏膚功不但爾等此後永無侵擾之虞得享昇平之樂朕亦不復為爾憂勞矣王吳爾占噶喇布等跪奏云聖主垂問臣等安敢隠昧我等䝉古地方三四月間草不萌生牲畜饑瘦皇上念我外藩䝉古不辭勞苦七十日之内於無水草之地行三千里立滅一大國所乘馬匹騰驤而回誠世所罕有之奇事乃天佛特相祐助耳噶爾丹為人兇惡侵掠我外藩䝉古任意縱横未有敢與抗敵者今我皇上加以天威霆撃電掃不但我等䝉古世享太平之福萬邦之人聞皇上聖德神功若此誰不傾心歸服傳諭曰此番出兵各旗蒙古王貝勒台吉等於引路探信牧馬掘井諸事甚為効力凡差遣處隨所指使無不應機各當誠屬可嘉朕必使各得生計重行賞賚至於喀爾喀等此番亦甚効力朕先以喀倫之内視為一家今土喇克魯倫以内皆為一家矣吳爾占噶喇布等叩頭奏云臣等受皇恩深厚於軍國之事自當効力今皇上又沛綸音如此軫念臣等更有何言但願仰托皇上洪福優游樂業子孫世世効犬馬之勞而已皇太子奏至言五月十九日接到諭㫖進皇太后覽奉皇太后㫖前所遣書來知噶爾丹聞大兵聲息殺其妻子棄其生計逃遁予心已即欣喜今更悉如皇帝籌畫果與費揚古兵遇先戰一次擊敗之再戰大敗之予聞不勝欣喜皇帝之威福天地祖宗皆同眷佑所到成功奏凱而還予惟叩謝天地神祗中心悦豫並問皇帝安好又奉諭㫖宣示宮中訖又奏言臣奉皇父㫖留居京師伏念皇父俯為生民勤勞聖體殫竭心思馳驅跋渉深入喀倫以外無水瀚海北邊之地臣晝夜憂念於心前聞近克魯倫冦所居處天威所至賊聞風逺遁今又於五月十九日捧接皇父頒到諭㫖聞大將軍伯費揚古兵至殄除賊衆喜音臣不勝懽慶謹拜天以謝此皆皇父預料逆賊决䇿破滅籌畫素定分路遣發大兵調度期會盡善之所致也黎庶得以安息皆皇父念切國家民生感通上天之故即傳集文武羣臣宣示㨗音咸令聞知臣奏請往迎皇父候諭㫖一到即便起程急欲瞻仰天顔以抒誠懇之念孺子依戀之心為此謹先稽首申賀奏至得㫖用兵事務京師喜聞㨗音故接連馳報今武功吿成惟迅速還京此外更無多語也上諭皇太子曰遣中使之後德木楚克台吉於二十一日到云十八日曾見兩處將軍會合賊於伯費揚古軍中投順者回子之阿卜都什汗厄魯特之車林渣卜台吉巴爾台吉顧魯黙爾根台吉韓度台吉梅寨桑馬木顧英寨桑厄林辰哈什哈顧英寨桑畢車七大喇嘛畢西勒爾綽爾濟被大兵𠞰殺之後來降之厄魯特云丹濟喇於交兵時未動師敗自刎阿喇卜灘兩處著傷未見脱出曾見其所乘之馬殆亦死矣吳爾占渣布死于陣前噶爾丹所率約十人奔僧枯爾上流前往噶爾丹有言今已矣難以存留惟前往不拘何地饑餓以死而已如此怨咎而行此番被殺與投順者朕皆素知為噶爾丹信用之人今已殆盡但伊喇古克三庫圖克圖丹津三人未知消息投順于費揚古之人二千有餘投順馬思喀之人五百有餘將軍等遣人四面覓其踪跡脱去無多擊賊之地我兵常隻身獨行檢尋賊物有廓然蕩平景狀朕曾遣侍衞馬五往觀俟回日明白詢問再諭朕恐汝等懸念故屢示之將此情形于皇太后前奏聞丁丑駕至烏喇爾幾地方駐蹕命留米于西喇布里圖上諭行兵部曰同知韋國佐所運米一百石著留於西喇布里圖驛俟大兵到時散給兵丁諭曰給米之事闗係甚要前途無一大臣遣人至于成龍處令乘自用之馬速來命查收達賴喇嘛交通噶爾丹書札上諭内大臣索額圖大學士伊桑阿曰令行文大將軍費揚古馬思喀等著徧諭我兵及扎薩克蒙古喀爾喀沙木巴王等王貝勒貝子所屬人並投誠厄魯特等將達賴喇嘛班禪庫圖克圖第巴交通噶爾丹之文或唐古特字或蒙古字俱查明收取交一曉事賢能官作速馳驛送至御營事件不可遺漏戊寅上駐蹕蘓德圖户部奏請撥給現在御營人口七日米糧奉㫖交與于成龍著大學士伊桑阿看給命沿途休養士馬上諭行兵部曰自喀喇芒鼐以前其草甚茂著諭後營大臣疲乏馬匹不可遺棄須從容調養務令前到歩行僕從亦必加意撫恤勿遺一人前令歩行僕從所到驛站即與飯食曾經給發米糧今朕回鑾途遇歩行僕從人等問之驛站並不給飯著傳諭各驛站自此以後若遇歩行僕從務與飯食酌量給米遣發至交與疲乏馬匹必揀水草佳處牧放回時交還本主留皇長子於大兵後沿路稽察如有違悞不遵者察出定行正法决不寛恕命于成龍李鈵喀拜分駐三處供應大軍糧餉上諭議政大臣等曰給散在後二路大兵米糧闗係緊急著于成龍李鈵喀拜三人於拖陵駐一人蘇德圖駐一人拖陵蘇德圖之間駐一人應付大兵米糧除已過拖陵之米不議外其纔到拖陵之米著暫留拖陵前路若有取用候明珠移文運往其已出喀倫未至拖陵之米免運至拖陵隨所到之地即行留貯已有明㫖諭皇長子及内大臣明珠矣其未出喀倫之米亦免前來隨處留貯俟大兵回時沿途應付此應付米糧之事亦已明諭皇長子及内大臣明珠其已出喀倫未出喀倫之米除應給大兵外所餘米糧運至一緊要處或賑濟窮蒙古或别有取用再行定奪爾等會議具奏隨議上諭已極周詳俱應欽奉而行其左都御史于成龍侍郎李鈵左通政喀拜俟奉㫖派定各駐一處之後再移文皇長子併内大臣明珠得㫖著于成龍住拖陵李鈵住拖陵蘇德圖之間喀拜住蘇德圖己卯駕至科圖命安郡王馬爾渾暫駐喀倫愛必罕西喇穆冷地方上諭内大臣索額圖等曰駐扎歸化城安郡王馬爾渾等著往艾巴哈西喇穆倫之喀倫於大兵進喀倫之前暫行駐扎如有厄魯特潰散逃竄來投降者令其收取安郡王等無兵如有用兵處可酌調附近蒙古兵如無用處不必調遣命加恩喀爾喀從征諸部長上諭理藩院曰此番出師喀爾喀之扎薩克等隨朕前來一無俘獲而服役甚勞著賞車陳汗銀一千兩緞十疋若彼已歸可即使人送往其餘扎薩克等各賞銀三百兩内扎薩克貝子盆楚克著傳㫖諭云爾此番甚著勞績俟至京之日議定應封爾何爵即遣人賫勅印往封又協理旗下事務人員著各賞銀一百兩將此交明尚書庫勒納又喀爾喀公車木楚克納木渣爾旗下鄉導齊旺言我喀爾喀遭亂之時臣妻與妹俱被厄魯特阿拉布灘等擄去今既大破厄魯特奪其子女設或尚存伏乞聖恩給臣完聚為是叩閽上諭侍郎安布禄曰鄉導齊旺此番頗有勞績著理藩院移文大將軍伯費揚古若齊旺之妻與妹尚在著察出給與完聚庚辰上於塔爾奇喇賜留牧阿覇垓王吳爾占噶喇布達馬林渣卜蒿齊忒王達爾馬幾禮地雅木披爾阿覇哈納爾貝勒卜昭貝子額林辰達席等宴賞王貝勒貝子銀各三百兩台吉等銀各一百兩原封喀爾喀扎薩克貝子伊爾登濟濃達禮等喀爾喀台吉之妻等皆衣蟒服喀爾喀男婦扶老携㓜以及孺子齊集行宮東門匍伏稽首跪奏曰噶爾丹乃我軰大仇恃其强悍䖍劉我軰已至極矣今不意噶爾丹亦有䘮亡之日也皇上從天而降滅此兇冦救我喀爾喀通國之患實非常之舉我軰今已得報之矣請謝皇上再造之恩傳諭曰朕君臨天下統御萬邦本無分於内外即海隅荒陬皆吾赤子一體眷念厄魯特噶爾丹逆天肆虐恃强陵弱擄掠喀爾喀等國故朕不辭勞瘁親統大兵征伐𠞰滅今厄魯特之禍靖則朔方永清矣汝七旗喀爾喀自今以後各自樂業圖報國恩以副朕家視天下之至意原封貝子伊爾登濟濃達禮等稽首跪奏曰臣等先為噶爾丹所敗窮迫已甚特投聖上而來聖上將我軰容納恩養後噶爾丹又侵據我土地肆行擄掠䝉上恩恤令我軰移居喀倫之内今又𠞰滅噶爾丹以紓我軰之大患自今以後我軰子孫世世得安生業者皆我皇上之殊恩譬人賴天之覆恃日之光以生皇上即我軰之天日也但祝聖壽萬年與天日同悠久耳又我軰衆人數百里拮据而來祈得仰瞻天顔再四叩懇奏入上命以次引入幔城進見衆皆叩頭呼萬歲皇上隨宣訓諭均賜茶出復遣掌膳章京莫洛渾等賜宴仍賞銀幣衣服有差又阿覇垓王卓禮克圖母妃王吳爾占噶喇布母妃各賜衣一襲及銀幣自是以後至獨石口皆依此例每日汗王貝勒台吉等來行宮外行慶賀朝謁禮者甚衆坐立之處至不能容䝉古有名喇嘛及王貝勒福金等男婦挈羣而來者如歸市無論貴賤悉出誠心貢獻駝馬牛羊不可數計駕行時男婦老㓜羣集拜跪路傍合掌稽首絡繹不絶附近衆扎薩克及牧塲䝉古率妻子迎獻酒漿酥酪者沿途環擁上有時下馬令衆皇子文武大臣侍衞侍坐取䝉古等所獻分頒飲啜凡執事以及僕從均得沾渥䝉古來迎男婦以及稚子皆令環坐賜以酒脯歡聲動地謳歌遍野命獨石口内五站豫備香薷湯上諭行兵部曰獨石口内五站每站各煎香薷湯豫備以酌飲凱旋軍士時方五月下旬盛暑之際車駕所至或隔宵降雨或日間隂雲輕翳氛埃不起凉爽襲人直抵京城類皆如此命皇長子回京師上諭行兵部曰皇長子令回京其散給軍糧事務交明珠于成龍可也壬午上駐蹕蘇勒圖喀爾喀折卜尊丹巴庫圖克圖土謝圖汗西地西里貝勒同衆台吉至慶賀𠞰滅噶爾丹因請謝恩上召入行宮内見之土謝圖汗率西地西里等叩頭上曰爾年已老不必叩頭命扶起土謝圖汗跪而固請曰噶爾丹係臣大仇事皆由臣而起臣已年老欲見噶爾丹之殱滅度必不能念已絶矣今得目覩夢寐中亦不料及此臣死亦無憾矣伏惟皇上不自惜勞苦軫念衆喀爾喀等遭罹患難將狡惡兇賊噶爾丹立行𠞰滅如此洪恩大德衰朽殘軀敢不叩謝奏畢叩頭不已上命御前大臣扶起賜坐土謝圖汗復跪奏云臣之隨往出征人等言皇上夙興夜寐日食一餐一應大小事務俱出睿裁焦勞至極此舉特為七旗扎薩克喀爾喀驅除災害使得永享安樂臣今年老不能効犬馬之勞惟教臣子孫世戴洪恩以圖報效臣喀爾喀等國雖滅較之噶爾丹之滅尚覺榮幸曩臣等七旗扎薩克喀爾喀雖為噶爾丹所破臣等尚識時勢將妻子及所屬人等保䕶來歸皇上䝉我皇上廣如天之仁即納臣等仍復舊封享受皇恩如此顯耀今噶爾丹悖天縱惡天威甫臨其國立亡妻子被戮不能保䕶一應奴僕牲口盡為俘獲雖帶數十騎隻身䑕竄終不能脱死且無葬身之地矣臣較之噶爾丹相去懸絶奏畢傷感淚下上温㫖安慰之折卜尊丹巴庫圖克圖俯身合掌奏云我係出家人以殺生為戒不敢行慶賀禮但驅除兇暴以安衆生者乃佛經之所崇重皇上欲使宇宙羣生各得其所親歴諸般勞苦立奏絶世膚功我喇嘛不勝驚異自此以後惟願皇上萬壽無疆日於佛前誦經祝禱而已癸未駕至察罕諾爾撫逺大將軍伯費揚古平北大將軍馬思喀等奏至疏曰五月二十一日副都統阿南達至傳諭曰西路糧餉未到軍前朕深切軫念如之何則可爾兩大將軍會議欽此臣等查西路大兵五月十三日於昭莫多地方仗聖主神威大敗噶爾丹後撥給察哈爾叅領品級章京塞音察克察哈爾兵一百名酌量派給官員遣往翁金有零星結夥覓食散行之厄魯特亦未可知遇時即行𠞰殺并令曉諭翁金看守米糧之西安副都統西爾哈達與運糧侍郎王國昌等又移文副都統西爾哈達侍郎王國昌等言託皇上洪福大敗噶爾丹或有零星逃散妄行竊盗者亦未可知米糧闗係甚要應加意防守嚴緊斥堠若遇厄魯特人即行𠞰殺知會後又撥給察哈爾叅領阿木胡郎等察哈爾兵二百餘名酌量派給官員令往迎米糧交戰地方山林之内或有零星逃散厄魯特人亦未可知遇時即行𠞰殺米糧到時防䕶向大兵前來本月二十一日又遣喀爾喀昆都倫波碩克圖多羅郡王滾布旗下色爾濟等十人照上諭謄寫賫送齊思希忒克木齊克等處尋覓根敦代青去矣我皇上意圖萬全因西路糧米未到奉諭極其周詳臣等議派出中路前鋒百名䕶軍百名揀選西路前鋒䕶軍驍騎百名每旗派章京一名每翼派夸蘭大一名正欲遣往臣費揚古所遣往迎米糧駱駝及正卿辛保侍讀學士范承烈總兵官毛來鳳郎中鄂奇等自備駱駝二十九隻所載趕送大兵米糧於本月二十二日已到其留於翁金之米正卿辛保等送往那拉特地方運送之米既到此後並無可慮之處故停止派遣兵丁為此謹具奏聞命示議政大臣命賜土謝圖汗折卜尊丹巴庫圖克圖各銀一千兩多羅貝勒西第什里銀三百兩命賜土謝圖汗諸台吉妻女銀一千四百二十兩命賞修道鑿井監牧人員先是上諭侍郎安布祿等曰阿霸垓兩旗阿霸哈納爾兩旗蒿齊忒兩旗内此番修路掘井牧馬之台吉官兵等職名著照吳爾占噶喇布王所開翻譯奏覽至是安布禄等奏言此次修路掘井牧馬之䝉古台吉官員兵丁俱於所司之事盡心効力應欽遵上諭加恩賞賜阿霸垓兩旗阿霸哈納爾兩旗蒿齊忒兩旗以上六旗台吉一百四十三名舅舅子孫三名應各賞銀五十兩都統三名副都統四名各賞銀二十五兩叅領四名長史三名各賞銀二十兩一等䕶衞七名佐領三十八名各賞銀十五兩䕶衞三十五名典儀三名達爾漢一名驍騎校二十四名各賞銀十兩兵丁附丁共二千二百零八人各賞銀五兩兵銀一萬九千九百六十兩將于成龍帶來銀内動用現今六旗扎薩克王貝勒貝子贊理旗下事務台吉等俱在此處應交與伊等使賞各旗下台吉官兵等俾沾皇上實惠奉㫖此次賞賫將蘇尼特兩旗亦入此數内再召尚書班第著馳驛前來到時著照前議監視行賞其餘銀兩不必隨朕帶往著留此處現有員外郎帖圖一人在此再將部院才能官員派出一二人同帖圖管理所留此處銀兩馬匹僕從人等等候大兵于成龍所運之糧既無用處若使載回反勞牲口人力留此備用似猶有益著將此即行會議隨議上諭極其周詳俱應欽遵諭㫖行今應往召尚書班第將蘇尼特兩旗之修道掘井坐塘台吉官兵數目查明照賞阿霸垓等六旗例亦將于成龍賫來銀兩支賞之此賞八旗人員之處交明尚書班第及扎薩克王台吉等或賫回本處賞給或俱傳集於察罕諾爾地方班第親同扎薩克等會同監賞著班第酌量而行將于成龍賫來銀兩現在此處者即行賞給餘銀即留貯此處俟尚書班第至時賞給阿霸垓等八旗之修道掘井牧馬及坐塘之台吉官兵其餘仍交于成龍原賫官員人等賫回京城于成龍所運之米已過察罕諾爾者著撥給後隊官兵餘俱令載回察罕諾爾地方其未至察罕諾爾之米及和爾博以南驛站所留之米亦交于成龍等俱運至察罕諾爾地方或酌量收貯此收貯之米著于成龍等小心謹慎苫葢堅固勿使雨水浸濕以致霉爛察罕諾爾地方去蘇尼特阿霸垓部落甚近量派此六旗官兵著輪班看守此處所留人衆牲口銀米甚多今祗有帖圖一人著再留隨征之給事中能泰李沙會同料理將此所留人馬俟後隊兵至時各交明本主尚書班第于成龍李鈵喀拜等至時著同派官兵交明米石再回京城其取用所餘銀米之數著尚書班第于成龍等奏明存案奏入奉㫖依議皇長子𦙍禔奏報撥給米糧事先是上諭皇長子曰大兵糧餉若尚可支幾日將這一路糧餉爾與明珠商議沿途節次存貯隨大兵所至地方支給則車輛牲口俱得歇息兵餉亦不至有悞至是皇長子奏曰臣等自克勒和朔運往迎接大兵米一千零十九石麵七千觔内除給過往迎西路運留特勒爾濟地方米糧官兵外所餘米麵俱撥給撫逺大將軍官兵矣今現到克勒和朔米二千零二十四石五斗麵四百觔將此米除給平北大將軍官兵一千石外餘米一千石麵四百觔再給撫逺大將軍官兵兩路大兵既有此米已可至拖陵地方現今拖陵有運到米三千一百石零為此移文于成龍著沿路運糧夸蘭大官員等將未到米糧接續於驛站處停止外又遣郎中噶禮隨其所遇著於驛站處停止又奏曰奉到勅令臣回京謹將糧務交于成龍明珠臣身於二十六日自拖陵起行矣報聞甲申嚴飭擅用官馬諭行兵部曰朕回軍以來於沿路沙岡處見于成龍等所留挽車牲口盡皆肥壯至揀選帶往前去牲口則疲瘦者多捐運贖罪人等將官馬䭾載伊等私物以致糧餉顆粒亦不能依限至克魯倫此皆由于成龍等留肥壯馬匹在後捐運贖罪者將肥馬擅䭾私物遲悞官糧朕路遇捐納人等用肥壯馬䭾載私物者痛惡之已將馬追取散給兵丁矣將此移文知㑹于成龍定凱還吿廟迎賀禮禮部奏言今皇帝親統六師𠞰滅噶爾丹查太宗皇帝往征朝鮮受降還師諸王大臣上表迎接進京之日詣堂子行三跪九叩頭禮又吿祭太廟又查明朝永樂年間上躬率師往征䝉古回京之日遣官吿祭天地宗廟陵寢承天門旗纛之神布告天下陞奉天殿受臣工表賀今皇帝大㨗回鑾進京之日應自和碩親王以下有頂帶官以上俱穿蟒袍補服過清河郊上跪迎排列儀仗自土城至堂子從軍不從軍諸王大臣皆隨皇帝赴堂子聽鳴贊傳呼行三跪九叩頭禮畢排列儀仗自堂子至午門皇帝回宮其獻表慶賀告祭宣布天下應行事宜俟皇帝回宮之後逐一查明議奏上命議政大臣集議隨議皇帝親統六師謨略預定𠞰滅噶爾丹功德甚大古無與倫應行典禮俱應如禮部所奏上從之上諭皇太子曰朕入喀倫見草長甚佳諸人之馬留在喀倫者皆更肥壯衆蒙古云比數載以來不曾見如此草長茂盛雨水調匀之年自今春牲畜肥壯四種牲畜之孳息並無損傷此皆我聖主所賜福慶惠及我等者又内扎薩克喀爾喀翁嫗及婦人稚子迎於路次喜而言曰以我聖主之威福不惟一噶爾丹即十噶爾丹大兵一至亦立刻破滅矣今聖主建立大功奏凱而還我等來迎叩首從此共樂太平又有老婦等言我等初以為聖主不在富盛之地寳幄之中安居逸樂而當此寒苦之時何為來我曹此等地方我等聞逺過瀚海前往克魯倫河我等老朽之人不覺眼中流淚每日哭泣意中思念我主為何深入如此荒逺悍惡之敵地忽聞將噶爾丹𠞰滅奏凱而還方知我威武聖主之來誠大慶幸也若非如此我等今生何以生活皆觀欣忭喜謂胸懐得以開暢稽顙至於破裂笑者哭者一時雜遝今正蒙古牲畜肥壯之時極為殷阜較我師去時逈相懸絶比時未經遣聞今特諭知可進皇太后慈覽並使宮中知之聖祖仁皇帝親征平定朔漠方略卷二十五

body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷四十一乙丑訓諭武臣撫恤兵丁上御行宫召川陜總督吳赫西安副都統阿蘭泰寧夏總兵官王化行原任總兵官王潮海馮徳昌副將髙永乾許萬道員吳秉謙遊擊胡琨姜竒陳良弼張髙張法鄧茂公叅將馬濟入賜食進諸臣而訓諭之曰朕往者未嘗臨邉不獲目覩邊地之苦今廵行至此視沿邊地方百姓土瘠人貧但兵丁甚精鋭黄河以西榆林一帶城池兵丁比他處實勝然而兵雖良必有撫綏訓練之人乃克有濟如不善撫綏而困苦之則兵雖良無用也善撫綏者不扣取兵丁應得錢糧如數支給自足養其身所謂養兵之道即此是矣若不知撫恤雖多給國帑兵丁斷不能沾實惠爾等武臣出身行伍者多豈有不知兵丁之苦者乎一旦居官頓忘在昔為兵之苦而扣尅糧餉于心何忍今雖末員當計日後漸臻大任可不存良心愛惜兵丁乎朕又聞營中虚懸兵數冒食錢糧各處皆然陜西尤酷此雖不可全信大略皆如是也且或聞朕來現招以補足原額者亦有之總之爾等督撫提鎮俱當盡心體恤下寮爾等若不受餽獻則下寮不致貧苦下寮既不貧苦則斷不剥兵而虚冒扣尅矣爾等大小官員各有俸禄養亷衣食並無所缺倘扣尅虚冒即罹于罪關係利害不輕即今總兵官柯彩練兵甚精前亦曾經効力後以操守不佳致人疾怨朕撤柯彩回京大都武臣之中勇敢果毅出力効用者多而操守潔清者少或愼于履任之初而渝于後者亦有之趙良棟性格雖與人不相合而操守甚佳恢復成都之時亦嘗有所掠取然而不甚悖理及復雲南秋毫無犯此亦彼强於人處也以此觀之武臣之中如趙良棟者可謂良將矣爾等居官俱當法之但不可傚其驕矜耳又聞總兵官師帝賔操守甚清居官如此雖身後而軍士尚愛戴之凡有功而人强者朕皆擢用矣但一時聲名無不佳者日久而變節者多此皆年齒漸増貪貨賄計身家而然坐此失者比比也爾等其遵此訓㫖通行曉諭又諭大學士伊桑阿曰著將出征五百緑旗兵賞銀各二兩今即頒發查隨駕兵丁應給行糧至何月為止來奏至庫勒納解來駝騾着與兵部同閲具奏命减兵覈餉進追噶爾丹上諭将軍馬思喀等曰今噶爾丹窮廹已極兵多則用之不盡而進發亦覺繁重此但用䕶軍鎗手六百前鋒五百烏拉兵四百緑旗兵五百二千兵即足矣前鋒烏拉兵俱已𣲖出應給伊等馬駝之數俱已奏訖䕶軍鎗手驍騎礮手伊等馬四匹外再各増給一匹即取所留四百兵内之馬以為五匹除有駱駝之兵外無駱駝兵丁每二人合給駱駝一頭将所需駝馬及所㩗四個月米數查明算奏議政大臣等僉曰皇上睿慮所及諭㫖已極周詳皆當謹遵行之應將前鋒八百内連前鋒校發五百名㽞二百九十七名前鋒叅領侍衛盡行𣲖出所發前鋒五百名以每人各馬五匹算所需馬二千五百匹除有駱駝之一百二十二人外其三百七十八人以每二人合駱駝一頭算所需駱駝一百八十九頭將䕶軍鎗手一千内發六百名留三百九十四名每旗有實授叅領二員委署叅領六員以此于所留軍中每旗留署叅領一員所發署叅領䕶軍校四十員以毎人現騎官馬四匹算共馬一百六十匹䕶軍六百名以每人各馬五匹算共需馬三千匹除有駱駝之二十九人外其五百七十一人以每二人合駱駝一頭算所需駱駝二百八十五頭又所餘一人給馬一匹後増發聼差四員請停増馬以毎二人合駱駝一頭算所需駱駝二頭帶來景山礮二門停其帶往毎旗帶來子母礮三門各留一門此所留之礮毎旗各留叅領一員驍騎校一員小校及驍騎十名毎旗帶往之礮各二門各發叅領二員驍騎校二員八旗小校驍騎一百六十名伊等亦以毎人各馬五匹算所需馬八百匹以毎二人合駱駝一頭算所需駱駝八十頭䭾礮之馬五十六匹駱駝三十二頭将烏拉兵四百全發此内夸闌大八員伊等以毎人各馬六匹算前鋒叅領六員驍騎叅領十六員伊等以毎人各馬五匹算散騎校五員筆帖式一員伊等以毎人各馬四匹算兵四百名伊等以毎人各馬四匹算所需馬一千七百八十二匹共官三十六員以毎人各駱駝一頭算兵四百名以毎二人合駱駝一頭算共需駱駝二百三十六頭將軍薩卜素增給駱駝四頭馬一百十八匹緑旗兵五百名本身馬各一匹再各增二匹為三匹算所需馬一千五百匹以毎二人合駱駝一頭算所需駱駝二百五十頭其䕶軍校前鋒䕶軍鎗手驍騎礮手及䭾礮之馬共需馬六千五百十七匹将所留之前鋒䕶軍驍騎礮手馬内擇其肥者抵換帶往其烏拉官兵四百所需馬一千七百八十二匹及増給将軍薩卜素之馬一百十八匹將學士朱都納所喂之馬撥給其緑旗兵五百所需馬一千五百匹將其所駐緑旗兵之馬内擇其肥者帶往前鋒鎗手䕶軍驍騎礮手䭾礮聼差人員烏拉官兵緑旗兵共需駱駝一千七十八頭將尚書庫勒納等解到駱駝一千一百三十七頭及捐助駱駝四百頭撥給共二千四百九口毎口一月以倉斛二斗算所攜四個月米共需一千九百二十七石二斗奏入上曰可聽差人員不必帶往又諭侍郎安布禄曰充使出差察哈代之妻吳罕子阿木尊察陵三口在吳喇忒公達爾馬什里旗下副都統阿林袞家著諭該部乘便行文送張家口交郎中滿都可也陜西總督吴赫請自内地囘鑾不許吴赫奏曰近奉㫖駕廵邊外竊思西安府乃厯代帝王建都之地名山大川古聖賢之舊蹟甚多路坦易行且臣自西安來時沿途耆老軍民聨羣結隊向臣言曰我陜省連年大旱無收百姓俱至流離皇上好生如天蠲免歴年錢糧特差大臣賑以帑金運致米糧以甦民命家給牛種使之稼穡陜省百萬餘人此數年收穫得以更生者皆皇上之浩蕩宏恩也我等小民無以報答但日祝萬夀無疆而已今皇上經理軍務臨幸邊境祈至西安諸處使我等瞻仰天顔叩謝再造之恩稽顙籲請臣已許其轉達而來祈皇上俯慰兆民顒望之誠從内地囘鑾上曰朕臨寧夏原為調兵以滅噶爾丹也今噶爾丹尚未就擒朕由邊外往相機而行于此一舉務成大事不得從内地行吳赫又奏曰陜西幅􅊷遼濶闗隘險要臣等守斯土者雖諸事皆遵上諭施行不能仰副聖意之事多伏祈皇上親臨指授實於地方有益且陜西流離之民蒙皇上殊恩今已盡還原籍安生樂業皇上務乘此便幸臨閲視上曰陜西距京甚近至無事之時朕當特來也吳赫又再三懇請上竟不允庚寅厄魯特台吉阿喇卜灘丹津俄木布遵㫖絶噶爾丹先是遣筆帖式黒色長史馬尼圖等賫勅往撫厄魯特台吉阿喇卜灘丹津俄木布至是大將軍伯費揚古等奏言准侍郎滿丕咨稱閏三月初四日出差厄魯特筆帖式長史馬尼圖等還言職等正月十八日至阿喇卜灘所居布顔圖郭兒河見阿喇卜灘夫婦授以勅書宣諭㫖畢阿喇卜灘言我請奉聖㫖遷向策旺喇卜灘住阿兒台地方與丹津俄木布同候聖㫖俟我使歸有何諭㫖當遵㫖而行阿喇卜灘使人諾顔格隆臧布阿喇卜灘之妻之使人阿旺達什及其偕來之厄魯特羅卜臧達爾漢哈什哈丹津俄木布妻父之使人察罕台吉之使人臧布及其偕來之厄魯特八人回子七人婦人㓜童九口與職等同于二月十八日起行前來職等到彼授以勅書見阿喇卜灘夫婦言語一摺乞交驛逓送等語又阿喇卜灘等使人言阿喇卜灘丹津俄木布察罕台吉各有一奏摺是以令諾顔格隆臧布乘驛起行外併將黒色馬尼圖奏摺發去等因據此令督驛員外和尚往迎黒色等先發黒色等奏摺呈覽其奏摺内言臣等奉㫖於正月十八日至阿喇卜灘所居布顔圖郭兒河遣告阿喇卜灘以我等前來之故阿喇卜灘遣人迎臣等入阿喇卜灘家接㫖之時阿喇卜灘夫婦皆跪恭敬捧受臣等宣聖諭訖阿喇卜灘答言聖上勅書内令我及丹津俄木布不得與噶爾丹同處若不相疑可即前来務使爾等得所若或相疑可往附策旺喇卜灘勿居額黒阿喇爾齊什希洪郭羅之地勅書内開有丹津俄木布及我二人之名理宜我二人同覆聖㫖柰丹津俄木布先在洪郭羅之地後聞丹津俄木布自洪郭羅出居埀地汝等若往路逺而有盗賊我當遣人至丹津俄木布處我則仰遵諭㫖移於近地希沐皇恩但我下人難以遷移噶爾丹又現居其間難以前往我仰遵上諭移往䇿旺喇卜灘國界居住同丹津俄木布候㫖今我使人臧布諾顔格隆與汝等偕往一唯聖上有何諭㫖請遵㫖行之阿喇卜灘之妻言吾母吾弟沐聖上隆恩俱得其所矣聞聖上眷恤逈異於諸喀爾喀我不勝歡汴感戴丹津俄木布使人羅卜臧達爾漢哈什哈于二月十八日至臣等處告曰丹津俄木布居于垂地聞聖上勅書天使到來極其懽忭欲來而路逺春時馬瘦不能前來謹繕疏覆㫖令我等賫捧而來同汝等往使臣黒色馬尼圖於二月十八日率阿喇卜灘使人臧布諾顔格隆丹津俄木布使人羅卜臧達爾漢哈什哈等起行而來矣阿喇卜灘疏言自厄魯特喀爾喀交惡以來我軰附從博碩克圖汗之事已在皇上洞鑒中而聖度如天俯恤臣等諭使離博碩克圖汗臣已離之奉皇上勅諭如不信朕可往投䇿旺喇卜灘大君慈㫖真實不虚臣有何疑但臣向居阿兒䑓是以遣使于䇿旺喇卜灘之時已與丹津俄木布同往阿兒䑓居住嗣後伏祈垂鑒如長江流水加恵不絶丹津俄木布䟽言傳諭諸國同歸禮好如岡如陵永逺堅固不勝欣悦臣亦仗佛天覆庇平安得歸夲地矣又云臣向因愽碩克圖汗恩如慈父是以勤䕶宗門附從同行其時厄魯特喀爾喀禮信未隳儼然安好自是以後所行不合臣心不服即出歸吾土矣皇上仁眀海量撫養我地往降之人同普天生靈咸俾得所是以奏請為我等調劑嗣後伏祈垂鑒如恒河江流加以仁惠察罕台吉疏言聞皇上萬安不勝欣忭臣于此地與丹津俄木布俱佳兹遣臧布阿児達爾俄木布往請皇上萬安伏祈大君鑒恤侍郎安布禄為之呈奏上以示議政大臣咸曰阿喇卜灘等所差使人諾顔格隆臧布等賫來進上之物及交市之物俱留於邊哨外侍郎滿丕處應将所留人畜貨物及進上之物俱取至歸化城伊等俱著滿丕于附近部落酌量撥人送至歸化城交都統等存視俟去使歸日再議上從之尋筆帖式黒色等至上前靣奏後上諭議政大臣曰著將阿喇卜灘使人諾顔格隆臧布額爾克俄木布阿旺達什令送往侍郎滿丕處于彼地所留人内聼彼酌帶二十許人而往其途中病留丹津俄木布使人達爾漢哈什哈羅卜臧之缺填回子盆楚克拜之名其偕來察罕台吉使人阿兒達爾俄木布之名填于勅内即令彼帶回達爾漢哈什哈羅卜臧既已身故著長史馬尼圖還伊等既到滿丕處前去之時著滿丕于附近部落酌取馬駝亁糧等物給足遣之其餘人員帶來貨物俟伊等去後再行請㫖大將軍伯費揚古以撥發官兵嚴備喀倫事奏聞費揚古奏言准侍郎滿丕咨稱閏三月初四日喀倫送到厄魯特恩克言我乃格壘之人隨格壘來降聖主之時中途被伊拉古克三庫圖克圗所掠前行二日至訥墨黒圖地方住二十餘日我乃竊他人馬鳥鎗一桿逃出我前在彼處出入伊拉古克三庫圖克圖左右其下人大小共有百人伊拉古克三庫圖克圗言欲在厄濟内古爾喀尼居住盗黄河崖邊居人馬羣職滿丕隨遣人移文喀爾喀扎薩克公吴巴達萬舒克台吉圖巴丹津額爾徳尼等令將彼旗下人速收入内其扎薩克夲身協理台吉都統副都統酌量帶兵各在夲旗地方加意防備將各旗探哨逺行設立又移文黄河三哨協理台吉令速遣喀爾喀副都綂阿穆呼郎逺展哨探謹慎預防等因看得伊拉古克三庫圖克圖窘廹已極未必不至喀爾喀所居界上行竊是以臣等發察哈爾哈兵一百五十衆札薩克蒙古兵一百五十交散秩大臣吳巴什郎中諾木齊代往駐喀爾喀所居界上形勢之地如伊拉古克三庫圖克圖前來行竊爾等即行撲勦擬於閏三月初七日發行俟大兵自寧夏起行日期部文到臣撤回吳巴什所領兵為此奏聞上以示議政諸臣命遣大臣監發將軍薩卜素官兵馬駝上諭黒龍江將軍薩卜素曰所給爾等官兵之馬何日給發著與議政大臣會議來奏奏後朕遣人閲選給發議政大臣議撥給將軍薩卜素官兵馬駝擬於十二日給發撥給之後尚有數日屯劄仍請給支草料上從之遣公福善親隨侍衛關保侍衛阿兒柱馬什閲選駝馬給發送格壘沽英等妻子至歸化城大將軍伯費揚古咨理藩院曰康熙三十六年三月二十八日侍郎滿丕處解到降人格壘沽英婦女童穉十口曼濟婦女童穉四口馬五匹駱駝二頭鳥鎗二桿撒袋一副已交驛逓解至歸化城往交副都綂阿廸等因侍郎安布禄為之傳奏上以示議政諸臣是日格壘沽英祁薩木到辛卯上誡諭督撫提鎮愛兵恤民上諭陜西總督提督廵撫總兵官等曰朕宵旰勤民慮周遐邇縁向來廵幸未經親蒞邊境頃特濟河而西循秦省沿邊地方延覽風俗諮詢疾苦見所在兵民築土屋以為居耕沙磧以為業生聚之計甚屬艱難朕惻然於𠂻軫念弗釋因思兵民倚賴全在將吏而將吏之表率惟督撫提鎮是視誠使督撫提鎮實能正已澄源則所屬守職奉公禄足自贍必無朘削兵民之事若積習相沿濫受屬員私饋因而所屬官弁節次求索取償於下文則加徴無藝武則侵扣月餉勢不至于厲民剥兵不止如此而欲冀其疾苦日蘇生聚日盛烏可得乎夫秦地俗尚素稱簡樸邊方士卒允屬精鋭總恃撫馭得人斯於兵民胥益朕兹駐驆寧夏特召該省總督總兵官以下官員凡在鎮城者俱賜宴行宫靣加諄諭無非期望文武大吏董率屬員以仰副朝廷愛兵恤民至意自今以後爾等其益體朕懐交相砥礪文官皆習知民事豈身作官吏不恤百姓之依武職多起自行伍豈甫為將領遽忘軍士之苦上官克謹亷隅屬吏各遵法紀馴至比屋殷阜列戍飽騰則兵民皆得其所而爾等亦與有休寵以視厲民剥兵身名俱隕者孰得孰失爾等其敬念之特諭分撥進勦駐防官兵上諭議政大臣曰前着孫思克博濟發兵三千但兵多則進發繁重今應選出滿洲緑旗兵二千以所留兵丁之馬増給之令攜四個月糧遣赴阿南達所阿南達李林隆率之搜勦孫思克博濟率所留之兵暫駐甘州其于成龍等糧運守候之地亦應令兵一枝駐劄此着西安副都綂阿蘭泰率西安兵三百往戍其留于寧夏之京營前鋒毎旗二十名䕶軍鎗手礮手酌量𣲖出隨駕餘駐寧夏撥一大臣領之着大將軍伯費揚古傳諭附近部落蒙古王貝勒貝子公台吉等有願自備四個月糧随軍効力者許其前來其費揚古軍前所有黑龍江兵一百俱全帶來量四個月口糧選發察哈爾兵攜四個月米來會于郭多里巴爾哈孫地方即令總管此軍至費揚古起行後着舒恕代理其事侍郎滿丕仍駐原戍之地可即㑹議具奏議政大臣議奏曰調遣兵馬諸務皇上一一籌畫聖諭已極周詳俱應敬奉而行俟命下之日檄將軍舒恕孫思克博濟提督李林隆副都綂阿南達侍郎滿丕令各遵行自寧夏前往京軍於厄黒阿喇兒地方搜𠞰噶爾丹糧馬已撥等事亦俱檄之費揚古阿南達可也議入上報可尋大將軍伯費揚古等奏言現在軍前者有喀爾喀達爾漢親王諾内毛明安貝勒班第毛明安扎薩台吉諾爾布本旗恊理台吉博木布吳喇忒扎薩克公杜稜吳喇忒扎薩克公鄂爾奔本旗協理台吉吳爾圖那蘇圖呉喇忒公達爾馬什里本旗署協理台吉勞章什喇卜喀爾喀察哈爾台吉額爾徳尼納木占三盤扎卜車克巴汪扎兒三濟扎卜諾爾布阿喇卜灘達木甘在附近地方者有喀爾喀和碩親王善巴喀爾喀扎薩克台吉吳爾占之協理旗務二等台吉顧穆濟卜閒散台吉龔格汪扎兒圖色拉克衛徴帶青噶木楚克祁他特車卜登達什陳木布納木占率其䕶衛附丁前來籲請情願各帶自已四個月糗糧赴軍前効力其他部落情願前往効力之王貝勒貝子公台吉等俟來報之時彚齊報部奏入命示議政大臣續有喀爾喀土謝圖汗其養子台吉濟克巴願從軍効力貝勒額爾徳木圖額駙班第台吉畢力克喀爾喀扎薩克一等台吉巴郎之子台吉汪布四等台吉薩馬代俱願從軍効力奏入上准隨征命撥大兵食羊議政大臣奏曰是月初九日欽奉上諭着將行糧給寧夏進𠞰官兵副都統阿蘭泰所買羊從多随趕除給兵丁行糧外查阿蘭泰所買羊一萬六千五百内擇臕肥者五千随目下寧夏進勦兵而行此係随軍充糧之羊應交將軍馬思喀等分授八旗緑旗兵趕去其所剩一萬一千五百羊仍交地方官看守停其採買上曰買此羊者原為是軍之備剩之何為着將羊全給是軍食此羊可多行數日矣理邊内邊外運糧安站事上諭議政諸臣曰朕曽以轉運糧餉及隨軍安站之事與鄂爾多斯貝勒宋喇布議之彼奏言當此有青草之候以臣等帶來兵三千足供運糧安站之用應將白塔以外運糧安站事交宋喇布同于成龍等商議而行白塔以内運糧安站事交總督吳赫管理其西安副都綂阿蘭泰兵三百亦交與于成龍又馬思喀帶來之兵若祗自賫口糧一月則其餘三月之糧及随軍所運之糧為數甚多船運一次未必能完勢必再運一次大兵豈能空坐乆待應令馬思喀兵各賫兩月口糧外所餘之米船裝運往船裝不盡者令大小官員均𣲖拴帶而往若復有所餘令于成龍竭力運致白塔此間食過十二日米於衆人均𣲖拴帶米内取之補給随軍逓運之米應至何地應止何地着大將軍伯費揚古議政大臣與于成龍等㑹商定奪着詳議具奏議曰噶爾丹困窮已極仰承皇上指授則進兵運米必無遲悞請令將軍馬思喀兵拴帶兩月糧計二千一十五石大兵自白塔以外拴帶二千一十五石二斗于成龍等随運一月之米一千零七石六斗共米五千三十八石大將軍伯費揚古所帶黑龍江兵一百其察哈爾兵不知數目大約連黑龍江兵作一千算一月需米二百二十石西安副都統阿蘭泰兵三百取西安留下兵之馬三百匹増給前進兵毎人一匹拴帶兩月糧二百六十四石八斗其三個月口糧三百九十七石二斗令于成龍運往其運米官員軍校坐䑓章京筆帖式五個月口糧需六百八十七石因米糧必多備帶往始為有益應連耗米帶一千九百石大將軍伯費揚古兵西安兵運米人員口糧及多帶之米共三千五百石除將軍馬思喀等拴帶米外船裝運往之米三千二十二石八斗儘船裝往如船裝有餘着大小官員拴帶再有多餘令于成龍等䭾運其船運之米應𣲖地方官七員于成龍處司官二員管押前進自白塔陸運撥牲口四千五百匹并駕三牛之車預備三百輛帶往毎二輛合用三人此所需人役四百五十口糧鍋帳併僱值等項照去年中路例交該督給發所𣲖出船上地方官七員即從彼地管車夫給口糧帶去其米應運至何地留止何地既着大將軍及叅謀與于成龍㑹同商定則給發大兵所餘駱駝亦交于成龍率鄂爾多斯兵二千二百五十名將米逓運前進其安站之事將于成龍帶來理藩院司官派出一員率鄂爾多斯兵七百五十名隨將軍馬思喀而往依其所指之地安設自寧夏至白塔所設十站交總督吳赫料理外自白塔以外至額黒阿喇兒共五十站毎站安設一䑓毎䑓設鄂爾多斯兵十五名馬二十匹或叅領或驍騎校安設一員伊等俱係蒙古不通滿文毎䑓將通滿文者或章京或筆帖式安設一員使管理驛站之務着于成龍與宋喇卜公同商議而行上報可總督吳赫奏曰查寧夏至平樂城一百里其間應設兩䑓平樂城至白塔四百餘里其間應設八䑓此十䑓毎䑓應設馬二十五匹揀選守備千總把總等官一員及領旗等頭目二員安設所建内地之臺取偏僻地方驛馬安設邊外之臺照甘肅例取營馬安設其䑓臣請親視建立上從其言且謂地方事重大吳赫不便往設驛站着大學士伊桑阿侍郎哈雅爾圖安布禄安設驛逓要務安設不可差悞台吉羅卜臧之妻以其所獲厄魯特獻上理藩院奏曰巴圖爾厄爾克濟農之侄羅卜臧台吉之妻告云察哈代親子索諾木達克巴色稜吳巴什察哈代親兄巴兒當吳巴什其妻索諾木素其子羅卜臧津巴多爾濟達什剛阿塔爾扎木素女車林剛阿塔兒之妻庫磨扎卜此十口俱在我家又格壘沽英之屬下顧魯黒夫妻二子共四口亦在我家察哈代乃効力于皇上之人其子弟及格壘沽英之人我皆獻之皇上從外而往則甚逺從内則近請使我之人同部中人出邊口取來乞給驛于伊等使之前來奏入命差廣武游擊之人同其人往取俟到日毎口給銀三十兩厄魯特扎木素來降侍郎滿丕奏曰厄魯特扎木素來降告云我於三月初三日自哈薩克圖哈喇阿濟爾罕地方逃來當在薩克薩特呼里克時一日晩間忽有牛礮聲三響衆皆聞之随有一瀚海傍採捕之人夜中來告噶爾丹云我乃瀚海旁採捕之人霧瀰瀚海視其飛塵有兵馬蔽地而來噶爾丹營中人自此擾亂衆人俱言向聞滿洲行軍必放三礮扎營今敵人近逼是眞遂遷往哈薩克圖哈喇阿濟爾罕我從行十六日於哈薩克圖哈喇阿濟爾罕地方見噶爾丹又差塔兒巴配以十人往瀚海旁騐視正擾亂之時我夫妻騎馬三匹逃出來降皇上又丹濟拉離噶爾丹另遷于三日程外什爾哈戈必地方噶爾丹遣人兩次往召之丹濟拉言既有程布臧布矣用我何為我不去也又曽遣土克齊色稜達什于杜哈爾阿喇卜灘我來之前同土克齊色稜達什前去之人之馬畜杜哈爾阿喇卜灘之人奪取之棄四五人于額黒阿喇兒但兩三人歩行而歸土克齊色稜達什言阿喇卜灘所有中華皇帝使臣來將同使臣遣阿喇卜灘之使及行商囬子去觀阿喇卜灘之狀與我反顔是實又聞西路有阿南達兵防守又有根敦帶青滿兵已圍取洪郭羅口是以噶爾丹不知所往在阿兒臺四圍游行欲往阿兒䑓之陽則山險而無野獸欲踰阿兒䑓往額黒阿喇兒則畏杜哈爾阿喇卜灘據此將扎木素同格壘沽英曼濟及其妻子併馬駝什物俱交驛站逓送至歸化城發副都統阿第安插奏至上命示議政諸臣壬辰遣使宣諭噶爾丹等先是大將軍伯費揚古以博什希出使噶爾丹之事來報上諭侍郎安布禄曰爾可令驛站星速馳迎博什希驛站筆帖式不論何地遇博什希取噶爾丹奏章先星速賫來令博什希量力随後馳來將噶爾丹奏章令驛站筆帖式小心賫來恐致墮失併遣人迎丹濟拉使人羅卜臧及我此地所差使人巴兒通阿什曼濟兩人日夜星速帶來驛站先將噶爾丹奏章及使人送到其噶爾丹疏言欽惟皇上大慈普恵有如衆母光明鑒照不異幽明奉到勅書及使人格壘沽英口傳諭㫖不勝懽忭大都言語文章百凡音節雖不能灼知亦常有所陳奏間者各項情事蒙普恵大慈文殊皇帝仍恵加諭㫖雖臣意中有聖㫖甚是之想但為大兵所敗四處離散目下此地孑遺猶未相商是以大畧雖謂聖㫖甚是而以諸凡所奏情事已遣格壘沽英往奏俟格壘沽英到後明白宻奏如皇上俯恤准奏垂鑒則大幸矣正欲遣格壘沽英啓行而忽逃亡是以遣喇木扎卜前往令喇木扎卜明白口奏喇木扎卜奏曰噶爾丹言聖㫖云汝不能自活則收衆近徙來降我居無廬出無騎食無糧我屬下阿喇卜灘杜爾伯特之車陵滾占之子車陵多爾濟俱不能自活散去捕獸不及召集伊等諮問其意俟集問之後再行另奏縁皇上有恤臣之語是以臣屬下人等歸投皇上者甚多伏乞發還臣所倂乞聖上加恩賜于失所之人以活其命奏畢上曰汝欲歸乎抑留此地乎喇木扎卜奏曰臣原欲來投皇上去嵗夏間帶四十餘人而來遇杜爾伯特之車陵盡皆劫去是以不能來而返自此噶爾丹謂臣有反心防至此時格壘沽英逃後臣有心告請而來聖上問臣所願臣之妻子俱在此地臣無所往也必使之去君事也何敢不去于是上諭内大臣索額圖明珠曰大兵起行之前當遣人招撫噶爾丹丹濟拉此差不必遣本朝之人與塞卜騰巴兒珠爾同擒者有噶爾丹乳母之子丹濟扎卜再撥願往之厄魯特賫勅而往一靣遣使一靣進兵達賴喇嘛身故已十有六年矣第巴指達賴喇嘛之㫖以誑噶爾丹噶爾丹信其誑自言為達賴喇嘛之教而恣肆横行以此等事明開勅内照様刋刻多印付丹濟扎卜等傳示併遣諭䇿旺喇卜灘令乘此㑹亦興兵𠞰滅之事明白開列議政諸臣開列出使䇿旺喇卜灘部院人員職名入奏上命派出工部侍郎常綬侍讀學士伊道及革職侍郎多竒暫補主事同往此等事若不効力伊等更於何處効力今草已青著自備馬匹前去至是大學士伊桑阿奉㫖撰勅諭噶爾丹策旺喇卜灘丹濟拉厄魯特之台吉寨桑哈什哈及衆百姓四道呈覽上謂四道勅文雷同無異自始至末手為改定以示議政諸臣勅諭噶爾丹曰皇帝勅諭噶爾丹博碩克圗汗去冬命爾早降則予以富貴給以資産眷顧煦育之即爾所屬厄魯特之衆亦各得見其妻子遂其生業故遣使偕格壘沽英往宣勅㫖今使者喇木扎布至覽爾所奏謂未眀朕㫖且觀爾辭意一無真實而請給還來奔之厄魯特豈惟厄魯特之衆雖爾子塞卜騰巴兒珠爾及爾乳母俱已被獲今皆恩養與徽特和朔齊同居爾若來歸即令爾子與爾相聚今既不降爾有何功遂還爾厄魯特之衆爾欲歸降應及早來若不歸順徒遷延時日何益况達賴喇嘛已故朕已知之曽嚴飭第巴第巴又遣尼麻唐庫圖克圖上表來賀㨗且奏稱達賴喇嘛已歿十六年其轉生之庫必爾漢年已十五嵗則爾之指稱達賴喇嘛以為䕶法欺誑衆人者已顯露矣爾所欲逃匿之地厄魯特來降者多朕已悉知即使遁入洪郭羅險固之地諸路皆可進𠞰爾困廹若此尚何力拒守即今已無歸所矣今歳即不擒汝來嵗當復發兵追討必不中輟汝其詳審之故遣丹濟扎布察罕代舒魯等賫㫖特諭勅丹濟拉曰皇帝勅諭台吉丹濟拉朕為天下元后善善惡惡乃至理也去歲遣格壘沽英等歸勅内開載爾名復使格壘沽英傳諭今格壘沽英等來爾之辭意皆已備陳爾今能致噶爾丹博碩克圖汗來降必當封為貝勒畀以殊榮如不能致爾一身歸順亦能不失冨貴况爾以下之人先降者皆釋其罪顯榮優養爾應悉聞已往之過槩不介意爾曾宻奏若宥臣罪臣請投降故特専賜勅㫖盡宥前罪勅到其速降朕為大君豈改成命特諭勅厄魯特之台吉寨桑哈什哈并其人衆曰皇帝勅諭厄魯特之台吉寨桑哈什哈并部落人衆等朕無分中外皆欲其各安生理樂育昇平至於誅戮征伐原非本懐爾厄魯特等附從噶爾丹博碩克圖汗所在侵掠雖有所得於人而己之祖父戰死妻孥被掠者亦云衆矣今所餘之人不被創受傷者甚鮮死亡之餘其存幾何因從噶爾丹博碩克圖汗以致窮廹困苦已極屢頒諭㫖命噶爾丹博碩克圖汗前來歸順爾厄魯特之衆朕俱養育使得其所而噶爾丹博碩克圖汗並不以爾衆為念不思歸順他日兵臨則爾衆難免俘戮故特諭厄魯特之衆爾能各携族屬妻子來降者朕皆養育使得其所前所降者已加恩養爾衆亦當聞之矣特諭勅策旺喇卜灘曰皇帝勅諭策旺喇卜灘爾厯來請安納貢克恭克順朕亦加眷顧恩施頻及噶爾丹奸詭性成雖彼至戚靡不嫉害既將厄魯特之四部喀爾喀之七旗致令破亡分裂又以追襲折布尊丹巴土謝圖汗等為名侵我邊境屢擾不已朕因於去歲數道遣兵親行征𠞰直抵克魯倫土喇地方大破噶爾丹陣斬甚衆其妻亦被誅戮冬間復遣兵西出哈宻地方獲其子塞卜騰巴兒珠爾等今窮廹已極所屬大小寨桑哈什哈等相繼來降者不絶其餘附從之人及寨桑等流離逃散俱欲投順宻報前來今噶爾丹僅餘孑身率領數人隨處飄遁爾當亦聞之矣爾前奏稱噶爾丹若近逼我土必竭力擒𠞰又言随聖上指示効力盡瘁等語噶爾丹兇惡已極有如魑魅斷不可留今數道遣發大兵搜討夫噶爾丹與爾素有深讐乘其困廹應起兵復讐進𠞰且達賴喇嘛亡故已乆第巴欲詐飾達賴喇嘛尚在之狀故嚴飭第巴而第巴大懼遣尼麻唐庫圖克圖來言達賴喇嘛亡故已十六年其再生後身已十五嵗據實陳奏則噶爾丹所稱䕶達頼喇嘛之法者其為欺誑衆人也明矣欲爾明悉故特遣工部侍郎常綬内閣侍讀學士伊道侍衛克什圖等賫勅諭汝且加恩賜賞彩縀十端特諭議政諸臣讀之奏曰四諭經皇上撰為四體即刻改成辭意俱别各與彼情事脗合洵極神妙雖典謨所載何以加兹且諭噶爾丹所屬台吉寨桑等勅内指明其失語語皆係實事天章炳赫燦若日星人人覽之無不感動臣等以為諭㫖到日噶爾丹之衆必皆潰散矣上曰此甚屬𦂳要不可稍緩如冩蒙古字人不足著於侍衛執事人内查有通䝉古字者命連夜抄冩百張明日即行遣發著各處速行傳諭併給噶爾丹丹濟拉使人丹濟扎卜等乘歸馬匹著議政大臣議奏議曰噶爾丹丹濟拉使人丹濟扎卜察哈代羅卜臧舒魯俱各給馬二匹駱駝一頭丹濟扎卜馬夫一名察哈代馬夫一名此二人俱各給馬二匹伊等口糧米麺帳鍋碗碟及駱駝鞍屉俱自總督吳赫䖏支給其馬駝俱于督運于成龍處取肥者給與將伊等交與往拏伊拉古克三庫圖克圖之内大臣䇿旺諾爾布䕶軍綂領杜什希等至郭多里巴兒哈孫地方遣之前去上報可命遣大臣往擒伊拉古克三庫圖克圖先是大将軍伯費揚古報伊拉古克三庫圖克圖欲往黄河崖盗馬發兵防禦命散秩大臣巴當阿䕶軍綂領孫扎齊散秩大臣䇿旺諾爾布䕶軍綂領杜什希等各率官兵分両路往擒伊拉古克三庫圖克圖大臣章京侍衛兵丁所乘馬匹著議政諸臣議奏至是議曰往擒伊拉古克三庫圖克圖由郭多里巴爾哈孫之路進發者大臣三員侍衛二員厄魯特侍衛一員新滿洲四十二名厄魯特十八名西安兵五十九名大臣各帶從人三名侍衛各帶從人二名厄魯特侍衛一員原有從人一名新滿洲四十二名各帶從人一名大臣併侍衛六員毎人馬三匹共用馬十八匹新滿洲四十二名厄魯特十八名從人五十六名每人馬二匹共用馬二百三十二匹合計用馬二百五十匹將學士朱都納所喂馬撥給西安兵五十九人亦各帶從人一名每人各馬二匹共馬二百三十六匹將西安存留馬撥給由西路進發之散秩大臣巴當阿等自此處給與驛馬前到彼地亦照此騎馬前去移文將軍孫思克博濟等俱照定例將營内馬撥給前去大臣官員侍衛所領滿洲兵計定從人一名緑旗兵但計本身撥與馬匹此兩路進發官兵俱著賫四十日糧奏入上從其議遣厄魯特恩克歸招撫滾占之妻諾洪達喇及其子車陵多爾濟先是上諭議政諸臣曰遣使噶爾丹時著遣丹津扎卜察哈代舒魯恩克丹濟拉來使羅卜臧等去至恩克乃滾占之子車陵多爾濟人著與偕往應至何處分路使至伊主車陵多爾濟處去至是諭侍郎安布禄曰著遣滾占之妻之人恩克隨明日前去之散秩大臣巴當阿等乗驛至侍衛阿南達所令阿南達交哈宻城頭目達爾漢白克給從人一名往撫伊主滾占之妻著理藩院行文諭滚占之妻諾洪達喇子車陵多爾濟云爾之恩克自哈宻城擒解前來今遣還汝所汝等如欲降當即前來斷不可與噶爾丹和好毋以爾夫曾與我軍交鋒被創為懼朕非欲得爾之人衆也若欲奔策旺喇卜灘可即前往朕不介意若欲奔青海則我軍現在西路朕賜爾文持往令彼放行癸巳諭大將軍伯費揚古定期進兵上諭議政諸臣曰著檄大將軍伯費揚古由寧夏進發大兵于閏三月十七日起行費揚古可率其兵四月初十日外十五日内赴郭多里巴爾哈孫地方命䕶軍綂領鄂克濟哈查報厄魯特降人撫養之上諭行兵部曰䕶軍綂領鄂克濟哈駐居寧夏著將現在厄魯特男婦子女三十八口交鄂克濟哈伊等食物照常支給嗣後厄魯特由此路來者俱令鄂克濟哈收養寧夏來降及各處解來厄魯特著鄂克濟哈報明男婦子女人名新從噶爾丹處來及𦂳要人開明年貌數目送赴行在提取某人據所指名字解送至鄂克濟哈處撫養之厄魯特應送歸何處俟勅下遵行酌撥隨駕官兵馬駝實數議政大臣奏曰留駐寧夏之前鋒二百九十七名䕶軍鎗手三百九十四名驍騎礮手八十名伊等所有之馬或二匹或三匹共一千八百二十五匹内前鋒一百六十名䕶軍鎗手二百名隨駕前去以毎人各馬四匹算共需馬一千四百四十匹應將留駐人員之馬撥給其留駐寧夏之前鋒一百三十七名䕶軍鎗手一百九十四名驍騎礮手八十名共四百十一名伊等亦以毎人各馬四匹算共需馬一千六百四十四匹將彼所剰馬三百八十五匹存下所缺馬一千二百五十九匹請将學士朱都納寧夏靈州中衛固原等處所喂之馬二千八百五匹内給之又增給西安兵五十九名者乃西安留駐兵之馬五十九匹其缺額亦以朱都納所喂馬給之一等侍衛法諾三等侍衛博多齊伊等毎人各馬五匹䕶軍叅領額訥布馬四匹共馬十四匹亦以朱都納所喂馬給之應給法諾博多齊之駱駝二頭以前停給聽差人員之駱駝二頭給之應給額訥布之駱駝一頭以庫勒納解到駱駝給之京來侍衛䕶軍執事人員共騎官馬一千五百八十三匹此内馬一百六十九匹侍衛䕶軍已騎赴軍前者其馬不必更換其餘一千四百一十四匹盡行換給此換給之馬亦以朱都納所喂馬給之若朱都納固原所喂馬在起駕前不及取來而馬不足以西安留駐兵之馬給之俟固原馬到日照數給還西安兵查官馬倒失疲留外其出征滿洲侍衛䕶軍坐馬一百六十九匹與所餘馬一千五百四十七匹俱係京城各佐領所養官馬不可濫動應交從駕前來之察哈爾官兵于水草善地放養随駕後帶回京城交兵部各還本佐領朱都納所喂餘馬五十九匹庫勒納等解來駱駝十頭併交將軍馬思喀帶去給大將軍費揚古總督吳赫採買平凉靖寧州所有滿洲緑旗兵之馬共九千五百五十匹副都統阿蘭泰等採買捐助平凉等處所有駱駝七十頭馬一百八十七匹騾九十九頭尚書庫勒納等觧到駱駝一千一百三十七頭都御史于成龍等處捐助駱駝四百頭除給大將軍伯費揚古駱駝十頭現今進發之兵駱駝一千七十九頭外尚餘駱駝四百四十八頭庫勒納等解到騾三千六百三十一匹于成龍等處捐助馬騾一千四百六十匹驢六十七頭共計剩駱駝五百一十八頭馬騾一萬四千九百二十七匹驢六十七頭奉㫖依議随駕自京騎官馬前來之侍衛䕶軍執事人等俱賫兩個月糧著將庫勒納等解到騾子每人各給一頭俟至白塔將臕大者令于成龍領去其臕瘦者發還庫勒納等命查駐兵營房給還民間先是以寧夏蘭州宜設兵駐防將民居圏取建造官房至是上諭議政大臣曰寧夏蘭州設兵駐防事屬無益此所佔營房原係民居其房仍歸原主爾等其同總督議奏議曰噶爾丹困廹已極滅在旦夕寧夏蘭州設兵駐防無益上諭極當應將寧夏蘭州設防之兵停止查寧夏駐防兵丁建造住房之時所圏民房共五千九百六間新造房一千二百一十八間應交地方官將房還本主其蘭州建造房舎亦照此例上從之甲午寧夏紳衿兵民懇留聖駕上不允寧夏紳衿兵民聞御駕於次日啓行擁集行宫外叩首奏曰皇上欲安邊塞生民躬親勞瘁俯臨寧夏臣等幸得瞻仰天顔屢沐聖恩今聞車駕於十五日啟行臣等犬馬戀主之心不勝激切伏乞聖駕復留數日以慰羣情上曰朕欲掃蕩冦氛以安黎庶特幸寧夏經理軍務駐蹕十有餘日曩者南廵及凡所廵幸之處未有駐蹕至三日者且邊地磽瘠民生艱苦朕深憫之朕扈從人衆恐多留一日即滋百姓一日之擾朕已定十五日啟行爾等誠懇之意朕已知悉又向者曾欲使禁軍駐防此地恐民間居處狹隘已命將房舎查明給還本主爾等即各遷回故居可也衆聞之俱懽呼奏曰皇上親臨寧夏子愛百姓扈從官兵毫無侵擾且商賈各多獲利又恐臣等居處狹隘查還房舎皇上浩蕩之恩如天地之髙厚臣等俱叩謝聖恩又奏曰寧夏實係邊塞窮荒皇上躬親臨幸誠千載一遇乞製聖訓頒賜臣等勒之貞珉光埀萬禩臣等子孫世世瞻仰上曰朕廵幸原欲安民今製文頒賜則百姓運碑僱匠轉致煩苦不必製文賜給准其謝恩衆復叩首請曰此處百姓聞車駕親臨已預備碑材本地現有工匠不至多費若得聖訓勒之貞珉則天下四方之人咸來瞻仰於地方永有光輝陳請再三上命内閣大學士伊桑阿等議奏僉曰臣等伏惟寧夏閤城人民叩請皇上親製聖訓光垂永乆其瞻雲望日之意殊為誠懇皇上親製聖訓令其敬勒貞珉垂示無窮洵為盛事奉㫖訓㫖候頒給於是紳衿兵民人等於行宫外叩謝聖恩踴躍歡忭聲震天地覆覈兩路進兵糧餉馬匹驛站事務上諭大學士伊桑阿曰着將所議兩路進兵追𠞰噶爾丹之事撥置馬匹糧米之事設站之事俱查來朕將覆覈之伊桑阿俱查呈御覽上全閲畢諭曰各項事務議論區畫俱已詳盡今噶爾丹無所逃矣噶爾丹或降或自盡否必為我所擒朕將親至船站視兵馬起行暫駐蹕於彼地聼其聲息倘有朕當親行之事則行之伊桑阿奏曰此役追𠞰噶爾丹之事皇上毎日執筆書記區處備禦噶爾丹去路已極周宻備儲我軍資用又極豐裕誠如天羅地綱噶爾丹無所逃矣不乆當如聖諭所云也定將軍叅謀諸臣上諭將軍馬思喀曰著都統侯巴渾代齊世將軍薩卜素都統兼前鋒統領碩鼐䕶軍綂領宋住總兵官王化行俱為叅謀既與大將軍伯費揚古㑹將軍馬思喀亦為叅謀至總兵官王化行去歲出征噶爾丹之役見其人材矯健隊伍整齊尤著勞勣大將軍伯費揚古來亦奏其功緑旗總兵官向無受為叅謀之例着王化行于此役軍中為叅謀賜孔雀翎命趲設驛站上諭大學士伊桑阿曰朕明日向白塔行凡報事者若俱自舊站至寧夏追赴則迂而且逺朕何地駐蹕即將舊站就行在所移趲前此之行尚書班第亦如此著侍郎安布禄依黄河西㟁駐扎自總督處取􅊑一隻撥理藩院賢能官二三員在侍郎安布禄處備之將外站毎日向行在所移趲其站不足則再增嗣後從内出之事則出殺虎口由外新設之站而來從外入之事則由新設之站馳入殺虎口其以此當大學士前傳諭如違誤者死侍郎安布禄甚糊塗著交明哈雅爾圖勿誤驛務議曰自湖灘河朔至橫城原設鄂爾多斯地方驛站十二處今御駕移向白塔應差理藩院司官舎陵祁塔特薩木布代丹巴毎日調移安站但調移之時兩站相去其間不無遼逺若所移站相去遼逺着前去司官借近地旗分䝉古馬各二十匹暫行安設其新設十二站内亦未必無馬瘦缺者現有横城以前邉内大站所增馬二十匹腰站所増馬十匹即將所増之馬著前去司官就近調取每站増馬二十匹奏入命於此處撥殷實十二人安站其馬瘦缺之四站人員爾等議奏復議曰請撥此處殷實十二人遣往安站其馬瘦缺之四站人員調回嚴加議處著所撥殷實十二人接馬好之八站獨取正道安二十站此殷實十二人撥四人頂六十六巴圖蘇達祖興邦之缺所餘八人間雜增列查前者設站毎站取近地部落首領一員兵五名理藩院或筆帖式或小校一人兼設應除六十六等往替之四人外其八人亦照前毎人撥近地部落首領一員兵五名給之理藩院帶來筆帖式小校各處差遣所存無幾應檄在京理藩院或筆帖式或小校撥八人星速遣來與伊等同設此殷實之人交移站四司官計逺近相水草自湖灘河朔至白塔取正道安設上從之調撥運米牲口議政諸臣奏曰據于成龍等奏稱大兵于十七十八日起行請將米自二十日陸續起運補捐牲口雖有二千餘未全收完尚書庫勒納等解來三千六百騾子内已令給騎官馬之侍衛䕶軍執事人員各一匹倘運米四千五百之數有所不敷請將寧夏綠旗之馬充數帶往俟後捐人員之馬到後該督收取補還兵丁應將督運于成龍及尚書庫勒納等解到騾子内除給騎官馬之䕶衛䕶軍執事人員外所剩騾子之内有可用者俱令運米如尚不敷四千五百之數交與該督令于寧夏緑旗兵内足數用之俟後捐人員之馬到後該督收取補還兵丁其收取數目另行報部奏入上從之傳諭官兵牧馬之法上諭上駟院侍衛馬什曰馬匹應作何拴放著與蒙古台吉等㑹議具奏議曰上用額馬係喂料肥馬當拴令至曉其給衆騎用之馬俱經寧夏喂料當於日暮飲之拴至五更始放其自京騎來之瘦馬不必節其水草略令休息即行牧放上曰甚善著開寫傳示該管大臣其兵丁人等亦通行曉諭聖祖仁皇帝親征平定朔漠方略卷四十一

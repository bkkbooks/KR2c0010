body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷十五月丙戌朔定喀爾喀坐位次第理藩院奏言奉㫖酌定喀爾喀坐位次序如照給賞之例班列每行人數多寡不同應令折卜尊丹巴庫圖克圖土謝圖汗扎薩克圖汗弟策旺扎卜車臣汗坐第一行扎薩克墨爾根濟農顧祿什希等十四人令坐第二行扎薩克衛徵諾顏阿玉什等三十六人令坐第三行扎薩克台吉西地西里之親子丹凖多爾濟等七十九人令坐第四行扎薩克色稜阿海族弟都默伊爾登台吉等一百四十人令坐第五行土謝圖汗同族台吉尼爾喀等一百四十人令坐第六行車臣汗之察哈爾台吉莽吉代等一百四十人令坐第七行其寨桑護衛俱在後環列以坐上從之尋允伊等所請與四十九旗同列定喀爾喀引見宴會禮儀先是理藩院遵㫖議定於五月初二日召見喀爾喀等令三跪九叩頭排設大宴內外王貝勒貝子公台吉等俱列坐於左喀爾喀等俱列坐於右初三日頒賞宣訓㫖是日衣錦垂纓作樂至是諭行在禮部曰蒙古人員引見時立進坐次著與領侍衛內大臣集議議曰詰旦召喀爾喀集於前鋒營前序立排案畢使步行而進立於儀仗末引進喀爾喀後奏聞駕出前坐大臣照常坐地方窄狹後坐大臣應停止上曰在前鋒營外下馬序立步行而進如有年老不能行者各令其子弟扶掖之又總管內務府等衙門奏言初二日宴喀爾喀宸幄設於網城南門前安御床取武備院行帳每旁各設兩架當前設帳置案排金器照常列儀仗上出入奏樂其宴各預設於班次宴既備衆集奏聞駕出乘馬臨帳升座理藩院及鴻臚寺大臣官員引導排班聽鳴贊傳呼行三跪九叩頭禮行禮時奏樂畢理藩院大臣官員指示各於其位叩頭坐進御宴奏樂衆皆起立宴既進樂止繼進茶上飲茶令喀爾喀齊叩頭飲茶畢撤具繼進酒及酒樽獻飲大臣跪奏樂獻酒畢樂止衆皆起隨獻飲大臣各於其位跪叩頭執事者以金杯酌酒立授獻飲大臣大臣跪受叩頭而飲衆不叩頭畢各齊立於其位叩頭坐上舉宴次第演劇奏樂賜飲小案待㫖而進喀爾喀等朝見進宴飲酒俱奏鑾儀衛細樂其樂設於帳前兩旁宴畢御筵撤外藩諸王以下台吉他布囊以上及喀爾喀聽理藩院大臣鴻臚寺官員引導鳴贊官不傳呼行一跪三叩頭禮謝恩叩頭後按翼排列而立禮部大臣奏宴畢上還行宫衆俱散奏入得㫖朕出入各蒙古行禮奏鑾儀衛樂進筵飲酒奏內監樂餘如所議禮部奏大賚喀爾喀宣訓諭後令喀爾喀等在網城南門前聽鴻臚寺鳴贊傳呼行三跪九叩頭禮上不必出臨其喀爾喀召集引班之事交理藩院鴻臚寺上是之次日土謝圖汗扎薩克圖汗之弟策旺扎卜車臣汗折卜尊丹巴庫圖克圖衆諾顏台吉寨桑等齊集上御行宫前黃幄升座喀爾喀汗諾顏台吉等率衆前進行三跪九叩禮按次序坐奏樂演劇衆技畢陳大設筵宴其喀爾喀汗諾顏大台吉等俱令近御座前上親賜酒其餘台吉等皆令侍衛等於坐處送酒丁亥以宥土謝圖汗罪封扎薩克圖汗之弟曉諭衆喀爾喀上欲平息兩翼喀爾喀之事遣內大臣索額圖一等侍衛吳達禪先傳㫖諭折卜尊丹巴庫圖克圖土謝圖汗曰是盟也朕躬與蒙古諸王貝勒貝子公七旗喀爾喀會集爾等可將殺得克得黑墨爾根阿海之事及在喀爾喀非為之事於朕未到之前自陳具奏請罪如不預行奏請倘得克得黑墨爾根阿海之子及衆喀爾喀訐告汝等之罪朕為天下主可曲宥汝乎宣諭畢折卜尊丹巴庫圖克圖土謝圖汗等奏言皇上乃統御宇內之元后憐恤臣等欲免其罪當欽遵諭㫖而行隨具疏請罪其詞曰扎薩克圖汗得克得黑墨爾根阿海二人與我衆喀爾喀乖異往投噶爾丹聞彼欲侵取我等土地因而興兵執此二人殺之從此起釁擾害生靈實臣等之罪為此自陳伏乞皇上睿鑒恩宥至是上於盟所諭車臣汗等曰爾七旗喀爾喀皆係兄弟而不相睦互吞人民其勢不為仇敵不止朕灼知之特遣大臣會閲將所掠人民皆令歸還定誓土謝圖汗違誓又稱討厄魯特而興兵執扎薩克圖汗及得克得黑墨爾根阿海殺之自此喀爾喀衆志不協國破家亡雖困窮已極尚能憶朕舊恩來歸皆已一體撫養之矣今土謝圖汗等陳奏諸凡大過請罪茲於大閲之地按法究處朕心固所不忍而爾等七旗輿情亦復何面目乎若以輕罪處之目前皆失生業俱賴朕惠養無可復問是以責其大過而原其情至扎薩克圖汗亦誠心職貢往來有年無故為土謝圖汗所害殊為可矜如巴郎額爾克阿海在即當封之今扎薩克圖汗親弟來朝似宜即封之以示優恤爾衆云何喀爾喀汗諾顏大小諸台吉同奏言土謝圖汗等既知其非而陳情請罪已蒙聖鑒則亦幸矣如果治罪非特皇上不忍我衆復何顏至扎薩克圖汗人民流散軫恤其遺裔欲令策旺扎卜襲封誠非常之舉也我衆其何說之辭但不勝感戴仰天祝頌而已臣謹按孔子有曰知幾其神又曰事豫則立蓋未事之前灼見於幾先而豫圖之者誠非至聖至明未易能也如七旗喀爾喀兄弟不和匪朝伊夕逮土謝圖汗搆兵攻殺扎薩克圖汗等而其讐寖深益不可解我皇上仁無不覆明無不照稔知喀爾喀交惡之原委情事之曲直使不早為之所至會盟時必至紛爭既至紛爭則難乎其兩全矣故特遣大臣曉諭折卜尊丹巴庫圖克圖土謝圖汗使自陳請罪而後集衆會盟渙汗大號赦過宥愆免土謝圖汗之罪興滅繼絶授策旺扎卜之封於是右翼喀爾喀同聲稱慶左翼喀爾喀感戴彌殷預燭乎事機使之晏然寧息至聖至明誠敻絶乎古今也戊子駕臨七溪大閲錫喀爾喀名爵是日上令八旗滿洲及漢軍火器營總兵官蔡元標下緑旗官兵排列炮火皆上親自指示上躬御甲胄大閲軍容畢御黃幄賜諸王大臣及衆喀爾喀等茶令侍衛等射有膂力者角抵炮火之聲響震山谷將士進退赫奕威嚴行伍布列整齊壯麗衆喀爾喀等皆畏懼無不駭愕讚美復敕諭喀爾喀汗濟農諾顏台吉等曰朕奉承天命統御萬邦欲使率土人民咸獲其所中外竝無異視前以爾七旗喀爾喀人等俱係兄弟互行侵奪吞占人民不相和睦朕特遣大臣會盟諭和而土謝圖汗背棄誓言不從盟議輒自興戎遂為厄魯特噶爾丹所敗以致國亡汗諾顏台吉不能收輯其人民人民不能保有其妻子各自奔潰投入我邊塞若乘汝等此時窮困之際令我諸部落分行收取爾喀爾喀亦早滅矣朕心本好生不忍坐視汝等滅亡給地安插屢賜米糧牲畜以活之仍留汗諾顏台吉名號使車臣汗襲位又因汝等下人互相偷盜各增設扎薩克管轄以便督察以汝等向無法度頒行一定律例自古以來未有如此之始終覆育者也朕既活汝欲使倍加長養朕親降諭㫖大賚加恩出臨大閲視汝等感戴之情甚為誠切是以待汝等如四十九旗其名號亦皆如四十九旗例以示朕一視同仁之意土謝圖汗車臣汗皆留其汗號如故扎薩克圖汗被害實屬寃抑而人民離散困窮已極甚為可矜是以授其親弟策旺扎卜為和碩親王扎薩克墨爾根濟農顧祿什希扎薩克昆都倫博碩克圖滾布扎薩克信順額爾克帶靑諾顏善巴扎薩克台吉色稜阿海扎薩克額爾德尼濟農盆楚克喇卜灘伊等原係舊扎薩克改濟農諾顏等號俱授為多羅郡王台吉噶爾旦乃土謝圖汗之長子且自枯倫白爾齊爾盟後不時請安是以授為多羅郡王車臣汗叔父扎薩克額爾德尼濟農納木扎爾雖係新扎薩克而勸車臣汗率十萬衆來降其身率先奏請願與四十九旗同列殊為可嘉是以照舊扎薩克例改濟農名號亦授為多羅郡王車臣汗族叔扎薩克額爾克台吉車卜登效力哨探厄魯特捐助私馬不誤軍務是以授為多羅貝勒台吉西地西里乃土謝圖汗之親弟屬裔頗多偕土謝圖汗來降是以授為多羅貝勒車臣汗之叔祖車臣濟農車卜登達賴濟農阿南達額爾德尼濟農布達扎卜伊爾登諾顏達里車臣汗叔父伊爾登濟農盆楚克伊等俱係車臣汗之叔祖叔父授為濟農者是以改濟農名號俱授為固山貝子白蘇特之察罕巴爾諾顏博貝布扎雖係新扎薩克而在喀爾喀時預奏喀爾喀基業不保其後必壞壞則來歸皇上後喀爾喀基業既壞即踐前言來降殊為可嘉是以亦授為固山貝子洪俄爾帶靑旗分協理旗務台吉韓都先衆來降效力被創是以授為鎮國公土謝圖汗族中台吉蘇泰伊爾登額爾克帶靑諾顏善巴族中台吉托多額爾德尼等誠心歸順效力行間是以亦授此兩人為鎮國公土謝圖汗之扎薩克台吉車木楚克納木扎爾及扎薩克台吉班珠兒多爾濟扎薩克達爾漢台吉巴郎車臣汗之扎薩克額爾德尼阿海車稜達什扎薩克台吉額爾克色稜達什扎薩克台吉顧祿扎卜額爾克帶青諾顏善巴之扎薩克衛徵諾顏阿玉什扎薩克台吉丹津額爾德尼額爾濟根之扎薩克台吉吳爾占扎薩克墨爾根濟農索諾木伊思扎卜伊等俱授為一等台吉此外有事台吉及其他諸台吉應授品級皆諭該部逐一甄叙自茲以後爾等其仰副愛養之恩各守法度敬順遵行則汝等生計漸滋福流子孫世世蒙恩矣若違法作亂則汝等生計敗壞國法具存凡事必皆照所犯依律處治其各於所屬通行曉諭嗣頒賜土謝圖汗折卜尊丹巴庫圖克圖扎薩克圖汗弟策旺扎卜車臣汗銀各一千兩及銀器蠎緞綵緞布匹袍帽等物其濟農台吉寨桑等亦按伊等品級從優頒賜銀兩緞匹等物按伊等品級授其子弟台吉其四十九旗王貝勒貝子公台吉等亦按伊等品級頒賜袍帽銀兩有差諭恩賜親王策旺扎卜坐車臣汗上時上賜策旺扎卜駝四頭馬十匹羊五十隻又念策旺扎卜年幼且所屬人民俱已離散恐致失所令歸化城都統副都統等加意護視撫養又諭尚書班第等曰策旺扎卜雖授為親王而其祖及父素有功績其令策旺扎卜坐車臣汗上己丑科爾沁土謝圖親王沙津等率四十九旗王貝勒貝子公台吉他布囊等請上尊號沙津等奏言伏惟我太祖太宗開創以來臣等普蒙異數悉叨尊顯邇仗聖上威靈身際隆平人人皆得遂其生矣而七旗喀爾喀土謝圖汗車臣汗人等自古以來尚在化外皇上威福丕加稽顙來歸誠為希有之事且厄魯特噶爾丹不自知分量干犯天兵仰藉皇威大克其衆誅斬甚多噶爾丹潰亂恐懼立誓而奔以此觀之不日亦如喀爾喀之來降矣更將焉往乎又俄羅斯國之察罕汗亦以一道同軌欽承上㫖屢思此等殊猷實臣等中心所大快也誠惶誠恐請上聖主尊號曰德威廣被率土賓服道法光明不可思議上治至聖皇帝以大慰中外之望伏乞睿鑒臣等不勝顒望上曰吳三桂既平之後諸王大臣請上尊號未嘗准行此人主所當為之事也前既不允今可許乎其以此諭王等知之辛卯命將軍瓦代等率兵赴土喇上諭大學士伊桑阿尚書馬齊曰土喇地方應酌量遣兵探聽厄魯特人等有不能前去又不能內附者收之而來著領侍衛內大臣及內大臣明珠護軍統領馬喇與議政大臣集議議曰定北將軍都統瓦代等一路護軍內應選擇兵士每佐領各派出一名及前鋒全隊四百名其管領之夸蘭大以下官員令統領大臣量派往土喇偵探厄魯特聲息如彼困窮人等不能前往又不能來者皆收之而來此所發官兵著於獨石口攜帶兩月糧以行兵士瘦馬將所留兵肥馬易去務使人俱得肥馬五匹毋致行路稽遲其統率是軍者著定北將軍都統瓦代護軍統領馬喇副都統碩代噶爾馬往伊等不諳路徑著帶墨爾根濟農郡王顧祿什希信順善巴郡王之人前往奏入得㫖瓦代等所有火器營兵派發六百名及總管大臣以行並著瓦代攜將軍印去指授護軍統領馬喇等前往土喇事宜時將軍瓦代在察哈爾游牧地方馬喇等隨駕入請訓㫖上諭曰聞噶爾丹敗遁時有俄里肯之台吉三百許人困極留住土喇河伊等如欲內附或憚喀爾喀攔阻或力不能來而在彼俱未可定爾等到土喇伊等如在可遣人問故如欲內附爾等收之而來如欲前去則聽之去既不內附又不前去則視其力若遜於爾等爾等相機行事其力大倍於爾等難以舉動則勿輕挑之彼於我有信誓爾等亦以好言曉之非必欲爾等勇於行事也務思其大以圖全美至爾等行路須嚴設哨探小心防範斷勿懈弛失備其哨卒俱執千里鏡登高而望少懈恐為彼所先窺夜間勿燃火勿喧呼凡所宜禁事件俱務嚴明勿優柔縱法至遇喀爾喀跳脫之人爾等隨力收來各發該主爾等所歷地方詳視記取而行又諭曰聞布庫他必圖兄弟在克魯倫左近西布退哈灘巴圖爾地方爾等若遇之可諭西布退哈灘巴圖爾送他必圖兄弟來命定北將軍瓦代餘兵往安北將軍郎坦軍前先是令瓦代等兵出張家口駐正白鑲白察哈爾遊牧之地至是兵部奏言會閲事畢除瓦代等所率兵外其他兵士應駐何地得㫖除瓦代所率兵外其他兵士俱發往郎坦所壬辰會閲事畢上回鑾是日上留尚書馬齊等料理會閲事畢來京又遣侍郎溫達等往編喀爾喀旗分佐領指授逰牧地方癸卯車駕還京師乙巳遣官趣噶爾丹使人起行先是遣副都統蘇黑等攜噶爾丹使人巴圖爾寨桑諸人往歸化城與察罕古英寨桑會分為三隊使之起行至是蘇黑等報言阿卜都喇寨桑諸人以馬駝羸瘦為辭察罕古英寨桑等言噶爾丹遣我等率諸回子而來諸回子不去我亦無所往請待尼爾巴噶卜楚而行至京城帶來巴圖爾寨桑分為頭隊催令起行伊等言諸回子不與我等同往我等何以見噶爾丹理藩院奏聞上命大學士集議議前遣巴扎爾時有俟草靑遣還之㫖若留厄魯特回子皆待尼爾巴噶卜楚恐致遲久應令理藩院遣官一員乘驛而往將巴圖爾寨桑達爾漢寨桑滾楚克等合為一隊令與副都統蘇黑等曉諭速逐之使行至衆回子言馬駝羸瘦請俟尼爾巴噶卜楚等到日同去應將察罕古英寨桑阿卜都喇額爾克寨桑等偕來諸回子仍交蘇黑等暫留於後俟巴扎爾等到時再遣之奏入得㫖令員外保柱往餘如議壬子大學士伊桑阿等率九卿詹事科道等官請上尊號伊桑阿等奏言喀爾喀曩在蒙古素稱不馴雖貢獻之使不絶於道而彼諸汗恃其七旗數十萬衆未嘗躬修臣節今仰戴天威感懷帝德咸傾心臣服願列屬藩皇上又念喀爾喀素無統紀罔知禮法其間安輯事宜賞罰次第非車駕親臨裁决不能盡善於是六龍時邁刻期會同喀爾喀土謝圖汗扎薩克圖汗之弟及車臣汗率諸濟農諾顏竝台吉等皆伏地迎謁會朝如儀皇上察其誠懇錫宴頒賚極其優渥爰編立旗分與我四十九旗等惟土謝圖汗車臣汗名號暫令如舊餘則或易王爵或畀貝勒貝子公台吉名銜量功受秩各有差等其他悉照所司分别區處禮成又特降諭㫖重申訓誡明示以守法謹度則福及子孫悖道恣行則身罹禁網既恤其困窮復謀其生計既使之樂育復令其保終興滅繼絶懷柔遠人之道至斯極矣允宜誕膺尊號垂示萬䙫上曰喀爾喀原係入貢之國伊等不和知其必敗曾特遣大臣諭令和好後乃渝好與厄魯特搆戰窘迫來歸屢失生業窮困已極朕以好生之心撫綏養育曲盡周詳因此懇切抒誠願同四十九旗一例蓋理所必然且比年來旱潦頻仍民生猶未蘇息風俗猶未醇厚奢靡猶未盡止朋黨猶未悉除彼此援引陷害猶未屏絶理應日益圖新時加黽勉君臣殫心竭力尚恐不逮靦顏以為至治遽受尊號斷乎不可茲所奏已知之矣六月乙卯朔遣使賫敕諭達賴喇嘛上諭大學士伊桑阿阿蘭泰曰喀爾喀厄魯特諭和之舉朕與達賴喇嘛同行之今已安插喀爾喀使之得所矣應遣使賫敕於達賴喇嘛使人所關緊要商南多爾濟既病著丹巴色爾濟去諭達賴喇嘛敕曰朕統御寰區澄淸海宇以仁育為本撫養是先雖末陲異域之民有困窮而歸命者必受而養之使各得其所爾喇嘛奉行佛法廣度衆生而救苦難其心亦猶是也前以七旗喀爾喀兄弟內相侵奪外與厄魯特交兵朕與爾喇嘛諭令罷兵歸好後噶爾丹又追侵土謝圖汗折卜尊丹巴庫圖克圖殺奪喀爾喀之人朕遣伊拉古克三庫圖克圖爾喇嘛遣濟隆庫圖克圖往諭噶爾丹朕與爾使人不能仰副朕與爾之心噶爾丹挾濟隆伊拉古克三而行稱兵大舉攜其妻子殺掠喀爾喀而來深入我邊汛之內劫奪部落人民朕稍發兵以問其故反與我兵拒戰至於大敗乘夜遠遁此彼來犯我非朕往伐之也彼所行違朕與爾好生善念自求窮困而已喀爾喀土謝圖汗車臣汗諸濟農諾顏台吉决志入內奏請效力者有之奏請與四十九旗同列者亦有之呼籲頻仍不已朕既已受而養之矣若不自始至終永使得所措置安定必致散亡是以刻日於本年四月朕親出大閲喀爾喀之汗濟農諾顏台吉等皆執臣禮跪而稽顙諄請與四十九旗同列朕設大宴厚賜之照四十九旗編為旗隊給地安插土謝圖汗以其妄舉興戎陳情請罪朕發衆喀爾喀議之皆言加彼之罪則於我衆無光朕是以宥免其罪仍留土謝圖汗車臣汗之號又念扎薩克圖汗被殺寃痛屬下裔民散亡可矜授其親弟䇿旺扎卜為和碩親王其餘各分等級授以郡王貝勒貝子公台吉之銜明其法度昭其典章矣爾喇嘛普濟生靈向以喀爾喀國破為憂今已安措喀爾喀使得其所遣致爾喇嘛知之爾喇嘛聞此必大歡喜也其左翼之喀爾喀無復可議至右翼扎薩克圖汗旗下人等被虜散亡有在爾喇嘛所者亦有在他處者伊等略無罪惡而被虜散亡殊為可矜爾喇嘛普濟生靈必能查明發歸原主也今厄魯特人等屢有歸降聞噶爾丹窮困已極無食而饑於此可見噶爾丹之獲罪於天矣未必不往歸爾喇嘛若果往歸作何措置唯爾喇嘛裁之噶爾丹遁去之時曾立誓而去倘違誓而稍犯我喀爾喀降人朕必發大兵分路前進務期𠞰滅之其時地方遙遠不及遣人賫敕於爾喇嘛亦未可定是以預遣教習唐古特文喇嘛丹巴色爾濟諭爾知之命徙巴圖爾額爾克濟農安插四十九旗地方先是喀爾喀扎薩克丹津額爾德尼台吉屢奏厄魯特巴圖爾額爾克濟農劫其屬裔馬畜等物且殺人得㫖發議政大臣集議議曰巴圖爾額爾克濟農前被噶爾丹劫掠靡所棲息窮迫來歸我皇上加恩給地安插乃巴圖爾額爾克濟農不思圖報皇上覆載之恩反要劫降人喀爾喀丹津額爾德尼人畜什物且復殺人大負皇上厚恩若巴圖爾額爾克濟農等仍留安插舊居地方亂必不已宜遷至四十九旗地方安插兵部理藩院各遣官一員往發寧夏所備西安滿兵全軍令將軍尼雅漢率之并令總兵官一員酌率緑旗官兵會同前往巴圖爾額爾克濟農所將喀爾喀丹津額爾德尼等被劫人畜什物俱照數追還尼雅漢等率兵押送巴圖爾額爾克濟農至歸化城交將軍郎坦押護內送其起行日期即令前去部員一面遣文報部如巴圖爾額爾克濟農等不還所奪人畜什物不肯內徙安插即令尼雅漢等率大兵𠞰而滅之奏入上從之隨遣兵部郎中格什理藩院員外郎二郎保前往辛未頒賜噶爾丹白金先是差員外郎巴扎爾賫敕諭噶爾丹徙近邊塞加賞以活之如竟入降益從優惠養至是噶爾丹奏言伏蒙遣使降敕加恩不勝歡忭僻壤諸情總在洞鑒敢直陳之前遇大疫今已愈矣馬騎糗糧前曾訴於伊拉古克三為之轉奏不及候㫖退歸荒土今使臣賫敕而來又蒙加恩益深感激雖未能大為報效請竭力勉圖之奏入得㫖噶爾丹請恩誠切著賜白金五百兩聖祖仁皇帝親征平定朔漠方略卷十

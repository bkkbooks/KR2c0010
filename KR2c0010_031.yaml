body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷三十一十月甲申朔命加恩大將軍伯費揚古軍士上諭尚書馬齊曰大將軍費揚古所領軍士甚為勞苦食用必致缺乏欲將朕所用牲口發去道路遥逺牲畜既瘠瘦且須時日可遣人往尚書班第處取殺虎口大同等處現存銀五千兩遣官一員送至大將軍費揚古所酌買皮裘牛羊等物給與軍士上閲牛羊羣賜諸王大臣官員食畢使喀爾喀多羅郡王塞稜阿海台吉阿里雅阿爾薩郎衛代青及厄魯特降人射上率諸皇子射上連中五矢諸皇子皆屢中喀爾喀諸王及䝉古諸王台吉厄魯特降人無不驚服上問塞稜阿海王等喀爾喀厄魯特交戰之由顧諸王大臣曰今日喀爾喀厄魯特皆在朕直論其事彼皆向來貢獻本朝之國兩國交惡其曲不在厄魯特而皆在喀爾喀喀爾喀先犯厄魯特喀爾喀理曲是以其國為厄魯特所破但厄魯特借伐喀爾喀為名進我境内烏闌布通之地為我師所擊敗已立誓不復侵喀爾喀矣今又背誓入犯我邊汛屯於克魯倫之地則厄魯特理曲是以朕親綂六師滅之天道昭然毫釐不爽朕為天下萬國之主寧有偏狥之理乎朕所以破厄魯特者非為喀爾喀也喀爾喀王塞稜阿海及厄魯特降人沙克朱木等皆跪而奏曰此等曲直臣等向愚昧不知今䝉皇上伸明大義兩國致敗之由方得曉然此實我等之所自取也諸大臣奏曰聖諭精詳誠為至論兩國之人俱傾心悦服矣丙戌駕至胡虎額爾竒命大將軍伯費揚古駐劄喀倫收厄魯特降人先是厄魯特降人言噶爾丹往博羅烏納罕奎金札巴干等處度冬語丹濟拉爾可至博羅烏納罕覔我云上於是諭議政諸臣曰大將軍伯費揚古進兵矣聞右衛兵每人乗馬一匹負行李於驢騾而往其臕亦瘦云朕料其斷不能到噶爾丹所在必自翁金謂馬瘦而回兵徒勞而無益於事朕秣馬於大同者特欲騐實噶爾丹所在如目前有可行機㑹則於黑龍江六百兵中選前鋒二百新滿洲四百察哈爾部落兵一千整齊鎗砲令備肥馬駝可一舉勦滅之噶爾丹已破盡今我何故不深為勦滅之之計而空勞軍馬乎今速檄大將軍伯費揚古止其進兵至是大將軍伯費揚古奏言官兵馬痩已回喀倫上交議政諸臣議隨議大將軍伯費揚古因馬瘦回喀倫候㫖皆如上諭矣現今大將軍回居喀倫應檄費揚古給右衛兵到歸化城之米自歸化城支米歸右衛其餘之米給黑龍江官兵御賜銀五千兩大將軍可酌備皮裘乾糧等物分給官兵駐扎喀倫附近地方暫俟差往丹濟拉處使人津巴歸併收厄魯特降人上准行止令䕶軍綂領瓦爾達留大將軍軍前副都綂祖良璧奏聞翁金破賊情形祖良璧奏曰臣率正黄旗滿洲叅領賽必漢正藍旗漢軍叅領李枝聯官兵五百名及䕶米漢軍叅將張憲載遊擊陳維屏等官兵五百名在翁金地方守䕶米糧因不知大兵回否信息於九月初一日集諸臣商議翁金地方所有米石無多若在此久待衆兵所携之米不足食回寧夏因於九月初六日回師是日早啟行據正白旗署前鋒叅領敦朱祜遣鑲黄旗前鋒䕶軍校和尚報稱䝉古賊八人來奪行李敦朱祜同千總劉進孝領官兵追逐而去臣一面遣正藍旗署叅領馬朝龍撥滿洲漢軍官兵六十名叅將張憲載領兵四十名速行偵探來報臣即率滿洲漢軍隨後而進行不數里與千餘賊相遇臣親率賽必漢李枝聯所領滿洲漢軍官兵併張憲載所轄漢軍官兵排列鳥鎗官兵奮勇前進䝉古賊兵分為兩路圍逼臣等臣等率領官兵從東殺出見賊分頭搶奪行李臣即整齊士卒用把總呉進所携子母礮二門併鎗手厮卒排列成陣各執長鎗木梃合力前進自卯至已放鳥鎗三四十次連發十餘矢仰仗天威大敗䝉古賊兵斬殺厄魯特百餘人賊向西北而遁臣同叅將張憲載領漢軍官兵追殺二十餘里此皆皇上天威逺播䝉古賊兵魂魄俱喪故能致此大㨗但䝉古賊兵狡猾而翁金地方山險谷深不可深入故不窮追收兵而回於本月二十七日已抵寧夏謹繕疏以聞上曰祖良璧於翁金地方守䕶糗糧回師之時遇賊千人忽來侵犯率領滿漢官兵擊敗厄魯特斬殺百餘人據厄魯特降人言我官兵奮勇直前大敗丹濟拉創鉅痛深官兵効力可嘉在事有功人員著分别議叙具奏上諭皇太子曰欽天監官員前因歩軍初放排鎗即奏稱天皷響自西北適朕所遣之人回奏情由彼頗惶懼叩首懇求將疏持回又一次奏稱日午地動朕謂舉國之人何無一覺者若軰辭窮奏云惟臺上覺動朕亦姑容之在監人員類皆怪異妄誕微末小人朕躬在外恐揺惑人心揑造訛言亦未可定若衆人皆知即屬實事若舉國不知殊有闗係不可不詳為留意値更太監亦屬微末欽天監既經奏聞彼自附㑹其説値更之處甚多不宜止以太監之言為憑也上諭皇太子曰朕於二十九日度察罕拖羅㑹嶺駐蹕於喀喇巴爾哈孫之地是日閲鑲黄旗牛羣其數至一萬六千頭毛色甚佳三十日駐蹕於昻古里湖地是日閲右翼達卜孫腦爾之馬羣其數至二萬匹整齊肥壯不可言喻初一日駐蹕於俄羅特布拉克之地是日閲正黄旗牛羣其數一萬六千頭羊七萬隻䝉古王等以下喀爾喀厄魯特之人咸以為竒云自我祖宗以至於今但有牛一二千頭遂稱極富從來未聞有至萬頭者今見馬匹無論大小盡皆肥壯光澤羊隻甚肥曩時亦曾聞朝廷之牧畜蕃多或以為告者太過未之深信今目擊如此始知我皇上諸福駢集羣相驚異贊頌向來聞張家口外甚寒自今觀之頗覺和暖河亦未凍或一處始有薄冰草雖黄而草根尚有青色夜間帳幕中不必燃火人服綿衣皮褂者甚多聞他年亦不如此較之哨鹿之地甚為溫暖朕行䝉古地方多矣似此佳處未之見也此皆聖祖太宗皇帝幸歸化城時所指之地遺於子孫牧圉日增孳息日盛也宜哉圍獵時觀之兔雖不甚多亦不稀少地極平坦可以此奏皇太后知之阿爾薩闌衛寨桑以其㓜主阿里牙來今令赴京師亦與車林查布一體恩視學士拉西識其人可令彼通譯車卜登貝勒之母亦詣朕前令其赴京此人皇太后亦知之可令進見丁亥上駐蹕昭哈停古北口兵丁拴養駱駝行兵部奏言古北口總兵官馬進良疏稱臣標出征兵丁原領駱駝六百三十三頭内三百三十三頭倒斃及回到邊口又倒斃一百五十一頭等語此項駱駝乃動支朋銀買備數不可缺應檄直撫及該鎭令彼屬官從容陸續補足備用奏准在案今該鎭既稱邊口地方于駱駝不宜請停餧養應停止古北口兵丁拴養駱駝現存一百四十九頭發至宣化交侍郎席米圖餧養倘有調用取而用之倘無調用俟撤回宣府所餧馬匹之時將此項駱駝取至京城分給八旗拴養停其買補著將原價照數陸續交付該撫存貯上從之戊子上駐蹕河約爾諾爾遣阿旺丹津赴大將軍伯費揚古軍前上諭議政諸臣曰今招撫伊喇古克三庫圖克圖使其徒阿旺丹津前往阿旺丹津到大將軍伯費揚古處後著於前此張家口願往八員内撤三四人同阿旺丹津遲七八日後行如前此遣往之人已皆起行無可同遣之人即將阿旺丹津暫留大將軍處此後有當遣人機㑹再同遣往爾等可使撥什庫一名送阿旺丹津至將軍費揚古處庚寅駕自巴倫郭爾啟行見沿途隨行商賈人等遇河徒渉思河水已寒乃命叠乗侍衛之馬以渡之駐蹕胡魯蘇台命以大兵馬駞交侍郎多竒監養大將軍伯費揚古奏曰臣軍中有右衛兵二千五百黑龍江兵五百共三千今噶爾丹已逺遁博羅烏納罕空金札巴干等處請遣回右衛兵一千養馬如有取用再往調𤼵至宣大所餧西路兵之馬駞内瘉瘦者原交喀爾喀部長台吉額爾徳尼哈灘巴圖爾滾占因聞報見厄魯特形踪遂以馬八百給右衛兵乗坐給駱駞一百二十頭䭾載行李此内所餘瘉瘠馬七十三匹駱駞三十九頭交存達爾漢親王諾内處俟來年肥時聽該部收取其兵丁處撥馬八百匹駱駞一百二十頭小心趕䕶進徳勝口解至大同𤼵與監牧大臣餧養上命著將馬駞檄監牧侍郎多竒收領小心餧養厄魯特札木素白竒等被擄為奴上以銀各三十兩賜其主皆贖之先是大將軍伯費揚古兵大敗噶爾丹於昭莫多之地斬噶爾丹之妻阿奴寨桑台吉厄魯特等二千餘生擒一百許子女三千許此所俘獲皆各給擒獲之主至是上賜銀贖出俱使得所嗣是以後有若此者無不贖還甲午上駐驛喀喇河朔命以歸化城米備給兵丁撤腰站遣察哈爾新滿洲更替黑龍江兵上諭大學士阿蘭泰尚書馬齊等曰今年歸化城一帶豐收價賤俟到歸化城後扈從人員應支十日口糧可折價給發令彼自買歸化城所貯之米乃為兵備之也此米有餘則右衛兵出行順便給散大有裨益到歸化城後自張家口起至歸化城止除常設驛站外其增設腰站俱撤去以兵部隨行之馬設腰站至殺虎口止又黑龍江兵出師日久據將軍疏言僅有食米可至十一月初五日俟到歸化城後應以察哈爾兵五百新滿洲一百足給馬匹糗糧遣往更替遣歸化城兵丁酌撥羸馬往大同右衛等處餧養上諭議政諸臣云兵丁僅十日不支糧猶可如多住日久不支口糧可乎况歸化城四圍草少著將浮多無事之人酌發羸馬至大同右衛等處餧養伺候或當遣黑龍江百名之兵或留此兵將新滿洲兵内發往著㑹議來奏議曰歸化城四圍草少若使浮多無事之人發羸馬至大同右衛等處餧養伺候甚有禆益其侍衛䕶軍俱扣數帶來不遣行外應於八旗二十四員䕶軍叅領内撥九員内務府各色執事人員内撥三十六人牽駱駞之披甲内撥四十人伊等馬匹羸瘦俱當發往取土黙特披甲代牽駱駞此項發往餧馬者共九十四人其乗來官馬取臕大者存之以留居人等瘦馬換發遣至大同監牧三旗内大臣所查照前額支草料餧養如有額外浮冒支領者查出嚴加治罪留居此地大臣侍衛䕶軍披甲職事人員之馬視歸化城四圍好草之地牧放其黑龍江將軍薩卜素帶來百名之兵著令往右衛餧馬上曰此發往人員臕大之馬不必調換盡著發去其留居人員之馬著内府總管上駟院總管太僕寺同騐馬臕將臕瘦馬匹亦發往餧養此發往馬缺撥馬補給薩卜素發往兵丁馬匹著薩卜素申飭屬下官員監視至趕解馬匹則撥新滿洲䕶軍三十名併帶其本身坐馬往薩卜素兵丁餧馬處著前去官九員監餧令侍郎亦廵行查視至牽駱駞則取土黙特兵中能步行貧人步牽之給伊等飯食餘如所議乙未嚴禁僕從及土黙特䝉古上諭内大臣曰明日到歸化城停止圍獵著大臣侍衛俱鮮明衣服肥馬垂纓又歸化城商賈叢集恐僕從肆行搶奪併交副都綂阿廸嚴禁恐土黙特䝉古盜我大臣侍衛執事人員兵丁馬匹著諭衆通知丙申駕自白塔往歸化城大排鹵簿歸化城副都綂阿廸等率官兵來迎又老少男婦皆執香擁集路旁跪接歸化城大喇嘛陀音庫圖克圖西勒圖庫圖克圖率其下諸喇嘛排列旛􅓚手皆執香作樂來迎上入覽陀音庫圖克圖廟西勒圖庫圖克圖廟黙爾根綽爾濟喇嘛廟諭内大臣曰廟中狹隘放入頂禮諸人地窄難容明日視廟前左近壙地駐蹕大臣侍衛䕶軍兵丁執事人員有願住房者聽之不之廹也著通行曉諭以庫銀借給官兵購買馬駞上諭尚書馬齊曰視歸化城馬駞甚多其價亦賤官員侍衛兵丁有欲借銀販買馬駞者奏聞借給先是騎官馬新滿洲不准借給今有借者亦准給與丁酉諭中西兩路酌議運米事宜先是于成龍等奉㫖兼程赴歸化城至白塔迎駕上諭曰爾等前次運米遲悞罪在不宥朕今許爾等効力自贖其將爾等捐牲口幾何能運米幾何與西路運米諸臣一同酌議具奏于成龍等奏曰臣等幸䝉寛宥令効力自贖臣等雖捐糜頂踵不能圖報萬一目下王國昌等官員十人俱在大將軍軍前効力請發該部作速調來㑹議覆奏上曰然著作速往調至是于成龍王國昌等㑹議奏云于成龍願備駱駞四十頭李鈵喀拜各願備駱駞三十頭王國昌喻成龍辛保范承烈各願備駱駞二十五頭挽運遣察哈爾官兵赴大將軍伯費揚古軍前効力上諭察哈爾官兵曰爾衆察哈爾官兵並無俸糧而勤勞素著是以朕每有詔㫖必云我察哈爾今遣爾等往聽大將軍指揮爾等到後其各努力自効旋師之日必使爾軰各得其所給右衛陣亡官兵身價銀停扣官兵所借公庫銀上諭大學士阿蘭泰曰右衛官兵屢次出征殊為勞苦阿蘭泰爾可往查陣亡兵丁給身價銀停扣兵丁所借公庫銀爾可携學士一員酌撥章京乗驛而往到日集衆傳㫖阿蘭泰請帶學士倭倫併請諭㫖奏曰倘有陣亡官乞併給身價銀至官員所借銀兩及不出征人等所借銀兩亦請一槩停扣上曰陣亡官兵僕從俱盡給身價銀至不出征官員兵丁所借銀皆著停扣阿蘭泰等又奏曰聞陣亡者之家口亦有回京者此應在京給與臣等不必再給給銀之時臣等親身一一騐給上曰善達賴喇嘛達賴汗使人入覲許之諦巴使人入覲不許上諭議政諸臣曰伊什格隆來奏言達賴喇嘛使人聞駕臨此地前來迎接當令在歸化城十里外伺候著議政諸臣議奏議曰達賴喇嘛使人聞駕臨此地前來迎接應令達賴喇嘛使人達賴汗使人入見不應令諦巴使人入見上從之著將軍薩卜素率善射甲士二十名扈從其餘官員僕從馬駞皆發往右衛餧養所留披甲二十名著併入三旗一百八十䕶軍内各附旗下有親戚者而行皇太子請赴行在皇太子奏曰今春百日有餘逺離膝下兹又不獲望見天顔者兩月有餘臣子慕戀之思誠難自解今内府所有廐馬旗下馬兵部馬實皆肥好如或召臣減從而行父皇若少待亦無所悞半月之内似儘可到也聖心垂念准行上曰所奏已悉皇太子不必前來戊戌上諭内大臣曰每日拴馬二三匹預備何為若朕明日出則今晚傳使馬略得食午時上出行宫左翼則科爾沁和碩達爾漢親王額駙班第和碩土謝圖親王額駙沙津喀爾喀和碩親王策旺札卜多羅郡王端多卜多爾濟内大臣科爾沁一等台吉額爾黑圖等及陀音庫圖克圖等厄魯特降人布爾扎等右翼則内大臣西勒圖庫圖克圖達賴喇嘛使人剛占堪布丹巴囊素達賴汗使人彭素克青海台吉札什等使人喀木札木卜等及歸化城官員土黙特官員黑龍江官兵察哈爾官兵俱坐左右兩旁作樂飲宴己亥使内大臣呉巴什等率察哈爾兵赴大將軍軍前上諭議政諸臣曰近者將軍費揚古疏稱黑龍江官兵支過五十日糧於九月初五日期滿故將喀倫所有之米算至十一月初五日給與兩月之糧除截留千石米外餘米俱賞給䝉古截留米千石已全給與官兵喀倫地方無現存之米矣等語前者原令將喀倫所有之米儘給兵丁再將所餘給七旗䝉古兵今遽給之則為時太早而非䇿矣著以此檄將軍費揚古知之兹𤼵察哈爾兵五百使散秩大臣呉巴什領之給兩箇月餱糧赴大將軍費揚古軍前此兵到後著閲黑龍江兵内人强馬壯者選百人留之其官員亦計兵額留之于解往銀五千兩内酌量支取以給所留一百之兵准較察哈爾兩月糧數亦給與兩箇月糧所餘兵著遣來再遣叅將張文煥副以一章京至祖良璧處探問與厄魯特如何征戰來奏使協理台吉多爾濟思喀卜等同員外舍稜駐劄哨探議政諸臣奏曰據員外舍稜報云職到安王駐札之地即遣人前往躧探並無聲息踪跡又據職同行蘇尼特多羅郡王薩木之子協理台吉多爾濟思喀卜多羅貝勒博木布之子協理台吉蘇代喀爾喀輔國公車木楚克納木札兒衛徴諾顔阿玉什等告稱我等以為此行止到土喇故兵丁之來僅帶八十日口糧併無冬衣今兵丁既無冬衣口糧亦將完等語將伊等或撤或留祈大部轉奏請㫖示知查厄魯特噶爾丹已無去路極窘之際探噶爾丹聲息者關係緊要且大將軍兵未撤則員外舍稜所在台吉兵丁不便遽撤應檄舍稜令將此兵各撥本旗内兵更替或遣内中兵歸取衣糧回留彼處探聽上曰著多爾濟思喀卜蘇代車木楚克納木札兒衛徴諾顔阿玉什等本身於大將軍未撤兵之前與舍稜同駐探聽其他兵丁俱著歸去賜執訊人尼兒察等白金理藩院奏曰部長一等台吉車陵札卜阿里雅呈稱我尼兒察杜稜布達胡兒齊羅卜張塞稜額勒兒代博克圖鄂克森阿玉什張布等十一人往擒生口獲厄魯特兩人至軍中獻之御前解人兩人已賞銀各十兩其餘未往者俟回京時再賞等語相應賞擒獲生口之尼兒察等十一人每人銀各十兩上從之庚子曉諭内大臣呉巴什上諭呉巴什曰兹遣爾五百察哈爾兵赴大將軍伯費揚古軍前並無緊急之事爾等當緩行毋得勞馬爾到將軍軍中之後聽將軍指揮將軍以為好朕無以為醜之事若以為醜朕無以為好之事至爾人材亦居中下當令内大臣䇿旺諾爾布一等侍衛鄂齊爾杜拉爾與爾偕往商酌行事此兩人皆得當可用之人勿以䝉古待之呉巴什等奏曰謹識皇上訓㫖竭力而行又諭呉巴什曰爾到彼處傳諭將軍言朕幸歸化城兵丁執事人員皆乗内廐之馬目下在大同肥秣馬匹如有急用當預先奏聞辛丑命將軍孫思克博濟率兵駐肅州㑹同副都統阿南達相機𠞰滅噶爾丹阿南達奏曰臣領巴圖爾額爾克濟農等兵前來或應遣回或留駐甘肅等處如遣回則不必言矣如仍留之則喀爾喀巴蘇特部長黙爾根濟農一等台吉索木伊思卜等七台吉巴圖爾額爾克濟農之子玉木楚木等四台吉共二百五十名兵所帶兩個月口糧已完乗來馬駞俱已疲瘦今草枯天凍若不餧馬則有所行動不可用矣應將撥給口糧馬駞草料之事煩貴部轉奏請㫖施行上發議政諸臣議奏㑹議云噶爾丹窮困已極各處逃竄應令阿南達巴圖爾濟農等率兵駐肅州不時遣䝉古諸人探聽如有聲息遵前㫖𠞰滅著伊等給與兵丁口糧馬駞草料上曰噶爾丹窘廹已極必亡命走哈宻著檄孫思克率其標兵赴肅州至阿南達處預備著將軍博濟於西安兵内未行者選人材偉健之兵二千名亦赴阿南達處㑹同孫思克探噶爾丹有往哈宻城之聲息即行𠞰滅併將朕自十九日出行以來為厄魯特奏報之事俱謄出發至阿南達處使知情形餘如所議副都統阿南達奏報噶爾旦多爾濟肅州之約阿南達奏坐探布隆吉爾得爾白兒濟灘納秦諸路哨卒以噶爾旦多爾濟所設哨卒名拜格者解至臣處臣泛論之際謂拜格曰汝可往告汝噶爾旦多爾濟聖上待汝比衆不同將撫育汝汝反逃去如此舉動是乎爾等並未作大孽奉㫖與巴圖爾額爾克濟農同居巴圖爾額爾克濟農擅去游牧爾等亦無知同行游牧其時爾年小不能禁止下人聖上亦灼知之聖上不過軫念爾祖窩齊爾圖車陳汗玉成汝而已故到處之人皆尊待汝爾可以我此言往告噶爾旦多爾濟後噶爾旦多爾濟亦差納木喀巴兒喀木札巴等十人來告曰皇上憐我祖我兄使與巴圖爾額爾克濟農接壤而居予之牧地永享安樂因巴圖爾額爾克濟農擅自游牧我等無知亦同往游牧及皇上勅㫖到日我年方㓜我母一婦人不能回奏每思此情何以得達今祈侍衛將我奏事之人一同帶往可乎臣語之曰爾厄魯特之人不可信果欲遣使當於十月二十日務令使人到肅州既與之約乃遣之歸上發議政諸臣議奏㑹議曰副都統阿南達既與噶爾旦多爾濟使人約十月二十日務到肅州應俟噶爾旦多爾濟奏章使人到日再議上從之壬寅遣侍衛馬武以牛五十羊二百湯羊十迎賜大將軍費揚古軍前右衛官兵癸卯副都統阿南達奏報各路備兵阿南達奏十月十四日接到理藩院咨文内稱阿南達所奏三事奉㫖報聞著將噶爾丹窘廹情形備文發去使彼知噶爾丹窮困之故彼所應備之事仍令敬愼預備欽此臣自布隆吉爾地方十月初二日使噶爾旦多爾濟來使賫文諭哈宻回子頭目達爾漢白克曰聞逃來人言丹津鄂木布叛其叔與戰而他往阿喇卜灘率千許人自札卜喀往投䇿旺喇卜灘噶爾丹自身不及千人在頽河無口糧牛羊無住屋冬衣云倘噶爾丹往投汝地可星速遣人於噶爾旦多爾濟令噶爾旦多爾濟助汝噶爾旦多爾濟乃我同朝之人汝其勿疑此外又傳語噶爾旦多爾濟曰哈宻若往報汝汝即遣人來報一面往助哈宻協力而行灘納秦都爾白兒濟各路口子撥人小心駐防哨探阿南達親身於十月十二日到肅州同提督李林隆㑹商備緑旗兵二千在額濟内昆都倫等處仍坐哨探聽併令李林隆防守邊疆各自整備訖上報聞且以示議政諸臣曰阿南達處處備兵朕甚為之喜諭學士朱都納謹飼馬匹上諭議政諸臣曰厄魯特之桑札卜等於九月二十四日自庫冷白兒齊爾來降問之告曰丹濟拉歸見噶爾丹欲掠喀倫左側因大兵在喀倫四圍處處堵截是以懼而不進詐遣察罕哈什漢來約降聞翁金有米而往奪之又被守米之兵所敗噶爾丹聞報而大恨曰僅仗汝兵搶奪而已今竟無所獲不得已往哈宻以馬易粟為食如不納則死戰於是從庫冷白兒齊爾於二十二日起行向哈宻而去云今噶爾丹已行向哈宻而去當乗此機㑹作速𠞰滅兹大同現有備養馬匹著是軍即由内地前往倘有不堪瘦馬即將彼汛地緑旗兵之馬換取而去所過地方每宿酌取草料餧養再速差一章京往學士朱都納處視朱都納解來七千匹之馬不論何地相遇即止之令學士朱都納即於地方取草料用心飼養此前去大兵不論何處相遇乗此七千馬而去使一章京陪鄂欣速至阿南達處使鄂欣在阿南達處居住倘噶爾丹在我大兵未到之前已到哈宻著阿南達等勿失機㑹集議以為噶爾丹窮無所棲往投哈宻乗機𠞰除誠為緊要皇上籌畫周詳俱當欽遵諭㫖而行查大同有前鋒八百鎗手䕶軍一千毎旗子母砲三門兹為𠞰噶爾丹往趨哈宻應令此軍全行其統軍者應以何人為將軍應給何項將軍印應以何項大臣為叅謀伏候上裁又學士朱都納處差一章京副都統阿南達處差侍衛鄂欣與一章京俱令欽遵上諭而行請行文知㑹陜西將軍督撫至每宿支給草料應撥户部章京前去上曰另有商奪奏摺暫存速檄學士朱都納將伊解來七千之馬聞㫖之地即便駐札自彼地方支取草料用心飼養大同陣亡病故獲傷緑旗官兵以至僕從俱加恩先是欽差大學士阿蘭泰學士倭倫往查右衛大同陣亡官兵還將所查陣亡人員照例給與身價及出征身故得傷官兵僕從數目官兵所借官庫銀數目開摺仍請㫖上曰朕覽死亡人數中心惻然殊為不忍然此亦不得歸罪於大將軍費揚古也彼特奉朕之命刻期而來始致如此右衛官兵誠極苦矣今著將滿洲䝉古漢軍官兵所借官庫銀兩盡行蠲免漢軍扣銀之例不同自此㫖下後漢軍借銀照常扣取除陣亡者已給身價外其出征病故官兵僕從及得傷官兵僕從等俱照所查數目如例現行給賞此係已經查明事件大學士不必前去著學士倭倫往騐一一給發倭倫到右衛後集衆宣㫖將行查加恩之事遍諭諸大臣再備細開明發往大將軍處使之知之出征右衛兵到日亦著阿蘭泰召集曉諭至大同緑旗兵亦出征數次其陣亡病故得傷之人亦照例令學士倭倫騐賞如有無子嗣者則有賜祭例亦照例賜祭阿蘭泰出召集諸大臣傳宣上諭諸大臣跪奏曰皇上之愛養兵丁至矣盡矣効力戎行彼分内之事也䝉皇上特遣大臣至右衛給陣亡身價銀今又將所借官庫銀數十萬兩盡皆豁免得傷官兵僕從及出征病故官兵僕從皆現銀給賞此不但衆官兵生死均霑厚恩臣等聞聖上溫綸大賚亦無不傾心也上諭皇太子曰十四日從托音胡圖克圖寺移於南關下營十五日駐宿整備大宴達賴喇嘛之使達賴汗之使瑚瑚腦爾八台吉之使歸化城喇嘛察哈爾之將士歸化城之將士俱賜筵讌極其華整十六日駐宿遂於西勒圖胡圖克圖寺觀看儺舞十七日至二十日皆駐宿此數日自早至夜分無有暇時從四方來之䝉古喇嘛及王與妃等以至兵民婦女咸集進獻駝馬牛羊食物者絡繹不絶或有至貧苦之人亦持馬絆絡首鞗革而來以獻其忱自軍中來者為喀爾喀之善巴親王諾鼐親王毛明安之班第貝勒渣薩克之台吉納爾布白蘇特之車陳即農呉爾占厄爾即亨之滾占哈坦把圖爾喀爾喀之黙爾根納顔之弟開木繩等有名目之人問以噶爾丹之信息答云我等在軍前知之甚詳噶爾丹信息今已急廹噶爾丹所居之地原係我等所居極其寒冽所食者雖無猶可食人馬之肉至衣服無有一夕遭遇極寒惟有凍斃而已更將何法以禦之我等杭愛山之地亦將為我困噶爾丹矣朕在此日事利濟人之離散者令其㑹合聞何處有彼婦人稚子即以價贖之令其完聚故來降者不絶以為善事而送出者亦衆九月初一日費揚古伯所調右衞之兵前已疲勞又無馬匹徒然調發以致困苦今回師將至故令親近侍衞馬武帶牛五十隻羊二百隻湯羊十隻往迎及到近地朕親於黄河岸迓而宴之乗便於鄂爾多斯之地圍獵觀其形勢軍士從京師乗來之馬俱於大同府餧養聞其甚肥現今隨朕前來之人皆乗牧羣之馬駒而來其略瘦者即換新得肥馬乗騎尚有餘剰駝馬之價甚賤駱駝佳者不過二十金肥馬不過二十金此際未得噶爾丹確信堵截𠞰滅皆周詳謀畫以行可將此繕寫奏聞皇太后宫中咸令聞之聖祖仁皇帝親征平定朔漠方略卷三十一

body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷十四康熙三十三年正月庚申命降人博濟台吉歸其兄巴圖爾額爾克濟農將軍孫思克奏蒙古頭目博濟乃巴圖爾額爾克濟農之弟隨衆逃散今聞伊兄復降蒙皇帝浩蕩之恩仍安插寧夏賀蘭山率其屬下男婦一百一十餘人來降求與伊兄同居命理藩院遣官一員送博濟等至巴圖爾額爾克濟農所令其完聚三月丙寅諭將軍博濟率師赴孫思克軍上諭大學士伊桑阿阿蘭泰曰今已暮春正草盛之時噶爾丹與䇿旺阿喇卜灘戰或近至邊境亦未可定可令將軍博濟選西安滿兵一千五百身親率領於文到日速赴將軍孫思克所駐防如有當行之事同孫思克商酌而行將軍郎坦等兵仍暫駐寧夏孫思克等倘有事移文一到郎坦等即速往會議而行四月己卯命尚書班第等偵伺噶爾丹聲息上諭理藩院曰今青草既出應遣人與公西卜退哈灘巴圖爾使者同往探聽爾衙門議之議曰若遣人探聽即令去員帶折卜尊丹巴庫圖克圖土謝圖汗材幹之人與公西卜退哈灘巴圖爾使人同往至公西卜退所另撥才能之人訪實和托揮特根敦帶青所在地方即從彼處細覘噶爾丹情狀所遣大臣官員伏候上裁仍將偵探原由具文移知公西卜退哈灘巴圖爾根敦帶靑奏入得旨著班第䇿旺諾爾布夸色俄齊爾杜喇爾前去班第等瀕行恭請訓旨命與大學士等同入上曰伊等若往擒生口則起釁端矣姑探其動靜可也此地亦可得彼消息惟以招撫和托揮特根敦帶靑等為要當使伊等往彼宣旨念噶爾丹與汝逼近常恐為汝害汝爾當移近西卜退哈灘巴圖爾納木扎爾陀音阿里雅等遠設哨探倘有警汝等同心併力而行於事似有大濟此朕為汝等慮也西卜退哈灘巴圖爾等現在土喇遊牧汝等不論居何地朕無所嫌况噶爾丹事平之時喀爾喀通國仍遣歸故土也班第等無兵如得消息可即歸來辛卯命安插厄魯特降人台吉巴拜員外郎二郎保疏言有厄魯特台吉巴拜者四厄魯特內杜爾伯特大台吉達賴之孫也與其兄之子齊克宗來歸云我等向與噶爾丹一同遊牧喀爾喀與厄魯特交惡我兄弟散者散殺者殺盡失我屬裔我等再四求噶爾丹還我兄弟噶爾丹不豫此事既無人往説又懼其威姑隱忍而已烏闌布通之戰欲棄噶爾丹來降曾因濟隆伊拉古克三從者告之於裕親王內大臣想親王內大臣至今當復記憶也是以仰慕皇風特來歸附奏至得旨巴拜等習居邊外若來內地居住難以為生著理藩院遣官送至哈喇沁令扎什王撫養之五月戊戌朔命遣侍郎滿丕宣諭噶爾丹使者將軍伯費揚古疏言噶爾丹使人納木喀喇克巴喇木扎木巴喇嘛等率二千餘人稱請安納貢臣即遣發官兵迎問實情因其人既有二千許過歸化城當示之以威隨令殺虎口副將黃元調其標下緑旗官兵六百前來俟噶爾丹使人過後發回本汛及所遣參領阿喇納班第等回云詢據噶爾丹使人言我等實來請皇上萬安查其人數則有男子五百餘婦女僮僕千餘奏入上曰令噶爾丹使人止於歸化城比來現有姦細事情可遣官詰其來故併取其奏章來應否答敕令議政大臣領侍衛內大臣大學士部院滿洲大臣會議議曰應遣理藩院官一員乘驛前往詰問來意俟其奏章取到應答敕與否容再議具奏至安北將軍既稱調殺虎口緑旗官兵六百應令暫留歸化城俟噶爾丹使人去時遣回原汛得旨著滿丕往諭噶爾丹使人云爾等陽為修好潛留人為細作各處窺探是以止爾等於歸化城問爾來情視爾奏章再議其前此留寓歸化城有納秦和碩齊等皆橫行不法著交與來使餘如議癸卯命發西安兵赴寧夏兵部奏言臣部前奉上諭檄選西安滿兵一千五百令將軍博濟親率赴將軍孫思克所駐防將軍郎坦等之兵暫駐寧夏今川陜總督佛倫奏稱邊外靑草雖盛而偵探蒙古並無犯邊消息地方太平應暫停西安兵至將軍孫思克等仍令撥賢能人員不時遠探如有噶爾丹消息一切應行之事即遵前旨檄西安將軍博濟昭武將軍郎坦各率預備之兵會商而行上曰寧夏近賀蘭山地居要害若撤寧夏滿洲兵時將西安所備兵一千五百發至寧夏爾部識之可即檄知總督餘如議甲寅命發新編佐領蒙古官兵附右衛先是將軍伯費揚古疏言歸化城倉中糧米係皇上遠慮特為積貯新編三十佐領蒙古官兵不便久供致使坐耗酌量右衛將軍到時臣自此地撥土默特人夫送此三十佐領官兵並派土默特兩旗都統或副都統各一員率官兵護送交付右衛至是將軍希福疏言三十佐領下披甲蒙古三千人內除死亡疾病一百六十七人其缺無人頂補應將其戶口附於本佐領內給之口糧俟幼童成丁日頂補則士卒整齊而錢糧不致空耗矣上從之閏五月壬申命誅姦細賽特等理藩院奏噶爾丹所遣姦細賽特與回回國汗阿卜都里什特所遣姦細沙和卓及阿卜都喇額爾克寨桑所留姦細伊巴里木他斯顧兒馬哈穆特庫爾班應令原審官刑部郎中蘇爾特理藩院主事常明帶往歸化城與將軍內大臣伯費揚古會同當噶爾丹使人前正法其餘在此正法得旨賽特等不必押往歸化城著即於此地正法乙亥以台吉車陵扎卜為扎薩克編其屬為佐領喀爾喀台吉車陵扎卜之父達什本土謝圖汗六扎薩克中之扎薩克也因與滾濟思扎卜遇噶爾丹之亂投入俄羅斯今車陵扎卜收集其衆來歸命所司議理藩院議台吉車陵扎卜收集其屬下六百餘人自俄羅斯來投皇上應授為扎薩克一等台吉其屬下六百餘丁按例每佐領以一百五十丁算編為四佐領命下之日將應授佐領驍騎校小撥什庫十家長人名送臣衙門注册議入上從之丁丑發敕諭噶爾丹令親來會閲先是遣侍郎滿丕往諭噶爾丹使人詰其來故併取奏章至是滿丕取到噶爾丹奏章其詞曰奉到來文及賜物不勝歡忭豈我前者不明來文意指故錯奏乎抑不諳語言不識文字故覆奏之語有錯乎我覆奏詞意想有不符已經陳奏外今特將從前奏詞再一陳之先是折卜尊丹巴土謝圖汗兩人違命侵我以致交惡蒙皇上洪仁先遣阿齊圖綽爾濟學士拜禮後遣伊拉古克三庫圖克圖商南多爾濟諸喇嘛大臣為使屢經公議逐出七旗使歸故土而索折卜尊丹巴土謝圖汗兩人後商南多爾濟又當濟隆庫圖克圖伊拉古克三庫圖克圖之前許畀以折卜尊丹巴庫圖克圖土謝圖汗兩人又其後內大臣吳丹色爾濟當濟隆庫圖克圖前定議之時亦如前奏索折卜尊丹巴庫圖克圖土謝圖汗兩人乞三言內定一言將七旗發回故土已有定議我於濟隆庫圖克圖之前當內大臣吳丹之面實親聞此語何可誑奏乎此兩次來文與前定議之言逈異是以蒙皇上洪仁節次付託之事不能遵旨而行想所議之言未經奏明之故爾然皇上洪仁顯微悉照中間行人喇嘛諾顏雖有隱諱亦必洞見乞仍照達賴喇嘛使人濟隆庫圖克圖定議又奉諭若至窮困仍必加恩不勝歡忭請霈如海之仁賞銀五六萬兩給付去使因此得蘇將再近前往領大賞也至扎木巴兒臧布於此旨未到之前言欲往西方我向來並不攔阻往西方之人此事今應作何裁度乞降敕旨上命特降敕書交發來使敕曰朕承天命統御萬邦凡恭順者奬勸以示優恤若譎詐者亦必優容之以匡正其非使歸於善為主爾噶爾丹於烏闌布通之地為我兵所擊潰敗而走於時即可破汝矣朕軫念汝厯年篤誠不忍遽滅不使窮追停止各路進𠞰之兵遣內大臣吳丹等出使於爾爾在威靈佛前堅誓永不敢犯印文誓書猶在也朕謂爾不背盟許爾使照常往來待汝無異意此情已屢經敕諭不必一一悉數今閲爾奏欲依達賴喇嘛使人之前所定之議請將折卜尊丹巴土謝圖汗畀汝按爾前奏內有索折卜尊丹巴土謝圖汗三言內以一言為定將七旗發回故土已蒙許畀以折卜尊丹巴庫圖克圖土謝圖汗之語想此乃小人欲自脫其身而為此言爾果有此旨豈有不授爾敕者乎執來歸之人以畀其讐可乎敕諭甚明何常不解爾奏內之言即汝亦未常不解我之言然皆烏闌布通戰前之事誓後不得復引以為辭况爾違朕前旨及達賴喇嘛之令伐喀爾喀致喀爾喀等窮迫來降朕賜之銀米牲畜以為養贍達賴喇嘛聞之甚喜奏言惠濟喀爾喀真如我佛慈悲噶爾丹者大君所當責而誅之者也而俯恤衆生有如赤子復加寬宥達賴喇嘛此奏前已併敕諭發汝矣即安插喀爾喀之事亦敕汝知之矣倘爾噶爾丹為喀爾喀所敗而來歸命朕亦當受而養之斷不擒以畀喀爾喀也此即朕萬邦一體之意朕從來敕汝俱布實情並無惡意今爾不將馬迪被害之故回奏覆旨反將前者跪頂威靈佛誓不犯中華皇帝之喀爾喀以及一切人民之誓付之不論徒以使臣喇嘛為辭又將達賴喇嘛與朕處置已畢之事屢屢翻覆包藏禍心以圖搆釁遣回子於內地為姦宄偵探以此觀之則爾外奉宗喀巴之法而入回回之教實不欲朕扶助宗喀巴并達賴喇嘛之法彰彰明矣爾所行之事蒙古皆知之反側如是朕已秣馬厲兵但視爾舉動耳爾又請霈如海之仁賜銀五六萬兩原諭謂近朕之前來請則加恩賚且許之互市爾皆不副朕旨豈有賜銀之理爾奏內又云扎木巴兒臧布言欲往西方我向不攔阻往西方之人夫扎木巴兒臧布者壞達賴喇嘛之教行事悖亂爾知而故留不即發回是亦已矣至爾所遣回子姦細未識爾知而遣之抑爾種類中潛為之也今已將爾使人所留姦細內顧兒馬哈穆特一人活之令歸報爾餘皆正國法矣此事若爾果不知爾種類潛為之則此等壞事之人不可復留可將此人併顧兒馬哈穆特即於爾地正法雖然爾厄魯特喀爾喀之事朕與達賴喇嘛始終教誨發敕遣使不少矣爾不準誓書索喀爾喀不已且又以不解我言語為辭是雖發敕遣使終無了期朕反覆思維不得不會閲以定之此會也遣他人亦終無用必須爾親來與朕面議方可定也且以此情遣敕諭達賴喇嘛爾如遵朕旨可速奏定會閲之日與期約之地其遣奏時須爾丹濟喇丹津俄木布兩人內遣一人來其他微賤之人不能洞曉如爾難於會閲則當如前誓不復及喀爾喀之事速誅害馬迪之人具奏請罪則仍許爾使往來互市如仍執迷不悟欲行詭譎則永絶爾使貿易爾覆奏未到雖有使來亦不許入爾現來之使本當不許市易但回子事或者爾原不知故權使市易併與前所留納秦和碩齊同遣出境達賴喇嘛處亦以此敕諭之矣今以諭爾敕書付爾使納木喀喇克巴喇木扎木巴諾顏和卓賫往七月壬申巴圖爾額爾克濟農奏報追斬祁齊克巴圖爾額爾克濟農疏言祁齊克逃遁當即遣莽奈哈什哈追之今莽奈等回言追祁齊克及之於耨爾格山諭降不應發鳥鎗相拒莽奈哈什哈等亦發鳥鎗與戰殺祁齊克及隨逃巴雅克海桑獲祁齊克所乘青馬所佩弓刀所執鳥鎗併駱駝四頭馬一匹具疏以聞癸酉諭將軍伯費揚古總統各路官兵往土喇相機進𠞰上諭內大臣索額圖大學士伊桑阿阿蘭泰尚書馬齊索諾和曰尚書班第等奏言和托揮特根敦帶靑發二十人往探噶爾丹消息行十日遇厄魯特兩人殺其一擒其一以回班第等遂訊之知噶爾丹今年正月至庫克碩東杭奇喇察克屯劄覓根敦帶青若不得則必踵迹內向至土喇地方或在邊境之上劫掠喀爾喀亦未可定等語今馬已肥壯應調寧夏兵歸化城兵右衛兵從克魯倫至土喇往覓西卜退哈灘巴圖爾探聽情形如噶爾丹近至土喇侵害喀爾喀我軍有可乘之機令諸將軍相度而行如我軍未到彼已先趨內地則徑襲其後趙良棟熟練軍務郎坦去攜之同往令趙良棟選寧夏火器兵二三百隨行寧夏兵支寧夏之米而行歸化城兵右衛兵支湖灘河朔之米而行此機會斷不可失著內大臣議政諸臣會議議發大兵至土喇等處探聽倘有可乘之機不得坐失機會聖諭至當應遵奉而行寧夏兵往克魯倫計往來之程令將軍郎坦隨宜支糧右衛兵應給三月錢糧歸化城兵應各給三月米又右衛兵前去未久今又遣行著將大同宣府所喂馬各給一匹有欲預借錢糧者許其預借不得過五月右衛大臣應留何人寧夏兵右衛兵歸化城兵既會齊後費揚古郎坦希福三人中應以何人為將軍統領伏候上裁再飛檄尚書班第等探實噶爾丹動靜不時奏報得旨右衛護軍三名著全發所留之兵酌留官員主之諸大臣盡行歸化城都統副都統費揚古斟酌帶往寧夏近歸化城令郎坦兵速赴湖灘河朔支米隨費揚古希福軍後而行費揚古希福等兵及時支米作速起行費揚古乃領侍衛大臣著授為將軍郎坦希福仍留將軍印協謀而行至原任尚書阿爾尼諳練蒙古事亦令前往率蒙古兵為大軍前哨收養遺失馬匹侍郎滿丕甚有效力之心近雖在憂服中亦令往理驛務與阿爾尼協力行事餘如議壬午命簡大同緑旗兵五百從將軍費揚古行罷遣將軍希福兵部奏言建威將軍希福等咨稱願得大同緑旗兵三千令總兵官率之與我等同行又鑲藍蒙古旗分察哈爾兵近殺虎口居住其八旗察哈爾俱接壤而居相去不遠秋高馬肥丁壯整齊伊等前鋒護軍驍騎俱𨽻旗下請酌量派發附各旗遣至臣等軍前得旨大同兵原當從多調發但糧米如何能到令大同總兵官康調元親選兵五百與將軍費揚古同往右衛兵新往駐劄關繫緊要將軍希福可在彼料理事務不必前去至京城兵亦已預備察哈爾兵有急用之地與預備兵一同調遣不必發往己丑原任將軍趙良棟請以功加副將李莊等二十三員隨征良棟疏言功加副將參將遊擊都司李莊等二十三員願與臣同往效力乞於立功之後皇上格外加恩又臣家丁八十俱如手足得力之人願選四十人入三百兵數內帶去營辨俱繫貧乏臣自備馬匹給之支十日口糧與臣同往伏祈軫念照三百兵丁之例俱給錢糧馬匹上從之八月己亥命將軍伯費揚古等撤兵時各路兵陸續起行而邊外久無聲息上諭內大臣索額圖大學士伊桑阿等曰前聞噶爾丹來侵根敦帶青是以調郎坦等兵右衛兵歸化城兵令費揚古統之防備土喇乃尚書班第等至今無報似乎無事今時漸寒兵士前進殊為勞苦又聞噶爾丹有趣歸化城之意事雖未實回師防歸化城為是可令右衛兵回右衛歸化城兵郎坦兵俱回歸化城各秣馬探備大同總兵官康調元亦率其兵回大同趙良棟之來已近京城且令入覲而歸阿爾尼滿丕暫在歸化城偵探此事令喇嘛商南多爾濟郎中本什自此地馳驛前去伊等未到之前如土喇有警將軍等仍便宜行事亦令商南多爾濟為之探聽乙巳命發大兵預備時上巡幸塞外適總兵官王化行奏報云蒲草泉二日程哨探遙見有兵馬行動塵埃已調兵赴蘇俞口等邊矣兵部以聞上諭曰據報見有形蹤不可不備令康親王顯親王裕親王簡親王恪愼郡王各率親軍包衣兵預備待傳檄即來其隨駕大臣侍衛戰箭令接班侍衛帶來八旗隨駕前鋒護軍火器護軍等各應帶戰箭五十枝令各王帶來著將軍薩卜素回本汛備兵併檄盛京寧古塔兵亦令預備倘有舉動三處會兵而行著古北口總兵官石匣副將親撥火器馬兵二百預備待傳檄即來備兵行時將八旗馬上炮每旗各帶五門前去馱載駱駝自太僕寺支取自此地至歸化城設驛令侍衛特古思郎中關住往視安設探聽消息不時飛報已而寧夏坐塘筆帖式穆珠瑚續報前信未實上諭內大臣公國舅佟國維大學士伊桑阿等曰前因有厄魯特之警朕原欲往歸化城今坐塘筆帖式穆珠瑚奏報以為非實朕將東行或暫留此地以待消息爾諸臣議之議曰據穆珠瑚報稱非實未報之前皇上早已料及今穆珠瑚所報正合聖旨既已無事東行為是將此訛言檄京城諭衆上從之九月己巳命撤將軍郎坦等兵大學士伊桑阿奏撤三等侍衛特古思等新設驛站上曰朕適思之將有是命極當撤此驛站如有裨王事則士馬勞瘁宜也今事未實在彼亦無用歸化城兵亦當撤之其與領侍衛大臣議隨議以為應如聖諭撤歸化城兵併撤阿爾尼滿丕上曰歸化城有費揚古其右衛兵亦多果有消息自京而往甚近其郎坦等兵亦著撤回癸酉尚書班第等奏報招徠根敦帶青班第等奏言臣等欽遵上諭六月初九日遣筆帖式巴扎爾撥什庫丹巴同折卜尊丹巴庫圖克圖土謝圖汗使人併公西卜退哈灘巴圖爾納木扎爾陀音等十人往覓和托揮特根敦帶青所在巴扎爾等回言我等覓根敦帶青至色稜格之英格特布哈地方見之告以諸大臣前去之故彼遂遣其達爾漢諾顏他卜囊與我等同來伊身隨後內徙而來矣臣等即自公西卜退哈灘巴圖爾等所居土喇地方起行至俄爾洪圖喇之白兒齊爾根敦帶青留其行裝於波龍汗波爾哈台地方來請皇上萬安臣等傳旨諭之曰噶爾丹甚近爾地慮彼來侵爾其近徙至西卜退哈灘巴圖爾納木扎爾陀音阿里雅處遠設哨探倘有舉動爾等同心協力而行於事似有大濟此朕為爾等慮也西卜退哈灘巴圖爾現在土喇遊牧爾等不論居何地朕不汝責况噶爾丹事平之後喀爾喀通國仍令還故土乎根敦帶靑覆奏曰我等為厄魯特兵間阻有誤請安及後每欲赴闕但屬下之人俱各離散所收各處流人盡皆貧困無人管轄必致散亡故將遲誤之情遣人兩次自陳至第三次遣寨桑達爾漢諾顏他布囊始得上達叨蒙皇恩錫之訓諭今聖上又格外加恩以無用之人比之人數為我等深謀遠慮特遣四大臣宣諭恩綸不勝歡忭願遷我家産即與諸大臣同覲聖明請安謝恩但公西卜退哈灘巴圖爾納木扎爾陀音等俱有牲畜隨水草遊牧我屬下人賴採捕野獸為生惟伊魯諸處頗有野獸可以採捕請安插伊魯等處臣等允其所請將此七百餘戶連四台吉及千餘弓箭手共三千餘口遷至伊魯諸處安插將根敦帶青歸併公西卜退哈灘巴圖爾納木扎爾陀音扎薩克台吉阿里雅車陵扎卜等令伊等協力防禦遠設哨探倘有舉動協力而行隨傳令曰俄羅斯國乃納貢往來和好之國也爾等不得相犯即爾等內有盜賊之事亦當禁之隨率根敦帶青起行宿於克魯倫之內摩海圖地方適主事布顏圖賫部文至令速檄尚書班第探實噶爾丹消息不時奏報臣等令公西卜退哈灘巴圖爾等人員隨力趲進偵探聲息臣等四人內公議令二等侍衛俄齊爾杜喇兒與根敦帶青偕往謹以奏聞尋根敦帶靑到京請安上加恩賜授為扎薩克多羅貝勒甲戌將軍博濟奏請增兵博濟等疏言臣等至寧夏視寧夏與賀蘭山相近而邊口甚多地方甚要臣等携來滿洲蒙古漢軍一千五百兵倘有馳驅稍似不整西安現有滿洲蒙古漢軍五千五百名內請調五百兵至寧夏共為二千或行或守似可無缺其餘五千兵亦足以守西安諸處矣上不許乙酉巴圖爾額爾克濟農上書自理巴圖爾額爾克濟農奏曰前者俄齊爾圖汗臨民之時曾在上前請安進貢往來自噶爾丹起兵執俄齊爾圖汗殲其人民臣力未能支不得已率族衆來居西海數年伏思歸從聖主大化永得安樂自至賀蘭山以來蒙皇上恩賚十年之間不可勝計既富且安矣丑年臣來請聖安進貢蒙皇上仁恩以前俄齊爾圖汗進貢往來諸凡密旨使尚書阿爾尼傳諭臣遵奉皇上綸音銘刻於中至今不忘即如後臣而來之人飢腹皆飽憂思已息與四十九部同編旗分佐領乃皇上以佛菩薩之仁又欲使臣安樂給之以地而臣竟不能到者蓋因畏大兵之威臣部下紛紜散走不能禁戢故爾臣雖奔遁然不敢仰負聖上頂戴前旨而行兩次遣使俱不得達中途遇害臣在明安雅馬圖地方想望聖旨忽見將軍馬喇孫提督侍衛阿南達差撥什庫博爾和對來臣喜得重生即見諸大臣陳奏諸情自俄齊爾圖汗以來所蒙仁恩不可悉數臣族類困窮已極不能赴聖上指授地方奏請賀蘭山而居蒙恩許住此誠非常異數也且又收臣弟博濟離散之妻子人民給之使博濟得以完聚竊念今生何以報答臣願往指授之地編為參領佐領率臣子弟人民捐軀效死向者失信聖主每一念及常恨欲死伏乞皇上鑒而憐之得旨巴圖爾額爾克濟農所奏極是甚為可憫但達賴喇嘛奏請安插於彼屬下西海地方姑允其説現今達賴喇嘛有使人至俟使至日彼又云何斯時當另有旨也疏己留中矣十月己酉賜喀爾喀扎薩克多羅貝勒根敦帶靑扎薩克輔國公賽音羅卜臧印理藩院奏今以喀爾喀根敦帶青為扎薩克封為多羅貝勒賽音羅卜臧台吉為扎薩克封為輔國公伊等乃扎薩克親王䇿旺扎卜所屬根敦帶青應給管喀爾喀西路中營左翼下軍印賽音羅卜臧應給管西路中營右翼下軍印奏入上從之十一月癸未將軍孫思克請給馱炮駱駝草料思克疏言軍中對陳破鋭無過子母炮是以臣首捐俸銀助造子母炮五十門又勸諭臣標下衆官助造三十門臣標下共造子母炮炮子火藥等物甚重非能任重之牲畜不能隨軍速到是以又勸諭臣標下營辨與臣同助買駱駝百頭以備馱用如有駱駝倒斃者仍捐助補足但喂養駱駝草料無項可撥伏乞於臣等所買駱駝每年給六個月草料春冬則喂養廄中夏秋則牧放郊原以為定例庶可久遠上從之聖祖仁皇帝親征平定朔漠方略卷十四

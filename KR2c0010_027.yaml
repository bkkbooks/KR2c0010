body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷二十七七月乙卯朔皇長子胤禔奏聞遵旨頒行之事胤禔奏言臣於五月十九日留駐拖陵八旗兵漢軍火器營兵到後宣父皇旨諭領兵大臣曰八旗大臣皆朕簡用人員是役也噶爾丹不能抗威聞風而遁諸臣雖不得與之戰然嚴轄官兵不擾害沿途居民不酗酒搶奪橫行愛養馬匹小心牧放水草佳處不盜刈田禾餵飼馬匹不踐踏田地不遺棄一人一騎俱令全歸此即伊等效力之事也如橫行搶奪遺留人馬斷不輕恕諸臣奏曰蒙聖上豢養隆恩原欲遇噶爾丹捨身報效仗聖上天威賊人聞風而遁臣等不獲立功謹記聖諭竭力行事於是給伊等到邊七日口糧其到京之米令于成龍算給已遣行訖丹巴哈什哈等家口到後酌量撥給牛羊帳釡什物又恐到張家口後糗糧有誤自于成龍處取銀五百兩交侍郎西喇小心押護而往暫駐張家口外候旨已遣行訖遣行之時丹巴哈什哈等叩頭奏曰臣等之來降也因昔嘗來使蒙皇上厚恩臣等思僥幸偷生是以來歸不意聖上免我誅戮賜坐賜茶大加恩眷又命查臣等妻子兄弟家人使之完聚又以天時炎暑使之暫居張家口外自拖陵起行之時牛羊米麵帳釡什物無不賞給臣等皆萬死之人乃出自望外加以隆恩使得其所祈速令進京留之御前效力以完臣等之心又遵旨行文于成龍等將有病僕從撥車裝載回京後留步行僕從給之飯食用其力使挽車回京其因馬匹傷損留下盔甲等物俱裝上空車帶歸其護軍驍騎執事人員竟無馬者各給馬騾一匹使之乘坐遣行又宣諭八旗大臣之時諸大臣兵丁歡呼而言曰在京時蒙聖上人給肥馬四匹重加賞賚而出臣等毫無效力之處又恐臣等乏馬至於步行撥給馬匹天髙地厚之恩殁身難報叩頭稱謝歡聲震營五月二十六日奉旨令臣速歸以糧務交明珠于成龍隨行文將糧務交明珠于成龍訖臣軍中前鋒內府護軍執事人員無馬者酌取于成龍馬騾使之乘坐起程臣沿路而來查視邊外貿易之蒙古俱不爭競市易和平並無恃強買賣者滿洲蒙古皆大歡悅各驛遵旨以飯與米供給病人及後留步行僕從皆口有所食身有所倚咸謂蒙父皇之恩得以重生靡不歡忭臣二十三日入邊之後見沿途遵旨備香薷湯梅湯官兵僕從人得飫飲竟不傷暑皆歡呼曰皇上俯恤臣僕無所不周我等何以圖報皆遵法不敢踐踏田禾略不擾害百姓地方老少皆稱頌曰凡大兵所過無不踐踏田禾擾害地方者今統萬萬兵馬而行路旁田禾略不踐踏小民什物毫不侵犯聖上仁愛兵民至於此極誠亘古之所未聞未見也踴躍歡呼成羣結隊排列香案稽首謝恩上報聞且以示所司喀爾喀公蘇泰伊爾登獻俘蘇泰伊爾登奏言臣遵旨與大將軍擊敗噶爾丹俘哈什哈二人獲鳥鎗一桿甲一領羊三百請以上獻上受所獻甲鳥鎗及二人還其羊丙辰員外德兒格爾等查報分給西路兵糧事理藩院奏言員外德兒格爾報稱職於六月二十六日到歸化城二十七日都統阿喇納亦到問之阿喇納據云西安兵緑旗兵蒙古兵俱已遣回矣又問之曰目下俱到何地米於何地接濟阿喇納云西安兵緑旗兵六月二十八日二十九日間可到歸化城喀爾喀諸王之兵扎薩克喀爾喀達爾漢親王諾內本身及兵已到所居之地至六鄂爾多斯三吳喇忒毛明安之兵俱向其所居之地而去今蓋已到矣米則未嘗接濟我軍右衛護軍統領費揚固云我等至拖諾給我右衛兵及西安兵緑旗兵俱八日糧自此得食至察罕俄布又蒙皇上令鍾申保運米來迎相遇於察罕腦兒已給我軍又西安佐領沙濟云我等在前隊副都統巴林軍中聞副都統西爾哈達親身領兵自翁金起程隨我軍之後陸續而來為此報部謹以奏聞又鄂禮奏言臣奉旨六月二十八日到歸化城右衛護軍統領費揚固西安副都統巴林領納喇特一路兵而來問之據云我等自拖諾别大將軍費揚古而趨納喇特之路曾領八日糧而來西安兵於六月初三日到納喇特初四日過納喇特右衛兵於六月初七日到納喇特初八日過納喇特我軍在此路並未得糧蒙皇上軫念遣御史鍾申保以米來迎西安兵至歸化城一百六十里外巴顏俄博地方與之相遇遍給官兵右衛兵至歸化城二百里外西里巴賴地方與之相遇亦遍給官兵奏至上曰此事交户部尚書馬齊將德兒格爾報文一併發大將軍朕恐兵丁乏糧故預發米為備著彼將本路運米情事具奏垂喇克扎木素格隆有罪發部拘禁先是差垂喇克扎木素格隆賫敕追授噶爾丹五月十四日至圖喇見大兵擊敗噶爾丹噶爾丹遁去是以垂喇克扎木素格隆往副都統阿南所求為彼代奏至是隨將軍馬思喀兵回京入奏上曰此喇嘛差往噶爾丹不到而回著拘禁戊午侍郎西喇以噶爾丹去向來奏西喇奏曰奉旨問丹巴哈什哈曰皇上今使喀爾喀車陵扎卜等七台吉根敦帶青阿爾薩闌衛寨桑等率兵追討噶爾丹不知噶爾丹何往爾等之意云何丹巴哈什哈憨都察罕西達爾哈什哈等曰我等之意以為噶爾丹更無他往必投達賴喇嘛去矣其所以不他往者昔窩齊爾圖車陳汗之子噶爾旦木巴之女阿海原與䇿旺喇卜灘議婚康熙十八年娶阿海至不配䇿旺喇卜灘噶爾丹自取之二十七年居和卜屯時䇿旺喇卜灘之弟索諾木喇卜灘在噶爾丹所沒後䇿旺喇卜灘率兵五千而逃噶爾丹率兵二千追之及之于布克他厄冷哈必爾罕之地問䇿旺喇卜灘曰爾何所恨而來䇿旺喇卜灘曰我原議婚之妻阿海爾取之我親弟索諾木喇卜灘爾殺之又恐殺我故畏懼而來既有是語噶爾丹至烏闌布通後䇿旺喇卜灘盡收噶爾丹之妻子人民而去又有是讐是以䇿旺喇卜灘所不可往也若圖爾古特之阿玉竒所有讐人窩齊爾圖車陳汗之弟在道既遙逺而阿玉奇之女又嫁䇿旺喇卜灘是以阿玉奇所亦不可往也噶爾丹與俄羅斯差人貿易而已原不相好往俄羅斯之路有洪郭壘及罕二道罕之路有明安特忒稜古特諸人在伊等俱係讐人是以俄羅斯不可往也噶爾丹向達賴喇嘛之去路哈密雖係讐人有噶爾丹屬下回子在青海左側有番子二千家在噶爾丹如向達賴喇嘛而去則青海諸台吉雖不留之於其地然亦不沮之如得到達賴喇嘛地方則噶爾丹與苐巴甚好且噶爾丹於喇嘛存日居班禪庫圖克圖所謂唐古特國之托卜察一城人乃噶爾丹前生尹咱庫圖克圖時之徒弟故使為屬下有征賦之人在沿途可得馬匹糗糧而無沮之之人丹濟喇丹津俄木布如與噶爾丹同在一處斷不相離必偕往達賴喇嘛處也聖上今遣人率兵追討噶爾丹其獲噶爾丹與否何從知之但收離散者問之自得噶爾丹去向實音也上報聞使給厄魯特降人憨都等夥伴口糧侍郎西喇奏言噶爾丹降人憨都等夥伴二百四十三口六月二十七日至張家口外十八里臺地方已併入丹巴哈什哈等其噶爾丹降人授六品官阿木呼朗之父母五歲之妹俱令與丹巴哈什哈等一同暫居張家口外俱交郎中滿圖左翼四旗察哈爾官員訖看得憨都等夥伴食米已完方今奉諭給發丹巴哈什哈等夥伴口糧則憨都等夥伴阿木呼郎之父母亦應給口糧請仍交滿都以張家口倉中所貯之米計口頒給上報聞己未發喀爾喀台吉賓圖等充察哈爾軍籍內大臣索額圖等會同理藩院奏言喀爾喀伊兒登卓禮克圖之子賓圖等去年在圍獵之地告請從軍效力今年又奏請從軍乃遷延不赴誑詐之罪殊為可惡應將賓圖等四台吉及獨石口外所在三百五十二口一併俱交內務府發新者庫使當苦差上免其沒入內庭查下五旗察哈爾丁壯缺少者編附隊伍著令披甲庚申命檄探西路回軍及糧運聲息上諭大學士阿蘭泰等曰王善巴請安使人來問以西路遣回之兵副都統西爾哈達之兵及西路所運之米爾等曾遇見否言我軍跨翁金駐扎回軍及糧運無所聞見未知遣回之兵西路所運之米已到何地著兵部理藩院行文奉差探聽官員作速探實如身不能馳馬明白備文交驛星速報部檄大將軍費揚古查駐軍留糧事務議政大臣奏曰先是費揚古報西路大兵已回喀倫會議奉旨著費揚古留兵一千駐劄科圖俟薩卜素到後費揚古回京遣將軍舒恕侍郎滿丕乘驛往歸化城查明回軍給糧安插降人諸務在案今費揚古疏內但稱自薩卜素到科圖後領兵回京外舒恕滿丕乘驛往歸化城去矣至回回國王阿卜都里什特厄魯特台吉塞冷扎卜米寨桑等一千九百三十四口內降後復逃偷盜馬匹情罪可惡正法者一百四十三人病死者三百四人扎薩克達爾漢親王喀爾喀善巴王昆都倫博碩克圖王等各扎薩克蒙古邊汛來降者五百五十九口已使彼各自防守安插又認出五品官鄂欣兄弟三十口將此除去其餘男婦幼稚共八百九十八口給以二十日糧交解丹巴哈什哈之侍郎西喇等語而薩卜素未到科圖之間將喻成龍之米如何截給其軍所給之米幾何其所發回緑旗兵西安滿兵西爾哈達兵運米之車今已如何並未奏明且薩卜素領兵千人暫駐科圖倘喻成龍等之米已過其地而復運回必致岐誤應檄費揚古逐一詳查速奏上從之命給小民供應草料飼養馬駝價值且免次年租賦户部奏銷宣化府喂養三旗馬駝草料上準行外又諭曰近者朕親統大軍出征聞宣化府喂養三旗馬駝急需草料俱預派龍門赤城蔚州小民供應先用草豆後給價值恐小民不能如數支領著該撫委地方賢能官查明照價估給務令小民得沾實惠以副朕愛惜小民至意此地之民並未嘗有誤急需人皆勉力供應修大兵行道亦甚勞苦殊可憐憫爾等志之至冬月蠲免諸處次年錢糧辛酉內大臣明珠等報糧致西路大兵又上言稱賀明珠等奏曰前奉上諭云西路大兵來會需糧甚急今發內廄駱駝三十頭馬百匹諸王大臣官員再助馬駝交運米官作速前運留內大臣明珠往克勒河朔住扎米到隨助馬駝使之運往其未到之米頻加催趲留侍郎阿爾拜於克勒河朔俟劉皚等所運之米一千一十九石麵八千斤陸續到後隨將軍馬思喀之兵而往著帶兵部之馬三十一匹前去臣駐扎克勒河朔將按察使劉皚等運往之米一千七十石零麵七千斤零使侍郎阿爾拜及員外達賴雅圖等押迎大兵已經撥給翰林院編修宋大業等陸續運往米二千七十石零俱經撥給兩路大兵運至拖陵之米共三千五百八石零麵一萬八千二百斤零已給兩路大兵一千二百四十九石零仍剩米一千六百石零此米已運回察罕腦兒矣自拖陵至察罕腦兒各驛所貯米一萬三百四十四石零自滚腦兒至和爾博各驛所貯米七千五百九十三石零共米一萬七千九百三十七石零此米俟督運中路大兵糧務都御史于成龍等給米事畢之時另行報銷至上駟院駱駝三十頭馬百匹內以駱駝十七頭馬二十一匹交都司丁延祥用以運米駱駝八頭馬四匹交守備申天祉用以運米所剩駱駝五頭馬七十五匹俱交理牧羣事副都統達禮善諸王大臣官員捐助駱駝十六頭馬騾三十一匹及侍郎阿爾拜帶去兵部之馬三十一匹俱交劉皚用以運米臣見沿途喀爾喀大小諸人俱言此番皇上親統大兵深入敵境𠞰滅噶爾丹自此以後北方無事我諸蒙古俱長享安樂我等之大讐大怨得以申泄此皆聖上親臨之大恩所致也如聖上不親臨斷不能一舉而即能如是大創之也踴躍歡呼舉手加額向闕稽首又大賚喀爾喀汗諸扎薩克王貝勒台吉及坐塘鑿井修道台吉官兵諸蒙古言為彼之事皇上煩駕出征反勞我等加之隆恩無不感戴稱頌恐西路大兵乏糧發上駟院馬駝又令諸王大臣官員捐助催中路之米運至西路大兵得以接濟無不歡忭感戴皇恩又以大兵凱旋軫念小民恐踐田禾申諭再三復留大臣官員彈壓故田禾略不踐踏又每驛留米為食以飼落後病人下逮僕從無一人傷損又遣官沿途備香薷湯梅湯以飲官兵下逮僕從略不傷暑皇上諸事具舉下至纖悉無不周詳籌畫故兵民僕從歡聲載道天心和順雨水時調今歲麥秋豐稔田禾茂美欽惟皇上以噶爾丹乘間抵隙犯我北邊計安生民而發大兵諸王大臣奉皇上之廟算誘賊已至網羅而不能誅之愾怒殊甚數年悒鬱去歲噶爾丹掠納木扎爾陀音進巴顔烏闌將掠喀爾喀在彼窺伺聖上赫然震怒思一舉而掃滅之躬統大兵而出噶爾丹驟聞聖駕親臨魂飛魄散不能抗拒其內自亂中夜遁走皇上率大兵追至拖諾噶爾丹窘迫棄其器物狼狽奔逃皇上廟謀既定指授復詳為𠞰滅計遣費揚古等兵遇而擊𠞰之每事恰中睿算略無稍異北邊萬里之外無復纖梗永逺安樂功成於百日之內詔旨所頒數千里之事洞燭於目前御駕深入敵境數千里如行無人之地臣等考之史册未有如皇上之謀勇俱全者也臣等欽惟皇上功髙二帝德邁古今擴前人所未擴亘古未入之版圖悉收為內地平時念切民生宵衣旰食屢免錢糧遂使富足訓練士卒增置火器整飭營壘以是兵皆精鋭所向無敵臣等愚劣不能記憶皇上神功事迹疏內開載不盡幸逢聖世恭遇凱還誠歡誠忭稽首頓首上奏上報聞發所司癸亥以降人厄魯特綽克圖巴圖爾等歸併丹巴哈什哈安插理藩院奏言安王馬爾渾解到降人厄魯特綽克圖巴圖爾唐古特寨桑等問之據云我等來降者有莽奈哈什哈尹什登哈什哈都喇圖巴圖爾班單哈什哈寨桑札爾呼齊什奔達爾漢寨桑蘇穆齊札爾呼齊阿哈雅札爾呼齊胡什哈札爾呼齊畢力克札爾呼齊等皆厄魯特杜爾伯特之阿兒達爾台史之孫台吉車陵之屬下人特來歸聖上今王先遣我兩人來備皇上之詰問我弓箭手一百十八人喇嘛四人婦女童稚五十四人共一百七十六口為此奏聞得旨著給綽克圖巴圖爾唐古特寨桑茶飯衣服著員外舍稜帶此兩人赴安王所令酌發此降人厄魯特內配以蒙古兵收服厄魯特之離散者其厄魯特降人家口著舍稜好為防護遷至張家口外與丹巴哈什哈等一同安插沿途給伊等口糧小心帶來駐劄後照常給以口糧員外舍稜入請訓旨諭曰爾往收撫厄魯特離散之人可帶喀爾喀公車木楚克納木札兒衛徵諾顔阿玉什蘇尼特薩瑪札王之子台吉多爾濟思喀卜博木布貝勒之次子台吉蘇逹尼等前往與爾偕行之兵可令伊等酌選帶去鄉導汪舒克博羅俱上等鄉導可帶此二人而往爾帶此厄魯特至張家口外歸併丹巴哈什哈西達爾哈什哈一處安插帶丹巴哈什哈等之夥伴內有識認噶爾丹等者一人到安王所選王護衛強幹有功者二人前往以綽克圖巴圖爾交王令王撥護衛將綽克圖巴圖爾夥伴沿途給之糧米好為看顧解來與丹巴哈什哈等一同安插爾帶唐古特寨桑等去之時視其內強幹者再選二人帶往爾到喀倫後傳諭衆喀爾喀札薩克云厄魯特離散之人有往爾等旗下地方者嚴查解理藩院如聞侍讀學士喇什歸信爾等即回勿得前往以西路餘米賞給王善巴等七旗議政諸臣奏曰據兵部員外常明疏稱臣常明到巴顔布喇克地方問王國昌喻成龍等曰糧運如何已到何地能接濟回軍否所設驛站如何王國昌等言我等前遣辛保范承烈等運往二千七百石米內以二百石零追送大兵及之於圖喇外一驛已經分給所餘二千四百石零運至翁金外烏什欣驛從納喇特之路前往因驛已撤不知能濟給回軍否我等管運米一千八百石已到察奇爾馬克臺俄兒金呼圖克地方回軍不從此路來是以將此米運回喀倫一日或行十里或行十五里我等所運米內給牛羊牧羣人察哈爾兵總兵康調元標下緑旗兵一千五百石零外現在喀倫地方之米共四千一百石零其餘俱因車壞牲疲不能運回俟續奏請旨又大將軍費揚古撤驛文到六月初七初八等日陸續將驛站盡撤矣上曰王國昌等所運之米俱到吳喇忒喀倫地方應將此米即於彼地附近給王善巴旗下及達爾漢親王諾內三吳喇忒毛明安四子部落旗下著議政大臣議議曰命以王國昌等所運之米賞給王善巴等旗兵丁乃愛養外藩非常之恩應將現在四千一百石零之米令計運往人員歸來之日支與口糧其餘查明王善巴等七旗佐領數目兵丁數目均攤分給給米之時應差理藩院司官二員監發上從之命于成龍喀拜駐劄喀倫給糧李鈵回京理事議政諸臣奏言于成龍疏稱駐劄喀倫大兵臣身及侍郎李鈵通政使喀拜三人內應留何人給發兵糧何人赴京銷算米數查車上牲口料理挽車人夫發回緑旗兵事務伏候上裁上命議政大臣會議議曰應留喀拜於喀倫給將軍舒恕之軍糧事畢回京令于成龍李鈵在察罕腦兒等處地方料理糧務事畢回京料理未完之事上命于成龍喀拜留喀倫給糧李鈵作速回京料理未完事件督理運務于成龍奏報捐助駝馬騾數目及撥給事議政大臣奏曰據于成龍疏稱共計捐助馬騾一萬一千六百九匹駱駝六百三十頭臣親收交三省官員總於一處攙雜喂養後因運米車重奏請每車給牲口四匹牽挽五千輛各加一匹給過五千匹增造車五百輛給過二千匹給過兵部馬一千匹給過八旗兵丁馬騾二千餘匹撥給牲口時俱自各牲口中攙雜選給至所助駱駝六百三十頭所剩馬騾一千六百餘匹與各部院八旗江南等省大臣官員所助牲口贖罪人牲口攙雜一處共備取四千七百餘匹於密雲縣古北口及十八盤嶺博和齊嶺森濟圖山地方以至砂磧之地見牲口皆瘦不能牽挽疲乏者甚多是以每車一隊換給七十八十九十一百餘不等既經此數次更換且攙雜酌給不能分别何人牲口得到拖陵何人牲口不到拖陵又查所助駱駝皆從和爾博地方馱米解往克魯倫等處又自拖陵運回餘米牽挽兵丁留下盔甲炮子等物又牽挽西路炮車宣化府炮車給如許牲口為米車之用而不能運到緊隨大軍臣之死罪也設無此項捐助牲口則米斷不能到拖陵等處伏祈皇上睿鑒急公捐助之情加以天地髙厚之仁出自聖主洪恩等語查得向使捐助駱駝馬騾者欲軍需之無誤也且諭于成龍捐助人員車馬騾與米俱到圖喇者方準算數而于成龍在京收馬騾駱駝遂至兵糧遲誤則不到拖陵者不得算數仍行文于成龍將到拖陵與不到拖陵作速查明造册具奏上曰大兵之行不能如朕意而到者皆因糧遲誤之故也于成龍疏言加以天髙地厚之仁出自聖主洪恩糧誤不能到可加恩乎著行文于成龍將到拖陵與不到拖陵之處作速開具清册來奏至疏內僅有于成龍之名而無其餘大臣之名此事著運米諸臣會查詳奏御史鍾申保報迎給大兵糧米事先是上諭理藩院曰西路回軍糧運之事問之常明已得聞其詳矣辛保范承烈等目下在於何地著行文鍾申保併將東方坐塘人員俱過來否今已如何查明速奏至是理藩院奏言據鍾申保等呈稱保等於六月十五日到歸化城湊集駱駝牛車十九日自湖灘河朔運倉斛千石米二十二日到歸化城聞兵來將近即起行迎往二十四日於巴顔俄博地方遇西安右衛兵一面給糧一面問之領兵大臣以駱駝負米遣迎大兵尾後俟米給完後保等親來另奏外二十八日遇理藩院主事和尚奉大將軍費揚古差往取翁金之米問之據云按察使囊吉理所運之米與彼同於是月十四日俱到納喇特地方寧夏右衛兵已過是以不及其先又有辛保所運之米前到納喇特地方亦不相及云聞皇上為此米之事特差官往翁金視之恐皇上有問是以將所聞呈知奏入上曰朕恐兵糧遲誤故遣人以米迎往接濟著將此事及今日會議具奏三事俱檄費揚古知之恩賞兩烏朱穆秦克西克騰坐塘人員理藩院奏言尚書班第疏稱請查明兩蘇尼特修道鑿井監牧坐塘台吉官兵數目照賞阿霸垓等六旗之例亦動支于成龍携來銀兩給賞設驛之時亦令克西克騰台吉官兵坐塘議賞之處未經議出等語查今年五月內議政大臣議兩阿霸垓兩阿霸哈納爾兩蒿齊特等旗修道鑿井監牧坐塘賞台吉等每人五十兩都統副都統每人二十五兩參領長史每人二十兩一等護衛佐領每人十五兩護衛典儀達爾漢驍騎校每人十兩披甲附丁每人五兩奉旨準行在案今尚書班第既稱兩烏朱穆秦克西克騰旗下台吉官兵亦曾坐塘議賞之處未經議出應以二十三旗坐塘台吉官兵照賞阿霸垓等旗台吉官兵之例動支于成龍帶去銀兩給賞將賞過人員職名銀數造册交户部上從之革通政司通政使莫里溥職大學士阿蘭泰等為莫里溥升授都察院副都御史事覆奏上曰使莫里溥駐扎寧夏者特欲其報諸事也自至彼地不報一事而奉差章京有事開報欲列其名又不肯列莫里溥為人甚劣著罷職撤回甲子命副都統阿南達駐劄厄濟內古喇奈昆都倫布隆吉爾等處地方偵探理藩院等衙門奏言奉上諭曰噶爾丹為我大兵所擊敗今已無所往矣阿南達現在圖喇應令率巴圖爾額爾克濟農之兵駐劄厄濟內古喇奈昆都倫布隆吉爾等處地方偵探聲息內大臣索額圖明珠大學士阿蘭泰爾等可與議政大臣會議來奏議曰諭旨允當今噶爾丹為我大兵所擊敗已無所往請檄阿南達速率巴圖爾額爾克濟農之兵駐劄厄濟內古喇奈昆都倫布隆吉爾等處偵探聲息如得噶爾丹實音即相機堵禦擒而誅之上從之己巳禮部請行告祭文廟勒石太學留中先是國子監祭酒孫嶽頒等奏言竊惟自古聖帝明王為國計民生謀久安長治則有負固逆命者必命將出師恭行天討殲厥醜類以奠安中外然或近在封域之間非盡逺踰邊庭之界即使躬親韎韐亦必歲久成功故漢之武帝唐之太宗未嘗不開疆拓宇而不能迅奏膚功明之成祖亦屢出塞征討地猶未逺不寧惟是殷髙宗之克鬼方也以三年周宣王六月興師以伐獫狁亦僅於太原而已未有親統大軍出險涉逺不數十日而大功告成廓清沙漠乂安邊境如我皇上之神武首出敻邁百王者也我皇上自御極以來削平三逆掃蕩臺灣南朔東西並奉正朔凡戴髮含齒之儔咸思向風而效順乃有厄魯特噶爾丹者辜恩背德獨自外於聲教狡謀出沒擾亂邊陲逆天虐民罪在不赦皇上念逆寇一日不靖則邊氓一日不安非速行𠞰滅曷由共享太平雖諸王大臣請緩親征而睿謀獨斷衆論不撓且軍儲皆出天庾轉餉數十萬石時頒賞賚師有餘資總以安四海生靈之命綿宗社無疆之庥故不憚六飛逺邁身先士卒而天人叶應自誓師以迄大捷僅七十日耳從此邊塞不聞金鼓之聲斥堠永無烽火之警胥遊化日共樂堯天是從來未有之大仁也師出之日水凍草枯及御蹕經臨掘地則泉湧牧馬則草肥蓋天時地脈已早決於睿算之中非臣下所能測識其萬一且分布大軍為三路調度規畫並出皇上之指授噶爾丹既凜天威之降臨復聞大軍之四集釡炊不及餐妻孥不暇顧棄而宵遁自謂可以脫不知神䇿祕謨預定於前遏寇西奔天戈東指諸軍會合環而擊之背山阻水擒斬殆盡餘黨星散絡繹就降子女牛羊俘獲無算搗其巢穴沙磧一空是從來未有之大智也巴顔烏喇克魯倫河等地最為險逺行間持戟尚憚馳驅乃皇上親舉玉趾櫛風沐雨日進一餐勞苦與軍士共之率數十萬貔貅之衆踰天山渡瀚海如履平地而走康莊莫不忠義激發驍騰百倍兵刃未接先已披靡乘勝窮追摧枯拉朽逆寇既就滅亡塞外諸藩益復畏威懷德是從來未有之大勇也十五日午門宣捷二十三日又午門宣捷跪聽嵩呼誠歡誠忭凡屬臣民舉翹首皇上回鑾告成功以彰顯烈臣一介腐儒荷蒙聖恩簡擢不獲負弩執殳效力塞外伏查禮記王制曰天子出征執有罪反釋奠於學以訊馘告魯頌泮水之詩亦曰矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚是三代時皆告捷於學也昔漢唐以來僅於丹鳯樓前及午門外受俘未有告成於國學者似於詩禮為未符皇上建千古未有之功則漢唐未舉行之盛事請自我皇上始之即聖朝寬仁不必有事於訊馘而專行釋奠之禮昭告文廟勒石太學原本六經非由臆説不妨與祭告闕里並行將見文德武功益光昭史册於無既矣臣愚鈍無知遭際聖明僅據經生之見仰塵天聽旨下所司議至是議曰恭惟皇上親統六師刻期𠞰滅噶爾丹武功既盛文德益彰應遣大臣一員詣文廟祭告成功自皇上發駕以至回鑾一切訏謨勝算凡將士之踴躍百神之效靈允宜纂大綱進呈御覽勒石國學更將碑文摹榻頒發直省督撫轉交各府州縣學宫俾萬代士子咸知皇上逺踰瀚海親履絶域屏去帷幄晝夜躬擐甲胄身先士卒殄滅寇賊聖武神謨開闢未有疏留中壬申指授阿南達以地方形勢擒噶爾丹之䇿理藩院奏言據副都統阿南達咨云奉部文令阿南達率巴圖爾額爾克濟農之兵駐劄厄濟內古喇奈布隆吉爾等處地方偵探聲息達即當遵旨乘驛而往但布隆吉爾河之長過哈密城嘉峪關距哈密城千餘里昆都倫地方距甘州東北千許里昆都倫布隆吉爾兩間相去有千餘里如達身率巴圖爾額爾克濟農之兵屯戍哨探亦可支吾但巴圖爾額爾克濟農兵少難以擒噶爾丹原宜往請訓旨以啓我未達未喻之事但達原無識見之人今益加惛憒似不預先備兵則不能濟事必致逸過難追關係甚大非達之所能任也乞堂臺明白請旨遣將領兵而行奏入得上旨向者大將軍報阿南達奏但云厄魯特俱盡滅噶爾丹所率不及三十人逃入林中是以謂噶爾丹携數人往投青海投達賴喇嘛而去令阿南達率巴圖爾額爾克濟農少許人以禦之實不知噶爾丹得脫之人之衆巴圖爾額爾克濟農之兵之寡竟與原奏異况哈密之地已為䇿旺喇卜灘所取邊塞左右有緑旗兵在果噶爾丹自此而去阿南達即當來報分行擒之何遲難之有著阿南達仍遵前旨速往撤坐塘員外石保住歸理藩院奏言據員外石保住呈稱本年三月初九日奉旨著侍郎安布祿趨赴大軍俟之於都蘭哈喇克勒俄博左右留安布祿同行賢能司官一員照安布祿行事欽此遂留保住駐扎於此地自此地至張家口湊取兩蘇尼特兩霸哈納爾阿霸垓卓力克圖王旗下四子部落八旗察哈爾馬匹一驛馬十五匹各撥本旗官兵自去年七月起尚書具奏設驛今本驛並無緊急應馳報之事此等旗分管驛人員糗糧什物各自家中攜來往返奔走殊為煩苦况即有事取供應之馬而行保住所居沿途蒙古鱗次櫛比亦不至有遲誤乞堂臺具奏撤去此路之驛據此具奏請如員外石保住所呈撤去此驛上從之議敘庫濟根穆扎哈爾軍功理藩院奏言奉上諭長史庫濟根護衛穆扎哈爾等於是役軍中效力奉差偵探每次歸來已賞銀兩而部中未經議敘著查伊等職名議敘及與伊等同行偵探人員亦著議敘查得蘇尼特杜稜郡王旗下鄉導汪舒克等十八人皆各賞銀五十兩授以達爾漢之號矣今喀爾喀王盆楚克護衛穆哈扎爾王納木扎兒長史庫濟根此役軍中至克魯倫額古德哈爾哈伊扎爾額爾格納克山等處偵探往視阿爾噶賴之路有功應照汪舒克等之例授以達爾漢之號與伊等偕行者乃一等護衛博羅海二等護衛額林辰應俟都統副都統缺出即用丹津丹濟哈什哈吳巴什西喇卜阿玉什等應俟本札薩克護衛佐領缺出即用察哈爾前鋒納木什爾撥什庫努木代塞稜等應俟各佐領護軍校驍騎校缺出即用本部撥什庫諾爾布已授拖沙喇哈番等職鄉導索諾木已敘為達爾漢齊旺已賞銀五十兩應無庸議奏入得旨庫濟根穆札哈爾授為拖沙喇哈番賜達爾漢之號餘如所議甲戌撤吳爾揮河所留蒙古兵理藩院奏言先是留科爾沁扎薩克圖王俄齊爾等十旗蒙古兵暫駐吳爾揮河至於孟秋之月今兵糧已完或令駐吳爾揮河或令歸家請旨定奪上曰今並無事著兵各歸家命以翁金所貯之米速解大將軍費揚古軍前兵部奏言據寧夏偵探主事巴什納呈報西安副都統席爾哈達以滿兵一千分為二隊按察使囊吉里運到頭隊米五百石使滿兵五百同囊吉里於六月初七日起行往解大軍續於十二日巡撫舒恕運到米五百石又使滿兵五百同舒恕往解大軍所餘之米令參將張獻午等在翁金看守奏入上命速發至大將軍費揚古軍前大將軍費揚古奏報西路軍糧諸事費揚古奏言右衛護軍統領費揚固之兵來自拖諾於六月初七日到納喇特布喇克因不聞糧運聲息起行而來至西喇穆冷界上遇皇上遣御史鍾申保等來迎支七日糧右衛之兵於六月二十七八日間陸續到歸化城土默特都統阿喇納共炮七十九門於七月初二日俱可到歸化城又留八旗官兵待後解大炮為之防護此內有馬匹俱無不能前行及疾病之兵一百九十九名既得皇上迎賜之米使拴帶留兵口糧攜正黃旗費揚固佐領下達最等四十七人而來續後正黃旗吳勒佐領下舒恕等三十七人亦到其餘一百十五人已隨總兵官毛來鳯等歸去護衛諾爾布等所解牛羊俱已帶回交各牧羣至右衛西安寧夏兵散歸之時皇上遣迎之米不以給京來官兵儘米之數給伊等八日糧俟到納喇特再支米前行因納喇特地方不遇米糧故無所支而過蒙聖上預籌特差鍾申保迎之以米西路兵始得飽餐以全其生命至正卿辛保所運之米六月初八日已到納喇特十二日土默特副都統多爾濟到言彼留住十日糗糧俱完故給多爾濟等米一百石其餘俱已運回又侍郎王國昌等所運之米沿途一帶直至察希爾馬克台俄爾津呼都克地方各驛計日貯米共一千六百石零因牲口俱疲車輛盡壞不能運至納喇特行文在案至副都統席爾哈達押護囊吉理之米五百石到納喇特遇辛保聞大將軍及衆將軍等之兵於五月二十七日已回故於解到五百石米內令彼官兵支取一月米而還又西安副都統巴林所領西安滿兵寧夏緑旗兵俱於六月三十日間陸續到歸化城大同緑旗兵於六月二十七日到歸化城臣軍中官兵西安寧夏赴京官兵於六月十九日到喀倫率圖地方照部定口數俱支一月糧共支米二千一百四十一石六斗侍郎李鈵通議喀拜留於科圖之米三千七十六石二斗三升零奏至上命議政大臣集議議曰聖上洞見西路糧運不到則兵丁匱乏預趲中路之米迎給西路官兵又詳計西路分隊遣回官兵途中乏糧特遣御史鍾申保往歸化城迎給米糧官兵俱不至匱乏各得平安歸家大將軍既經詳奏遣回官兵已經起行及本軍到率圖支糧應無庸議留待防護大炮官兵內馬匹俱無不能前行及疾病後留一百十五人既經隨總兵官毛來鳯還應著毛來鳯查報護衛諾爾布所交牧羣牛羊應行文總管內務府交慶豐司侍郎李鈵等留於科圖之米三千七十六石二斗零儘足給將軍薩卜素等兵一千名應行文于成龍俟薩卜素到頒給有餘以其數報部發往西路之炮應俟大將軍到後問明當存貯何處該部具奏請旨上從之以噶爾丹降人董羅卜等附於羅壘厄木齊理藩院奏言先是董羅卜偕青海博碩克圖濟農下羅壘厄木齊自噶爾丹處來降奉旨俟羅壘厄木齊到時應作何安插再議今已召羅壘厄木齊來交默爾根綽爾濟使居宏仁寺問羅壘厄木齊言去年博碩克圖濟農以己為使往噶爾丹所時曾遣董羅卜為己僕役董羅卜者乃博碩克圖濟農屬下托賴哈什哈部落之人又問羅壘厄木齊偕來之噶魯言噶魯乃博碩克圖濟農納賮之人亦曾遣之為己僕役據此應將董羅卜噶魯附於羅壘厄木齊上從之乙亥彭素克賫敕往諭噶爾丹還復命彭素克奏曰臣等五月初九日賫敕起程中書阿必達及臣兩人隨噶爾丹去蹤前往十二日至滚噶牢臺地方見無厄魯特形影視其蹤迹有向圖喇河去之蹤迹又有向克魯倫河上流去之蹤迹臣謂阿必達曰不知噶爾丹所向何路我等馬匹俱疲軍機緊急我將獨追噶爾丹爾可攜疲馬回以此情事奏聞皇上臣率厄魯特人名庫濟者踵其行蹤而往至於岐路庫濟言前路迂而逺後路徑而近踰二三嶺是夜可到特勒爾濟矣臣於是遂由徑路而往時至二更到特勒爾濟地方正坐而歇馬噶爾丹下諾顔格隆津巴車爾貝寨桑兩人為首率千許兵來擒臣而去晝夜奔逃五月二十二日至俄爾渾河是夜臣攜皇上敕書逃出藏大林中宿一日次日向內而行遇厄魯特敗走之人奪臣等坐馬糗糧衣服而去臣步行十四日於六月初七日到特勒爾濟河遇喀爾喀阿里雅扎薩克哨卒五人告以臣之情事引臣見阿里雅扎薩克阿爾薩闌衛寨桑彼言我等奉大將軍令至憨山凖莫多地方收集逃潰之賊既至於此糗糧俱絶我等原居俄儂巴兒濟俟到本地備牲口糗糧送汝赴京內行二日於初九日到烏朗海河恰遇阿里雅扎薩克阿爾薩闌衛寨桑之畜産內徙而來住扎後臣將歸帳見特勒爾濟河叢薄中煙起有犬吠聲臣以語阿里雅扎薩克阿爾薩闌衛寨桑率布達里寨桑之兵三百人虜厄魯特男婦子女共百餘口及其牲畜來又語阿里雅扎薩克阿爾薩闌衛寨桑曰爾等發兵二百登山上淨搜叢林內倘有存留之厄魯特可即收捕乃以兵二百授䇿旺台吉前去二十日又虜厄魯特男婦六十餘口併其牲畜而來又以兵二百授達爾漢寨桑於噶爾丹奔逃之路收其遺棄之物後阿里雅扎薩克阿爾薩闌衛寨桑兩人送臣起行於其俘獲內擇男婦三十人為獻六月二十五日向內起程行三日到克魯倫河侍讀學士喇什員外多爾濟喇都渾率喀爾喀七台吉等之兵來其撥什庫先到見臣之歸即馳回告喇什等二十九日喇什等到克勒河朔見臣臣問其由來喇什言在揆素地方皇上命我等率喀爾喀七台吉之兵往覓噶爾丹之蹤探彭素克格隆之信死則覓其尸而歸云臣以行事告之喇什議使多爾濟護送臣又率阿里雅扎薩克阿爾薩闌衛寨桑所俘獲三十人入邊見大將軍將軍言如許人同行則程途耽誤當擇數人帶去遂使俄木卓力克圖巴克什等六人與臣偕來奏入上賜彭素克格隆御饌諭理藩院釋放部中收禁垂喇克扎木素格隆又使副都統吳達禪問卓力克圖達爾漢巴克什津巴卓力克圖之意曰汝等可遣歸使於噶爾丹乎卓力克圖曰我乃噶爾丹之人因遣我送書於車陳汗而被擒津巴曰我乃隨從丹濟喇之人阿爾薩闌衛寨桑等自噶爾丹之地擒我而去卓力克圖曰我乃隨從丹津俄木布之人因卧病不能行俄齊爾杜喇兒攜之而來我等並非背噶爾丹逃出來降聖上之人今皇上欲遣我等使於噶爾丹願往效力噶爾丹殺之則受死如不殺當竭力曉諭之奏入上命議政大臣集議議曰卓力克圖達爾漢巴克什等既願行應遣伊等使於噶爾丹撥理藩院官一員帶往至於喀倫在附近旗分酌湊坐馬口糧撥鄉導指路督令起程而歸上從之派出般什使大將軍費揚古率蒙古兵駐劄善巴王喀倫偵探議政大臣奏言據侍讀學士喇什疏稱七月初八日宿滾噶牢臺有噶爾丹屬下額圖格等來言我等乃歸降皇上之多爾濟塞稜族弟噶爾丹為大兵所敗逃脫之後我等即欲來降而不得其隙後到他米爾地方噶爾丹屬下納克薩爾噶爾馬及我四人各携妻子竊取多約特納木扎兒喇木扎木巴之馬五十匹來投皇上多約特納木扎兒喇木扎木巴知之遣人來追奪回納克薩爾噶爾馬兩人之妻我弟哈什哈之妻計五人馬四十五匹我等三人乘馬奔出又言戰敗之後噶爾丹阿喇卜灘丹濟喇丹津俄木布寨桑喇嘛皆紛紛散走噶爾丹先到他米爾之台庫勒地方遣人收回阿喇卜灘丹濟喇丹津俄木布等俱集於一處丹巴哈什哈等來降皇上其一二小寨桑喇嘛往投䇿旺喇卜灘達賴喇嘛青海其他大寨桑喇嘛全集一處伊喇古克三庫圖克圖亦往與之合大略兵有五千餘牛羊甚少無廬帳者多議往洪郭賴則近於䇿旺喇卜灘而無産業難以為生往達賴喇嘛所則聖上必遣人往索之不若往翁金之路或瀚海四圍有人掠得牲畜如根敦帶青逸去暫且偷生或往哈密如哈密人衆仍前和好則資其米糧以度今冬如哈密人衆與之反顔即攻而取之以為根基議既定六月二十八日自他米爾向翁金起程迤邐而行至於三日我等逃出又六月二十日達賴喇嘛使人俄木布來不知其情事傳聞俄木布之言曰噶爾丹不當敗噶爾丹言曰想或戰日不吉耳其使人仍隨之而行又因住他米爾地方二十餘日我衆之馬已肥聞根敦帶青在寨稜格云據大將軍等疏言黑龍江將軍薩卜素率兵而來於七月十六日已到科圖臣等遵旨原欲領兵回京據侍讀學士喇什報稱噶爾丹敗逃後於他米爾台庫勒地方阿喇卜灘丹濟喇丹津俄木布等俱會於一處共有五千餘議由翁金之路往倘瀚海四圍有人欲掠取糧食已於六月二十八日自他米爾起程其事倘實不可不預報知為此一面飛報云是以臣等率官兵住科圖候旨今噶爾丹為大兵所敗困迫已極或往投達賴喇嘛或往投哈密俱未可定去路無食必致劫奪飄零之喀爾喀應令大將軍費揚古親身沿邊而往酌調善巴王之兵及附近旗分之兵駐劄邊汛噶爾丹前來即迎𠞰之其與將軍同處之兵將軍孫思克博濟俱令赴京其他總兵等官俱有重任著令率兵回汛奏入上曰此事乃大將軍費揚古未完之事著率薩卜素兵五百酌取蒙古兵往善巴王邊汛諸地方偵探聲息噶爾丹或在翁金或有過去之信相機迎𠞰至西路之米已有旨給賜王善巴等七旗兵丁今兵往翁金著將此米令大將軍扣兵酌留所剩給賜七旗著將軍薩卜素率所剩五百兵駐劄科圖如有厄魯特來降令其收納歸去則天時寒冷著令來京整裝遣去餘如所議以厄魯特洪津席喇卜杜喇兒等歸併丹巴哈什哈議政諸臣奏言據侍讀學士喇什疏稱六月二十六日至克魯倫河之克勒河朔下營後有噶爾丹所屬諾顔格隆下洪津席喇卜杜喇兒沖丹格隆等男婦十六人來降問之答曰乃蘇米達爾喀吞之人住居俄儂噶爾丹來烏闌布通之年掠之而去𨽻諾顏格隆之下噶爾丹與皇上大兵五月十三日一戰敗散之後我隨諾顔格隆向特勒爾濟而逃在阿喇克台河引使臣扎薩克喇嘛彭素克格隆前往我遂與噶爾丹下席喇卜格楚兒以我等之意告之彭素克格隆原欲逃來後彭素克格隆歸日我等不得其便及在俄爾烘圖喇交界地方與席喇卜格楚爾夥伴五人連我六人來投之時遇沖丹格隆夥伴男婦十人一同來降問洪津席喇卜杜喇兒答曰聞丹濟喇丹津俄木布在阿喇卜灘之前行其意似乎相避不知其棲止何地總會於一處否據衆論以為噶爾丹舍達賴喇嘛别無所歸視其狀僅各保其身命必然強欺弱至於劫殺又無糧食未必能到其意想之處也又疏稱彭素克格隆阿里雅扎薩克阿爾薩闌衛寨桑等以其所俘為獻其內又有厄魯特屬下台吉一人言有人知噶爾丹去向隨後帶來臣乃宿克勒河朔待之四日厄魯特之人到後始以扎薩克喇嘛彭素克格隆阿爾薩闌衛寨桑等人併發赴京臣等親身與扎薩克台吉車陵扎卜往會前所遣兵二百共率六百兵由噶爾丹行蹤前進探根敦帶青聲息自克魯倫河對岸察罕齊勞台起程據此則應行文喇什仍遵前旨行目下帶到厄魯特交理藩院暫行收管將獨石口外所留厄魯特該部差官一員小心押護而往歸併張家口外丹巴哈什哈其獨石口外所有降人及現到此地之喀爾喀台吉馬哈什默爾根格隆洪津等人各令歸併本扎薩克可也奏入上從之命圖喇偵探舍稜率蒙古兵駐劄安王汛地上諭內大臣福善等曰前遣舍稜與蘇尼特郡王額駙薩瑪扎之子多爾濟扎卜貝勒博木布之子蘇達尼喀爾喀公車木楚克納木扎兒衛徵諾顔阿玉什等親率其兵往圖喇偵探今可不必前去著率伊等暫駐安王所居汛地待大將軍費揚古至聽其指揮而行給事中王原祁等請勒石以紀皇上功德時據禮科給事中王原祁奏言欽惟我皇上撫綏方夏奠安邊隅凡血氣莫不尊親無一夫不獲其所生民以來未之有也乃者厄魯特噶爾丹自外生成上干天怒皇上親統六師躬伸九伐天助順而豐草生地效靈而甘泉湧兵威所指迅掃長驅外藩君長靡不輻輳行在抃舞稱慶然猶軫恤士卒親行慰勞甘苦與共三軍咸思自奮一以當百逆聞駭竄醜類盡殲邊塞業已永清六合罔弗寧謐此誠萬古之奇功曠世之偉績載諸史册傳之無窮真足度越百王亘古莫並者矣伏思漢唐以來凡屬命將出師成功閫外者咸令磨崖紀績頒告中外即明永樂屢次出塞勳烈逺遜今日猶且勒銘以張武功况我皇上逺御親征深入沙漠櫛風沐雨尅期奏功仰請於聖駕經行地方御製鴻文建立穹碑以垂不朽御史劉珩奏言竊惟皇上聖德神功逺過堯舜普天率土莫不沐浴恩波咏歌化日不意有厄魯特噶爾丹者甘外生成逆天負德凌我外藩不可化誨皇上親統六師直抵亘古所未到之地克成亘古所未有之功總賴我皇上豫定廟謨分道夾擊使其進不敢戰退無所逃往返神速不踰百日而且天心助順地脈效靈枯草先青甘泉遍湧尤見聖德感召之奇臣竊觀史册所載未有天子自將成此大功者古者大功告成不惟臣民頌德往往磨崖刻石以示後世若岣嶁之碑岐陽之鼓至今傳而賡之况我皇上洞燭情形迎機決勝建此曠古絶今之大業乎臣愚以為皇上駐蹕之拖諾山及破賊之昭莫多地方或立豐碑或磨崖石恭請御製銘辭遣官鐫勒以昭示後世上命該部議奏禮部議曰仰惟我皇上親統六師逺出絶域天威所至逆命者無不殄滅歸化者無不得所功業之鴻駿自古帝王所未有也應如科臣王原祁臺臣劉珩所請凡皇上經臨駐蹕之名山以及𠞰滅逆寇之昭莫多等地方允宜磨崖勒石俾塞外億萬載臣民咸瞻仰駿烈神功於不朽俟命下之日所立碑石交與工部其應行立碑地方由理藩院差官看定議奏其刋刻碑文由翰林院請旨遵行留中癸未命副都統祖良弼焚餘糧以防寇掠議政大臣奏曰據通政使莫里溥疏稱副都統祖良弼移文副都統阿蘭泰云副都統席爾哈達與按察使囊吉里同運米五百石赴納喇特地方弼身待巡撫楊副將等解來之米而巡撫舒恕臥病昏沉不理諸務乃與副將楊林共商將運米二百石赴納喇特地方已行四站不料六月十八夜遭大風雨負米之驢凍斃千餘頭弼於巴罕厄里根地方候我官兵據此查得近者侍讀學士喇什報稱噶爾丹由翁金之路而去應差理藩院賢能筆帖式一員乘驛速往祖良弼所將此米支給祖良弼官兵口糧焚所剩之米作速各歸本汛上準行併檄知大將軍費揚古取回京城發往西路火炮交八旗漢軍都統兵部奏言據大將軍費揚古咨稱京城解來沖天炮子母炮交總兵官康調元收貯大同俟古到京後請旨其大炮八門業已攜來將親身帶回今奉部咨令將此炮俟古到京日問明應留何地聽該部請旨則此炮八門或仍令古帶回或留何地乞大部作速檄知查得大將軍費揚古已往善巴王邊汛去訖今有都統伊勒愼自科圖回京應將此炮檄令撥官兵押護解到京城交八旗漢軍都統收貯如伊勒愼已回則交都御史于成龍解來可也上從之聖祖仁皇帝親征平定朔漠方略卷二十七

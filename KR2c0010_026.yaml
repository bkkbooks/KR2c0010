body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷二十六六月乙酉朔發駕至昻吉爾圖命二郎保賫勅往諭青海薩楚黙爾根台吉上諭大學士伊桑阿侍郎安布禄曰今當會議遣檄于青海之事矣如當遣檄即自此地遣去為善議曰發檄諭青海甚是請將檄文即自此地發去如青海諸台吉擒噶爾丹之女及其屬下人畀我或令二郎保親身帶來或差人解來請㫖定奪上曰著自此地遣撥什庫一人帶羅壘額木齊夥伴善巴星馳至二郎保所令二郎保賫勅往諭如執噶爾丹之人畀我著二郎保親身帶來再一面將檄青海台吉之文發往京城作速照様刋刻刷印百餘張星飛驛逓二郎保所令二郎保遍諭沿途居人理藩院差撥什庫巴特馬同羅壘額木齊夥伴善巴賫勅赴二郎保所其文曰理藩院檄知青海薩楚黙爾根台吉博碩克圖濟農欽奉上諭曰爾青海諸台吉歴世尊奉達賴喇嘛法教敬事本朝聘問貢獻恭順有年朕亦頻加恩賚未嘗有間乃噶爾丹壊達賴喇嘛之法教不遵朕㫖稔惡不悛朕乃親綂軍至土喇𠞰而滅之不可不明諭青海諸台吉也噶爾丹前於烏䦨布通敗走之時朕如全發所調兵馬無不可追而誅滅之噶爾丹首頂威靈佛像立誓言鬼物誘我進皇上邊汛也我何敢知而䦨入乎自此以後不但邊内扎薩克䝉古即歸降皇上之喀爾喀如害其一人聽威靈佛立刻誅之朕乃罷各路追兵宥其命而縱之噶爾丹頑悖不悛朕屢勅曉諭竟不遵奉索我降人喀爾喀不已去年又渡克魯倫河掠我降人納木扎爾陀音朕遣員外阿爾必特祜等為使問故不見朕使奪其所乘馬駞遣令歩歸後遣侍衞克什啚主事保住為使而往又不之見亦奪其馬畜使之饑餓徒歩而歸朕乃震怒發西路大兵一枝俄農巴爾濟路大兵一枝克魯倫上流大兵一枝朕親綂大軍由中路而進既近克魯倫猶不忍羣生横罹鋒鏑又差長史多禪等往諭朕來與汝會語朕無殺汝之心我大兵已截汝後路矣不信則遣人往視可也又奪䕶送使人之馬褫使人之衣且不遣使人歸後又差扎薩克喇嘛彭素克格隆往亦不遣歸朕乃親綂大軍近逼噶爾丹正俟所遣使人覆音循克魯倫河徐進噶爾丹聞聲畏威棄其婦子廬帳釡鐺而遁至特勒爾濟遇西路大將軍費揚古兵噶爾丹又先攘臂我西路大兵始奮撃之遂大敗噶爾丹陣斬阿奴及有名寨桑甚衆殺厄魯特人四千餘餘盡降全獲其子女駞馬牛羊廬帳噶爾丹僅率三十餘人遁去其降人丹巴哈什哈等人衆及所擒羅壘額木濟係博碩克圖濟農遣往噶爾丹者俱言達賴喇嘛歿已九年矣夫本朝為達賴喇嘛䕶法之主禮待六十餘年其沒也第巴理宜奏聞而第巴匿之反惑衆誘噶爾丹興戎第巴之罪大矣且噶爾丹言青海諸台吉并俄羅斯國人與彼同攻中國又潛通中國回子從中助彼計得中國後立回子為中國主彼則取其賦税是以至克魯倫及敗走之時猶語其衆曰我至此克魯倫者非我意欲深入也達賴喇嘛言我南征吉大慶也我是以深入此達賴喇嘛殺我而我殺爾等矣思達賴喇嘛與朕道一風同相敬有年達賴喇嘛尚存㫁無此事此皆達賴喇嘛歿後第巴指達賴喇嘛以唆噶爾丹其跡顯然除另勑發第巴外今噶爾丹亡命西走亦未可定應傳諭青海所在諸台吉如欲仍前修睦則通行屬下西路所通地方人等俱各防守探聽聲息如遇噶爾丹即行擒解遇而不擒擒而不解知而故縱者此後永讐之至噶爾丹之女嫁於博碩克圖濟農之子即當解送噶爾丹之人現在青海者亦令盡擒解來上項原由著理藩院譯䝉古文帶羅壘額木齊之人一名飛馳傳諭内大臣明珠等報遇西路大兵於多羅特之地以糧給之行兵部奏曰據駐扎克勒河朔内大臣明珠咨言前者劉暟等運到克勒河朔米五百石麫七千觔已交侍郎阿爾拜星速解赴大軍與劉暟同於五月十八日起行又都司丁延祥運來之米自五月十九日起陸續到克勒河朔交員外達賴等星速解赴大軍已令起行俱在案今阿爾拜報稱職所運米五百石麫七千觔於二十一日俱到拖諾二十二日擇駞馬騾内之可用者率劉暟等運米二百八石麫七千觔到扎喇河朔遇平北大將軍遣往迎糧官兵共二百二十二口給米四十四石四斗畢即起行到多羅特地方次日撫逺大將軍兵到以所餘米一百六十三石六斗麵七千觔送至大將軍所已分給衆官兵矣又據侍郎阿爾拜亦以前事報部為此奏聞謁堂子免陳旗纛畵角行兵部奏曰皇上親統六師出征噶爾丹之時排列八旗䕶軍旗纛火器䕶軍旗纛詣謁堂子啟行粤稽太宗皇帝往征朝鮮受降凱旋祭纛於郊詣堂子行禮回宫今皇上親統六師𠞰滅噶爾丹凱旋進京之日詣堂子行禮應否排列八旗旗纛畵角請㫖定奪上命議奏議曰八旗旗纛畵角俱在後軍詣謁堂子請停排列旗纛畵角上從之丙戌莊親王博果鐸等奉表稱賀莊親王等奏為敬陳聖略覃敷神威逺播滅寇奏勲普天胥慶事臣等於五月二十二日伏讀㨗音具聞皇上躬行天討身先士卒直抵賊營巨憝震驚望風奔遁聖謨神算早已預料其必逃分道夾攻務令窮截其所往果爾旁突遇我鋭師鋒鏑纔交薙獮殆盡賊渠隻身窮竄妻子悉已就擒輜重牛羊盡皆收獲脅從羽黨莫不歸誠渠逆迅消膚功立奏兹葢我皇上深謀碩畫治軍無所不詳制勝宣威應敵無所不盡方噶爾丹之蠢動致喀爾喀之受侵衆謂何煩逺馭乗輿但應特假節鉞倘非今日之預計或同前此之疎虞乃我皇上决意親征謀成獨斷師興四路無不適合機宜令稟一心所以動闗機要但從來軍行糧餉勢必致民力輓輸而皇上頻發帑金民不加賦屢頒恩賜兵有餘資莫不願効馳驅咸知盡心供億且時當春仲新草方萌更地值氷消又難出牧臣下墟拘之見皆以為當暫緩期惟皇上審料之深特命乘時遄發果至塞外駞馬毫無匱乏之虞漸進西陲道路益有菁葱之盛六龍親邁履砂磧而易若坦途一怒廓清擣賊巢而潰同鼠穴往者逆藩叛亂賴廟謨以次削平海冦逋誅厪宸衷倐焉殄滅今兹醜類迅掃無餘向後兇頑萌芽永絶從此屬藩消侵凌之患各遂生成抑且邊境省捍禦之勞共遊熙皥鑾回伊邇快看飲至軍容悔罪實繁喜見輸誠革面千百國奉聲靈而恐後孰自外於範圍億萬年臻上理以無加罔不涵於浩蕩矣臣等無任踴躍懽忭之至謹奉表稱賀以聞上報聞己丑命侍郎多奇等留後禁踐踏偷盗田禾駕至獨石口城中居民及二三百里居民扶老携幼排列香案跪於道旁擎拳奏言皇帝為我生民逺行征討滅此番冦自兹以來永享太平耳不聞厄魯特之警矣但願皇帝萬萬嵗歡呼稽顙沿途不絶是日皇太子率諸大臣迎駕上諭大學士伊桑阿曰朕親統大兵往征厄魯特噶爾丹大勲既集奏凱言旋進獨石口見今年麥禾俱大盛朕衷欣悦念大兵陸續歸來民皆倚此田禾度日如或踐踏或偷盗餵馬小民何恃以餬其口今將獨石口至懐來縣交侍郎多奇自懐來至京城交侍郎馬爾漢率地方官與伊等隨行部員及扈從部院官沿途巡察如獲踐踏田禾偷取餵馬畜者立拿叅奏如遇而不拿拿而不立叅後朕聞之必以軍法從事决不姑恕辛卯上駐蹕懐來縣時懐來縣地方稍旱駕臨是地即沛然雨足其民同聲言曰真神異也皇上除冦以快天下今日駕甫至即霈甘霖甦我田禾歡欣踴躍跪叩道旁癸巳駕進京城先是以獨石口至京城天時炎熱命沿途備氷水梅湯香薷湯官兵皆得其益是日復命沿途仍前備之以足前軍之用辰時駕發清河縣排列儀仗皇太子率諸皇子諸王及在京文武大小官員俱穿蠎袍補褂於郭外五里道旁跪接八旗䕶軍驍騎歩兵近京鄉紳士民工商耆老男婦皆扶老携㓜排列香案門户懸綵人各捧香跪迎皆叩首奏言皇帝為萬民除害實勞聖躬逺臨絶域大勲立奏功德超隆天髙地厚誠古來所未有臣等仰戴鴻恩但祝萬壽無疆而已臣等一聞凱音衆心不勝歡悦急欲望見天顔已候數日矣上命前驅者勿警蹕於是父老扶杖率其婦子前行填塞街道城外環集者數百萬人歡聲如雷上由德勝門入詣堂子行禮畢詣皇太后問安回宫臣等伏惟我皇上聖神文武威德廣被自往嵗三逆掃蕩海島輸誠東西朔南聲教暨訖雖殊方異域莫不梯山航海而奉朝貢厄魯特噶爾丹荒徼頑孽狡焉思逞竄伏西陲煽誘外藩䝉古諸部落曩者烏蘭布通之役業已入我網羅幸獲􅊵脱猶然怗惡不悛近且逼處巴顔烏蘭時時侵掠我歸附之喀爾喀悖逆天常志懐叵測皇上洞燭情形綢繆先事謂年來訓練師徒簡閲將帥我備久已修飭若不乘此時亟行剪除蠢爾兇頑勢必揺蕩邊疆馴至繹騷内地流毒蒼生為害滋大非赫怒不足以安民非一勞不能以永逸乃遂决計親征命八旗皆儲峙以待調發維時廷臣震悚不敢以冦賊之憂仰煩君父方且交章乞留而睿謀已定不撓羣議爰是祭告天地宗廟社稷聲罪致討禡牙軷路尅日啟行分遣撫逺大將軍費揚古等領兵由西路前進以遏其西奔復令黒龍江烏喇將軍領兵分駐近地以防其東竄而大軍出獨石口由中路進發三方布置萬里連絡時尚春寒塞外水草未豐皇上加意拊循軫恤周至櫛風沐雨與士卒同勞苦甚至日御一餐歩行沙磧而又時頒賜賚激勵同仇故凡列戎行及外藩助順諸王貝勒等人人感奮咸爭先効力而聖謨廣運舉凡决機制勝之要調遣䇿應之方動必萬全悉臻至當測料賊情洞若觀火指畫地勢契若合符至於頒牧放之令以節馬力之疲勞飭飛輓之程以籌糗糧之接濟定營伍之制申斥堠之規無不上煩宸慮稟受指麾乃或水泉素乏之地忽湧靈源雨雪沍寒之時或逢晴霽天心孚協瑞應駢臻良由我皇上為萬姓除殘至誠昭格故得上天眷佑如此噶爾丹慿恃險逺井蛙自大猝聞聖駕親臨遂爾倉惶潰遁皇上身率前鋒窮追五日噶爾丹盡棄輜重晝夜狂奔而皇上所遣西路之兵早已按期截其歸途奮力邀撃擒斬無算葢自出師以至回鑾不滿百日往返五千餘里而大功吿成自古用兵未有若此之神速者也臣等竊惟行軍絶漠古昔所難我皇上神謀獨斷克奏膚功電掃飈驅崇朝底績惟至仁故能勞一身以靖蒼生惟至明故能居九重而見萬里惟神武故能摧勁冦如拉枮朽逖稽上古如軒轅之戮蚩尤虞舜之格苗頑功德至隆然皆用兵寰中未嘗逺及域外也至如殷宗之克鬼方為役三年周宣之伐玁狁不及千里漢唐及明雖屢征朔漠未著奇勛以觀今日真邁越前古逺矣從此邊隅永靖四海無波億萬斯年䝉樂利之休享清宴之福孰非我皇上神功聖德之所致哉甲午禮部擬上皇太后皇帝尊號吿祭典禮入奏畱中先是莊親王博果鐸等奏言神威逺播域外邊境永清敬陳燕賀之私請布㨗音上發該部詳查應行典禮事宜具奏至是禮部奏曰粤稽太宗皇帝出征朝鮮受降凱旋諸王大臣上表迎接入京之日詣謁堂子告祭太廟又攷明朝永樂年間上親征䝉古歸遣官吿祭天地宗廟社稷陵寢承天門旗纛諸神頒詔天下上御殿受大小臣工表賀今皇上親統六師𠞰滅厄魯特噶爾丹功德宏大亘古無倫應告祭圜丘方澤社稷暫安奉殿孝陵遣官致祭永陵福陵昭陵及旗纛之神天安門太歲礮神及五嶽五鎮四瀆四海歴代帝王陵寢孔陵亦應遣官致祭請上皇太后尊號皇帝尊號頒詔天下皇帝陞座諸王大臣官員上表稱賀各省督撫文武官員亦上表稱賀奏入上畱中命封喀爾喀郡王善巴為親王貝子彭素克為郡王上諭内大臣國舅佟國維等曰昔喀爾喀王善巴奏言噶爾丹不可使據克魯倫當討之而此役盡出其馬以助軍勞勣丕著殊為可嘉貝子彭素克聞憨都逃即發人追之是役執訊偵探勤勞茂著其遣穆扎哈爾等哨探也謂之曰此去如不獲實音不擒生口皇上雖不加罪吾必誅之嚴責如此朕向拖陵而來正思於歐德哈爾哈以下探聲息故問鄉導地里形勢而彭素克人來奏歐德哈爾哈以下已遣往探正合朕意如此等事殊為可嘉彼所遣人員朕俱已加恩善巴彭素克理當議叙著交與理藩院查明具奏理藩院奏曰查喀爾喀郡王善巴擒解噶爾丹伊喇古克三庫啚克啚所差煽惑六鄂羅斯之奸細尼爾巴格隆又向噶爾丹使人博喇特和卓問明噶爾丹事情來報又遣其人德得黒舍津於庫克納他喇納偵探收獲汪舒克部落巴啚達等五户來解又遣其副都統扎爾等至庫倫白爾齊爾偵探又善巴之諸子自巴爾哈蘇臺地方以外遣人偵探且善巴奏言不可容留噶爾丹在克魯倫是役効勞於西路大軍中盡出所有馬匹給軍士乗用喀爾喀貝子彭素克當憨都逃去時彭素克差其子往覔殷扎納其身追憨都與戰又遣人於其屬下台吉厄爾德尼阿海使追憨都收其子媳而來分遣人探噶爾丹憨都聲息又對噶爾丹設立哨卒奏入上命以郡王善巴為親王授貝子彭素克為郡王以示奬勸可會議具奏僉謂當遵聖㫖加封其原封善巴信順之號原封彭素克伊爾登濟農之號俱奉欽定應仍存之換册之事請交該部上從之命以餘米存貯察罕腦兒上諭内大臣國舅佟國維等曰朕沿途視邊内田禾甚茂邊外所種之苗五月初間被霜略損是以復種邊外䝉古未必不致乏糧于成龍所運米供給兩路大兵尚有所餘前諭于成龍察罕腦兒地方前嵗曽耕田築室貯糧有此現成房屋可往存貯如不能運到酌便留下今應將此米詳議預備朕又見來路仍有解馬騾捐助者大兵已還米無所用今令捐助則此事如何完結朕原諭于成龍捐助人員車馬騾與米俱到土喇者准其作數而于成龍請于京城收馬駞騾原諭米在八十日内運至土喇不但不能至土喇即八十日内至克魯倫者亦少今大兵已還仍使捐助可乎若不預定後必紛亂矣著會同定議具奏議曰于成龍所運之米供應大兵餘剰者甚多察罕腦兒地方有現成貯米房舎取餘米貯備大有裨益應欽遵上諭而行將于成龍供應大兵餘剰之米即派其隨行人員運致察罕腦兒謹貯現成所有倉内倘房舎不敷就近擇地收貯勿使雨水霑濡即交附近扎薩克小心看守至大兵已𠞰滅噶爾丹而還其米無庸前運應停止捐納馬騾其捐納車輛馬騾已運米至拖陵者准為捐納如不至拖陵者不准為捐納應行文于成龍將運到拖陵者幾何不到者幾何分晰查明開造清册星速具奏其不准人員馬騾仍各發還本人上從之乙未諭用兵之道在得天時上諭大學士伊桑阿等曰觀此番出征地方形勢守亦可戰亦可但得天時甚難兵蚤出則天寒無草乏水兵不能行兵遲出則天暑雨水多倘連雨數日則樵採不敷必致窘乏此番兵出遇無水之地而得水無草之地而草生寒暑俱調此特上天眷佑故滅冦而成大功並非人力之所能也其以是語九卿伊桑阿出傳諭九卿俱跪而奏曰上天為民除害皇帝亦為民除害皇上德量如天皇上雖不自居豐功偉績誠皆出自聖心也命増察哈爾䕶軍之餉加恩外藩䝉古上諭大學士伊桑阿曰朕此番出征視察哈爾兵人材矯徤甚為効力其䕶軍當每月加餉一兩至四十九旗兵丁此數年間戍役勞苦其中路西路出征押送糧車監牧坐塘鑿井修道兵丁應每人每年六兩給三年不出征兵丁每人六兩給一年著議政大臣集議議曰查八旗口外游牧所在察哈爾前鋒䕶軍共八百二十二人每月各加一兩給一年需銀九千八百六十四兩至四十九旗兵共六萬四千八百九十一人其内中路西路出征及不出兵押送糧車監牧坐塘鑿井修道兵丁行文該扎薩克將名數逐一查明送到後其出征押糧監牧坐塘鑿井修道兵丁每人每年加銀六兩給三年其不出征兵丁每人加銀六兩給一年其不出征之兵分别殷實者停賞真正貧乏者每人六兩給一年行文各該扎薩克將名數逐一查送後共需銀若干具奏分給以此開入詔欵上從之安郡王馬爾渾報奉㫖起行赴愛必哈什喇穆冷喀倫兵部奏曰安郡王報稱奉㫖於本月初五日起行赴愛必哈什喇穆冷喀倫地方以土黙特兵交土黙特都統阿必達副都統綽爾濟雅克其隨來宣府等處緑旗歩兵一千名交原領都司陳福等在歸化城住候部文為此奏聞上命緑旗兵歸本汛遣御史鍾申保賫糧迎給各路回軍費揚古奏曰臣等西路兵所携八十日糧至五月初四日已完運米牲口程逺乏水而兵行又疾是以不能赶及兵丁正在缺糧之際皇上早見西路之米不到於迎賞米内將一百六十三石六斗麵七千觔五月二十三日前遣撥糧内大臣明珠户部侍郎阿爾拜員外達賴運到多羅特之喀喇烏素地方臣等率官兵叩頭謝恩均給兵丁訖二十六日至拖諾續運到米八百七十一石令右衞及陜西寧夏大同發回官兵節減而食計口分給俟至納喇特將西路運到之米算明伊等到日支取各赴本汛訖六月初一日至克勒河朔以運到克勒河朔之米一千二百一十四石計京城官兵赴京西安寧夏官兵及厄魯特降人口數均給十五日米訖䝉聖上為官兵乏糧周詳籌畫特遣大臣預將米糧陸續運到迎給官兵得免乏糧之苦此皆聖上周詳籌畫隆恩之所致也厚比天地覆載之德仁逾父母養育之恩雖粉骨碎身不能報於萬一者也同聲歡頌如此奏至上諭曰大將軍伯費揚古疏言右衞兵寧夏兵自拖諾遣回納喇特前者朕聞西路之米令從驛路納喇特而去並未報西路之米已到何地竟不知其所至恐兵丁乏糧亦未可定應撥鍾申保等能員二人隨便取歸化城喇嘛官員殷實人户之駱駞車輛裝運湖灘河朔之米迎往著會議具奏議曰皇上熟籌而有斯諭俱當欽遵行之請遣御史鍾申保再能員一人乘驛速往于歸化城喇嘛官員殷實人户隨便取駱駞車輛裝載湖灘河朔之米親身帶領星速迎往其押駱駞車輛官兵應取諸歸化城及附近旗分帶去奏入上從之副都統阿南達奏報噶爾丹等遁走情形阿南達奏曰訪之降人言噶爾丹本身逃向何方知之不明丹濟喇丹津俄木布會阿喇卜灘于博羅之地不久即别率其屬下百許人往覔噶爾丹阿喇卜灘率其屬下五百餘人順博羅河下流而去我等俱自彼地來聞滾占之妻率其屬下人從憨山南渡土喇河溯塞稜河遁走其内自亂伊德順柯爾寨桑等叛而内來滾占之妻率兵與戰伊德順柯爾寨桑敗又噶爾丹所設尾後兵明吾特布喇特兩部落千許人正當噶爾丹敗亂之時見阿喇卜灘屬下人婦子從特勒爾濟口向博羅河而走此千許人追及之奪其畜産婦子中之佳者往投喀爾喀和托揮特之根敦帶青而去矣此語雖未真謹據所聞奏聞上報聞且以示議政諸大臣丁酉將軍孫思克謝恩併報赴京事孫思克奏言𠞰滅噶爾丹實仗聖駕親臨狡冦膽落遁逃臣等恪遵皇上訓㫖滅賊於昭莫多之地臣等並未能効纎芥之力樹尺寸之功乃皇上優加恩賜以示寵眷五月十八日特遣一等侍衞馬武到營宣㫖召臣來京面聖正治裝赴京之時五月二十一日副都統阿南達來傳上諭令西安官兵緑旗官兵赴京安息官兵聞㫖俱欲進京但鎗礮火藥甲胄軍器什物甚重全需牲口䭾載然牲口甚少而又疲瘦不可用倘載火器等物到京又載回陜西甘肅則京城與肅州境上相去五千里有餘程途遥逺空勞往來臣與將軍博濟會商俱不便赴京今將軍博濟副都統馬自德滿洲漢軍章京共二十六員筆帖式一員酌帶滿漢兵五百名臣與總兵官潘育龍等四十五員酌帶緑旗兵五百四十五名隨大將軍一齊赴京外其餘西安滿漢官兵交副都統巴林緑旗兵交副將守備等官由歸化城一路入邊各自遣歸本汛至赴京官兵甲胄器械俱交遣回本汛官兵帶歸外又滿漢緑旗官兵以至僕從在克魯倫一帶沿途地方䝉皇上屢次加恩賞給口糧官兵領米俱歡呼得食矣皇上如此隆恩我等何以報効但捐軀為國家立功邊疆盡力以報皇上之恩皆向闕叩頭謝恩求臣等代奏上諭曰西路大兵糧運不到恐大兵乏糧朕心殊以為憂預為籌畫陸續撥中路糧運迎至拖諾山足給軍中不致匱乏朕心始慰戊戌宥大學士伊桑阿罪免革職先是以坐塘官阿林不將委付馬匹小心㸔䕶致多倒斃上諭内大臣曰呼什穆克驛坐塘阿林等所留馬六十匹倒斃至三十五匹其餘俱未蘇近見奏言内府佐領馬匹又多倒斃馬者軍之急需伊桑阿理兵部事竟不劾奏以請懲治一味模稜狥庇兵部之事亦流而日懈不復可觀矣爾等今即拿坐塘阿林甘應選白奇到京責令賠馬内大臣等請交該部議吏部議伊桑阿理兵部事而不預為嚴飭使在水草佳處小心㸔䕶以致馬多倒斃後又明知馬多倒斃不劾奏懲治務為狥庇殊玷職守應將伊桑阿革職上曰此事俟到京後再議至是部議仍擬伊桑阿當革職上曰伊桑阿從寛免革職著降三級罰俸一年己亥皇長子𦙍禔以兩路大兵至拖陵沿途備米之事奏聞𦙍禔奏曰臣於六月十一日到滾腦兒探得軍中聲息言馬思喀兵初一日可到拖陵費揚古兵初六日可到拖陵至馬思喀費揚古自拖陵起行何日到邊已遣人往探俟得實音奏聞臣自拖陵起行之時遵㫖將糧務交清明珠于成龍而來探得撥糧之事自拖諾至邊汛共給過四千一百七十九石零所餘一千六百一十三石零于成龍等以空車攤載運赴察罕腦兒查視在後歩行僕從各色人等驛中俱有米恐後又増人亦未可定已交喀拜使每驛増備米糧自拖陵至滾腦兒沿途俱有運米在上報聞庚子命將軍薩卜素駐防科啚偵探聲息上諭議政大臣曰薩卜素現領兵駐索約爾濟地方軍中所備之米扣至七月初五日為止今不預為籌度兵丁必致乏糧著遣盛京兵千名回薩卜素携來兵千名科啚地方有現貯米在可率之至此駐防偵探著行在議政大臣集議咸奏言諭㫖甚是俱當遵行上遣侍讀學士伊道隨將軍薩卜素而往辛丑命以鄉導汪舒克等八人為達爾漢理藩院奏言奉上諭以蘇尼特杜稜郡王達林扎卜旗下鄉導汪舒克郡王額駙薩瑪扎旗下鄉導博羅扎卜阿覇垓卓力克啚郡王達馬林扎卜旗下鄉導達濟郡王吳爾占噶喇卜旗下鄉導桑阿阿覇哈納爾貝勒布昭旗下叅領鄉導伊魯兒啚鄉導索諾木喀爾喀貝子程伯兒旗下司儀長馬哈杜喇兒八人俱授為達爾漢查得太宗皇帝時以肯濟赫同阿賴呼魯克追毛明安引道有功賜達爾漢之號免其賦役子孫承襲順治三年十二月内以烏朱穆秦車陳親王䕶衞達喇海於和碩德豫親王率兵追騰機思之役引道至喀爾喀國有功賜達爾漢之號免其賦役承襲三次今汪舒克等鄉導八人應作何承襲伏候上裁上命汪舒克照肯濟赫例博羅等之達爾漢准其承襲四次督運于成龍奏報撥給大兵糧馬自拖陵起行于成龍奏言臣奉㫖與内大臣明珠同在拖陵給平北大將軍官兵僕從緑旗官兵厄魯特降人俱照人數共米五百二十石零給撫逺大將軍官兵西安官兵緑旗官兵僕從土黙特䝉古厄魯特降人亦皆照人數共米七百二十九石零至備帶馬騾内撥給大兵數目俟到京造册另報外六月初九日自拖陵起行帶回餘米一千六百一十三石向察罕腦兒而來上報聞丙午大將軍伯費揚古奏報西路兵回喀倫遣將軍舒恕侍郎滿丕赴歸化城察探各路回軍及糧運聲息先是上遣侍讀學士喇錫傳諭費揚古曰喀倫地方水草佳美費揚古一枝軍馬到喀倫後當暫駐守乃彼未完之事伊等如一徑到京似有可虞朕亦思事之無常在彼進兵之路使安王等駐愛必哈什喇穆冷續其尾後今善巴王昆都倫博碩克圖王等由納喇特之路來正當愛必哈什喇穆冷不論從何處來總之愛必哈為形勢之地且其行也務留一妥幹大臣於其軍後保䕶看守勿使拖㳫疲乏者致於遺棄朕之行亦如此是以一物無失至是費揚古報遵㫖率官兵於六月十九日已到喀倫駐扎上曰前日諭將軍薩卜素兵千人駐扎喀倫科圖地方今大將軍疏但言奉㫖駐喀倫地方已於六月十九日到喀倫其兵數及投誠人俘獲人緑旗兵併于成龍之米作何截留之處並未明晰如此則日後又將生枝節作種種難事矣况阿爾薩䦨衞寨桑進追噶爾丹喇什又率車陵扎卜之兵五百進而追之至遣回緑旗兵八千西安滿兵席爾哈達兵運米之車若何寧夏未嘗一報此等事或西路大臣内有明之者朕心猶疑之著議政諸臣將此内事情逐一詳議具奏議曰大將軍伯費揚古之兵作何留後投誠人俘獲人綠旗兵作何措置于成龍之米作何截留並未詳盡申説此項事如目下不議明則日後又生枝節成種種難事彰彰明矣目下阿爾薩䦨衞寨桑進追噶爾丹喇什又率車陵扎卜之兵五百進而追之此乃費揚古未完之事則費揚古等之兵允宜留後駐劄近諭將軍薩卜素率兵千人駐扎科圖地方今應令費揚古等之兵亦留一千費揚古親率駐扎歸來兵丁之馬與留後兵酌便調換其餘官兵及將軍孫思克博濟兵仍遵㫖赴京至投誠人理當速發安插相應扣給口糧交明領回軍大臣遣行投誠人到張家口日期亦著預報其留後兵應支幾月口糧著將軍算明向于成龍等支領率兵起行及支米數目即令奏明除回軍之俘獲外其留後軍俘獲有願帶回者許令遣行又查費揚古等遣回綠旗兵西安滿兵席爾哈達兵未知歸到本汛否米車已到何地今已如何未嘗一報近奉諭㫖遣兵部理藩院官各一員至寧夏歸化城探聽費揚古遣回諸軍歸到本汛與否米能接濟與否聲息如上項情事費揚古等有所灼見著作速奏明至米到在何地或已運回應檄王國昌等令彼作速奏明其領回軍而歸之大臣伏候欽㸃上曰前使莫里溥駐扎寧夏者特欲其報此項諸事也寧夏綠旗兵留駐翁金副都統席爾哈達兵費揚古早已遣之使歸矣是軍之歸到本汛與否莫里溥並不來報著將軍舒恕侍郎滿丕乘驛速赴歸化城將伊等遣回之兵席爾哈達等率領留駐翁金之兵已到何地米得接濟與否查明具奏王國昌喻成龍等所運之米如何已到何地曽否接濟回軍所設驛站如何作速差兵部官往問王國昌喻成龍等令去員親身查明來奏從納喇特前去之兵何時過去給米與否亦差官一員查明來奏將軍費揚古措置已畢將軍薩卜素到科圖後著費揚古回京將此速檄費揚古可也丁未侍郎西喇奏報遷入厄魯特降人丹巴哈什哈等西喇等奏言厄魯特降人丹巴哈什哈察罕西達爾哈什哈等夥伴一百六十口及大將軍費揚古送到丹巴哈什哈家人西虎爾共一百六十一口臣親身同鑲黄正白兩旗察哈爾兵夸蘭大多爾濟扎卜等率察哈爾兵二百防䕶而來六月十九日到張家口外十八里臺地方居住又丹巴哈什哈察罕西達爾哈什哈等跪吿曰我等來歸聖上䝉皇恩宥而不殺且使我妻子兄弟完聚遣我等至張家口之時皇長子惠給牛羊米麫茶葉廬帳釡鐺等物皇上如此隆恩終身不能報答願得赴京以供聖上道路灑掃之役伏乞轉奏上曰著諭丹巴哈什哈云爾等雖係降人俱有用之材今即使至此天時炎熱不但爾等不宜入居即我出兵歸來者當此暑天猶苦腹瀉如是炎熱爾等何以堪此自夏而秋自秋而冬以漸相習始可也爾等姑在口外俟將軍軍中所解降人俱到之日當另有諭㫖又丹巴哈什哈等無衣與鋪葢著於張家口章京何芳處支領庚戌叙賞奉差偵探䝉古理藩院奏言據尚書班第咨稱欽遵諭㫖著將班第所差偵探人員記名俱加恩賜查前差往偵探者乃蘇尼特王薩木渣達林扎卜阿覇垓王達瑪林扎卜阿覇哈納爾貝勒布昭喀爾喀公車木楚克納木扎兒衞徵諾顔阿玉什貝勒汪渣兒等旗識道路記山川之台吉官員兵丁共選擇一百一十七人前往其内喀爾喀車木楚克納木扎兒旗下庫爾登佐領披甲猛索和三次吿請往厄格穆爾布爾哈蘇臺等處偵探且送書於根敦帶青西卜退哈灘巴圖等蘇尼特杜稜郡王旗下鄉導完舒克阿覇垓王達瑪林扎卜旗下叅領畢喇什阿覇哈納爾貝勒布昭旗下叅領伊魯兒圖薩爾濟佐領驍騎校塞特爾伊等俱吿請効力前往人員伏乞叙賞查員外阿爾必特祜隨行鄉導鄂欣楚楊博羅等俱奬賞蟒領羊皮襖各一件緞各二端布各二十匹披甲巴爾米特等九人各賞緞二疋布二十匹在案兹披甲猛索和鄉導完舒克叅領伊魯兒圖等已在軍中給賞不議外叅領畢喇什驍騎校塞特爾請賞緞各二匹布各二十匹其餘賞緞各一匹布各十匹上從之辛亥以第巴使人羅卜臧凱尊發部拘禁先是上諭内大臣索額圖大學士伊桑阿達賴喇嘛班禪達賴汗青海諸台吉使人至則照例安挿定所食物俱依舊供給但將第巴使人收禁理藩院中撥兵看守至是理藩院奏言達賴喇嘛使人郭尼爾羅卜臧帕克巴格隆等在今日到查前此達賴喇嘛使人來城外有為達賴喇嘛造成舎院隨便掃除院内撘蓆棚安插撥官兵守門今亦照前例令在達賴喇嘛房院内居住其第巴使人羅卜臧凱尊等拘禁臣部撥官兵看守上命議政大臣與大學士集議議曰往召班禪庫圖克圖第巴阻止之而復與噶爾丹為一體其使應遵前㫖拘禁上報聞檄責通政司通政使覺羅莫里溥理藩院奏言撥什庫常住往迎達賴喇嘛使人回問之曰西路遣回之兵曽到寧夏否言遣回之兵已於寧夏見之歸中衞之兵亦曽見之上曰遣回之兵恐乏糧食朕深為憂慮向使正卿莫里溥住扎寧夏欲其奏報諸聲息也今遣回之兵已到寧夏而莫里溥並不奏報爾等可移文責之安插厄魯特降人回回國王阿卜都里什特等理藩院奏言據大將軍伯費揚古咨稱奉皇長子令遵㫖時方炎熱著厄魯特降人暫居張家口外欽此將軍可帶至分路之處使吳巴什拜察克阿玉什阿迪等䝉古大臣逐隊分開撥察哈爾兵䕶送與侍郎西喇所解丹巴哈什哈等會同遣行查本軍中陸續來降者厄魯特内有回回國王阿卜都里什特厄魯特台吉塞冷扎卜米寨桑等共一千九百三十四口歸降之後或逃或盗馬情罪可惡正法者共一百四十三人病死者三百四人又扎薩克達爾漢親王喀爾喀善巴王昆都倫博碩克圖等各扎薩克䝉古軍中降人五百五十九口乾清門侍衞馬武至傳㫖云投誠俘獲人等俱俟朕酌量措置即遵㫖將伊等檢㸃交付訖又正黄旗五品官鄂欣認出弟兄三十口將此除出其餘男婦兒童共八百九十八口交付土黙特副都綂阿迪阿玉什撥八旗章京八員兵三百名防䕶於六月二十日遣行使送交解丹巴哈什哈往張家口之侍郎西喇此項押送官兵或令駐扎張家口獨石口等處與大兵一同進邊或令徑赴京城乞定奪檄知查厄魯特降人既俟秋凉安插善地其押送官兵應於安插之前暫駐防守俟安插後回京此項官兵及厄魯特降人口糧應交户部將張家口所有之米撥給上從之昆都倫博碩克圖郡王滾布以厄魯特鳥鎗及甲來獻滾布奏言聞聖駕出征臣滾布雖老願從軍効力䝉上允許臣乃率我子孫起程自哈喇厄魯特地方在大軍前行擒獲三次偵探之時敵人至副都統阿南達令臣登山乃往山上交戰一靣往報將軍適遇誘至之敵與戰後布陣之時將軍乃令臣在後然聞大礮之聲欲再往山上覘之見發礮將軍諸臣分頭掩擊領兵者不令臣等過去而從旁繞入與戰放鳥鎗以殺其人聞擊敗噶爾丹㨗音臣原思親赴行在稱賀緣年老路逺天暑是以在此叩頭上奏謹遣臣子台吉托堂䕶衞綽代賫所獲鳥鎗一桿甲一領綿甲一領駱駞三頭馬三疋上獻上受其鳥鎗及甲交付所司甲寅議復遣使於達賴喇嘛先是内齊陀音庫啚克啚等賫達賴喇嘛等奏章還上命放達賴喇嘛等使人入京至是以達賴喇嘛使人郭尼爾羅布臧帕克巴格隆等已到京城奏聞上交該部以内大臣索額圖大學士伊桑阿知此事原委爾等可與索額圖宣㫖諭來使曰噶爾丹敗於烏蘭布通遁走之時首頂威靈佛像設誓云不但聖上屬下人民即喀爾喀降人以外再不敢復犯矣去年又背誓至克魯倫地方殘害喀爾喀掠我降人納木扎爾陀音於是朕親綂大軍往討噶爾丹懼而奔遁適遇我防禦之兵誅殺過當噶爾丹率數人僅以其身免餘者盡降厄魯特遂滅厄魯特降人吿曰達賴喇嘛久已脱緇矣天下䝉古皆尊奉達賴喇嘛如達賴喇嘛身故理宜報聞諸䕶法主以班禪主喇嘛之教繼宗喀巴之法乃匿達賴喇嘛之䘮指達賴喇嘛之名唆誘噶爾丹朕屢遣使問之第巴皆不使與達賴喇嘛相見偽居髙樓之上以示之第巴原係達賴喇嘛下管事人朕優擢之封為土伯特國王乃陽奉宗喀巴之道法隂與噶爾丹比欺達賴喇嘛班禪而壊宗喀巴之法前遣濟隆庫圖克圖至噶爾丹所為噶爾丹誦經選擇戰日朕為衆生往召班禪沮而不遣朕無責達賴喇嘛達賴汗青海諸台吉之意朕今遣使於達賴喇嘛果達賴喇嘛尚在則面見朕使臣曉諭噶爾丹遵朕㫖行朕凡事俱無所復言亦略無所介意若仍誑我使人不令相見斷不輕止至噶爾丹之誓濟隆庫圖克圖等現在其地問之豈有謬乎今將遣使如彼來人欲全歸則聽其皆去欲先擇數人歸即遣先行爾等可召集達賴喇嘛達賴汗使人宣㫖其噶爾丹降人喇嘛格壘巴兒珠爾同憨都台吉降人喇木扎木巴青海羅壘額木齊著侍郎西喇帶之星速前來俟其到日偕京城大喇嘛賫勅前去應遣之大喇嘛著爾等查奏索額圖等以扎薩克大喇嘛黙爾根綽爾濟等名開摺具奏上命派出次等大喇嘛津巴札木素著查前隨副都綂阿進泰保濟出使識認達賴喇嘛者或經他事前往識認達賴喇嘛者具奏索額圖等覆奏云烏思尼哈畢咱雅㙮之德木齊索諾木臧布係漢人種曽去五次見之必識願往効力察罕喇嘛俄木布垂札木素格隆係漢人種曽去五次見之必識今雖年老願往効力大仁寺阿旺羅卜臧格隆係阿木道種曽去三次烏思尼哈畢咱雅㙮之左特巴格隆係漢人種曽去三次西達達廟阿旺納木札兒格隆係漢人種曽去二次俱認識未真上命派出德木齊索諾木臧布保住聖祖仁皇帝親征平定朔漠方略卷二十六

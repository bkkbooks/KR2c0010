body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷四十閏三月辛巳朔遣使敕訊第巴先是第巴遣使尼麻唐庫圖克圖卓爾磨隆堪布具疏密奏云為衆生不幸第五世達賴喇嘛於壬戌年身故事自聖主車書一統癸巳年赴京講信修睦以來此地法門最大者達賴喇嘛也世間最大者昊天日月大施主也百凡情事非不有心陳奏而奉太卜大護法巴賴奔奈沖之語但召近侍之人如達賴汗達賴巴圖爾等告之自此以外各於親近直至今年不得告語雖有心陳奏此情但奉達賴喇嘛之旨及護法奈沖之言甚為嚴切是以未能陳奏伏祈睿鑒第六世轉生靜體因有避忌尚未放參俟至其年月日時奏聞昊天至尊大施主後再諭衆聞知為此遣尼麻唐庫圖克圖卓爾磨隆堪布等前往密奏伏祈睿鑒屢頒訓諭兹具伴疏禮儀欲昊天大施主便於供養以其停骸牀簀之鹽拌和塑成逹賴喇嘛遺像謹以上獻尼麻唐庫圖克圖等口奏云老逹賴喇嘛戌年已故小逹賴喇嘛生今年十五本地仗逹賴喇嘛以存逹賴喇嘛身故之時即欲奏聞恐生他變且有喇嘛遺言及巴賴奔奈沖之言必至相合年嵗始聞之天朝皇帝及衆施主故於今年十月二十五日方出定放參第巴為此遣我等行時令於佛前立誓必親見皇上密奏若於他處俱令以逹賴喇嘛出定相告未嘗明悉其故上隨將彼奏章及所獻逹賴喇嘛之像於原封之外面同伊等加封押以鈐記而諭之云朕數年來久知逹賴喇嘛已故若逹賴喇嘛尚存則僧巴秦布庫圖克圖噶爾丹西勒圖齊七克逹賴堪布濟隆庫圖克圖等斷不如此妄行喀爾喀厄魯特亦不致破壞故朕降旨切責之今第巴輸誠吐實密以奏朕朕亦為之密藏將俟十月初旬啓封宣示內外四十九旗喀爾喀諸部落令為已故逹賴喇嘛誦經致賵為小逹賴喇嘛遣使稱賀乃撰敕遣主事保住等往諭第巴於二十九日清晨遣行至是司務英沽自䇿旺喇卜灘使歸奏云臣接部發䇿旺喇卜灘咨文賫至䇿旺喇卜灘所䇿旺喇卜灘大喜即遵旨領兵來𠞰噶爾丹行至薩克薩忒呼里克二十日程之地有逹賴喇嘛使人逹爾漢厄木齊言逹賴喇嘛身故已十有六年矣小逹賴喇嘛方十五嵗爾等當各居其地不得興兵遂按兵而退臣英沽知其不能復行亦還逹賴喇嘛之事西北諸人皆已聞之是日副都統阿南逹奏至疏稱噶爾旦多爾濟遣人來告云逹賴喇嘛之善巴陵堪布於三月二十五日致我一扎令我赴彼盟會我以向不與彼盟會是以不往謹以其書呈覽視其書乃唐古特文其詞云逹賴喇嘛第巴兩人遣人諭青海諸首領俱於正月二十八日在察罕托落海地方會盟繕修器械爾可令爾屬下人亦繕修器械於來月初四五間晝夜兼行務期必到期會之地疏至上命將善巴陵堪布致書之意下議政諸臣集議議曰逹賴喇嘛遣使尼麻唐庫圖克圖等請安密陳機務第巴復遵諭陳言情詞恭順是以皇上特沛溫綸遣我使與尼麻唐庫圖克圖偕往今以善巴陵堪布致書噶爾旦多爾濟觀之則與逹賴喇嘛所奏本意不符無故會青海諸台吉繕修器械又約從來未與盟會之噶爾旦多爾濟其意叵測且䇿旺喇卜灘親領兵往𠞰噶爾丹之時第巴曾遣人撤回以此觀之第巴仍黨噶爾丹而誑我其迹顯然噶爾丹者窮凶殘寇必當撲滅之者也凡俘獲者論功助彼者即吾敵也恐第巴以彼所居遼遠謂我不知其詭計應令所司詳列此情追發尼麻唐庫圖克圖等併檄主事保住等將此情由詢明第巴來奏議上上從之壬午厄魯特津巴車爾貝來降副都統阿南逹疏至言三月初五日臣遣家人尼楚滾渣木素往哈密偵探語之曰聞噶爾丹之津巴車爾貝來來則擒而致之十七日尼楚滾歸告曰我等於初九日至哈密以內昭呼都克地方遇前所遣駐劄哈密之家人海喇圖解送津巴車爾貝一同前來問津巴車爾貝答曰噶爾丹謂我受中華皇帝敕書以為叛彼曾被拘執正月初一日彼遣十五人屣覓塞卜騰巴兒珠爾以我授之帶至瀚海止給馬一匹棄之而去我於是步行向哈密而來我來時噶爾丹仍在格格忒哈郎古忒地方兵不過五六百名馬駝之外並無牛羊又曾遣人名哈世者往探洪郭羅人等情形尚未歸來噶爾丹口中但云俟格壘而已前者噶爾丹與我間談言中華皇帝若堅諭格壘仍前修好查還失散之人我等猶可茍延如不招降無甚修睦之旨必不能棲於此地矣蓋其勢似必向洪郭羅伊濟根等處而去此兩處未知焉往殆俟往洪郭羅之使哈世歸時乃定也臣思噶爾丹之兵不過五六百所乘馬駝外並無他畜正急遽擾亂不知所為之際我皇上睿謨周至曾諭臣相機進兵臣料其斷不能出皇上廟謨之外不勝欣躍臣現駐劄布隆吉爾地方請俟孫思克博濟兵到後即竭力進征以圖報效為此驛解津巴車爾貝前去謹此奏聞上命示議政大臣著以津巴車爾貝交吳逹禪喇錫訊明來奏厄魯特台吉滾布察罕來降理藩院奏曰據副都統阿南達咨言降人厄魯特台吉滾布察罕訴云某來歸聖上盆楚克台吉取我人畜留之隨檄盆楚克台吉云今來歸聖上爾乃留其人畜是何故耶著速照數查還盆楚克台吉言往歸聖上之人我何敢留之但滚布察罕等前曾盜我屬下人畜又有借欠宿逋計數取償是實又有不願人等擅自逃去者皆圖賴我留之耳今承鈞諭將現在人口即行差人解還計三十八口以此問之滾布察罕訴云先是一百二十許口內自盆楚克處未起行之前十六人逃至名畢賴之人家向此來時又有俄申等八人亦逃至畢賴家至察罕逹爾漢所居俄倫布拉克又四人逃去現在盆楚克所者仍有三十八口馬二十四匹在畢賴所者有厄魯特人二十四口西郎古特人二十一口於是復遣通事韓福賫文赴盆楚克等訊之韓福歸稟曰某等至盆楚克家問之云盆楚克赴青海之盟去矣即以公文授盆楚克下人逹爾札送其父阿齊巴魯爾台吉遣人來覆云我子赴盟去矣滾布察罕之人盜我子牲畜罰取之者也又至畢賴處諭之畢賴言我何敢取歸降皇上之人俄申等十一人逃在此西郎古特者因盜逹賴備賞牲畜盟壇會審聞於逹賴喇嘛罰取之人其根敦等十四口久係掠取之人亦逹賴喇嘛所轄此輩我不便擅還但將俄申本身男子四人婦女二口童男二人童女二口給發及察罕逹爾漢處所有男子二人女一口共十四口又畢賴回文一併帶到畢賴回文云此等人口俱因偷盜財物罰取已久皆屬逹賴喇嘛我不得擅給為此將伊人口共一百二十五名交送山西巡撫咨部伏乞轉奏兹據咨轉奏報聞副都統阿南逹奏報策旺喇卜灘率兵禦噶爾丹阿南逹奏言䇿旺喇卜灘咨稱來文俱已備晰倘彼從此地過必不使之脫出已遣阿玉什之子臧濟扎卜率兵二萬起行矣又備文開明諸事原由差諾海賫送爾矣又我使人往土魯滿聞汗之子已往哈密汗所親率不及千人漸往哈密留下衆人止率兵五千至呼逹波汗處逃來者二人言汗本身原在格格特哈朗古特以額克阿拉兒有魚欲遷往彼地故今至泰什里地方又我差探博碩克圖汗所在哨卒遇逃來人哈爾垓殿額爾克擒之前來言博碩克圖汗本身仍在格格特哈朗古特其他俱無食四散又額貝都拉致書於哈爾垓殿額爾克以告博碩克圖汗之言曰中華皇帝使臣來已二三次矣渾台吉使人之來亦二三次屢索其子彼處使人我已面見語之曰我之意仍照前而已非如爾等遊牧之人恐伊等之狀又將遣使來也如欲問信於我可令爾使人至土克里克坐待覆音伊等使人若回去即至沙爾見我云我欲探明博碩克圖汗去向已留下兵馬一枝因我遊牧地方近於白帽故已回去奏入上以示議政諸臣命運米至白塔上諭內大臣福善索額圖等曰大兵行期暫緩米應先運至白塔爾等會同運米左都御史于成龍將所有船隻酌留渡口備用外其餘船隻盡行載米運往但此地水手操船運米不甚諳練黑龍江之兵頗習於船可發二百名令率本地水手乘此時裝運二次其大兵所携四個月口糧俟至白塔再行散給令各帶去甚有裨益于成龍等集議曰聖算無遺臣等祗遵無復他議除留船二十隻令備渡口外所餘大小船共一百三隻一次可載米三千石應將于成龍等隨軍遞運之米盡載入船再將將軍馬思喀兵所携四個月口糧內酌撥上船作兩次運送上報可問于成龍曰爾等裝運米船作何調度于成龍奏曰請以船十五隻交地方官一員及臣等隨行官員二員同押以便約束水手米分為六隊頭隊喻成龍二隊范承烈三隊王國昌四隊辛保五隊李鈵六隊喀拜前後臣親身總督之俱自寧夏散趕駝馬至於白塔地方再各收所運之米自陸路運往上曰是米糧關係緊急爾等當從多帶往至隨駕大小官員殷實之人除各帶自己口糧外有願將官米或數石或數斗隨力携帶者各令携帶至於白塔撥給兵丁爾等諭衆通知以願帶之人及所帶米數奏聞先是上以新滿洲二十人給于成龍使之隨材調用至是于成龍覆請曰皇上所給新滿洲二十人何處調用口糧何處支給上曰此二十人可令搖船運米至陸路後隨材用力伊等口糧即載船中帶去至汝等所帶旗員情願效力者甚少恐差遣不敷今採買牲畜之御史顧素等及隨駕部院官員並無所事著令押運米糧併去嵗運米者爾等亦具奏帶往癸未以諭諸部落保護哈密檄知額貝都拉副都統阿南逹疏言額貝都拉逹爾漢白克呈稱䇿旺喇卜灘遣使吳爾圖勞章賫文詰問云博碩克圖汗處發來事務爾等不明示我其與塞卜騰巴兒珠爾等見執之人甚多而不遣一人於我亦不使聞其情事且爾又令人押我使一概不許相見此項諸事果是理乎今可速將爾所執人內擇出一人與爾使來再將塞卜騰巴兒珠爾與我使一見其餘皆送往圖魯滿口授之言已語使人矣我對之曰噶爾丹處發來諸事我並無所欺隱其塞卜騰巴兒珠爾等人理應解送皇上故交侍衛阿南逹之使與我子白竒一同解去此爾使所目覩也至汝之人每誘蒙古之人逃竄是以一概不令相見耳其來使口致云阿南逹書言爾已降中國其中國迫汝使降耶抑爾自願降耶我對之曰皇上未嘗迫我苐遣人移文稱聖諭云前爾雖附噶爾丹今當從朕後又令我擊噶爾丹其人來則擒之我是以心悅誠服而降聖上也䇿旺喇卜灘謂我已降皇上既已大怒又以我擒獻其種類故凡我使人皆拘執之不使得還今我所擒約七十餘人䇿旺喇卜灘必來索取倘致興戎內外未必無虞是宜預為籌之也疏入上命議政大臣集議議曰前因額貝都拉逹爾漢白克已降聖上而䇿旺喇卜灘及青海諸台吉下人不之知也未必不肆行侵擾應檄䇿旺喇卜灘及青海諸台吉各將下人嚴行約束勿得侵擾哈密回子可也已經行文在案請以此諭額貝都拉知之併檄額貝都拉如䇿旺喇卜灘索取爾處所有之人斷不得擅發上從之命黑龍江軍中馬匹放青上諭內大臣公福善索額圖馬思喀大學士伊桑阿曰黑龍江之兵效力之心切故薩卜素自稱馬匹臕壯而已朕今日巡城見黑龍江軍中馬匹臕色甚欠此馬乘歸難以得到伊等若有出行之事朕當給馬使騎其將伊等之馬一千七百匹令於察罕托海之地牧放遣人送往歸化城征行既畢各乘己馬以歸其土則易到也如此草料有餘而馬亦有益其會同薩卜素集議以聞議曰此馬在察罕托海地方牧放請以三百匹為一羣共五羣每羣用緑旗兵十五名牧之以總兵官王化行標下參遊等官才能者二員領之再令將軍薩卜素派出每翼章京各一員每旗兵各二名協同監牧此馬既趕解歸化城應檄歸化城都統派出副都統一員參領二員及官兵趕至歸化城四圍牧放事竣之日以便各乘其馬歸彼本汛如此則草料有餘而於馬亦有益至將軍薩卜素在此地拴騎之馬五十匹仍支草料喂養俟命下之後即發伊等之馬往察罕托海牧放上曰此馬趕到察罕托海令與逹禮善等所牧馬一處牧放餘依議提督李林隆請調兵二千分守大黃山之西允之李林隆疏至言奉兵部咨稱甘肅等處地方甚屬緊要目前將軍孫思克博濟統領大兵進薩克薩忒呼里克搜𠞰噶爾丹應令提督李林隆仍駐守甘州議政大臣議奏奉旨準行查大黃山東方有涼州總兵董大成足以防守大黃山西方所有肅州總兵官屬下地方皆屬緊要需兵甚多河西地方纍年以來挑用兵馬其馬不可以為不乏臣現調馬兵二千分守以副皇上西顧之意其調到兵馬俟將軍孫思克回汛之日臣即當發還固原疏入上從之命動支正餉採買馬畜以備軍需副都統阿蘭泰等疏至言平涼買牲郎中朱蘭泰動支正項錢糧採買駱駝七十頭馬一百二十五匹又朱蘭泰自價買助馬騾三十匹上項駱駝馬騾俱交地方官訖寧夏買牲御史顧素郎中敖海員外沙里布等買得馬騾一百三十一匹羊一萬六千五百隻又顧素自價買助馬五十匹敖海助馬五十匹沙里布助馬三十一匹上項俱交地方官訖疏入上以之付所司甲申厄魯特人額林辰哈什哈等來降大將軍伯費揚古疏至言侍郎滿丕咨稱噶爾丹下諾爾布寨桑族兄額林辰哈什哈等共十三口來降問額林辰哈什哈曰汝逃來時噶爾丹在何地告曰我等未來之前噶爾丹原在薩克薩忒呼里克丹濟拉移往齊察蘭去矣問曰齊察蘭距噶爾丹所居有幾日程爾同來之台吉逹木林之妻布尼塔爾者即杜噶爾阿喇卜灘之弟逹木林之妻否告曰我在台西勒地方居住是以噶爾丹聲息一無所聞我姊之子顧木特爾乃丹濟拉之壻拉斯倫屬下人常在拉斯倫左右議事顧木特爾告我曰丹濟拉曽遣唐古特相約同降又彼下人紛紛言曰西有聖上之兵東有根敦帶青之兵我輩無所逃矣齊察蘭地方去噶爾丹所居之地有兩日程布尼塔爾即杜噶爾阿喇卜灘胞弟逹木林之妻即我伯父之女於我為妹云除妻子人口及布尼塔爾等交送歸化城外相應將額林辰哈什哈解送據咨具奏上以示議政大臣其丹濟拉與噶爾丹如何離散之故交吳達禪喇錫問明來奏隨問額林辰哈什哈言丹濟拉因撻噶爾丹近侍額木齊是以離散甘肅巡撫郭洪奏報師期郭洪奏言準行兵部咨稱會議噶爾丹窮迫鼠竄餘黨不過數百大兵進𠞰即可撲滅現在肅州預備西安滿兵二千每人各有私馬三匹此二千兵內除去家貧者五百名外於此兵五百名之馬一千五百匹及撥孫思克兵餘剩之馬五百匹巡撫郭洪採買捐助一千許馬駝內揀擇臕壯者如或不足令該撫會同孫思克於文武官不出征緑旗兵丁內擇馬騾臕壯者給此滿洲一千五百兵每人二匹前往征𠞰毋失機會至所採買牛羊別無用處俱著帶去其採買捐助馬內臕瘦者給留下五百滿兵喂養等因到臣查前進之兵一千五百名以每人給馬二匹算則留下五百滿兵之馬一千五百匹及撥給孫思克兵餘剩之馬五百匹外併計將軍博濟後請炮手坐馬共少馬一千一百十二匹將現到捐助採買馬駝內臕壯者撥給其不敷者移會將軍孫思克差官往取附近不出征緑旗營之馬今將軍孫思克博濟覆稱往取附近緑旗兵之馬不能一時即得進兵日期甚急故將現得臕壯牲口數百俱給副都統等撥給兵丁一靣令其起行前來我等計馬減兵起程等語是以現到採買捐助馬駝內揀擇臕壯者共四百七十二匹交副都統席爾哈逹馬雲霄撥給前進兵丁其拴帶百日口糧臣早已預備肅州外今米袋馬騾鞍架駱駝鞍屉等物俱已撥給副都統席爾哈逹馬雲霄所缺馬數減滿洲緑旗兵八十名給前進滿兵每人二匹官兵已於閏三月初一日自甘州起行至捐助採買馬匹內臕瘦者三百四十五匹及管理茶馬郎中李學聖後換解到瘦馬一百十六匹俱交留下滿兵喂養西寧莊浪採買未到馬匹隨到即補給留下滿兵已交付道員金秉倫訖採買馬三百十二匹羊七千隻俱發隨滿兵緑旗兵訖臣到肅州督視官兵自肅州起行其日期另行奏聞外今將官兵自甘州起行日期奏聞上以發該部是日遣內大臣公常泰諭祭提督陳福其子陳世濟率族人至行宫謝恩乙酉授法爾庫為藍翎侍衛上諭內大臣曰法爾庫為前鋒巡哨時遇厄魯特三十餘人來圍之射倒一人兩人得傷而走於是得出敵皆異之法爾庫人材偉健而且善射著授藍翎侍衛追回尼麻唐庫圖克圖主事保住先是以第巴沮止䇿旺喇卜灘之兵及約噶爾旦多爾濟會盟之事追發尼麻唐庫圖克圖保住使訊第巴至是皇上又命追尼麻唐庫圖克圖保住還尼麻唐庫圖克圖保住至諭保住等曰第巴於朕諸諭旨無不順從彼又諄請溫諭是以朕遣汝等傳致溫諭既經遣發汝等敕文及口諭俱無庸更改但以青海善巴陵堪布致書於噶爾旦多爾濟及第巴差逹爾漢額木齊於䇿旺喇卜灘阻止䇿旺喇卜灘之兵又我英沽使於䇿旺喇卜灘歸奏逹賴喇嘛身故之事俱已傳播是以追回汝等使以情由問之尼麻唐又第巴所獻佛像奏章連封交尼麻唐拆視乃泥塑逹賴喇嘛其頭已斷此項情由汝等可宣問第巴保住爾年甚少可將轉生之小達賴喇嘛看明回來如不令見則已尼麻唐庫圖克圖密請云達賴喇嘛身故已十有六年矣達賴喇嘛再生年已十五今嵗十月二十五日出定此際乞聖主祕之無使宣露朕原允第巴所請今英沽歸言䇿旺喇卜灘諸人已悉聞知始通行曉諭可於途中告所遇之人將諭旨內始末亦皆曉諭之是日上諭皇太子曰前尼麻唐庫圖克圖等到其中情由彼甚祕密未經開明今事悉昭著故詳開始末尼麻唐庫圖克圖到後朕念達賴喇嘛舊好體其祕密之意將第巴奏章及所獻達賴喇嘛之像於原封上在伊等前加封押以鈐記遣主事保住賫敕往諭第巴二十八日引見二十九日起程之後司務英沽還奏言達賴喇嘛身故之事西北之人俱已盡知是日阿南逹又奏言善巴陵堪布遣人致書於噶爾旦多爾濟令其繕修器械來赴青海之盟如此則朕雖欲為逹賴喇嘛祕密其事亦徒然耳且以當詰之事甚多故追回尼麻唐庫圖克圖諸人令諸臣傳諭曰爾等祕密之事朕念達賴喇嘛之情深祕之概不以之告人今爾使逹爾漢厄木齊等皆已傳播遍處聞知朕獨祕之何益之有爾等可與喇嘛等公同啓封將奏章并逹賴喇嘛之像觀之於是此地諸喇嘛同尼麻唐庫圖克圖親啓封視之乃泥塑逹賴喇嘛之像其首離項墮在一旁是時諸喇嘛及衆大臣凡共聞共見之人無不驚訝以為此事若伊等去後開之或於十月開之而見其如此豈不為我詬耻天心每與聖主符合正當尼麻唐去猶未遠而英沽之事適到仍使其親見此事始末則皇上之誠信及優待逹賴喇嘛之心亦昭著矣十六年以來假托逹賴喇嘛之言其事顯露逹賴喇嘛果其有知亦當感戴聖上而不能不致憾於第巴也於此可以知第巴之肆惡於土白特國不必言矣蓋無人不驚異者而尼麻唐庫圖克圖輩心神失措驀然倒地口不能言但自悵云此我輩不祥之兆也即上項情事觀之此十六年間本朝出差之喇嘛輩欺誑本朝已極不足取信皆徇第巴無一實語其中丹木巴塞爾濟堅稱親見達賴喇嘛尤為可惡皇太子可率理藩院官員將默爾根綽爾濟以下喇嘛等俱傳集旃檀寺告之以其故拿丹木巴塞爾濟并其徒俱禁理藩院中其兩處所有房屋俱令封守可呵責默爾根綽爾濟及衆喇嘛曰今年初一日朕躬及皇太子俱在彼問及默爾根綽爾濟倡言逹賴喇嘛尚在今何以實迹顯露耶以此觀之養犬尚能吠生人猶為有益養爾等喇嘛竟無所益併查此十六年來差赴西域之喇嘛逐一取供來奏諸喇嘛所作何狀亦當寄聞上項情事令滿大臣俱閲之敬請皇太后安口奏大略以聞以發大將軍伯費揚古用剩銀兩仍留將軍軍前先是上命發銀五千兩送至大將軍費揚古所酌買皮襖牛羊等物頒給兵丁尋大將軍分給兵丁訖軍中俱有兩月糧糗尚餘銀二千四百兩以為應送交右衛令西路同知唐凱收貯咨理藩院轉奏上諭曰此銀仍留大將軍費揚古所有用則用俟便檄之是日上諭皇太子曰朕至寧夏將十日矣每日籌畫兵馬糧餉之事略無刻暇途中晨則蒙霧露晝則冒塵沙口疲於督責手敝於轡䇿而來此數千里之外者亦為此噶爾丹一遺孽也朕於此時倘在京城非不能朝玩名花晝坐樹隂以聽鳴鳥熱則息涼則行安樂為上也亦以此志欲展丈夫之心胸耳恐皇太子純孝之人見花見鳥見魚見獸必念朕砂磧窮邉之勞苦而惻然心痛也其勿為朕憂但日夜盡心於國家之事暇則觀經史前代之得失以抒爾懷又諭曰朕至此地即以儀器測驗較之京城北極低一度二十分東西逺二千一百五十里以此付安多照法推算原謂日食九分四十六秒乃是日大晴測驗之食九分三十幾秒並不昏黑見星自寧夏視京師在正東而稍北初三日雨聊以寄爾知之其以告滿洲諸大臣又沿途自定邉至寧夏皆砂磧無草鹹蒿鹹刺沙蒿度笈草之外皆鹻與鹹寧夏四周皆稻田引黃河之水以耕不用栽插地方水土不甚佳於人不相宜恐皇太子欲聞之雖無用而書此沿黃河邉外牧地甚佳故我軍之馬悉驅而牧之乃青草馬可飽也臣按自古聖帝明王未有不憂勤惕厲而能躋於郅隆者也堯曰我瘦天下肥大禹惜寸隂文王自朝至於日中昃不遑暇食皆是物也我皇上子愛元元惟恐一人之不安耕鑿乃以噶爾丹肆虐屢犯邉陲致我塞外人民每遭驚擾以故赫然震怒親統六師舍臺沼禽魚之樂任櫛風沐雨之勞籌兵措餉旰食宵衣由是觀之先聖後聖其揆一也伏讀敕賜東宫上諭旨逺情深聖主明訓誠可謂要而不繁矣丙戌多羅額駙阿喇卜灘奏報青海諸台吉受盟期約之事先是上遣多羅額駙阿喇卜灘喇嘛商南多爾濟內大臣杜思哈爾司業薩爾圖員外二郎保等往説青海諸台吉來朝阿喇卜灘等奏曰阿齊滚布巴圖爾台吉目今遣馬穆特來請皇上萬安問之馬穆特告曰阿齊滚布巴圖爾台吉雖未嘗有決計歸降來朝皇上之言但宣皇上恩旨我台吉當無言不從也以此觀之阿齊滚布巴圖爾台吉已向我矣應先往阿齊滚布巴圖爾所説之上是之至是阿喇卜灘等奏曰臣等奉旨起行先遣國子監助教通奇塔特帶來使馬穆特往阿齊滚布巴圖爾台吉所告之曰我遣使於䇿旺喇卜灘等處時爾遣人護送資助駝馬以此我聖上大加奬許差給恩賜我等隨至矣臣等於三月十六日至甘州十七日通奇塔特回覆云大臣之言俱已告阿齊滚布巴圖爾台吉矣台吉云目今達賴喇嘛處遣綏本阿喇木扎卜為建塔之事於青海之察罕托羅海地方會盟我遣長子額爾德尼額爾克往中途聞逹賴汗之子拉臧卓尼綽爾濟等欲乘此會盟執我而興兵是以退回我亦聞是語而與諸子商之因遣我次子盆楚克赴是盟盆楚克歸告曰會盟之地拉臧言汝二於我遣馬穆特請中華皇帝之安非叛青海乎我答言遣馬穆特者因聖駕近臨寧夏故我乘便先遣人請安則有之然我並未嘗叛逹賴喇嘛之教也今我所遣馬穆特若受其符信而來我等情甘認罪倘無符信則當何如以是答之而歸目下拉臧仍欲來伐我亦集吾人備之互設哨探爾以此往告爾大臣可也故臣等復遣通奇塔特親身屣閲其互設哨探之地且告以我等隨後即到阿齊滚布巴圖爾台吉處之意臣等於本月二十一日出永固城界阿齊滚布巴圖爾台吉即遣馬穆特等來迎云我台吉遣我等來告大臣目下青海諸台吉方在疑我若大臣不臨我地則羣疑當自息矣餘皆如通奇塔特語是以臣等共議觀阿齊滚布巴圖爾台吉有畏懼諸台吉之狀我若前往恐不利於彼况彼已係服從之人故臣等依其言不復親往但遣員外郎二郎保往諭給賞詳視情形並驗伊等兩家集兵之事二郎保通奇塔特等齊至郭滿諾門汗廟追及臣等通奇塔特告曰我前至阿齊滚布巴圖爾台吉所之時路旁有集兵之帳後往彼時所集人已撤其帳亦無矣以問之阿齊滚布巴圖爾台吉告曰是月十九日拉臧遣使來告云請聖上安青海諸台吉原欲會同遣使今巴圖爾台吉獨自希寵遣馬穆特請安乃衆人間論之語何特推我一人我不之答而遣回矣二郎保告曰我於本月二十三日至阿齊滚布所彼云我當出廬外跪聽諭旨但因衆人皆疑我我欲於坐處跪聽上諭受賞二郎保即令彼跪於坐處宣旨賞畢阿齊滚布巴圖爾台吉喜云既蒙御賜當與衆分而服之乃散給其子弟二郎保問拉臧有備兵遣使之事否阿齊滚布所答亦如對通奇塔特之語我又周視之無集兵之事是日諾門汗出庭迎接手執信帕恭請聖安後頒御賜信帕宣旨畢諾門汗覆奏云我乃山野微末沙門於皇上之前並無異常效力顯著勞績之處蒙皇上矜我衰髦沛以恩綸錫以香信此身雖不能仰報賴有僧徒千衆日誦經懴虔祝聖夀以答皇恩而已今我雖患病然我本懷原擬望見天顏當竭力調治痊愈之時務必往朝也是日諾門汗遣人來告曰我喇嘛言皇上遣諸大臣來者不過欲令青海衆生得享安樂永受恩澤之美意也令我與扎什巴圖爾拉臧及善巴陵堪布以及逹賴喇嘛所遣之綏本阿喇木扎巴等一一曉諭即以此傳諭衆人皆言願往受盟二十八日善巴陵堪布等遣人來告云我等聞欽差大臣已至西寧但當春時牲畜羸瘦衆台吉等恐於本月初旬不能齊集請於閏三月初八日前後到來臣等許其初八日前後來會臣等俟親與青海諸台吉會盟事定後另奏外謹具奏聞上以示議政大臣是日遣大學士伊桑阿諭祭故將軍趙良棟其子趙宏煜率其族人赴行宫謝恩丁亥青海台吉博碩克圖濟農奏請招撫噶爾丹不許多羅額駙阿喇卜灘等疏言本月初二日西寧總兵官韓弼差千總通事馬一善送到博碩克圖濟農咨文問之馬一善稟云我河州副將李鳳祥同將軍孫思克出兵之前差善至青海博碩克圖濟農所探聼驗視有無噶爾丹之人且語博碩克圖濟農曰爾乃噶爾丹之親説之使降我為妙三月初九日博碩克圖濟農自察罕托羅海歸其地善即以此言告之博碩克圖濟農未經回覆至十七日羅壘額木齊請上安而回博碩克圖濟農問明後即喚善往當其第四子車陳帶青楚呼拉寨桑之前謂之曰前我下人同噶爾丹之人被擒我意中以為俱已殺之矣後蒙皇上釋歸今又遣羅壘額木齊同大臣來使於我真聖仁之主也又問汝之來甘州將軍西寧總兵官知之乎善言將軍總兵官皆知之博碩克圖濟農遂令以印文送將軍且言將軍若遣的當人來我此地遣人殆可招之使降也噶爾丹從吾言我使人引噶爾丹面聖也臣思皇上仁聖博碩克圖濟農歸化欲撫其姻家噶爾丹而送印文來理合奏明請旨而行但將軍孫思克之兵已經啓行如或遲緩恐失機會故遣員外二郎保筆帖式傅昌等與博碩克圖濟農議定使二郎保追至臣等會盟之地使筆帖式傅昌同招撫噶爾丹使臣至將軍孫思克所將軍孫思克問明量事相機而行招撫二郎保於邉外見臣告曰我等至博碩克圖濟農會盟之地見之於哈爾噶圖地方議後博碩克圖濟農撥其馬尼好青寨桑什保阿兒逹爾寨桑等八人與之帶來臣等問馬尼好青寨桑等曰濟農教汝等作何言馬尼好等答曰濟農語我等云爾等到後曉諭噶爾丹汝口稱奉佛之法喇嘛之道而所行並未嘗遵逹賴喇嘛訓誨我一則係親戚而年又長汝凡事俱遵中華皇帝之旨行可也臣等於是仍照前議令筆帖式傅昌等往交將軍孫思克而來就臣等疏至上以示議政大臣續將軍孫思克奏言厄魯特噶爾丹凶惡不肯歸化皇上震怒調遣大兵噶爾丹敗遁目下困窮已極歸降無路今青海蒙古大頭目博碩克圖濟農遣使欲説噶爾丹降皆博碩克圖濟農震懼天威欲圖報效也但當遣與否臣見識淺鮮不敢擅便伏候上裁至招撫噶爾丹之事關係重大臣何敢輕自差小人使之説降乃河州副將李鳳祥遣其通事馬一善至青海博碩克圖濟農處偵探消息即謂博碩克圖濟農於噶爾丹為親當使説噶爾丹歸降臣於此不勝駭異臣並無此言奏至上命議政大臣集議議曰博碩克圖濟農欲遣人招撫噶爾丹者雖係彼效力之意然噶爾丹之降與不降皆在皇上恩威於博碩克圖濟農遣人往説無涉也况已發大兵兩路進𠞰追討噶爾丹則博碩克圖濟農遣人之事相應停止以上項原由明諭將軍孫思克及博碩克圖濟農之人遣回至副將李鳳祥但當差人至青海偵探至招撫噶爾丹乃國家大事李鳳祥輕自差人與博碩克圖濟農商議殊為不合應檄該將軍查明到日再議上從之命緩議根敦什希卜罪鄂爾多斯固山貝子根敦什希卜來請安進貢奏曰王董羅卜令本旗發兵三百名因馬匹羸瘦不能如數但率兵一百而來奉旨不許貝子根敦什希卜進貢交該部及議政大臣集議來奏議曰查根敦什希卜旗下有二十一佐領選好馬之兵三百名無不可得之理况關係軍機甚為緊要擅自短少殊為藐玩應將根敦什希卜革去貝子扎薩克將短少之兵仍行補至奏入命暫緩議根敦什希卜之罪回京再奏其兵依議速令往調聖祖仁皇帝親征平定朔漠方略卷四十

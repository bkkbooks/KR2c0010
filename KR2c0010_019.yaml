body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷十九康熙三十五年正月庚申命增兵備用上諭大學士伊桑阿等曰除現備兵外今應增發兵每佐領二名及火器營兵五百名備用如無所用即令於京城預備著議政大臣集議議曰除現在每佐領下預備兵六名外今增派每佐領下護軍二名及鳥鎗驍騎五百名以備遣用其管轄官員應照其兵數酌量派出此增派之兵亦應按名計備官馬四匹查發往宣化府景州等處喂養馬匹并京城所喂之馬內除撥隨中西二路大兵以及中路大兵按名計馬四匹外每一佐領止餘馬四匹今應按馬仍發價三十兩令每佐領下再各置馬十匹照前給與錢糧飼養以備此增發之兵之用奏入上曰著增派每佐領下護軍一名及鳥鎗驍騎五百名其獲罪人等及情願效力官員俱著隨此兵進發大臣亦應派出預備餘如所議尋諭議政大臣曰後派鳥鎗驍騎五百名外每佐領下著再增派一名俱定為中路尾大軍後進發一有所用即聽指揮而行可派出都統都斯噶爾石文煐護軍統領鄂克濟哈副都統西珠法喀預備命舂米餉軍上諭督運于成龍等曰倉貯米糧舂時必多虧耗爾等所運之米可交倉場總督舂熟運往給與兵衆癸亥諭督運于成龍等加意防護軍糧馬匹上諭于成龍等曰爾等挽輸絶塞務火燭小心每夜如臨敵兵嚴為防護喀爾喀等素善盜馬尤宜加意巡視喀喇沁兵守馬防賊頗稱熟練可將伊輩分與各營晝使驅車夜使守馬庶乎有備無虞至新滿洲健於步行熟於牽挽故選擇數人交與爾等其酌量用之隨復諭曰喀喇沁兵朕已遣大臣調至彼內亦有副都統等官馬上素稱熟練爾等所備駕車空馬可交伊等沿途驅往乙丑命陜西兵來與大將軍伯費揚古軍會上諭內大臣索額圖等曰前因厄濟內河燒荒曾命陜西兵於四月初旬進發若俟四月進兵似覺遲誤應將陜西兵調至寧夏令其出寧夏來㑹大將軍費揚古所往翁金之路兩軍㑹合後即令費揚古將兵酌量均撥分路前進前此陜西兵卒原派發一萬三千今既令前來可減其兵數止以一萬為額如此則馬匹糗糧俱獲豐裕軍機關係甚大明晨著原議之議政大臣作速集議議曰聖諭已極周詳應令將軍孫思克率陜西大兵來至寧夏於三月初十前後出寧夏來㑹費揚古軍即令費揚古將兩軍酌量均撥分路前進再先經僉議派陜西滿洲兵三千漢軍火器營兵一千緑旗兵九千兵力宜强似應無容減額仍照原派之數今既不出鎮彛俱從寧夏進發前此遠方調來兵卒若可帶至寧夏則帶領前進倘因路逺不便即交孫思克將甘肅固原提督及撫標官兵所用馬匹酌量選取調用奏入上可其議著先差善馳之筆帖式撥什庫作速往諭尚書圖納亦令其速往命賞從征緑旗官兵先是上諭兵部軍士已届征期宣化府古北口緑旗官兵宜加恩賞至是部議以派出預備宣化府緑旗官兵三千古北口緑旗官兵一千五百應交戶部加恩賞賚銀兩奏上報曰可大同緑旗官兵隨大將軍費揚古前往亦著一體賞賚命天津總兵官嶽升龍等率騎兵護送中路糧車時嶽升龍以米車前後非得騎兵不能往來巡護請選直屬精騎二百名及山東省臣舊轄精騎一百名帶往上命督運于成龍等確議議曰嶽升龍所請山東兵百名停其帶往可率直𨽻馬兵二百名車前領運劉國興率河南馬兵二百名車後催運此四百名兵所需一百四十日口糧亦在通倉領出於添造車內裝運議上得㫖嶽升龍所請山東馬兵百名仍准帶往餘如所議定運車旗式督運于成龍等奏言運米車上所用旗纛請照漢軍火器營式樣製辦上曰火器營關係緊要若與之一式是無别也運車旗幟色用白畫飛熊其上爾于成龍曾任鑲紅旗都統今督理運務可仍用前都統旗纛命都統王永譽從中路征命給黑龍江等處官兵行糧時將軍薩卜素以所屬墨爾根黑龍江七齊噶爾三處官兵購買馬匹治辦器械俸餉不敷所用請給行糧移文戶部部議以目今盛京寧古塔黑龍江之兵暫無所用其薩卜素給與行糧之請可無庸議奏入上曰此軍雖現無行走之處著照該將軍所請給與行糧尋大將軍伯費揚古請給編附右衛之䝉古官兵行糧得㫖可照內地官兵一體給與丙寅命延綏波羅營副將劉官統同陜西兵進𠞰己巳命福建陸路提督張雲翼從中路軍時張雲翼來京陛見奏請從軍效力故有是命命添設鳥鎗大臣上諭內大臣公常泰曰鳥鎗大臣太少一旗應設大臣一員統率為善除前鋒統領碩鼐不可别調外鑲黃旗派內大臣馬思喀正黃旗派都統侯巴渾泰正白旗派護軍統領托倫正紅旗派公常泰鑲白旗派護軍統領蘇赫鑲紅旗派副都統孫渣齊正藍旗派副都統雅圖鑲藍旗派副都統宗室鄂飛管領此派出大臣各照本旗旗色持纛前往諭增造中路運車上諭督運于成龍等曰中路米車所載過重遠輸沙漠恐馬力難勝可再增造五百輛均分裝載至朕每舉一事惟恐纍民故前造中路之車俱動內帑錢糧誠以民力無幾而吏不之恤致失朕意也先時朕出口外直𨽻巡撫常令地方官預備車二三百輛或至纍民今朕統師北討凡所需供應細物將爾等預備車內分撥裝載其㑹同兵部僉議議曰軍糈事急過重難以行遠已䝉睿照著增造車五百輛其增造之費在前所領帑金內動用至御用車輛若交地方官預備恐致纍民應欽遵聖諭停其備辦凡御營需用裝載俱於臣等預備車馬內撥用其押車人員著中路效力官及地方官內酌量分遣兵部章京筆帖式照常派出公同管押議入得㫖如此則不致纍民其亟行之餘如所議庚午命侍郎安布祿出哨偵探上諭理藩院侍郎安布祿西喇曰尚書班第出哨日久而又撥發從征著班第歸以辦行裝爾安布祿往居班第所駐之地凡事俱如班第行爾安布祿亦已派軍中可即從彼地而往如班第所在官員有願從征者令歸來治具至彼處偵探人員視其緩急應留者留之若無要務可即遣歸辛未宴賚出兵及運米大臣官兵於太和門先是上諭總管內務府衙門曰可將內庫所貯綢絹蠎緞等物酌量分定賞給出兵大臣侍衛八旗參領前鋒侍衛及部院衙門滿洲漢軍大臣學士以上等官其護軍校驍騎校前鋒護軍亦給以緞匹驍騎火器營兵炮手皆給與布匹至運米大臣官員緑旗大臣官員俱係從征亦照其品級賞給緞匹此番所備之兵不比前次朕熱思已久必期成功故凡大臣以下兵丁炮手以上均施以恩可於十四日大賜筵宴宴畢賞以緞匹等物至是日己時上御太和門升座兩旁內大臣侍衛大學士等列坐階下金水橋內出兵大臣官員前鋒鳥鎗護軍等分左右按旗分坐運米大臣官員坐於左緑旗提督總兵官等坐於右橋外護軍參領護軍校護軍等亦分左右按旗分坐午門外效力廢官鳥鎗驍騎火器營兵炮手等亦依次坐坐畢樂作演內監戲衆技畢陳上命大將軍費揚古進至座前手賜巵酒費揚古跪受退至階叩首飲都統前鋒統領護軍統領及運米左都御史于成龍督捕侍郎李鈵提督張雲翼總兵官嶽升龍馬進良等俱上手賜飲其副都統等亦進前著親近侍衛賜飲前鋒參領護軍參領及運米官員自委署護軍校以上皆十人一班進至階上跪飲又命內務府總管親隨侍衛及部院大臣遍視衆軍士飲至申時宴畢上始回宫凡與宴之大臣侍衛八旗參領前鋒侍衛部院大臣學士督運大臣提督總兵官以上俱賜御用立蠎緞綢有差其出兵運糧官員及護軍校驍騎校前鋒護軍等俱賜緞有差鳥鎗驍騎火器營兵炮手等俱賜布既畢大將軍伯費揚古率衆官兵進前謝恩奏曰自古人君賞賚官兵者有之如我皇上親臨宴犒遍加賜賚者實所未有臣等受皇上隆恩何能仰報惟有遇噶爾丹誓必磔斬無遺而已齊聲奏畢同叩首出命給古北口及宣化府總兵官鳥鎗上諭兵部曰古北口總兵官馬進良宣化府總兵官白斌各給以內造鳥鎗二百桿火藥鉛子一併付與馬進良現在京城即交伊本身爾部撥給驛車令彼帶去白斌處爾部可差人送往此鎗回軍之日仍令繳內收貯壬申命選派䝉古官兵并發火箭至軍前時大將軍伯費揚古奏言春時進兵正䝉古馬瘦之時若不將扎薩克王貝勒貝子公台吉等派出不得壯健人馬請將扎薩克王貝勒貝子公台吉及間散台吉等附丁揀選其人材健壯家道殷實者派出似為得力至於火箭尤為軍中需用之物伏望發至軍前上從之發內庫所貯火箭三千解往川陜總督吳赫請赴甘州料理軍需并防守邊境時吳赫奏言大兵進𠞰噶爾丹需用運米駝馬以及牛羊等物極其繁多若不預行採購恐致遲誤臣身駐西安不能遠為料理臣欲前赴甘肅㑹同該撫選擇才能官員分行採辦以備大軍進發至於三邊地靣甚屬遼濶番彞之人沿邊雜處今將軍孫思克等深入征𠞰其防守不可不嚴西安現有副都統費揚固巡撫党愛臣請將臣標下官兵酌量選帶暫駐甘州嚴守邊境奏至上從之命調副將周洪升等押中路米車時督運于成龍請撥官兵押運上諭曰前有各省督撫提鎮保題武辨召見記名者今概調來京遠者難以立至爾等可就近將直𨽻山東河南江南四省凡記名及各上司保題之員爾等查兵部檔案具奏于成龍等同兵部查四省副將等員開列山東膠州副將周洪升等二十七人職名奏入上俱令派發押護中路糧車命嚴守喀倫時內閣侍讀學士伊道奏言鄉導朱爾渣哈等至厄折忒圖哈卜七爾地方見有人馬行踪約四百餘沿克魯倫河上流而去觀其形勢乃係厄魯特因令車臣汗貝子盆楚克等入內遊牧而車臣汗等以目今羊當産羔牲畜羸瘦不便遷移俟雪融時漸次內牧為辭夫厄折忒圖哈卜七爾地方距車臣汗等目下所居波衣爾之地止二日程今厄魯特既逼近來前則凡我喀倫不可不嚴加防備現今兩烏朱穆秦并阿魯科爾沁之喀倫雖每處有章京一員兵十名然軍力微弱每處應添章京一員兵十名至扎魯特科爾沁等旗喀倫與車臣汗等所居波衣爾之地相近亦應嚴飭堅守喀倫奏至㫖下所司議理藩院議以朱爾渣哈等雖見其踪跡並未望見形影應移文與伊道令其再選精細能事之人探明實信速行奏報其車臣汗貝子盆楚克等既云羊正産羔牲畜羸瘦應令伊等遠行偵探暫居原所俟伊等可行之時再入內遊牧至於喀倫地方每處原設章京一員兵十名其添設官兵可毋庸議再檄知烏朱穆秦阿魯科爾沁扎魯特科爾沁及黑龍江將軍薩卜素處令其嚴飭各旗喀倫官兵加意防守奏上上從之命西路兵簡護軍為前鋒大將軍伯費揚古請於大同養馬八旗護軍內簡選二百鳥鎗護軍內簡選八十為前鋒其前鋒旗幟交地方官製造上從之尋以副都統碩岱為前鋒統領命以親征原委曉諭大小諸漢官時上欲親統大軍往征噶爾丹大學士王熙等及漢九卿大臣科道等官恐聖躬勞瘁奏曰欽惟皇上茂德豐功文經武緯誠邁百王而超千古前以三逆負恩察哈爾作亂賴皇上運用神謀皆立時授首懸之藁街及功成事定又平臺灣以為郡縣此數十年間時和年豐民安物阜域內咸享升平之福凡天之所覆地之所載亘古以來聲教所未及者無不仰戴堯天舜日來享來王乃噶爾丹狡焉小醜反覆靡常二十九年敗遁之後皇上擴天地之恩不忍絶其根株詎意噶爾丹賦性愚頑並不改行易心而來納欵敢自外於王化屢行狡獪用是皇上赫然震怒欲行天討凡進兵運餉之務俱奉睿算指揮毫不勞苦百姓是以小民不知有兵安堵如故稽古史冊如今日之人馬精强兵革堅利軍容猛鋭聖算神奇者誠未之有臣等雖係書生不諳軍務亦知天兵所向必克可不崇朝而滅此小寇也皇上奮雷霆之威躬統六師往揚神武櫛風沐雨不憚勤勞皇上雖為社稷生民謀億萬年之計但臣等愚意以為皇上乃天地神人之主身有舉動係天下萬國之瞻仰噶爾丹釡內遊魂以我兵強將勇又遵行成算自必繫其頸而獻諸廷皇上端拱九重之上坐受捷音燕享賞勞指日可待無煩皇上玉體親行伏祈皇上遣將授兵教之方略使早奏大勳以慰中外臣民之望奏入上諭大學士伊桑阿阿蘭泰曰漢大臣諫阻朕不之怪為人臣者不欲以軍務勞君身者亦當然之事但此噶爾丹為人狡詐不比尋常小寇前年來犯我藩塞語極凶悖理藩院尚書阿爾尼率四十九旗䝉古及察哈爾兵遇噶爾丹之兵而辟易是以朕熟籌務必滅之指授出征諸王將軍於七月初六日起行朕躬隨於七月十四日起行又恐噶爾丹聞朕親行而遁去以兵一枝授內大臣阿米達誘之近至烏蘭布通之地是時諸王大臣皆在軍中竟使噶爾丹逸去於此爾等可知之矣適會朕躬有疾未到戰地果知其如此朕必力疾而往也失此良㑹匪啻朕一人至今恨之舉朝亦無不以為恨也所以朕不得不親行者職此故也近者噶爾丹背誓掠我䝉古邊外住居之喀爾喀又煽誘諸䝉古不無顧望而持二心者倘不早為之剪滅恐其勢漸張今以時勢言之天下無事四海太平朕踐祚以來無日不以軍民為念雖未嘗加大恩於民而撫綏有年想天下臣民必皆愛戴是我內地可以無虞如京中事則皇太子已長可料理之乘此時而朕親往征之亦一良㑹也今噶爾丹屯聚巴顔烏闌距䝉古界上不甚相遠是以不憚勞苦躬臨邊塞大兵分路並進者特欲迅掃逆賊以絶後患也噶爾丹滅則天下不復有事矣即噶爾丹望風遠遁而以我神兵之威揚播外藩不亦善乎失今不圖噶爾丹來侵我四十九旗則必調天下緑旗沿邊守戍所憂不益多乎爾等其以此曉諭漢大小臣工知之乙亥趣西路官兵作速起行時將軍孫思克奏言先經僉議令派陜西緑旗兵九千臣同尚書圖納公議於臣標下五營馬兵內派一千八百凉州總兵官所屬馬兵內派二千寧夏總兵官所屬馬兵內派一千五百肅州總兵官所屬馬兵內派二千西寧總兵官所屬馬兵內派一千二百總督標下馬兵內派五百共選派九千名其領兵之副參遊守千把等官仍照前議定之數揀選派出此派出之兵務令於二月初十以內齊集甘州喂馬一月一同出邊臣查河西地方凉州莊浪甘州肅州俱係沿邊要地且逼近䝉古應令提督李林隆酌量調取官兵來甘州駐劄防守又先經僉議從征緑旗兵丁除本身坐馬外可按名多給一匹臣隨將提督總兵官所屬存留兵丁之營馬內選其肥健者如數分給九千匹但甘肅地方苦寒不比內地青草發萌甚遲臣等之兵於三月二十前後青草已萌即行出口倘尚未萌達欲再守候數日為此奏聞上諭諸王曰大將軍費揚古兵於二月二十日前後進發將軍孫思克兵亦應令於二月二十日前後自寧夏起程甘州肅州等處兵若調至寧夏路途遙遠其到必遲現今寧夏有滿洲兵一千漢軍火器營兵五百應再增以西安滿洲兵一千漢軍火器營兵五百以足三千之數再寧夏榆林二總兵官標下緑旗兵共選派六千即令該總兵官率領同將軍博濟副都統阿南達等於二月二十日前後自寧夏起程令將軍孫思克將伊標兵酌量選帶速來寧夏如及期而至則一同進發倘或不及可隨後踵進其滿洲漢軍兵丁馬匹未及喂肥著該將軍總督等將存留滿洲漢軍并緑旗兵丁馬匹內酌選肥健者更換付之其添給緑旗兵丁馬匹并負隨運米糧之駱駝馬騾俱令於各營及驛馬內選其臕壯者給付此路隨運糧米俱著照前議備辦一切事務令尚書圖納㑹同該總督巡撫提督等公商料理毋致有誤提督李林隆速往甘州駐劄酌量徴調官兵加意防守地方速檄知之丙子命議增緑旗兵鹿角上諭管漢軍火器營都統李正宗曰是役也有緑旗兵三千朕意欲使緑旗兵居中漢軍居兩旁其鹿角如何增加所增鹿角如何捆載擡鹿角人役口糧如何運到爾其與戶兵二部議之議曰是役之兵已派出古北口緑旗兵一千五百名宣化府緑旗兵一千五百名此三千兵應增帶鹿角一百六十架其擡鹿角也應派出八旗漢軍步甲四百八十名所派步甲每人撥馬一匹四人為一車以此馬挽之伊等八十日口糧兵器俱載此車之上但漢軍旗下現置馬匹無有餘剩應折銀每匹三十兩給之購買其車各自本旗內撥給至鹿角三架以駱駝一頭捆載共計需駱駝五十四頭取捐助駱駝給之伊等隨運兩月口糧應交左都御史于成龍等奏入上從之辛巳命定軍厮立功賞格上諭內大臣公國舅佟國維等曰官軍之厮役人等有能踰鹿角營而進擊者作何給還本主身價令其出戶以示勸勵爾等集議議曰官軍家下兵丁厮役或駱駝營或鹿角營或於曠野賊兵對敵之處有能首先躍入衆人接踵繼進以致殺敗賊寇其首先躍入之家下兵丁厮役以及其父母妻子俱撥在佐領立為另戶主照例計其人口給還伊主身價奏入上曰其第二三前進者亦著照此例行諭分派西路都統副都統督八旗營壘上諭大將軍伯費揚古曰爾軍中所有都統副都統等可令各分管八旗營壘費揚古遵㫖派管京城所發八旗大兵營壘以揚威將軍覺羅舒恕管兩黃旗以都統伊勒愼管兩白旗以都統公彭春管兩紅旗以侍郎滿丕管兩藍旗派管右衛八旗兵營壘以護軍統領宗室費揚固管鑲黃正白兩旗以護軍統領瓦爾達管正黃正紅兩旗以副都統党愛管鑲白正藍兩旗以副都統拜音布管鑲紅鑲藍兩旗壬午授中路督運左都御史于成龍等敕印敕曰今厄魯特噶爾丹毁蔑盟誓傷我使者搶掠喀爾喀人等又阻尼班禪庫圖克圖之來隂蓄狡謀違㫖妄行用是遣發各路大兵聲罪致討進𠞰大兵所需糧米浩繁督運責任重大必須專委大臣統理今特命爾都察院左都御史于成龍兵部督捕右侍郎李鈵通政司左通政喀拜總理運送中路大兵軍米事務爾等督運之米務隨大兵運到勿得遲延有誤軍需駐搭之處必安營壘令兵丁加意巡防所派副都統總兵官部院官員以及爾等題帶文武各官俱酌量派定分委押運其情願效力人員亦量行分派隨押車輛俟到邊外如有用䝉古兵之處即將爾等經過相近地方所有䝉古兵丁酌量調用有貽誤修路搭橋者即行指名題參凡關運米事情各部院不得掣肘爾等總理運務亦須熟計征戰事宜將官兵不時操練務使賞罰嚴明其敕中開載未盡事宜爾等即㑹同商酌而行倘遇有征戰之處與副都統盧崇耀總兵官嶽升龍劉國興等商計而行有於運米事情勤勞供職者即彚題奬勸如有怠玩厥職不效力勤勞者即行參奏懲治或官員或趕車兵役偷盜米糧馬匹及妄作非為者即以軍法從事示衆爾等膺兹重寄務須殫竭心志黽勉效力將米運至軍前以濟軍需斯克副朕委任之職如或因循怠忽措置乖方致誤職任責有攸歸爾等愼之故諭尋授西路督運侍郎王國昌等敕印敕與中路略同命增發緑旗兵防守歸化城上諭大將軍伯費揚古曰大兵前進𠞰滅噶爾丹歸化城地方緊要土默特二千餘兵外著增撥宣化府緑旗兵一千駐防此軍應派內地諸王統領著議政大臣議議曰諭㫖甚是應於土默特二千餘兵外增撥宣化府鎮標步兵一千防守歸化城管領將辨照兵數派出內地諸王該衙門請㫖派出俟大兵滅噶爾丹凱旋之日撤回此軍上從之尋以安郡王馬爾渾輔國公來僖副都統雅圖防守歸化城地方癸未授撫遠大將軍伯費揚古敕印敕曰今厄魯特噶爾丹毁蔑盟誓傷我使者搶掠喀爾喀人等又阻尼班禪庫圖克圖之來隂蓄狡謀違㫖妄行𠞰滅不容少緩用是遣發各路大兵聲罪致討特命爾領侍衛內大臣伯費揚古為撫遠大將軍統領西路大兵一切事宜爾與都統伊勒愼護軍統領宗室費揚固護軍統領瓦爾達副都統碩代理藩院侍郎滿丕等公同計議而行勿謂自知而不納衆論勿當事㑹而致失機宜勿恃兵强而輕視逆寇嚴偵遠探罔或踈虞其統領䝉古兵丁前來之王貝勒扎薩克台吉與緑旗總兵官等共相商確酌量行事爾仍總統調遣有能擒斬噶爾丹來歸者分别具奏有情急來歸者務加意撫恤副朕戡亂靖逆之懷官兵或臨陳退縮貽誤軍機爾㑹同商議官員以下即以軍法從事示衆官兵犯小過者㑹同商酌徑行處治勿泯沒官兵功績勿寬縱違犯法紀之人賞罰之際務極嚴明如有用運米緑旗官兵與情願效力人員之處爾即酌量調遣爾等將厄魯特殲𠞰廓清安靖邊圉斯稱委任爾等宜殫竭心力蚤奏膚功欽哉故諭命設西路驛站先是上諭大將軍伯費揚古侍郎滿丕等曰西路設驛事宜爾等可交理藩院兵部集議至是二部集議自京城至殺虎口原設有驛不議外自殺虎口以外置驛六十處每驛設馬二十匹兩驛合設筆帖式一員撥什庫二名䝉古官一員兵十名更請於鄂爾多斯六旗內派馬五百匹再取直𨽻河南附近府州縣偏僻驛站中馬一千匹酌量安設六十驛需馬一千二百匹以所餘三百隨之自西路以至中路軍前如有設驛之處可交大將軍費揚古即於此馬內酌量安設奏入上從之命限中路官兵賫糧額數上諭議政諸臣曰中路兵丁仍帶八十日米外諸王大臣侍衛官員俱著帶百日之米恩賜西路從征土默特官兵先是上諭大將軍伯費揚古曰是役歸化城土默特從征兵丁應加恩著交該部至是理藩院議西路從征之歸化城土默特都統阿喇納副都統阿迪阿玉璽多爾濟等應賞緞各二匹實授參領二員參領署夸蘭大四員參領十員佐領十二員賞緞各二匹間散章京十二員驍騎校十員賞緞各一匹兵八百名每人賞銀五兩所賞銀緞戶部差官送至歸化城交大將軍伯費揚古親視給賞上從之甲申命選備追𠞰精兵上諭兵部等衙門曰大兵至巴顔烏闌倘噶爾丹不敢迎敵從此遁去可預選察哈爾兵一千六百名喀爾沁翁牛特兵一千四百名再於大兵內及新滿洲諸王護衛喀爾喀兵內共選精兵一萬備足駝馬糗糧務將噶爾丹窮追𠞰滅爾等其酌議以備命都統公彭春為西路軍中參贊先是以彭春為夸蘭大遣至西路至是授彭春為都統上諭兵部曰著以彭春為西路參贊乙酉諭恩賚挽運兵丁上諭中路督運左都御史于成龍等曰出師討寇全資兵力內外滿洲漢軍緑旗諸路從征兵丁俱已各加恩賚其外省調集步兵挽運軍糧載塗况瘁尤可軫念所有每月應支銀米本營照常支給俾養贍室家仍各給與行糧以為道路之費所運米石如悉依期挽至克濟軍需不致虧損遲誤俟大兵凱還補入馬兵營任用以彰奬勸有效力勤敏才堪拔擢者爾等可記名彚奏以俟酌用兵丁勞苦饑寒凡督運大臣官員宜時加拊循慰勉庶人爭自效踴躍赴公西路挽運兵丁亦照此例行爾等可移文各該撫通行曉諭宣朕體恤軍士至意聖祖仁皇帝親征平定朔漠方略卷十九

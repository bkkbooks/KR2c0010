body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷四十五六月庚戌諸王大臣士民等力請皇上允受尊號仍不許先是儀曹具典禮諸王大臣等恭上聖神文武大德廣運尊號上弗受至是諸王貝勒貝子公文武滿漢官員及逺近士民俱赴暢春園力請皇上允受尊號上諭曰朕御極四十年雖自始至終孜孜不倦而吏治尚未澄清民生尚未豐裕士卒尚未休息風俗尚未淳朴且旱潦災異亦復相仍方今外冦既靖正宜休息生養徒加尊號何益於治朕蕩平噶爾丹機宜未嘗有失茍天下共能見之朕願足矣其崇上尊號不必行毋復瀆奏臣謹按皇上御極以來撫循吏民勤求治理邇者又因厄魯特肆虐特行征討深謀逺慮致煩聖駕三次臨邊親擐甲胄籌兵措餉不避寒暑獨任勤勞掃除寇賊朔漠永清誠可謂文德邁於百王武功超於萬古矣前於平定三逆之時諸王大臣請上尊號皇上雖不允行但是行聖躬逺駕立成大勳亘古未有非往事之比聖德神功炳耀宇宙羣情踴躍是以諸王大臣吏民同上尊號祈慰輿情再三叩請皇上既不俯從更以吏治軍民風俗水旱為慮是即古帝王安不忘危治益求治之盛心宜其措萬世於磐石之安也丁巳大將軍伯費揚古奏報發糧接濟追伊拉古克三庫圖克圖之軍費揚古奏曰前因將軍馬思喀等追伊拉古克三庫圖克圖之兵帶三箇月糧行裝太重難以疾行故令帶兩箇月米留一月米給後隊兵近准馬思喀咨言薩克薩特呼里克郭多里間須行一個月所留一月米乞送至薩克薩特呼里克臣等現駐空郭爾阿濟爾罕什喇布里圖候㫖問鄉導額蘇克等言空郭爾阿濟爾罕去薩克薩特呼里克䭾行五宿第六日可到是以臣等撥每翼參領一員護軍校一員護軍十名察哈爾護軍校一員護軍九名緑旗官一員兵十名將馬思喀所留之米分䭾押護俟六月十五日起行送往薩克薩特呼里克奏至上以示議政諸臣壬寅命撤諸路兵以餘糧交鄂爾多斯王貝勒收貯副都統阿南達奏言臣等因俟散秩大臣丹巴聲息緩行以休養馬力遣台吉雲楚木喀爾喀台吉帶青巴圖爾哈密爾噶爾旦多爾濟屬下輝特台吉羅卜臧西安前鋒署總尉吳通保緑旗遊擊楊奇張當知筆帖式色冷敦住給兵共五百名於五月十九日遣行前堵噶思口臣等徐行至色爾滕地方遇噶爾旦多爾濟使人俄濟通問於䇿旺喇卜灘還言我來時於布克達額冷哈畢爾罕之吉木思地方過一日程遇丹濟拉有丹濟拉同行人名阿齊圖言欲同俄濟往覓舊主噶爾旦多爾濟告之丹濟拉丹濟拉許之故阿齊圖與我偕來我等五月初九日離丹濟拉前於四月二十七日丹濟拉至吉木色地方遇郭蠻喇嘛哨卒擒丹濟拉哨卒三人遂集兵拒立丹濟拉遣人告曰噶爾丹博碩克圖已殁吾欲往投䇿旺喇卜灘爾喇嘛乃公共之喇嘛也前事皆噶爾丹博碩克圖所行今我欲使人通問䇿旺喇卜灘乞爾喇嘛選一能人與我使同往於是郭蠻喇嘛退兵遣其達爾漢格隆同丹濟拉之土克齊色稜達什於五月初四日遣使於䇿旺拉卜灘通好丹濟拉本身諾顏格隆拉思倫共帶三百許兵五百許口在郭蠻喇嘛所居待其使回觀丹濟拉往附策旺喇卜灘之意是真臣等看得俄濟阿齊圖言語甚明徒俟丹濟拉無用且所帶米四個月目下僅存四十八日米自噶思回至邊上有一月程欲扣米住至十八日撤噶思口哨卒起行而回上命議政諸臣議奏議曰應檄副都統阿南達休兵養馬徐徐而回一面選馬撥人給糧探丹濟拉果往投察渾阿喇卜灘或逃往他處實音得㫖據阿南達疏則丹濟拉往投䇿旺喇卜灘是真著阿南達等軍俱回阿南達量率兵馬暫住布隆吉爾等處探聽聲息再檄阿南達作朕敕書遣噶爾旦多爾濟之人哈密回子之人及阿南達家人至䇿旺喇卜灘所其文照朕諭㫖繕寫奏覽再將阿南達疏及遣使之故檄內大臣索額圖太將軍費揚古將軍馬思喀等從坐塘驛路休養兵馬經鄂爾多斯而回侍郎滿丕在外日久亦著回來著侍郎安布祿率察哈爾兵每旗各十名將領二員至滿丕所居駐扎將軍舒恕亦著回來前進大兵時曾令帶四月糧又令備兩月糧今大兵既撤米多餘留此米應貯何地著內大臣索額圖與于成龍作速議奏尋索額圖等議船站米二千四十三石零侍郎李鈵米一千五百五十一石兩狼山米五百二十三石零于成龍等運到郭多里巴爾哈孫米一千一百十六石零應俟大兵回郭多里巴爾哈孫地方後將郭多里巴爾哈孫米兩狼山米令于成龍同大兵運至船站併索額圖李鈵米一同收囤黃河向內三十里鄂爾多斯達賴布喇克地方交鄂爾多斯王貝勒貝子公台吉撥官兵輪班看守即於此米內照數計月支給留駐船站大臣台吉額駙官兵上從之丁未大將軍費揚古奏請暫駐察罕腦爾以探丹濟拉伊拉古三庫圖克圖聲息從之費揚古奏言准理藩院咨稱議政諸臣㑹議大將軍費揚古疏開散秩大臣丹巴等至巴顏恩都爾見並無厄魯特一人計丹濟拉等前去已有三十九日矣追之斷不能及故選駱駝一頭馬四匹給阿玉什白撑乘坐賫臣所發丹濟拉書追授丹濟拉又降人吳勒木濟等有丹濟拉欲往投達賴喇嘛起行而去已至楚庫爾戈必之語又阿玉什等兄弟妻妾留書於阿玉什言丹濟拉未必不往投阿喇卜灘又將軍馬思喀等咨言伊拉古克三庫圖克圖自薩克薩特呼里克向內一日行五六十里而宿我等簡兵跡其宿處追來至吳爾圖布拉克見伊拉古克三庫圖克圖自此地疾行一日一百一二十里此路多石我等追者一日不能過一百二三十里此三四宿追而視之仍飛馳去矣且伊拉古克三庫圖克圖自所宿磨海圖果兒已去七八日不能追及不可徒費馬駝之力是以我等自磨海圖河流曲處于五月二十三日率兵而回我馬蹴硬者多徐徐休養以往今丹濟拉伊拉古克三庫圖克圖未知去向實音不便遽議應檄大將軍費揚古等俟將軍馬思喀等之兵與伊等㑹齊後著伊公議或當遣使或當退兵聽伊等斟酌而行得㫖前者遣內大臣䇿旺諾爾布散秩大臣巴當阿兩路往擒伊拉古克三庫圖克圖緣兵馬糧餉扣數發去是以指地疾往限日立歸此馬思喀之所灼知也費揚古遣馬思喀時並不扣數輕裝限日所發官兵太多是以重滯不能追及伊拉古克三庫圖克圖昨丹木巴哈什哈歸朕亦知其勢斷不能獲伊拉古克三庫圖克圖曾諭議政諸臣今果如朕所諭矣此事准如所奏著檄內大臣索額圖副都統阿南達知之欽遵到臣查得先是散秩大臣丹巴奉使于丹濟拉以臣所發書給其同行拉思倫使人阿玉什自楚庫爾戈必使往追丹濟拉續齊竒爾寨桑入奏而回到軍中後臣等遵㫖即以敕書使齊竒爾寨桑賫捧往尋于五月初四日已遣起程並交前次敕書與察哈代往撫丹濟拉至額克阿喇爾等處遍尋不遇丹濟拉回至軍中臣等共商將原降敕書仍令察哈代賫捧務必往覔以敕書授丹濟拉親收于六月初一日給之糗糧羊隻遣使起程又以皇上所降招撫敕書交前次厄魯特阿喇卜灘丹津俄木布使人賫捧遣回近于五月十五日又以臣等招撫檄文給趙山四格子往撫阿喇卜灘丹津俄木布等屢經遣使賫送敕書招撫檄文往赴丹濟拉阿喇卜灘丹津俄木布今並無當發文遣使招撫之事又散秩大臣丹巴等直至楚庫爾戈必並無丹濟拉踪影大兵直追至磨海圖郭兒不能追及伊拉古克三庫圖克圖皆逺遁潛逃目下大兵無當行當止之事臣等即當回師但趙山四格子差往招撫阿喇卜灘丹津俄木布已將四十日矣官兵所帶食剩之米猶有一個月零七日察罕腦爾至郭多里之間當行二十二三日除出行時食米仍剩十四日之米于成龍等奉上諭解驛作飯以食商販及絶糧人從之米有未用之百餘石現隨軍中若將此米增給官兵則可食至二十日且察罕腦爾等處水草又佳是以臣等共商將官兵移進環察罕腦爾住二十日以養馬畜而候聲息此間若招致厄魯特則收之押護而來若二十日內無聲息則臣等率領官兵于七月十二日起程而回至達爾漢親王諾內喀爾喀親王善巴等情願自備四個月糗糧前來效力諸王貝勒公台吉之糧僅存一個月且無事可行故皆遣回前以察哈爾八旗官兵之馬瘦故奉㫖俱留之于守米之地此二百官兵籲請情願效力前進而來今無事可行且伊等出外日月已久亦已遣回奏至報聞七月庚辰將軍馬思喀奏請率大兵自郭多里過歸化城進張家口馬思喀等奏言臣等六月二十九日率兵養馬徐行而回但自船站渡瀚海來路七八站無草今我軍若仍行此路兵丁馬駝必致困乏乃問鄉導額蘇克阿南達曰大將軍向郭多里來路水草何如答云此路水草好但兩日瀚海無草不佳是以率兵自郭多里經歸化城路進張家口已經報部又于六月三十日奉到理藩院咨稱奉㫖著將軍馬思喀兵由坐塘之路前來臣等即當遵㫖從坐塘之路往鄂爾多斯為是但自寧夏來時所喂肥壯駝馬渡瀚海而來無草之故馬駝臕落目下軍中馬駝臕雖尚好行程遙逺俱已葳蕤若仍從此路而往駝馬必至罷棄其事顯然且駐劄船站內大臣索額圖等咨言爾等兵馬何月何日當到船站須預為知㑹以便檄知總督吳赫備船黃河之水已漲爾等兵馬當分隊陸續到來前渡為宜但黃河水漲若分兩次渡則需數日又問額蘇克阿南達曰郭多里至歸化城須行幾日伊等言兵行一月許是以臣等願得率兵仍自郭多里經歸化城之路進張家口奏至上以示議政諸臣辛巳定喇嘛丹巴色爾濟等罪先是有發皇太子查奉差西域之喇嘛逐一取供來奏之㫖至是理藩院奏言皇太子率理藩院堂司官及大學士阿蘭泰尚書馬齊往旃檀寺召集默爾根綽爾濟各寺廟喇嘛詬詈而問之曰汝等以已故之達賴喇嘛誑言尚在觀此行事尚不如犬犬見生人猶能吠之今養爾等究何所用默爾根綽爾濟供曰我乃一最小班第䝉皇上殊恩授為住持大喇嘛達賴喇嘛已故而我以人言奏云尚在我有何辨我真不如犬矣又問默爾根綽爾濟曰爾於今年正月初一日倡言保奏達賴喇嘛尚在明係交通第巴供曰我於順治十八年得見達賴喇嘛以後更不曽見前因造金塔我曾有殊為可疑之奏今達賴喇嘛已故我有何辨問丹巴色爾濟曰皇上謂爾有能可用信而遣之爾屢往屢歸奏言達賴喇嘛相晤相見三十四年之行仍言達賴喇嘛尚在又語諸大臣云達賴喇嘛乃活佛不忍見喀爾喀厄魯特破壞入定而避之今喀爾喀厄魯特皆破壞已完所以出定矣今年又云達賴喇嘛尚在奏于皇上此處云何供曰我二十四年同阿齊圖綽爾濟與達賴喇嘛覿面論事三十年達賴喇嘛立於樓上我實親見之我並無語諸大臣達賴喇嘛乃活佛不忍見喀爾喀厄魯特破壞入定而避之今破散已完所以出定等語今諸大臣謂我有此等之言而尼麻唐庫圖克圖又奏言達賴喇嘛已歿十六年此我當死之時已到我有何辨除前者出使達賴剌嘛之人有坐湯端朱克噶卜楚垂音札木素格隆已故羅卜臧格隆溫布札木素格隆垂聘溫咱特外問伊什格隆彭蘇克格隆根敦林辰阿旺扎木素巴咱爾喇木札木巴曰爾等俱係出差達賴喇嘛之人爾等節次啓奏之言皇上皆記之一槩從實供來伊什格隆供曰我於康熙二十三年同彭蘇克喇嘛前去見達賴喇嘛在樓上二十九年去而回我聞彼地人言俱以為尚在據我看來似乎達賴喇嘛已故亦曾啓奏三十三年去而回言達賴喇嘛已故是真曾同主事查海開摺啓奏三十四年又去而回我以為喇嘛規矩年幼則坐禪今達賴喇嘛已老仍入定而又出定以此觀之殆必有他故亦曾啓奏今年正月以達賴喇嘛出定行賀禮必有一他故亦曾啓奏前者我往達賴喇嘛處不特使我相見於四月初十誦經之日衆人皆㑹在五層樓上紗帳洞中見一老喇嘛我向不識達賴喇嘛亦不知其是否此事亦曾啓奏德木齊根敦林辰供曰我三十二年副垂喇克格隆而往未嘗見達賴喇嘛阿旺札木素供曰我二十六年副俄木布丹津而往在樓之上使我見之以為達賴喇嘛云原未嘗識之是以不知其非三十四年副伊什格隆而往未嘗得見達賴喇嘛我因為副亦未嘗啓奏皇上巴咱爾喇木札木巴供曰我二十八年往見達賴喇嘛立于樓上是實亦曾啓奏我亦何辨垂音扎木素格隆供曰我十五年副已故喇嘛朱喇齊格隆朝見達賴喇嘛其時達賴喇嘛鬚髮皆黑二十二年我副羅卜臧格隆而往第巴令我逺立望之稽首香烟繚繞所見不明阿齊圖格隆供曰我去三次俱見達賴喇嘛不知其假故奏言尚在如果知之何敢誑奏因拿丹巴色爾濟併其徒弟禁于該部兩處房屋封鎖看守外端朱克噶卜楚病故阿齊圖綽爾濟奉㫖革去綽爾濟名號議處併拿同丹巴色爾濟議處至默爾根綽爾濟巴咱爾喇木札木巴前奏達賴喇嘛尚在亦應將伊等同丹巴色爾濟議處奉㫖默爾根綽爾濟未嘗親往不過傳言轉奏免其議處巴咱爾喇木札木巴係親往著一併議處在案查丹巴色爾濟阿齊圖格隆巴咱爾喇木札木巴俱係大喇嘛皇上特簡以為有能可用信任之而使于達賴喇嘛乃知其已故而謂之尚在覿面論事目擊是真通同第巴誑奏殊為可惡坐此情罪應將丹巴色爾濟阿齊圖格隆巴咱爾喇木札木巴擬絞監候秋後處决家産人口入官以丹巴色爾濟巴咱爾喇木札木巴徒弟交默爾根綽爾濟安置京城各寺廟以阿齊圖格隆徒弟交歸化城彭蘇克喇嘛安置彼處寺廟至大喇嘛伊什格隆前去兩次同查海啓奏言達賴喇嘛已歿彭蘇克格隆奏言不識達賴喇嘛不知是否阿旺札木素垂喇克格隆德木齊根敦林辰俱言不見達賴喇嘛俱無庸議至羅卜臧格隆溫布丹津札木素格隆垂聘溫咱特端朱克噶卜楚俱已病故亦無庸議奏入得㫖丹巴色爾濟從寬免死革去住持大喇嘛抄沒家産單身發往盛京任棲一廟阿齊圖格隆各處差遣效力從寬免其死罪抄沒革去住持大喇嘛准住其本廟巴咱爾喇木札木巴乃小喇嘛俱從寬免其死罪抄沒革去大喇嘛餘如所議癸未命許台吉衛寨桑龔格等入貢喀爾喀土謝圖汗請以其祖母族人厄魯特托爾果特阿玉什等之子孫四十餘台吉比照其族中台吉請安進貢理藩院議不准行上許台吉衛寨桑龔格俄波俄欽車卜登三都卜俱如土謝圖汗奏請准其請安進貢餘如所議丙戌命大將軍伯費揚古先歸先是六月初七日大將軍伯費揚古感冒傷寒遺紅三次不能率兵前行具本來奏得㫖大將軍費揚古朕特諭恩賜一到費揚古不必等候大兵即歸著馬思喀既見宋住後率大兵養馬徐行而歸交議政諸臣與內大臣明珠㑹議具奏衆議如㫖具奏上從之特諭大將軍伯費揚古曰覽奏朕衷不勝隱惻今噶爾丹既死諸事俱畢兵今亦當撤所遺丹濟拉吳爾占札卜伊拉古克三庫圖克圖數人所往何處有確聞之時發檄取之無不解來之事如早聞爾體不佳朕當另有裁處近者丹巴哈什哈歸方聞爾足痛乘轎而行目下爾所到察罕腦爾距邊哨有幾許逺雖不知所在何處朕聞之即撥醫人食物給驛遣往朕此諭到速具爾病勢如何來奏特諭尋費揚古疏曰䝉聖上手書諭㫖臣伏枕俯跪開讀捧接恩賜食物望闕叩頭謝恩竊思臣何等人䝉聖上優擢付以非常大任屢叨皇上殊恩重賜不可勝計且臣以疾病纒綿不能領兵前行具奏聖上即惻然憐憫手書溫諭賜以醫人種種食物從驛傳致臣讀溫諭嘗賜物兩目俱明病勢都減即如復舊時顏色肢體不勝歡忭聖上似此隆恩寵眷不但前古所未聞雖父之愛子何以加兹聖上俯恤髙厚之恩雖即肝腦塗地誠不能報于萬一也臣無任歡忭謹奏謝恩疏至上以示議政諸大臣費揚古又一疏曰六月二十三日臣以身病不能率大兵偕行且官兵但駐二十日即歸故以官兵交將軍馬思喀臣於六月二十四日轉身徐行候㫖俟部文到日即檄將軍馬思喀等欽遵上諭而行外併奉㫖奏聞臣病少痊原由臣身下紅全住寒病豁愈但患病將及三閲月消減極弱身無寸力食物不能消化心內發熱自六月二十五日以來始覺食物消化其熱亦止今胸中甚覺清爽但目下須人扶之而立兩足顫栗腰與兩胯猶痛醫言病今已愈腰胯之痛不能起立乃血氣虧損之故俟血氣漸復流通自然愈矣臣逢盛世遇明主洊叨皇上殊恩異數不可勝計今又以臣病之故特賜手書溫㫖賜以鹽醃兩種彘肉生豚鹽醃鹿肉兩種鹿尾醉鰣魚包瓜酸王瓜萊蔔醃菜芥菜鮮王瓜萊蔔鮮菜蔔菜小米稻米諸物臣讀溫諭食御賜之物皆塞外所未有不勝歡忭養病前行量力圖歸臣急思望見皇上天顏中心專篤故得見天顏之前可冀臣病俱痊顏色復舊仗聖上福澤今臣生命可以無礙矣又臣自邊哨起行第十九日至郭多里自郭多里第二十二日至察罕腦爾大略計之察罕腦爾與邊哨相距兩間有二千三百餘里奏至上報聞戊子喀爾喀曼達爾什來降喀爾喀扎薩克圖汗屬下䝉古曼達爾什率男婦一百六十餘人來降皇上將軍孫思克為之奏聞理藩院奏先遣筆帖式令孫思克撥官同護送京城上從之丁酉為𠞰滅厄魯特噶爾丹太和殿告成頒詔天下是日上御太和殿皇太子率諸王文武官員等以太和殿告成並𠞰滅厄魯特噶爾丹上表行慶賀禮表云伏以聖武布昭撻伐大安民之烈神謨廣運永清成服逺之功中外敉寧遐邇欣忭恭惟皇帝陛下至仁育物大勇除殘屬狡冦之跳梁厪鑾輿之屢駕决機制勝指揮悉本於宸衷布澤宣威聲教盡通於絶塞正荒服來同之日值殿工巍煥之初喜溢千官歡騰四海臣等恭際昌辰欣逢盛治伏願河清海晏億萬年衍有道之祥日升月恆千百國慶無疆之福臣等瞻天仰聖無任歡忭之至禮畢遂頒詔天下詔曰朕君臨天下早夜孳孳勤求治理惟恐一夫不獲其所初未嘗有岐視中外輕事兵戎逺伐異域之事厄魯特噶爾丹向與七旗喀爾喀同奉職貢嗣因兩國交郤搆兵喀爾喀汗等為所敗衄叩關內附噶爾丹乃借辭追擊闌入我邊境恣行狂逞朕屢頒敕諭令其悔悟自新而狡冦不知省悟益肆鴟張其逆謀不測實有逼處近塞窺伺中原之漸朕思此冦包藏禍心倘不即行撲滅則異日必緣邊設防重滋民困何如及時聲討立靖根株於是昭告天地宗社躬統禁旅不憚勤勞三出塞外去年夏賊踞克魯倫河自度力不能抗倉皇宵遁朕親追至土喇河適西路大兵遮截其後擊敗之於昭木多賊勢大挫冬月復駐蹕鄂爾多斯收撫其降衆遏絶其外援而賊益困蹙機㑹所在刻不可失遂以今年春西巡邊境從寧夏出塞遣發大兵兩路進𠞰而青海烏思藏人等皆先後輸忱自效哈密國人又俘獻噶爾丹之子於行在噶爾丹窮迫已極一聞大軍壓境計無復之隨於阿察阿穆塔台地方飲藥自盡揆諸料敵成謀適相符合自此冦氛盡滌邊圉永安而朕為民除害不得已而用兵之意亦可曉然共喻於天下臣民矣武功告成之㑹正太和殿鼎建工竣巍煥方新臨御伊始協氣集於九重觀瞻肅於萬國是用覃敷慶澤以上答郊廟社稷之靈下協中外人心之望於戲懋武功而敷文德聿臻熙皥之風建宸極而鞏皇圖永慶平成之治誕告中外咸使聞知詔欵內大將軍領侍衛內大臣伯費揚古優升為一等公西路官兵自參贊以下實授章京以上各給一拖沙喇哈番襲一次所有功牌分别另叙護軍校驍騎校各加一級食俸兵丁俱議加恩西路進𠞰緑旗官兵自將軍提督總兵官以下兵丁以上俱議加恩三次出征官兵及西路進𠞰官兵所借官庫銀兩免追三次俱出征官員各加一級兵丁俱議加恩滿洲䝉古漢軍於軍前陳亡者給與官職外藩四十九旗兵丁於中西兩路隨征押運牧馬安站掘井修路守糧兵丁俱賞給銀兩八旗效力行間年老辭職傷廢官員察給半俸滿洲兵丁行間效力帶傷殘廢閒住及老疾閒住者俱加恩賜在京滿洲䝉古漢軍馬步兵丁俱加恩賜出征病故閒散三品以下官概加恩恤傷廢辭職官年尚未老及傷廢退甲兵丁酌給銀米外藩䝉古閒散三品以下官出征病故者概加恩恤外藩䝉古效力行間傷廢退甲者亦加恩賜五嶽四瀆歷代帝王陵寢先師孔子闕里俱遣官致祭內外大小官員概豫封贈進士舉人選用壅滯令分缺銓授三十八年鄉試三十九年㑹試增中式額正貢作恩貢次貢作嵗貢監生免坐監一月官員現議處分者奏明寬宥流徙人犯身故者骸骨准其回籍盜賊就撫者免罪嚴察驛遞騷擾賑濟鰥寡孤獨察舉山林隱逸地方人材督撫狥庇所保舉官員者治罪關係河漕情罪不赦封疆大吏各條奏地方利弊禁關稅橫征察蠲災失實懲治豪蠧規避差徭牽連待質久禁人犯情可矜疑者審明請釋除十惡死罪及情罪重大者不赦外其餘盡行赦免乙巳命尚書庫勒納等往給外藩四十九旗恩賞理藩院奏言恩詔內一欵外藩四十九旗兵丁比年以來出征巡汛甚屬勞苦其中西兩路隨征押運米車牧馬安站掘井修道及看守米糧在軍未曾得賞者每人每年各賞銀六兩給與三年已經得賞者每人每年各賞銀六兩給與二年其未出征兵丁除富户外不堪度日者每人各賞銀六兩給與一年其外藩䝉古出征病故閒散三品以下官亦槩行恩恤其效力行間傷廢退甲者著加恩賜臣等查得四十九旗呈送印結移文內開中路隨征喀喇沁多羅都楞郡王扎什旗下兵一千名喀喇沁公善木巴拉西旗下兵二百九十九名隨敖漢額駙查木蘇出征兵九名隨克西克騰台吉木輪噶爾弼出征兵十六名隨烏朱穆秦貝勒巴木巴旗都統阿爾楚克兵二名共出征兵一千三百二十六名每人賞銀六兩給與三年計該銀二萬三千八百六十八兩中路押運米車看守牧馬掘井修道兵兩喀喇沁兩翁牛特兩烏朱穆秦兩阿霸垓兩阿霸哈納兩蘇尼特克西克騰出征兵三千四百七十四名在軍中每名給過銀伍兩應每人賞六兩給與二年計該銀四萬一千六百八十八兩隨西路大將軍隊出征歸化城兩旗鄂爾多斯六旗三吳喇忒毛明安四子部落共兵一千七百三十九名每人賞銀六兩給與三年計該銀三萬一千三百二兩隨大將軍進發在西路安驛守護米糧看守牧馬掘井鄂爾多斯六旗三吳喇忒喀爾喀達爾漢親王四子部落毛明安共兵九百四十名每人賞銀六兩給與三年計該銀一萬六千九百二十兩皇上第二次駕幸鄂爾多斯自李蘇設站至大將軍軍前共安二十三驛歸化城二旗吳喇忒三旗喀爾喀達爾漢親王旗毛明安旗共出征兵一百五十名在軍中每名給過銀伍兩應每人賞六兩給與二年計該銀一千八百兩四十九旗貧窮不堪度日兵共二萬二千七百二名每人賞銀六兩給與一年計該銀十三萬六千二百一十二兩以上共該銀二十五萬一千七百九十兩此內或有增減之處臨賞之時察明散給此項銀應三路分遣大臣賫銀前往㑹同各該扎薩克察明逐一散給務使得霑朝廷實惠查歸化城兩土默特六鄂爾多斯三吳喇忒毛明安喀爾喀達爾漢親王四子部落等旗為一路應賞銀八萬七百九十兩其西喀喇沁敖漢克西克騰兩烏朱穆秦兩翁牛特兩阿霸垓兩阿霸哈納兩蘇尼特等旗為一路應賞銀九萬一千兩此二路應令兩大臣將獨石口現貯銀十三萬八千三百二十兩分携前往其不敷銀三萬三千四百七十兩行户部咨取帶去又十科爾沁兩土默特奈曼喀爾喀羅布臧貝勒旗兩札魯特郭爾羅斯杜爾伯特等旗為一路應賞銀八萬兩有奇即令出喜峯口大臣行咨户部帶去此賞給銀兩用兵部驛遞車輛裝載出邊境後取殷實䝉古車輛裝載至出征病故閒散三品以下官員及效力行間傷廢退甲人等此處無案可稽即令前去大臣詳察到日再議加恩其應遣大臣恭候皇上簡用上命著庫勒納哈牙爾圖努赫去餘如議行又以往戍吳爾揮地方科爾沁九旗兩烏朱穆秦兩蒿齊忒兩巴林兩扎魯特敖漢兩土默特克西克騰阿魯科爾沁共披甲二千一百三十五名應否給銀請㫖上曰不必給賞八月辛卯命宥羅卜臧端魯卜交通伊拉古克三死罪發大喇嘛默爾根綽爾濟等處分别安置先是理藩院㑹同三法司讞奏交通伊拉古克三之衛徵喇嘛喇克巴格隆海喇圖囊素羅卜臧丹臻丹臻額木齊之徒弟等二百餘人及衛徵等家中所有資産人口差官查明解到後奴僕財物入官已為喇嘛之徒弟發往盛京廟中交大喇嘛安插議上奉㫖留中至是理藩院奏曰監禁奸細羅卜臧端魯卜案內奸細尼克塔俄木布及通線衛徵喇嘛送書朱拉圖達爾扎知情孫魯卜額爾克俄木布班第俱病死又蹾門者係收受叛人財物不行舉出故台吉諾爾布之妻及其子牢張噶爾丹等奉㫖寬免發回歸化城其監禁者係奸細羅卜臧端魯卜尼爾巴格隆通線喇克巴格隆海喇圖囊素羅卜臧丹津又墩門者係衛徵喇嘛徒弟沙塔里家人克什圖和濟格爾年台奉㫖盡行釋放羅卜臧端魯卜等六喇嘛暫置妙音寺沙塔爾等四人暫寄部右衛監禁衛徵喇嘛徒弟內現在一百四十三人交歸化城彭蘇克喇嘛安插在案除病故奉㫖寬免奏准安插人等不議外衛徵喇嘛家口財物仍照前議臣部差官一員查明解到後入官出首奸細之回子巴圖哈什哈仍照前議撥入正黃旗䝉古軍中食護軍之糧此地暫置羅卜臧端魯卜尼爾巴格隆喇克巴格隆海喇圖囊素羅卜臧丹津滚楚克格隆六喇嘛交默爾根綽爾濟分置各寺廟暫留衛徵喇嘛之徒弟沙塔爾交歸化城彭蘇克喇嘛家人克什圖和濟格爾年台入官交內務府奏入上從之辛酉副都統阿南達奏報厄魯特噶爾旦多爾濟奔逃副都統阿南達奏言臣差護軍校阿竒納於六月十六日自色爾騰前去令從布隆吉爾重整所設驛站將留貯之米運至長馬爾地方阿奇納七月十六日來迎見臣等於西欣之地告云我料理驛站及米之事已畢六月二十六日至噶爾旦多爾濟所居西欣地方驛站以待大兵二十八晚噶爾旦多爾濟親身至我寓所謂之曰來有事與言我不之知欲出而相見二三十人執我奪馬駝而去我一僕人及驍騎校齊倫一䝉古僕人留於驛中者皆被殺噶爾旦多爾濟言今若釋汝去必致漏泄並不奈何汝俟離邊稍逺方可釋放擕行三日至布隆吉爾給以馬與糧而釋之問阿奇納曰噶爾旦多爾濟逃去之故曾有所聞否下人曾有何語答曰逃去之故所往之地未嘗當某前言之不知其故臣即親身率兵往追噶爾旦多爾濟至布隆吉爾哈喇烏蘇地方據坐塘撥什庫邊代來報云噶爾旦多爾濟逃去時其屬下人經過本驛來奪馬畜與之交戰我同伴小撥什庫巴顏及緑旗兵二人俱受傷搶五驛之馬一百六十許匹及兩撥什庫之馬二十匹駱駝二頭而去又丹濟拉來降皇上故先遣齊奇爾寨桑前行噶爾旦多爾濟遇之捆綁前往留之於者爾渾台地方而去我見之令齊奇爾寨桑乘驛赴京矣臣因丹濟拉來恐彼恰遇噶爾旦多爾濟故遣夸藍大衛格納等選滿洲緑旗兵共四百名以追噶爾旦多爾濟迎丹濟拉至噶爾旦多爾濟屬下現在招降人內有應取來者與我軍一齊帶至肅州交孫思克博濟解往查緑旗守備孫一貴等招降吳能巴圖爾等共一百九口及歸降皇上者有輝特台吉羅卜臧屬人共八百口喇嘛阿喇木札木巴阿喇木班共三百口俱有坐騎故以喀爾喀厄魯特兵一百五十名交台吉俄木布額爾德尼等由邊外挈裝徐行致之賀蘭山等處候㫖奏至上曰噶爾旦多爾濟乃誠心降附之人去嵗使人來重加恩賜斷不逃遁然而伊等以耕為業今棄其田禾忽然逃去必有不得已之情著交理藩院議行文將軍孫思克博濟等務必詳察明白具奏尋議曰據阿南達撥發官兵追噶爾旦多爾濟迎丹濟拉應無庸議驛站關係重大應行文將軍孫思克等如被劫驛站事務緊要作速添補馬匹不得誤事將噶爾旦多爾濟逃去情由詳察明白具奏至䇿旺喇卜灘處亦應將噶爾旦多爾濟逃去之事撰敕發諭上從之敕諭䇿旺喇卜灘曰噶爾旦多爾濟率其屬衆誠心來降安插耕種今忽留其下人盡棄田苗逃去其去必有不得已之情務期查明其故朕於噶爾旦多爾濟略無責備之意倘往汝地欲居於彼此窩齊爾圖車陳汗之孫爾可收之好加撫養如欲歸來即行遣回朕於此降㫖令收噶爾旦多爾濟遺留人等特諭聖祖仁皇帝親征平定朔漠方略卷四十五

body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方畧卷七七月庚寅朔命科爾沁土謝圖親王沙津候諸路軍至齊發沙津遣署副都統蘇爾米二等䕶衛根都等往偵噶爾丹至察克墩登髙望之見噶爾丹前哨次第屯列且望見其營壘甚近沙津即率所備兵前進具奏以聞上諭曰大兵陸續前進朕亦親往姑勿與戰以待各路軍至齊發毋致失利其檄王沙津知之辛卯命和碩裕親王福全為撫逺大將軍和碩恭親王常寧為安北大將軍時噶爾丹深入烏朱穆秦地上命和碩裕親王福全為撫逺大將軍授以印皇長子𦙍禔副之出古北口和碩恭親王常寧為安北大將軍授以印和碩簡親王雅布多羅信郡王鄂札副之出喜峯口内大臣國舅佟國綱佟國維内大臣索額圖明珠阿宻達都統蘇努拉克達彭冲阿錫坦諾邁䕶軍統領苖齊納楊代前鋒統領班達爾沙邁圖俱叅贊軍務諸軍前發惟佟國維索額圖明珠留京俟大將軍將至陰山馳往會之頒發軍令上諭兵部曰本朝自列聖以來戰必勝攻必克所向無敵者皆以賞罰明法制嚴兵卒精銳器械堅利人思報國殫心奮勇之所致也今軍行其令各該都統以下察核軍實凡甲胄弓矢諸器械務令犀利堅好其盔甲俱繋號帶馬騣尾書旗分佐領姓名其行也視大纛整隊齊發有零星前後錯行及醉酒者該管官立拿懲責其止也各按旗分隊伍分列屯扎有前後錯亂者罪及該管大臣馬無印箭無名各罰以銀給拿獲者竊取鞍轡什物馬匹者視其多寡治罪失火者亦從重究懲官兵厮役所過百姓䝉古地方毋騷擾毋搶掠毋踐踏有擅離營伍入村落山谷奪人財物者軍法從事罪及本主及該管官軍士厮役逃亡在喀倫内立行察拿治罪如出喀倫外該管大臣即遣官兵窮追務獲立斬以狥如不能獲則將往追將卒從重治罪其逃人之主及該管官一并嚴行察懲既出我境哨探斥堠務期嚴宻如曠野交兵對陣見敵王貝勒貝子公大臣不按次序攙越前進及見賊兵寡弱不復請令冒昧前進者有功不叙仍治以罪其進也須齊列緩轡按隊前行如自離其隊而附人後或自棄其伍而入别行或他人已入而獨留不進身死家沒及重責革罰分别治罪如整齊而進撃敗賊兵厥功維均勿以畧分先後致生爭競至彼不抗我軍而奔潰則選精兵良馬逐之列隊躡踪而進如前忽遇伏或賊兵有旁抄者則後隊接戰夫兵者所以討逆而安順也領軍大臣果能嚴束其下不使良民受害朕不靳厚賞否則罰亦無赦凱旋之日有以兵器私售䝉古者本人治罪并及該管官馬乃大軍急需須視水草善地小心䕶養起行時則留將卒察收遺失之馬視騣尾所繋字樣交還原主如係疲馬則開明馬色數目交所在官司人民䝉古善行牧養報知兵部如有匿而騎用及殺之棄之者治以罪其遺馬疲馬之人亦開明馬色報兵部存案恐官兵未能遍知爾部其刋布曉諭之臣謹按我國家兵制至善軍法至嚴亘古所不及皇上智勇天錫以守成兼開創嗣位以來平三藩收海孽定察哈爾之亂天戈所指捷如雷霆蠢兹噶爾丹無知逆命皇上震電憑怒乃遣將出師申嚴教誡才百餘言耳而坐作進止之方竒正𠞰禦之法莫不燭照數計纖悉靡遺不待秉鉞擁旄而早已决勝萬里之外矣抑又聞之兵者聖人不得已而用之以除暴安民而已故曰桓文之節制不如湯武之仁義仁義者所由制勝無敵之資也今誕告有衆所諄諄往復者惟以禁侵掠安良善為至計故師行所至民不知兵市不改㕓野無失業其真所謂聰明睿智神武而不殺者與命發大同綠旗官兵兵部奏言大將軍裕親王等奏殺虎口宻邇歸化城請撥大同綠旗兵前赴以聽調遣應如王等所請於大同鎮標選馬兵六百步兵内或籐牌或火器一千四百令將領率之於七月初十日内至殺虎口其總兵官王璧尚未受事或徑赴大軍或仍留大同應候㫖行上曰此所撥兵係鮑敬舊轄即令率之前往聽調王璧蒞任後仍留防守地方命隨大軍設站上諭理藩院曰大將軍裕親王率大兵出古北口其令侍郎薩木哈學士布顏圖自阿爾尼設站分路之處酌撥附近旗分人馬尾隨大軍設立驛站壬辰命内大臣阿宻達軍暫駐岡阿副都統噶爾馬率兵往會阿爾尼等六月二十七日至阿霸垓聞前軍已與噶爾丹交鋒乃遣人探兩尚書所在往會之以兵力單弱便宜於附近調察哈爾左翼四旗兵每旗百名以行越二日與阿宻達軍會於岡阿具疏以聞得㫖前已調發察哈爾兵八百左翼兵無庸再調今撫逺大將軍將出塞應令阿宻達等暫駐岡阿偵明蘇努軍行實信與之齊赴克勒以候大將軍至如聞厄魯特内向即回與大軍合其檄知之命奏報軍情許大將軍等閱視大將軍裕親王等奏言臣等既身率重兵其切近噶爾丹處奏報機宜似宜備文令臣等知之上曰軍機於爾等豈有所秘哉但另文則未免煩複且恐遲延自後奏報軍機皆令馳赴軍前爾等接視封進有所見即附奏以聞諭尚書阿爾尼等遣人迎都統額黑訥軍上諭理藩院曰額黑訥軍從某邊汛達阿爾尼所較為捷近其諭阿爾尼等遣能員速往迎之兵力薄恐突遇敵兵也阿爾尼所駐地如有可虞漸移入内謹防斥堠又聞喀爾喀行劫驛馬其曉諭嚴禁之癸巳命侍衛阿南達等往會尚書阿爾尼等軍阿南達等奏言臣等六月初十日自伊黑噶扎爾起行至布喇漢布喇克尚書阿爾尼檄令臣等率察哈爾兵并礮至他奔他什海臣因選兵五百前赴至岡阿則阿爾尼等已回就大軍臣乃疾行至阿霸垓聞阿爾尼在西喇西巴爾臺集兵噶爾丹已東走矣臣等道逺馬疲以羊為糧羊亦瘠乏僅以歸化城副都統阿玉璽所運來米一百石散給士卒尚餘米百駝阿玉璽䕶之與臣等同行迎就大軍奏至上曰阿南達等與阿爾尼噶爾馬兩軍就其近者往會之額黑訥兵恐亦糧盡勢迫其檄阿南達速往迎之入邊副都統阿玉璽所解米百駝量給阿南達兵餘留以給額黑訥軍令阿南達酌行命大將軍恭親王常寧率兵往會大軍恭親王奏言臣既出喜峯口當由何道而進上曰視其道之近者往與大軍會其出古北口之兵糧儲多爾等未會之際糧宜節省出邊後有助糗糧者聽助籍其姓名以聞所助牛羊俱收畜及時以散給之炎暑軍行恐人馬勞苦其令書止夜行遣使往檄噶爾丹上諭理藩院曰前使諭噶爾丹者音耗乆絶爾衙門其遣筆帖式一人撥什庫一人乘驛往偵之乃奏請改撥什庫巴扎爾為筆帖式往檄噶爾丹檄曰前者差本院員外郎阿爾必特祜達頼等使汝嗣又差郎中滿丕員外鄂齊爾等使汝至今未歸是以又遣筆帖式巴扎爾前來如前使未經遣回其速遣之乙未大將軍裕親王福全帥師啟行裕親王將行上御太和門大學士伊桑阿捧勅大學士阿蘭泰捧印授王勅曰喀爾喀厄魯特原屬同修職貢之國因伊等交惡搆兵朕不忍民生塗炭曾遣使與達頼喇嘛使人偕往厄魯特諭令仍尋舊好乃厄魯特噶爾丹陽順陰違反侵擾我屬部掠奪烏朱穆秦四佐領兹因遣發大兵聲罪致討特命爾和碩裕親王福全為撫逺大將軍皇長子𦙍禔為副與内大臣國舅佟國維内大臣索額圖明珠阿宻達公蘇努都統國舅佟國綱公彭冲都統諾邁䕶軍統領楊代前鋒統領邁圖等統領官兵前往征討行間諸事爾與皇長子及諸大臣等籌畫善䇿協議舉行勿謂自知而不納衆論勿當事會而致失機宜勿恃兵强而輕視逆寇嚴偵逺探㒺或踈虞其統領䝉古兵丁前來王貝勒扎薩克台吉等亦與共相商確酌量而行所調盛京烏喇官兵到時爾一併統率調遣有能擒斬噶爾丹來歸者分别陞賞爾須約束將士申嚴紀律凡經過地方毋得騷擾百姓歸順良民加意撫綏務體朕定亂懷逺至意其行間將領功績及重罪俱察實紀名彚奏各官有犯小過者當即處分至於驍騎校䕶軍校以下無論大小罪過俱商酌徑行處治務將厄魯特殲𠞰廓清安靜邊圉斯稱委任爾等宜殫竭心力蚤奏膚功欽哉王跪受畢上出東直門視諸王起行丙申命内大臣阿宻達等軍候大軍於克勒阿宻達等奏言噶爾馬等所遣使偵阿爾尼軍者七月初二日還報言阿爾尼吉爾他布與翁牛特杜稜王巴林阿拉卜灘俱率兵駐葫蘆谷爾河噶爾丹離舊戰地五日程至厄勒冷矣臣等因與扎錫王共率兵於次日起行赴阿爾尼所奏至上諭曰阿宻達等既與阿爾尼等會仍當偵明蘇努軍行所至率兵與阿爾尼阿南達巴林翁牛特等軍齊至克勒候裕親王大軍命阿霸垓等旗嚴備喀爾喀并供應往來驛站糗糧上諭内大臣國舅佟國維等曰京城大軍絡繹出邊阿霸垓阿霸哈納爾蘇尼特蒿齊忒等兵無所調用令不必赴尚書阿爾尼軍前著於各旗形勝之地駐扎嚴防喀爾喀新來之衆妄行並供應往來差遣人員驛站糗糧毋悞命内大臣蘇爾達約大軍齊發罷大將軍恭親王常寧兵蘇爾達奏言臣於六月三十日至科爾沁見達爾漢親王班第距其舊居六日程駐圖思噶爾圖山兵到者僅半喀喇沁阿霸垓柰曼兩土黙特兵亦未到臣俱移文及檄盛京兵促其前來俟到日整飭軍伍進發奏至命議政王貝勒大臣集議其恭親王兵應否停止一并議奏議曰蘇爾達去時勅諭甚悉其恭親王兵且勿出但令預備前已檄王沙津等姑勿與厄魯特戰以俟大兵今蘇爾達等亦應俟諸軍齊集遣人約大將軍兵恊力以進上曰恭親王兵可勿備餘如所議其令裕親王及叅贊大臣等知之戊戌命内大臣索額圖統兵前進相機撲𠞰上諭内大臣國舅佟國維等曰朕夜來思及一事方欲傳諭適諾木齊岱來奏蘇爾達之語與朕意相符朕觀噶爾丹退回二宿之地似欲潛逃如俟京城大兵至始追之恐不及聞盛京烏喇兵俱已起行十日内即到矣其令阿宻達全軍及公蘇努軍中視有壯馬者選出即簡出征大臣一員統領而往沿途擇水草善地剋期到彼如噶爾丹欲逃即行追𠞰無失機會若彼來迎敵則我軍切勿急行以待大兵姑遣使往諭之曰汝闌入我邊汛尚書阿爾尼等不得不迎戰汝向與天朝修貢通好此來追喀爾喀耳今喀爾喀劫奪我外藩肆行悖亂亦與我朝相失聖上特遣和碩裕親王及皇長子來與汝申明禮法自兹以往永定盟好汝不聞前者我朝出兵至俄羅斯以禮和好不戰而歸乎汝其謹俟王及皇長子之至如此往復遣使以羈留之大兵可俟阿爾尼等所有扎薩克兵及阿南達兵其馬既不堪用著阿南達親押火器速往與盛京烏喇科爾沁兵㑹阿南達等所留之兵著一人管轄駐於現居之地不時探報蘇努等所餘之兵尾此軍後聮絡坐臺哨探其令議政王貝勒大臣集議議曰上諭已極周詳其統領此軍之大臣及管轄阿南達所留兵之人員恭候特簡上曰著索額圖統領偕阿宻達先往令阿宻達及蘇爾達叅酌而行索額圖阿宻達前去則攜前鋒叅領石圖與俱併量選前鋒兵帶往至則視其情形如彼能待則俟大兵而行不能待則遣人羈縻之必不得則明諭之曰聖上遣皇兄皇子與汝相見非惡意也汝乃不俟而去非汝之不軌乎雖聖上戒勿戰我不汝貸也往復數四度盛京烏喇諸部落兵且至力足以勝即便宜行事如彼奔逃已逺不便往追則速奏以便撤兵蘇努及阿宻達之軍俱令蘇努率之而往除阿南達等押礮及馬壯者前去外其馬不堪者酌留令副都統扎木素噶爾馬領之駐阿爾尼等原駐之地探噶爾丹聲息及額黑訥軍情不時報聞并防禦就近地方作惡肆行之人其扎努喀朱爾蘇亦酌量帶往調用索額圖取皇長子廐馬百匹乘以前去命隨大軍運糧時大軍已起行理藩院奏言軍行餉不可緩請遣户部司官一員及看守米石臣部員外郎䝉古兒以駝一千二百五十頭運米一千五百石往克勒候大軍至通行散給後令喀喇沁多羅郡王扎錫仍照數撥給官兵押駝隨臣部及户部司官同赴坡頼村再運往迎大軍奏入上曰大軍已賫兩月糧又有一千五百石隨行吳巴什又運一千餘駝而往若此米至克勒即行給發則軍行未乆恐難攜帶反至縻費其令賫運者隨撫逺大將軍後不拘何地當給方給之俟畢令吳巴什䝉古兒等仍率察喀爾喀喇沁官兵驅回坡頼村將運到之米䭾載前赴大軍其坡頼村米令户部司官同霸昌道監發辛丑内大臣索額圖請趣盛京烏喇等兵速赴軍前索額圖奏言臣近閱阿爾尼疏言噶爾丹今在烏朱穆秦旗分竒爾薩布喇克之地如遵前㫖赴蘇爾達所則似迂曲臣已選蘇努軍中馬壯者往與阿宻達軍會伏乞勅諭趣盛京烏喇兵科爾沁等旗兵速赴臣軍上從之壬寅勅諭噶爾丹時噶爾丹遣其使達爾漢格隆奏言喀爾喀吾讐也因追彼闌入邊汛向在中華皇帝道法之中不敢妄行上因賜來使筵宴賞賚令賫勅歸諭之勅曰據爾使人達爾漢格隆陳奏具見敬順悃誠朕統御天下重信義而賤欺誑前以七旗喀爾喀彼此搆怨與達頼喇嘛共議遣大臣諭和不意左翼興兵妄動朕弗之直也後喀爾喀為爾所敗匍匐來歸朕念普濟衆生之意賜以米糧牲畜所全活者無算喀爾喀何利於朕而施恩若是皆朕不忍生民之顛沛故耳是年出盟方分别七旗曲直昭雪扎薩克圖汗之事欲仍前設立右翼議未及定爾兵已至乘虛驟入褫守汛者衣服出言不遜朕亦不深責六月二十五日遣員外郎阿爾必特祜等問故而阿爾尼等在邊以爾公然闌入邊汛守邊責重不能容忍遽與爾戰朕甚非之六月二十九日復遣郎中滿丕賫勅諭爾及商南多爾濟歸取行糧而已豈有正事尚未議定即可言執土謝圖汗折卜尊丹巴以畀汝乎此皆使臣設計脱身而為此言也汝謂與達頼喇嘛道法為一則當憐念衆生同心以安喀爾喀令七旗同享安樂以仰副朕意乃反肆殺戮拆人妻子離人骨肉浸淫邊地掠及四佐領之人揆之道法可若是行乎恐達頼喇嘛未必使汝為此也西寧報至聞䇿旺拉卜灘以汝罪告之達頼喇嘛將興兵伐汝夫興戎非美事也朕且將與達頼喇嘛共議調和而聞汝已駐兵烏爾會河故朕遣和碩裕親王皇長子及大臣量發滿兵而往非討汝也欲定議耳本朝前者遣大臣往俄羅斯議事亦發兵往議畢而回汝所夙知也為汝計其聽達頼喇嘛言罷兵息戰各享安樂既合衆心亦易畢事如仍以前事為辭妄行劫掠則隳敗名教自汝始矣又諭理藩院曰索額圖等行與蘇爾達會爾衙門即遣司官一員偕噶爾丹使人達爾漢格隆等從喜峯口至索額圖等軍前如索額圖等以使人為可遣歸則遣之如不可則留之命諸路兵齊集巴林大將軍裕親王等奏言厄魯特今至竒爾薩布喇克之地於盛京烏喇科爾沁調兵之處不相涉盖稍在内矣索額圖等若仍赴蘇爾達所似覺迂曲然已近巴林臣等欲使索額圖等勿赴科爾沁而駐軍巴林以待臣臣等當選馬疾行尾隨索額圖而進尚書阿爾尼等奏言噶爾丹距臣軍所駐西喇西巴爾臺僅一日程又侍衛阿南達率察喀爾兵五百及運米土黙特兵二百已至臣所并巴林翁牛特兵八百共一千五百名臣等率之已與内大臣阿宻達軍會兩軍止三千餘耳勢力單薄請且駐朱爾亨布喇克等處整兵以待禁軍奏入上諭曰速檄索額圖至巴林候裕親王王等亦不必選馬疾行率全軍赴巴林并令人追蘇努兵之分行者齊赴巴林其阿宻達阿爾尼等兵速令内向至我大軍去路以待又前所發五旗每佐領䕶軍二名令恭親王領之踰二日起行王其約束軍士所過毋踐禾稼癸卯車駕發京師上諭都統瓦代等曰據闗保奏噶爾丹於六月二十七日遣發其使人及我撥什庫次日潛師退去班第蘇爾達等遣人躧視之噶爾丹兵果已北去朕之欲幸此軍者以躬近行間便指示也今噶爾丹雖退而喀爾喀方且横行劫掠驛遞及諸扎薩克馬畜衣服乘此大兵集會朕乃親往視師以靖喀爾喀之肆俾知所畏忌事可一舉而定也是日上詣皇太后宫請安遂啟行甲辰命暫赦員外郎阿爾必特祜等罪令隨軍効力時學士西拉奏員外郎阿爾必特祜達頼奉使噶爾丹歸言我等至科爾沁王沙津所沙津云我已遣二百人往視噶爾丹所在我等隨取鄉導馬匹追躡之行二日遇諸塗問之據云噶爾丹已退去矣又向北行三宿視之漫不見踪跡我等思所攜糗糧且盡道途多劫既不獲見噶爾丹徒毁及勅書賜幣無益是以歸來臣思阿爾必特祜達頼皆係重囚皇上宥其死罪復其原職而遣之不思効力酬恩不終使事擅自來歸不誅無以示後應立正軍法上可其奏隨又諭大學士伊桑阿曰阿爾必特祜達頼罪本應誅今暫免其死與巴扎爾俱帶之前去出口後或有差遣之處亦未可定若能効力則貸其罪否則殺之前遣筆帖式巴扎爾亦未見噶爾丹而歸故上諭並及之命以太僕寺馬一千五百匹給大將軍裕親王軍丙午命内大臣蘇爾達等軍赴巴林以會大軍蘇爾達等奏言臣等所領兵至烏爾㑹河者祇三千三百有餘及土黙特兵二百八十其敖漢等四旗兵及盛京兵俱未到而阿爾尼等報稱噶爾丹七月初七日至奇爾薩布喇克其地近於陰山臣等所駐反過之恐厄魯特由陰山乘虚而進臣乃移駐阿魯昆都倫以待後軍奏至上諭曰諸台吉軍中馬瘦糧少者著留於阿魯昆都倫之地擇善約束之台吉統領駐防其已到之土黙特兵令蘇爾達沙津班第等率之俟盛京烏喇兵到全赴巴林以㑹大軍其敖漢等四旗兵之未到者速遣諭之不必赴科爾沁亦往巴林并檄撫逺大將軍及叅贊大臣知之如有所見具奏以聞丁未命内大臣阿宻達尚書阿爾尼等㑹内大臣索額圖軍索額圖奏言十一日臣遣察哈爾佐領鄂爾哲喀喇沁佐領恩克等往偵十四日歸報知厄魯特兵駐扎和爾洪河上流距我軍所駐濟爾河有二日程臣等即於十五日起行赴巴林奏至上諭曰頃者令裕親王等領全軍赴巴林索額圖在巴林候大軍已有諭㫖其檄諭阿宻達阿爾尼等速來會命康親王傑淑等率兵往會大將軍裕親王福全軍裕親王等奏言臣等偵得噶爾丹於是月十一日在音扎哈河上流十二日至和爾洪河十三日沿河而下幾百里往岳洛岩視其所向將往達爾腦兒之地距岳洛岩約六日程臣等尾追不及今沿拜察河徑由正藍旗遊牧之地往禦之遣人乘驛令我牧地䝉古及土謝圖汗折卜尊丹巴庫圖克圖各驅牲畜入近邊遊牧且速檄知康親王奏至命議政大臣集議議曰蘇努阿宻達軍應令㑹集速行檄康親王等駐形勝之地探聽亦檄蘇爾達等知之至牧地䝉古若俱令内徙恐悞驛遞宜諭止之仍令於舊地遊牧議入得㫖康親王速率兵會大將軍檄知蘇爾達等餘如所議内大臣阿宻達奏遣郎中哈爾吉布等使於噶爾丹阿宻達奏言是月十五日濟隆庫圖克圖之拉木扎木巴同伊拉古克三庫圖克圖之尼隆格隆等來至臣所告曰噶爾丹言我自入邊秋毫無犯皇帝亦惠我幣帛勅書甚大德也今乃聞侍衛阿南達率兵及諸路軍雲集又聞有内大臣且至土謝圖汗之子噶爾旦台吉亦在軍中夫執鼠之尾尚噬其手今雖臨以十萬衆亦何懼之有臣等答之曰奉命防邊上意勿與厄魯特戰也我寧敢違㫖乎阿南達等乆已赴京噶爾旦台吉不知所往拉木扎木巴又曰噶爾丹博碩克圖汗言兩庫圖克圖及商南多爾濟來事已定議將於次日遣奏而是夜兩尚書來襲我入我兄子營殺及子女不戰者如是乎臣等答之曰彼闌入邊汛掠我烏朱穆秦兩尚書不得已與之戰今聖上特遣皇兄皇子來與噶爾丹定議我等亦將内徙矣臣因遣郎中哈爾吉卜少卿巴圖與其使人偕行臣又聞其從者曰十五日噶爾丹引兵内進屯於西喇西巴爾臺矣奏至上命示議政大臣戊申命恭親王常寧率師會大將軍裕親王福全軍上諭兵部曰恭親王令統兵自鞍匠屯取道興州趨正藍旗遊牧之地往會大將軍裕親王軍諭康親王傑淑等仍駐軍歸化城上諭兵部曰康親王兵不必前來仍令回駐歸化城至調四子部落三吳喇忒毛明安喀爾喀達爾漢親王六鄂爾多斯歸化城之兵應否留於康親王處議政大臣等集議議曰歸化城永宜留兵防守應遣人迎康親王回其外藩兵應調其半至康親王所歸化城兵亦檄知少詹厄爾賽令其預備又前所撥宣府鎮標兵一千并籐牌手一百候調遣者令許盛率之大同兵二千備殺虎口者令鮑敬率之俱速赴歸化城康親王軍前上從之己酉命簡親王雅布赴大將軍裕親王福全軍時簡親王隨駕至青城請往軍前効力上令簡親王趨赴裕親王軍前叅贊軍務内大臣阿宻達奏報噶爾丹及濟隆庫圖克圖使人至軍前阿宻達奏言臣等率兵將赴巴林即遣人偵探噶爾丹聞已至和爾洪欲往巴林恐反在其後故臣等駐軍木西峽及噶爾達蘇台兩河界已檄知蘇努軍後聞噶爾丹又前進至和爾圖臣前所遣郎中哈爾吉卜等歸告臣等曰我等至和爾圖噶爾丹所屯也語拉木扎木巴等曰爾其以我來之故聞之兩庫圖克圖且使我等一見噶爾丹乎頃之拉木札木巴等來告曰汝言皆轉達庫圖克圖矣濟隆庫圖克圖言此來甚善皇帝與博碩克圖汗通好乃大幸也博碩克圖汗並無所言汝等少坐即與相見語畢而去待之良乆喇嘛扎卜等來謂曰汝等前來之故我汗皆知之我汗言兩庫圖克圖亦不必見也汝且歸我將導汝出境是以我等歸來未幾濟隆遣衛徵格隆噶爾丹遣尊多伊格蘇爾為使見臣等於前鋒營述噶爾丹之言曰聖上君南方我長北方我與中華一道同軌雖入邊汛索吾讐而已弗秋毫犯也乃今聞使侍衛阿南達率兵來至葫蘆谷爾河與兩尚書會阿南達奉命使於我者數矣我亦常饗之今講信修好宜遣之來議否則亦當遣尊於阿南達等者奏至上命示議政大臣遣侍郎額爾黑圖整飭驛站上諭大學士伊桑阿等曰驛站奏報軍機關係重大其令侍郎額爾黑圖自此至裕親王軍自王軍至阿宻達軍整飭驛站其兵部侍郎薩木哈檄之令回庚戌命内大臣伯費揚古等往㑹大將軍裕親王福全軍時費揚古及都統班達爾沙等奉命赴科爾沁至布爾哈蘇圖地方與科爾沁軍會費揚古具奏以聞上諭曰費揚古等不必與科爾沁兵齊來令速赴裕親王軍并檄蘇爾達等知之辛亥諭大將軍裕親王福全等時報大軍進止并噶爾丹情形上諭裕親王等曰爾軍進止與哨探噶爾丹所在宜不時報聞今朕與爾相距僅三百里而往來之信常遲非軍機所宜也其不時儆飭王等奏言前者遣石圖率前鋒哨探今阿宻達報稱厄魯特十八日至敖布喇克越二日前徙於布立圖扎營視其情形將往達爾腦兒臣等議若彼乘間過克一奔口則難追及已檄蘇努阿宻達等兵速來二十四五兩日内可與臣軍㑹噶爾丹若至克一奔口則二十六七必與相遇臣等謹設斥堠整兵前進石圖還有聞當别奏壬子命恭親王常寧率兵赴土爾埂伊扎爾之地上諭都統喀代等曰今裕親王軍既在土爾埂伊扎爾其諭恭親王不必赴拜察令往㑹裕親王甲寅大將軍裕親王福全等奏報遺書噶爾丹給之牛羊先是上諭裕親王等曰今兵漸與敵近斥堠宜嚴明噶爾丹處應作何羈縻以待盛京烏喇科爾沁之兵王等其遺之牛羊以老其銳氣疑其士卒商南多爾濟諳晰情形可與商也至是裕親王等奏言據噶爾馬等報厄魯特兵駐弼勞口濟隆庫圖克圖所遣使人顧魯格噶爾丹所遣使人哈灘和碩齊至臣軍中顧魯格告曰我庫圖克圖曾遣使於阿宻達大人軍言達頼喇嘛諭噶爾丹曰爾向與中華皇帝和好今追索土謝圖汗折卜尊丹巴不已倘因此有隙必至貽患衆生不獲寧所噶爾丹祇遵其諭故令我等往告中華大人臣思大兵既出彼必知之臣等今往克一奔而噶爾丹又駐弼勞口欲回趨拜察以禦之又恐彼向西而往噶爾丹狡詐多端踪跡難定大兵迂回猝難調遣不若暫駐哈卜他海海他哈地方再定所向臣又遣濟隆庫圖克圖及噶爾丹之使偕驍騎校克什圖原任員外郎達頼遺以羊百頭牛二十頭持臣及皇長子書語之曰我與汝道法相協和好有年今汝追喀爾喀入我邊汛聖上特命我等論决此事永乆和好今汝使人言我汗已敬遵達頼喇嘛之諭夫講信修禮所關重大此役既就則一切皆宜矣今將於何地會議務定一所以决大事因遣書之便敬以牛羊為餽臣等不知諸軍至何地可待則待之如不可待則量力而進耳命定領軍諸大臣迎戰行列大將軍裕親王奏言蘇努阿宻達等兵俱已來會噶爾丹聲息漸近臣等今分大軍為三首隊每佐領䕶軍五名次隊每佐領䕶軍二名驍騎一名兩翼每佐領䕶軍驍騎各一名前鋒各二百名夸蘭大及將領等員臣等酌量分派餘前鋒四百名留臣等左右以備䇿應至三隊大帥重任也自叅贊大臣以下副都統以上在行間者皆奮欲前驅惟皇上所命奏入上諭曰火器營大帥不必易首隊令前鋒統領邁圖䕶軍統領楊代副都統查木素色黑老蠻色海蘭尚書吉爾他布阿爾尼率之次隊令都統楊文魁副都統康喀喇伊勒塞格音率之兩翼令公蘇努彭冲率之内大臣國舅佟國維内大臣索額圖明珠阿宻達與王等親督指揮視何處當應援親率兵赴之扎努喀朱爾蘇居皇長子左右其恭親王軍到聽大將軍調用至噶爾丹使人速遣之丙辰上自鷹莊回鑾時駕出塞外被暑是月十六日至鞍匠屯御體違和仍力疾前進二十日至青城次日扈從諸臣奏曰時當炎熱行幄薰蒸敢請聖駕回至佳善之地暫為游息調攝聖躬二十三日上乃回鑾二十四日至鷹莊駐驆扈從諸臣又再三叩請御駕回京調理二十七日上於是緩轡徐還京師戊午大將軍裕親王福全等奏報遣使遺書於濟隆庫圖克圖裕親王等奏言濟隆庫圖克圖噶爾丹遣使人齎濟隆書偕克什圖來内言前者我偕皇上使臣伊拉古克三庫圖克圖和好之議幾成而尚書遽爾用兵遂至敗議思聖上與博碩克圖汗之意原無不恊也是以余與博碩克圖汗俱遣人至京陳奏今博碩克圖汗確知其讐所在追躡至此余恐厄魯特喀爾喀彼此致有損敗謹以修好之利為彼陳之亦期有裨於折卜尊丹巴土謝圖汗以副皇上之意而已其作何修好幸明示之等語問之克什圖言至彼時噶爾丹之弟丹濟喇取書以去不使我等見濟隆及噶爾丹也臣等欽遵諭㫖以遣使羈縻為務仍令前使持書往答曰尚書阿爾尼等倉卒進兵以至交惡乆經奏聞今因博碩克圖汗索土謝圖汗折卜尊丹巴之故聖上特遣我等來議永定和好博碩克圖汗既近我地乞近至烏闌布通應以土謝圖汗折卜尊丹巴畀汝與否各遣貴顯大臣定議博碩克圖汗屢以未嘗犯我國為辭今乃掠我屬界執其部長不幾背前言乎今以濟隆言定議修好是以遣使奉書等語但噶爾丹素行狡詐未必不於克什圖歸來之前進兵臣等當併力禦敵務期不失機會聖祖仁皇帝親征平定朔漠方畧卷七

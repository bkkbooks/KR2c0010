body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷三十九戊辰駕至安邉議發官兵隨糧以禦噶爾丹先是上諭議政諸臣曰噶爾丹窘迫東向逃竄亦未可定應發滿洲緑旗兵携百日糧至郭多里巴兒哈孫地方偵探堵禦將所運米順黃河而下分行之時以駝騾䭾運著馬思喀與于成龍㑹議具奏議政諸臣奏言諭㫖誠是俱當欽遵而行應即檄馬思喀于成龍速議來奏上曰朕意如是將此檄問寧夏參贊諸臣其意云何至是馬思喀及參贊諸臣議曰將軍孫思克等進兵後噶爾丹窘迫向東逃竄亦未可定皇上欲預遣兵駐郭多里巴兒哈孫地方偵探堵禦皇上廟算誠是臣等再四圖維無復他議俱當遵㫖而行應發西安兵王化行兵京城前鋒兵外請帶馬䭾子母炮八門每炮一門撥章京一員驍騎校一員披甲十名其䭾炮藥炮子駱駝十六頭於協理上駟院事副都統達禮善帶來駱駝內有臕壯者取十六頭令是軍支百日糧於三月十九日起程于成龍尚未到今日于成龍始到俟到後將運米之事另議具奏命議政諸臣議奏集議以為該將軍既奏稱皇上籌畫周詳頒此諭㫖請遵行之當如該將軍所奏施行至將軍請撥大臣之處伏候欽㸃上曰兵且暫止其馬臕如何糧如何運尚未陳明著以此行文訊于成龍等尋于成龍等奏言寧夏所有兵三千及大同赴寧夏大小官員披甲僕從每月以倉斛二斗算一百日共需米五千石總兵官王化行官兵僕從一千需米七百石零除臣七人外運米旗下章京及理藩院章京筆帖式撥什庫應給糧一百八十石零若僅以前鋒二百寧夏兵八百及王化行兵合算共二千名需米二千三百九十七石六斗七升八勺現在運米向派尚書庫勒納等解來駝騾彼尚未到捐納不合例牲口現到四百學士朱都納所喂五千匹內給兵餘剩之馬及採買之馬尚未知實數總督吳赫所備八千五百餘馬在平凉等處喂養俟其全到擇臕䭾載與大兵一齊起程問總督吳赫言米陸續運來至䭾米既多必須鞍架上下方便至下米地方亦不至雨水沾濕請交總督吳赫作速備辦至解到駱駝騾馬恐有瘦損應交該督備辦三匹牛車四百輛奏至上命議政大臣集議議如于成龍奏檄總督吳赫速運糧到寧夏備辦鞍架既用駱駝騾馬運米不必備車將軍馬思喀等進兵運糧事既俟駕至寧夏再議則于成龍所稱以駱駝騾馬䭾米與大兵一齊起程之事亦俟到寧夏再議奏入上命備三匹牛車三百輛餘如所議命止寧夏官兵逺迎上諭大學士伊桑阿曰著檄寧夏諸大臣勿得逺迎以勞馬力止令諸大臣單身至黃河對岸迎接其餘將士俱俟駕到寧夏之日近城地方步迎總兵官王化行請獵於花馬池以觀軍容不許王化行口奏曰臣䝉聖恩擢為要地總兵官並無纎毫仰報高厚去年率領寧夏兵進𠞰噶爾丹回師之日臣即儘力採買馬匹軍需俱已齊備皇上若不因噶爾丹之事豈臨寧夏臣標官兵盔甲器械現俱全備當令披執揚旗列陳恭請皇上閲視又過花馬池黃羊野兔甚多臣欲預備馬兵五百名請聖駕行圍上曰朕行軍二次深悉軍情今噶爾丹尚未撲滅正有事之際馬匹關係緊要寧夏兵丁來花馬池往返須七八日馬匹必致疲瘦夫獵獸細事耳圖噶爾丹為急今罷獵而休養馬匹以獵噶爾丹何如爾速遣人止其來花馬池迎接其餘兵丁俱不必披執照榆林兵丁排列迎候俟朕至寧夏間暇之日再閲爾軍己巳上仍駐蹕安邉城東諭護軍統領托倫曰今日天雨且寒駱駝馬騾喂草或在營中或在城內各從其便其野外牧放之駱駝馬騾俱好加苫屉著通行曉諭庚午駕次定邉厄魯特羅卜臧等來降厄魯特羅卜臧汪扎兒格楚兒阿旺拉卜灘班第等來降伊等俱噶爾丹屬下人二月十七日自薩克薩特呼里克地方逃出來降言我等逃至此地之時噶爾丹尚在薩克薩特呼里克居住使臣博什希格壘等二月初一日到十五日見噶爾丹在噶爾丹附近居住者有丹濟拉阿拉兒拜等屬下共百戶云大將軍費揚古將伊等解送行在理藩院轉為奏聞上報聞且以示議政諸臣是日尼麻唐庫圖克圖等至有密奏辛未駕至花馬池主事巴雅思呼朗報湖灘河朔至寧夏安塘之事理藩院奏曰巴雅思呼朗報稱奉㫖將情願效力布顔努等十三人自湖灘河朔起至寧夏止安十三塘將安塘日期檄知大將軍其布顔努令坐湖灘河朔以內欽此欽遵布顔努坐於烏瀾巴兒哈孫其十二人金鋐坐呼蘇臺馬之德坐哈什拉克劉世祿坐額泠烏黑禮陸芝秀坐白塔巴圖坐察罕齊勞圖陳世安坐鄂爾濟圖蘇麥閒散覺羅明玉坐逹布素諾爾宜思孝坐托索圖果兒蘇逹坐穆色吳興祚坐尚索爾祖興邦坐拜圖劉思炎坐祁他特布拉克自祁他特布拉克至橫城驛三十里安塘畢報大將軍外相應報部為此轉奏上報聞以第巴密奏事情語諸臣上諭內大臣曰朕駕今已到寧夏大將軍一應事務俱由鄂爾多斯地方新設驛站馳報著以此檄將軍知之至今日扎營之地少井有力之人不必言矣小人不得飲馬亦未可定原派四人為一朋明日著各將已馬親自看飲管轄之人亦著好生查視若有違㫖不飲者朕若查出决不輕貸其以此遍諭衆執事人員可也又召內大臣索額圖明珠大學士伊桑阿入行官諭之曰前者朕以逹賴喇嘛物故已久朕知之甚晰第巴隱之附和噶爾丹行事故差保住嚴詰第巴觀第巴差尼麻唐庫圖克圖來密奏其情則尼麻唐庫圖克圖到後必自陳逹賴喇嘛已故乞為彼隱諱向亦曾與汝等言之矣今尼麻唐庫圖克圖果奏言逹賴喇嘛物故已十六年再生小逹賴喇嘛已十五嵗乞皇上暫隱之勿聞於衆與朕昔語汝等之言略無少異索額圖等奏曰皇上逆料未來之事有如目睹此事果與昔日諭㫖略無少異古來哲后何能及耶臣等不勝驚異之至上又諭曰保住尚有未完之事著與尼麻唐庫圖克圖同往臣謹按第巴蓄心隂險指達賴喇嘛之名煽惑諸部頥指如意久矣故諱其死至十六年而䝉古諸部落不知也即土白特部落亦未必能知也我皇上聰明天錫燭萬里之情形如在目前摘隱伏之狡謀如指掌上及第巴引罪輸情遣使奏欵聖明於所欲言者又已先覺語云至誠前知易稱知幾其神殆謂此歟壬申駕次安定堡逹賴汗王布特逹阿卜地為擊敗噶爾丹事上疏稱賀逹賴汗疏曰奉到欽賜綵縀八端不勝歡忭臣等遵逹賴喇嘛法㫖如前和好往來伏䝉洞鑒敕㫖下頒殊為欣悅而第巴另有諭㫖中心甚覺憂懼知噶爾丹違㫖已䝉懲創自兹以後祈仍前歸好溫綸不絶謹具伴疏禮琥珀素珠氆氌上獻王布特逹阿卜地疏曰副住持喇嘛津巴扎木素德木齊索諾木臧布理藩院郎官保住賫到敕書綵幣六端當靣交授無任歡忭臣於此遵逹賴喇嘛法㫖奉兩宗道律勤修不懈但於皇上之事臣雖竭力未稱明㫖以致嚴敕下頒除另疏覆奏外併遣尼麻唐庫圖克圖明白口奏總祈睿照伏願鑒憐普惠正覺衆生俯念逹賴喇嘛道一風同修睦之素寬臣寡聞渺見自陳之欵緣臣無知䝉開導訓諭是以籲請大君慈悲敢求昭鑒錫以溫綸源源不絶謹具伴疏禮寶珠氆氌上獻又一疏曰伏以普恤衆生統御域內親征逆冦剪滅凶頑不留根株禮應慶賀謹具字帕一條克除一切巴咱爾巴逹拉納佛勝殘宣武幢等物上獻譬之於花雖易得之物而用以供佛總祈睿鑒理藩院以此三疏進呈上命議政諸臣議奏議曰逹賴汗慶賀擊敗噶爾丹一疏及王布特逹阿卜地遣尼麻唐庫圖克圖口陳一事係尼麻唐庫圖克圖密奏皆無庸議今賫到手帕一條佛一尊寶幢一件交內庫外其所獻素珠氆氌據使人羅卜臧凱尊囊素言我等輕身急來俱留在西寧俟主事保住到西寧後照數查收交地方官馳驛遞送奉㫖依議著差筆帖式一員偕保住往取諸物議政諸臣又奏曰查王布特逹阿卜地疏稱嚴㫖下頒不勝憂懼逹賴喇嘛避忌坐禪丑年出定俱已告諸內齊陀音庫圖克圖葉世格隆矣今令尼麻唐庫圖克圖密奏等語目下尼麻唐庫圖克圖來密奏亦且密諭不議外又疏稱䝉召班禪庫圖克圖臣反覆勸駕不知班禪庫圖克圖或為其年庚不利或為漢人䝉古之緣未到或為皇上神聖非常僧巴陳布尚不能稱上心自念其身亦未必得當故不赴召非懼博碩克圖沮之而不往也今當遵聖㫖問明班禪庫圖克圖或即令赴京或另日前往定議再奏等語應令將班禪庫圖克圖赴京吉利年月徐徐定議來奏又疏稱請俟後竭力拘解濟隆庫圖克圖伏乞皇上俯念宗喀巴逹賴喇嘛之教留其身命勿毁其戒體等語但濟隆庫圖克圖者逹賴喇嘛遣和喀爾喀厄魯特者也彼竟不和喀爾喀厄魯特反導之入邉與我軍交戰情罪甚為可惡前已有諭㫖不誅濟隆庫圖克圖然務必解來又稱噶爾丹之女或令離異與否伏乞睿裁等語噶爾丹抗君為我軍所敗逆賊情罪重大其女斷不得留於青海務必解京為是如噶爾丹來降或宥其女與否總出上裁又疏稱臣意以為凡事似未嘗悖逆而行但以無知或有違聖意之事伏乞寬宥前曾奏請遵㫖效力今但謹遵聖㫖竭力自效而已祈俯念達賴喇嘛錫以溫綸等語今王布特達阿卜地嚴㫖下頒不勝驚懼諄切奏請謹遵上諭而行祈俯念達賴喇嘛錫臣溫綸應遣使頒諭俟命下之日以諭王布特逹阿卜地敕文交內閣撰擬上從之癸酉上駐蹕興武營西命將軍孫思克減兵撥馬賫糧進征議政諸臣奏曰將軍孫思克疏稱噶爾丹為大兵所敗其黨羽紛紛逃散此際實甚窮困當乘機發兵𠞰滅令臣等速往薩克薩特呼里克一帶地方進𠞰乃我皇上聖明天縱料事未然非臣等至愚所能及也理宜立刻出邉進𠞰但滿兵䭾米之馬及炮手䭾馬坐馬未能齊備事關軍機伏乞敕下兵部不論何項馬匹照寧夏出征兵各給肥馬之例如數速解甘州一得䭾馬臣等即一靣起程一靣奏聞查得前於三月初五日行文將軍孫思克博濟令滿兵緑旗兵拴帶百日糧作速前進續甘肅巡撫郭洪奏稱將軍博濟二千兵牲口尚未料理若拴帶百日之糧僅用私馬勢斷不能議政議得西安滿洲兵二千每人有馬三匹應於二千兵內減去五百此一千五百馬令孫思克撥給彼軍所餘五百匹及巡撫郭洪等採買捐助千許馬內視臕大者撥給一千五百出行之兵每人二匹奏准在案則孫思克所稱滿兵無馬䭾米之處無庸議者也滿兵無䭾糧之馬將軍博濟當用滿文啓奏乃博濟不奏同孫思克以漢文啓奏至炮手無坐馬䭾馬孫思克理合先奏至命彼作速進兵始奏稱炮手無坐馬䭾馬又不開出炮手坐馬䭾馬數目孫思克博濟俱屬不合此文一到將炮手坐馬䭾馬著將軍孫思克博濟不論何處馬匹隨便撥給進征勿誤軍機上曰機㑹不可失孫思克博濟等兵䭾百日糧之馬炮手坐馬䭾馬即取伊等附近緑旗兵之馬如可不誤則令即行一靣奏聞如不能恰得則扣䭾百日糧之數減兵即取所減兵之馬䭾糧而行自寧夏進𠞰之兵朕意不過二千或二千五百伊等如謂減兵則寡而難行著進臨一處駐扎止令寧夏之兵進𠞰甲戌駕至清水營大將軍費揚古奏報厄魯特滚濟等來降費揚古奏曰喀倫解到厄魯特處逃出來降喀爾喀兩人滚濟鄂兒齊圖言我等正月二十三日自阿拉卜灘所居布顔圖河逃出來降聖上我等原係喀爾喀扎薩克圖汗屬下人於倭羅㑹湖地方喀爾喀厄魯特交戰被虜在厄魯特阿拉卜灘之下行走問滚濟等曰筆帖式黑色長史馬尼圖曽到阿拉卜灘處否阿拉卜灘居布顔圖河乎抑將他往乎噶爾丹在何所告曰黑色馬尼圖於正月十八日到阿拉卜灘處我等二十三日逃來時尚未相見不知阿拉卜灘將何所往我等來時尚在布顔圖河聞噶爾丹在薩克薩特呼里克問滚濟等曰丹津俄木布在何地阿拉卜灘之人除汝等之外猶有來降者否告曰聞丹津俄木布出洪郭壘矣不知其何所往我等逃來不敢對人言問滚濟曰阿拉卜灘以何物為食告曰阿拉卜灘等捕獸度日如不獲獸殺駝馬為食下人嗟怨言聖上於西方處處屯兵盡執噶爾丹所差使人我厄魯特今無路可行矣奏至上報聞且以示議政諸臣及吳逹禪等乙亥駕次橫城鄂爾多斯貝勒宋喇卜請於定邉等處貿易與民雜耕許之宋喇卜奏曰向准臣等僅於橫城貿易定邉花馬池平羅城三處不許貿易今若於此三處與橫城一樣貿易則諸䝉古各就近地行商大為利便乞准三處貿易又去嵗貝勒汪舒克公杜稜及我衆䝉古等奏請邉外車林他拉蘇海阿魯等處若得發邉內漢人與我䝉古一同耕種則漢人蒙古皆有利益命問之漢人再諭今當耕種之時謹奏請㫖上命大學士戶兵二部及理藩院㑹同議奏隨議鄂爾多斯多羅貝勒宋喇卜既奏言定邉花馬池平羅城三處與橫城一樣貿易又邉外車林他拉蘇海阿魯等處若發邉內漢人與貝勒汪舒克公杜稜及我䝉古公同耕種則於漢人䝉古俱有利益應准貝勒宋喇卜所請定邉花馬池平羅三處照橫城一樣貿易車林他拉蘇海阿魯等處如邉內百姓有情願出而耕種者許其出同耕種將此貿易耕種之事交貝勒宋喇卜等及地方官各自約束其人勿使爭鬭上准其議日後倘有爭鬬䝉古欺凌漢人之事即令停止丙子上自橫城渡黃河駐蹕河崖遣大學士伊桑阿祭黃河之神文曰朕以厪念安攘巡幸邉境自晉省濟河以來跋履千餘里厯秦延慶二郡之地兹復將濟河而西進扺寧夏惟神洪流灝漾膏潤宏長釃入漢唐之渠允貽朔方之利朕乘輿式涖秩祀宜申是用再遣専官䖍具牲帛致祭尚其丕彰靈爽永惠邉氓惟神默鑒焉皇上特遣皇長子諸大臣祭故將軍趙良棟上諭大學士伊桑阿曰趙良棟乃為國立功之人今已身故其𥚹急不足介意明日過其門當遣皇長子部院諸大臣弔之賜祭一次陳福亦為國效力之人現經此地亦賜祭一次著議政大臣滿漢大學士部院大臣㑹議來奏㑹議曰趙良棟為國立功之人前者總督傅臘塔都統諾邁身故有遣皇長子往弔之事趙良棟之勞勩較優於兩人請遣皇長子諸大臣往弔之賜祭一次陳福亦為國效力之人亦賜祭一次殊㫖下頒其妻子魂魄俱當感戴而臣等亦不勝踴躍上從之著左翼額駙尚之隆內大臣阿米逹右翼內大臣坡爾坡大學士伊桑阿每翼侍衛十人偕皇長子同往使驛站遞運軍糧時督運于成龍等議運米之事來回㫖上召入行宫問于成龍等曰爾等運米之事如何定議矣于成龍等奏曰運米關係重大或緊隨大兵或另設䇿運致伏候皇上指示遵行上曰米隨大軍運往重載長行牲口必致委頓不若從驛站遞運更番休息為宜鄂爾多斯今已備四個月糧現有駱駝又告請情願效力著伊等設百站遞運於事甚便又設站一事計自寧夏至郭多里巴兒哈孫大略一千二百里自郭多里巴兒哈孫至伊黑倭羅巴罕倭羅計行九日之程爾等扣算此路酌量安設于成龍奏曰去嵗運米奉㫖每石加耗米一斗運往今請加五升上允之曰運往之米多多益善又問于成龍等曰現有船幾隻每船裝幾何一次可運米幾石于成龍等奏曰去嵗有船百餘隻今俱在河內其中有被水浸壞者亦未可定請交總督吳赫作速修整船有未到者作速取來一船計裝三十石今有船百隻則一次可運米三千石上曰爾等船裝不盡之米著以牲口䭾運三千兵減去五百則牲口綽然有餘䭾運亦優然自裕爾等計二千五百兵口糧帶往著作速修船勿得遲誤至米袋尤為緊要其式宜小而堅堅則無拋撒之患小則易於䭾負爾等速諭知該撫皇太子箋奏曰奏為擒獲逆賊之孽子敬攄歡慶之微情事本年三月二十二日厄魯特噶爾丹之子塞卜騰巴兒珠爾解至京師官民填巷盈衢聚觀擁視皆言此逆賊之子在荒逺絶塞之區今為我所擒者皆聖謨神武震服逺人之所致也踴躍歡忭臣同諸弟兄諸王羣臣恭惟父皇聖德神功超出萬古天威誕布無逺不服惟此噶爾丹逆天違誓罪惡貫盈父皇念切民生不憚勞苦親統大兵三臨絶塞凶殘逆黨接踵歸降窮冦聞風倉皇逺遁噶爾丹力竭困蹙不久可必其獻馘矣今觀其子塞卜騰巴兒珠爾就擒囚之檻車解送京師則此賊恣行年久播虐塞外前既陳斬其妻今又生擒其子此賊益膽破魂飛斷可計日授首矣邉塞永清凶逆盡滅普天中外長享太平之福臣等不勝踴躍歡忭之至為此謹具奏聞丁丑駕臨寧夏駐蹕准厄魯特降人呐黑圖等食糧郎中滿都奏曰本年二月三十日主事丹巴解厄魯特降人呐黑圖等七十口到厄魯特等營內伊等無屋可居故於三旗察哈爾內每旗取帳房三頂分派安插照例給之口糧外呐黑圖等訴曰我等聞聖上待厄魯特仁愛非常俱編入旗隊使之披甲每月䝉天恩食糧度日但我等未到京者皆無錢糧我等俱一體來歸聖上之人亦乞每月給我等一兩之餉臣查得呐黑圖等七十人口內有堪披甲者三十二丁海拉圖下等三十三口內堪披甲者十丁伊等俱未到京不遇編入旗隊披甲之事故未獲錢糧又布喇其寨桑等一百三十五口內四人已授官職其堪披甲者五十一丁亦未編入旗隊披甲故未獲錢糧布喇其寨桑一起已於驛站助羊一百給之矣念厄魯特等俱來歸聖上浩蕩洪仁之內請一例每月給錢糧一兩此後厄魯特來降人內有堪披甲者亦照伊等每月給錢糧一兩上從之恩恤寧夏陳亡官兵遣官奠醊上諭大學士伊桑阿曰朕既臨此地著查寧夏陳亡官兵加恩陳亡官員有遣官奠醊之例如有陳亡官員著遣官致奠是日上遣皇長子往弔故將軍趙良棟戊寅嚴禁借端科派時總督吳赫率寧夏將領朝見上諭吳赫曰朕巡幸沿邉地方詬察閭井生聚及土田沃瘠之狀自晉及秦經行二千餘里直抵寧夏所以勤求民隱至殷且切惟朔方資大河之灌注疏渠溉田宜於稼穡當兹春風暢遂正三農盡力南畝之時誠恐有司官員不體朕懷因車駕經臨調遣師旅借詞供億擾纍小民既東作之有妨將秋成之奚望今一切軍需芻糗俱已儲偫足以資用至扈從人員概從簡約所有馬匹悉牧放水草善地並不須供辦草豆動煩民力爾可傳飭有司禁勿借端妄行科派違者事覺定行處分仍遍諭地方百姓務各安本業㕓無廢市隴無輟耕庶不負朕親厯邉圉軫恤民依之至意臣謹按我皇上勤求民隱宵旰不遑即勤兵逺出機務正繁而於閭井之生聚土田之沃瘠翠華所臨必加咨詢蓋無時無念不以民依為重也至於師行芻糗儲偫有方騶從清嚴絲毫不擾而猶恐不肖有司借端供億私斂小民特飭嚴諭概行禁止自古有事西陲者多矣顧師旅甫動則輸挽為勞軍馬經過則驛騷不免豈有出塞萬里行師數年而閭閻無轉運之勞邉鄙鮮橫索之苦良由我皇上事事精詳睿謀先定故能不煩民力而坐奏膚功也檄青海台吉䇿旺拉卜灘保護哈密理藩院奏曰為保護哈密事請檄青海扎什巴圖爾等八台吉曰哈密之達爾漢白克額貝都拉向慕皇上德化誠心歸順朝聘貢奉不絶於道今又擒獲噶爾丹之子塞卜騰巴兒珠爾土克齊哈什哈等人陸續來獻逹爾漢白克額貝都拉既已來王內屬恐爾等下人無知擅行侵擾亦未可定著各將屬下無知之人約束嚴禁毋得妄行侵擾奏入上曰保住於二十九日遣行發青海文即付保住帶去發䇿旺拉卜灘文付侍郎常綬帶去諭內大臣大學士等曰著將寧夏所有鄉紳或武進士武舉武生及殷實人民有情願自偹資用軍前效力者開名奏聞己卯命大將軍伯費揚古率兵來㑹於郭多里巴兒哈孫地方上諭內大臣等曰今即酌量寧夏兵前到郭多里巴兒哈孫地方之日檄令大將軍伯費揚古率兵來㑹核查扈從人口數目安插馬瘦人員於䝉古驛中上諭大學士伊桑阿曰著查明隨駕前往之大臣侍衛護軍執事人員部院官員人口數目核算所需口糧總數幾何併查明大臣侍衛執事人員瘦馬數目如部院官員亦有馬瘦者俱安插䝉古驛站中恩賜昭木多翁金陳亡寧夏官兵銀兩先是上諭大學士伊桑阿曰朕今親臨此地著查寧夏官兵去嵗於昭木多翁金地方陳亡者來奏其議叙之處該部照常議叙外官員則遣侍衛往弔兵丁則於此地給身價銀至是寧夏總兵官王化行造册送到伊桑阿奏言查寧夏陳亡官二員兵丁六十一人遊擊陳維屏係福建人其妻子攜柩已回原籍此地遣弔給身價之處無庸議千總劉進孝之妻現在此地應遣侍衛往弔之處交領侍衛內大臣照例給身價銀一百五十兩其馬兵六十一名照例各給銀五十兩共需銀三千二百兩此銀應著該督支給上從之以採買馬駝撥給將軍孫思克之兵侍郎西米圖等奏曰臣等㑹同地方官自三月初五日起至十五日止買得駱駝六十一頭馬三百三十五匹騾八十匹上命議政諸臣議奏議曰近者㑹議得巡撫郭洪等採買捐助一千許馬駝內臕大者撥給滿兵嗣後馬駝騾牛羊請停採買奏准行文在案如前給孫思克等兵臕大馬駝不足將此續買駝騾撥給如孫思克等之兵已經起行則交地方官喂飬上從之將軍孫思克等奏報俟得馬運糧即當進兵之事議政諸臣奏曰將軍孫思克等疏稱奉上諭云前已行文孫思克令彼文到一靣啓奏立刻起行今其馬臕如何何時至嘉峪關幾日可到薩克薩特呼里克何日起行此文一到作速遣奏欽此臣官兵馬俱肥壯自甘州至嘉峪關第七日可到自嘉峪關到薩克薩特呼里克須用一月現有褪下五百滿兵之馬一千五百匹緑旗兵所喂馬五百匹共二千匹其炮手䭾米之馬一千一百十二匹尚未撥給俟馬一得即一靣起行一靣啓奏查㑹議奏言炮手坐馬䭾馬應令將軍孫思克博濟等不論何處馬匹隨便撥給進𠞰奉㫖機㑹不可失孫思克等䭾米之馬炮手䭾馬坐馬即取彼處緑旗兵之馬而行如不能恰得則扣米數減兵䭾米而行如彼云不能行則前進駐扎令寧夏兵進𠞰欽遵行文在案是孫思克等所稱馬未撥給之處無庸議者也上從之庚辰大將軍費揚古奏報員外博什希等出使噶爾丹歸先是遣員外博什希筆帖式常夀偕噶爾丹使人格壘沽英賫敕往諭噶爾丹至是費揚古奏報曰據侍郎滿丕咨言三月二十二日出使噶爾丹之員外博什希筆帖式常夀及噶爾丹使人喇木扎卜等併格壘沽英本身連妻子十三口俱到為此先以博什希奏摺咨送前去若博什希等到後即遣赴行在則人多而行路必致遲誤且格壘沽英身帶重傷不能速行是以差人往迎將先使博什希格壘沽英之子吳巴什察哈代三人星速馳赴行在續使常夀格壘沽英曼濟阿旺丹津及噶爾丹使人拉木扎卜丹濟拉使人羅卜臧等亦星速馳往謹先以博什希奏聞摺子遞送呈覽其奏摺云臣博什希等謹奏臣等欽遵諭㫖於正月二十九日距噶爾丹所居薩克薩特呼里克以內二日之程抵台吉吳思塔處止臣等毋前三十日格壘沽英往告噶爾丹二月初二日噶爾丹使綽什希巴圖爾來謂臣等曰我汗聞㫖不勝歡忭今日吉辰請領敕書另日與欽差相㑹臣等奉敕書授之十二日厄魯特之滚濟來云我父賽音轄曾克噶爾丹之使得受皇恩我妻現在京城此地有我兄什逹里我二人必視便往降皇上十四日綽什希巴圖爾來言我汗遣我來請欽差相見博什希常夀將與俱往綽什希巴圖爾言我汗但請欽差相見是以臣博什希日午起程乘夜而行次日日午至噶爾丹之地但云少待即請相見遷延日落噶爾丹乃至野外坐巖上令臣逺坐使二人夾臣膝坐兩旁不令近前迭相傳語宣聖諭畢噶爾丹曰我聞皇上沛此溫綸不勝欣藉自今聖上凡有所諭惟遵㫖以行而已我之言已在疏內我之意已語我使人使人到日當口奏也語畢即起乘馬而去臣亦回帳中二十四日丹濟拉遣其下常逹里來述丹濟拉之言曰前䝉聖恩授察哈代以諭臣之㫖聞之不勝歡忭皇上洪恩如海臣非知而故避之但臣有所難故且止於此今敕內開載臣名復口授格壘沽英溫㫖臣即欲遵㫖而行奈噶爾丹疑臣不復差遣臣是以將中心欲奏聖上之言俱告之察哈代又語之格壘沽英矣今不便特請欽差相見敢布𠂻曲惟欽差垂察焉因車陵之使楚呼拉格隆言車陵已往額克阿拉爾去矣故給以部發印文而遣之因伊拉古克三庫圖克圖之使阿爾逹里轄言伊拉古克三庫圖克圖由額客敖拉至古爾班克勒採稆為食遊牧而去矣故亦以部發印文給阿爾逹里轄而遣之是日綽什希巴圖爾率拉木扎卜等兩人來告云昨派出格壘沽英為使彼挈其妻子潛逃是以派出拉木扎卜代使奏疏及一應言語俱在是人故送之來臣博什希等二十五日自薩克薩特呼里克起程而來遇前此自京前去之察哈代曼濟問察哈代云與汝同行之卓里克圖逹爾漢巴克什等俱到彼否伊蘭太等何以不與爾同來答曰卓里克圖達爾漢巴克什吳爾占扎卜之母逹爾扎哈什哈之妻子及其家人俱已到彼矣伊蘭太等與我同行至松柯羅阿濟爾罕西方瀚海而宿夜有二十餘人執械來襲劫我馬駝我僅取得一瘦馬餘皆被劫天明後我帶馬夫凖塔爾捧敕書步行至格格特哈郎古特地方遇納爾拜噶卜楚攜我見噶爾丹我以敕書授噶爾丹又以我被劫及吳爾占扎卜之母等俱被劫之事告噶爾丹噶爾丹言爾識其地當遣綽和羅多爾濟同爾往迎而來我經六七宿回迎伊蘭太等一人亦不在原處矣我駝疲乏乃留止綽和羅多爾濟往尋至車爾貝阿爾薩蘭寨桑家見卓里克圖逹爾漢巴克什逹爾扎哈什哈之妻子向彼問伊蘭太何在答以不知綽和羅多爾濟乃帶卓里克圖逹爾漢巴克什見噶爾丹言其故噶爾丹又發二十餘人同綽和羅多爾濟往擒車爾貝阿爾薩蘭寨桑及其家産令人審訊言彼家人名對烘者劫其牲口交其家中又一人已在逃云噶爾丹言牲口既係彼取去則人亦係彼所殺遂將車爾貝阿爾薩蘭寨桑夫妻給以兩男一婦令徒步逐至哈密斬其家人對烘等四人其餘人口家産俱抄沒至卓里克圖逹爾漢巴克什欲竊綽和羅多爾濟之馬而逃綽和羅多爾濟覺之執而殺之矣吳爾占扎卜之母阿爾拜家人遇見送噶爾丹已交還伊子吳爾占扎卜矣逹爾扎哈什哈之妻子家人亦交吳爾占扎卜使之暫飬我之馬夫我已帶來噶爾丹差人各處尋覓伊蘭太張正宗俱無跡云問曼濟阿旺丹津曰爾等同行鄂爾齊圖垂逹克俱到本地否伊等何以不與汝同來曼濟言我至噶爾丹處鄂爾齊圖垂逹克皆各散去我之來也急伊等不得而聞我於正月初一日到薩克薩特呼里克初二日見噶爾丹捧敕書授之噶爾丹問聖上之兵如何我對曰不知其數兵甚多見其往來更調噶爾丹又問兵何以至今駐扎我對曰因丹濟拉兵來故仍在彼防備噶爾丹又問見丹巴哈什哈察罕什逹爾哈什哈等否我對曰丹巴哈什哈察罕什逹爾哈什哈已授職為內大臣在京以沙克珠木為內大臣待之如舊臣隨駕而行噶爾丹又問衆厄魯特如何撫飬我對曰衆厄魯特俱加愛飬有離散之人各處尋覓皇上親視配合我皆親見之噶爾丹默默無言一日噶爾丹至諾顔格隆家丹濟拉阿巴吳爾占扎卜俱在坐飲酒吳爾占扎卜謂噶爾丹曰我輩自去年冬以薩克薩特呼里克獸多故居於此今獸已駭散矣春間青草將出如往降聖上則往近之如不降當另圖一䇿首鼠兩端而待斃乎且汝又欲扶宗門之教以行事致四厄魯特七旗喀爾喀已略盡矣爾國已破父子夫妻離散我輩從汝自始至終惟汝意所欲行究無補於宗門之教反造罪業而已我輩知汝之非未嘗出聲今不能忍忿恨而發此罪當先加汝身墮於地獄後及我輩才入地獄耳噶爾丹默無一言諾顔格隆責吳爾占扎卜曰太平之時衆人安樂何不言及君恩覆庇今有所失而責汗如此為臣僕者固可如是議君乎吳爾占扎卜曰吾醉矣乃妄談耳噶爾丹所有人丁共三百餘其他俱各捕獵逺去有馬兩匹者多有馬一匹者亦有之亦有饑餓而死者馬臕甚瘦視噶爾丹情狀大約不降丹濟拉延我至其家問曰中華皇帝亦曽道及我乎我言中華皇帝屢言汝貌偉材長又不時道及吳爾占扎卜及汝兩人我又謂丹濟拉曰爾乃主持噶爾丹之事之人何不勸噶爾丹歸附聖上丹濟拉言爾乃在聖上駕下前來之人爾可曉諭吾汗果似降中華皇帝我欲充使而往視丹濟拉情狀有欲降之意又諾顔格隆問我曰中華皇帝大略何如我言聖上真仁慈佛主諾顔格隆曰爾何以知其詳我言中華皇帝自昔通使詔敕往來略無間斷曾有欺罔吾等之處乎又吳爾占扎卜之母歸謂噶爾丹曰彼國大兵多富而且盛中華皇帝乃活佛也敵人母子遣使完聚爾等從前亦曾聞有是否其餘非常之舉言之不盡阿旺丹津告曰奉㫖差我使於伊拉古克三庫圖克圖故不往噶爾丹所居地方又不知伊拉古克三庫圖克圖所在是以與曼濟同歸於是帶諸人同行三月初九日至哈達圖布拉克地方遇格壘沽英格壘沽英言我見噶爾丹言欽差博什希筆帖式常夀同我賫敕書來又有中華皇帝口傳之㫖云爾以追喀爾喀之故而來犯我爾之理曲我之理直故天祐我而擊敗汝雖為我敵而朕不以擊敗汝為喜爾今無所往矣北有䇿旺拉卜灘東有根敦帶青皆爾之敵也西有阿南達率兵備守此天之下君無大於朕者如倚朕為生必得生路如他諸國豈堪居其下乎爾果來歸朕則寬汝之罪尊榮飬育爾雖欲不降朕豈於汝漫然而已乎宣諭畢噶爾丹默然無語使綽什希受之噶爾丹問我曰中華皇帝大略何如我對曰爾降則不奪爾汗號待以寵榮使衆人咸得生路中華皇帝忠而且信似爾詭詐以計殺人不但未見亦所未聞噶爾丹問我何處見中華皇帝我對曰在鄂爾多斯地方見中華皇帝賜我以茶諭之曰喀爾喀非為被爾厄魯特所敗皆已歸朕爾以追喀爾喀而來犯我是以亦敗我奏曰喀爾喀非為為我所敗我之於喀爾喀譬之捕兔而獻之聖上以此思之我等有功之人也中華皇帝大笑噶爾丹言中華皇帝昔未嘗如是也今無人不見舉動殊彪炳矣我又曰我來時路見尚書班第以坐塘之人勞苦賞為首者銀十五兩次者十兩最下者五兩又見萬許車裝糧運至將軍汛地又見黃河沿相近脫脫城中貯倉之米譬如扎巴哈河北沙岡無異噶爾丹又問他處猶有米倉否我對曰邊上沿途俱有米倉丹濟拉引我於無人之地問之曰中華皇帝亦曾道及我乎我言中華皇帝不時向我言汝丹濟拉貌偉材長丹濟拉言我曾謂噶爾丹當降已一二次而不聽吾言其狀亦疑我爾試言之如降則我為使而往視丹濟拉情狀有欲降之意我在噶爾丹處六日我竭力勸諭而噶爾丹不可實無降意仍遣我同使思噶爾丹一無實意而我又充使來誑可乎是以起行之前攜我妻子六十餘口馬百餘匹駱駝四十餘頭來歸聖上及到什魯忒地方欲待汝等使臣同來暫宿數日伊拉古克三庫圖克圖親率百餘人卒然掩至我身及妻三子一幼孫共十三口取馬三匹駱駝一頭而出我媳及其餘人馬駱駝什物俱被劫去我右肩背下洞中鳥鎗傷是以帶格壘沽英及其子吳巴什察哈代曼濟等星飛前來為此謹奏費揚古為之轉奏上以示議政諸臣使將軍孫思克等暫緩進兵上諭議政諸臣曰本朝出使噶爾丹之員外博什希等歸至邊哨先具本奏言格壘沽英攜其妻子來降噶爾丹亦遣使來云人尚未到俟伊等到時問明噶爾丹或降或他去方可進兵今速檄孫思克博濟止其進兵俟事明檄知而行遣使往諭第巴第巴引罪一應諭㫖無不順從又請念達賴喇嘛錫之溫綸是以遣理藩院主事保住署主事薩哈連偕尼麻唐庫圖克圖賫敕使於第巴瀕行入請訓㫖上諭曰爾等到後待第巴勿如從前舉動宜加和婉授敕畢爾等仍前作禮獻幣但謂第巴曰皇上統領大兵已臨寧夏因前事四欵爾皆遵㫖皇上大悅故不進兵至爾尼麻唐庫圖克圖來密陳逹賴喇嘛出定之事上皆知之矣亦有密㫖諭尼麻唐庫圖克圖矣此事除皇上與尼麻唐庫圖克圖卓磨隆堪布及御前侍衛喇什四人外餘皆不知也自此以後皇上一應諭㫖爾惟敬奉而行則皇上愈眷顧爾矣况與逹賴喇嘛講信修禮已六十年有不念及者乎且謂汝務使諦穆庫圖克圖與我等同赴京上將使之誦經如服水土則令住錫如不相宜則照尼麻唐庫圖克圖例亦即遣還較尼麻唐更加優待再口宣㫖云噶爾丹之子及其屬下大臣以至部伍皇上俱收而納之矣至爾等前往可於扎什巴圖爾台吉處取諳地里之鄉𨗳而去既到西方歸來之時可於第巴處取驛馬乘歸上項情事爾等備文用部印帶往至喇嘛津巴扎木素等勿俟逹賴喇嘛出定爾等即携之而歸敕曰皇帝敕諭王布特逹阿卜地朕臨御天下統理萬邦溥播仁恩懲創亂逆其誠心恭順者必加奬賴焉爾布特達阿卜地前與噶爾丹同謀凡事必狥厄魯特而行濟隆庫圖克圖敗乃公事堅留不遣其時朕謂達賴喇嘛若在斷不至此故嚴加詰責兹爾奏言聖上嚴㫖下頒心甚憂懼令惟謹遵聖諭隨力報效倘軫念逹賴喇嘛乞降溫綸諄切奏請爾既知過引罪朕豈不念逹賴喇嘛修禮同好歷有年所乎且朕若不加眷恤爾土白特國豈得安其生耶其濟隆庫圖克圖乃逹賴喇嘛所特遣以合喀爾喀厄魯特之好者也彼竟不使喀爾喀厄魯特和好反𨗳厄魯特入我境內與我軍交戰情罪甚為可惡務必擒解彼之戒體身命朕俱准爾所請寬而宥之其班禪庫圖克圖應利何年月日來朝爾從容定期具奏至噶爾丹與朕抗我師大克之凶惡逆賊情罪重大其女斷不許留於青海爾必解來若不解送則罪歸於汝矣如噶爾丹果悔罪來歸其時另有處分今尼麻唐庫圖克圖至將爾奏請之言俱已密奏朕前朕亦密有諭㫖朕之雅懷惟願率土之人咸躋雍和共享安樂斷不欲摘發隂私傾人家國嗣後爾宜益加恭順勿違朕㫖朕盡棄爾前罪嘉惠如初如此則爾土人民大䝉利賴爾之榮貴可獲長享矣為此特遣正使理藩院主事保住副使署主事薩哈連以降敕例賜幣六端聖祖仁皇帝親征平定朔漠方略卷三十九

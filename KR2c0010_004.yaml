body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷四康熙二十六年正月丙申喀爾喀兩翼汗及七旗濟農諾顔台吉等合疏請上尊號土謝圖汗等疏曰喀爾喀兩汗率領七旗貝勒等謹奏至聖皇帝睿覽蒙皇上鑒照時事欲安輯逺方往諭達賴喇嘛遣使并差大臣會同七旗大喇嘛折卜尊丹巴庫圖克圖召集汗濟農諾顔台吉等宣讀訓旨我等欽遵聖諭不敢有違普濟衆生得大安樂道既蕩平法亦恢布聖主鴻恩無計酬報口不能悉敢竭悃忱請上尊號伏祈仁慈憐而受之疏入諭曰喀爾喀諸汗貝勒等戴朕向來仁恩恪恭敬順請上尊號具悉悃忱但衆汗貝勒等宜仰體朕一視同仁無分中外至意謹識朕諭和之旨自兹以後無相侵擾親睦雍和永享安樂更勝於上朕尊號也况前者內外諸王貝勒大臣等請上尊號未經允行此所奏請亦不準行著理藩院將此情由行文曉諭之乙巳土謝圖汗奏請敕印土謝圖汗奏言我喀爾喀國從來聘享貢獻服教承恩得以安居樂業間有微愆亦蒙聖訓悉與湔洗國中向無佛教是以愚迷自我曽祖往謁達賴喇嘛得蒙優禮加以瓦察喇賽音汗之號於是我地佛法炳如日星延及我身往謁達賴喇嘛蒙其俯恤授以道法宏訓錫以名號印劄又蒙皇帝寵眷厚加恩賚俾得暢遂兹特懇者敢祈與遐荒萬國君長中分别優異之錫以金章寶劵俾世世子孫恪恭固守奏至上曰喀爾喀兩翼授受屬裔之事未結未便遽與印章可將原疏發還口傳旨諭之二月丙子命以車臣汗長子伊爾登阿拉卜灘襲汗號時車臣汗殁其長子伊爾登阿拉卜灘遣使奏聞上曰喀爾喀七旗誓和未久車臣汗之位不便久懸其敕諭土謝圗汗折卜尊丹巴庫圖克圖扎薩克圖汗等將車臣汗長子伊爾登阿拉卜灘速襲為汗仍遣敕曉諭達賴喇嘛知之賜土謝圖汗等敕曰朕惟自古帝王統御寰區遐邇一體其歷年久逺職貢恭順竭盡誠心者益加眷賴焉爾等纍世悃誠遣使入貢恭順有年正在嘉賞忽聞車臣汗身故朕殊震悼特遣大臣遺之賻贈近念爾喀爾喀內自交惡朕特遣大臣諭令和睦未久車臣汗之位不可久虛爾喀爾喀例以長子承襲伊爾登阿拉卜灘台吉既係長子且聞其人亦可著嗣立為汗爾等其遵諭速行賜達賴喇嘛敕亦如之四月甲寅噶爾丹遣使入奏噶爾丹疏曰巴圗爾額爾克濟農羅卜臧滾布額爾德尼和碩齊之事前遣內大臣已向我等言之矣今聞又以伊等之事聞之達賴喇嘛信有之乎四厄魯特與漢人貿易之事如仍復舊例則事皆歸好矣又一書遺尚書阿爾尼等曰喀爾喀七旗之事達賴喇嘛雖曾遣扎爾布奈往盟七旗不能從其言今聖主欲使大衆安樂遣使於達賴喇嘛達賴喇嘛遣西勒圖與天使偕往會盟七旗是役也折卜尊丹巴與西勒圖相見之禮殊屬未當此係得之傳聞者如果真則萬無是理也前內大臣來時據云聖主之意以為法門者黃帽法門喇嘛者達賴喇嘛也諸使臣當視有裨於黃帽法門者而行之我等乃黃帽之施主故以所聞之言致書於諸大臣大約道法以何者為善其明白致覆奏下所司議理藩院議以貿易之事已有定例喀爾喀七旗會盟其事已畢所奏應無庸議上是之五月辛卯命以伊拉古克三庫圖克圖為總管京城喇嘛班第扎薩克大喇嘛丁酉折卜尊丹巴庫圖克圖奏報噶爾丹貽書詰責情事折卜尊丹巴奏言噶爾丹遺書於我內云枯冷白爾齊爾之盟爾與西勒圖抗禮踞坐大為非理達賴喇嘛道法遍及十方西勒圖者係宗喀巴座上之喇嘛特遣以主盟議事者也若竟行鈞敵之禮於理順乎奏至下所司議理藩院議以去年盟會西勒圖與折卜尊丹巴議定而後相見已往之事應無庸議上是之六月甲戌土謝圖汗奏報扎薩克圖汗與噶爾丹會盟情事土謝圖汗奏言噶爾丹以枯冷白爾齊爾之盟折卜尊丹巴與西勒圖敵禮相見甚屬非理貽書詰責近聞噶爾丹遣伊屬車臣吳巴什者令右翼會盟即盟所讀其誓書略曰汝右翼人等毋得違扎薩克圖汗號令違者即為叛教以羅卜臧賽音台吉為例又聞噶爾丹移營前來由阿爾台山陽進三黑格爾之地扎薩克圖汗亦移營前往會之又噶爾丹不許得克得黑墨爾根阿海來歸左翼令其移營前往且令右翼諸諾顏等隨扎薩克圖汗環繞安營噶爾丹前書之詞既甚凶狠今偵得復欲加兵於我倘或不備則坐受攻伐如欲備之恐蹈先舉之愆謹以此情事奏明奏至上曰扎薩克圖汗受朕恩最深此言或係下人虛傳疑間其檄知土謝圖汗當以日前誓和為重永歸於好九月庚子敕諭厄魯特喀爾喀罷兵時土謝圖汗帶青諾顏墨爾根台吉遣使奏言噶爾丹書至我等曾遣使致覆彼言我乃黃帽大施主心不釋然終必在此伺察等語我喀爾喀之在彼國者及厄魯特向與我等通好者俱言噶爾丹分南北兩路來伐是實我喀爾喀右翼人等除扎薩克圖汗及得克得黑帶靑台吉之外餘者俱言興兵是實我界上人等驚惶屢促我等赴彼是以率兵起行伏乞聖鑒去年盟誓時扎薩克圖汗之情形非特尚書見之他人亦盡知之彼現今與厄魯特杜噶爾阿拉卜灘台吉一處遊牧詳視噶爾丹之狀大有爭執禮體是非之意為此馳奏奏至旨下議政王貝勒大臣集議安親王素諳蒙古事宜亦令集議議曰厄魯特喀爾喀俱係本朝職貢之國應遣敕令其罷兵同歸於好仍敕達賴喇嘛令其遣使諭令罷兵其土謝圖汗敕書即發來使布延圖綽克圖寨桑等賫去噶爾丹敕書即交來使陶賴哈什哈等乘驛賫去達賴喇嘛處敕書發與喇嘛商南多爾濟郎中布顏圖賫去上從之賜噶爾丹敕曰據喀爾喀土謝圖汗奏稱厄魯特內向遊牧兩路來攻我界上人等屢請赴彼故出兵迎之等語朕統御宇內無分中外爾厄魯特喀爾喀兩部落若果互相殘害朕心大不忍焉曾於康熙十六年檄諭爾等務期共相和好爾覆奏云厄魯特蒙古之道仗達賴喇嘛福庇得以鞏固聖諭誠是等語爾噶爾丹博碩克圖汗纍世恭順職貢有年如果舉此大事無不奏聞於朕者因路逺地遙真偽難明朕尚未之深信或不逞之徒兩地搆煽亦未可定爾兩部如果興兵必有一方至於敗亡不但重負朕向來一視同仁之至意羣黎之死亡離散朕心深為憫惻敕書到日即為息爭修好則爾恭順之心朕實嘉之亦已敕諭土謝圖汗令其罷兵矣為此特令爾使陶賴哈什哈等賫敕往諭賜土謝圖汗達賴喇嘛敕略同十月己巳巴圖爾額爾克濟農自請往援土謝圖汗巴圖爾額爾克濟農移文於理藩院曰伏思前讐急欲往援土謝圖汗但身屬朝廷不敢專擅乞轉奏聖明俯鑒允許所慮貧苦屬裔欲多往則途路遙逺艱於馬匹少往則救援勢寡又乏器械至欲奏報所聞緊急大事若由舊路而往則逺若自鄂爾多斯而往未氷之時又難以渡河自寧夏前往路雖近而不許擅行此等情由祈即示知理藩院以聞命滿洲大學士及兵部理藩院集議議曰頃者土謝圖汗奏聞發兵皇上軫念喀爾喀厄魯特纍世恪共職貢特頒聖諭令其和好又敕達賴喇嘛遣使諭兩部落息兵罷戰則巴圖爾額爾克濟農所請之事應無庸議至巴圖爾額爾克濟農倘欲奏聞緊急重情遇氷凍時經鄂爾多斯著貝勒宋拉卜派人引路送至京城若氷消時從寧夏入口寧夏總兵官派人引路送出橫城口至鄂爾多斯貝勒宋拉卜仍派人引路送至京城其遣奏緊急重情不許過三四人若常貢遣使仍照前行議入上從之康熙二十七年三月丙子命尚書阿爾尼以遣使俄羅斯集議事曉諭喀爾喀時俄羅斯察罕汗遣使費嶽多羅等至色稜格地方來期我使至彼集議定界上命內大臣索額圖都統公國舅佟國綱及尚書阿爾尼左都御史馬齊護軍統領馬拉等往主其議并率八旗前鋒兵二百護軍四百火器營兵二百偕往理藩院侍郎溫達自殺虎口起設站至喀倫歸化城副都統阿玉璽自歸化城撥車載米一千石運至喀爾喀地方接濟大軍又我軍經過喀爾喀或致震驚阿爾尼其往諭折卜尊丹巴庫圖克圖令其曉諭喀爾喀等照常安居貿易四月甲寅遣內閣學士拜里往諭噶爾丹時喇嘛商南多爾濟郎中布顏圖等攜達賴喇嘛疏至其略云皇上撫視人民中外一體聞厄魯特喀爾喀兩國相殘即遣人賫敕諭和今遵聖諭又遣卜克岡喇嘛去矣仍祈皇上睿鑒或頒敕諭或再遣人示以去殘之道理藩院以聞上遣內閣學士拜里喇嘛阿齊圖綽爾濟往諭噶爾丹六月癸丑折卜尊丹巴庫圖克圖遣使告急折卜尊丹巴遣使告曰去年聞噶爾丹率兵三萬餘分道而來誘我扎薩克圖汗及得克得黑墨爾根阿海達爾馬西里諾顏等叛去我土謝圖汗以為前年七旗業已誓和今若輩叛者何也乃領兵將此三人拘回又聞噶爾丹之弟多爾濟扎卜滾占滾卜等領兵來掠右翼班第帶青台吉巴爾丹台吉卜圖克森庫圖克圖等之人畜而去土謝圖汗因追殺多爾濟扎卜其所掠卜圖克森庫圖克圖巴爾丹台吉等五人不知所在其餘台吉及屬裔盡行收回又聞噶爾丹領兵三路而來土謝圖汗與西海羅卜臧滾布領兵至噶爾丹所駐喀喇厄爾其克察汗厄爾其克之地遇達賴喇嘛使者所遣人言皇上及達賴喇嘛使汝與厄魯特和好宜各領兵而退土謝圖汗不敢違已率兵退駐楚克獨斯諾爾地方以候盟會今噶爾丹自杭愛山後掠取右翼衛徵哈灘巴圖爾車臣諾顏伊爾登台吉左翼昆都倫博碩克圖等至忒木爾地方土謝圖汗之子噶爾旦台吉與戰陳亡幾及百人噶爾旦台吉及厄爾竒木帶青等八人僅免又聞丹津溫卜丹濟喇杜噶爾阿拉卜灘等率兵來取厄爾德尼沼之地其地距我所駐祗二日程情事緊急不及繕疏一面奏聞聖上一面發兵前往念我喀爾喀向蒙聖主大恩安居樂業今事在危急仰祈睿鑒速為救濟理藩院以聞上敕諭折卜尊丹巴庫圖克圖曰爾喀爾喀與厄魯特向在本朝往來進貢聞爾等內自交惡故遣人諭和今汝等果不得已來歸當收而養之因汝誠心奏請故特賜汝信帕一幅並恩賞來使又諭檄知設站侍郎溫達傳示各汛設防哨探庚申尚書阿爾尼奏報厄魯特敗喀爾喀兵阿爾尼奏言臣至喀爾喀境已將我軍赴俄羅斯議界取道之故諭知沿途居住墨爾根諾顏及車臣汗旗分台吉令其照常安居貿易勿得驚擾未至折卜尊丹巴所距七八日程聞噶爾丹兵已至厄爾德尼沼臣不之信一面遣臣偕來內閣侍讀海三代乘驛赴折卜尊丹巴所詳察情形臣亦一面探聽聞噶爾丹兵擊敗衛徵哈灘巴圖爾昆都倫博碩克圖又收服達爾馬西里諾顏台吉兵衆向厄爾德尼沼而來土謝圖汗噶爾旦台吉逆擊之為所敗不能與其妻子會僅收集所屬二三百人駐於齊其爾台之地噶爾丹兵盡掠厄爾德尼沼居民直抵喀喇卓爾渾之地距折卜尊丹巴所居僅一日程折卜尊丹巴攜土謝圖汗妻與子媳及喇嘛班第等共三百餘人夜遁喀爾喀通國各棄其廬帳器物馬駝牛羊等紛紛南竄晝夜不絶土謝圖汗不知存亡或言此厄魯特軍中噶爾丹在焉兵萬許分數路而來又言噶爾丹未嘗親來乃杜噶爾阿拉卜灘等率六七千兵由杭愛山陰而來其殺掠喀爾喀收降台吉焚燒寺廟毁壞經典佛像俱實臣因據形勢之地以待之俟海三代歸日另有情形再奏外謹此具狀以聞奏至上諭曰喀爾喀厄魯特交戰當防守我邊界其令兩翁牛特兩巴林克西克騰四子部落阿祿科爾沁喀喇沁等八旗共派兵二千五百每旗擇幹練善於約束之台吉各一員或都統或副都統各一員參領各二員佐領各四員於蘇尼特喀倫一帶暫駐防守七月壬申命議安置入邊喀爾喀事先是車臣汗伊爾登阿拉卜灘病殁上遣侍衛阿南達員外郎克什忒致賻至是阿南達等從車臣汗處歸奏曰臣等於五月二十五日抵車臣汗所探知噶爾丹之弟多爾濟扎卜領兵四百前來哨探土謝圖汗子噶爾旦台吉擊殺之是以噶爾丹領兵前來敗額爾濟根衛徵哈灘巴圖爾之軍焚厄爾德尼沼取土謝圖汗之居土謝圖汗奔赴翁音折卜尊丹巴攜其妻孥遁至車臣汗旗下額古穆爾地方本欲募兵往援因車臣汗部衆亦各奔竄恐為厄魯特追及舍克魯倫河而南向我蘇尼特喀倫而來詳視喀爾喀舉國震驚見一影響隨以為敵至無一人敢北向相拒者臣於六月十九日至蘇濟地方見折卜尊丹巴營中紛紜擾亂驅逐馬駝又車臣汗屬下四阿霸哈納爾等部人衆俱各奔入我喀倫似此驚擾我喀倫左側之人未必不為震動又侍郎溫達報曰喀爾喀人衆屯聚於蘇尼特兩喀倫地方內有台吉數人率其屬裔負裝闌入守邊將辨驅之不出彼言我地被兵不得已而始進邊汛皇上聞之亦必憐憫逐之不去又折卜尊丹巴亦率衆來至近邊駐劄距設站之地僅半日程理藩院以聞上諭內大臣國舅佟國維都統蘇爾達侍郎額爾黑圖侍衛阿南達等曰現今窘迫來奔之喀爾喀等應否令其出我邊汛將彼汛哨稍展對伊等所居之地另為設哨防守此事關係重大其令議政王貝勒大臣詳議議曰喀爾喀人等窘迫來奔不便即令出邊若久留之又恐牧地殘毁姑俟一月以內探得實音將來奔之喀爾喀作何措置再行確議上從之甲戌遣侍衛阿南達等賫敕諭噶爾丹時侍讀海三代往折卜尊丹巴處途遇厄魯特因攜噶爾丹疏歸內言折卜尊丹巴土謝圖汗違達賴喇嘛之教不尊禮西勒圖我告之以禮法歸好為是而彼反以為非竟興兵而來我於此仗達賴喇嘛之靈來毁其居彼兩人者不為衆所許殆無所往即往亦不納也且微有所聞及他言具在侍讀海三代口中海三代口奏噶爾丹之言曰倘折卜尊丹巴往投皇上或拒而不納或擒之畀我乞以此為我代奏隨下議政王貝勒大臣等集議議曰皇帝俯視天下萬國為一體其職貢之國凡有困迫來投者無不受而養之折卜尊丹巴以敗奔入我喀倫並未來投豈有擒而畀之之理此等情節應撰敕遣使往諭議入上是之遣一等侍衛阿南達喇嘛商南多爾濟戶部郎中西拉工部員外郎穆朱呼賫敕往諭敕曰朕統御宇內胞與為懷願率土共享太平無戰爭離散之苦彼此協和各得其所前聞爾厄魯特與喀爾喀交惡興兵朕思爾等向皆和好恐致滅亡以達賴喇嘛愛育衆生令同遣使諭和達賴喇嘛欣然遣齊緝克他賴堪布朕亦遣阿齊圖綽爾濟學士拜里前往諭和又前此遣爾貢使陶賴哈什哈等賫敕馳驛前去未知到否亦曽以此敕諭喀爾喀土謝圖汗矣今海三代歸奏始知汝至喀爾喀之地海三代非朕所遣乃奉差於俄羅斯議好定界尚書阿爾尼所遣故海三代歸奏不甚明悉且不曽與爾面見爾厄魯特喀爾喀俱遵行達賴喇嘛道法達賴喇嘛向來利濟衆生欲使同歸和睦不致敗亡是以皆特遣使人往諭道路遙逺汝等交惡之故所聞未明兹特遣使賫敕詰問情由其仍遵朕旨與達賴喇嘛之教議和或别有行止明白具本交此使來奏命安親王嶽樂簡親王雅布駐防蘇尼特喀倫時噶爾丹肆掠喀爾喀逼近喀倫上命安親王簡親王各率包衣兵五百名赴蘇尼特喀倫駐防丁丑命大臣官員等調蒙古兵偵探設哨時巴林王納木達克台吉阿拉卜灘等報稱喀爾喀兵敗於厄魯特土謝圖汗折卜尊丹巴遁走其屬下台吉等入內奔竄來投者甚多上命內大臣津進郎中帕海等速赴烏朱穆秦巴林駐喀倫地方偵探情形侍讀學士馬拉赴科爾沁等亦駐喀倫偵探侍衛關保赴喀倫大臣駐劄之處傳諭侍郎溫達令其往會阿霸哈納爾班第帶青車陵帶青公同派發兩帶青之兵於折卜尊丹巴所居之地設哨防護其諭噶爾丹敕及海三代攜來噶爾丹奏疏俱令與折卜尊丹巴視之巴林王所奏令與我喀倫駐劄大臣視之伊等意中以為應何如行事著即議奏尚書阿爾尼遣人諭喀爾喀墨爾根諾顏令其凡事探實來奏尋津進奏言臣等於初八日自京起程十三日到蒿齊忒旗下吳納黑特地方見巴林阿祿科爾沁之兵尚未過此地隨遣人促彼速行兩旗兵到之後臣即往會巴林多羅郡王納木達克阿祿科爾沁固山額駙巴忒馬什等告以前來之故一同奮力疾行十八日至烏朱穆秦中察汗鄂波之綽諾果兒河相視形勢之地率二旗兵為兩營臣又遣人約蒿齊忒達爾馬吉里第王及烏朱穆秦和碩車臣親王蘇達尼曰喀爾喀所入地方與汝等旗分相近汝等各宜發兵五百親率之至哨汛綽諾果兒地方覓我與之期日而遣之甲申命尚書吉爾他布等率科爾沁及盛京兵備噶爾丹喀爾喀洪俄爾帶青台吉奏言聞噶爾丹來掠達賴台吉我等震驚挈裝而行進吳兒會河度噶爾丹已至枯倫貝爾地方為此遣西拉卜格楚爾馳報上諭和碩裕親王福全等曰厄魯特已至枯倫貝爾地方去我喀倫僅七八日程宜預為備禦令科爾沁土謝圖親王沙津達爾漢親王班第派所屬十旗兵一萬量委才能都統副都統參領等管領令盛京將軍副都統等派彼處兵一千自協領以下章京選賢能者派出俱賫兩月糧至喀爾喀河備禦所派盛京兵令副都統穆泰率往科爾沁地方於所指之地備禦尚書吉爾他布都統巴海護軍統領童保等自京城往科爾沁地方前去土謝圖親王沙津達爾漢親王班第扎薩克圖郡王鄂齊禮公安達西禮台吉巴忒馬什務令必去其餘王以下台吉以上量留數人於家餘著盡去參領品級章京巴扎爾侍讀學士馬拉速會同科爾沁王等點派出征官兵壬辰侍衛關保攜侍郎溫達疏至覆命溫達疏曰七月十六日侍衛關保到喀倫臣即欽遵諭旨往折卜尊丹巴所召集阿霸哈納爾班第帶青及車陵帶青等至即當折卜尊丹巴前宣傳上諭帶青等答言聖上俯念折卜尊丹巴降斯天語即當欽遵諭旨派兵一千五百以二百防守折卜尊丹巴以一千三百往戍瀚海前後又車卜登額爾克台吉索諾楚揚寨桑願以二十人前往屣蹤設哨臣因諭令晝則登髙瞭望夜勿舉火如不見影響則屣探其蹤精細行事諭噶爾丹敕書及其奏疏示折卜尊丹巴折卜尊丹巴奏言聖上向來恤我感刻五內我亦仗天朝以自存今又蒙如此洪恩何能酬報惟有旦夕頌祝而已次日臣即公同帶青等監閲派發分遣訖關保攜歸奏聞丙申命撤回內大臣索額圖等兵先是以喀爾喀厄魯特搆兵前所遣大臣官員與俄羅斯使人定議立界事不便前往遣侍衛夸色關保馳驛追索額圖等率兵回駐喀倫至是以尚書阿爾尼奉調至行在上諭之曰索額圖等所帶往官兵駐彼無用著撤回索額圖佟國綱馬喇仍著留駐內大臣津進奏報噶爾丹招誘車臣汗屬衆情形津進奏言有達顏寨桑者車臣汗所屬也其子阿拉卜灘於二十二日來至喀倫告曰我等原居克魯倫之南六月初八日厄魯特前軍數百人猝至我等接戰子女牲畜多被俘掠後見噶爾丹親率兵一支過河下流而去遣人來召我父至彼軍中且給以印文誓不戕害我父不得已挺身前往追至第四日地名對諾克及之召入謂之曰土謝圖汗折卜尊丹巴吾讐也故追彼至此與汝等無涉懼擾汝等故給汝印文令汝安居且我已遣奏皇上此二人來投拒而勿納否則執以畀我汝等及其餘喀爾喀皆應屬於我矣汝等其降我能降則來秋遣使否則不必因給以人畜而歸我父令我報聞并以印文繳送臣等閲視之其詞曰噶爾丹秉教博碩克圖汗檄授車臣汗大小衆台吉前者我兩家通使不絶緣折卜尊丹巴土謝圖汗事興兵來追此兩人以致身涉汝地今思圖後好特召達顏寨桑來告之以意并發此檄汝等若以吾言為是當照此檄而行津進遣郎中賽住等奏聞八月乙巳土謝圖汗請兵助討噶爾丹土謝圖汗奏言臣自昔誠心職貢以為或遇勍敵至於危急希得救援今噶爾丹興兵攻我事勢危急我兵雖少且與噶爾丹一戰決之恐不能禦伏乞天朝發兵救援奏入命議政王貝勒大臣等集議議曰厄魯特喀爾喀向皆恭順職貢有年今厄魯特謂喀爾喀為曲喀爾喀亦謂厄魯特為非土謝圖汗雖為厄魯特所欺請救本朝似不便遣兵相助向使土謝圖汗早如四十九旗歸於本朝噶爾丹必不敢侵犯即使侵犯本朝必不忍坐視况噶爾丹前破鄂齊爾圖汗獻所俘獲聖上猶以彼自相屠害不忍受之則從來未嘗異視彰彰明矣設土謝圖汗率衆來歸或仍存其汗號為之安插出自聖主恩綸俟命下之日該部明白檄行可也上從之臣謹按喀爾喀與厄魯特向皆效順之國往來通貢久歷年所其興戎起釁亦互有曲直我皇上一視同仁初無厚薄故於厄魯特之獻俘也既却而未受於喀爾喀之乞師也亦拒而不許即其搆怨已深日相屠翦猶加勸諭令歸和好存此心以撫馭逺邇誠所謂至仁如天者與若後此一怒安民則又仁者之無敵矣己酉命撤科爾沁兵侍衛阿南達等移咨理藩院曰職等於七月二十七日行至克魯倫河迤北喀喇烏素之地探知噶爾丹因達賴喇嘛使人至由克魯倫河託爾會之地退回疾行又聞噶爾丹向達賴喇嘛使人言我若與土謝圖汗和則吾弟多爾濟扎卜之命其誰償之我盡力征討五六年必滅喀爾喀必擒折卜尊丹巴也今噶爾丹退回既過土喇往索土謝圖汗職當相機追往於交戰之前以敕書授之理藩院以聞上諭尚書阿爾尼撤科爾沁十旗所調之兵其綽諾果兒河所駐之兵應於阿南達未到之前暫留癸亥上宴喀爾喀洪俄爾帶青等於紅川時上巡視口外駐蹕紅川適喀爾喀車臣汗族人洪俄爾帶青台吉率所屬台吉寨桑等至叩請聖安上召入御幄諭之曰爾喀爾喀厄魯特世世進貢朕心寵眷恩賚疊加從無偏庇朕遣使往尼布潮地方爾毋達賴達吉納預備餱糧牛羊以待爾先衆人報厄魯特橫肆情形又先衆人請安進貢甚為可嘉乃取所帶珊瑚數珠賜之復諭曰此以示朕優眷之意洪俄爾帶青謝恩出少選上御黃幄扈從諸王內大臣侍衛八旗文武官員以至兵丁及外藩蒙古王貝勒貝子公台吉他布囊等照兩翼坐喀爾喀洪俄爾帶青台吉等坐於右次大張筵宴上親賜敖漢部落郡王扎木蘇額駙齊倫巴圖魯台吉安達阿玉璽翁牛特部落郡王畢禮滾達賴貝勒額爾德卜鄂齊爾土默特部落貝勒額爾德木圖貝子滾濟斯扎卜喀爾喀部落貝勒羅卜臧扎魯特部落貝勒扎穆阿霸垓部落貝子車林董羅卜巴林部落台吉格勒爾圖等飲衆台吉他布囊等俱就坐賜飲喀爾喀台吉洪俄爾帶青阿拉卜灘圖巴玖哲四人亦親賜上尊并令隨來額爾德尼寨桑等七十餘員至案前跪飲丁卯命派八旗及蒙古兵嚴守邊汛時土謝圖汗與噶爾丹於八月初三四等日相遇於鄂羅會諾爾之地鏖戰三日厄魯特兵夜襲善巴額爾克帶青之營破之喀爾喀屬下諸台吉星散土謝圖汗獨身力弱乃越瀚海奔至折卜尊丹巴所理藩院據溫達阿南達所報以聞上諭內大臣國舅佟國維內大臣費揚古明珠尚書阿爾尼等曰今喀爾喀厄魯特交惡作亂境上急宜防守其令現隨八旗驍騎兵丁及下五旗護軍前鋒以其半往駐張家口外形勢之地以聽調遣兩蘇尼特四子部落三旗派兵二千以郡王薩木扎額駙將之貝勒博木卜等副之喀爾喀達爾漢親王毛明安三吳喇忒五旗派兵二千以達爾漢親王諾內將之於四旗扎薩克內選賢能善於約束者一人於三旗協理台吉內每旗派出一人副之鄂爾多斯旗分派兵二千以貝勒宋拉卜將之貝勒顧祿什希卜台吉阿爾賽等副之此所撥兵俱令環我邊汛駐備形勢之地再令歸化城兩旗備兵一千都統阿拉納副都統阿迪等將之於彼兩旗撥人才雄健善於約束官員即令屯駐歸化城內以備緊急調遣聖祖仁皇帝親征平定朔漠方略卷四

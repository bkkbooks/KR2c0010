body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷三康熙二十三年二月庚子上遣阿齊圖格隆等賫勅諭達賴喇嘛先是喀爾喀右翼扎薩克圖汗兩次陳奏疏言自康熙元年羅卜臧變亂以來我弟兄子姪多投左翼屢索不還曾往訴達賴喇嘛䝉諭七旗曰扎薩克圖汗爾七旗當共尊之其變亂以來子弟人民流入左翼者俱應發還因差扎爾布奈前來蒞盟乃土謝圖汗不至皇上係我大衆之主謹以此情上聞至是上念喀爾喀累世恭順職貢有年不忍其子弟人民離散遣阿齊圖格隆等賫勅往諭達賴喇嘛令其遣使議和勅曰朕綂御寰區願中外無征戰之勞離散之苦使羣生皆臻安樂近者喀爾喀扎薩克圖汗屢次疏言右翼子弟人民離散奔入左翼索之未還等語爾喇嘛從來積大福力永遠真誠慈悲濟衆聲聞炳著無不欽其髙行而讚頌之者喀爾喀諸汗貝子皆供奉爾喇嘛信爾之教而尊其道法爾於本朝亦誠心敬慎進貢往來不絶今天下共享太平而扎薩克圖汗人民離散未得完聚朕心大爲軫惻念其中必有父子兄弟骨肉分離者未必不生事互殺交相戰爭兵戎一起姑不論人民困苦即兩汗亦豈能並存伊等於朕向來恭順竭誠奔走於爾喇嘛亦爲䕶法久矣何忍黙視使至此極乎朕與爾俱當遣使往諭將扎薩克圖汗離散人民給還俾兩翼永歸於好既副朕一視同仁之至意而於爾喇嘛六度之行四無量之心亦符合矣爾喇嘛其遣大喇嘛一人與朕行人㑹於喀爾喀境内定期而遣之朕於此亦遣使臣赴所約之地與爾使同往九月乙亥厄魯特博碩克圖汗噶爾丹遣使率三千人入貢噶爾丹遣使古爾班拜等攜夥伴三千人入貢帶有印文理藩院奏請遣官驗其符信以入毋得過二百人餘令遣回上曰來人浮於定額着阿爾尼前往酌量議遣十一月甲子厄魯特憨都台吉額爾德尼和碩齊遣使入貢謝罪憨都台吉疏稱臣部運衰遭噶爾丹執臣祖楚呼爾呉巴什滅臣父班第臣時年十三有陪臣額爾德尼和碩齊者挈臣逃出遵達賴喇嘛之諭在厄濟納託賴之地與皇上邊民同居不謂其妄行劫掠致干天討臣常誡懲之今已悔過伏望聖主鑒宥額爾德尼和碩齊疏曰臣之兩諾顔乃噶爾丹之叔及弟也無罪而噶爾丹執之殺之既蔑我主何能與之共事故掠其邊境奔遁至此皇上聖德光昭臣等本無爲非之心祗以惜死遂致草竊今日夜思維無所逃於天壤謹悚惶陳奏於聖明之前奏入得㫖巴圖爾額爾克濟農劫掠鄂爾多斯之事已經寛免則憨都台吉屬下額爾德尼和碩齊亦應一體宥赦所貢准其上納十二月庚子阿齊圖格隆等以達賴喇嘛奏疏復命達賴喇嘛疏曰謹奏皇帝陛下聚無量諸佛之典一藏兼收掦上乗文殊之靈衆生並育勢如輪轉仁覃宇内其喀爾喀左右翼議好之事曾遣扎爾布奈往盟始則右翼不從繼則左翼不服是以未能協和但皇上安集流離使之和好以衆生父母之心惻然鑒照誠善事也今仰遵聖㫖復遣參巴陳布庫圖克圖令於十二月到喀爾喀國定議謹遣拉木扎木巴羅卜臧諾爾卜拉通阿旺拉克巴等賫奏以聞康熙二十四年正月甲子以阿齊圖格隆爲綽爾濟復使達賴喇嘛達賴喇嘛遵奉勅諭所遣諭和喀爾喀七旗之參巴陳布庫圖克圖行至歸化城地方病歿上復遣阿齊圖格隆等賫勅告以故且以阿齊圖屢使西域有勞加以綽爾濟之號賜達賴喇嘛勅曰前因喀爾喀扎薩克圖汗奏陳土謝圖汗許還屬裔而不還許赴㑹盟而不赴朕恐兩翼不和必致有攻戰之患離散之憂特勅諭爾喇嘛共遣使往彼諭和爾喇嘛以禮法爲念以慈悲爲行即遣參巴陳布庫圖克圖前來朕心嘉之特遣大臣往迎不意參巴陳布至歸化城之布爾哈素臺病歿扎薩克圖土謝圖兩汗事究未得和協今將仍前遣使爾喇嘛其重遣一人約定何地何時㑹喀爾喀境内朕亦遣大臣依期赴所約之地以㑹四月戊戌授厄魯特伊拉古克三庫圖克圖爲歸化城掌印扎薩克大喇嘛五月癸未命議巴圖爾額爾克濟農羅卜臧滾卜阿拉卜灘等歸併安插事時巴圖爾額爾克濟農屢疏請頒勅印以約束部衆院議不允至是上諭大學士覺羅勒德洪明珠曰鄂齊爾圖汗爲噶爾丹所滅巴圖爾額爾克濟農等離其故地來至邊境劫掠毛明安呉喇忒本應殄滅但若輩皆鄂齊爾圖汗所屬朕俯念鄂齊爾圖汗世奉職貢恪恭奔走兼之彼亦迫於饑渴是以宥其罪戾又羅卜臧滾卜阿拉卜灘係鄂齊爾圖汗之孫與巴圖爾濟農爲兄弟行應遣大臣往諭朕㫖相度可居之地歸併安插封以名號給之金印璽書以示朕興滅繼絶至意其令議之七月壬午厄魯特博碩克圖汗噶爾丹爲遣使事覆奏噶爾丹奏曰恭聞皇上萬安不勝欣悦此地叨達賴喇嘛福庇幸得無恙䝉檄丹巴來文貿易之人入關定限人數若妄行果真上諭誠是但自古以來四厄魯特貿易向有舊制我等未便廢也若仍遵舊制則凡事皆宜矣得㫖下所司議理藩院議曰康熙二十二年㑹議已有定例噶爾丹所奏舊制不便廢之語應毋庸議疏入報可九月丁卯綽爾濟阿齊圖歸自達賴喇嘛達賴喇嘛疏曰前爲喀爾喀扎薩克圖汗事諭遣喇嘛爲使不敢有違即遣參巴陳布庫圖克圖乃未至而道卒近者又復諭以彼地生靈須得一賢能尊大之喇嘛前往庶乎可濟此土白特之地無有尊於噶爾亶西勒圖者是用遣之伏祈霽顔俯鑒奏至上諭尚書阿爾尼曰爾部可遣官二員乘驛至西海由西寧酌取米麫茶葉并食羊百隻給噶爾亶西勒圖爲禀餼併傳諭云此冬春之際若赴喀爾喀朕使亦自能到但喀爾喀各就水草游牧時氣不和誠恐㑹盟未能齊集喇嘛可徐行於來年四五月到彼朕使亦令於四五月間赴之節候既佳㑹盟亦易是用遣使存問喇嘛併餽爾禀餼十月壬子理藩院尚書阿爾尼以訊問巴圖爾額爾克濟農情事還復命先是議政王大臣等議言巴圖爾額爾克濟農但奏請勅印彼欲永居何地未經聲明應遣大臣曉諭巴圖爾額爾克濟農問明到日定議上命阿爾尼前往至是阿爾尼奏曰臣至巴圖爾濟農所宣諭聖㫖巴圖爾額爾克濟農曰皇上以我兄弟族屬離散欲使合處乃係非常殊恩何敢違命近者達賴喇嘛亦謂羅卜臧滾卜阿拉卜灘所居布壠吉里之地地隘草惡難以容衆不若與濟農同居臣因問濟農欲居何地彼曰欲環居阿喇克山之隂以遏冦盗以靖邊疆令部衆從此地而北當喀爾喀畢馬拉吉里第諾顔之地由噶爾拜瀚海額濟内河姑喇耐河鴉布賴山巴顔努魯喀爾占布爾古忒空郭爾俄壠以内東倚喀爾喀丹津喇嘛之部衆西極髙河而居之則咸沐皇上恩澤而各得安生矣奏至議政王貝勒大臣議曰頃奉上諭遣使往訊達賴喇嘛俟訊明到日再議上是之十一月癸酉以安插巴圖爾額爾克濟農等事遣使諭達賴喇嘛先是理藩院以羅卜臧滾卜阿拉卜灘及巴圖爾濟農歸併安插事開列應遣大臣職名奏入諭曰且勿遣其以此意諭知達賴喇嘛令一同遣使至是命扎薩克喇嘛垂木珠爾拉木扎木巴得木齊商南多爾濟副都御史拉都虎等賫勅前往勅曰朕綂馭㝢内繼絶舉廢欲期咸底隆平厄魯特噶爾丹博碩克圖汗滅鄂齊爾圖汗時羅卜臧滾卜阿拉卜灘巴圖爾額爾克濟農等紛紜離散來至邊境竄跡於金塔寺賀蘭山等處乃巴圖爾額爾克濟農額爾德厄和碩齊等又以生計窘迫在鄂爾多斯毛明安呉喇忒寧夏等處妄行劫掠朕於此時不即發兵𠞰滅者乃軫念鄂齊爾圖汗歴世職貢誠敬奔走是以寛宥其罪巴圖爾額爾克濟農等亦戴朕恩願依朕爲生屢疏奏請勅印前此朕曾諭厄魯特噶爾丹博碩克圖汗云巴圖爾額爾克濟農等如係爾所屬當即收之不能朕另有裁度乃彼約以丑年春爲期如逾期悉惟上裁今逾期已數月矣天下太平惟伊等兄弟骨肉分離散處失所朕心殊爲惻然爾喇嘛素以惻隱之心度此衆生凡厄魯特諸貝子皆供奉喇嘛信崇爾法朕思羅卜臧滾卜阿拉卜灘巴圖爾額爾克濟農皆鄂齊爾圖汗之苖裔也鄂齊爾圖汗於喇嘛爲䕶法久矣何忍黙視其子孫宗族至於困窮今朕欲将伊等歸併一處安插於可居之地以示興絶舉廢之至意爾喇嘛其遣使與朕行人定期往㑹朕於此即遣大臣至所約之地偕爾使人前往臣謹按羅卜臧滾卜阿拉卜灘與巴圖爾額爾克濟農皆厄魯特種族先後離散皇上念其先鄂齊爾圖汗職貢恪共故加意撫納雖有劫掠之罪亦貰而不治仍畀以名號勅印俾擇善地安插興滅繼絶不啻澤及枯骨矣前既以此諭噶爾丹兹復令達賴喇嘛為之度地定居欲令耦俱無猜且使噶爾丹不得借以爲辭更生嫌釁也皇上於遠人不惟來之而又有以安之者如此康熙二十五年正月乙亥厄魯特巴圖爾額爾克濟農來朝先是理藩院尚書阿爾尼奏言巴圖爾額爾克濟農攜其屬七百八十人將至請遣官往迎諭曰巴圖爾額爾克濟農所屬亦限以二百人入關餘者留歸化城則現在噶爾丹之貢使可無辭矣兹當嚴冬之際行李牲畜盜賊可虞歸化城都綂顧慕德現以年節來覲可令速回監視供應其回歸化城之人著遣戸部司官一員將宣府所貯米石給爲廩餼并遣爾院賢能官一員由光禄寺支取銀兩採買羊隻給之此係外藩賓客不必限以銀數爾院所差之官竟行買給可也至是賜宴畢照大台吉例頒賞仍以上服貂裘賜之壬午噶爾丹復奏額爾德尼和碩齊情事噶爾丹奏曰額爾德尼和碩齊事曾約於丑年四月回覆今已踰期其所行乖舛凡有是非一聽聖裁㫖下議政王貝勒大臣等集議議曰安插巴圖爾額爾克濟農額爾德尼和碩齊等已遣使達頼喇嘛應俟復奏到日再議上是之四月乙酉朔遣大臣台吉等前往喀爾喀􅊩盟理藩院奏稱達賴喇嘛所遣噶爾亶西勒圖約於今嵗閏四月至喀爾喀墨爾根台吉處今爲期已近應遣大臣􅊩盟奏入命尚書阿爾尼台吉巴忒馬什畢力克圖喇嘛阿齊圖綽爾濟前往又以喀爾喀七旗地方遼濶右翼扎薩克圖汗處遣歸化城鄂木布丹津占素格隆員外諾木齊岱去額爾德尼濟農盆楚克拉卜灘處遣德木齊達爾漢格隆員外馬廸去色稜阿海台吉處遣滾布格隆員外阿爾必特祜去達爾馬西里諾顔處遣大喇嘛丹津格隆員外巴牙思呼朗去遵義盆楚克台吉處遣德木齊卓特拔達爾扎格隆員外沙哈里去額爾克諾顔處遣薩木坦額木濟格隆員外費顔圖去左翼土謝圖汗折卜尊丹巴庫圖克圖處遣大喇嘛垂重格隆郎中喀拉去車臣汗處遣克巴格隆員外達虎去信順額爾克帶青諾顔處遣丹巴色爾濟格隆員外保住去墨爾根諾顔處遣額木齊格隆郎中安布禄去賜喀爾喀七旗汗濟農諾顔台吉等勅曰朕綂御寰宇中外一體務使交相輯睦共享昇平乃爾右翼扎薩克等内自相亂兄弟人民多歸左翼其左翼扎薩克兄弟人民亦有歸入右翼者爾等以兄弟之親互相吞併異日必至交惡生亂朕心惻焉康熙二十三年曾頒勅於達賴喇嘛議共遣使諭和爾等而達賴喇嘛亦謂朕俯念道法慈憫衆生有如父母意甚善也特遣噶爾亶西勒圖前來朕亦命尚書阿爾尼台吉巴忒馬什畢力克圖喇嘛阿齊圖綽爾濟等與之偕往爾汗濟農諾顔台吉等當仰體朕憫爾累世恭順職貢修好之至意及達賴喇嘛廣運六度䖍修四無量之慈心盡釋舊怨將兄弟人民各歸本扎薩克令其和協照舊安居不但仰副朕命與達賴喇嘛之意即爾七旗永無離散之苦爭鬬之害福禄所綏亦且無疆矣時喀爾喀右翼扎薩克圖汗歿其子噶爾旦台吉請襲父職上允之并命阿爾尼因便致賻六月乙卯折卜尊丹巴庫圖克圖遵諭覆奏先是大喇嘛垂重格隆起行上命傳諭折卜尊丹巴令亦至盟壇共議至是折卜尊丹巴奏曰臣自幼皈達賴喇嘛之教叨折卜尊丹巴之名普度爲心闡揚佛法息列辟之爭救生民之苦扎薩克圖汗之子孫屬裔前已陸續給還餘者正在察核今䝉聖慈念喀爾喀七旗不睦遣使於達賴喇嘛而達賴喇嘛亦遣噶爾亶西勒圖爲使赴盟諭臣亦至盟壇共議其事臣當遵㫖同赴盟所竭誠公議以仰副聖懐疏入上命移文尚書阿爾尼噶爾亶西勒圖等知之七月癸巳命侍郎拉都虎等往㑹達賴喇嘛使人於阿喇克山達賴喇嘛疏曰皇上俯鑒鄂齊爾圖汗職貢有年不忍其後人骨肉分散靡所止居惻然垂照欲巴圖爾額爾克濟農羅卜臧滾卜阿拉卜灘集居一處特降恩綸甚盛德也苐此西海之地各有分屬若使居天朝境内又恐厄魯特或有異言其阿喇克山之旁亦屬狹隘乞大君矜憐擇水草寛濶之處安插一隅兹已遣車齊克他賴堪布羅卜臧令於十月内至阿喇克山伏請遣使往㑹上命遣拉都虎溫達去且諭之曰爾等可與達賴喇嘛使者同往召集巴圖爾額爾克濟農羅卜臧滾卜阿拉卜灘等相度伊等可以游牧之地指而與之仍㑹同提督孫思克將地之界限令伊標下官弁認記之巴圖爾額爾克濟農等如因給地安揷欲來謝恩則許之來達賴喇嘛使人如欲來請安亦許之來否則給以廩餼而遣之其額爾德尼和碩齊等如欲與巴圖爾濟農等一同游牧亦許之爾等可與巴圖爾額爾克濟農羅卜臧滾卜阿拉卜灘等定沿邊爲盗作亂之罰著爲令前巴圖爾額爾克濟農來覲之時已自誓不復令屬下爲非其羅卜臧滾卜阿拉卜灘亦須嚴禁所屬兄弟既已完聚從此和睦安居倘再致流亡他往殊負朕歸併眷恤之意矣朕所以不憚諄切訓諭者亦以其先世恭順有年不欲令其子孫失所也其一一傳諭之九月壬辰命副都綂綽爾濟雅克運送尚書阿爾尼糗糧時阿爾尼差筆帖式英古奏報㑹盟日期且言軍中所有糗糧僅可食至十月中旬恐致匱乏上命於歸化城動支二百餘人一月之糧令喀爾喀和碩達爾漢親王諾内等六旗選取駱駝解送地方遥遠仍遣歸化城副都綂綽爾濟雅克率佐領驍騎人等一同解往十月戊午尚書阿爾尼喇嘛噶爾亶西勒圖等各奏報喀爾喀七旗遵諭誓和阿爾尼疏曰臣等於八月十六日召集喀爾喀兩翼汗及濟農諾顔台吉等宣示聖諭臣等復於二十二日召集伊等曉諭之曰我等來時曾降訓㫖諭爾等曰爾汗及濟農諾顔台吉等以侵占屬裔之故兄弟不睦爾等本係同祖子孫若交惡搆怨將來必致罹於塗炭朕不忍坐視故特頒勅㫖爾等即宜和睦和睦於朕無所利不睦亦於朕無不利也惟念爾等累世恭順職貢朕矜恤之心無分中外是以開誠曉諭令爾等同歸於好宣諭畢色稜阿海台吉等跪言曰我七旗喀爾喀俱係一祖之子孫向皆和好自羅卜臧肇亂以來互將人民隱占是以蓄怒交惡今皇上與達賴喇嘛特遣大臣喇嘛等使我等和睦安樂我等小人不勝懽忭然欽遵聖㫖和好息爭與否在吾兩汗耳土謝圖汗之弟西地西里巴圖魯台吉跪言曰聖上諭㫖勸我等甚當我兩汗相惡俱係小人獻讒所致今使兩汗納忠言斥讒佞我等竭力諫諍自當言歸於好兩翼汗曰皇上令我等和睦聖意諄復所以開示愚昧者甚至我等敢不祗遵臣等遂令扎薩克圖汗土謝圖汗行相問抱見禮又令左右二翼衆台吉亦行相問抱見禮於本月二十三日令汗及濟農大諾顔台吉等檢選所屬六十餘材能寨桑俱於噶爾亶西勒圖折卜尊丹巴前懸掛佛像設立重誓兩翼互相侵占之台吉人民令各歸本主一切應結事件俱審擬完結仍令濟農諾顔台吉等跪於佛像之前設立重誓曰自今以往當永遠和協此皆皇上非常威德之所致也謹以狀聞噶爾亶西勒圖亦以諭和事竣具疏陳奏得㫖喀爾喀左右兩翼汗及濟農諾顔台吉等俱遵朕諭㫖即行設誓和睦可嘉所司其知之臣等謹按凡立國者必先有内釁而後外侮始生喀爾喀與厄魯特境壤相接強隣洊食已駸駸乎有不支之勢乃迷而不悟兄弟鬩牆日尋干戈内自讐敵其根本先撥而望枝葉之無害難矣故以七旗之衆一朝破敗而不可救皇上於其未敗之前先幾洞燭宣示詔書勸諭婉切欲使敦在原急難之義以并力捍禦毋或骨肉相殘致爲他人所吞噬也聖謨洋洋嘉言孔彰意豈不深遠哉十一月癸巳侍郎拉都虎等以安揷事畢復命拉都虎温達商南多爾濟等疏曰臣等出寧夏阿喇克山閱視地形得遇巴圖爾額爾克濟農約其在東大山北候聽宣㫖於九月十二日在嘉峪闗外得遇達賴喇嘛使者車齊克他賴堪布隨遣人召羅卜臧滾卜阿拉卜灘至語之故亦約㑹於東大山北羅卜臧滾卜阿拉卜灘曰䝉皇上洪恩賜我等地方當即偕諸大人往赴約㑹之地但我姊阿奴乃噶爾丹之妻聞率兵千人聲言往謁達賴喇嘛從此而過或中懐詭計襲我亦未可定不得不整力待之請即於此地宣㫖可乎臣等隨同車齊克他賴堪布宣㫖訖羅卜臧滾卜阿拉卜灘回奏曰聖上俯念臣祖鄂齊爾圖汗使臣兄弟完聚給以土地臣不勝欣忭即當遷至濟農所居一同遊牧但正值冬月屬下人民散處使之遷移貧人牲畜少者難以度冬請俟來年草青時遷之本月二十三日臣等至東大山北令巴圖爾額爾克濟農跪宣㫖畢巴圖爾額爾克濟農奏云臣等係亡國流裔䝉皇上矜憐給以牧地俾令得所髙厚之恩愧弗克當當即叩頭謝恩臣等又謂巴圖爾額爾克濟農曰爾所請喀爾占布爾古忒空郭爾俄壠巴顔努魯鴉布賴噶爾拜瀚海等地方給汝遊牧外自寧夏所屬玉泉營以西羅薩喀喇山嘴後至賀蘭山隂一帶布爾哈蘇台之口又自西寧所屬倭波嶺塞口以北奴渾努魯山後甘州所屬鎮番塞口以北沿陶闌泰薩喇春濟雷渾希里等地西向至厄濟納河俱以離邊六十里爲界隨與巴圖爾濟農屬下達爾漢噶卜楚喇嘛波克寨桑及提督孫思克標下遊擊李本善等畫地爲界而記之臣等又與巴圖爾額爾克濟農定議罰例䝉古如殺邊内之民不論幾人俱斬其妻子牲畜入官偷盜民人牲畜者爲首二人絞仍將妻子牲畜入官餘者罰以三九牲畜仍鞭一百其不爲盜而私入邊遊牧者台吉則罰以三九牲畜寨桑等罰以一九牲畜平人則鞭五十外仍將所騎馬匹盡行入官其擕帶家口牲畜入邊遊牧者不論幾戸俱入官至民人往邊外伐木刈草䝉古有奪其食物者不論幾人將所乘馬匹盡行給還民人仍鞭三十其屬下每犯一次并罰濟農五九牲畜俟羅卜臧滾卜阿拉卜灘來㑹之時將此項情節亦明告於彼其額爾德尼和碩齊亦須嚴禁勿使妄行盜竊又厄魯特諾顔庫圖克圖之子噶爾亶多爾濟者亦係鄂齊爾圖汗之嫡孫應令與巴圖爾額爾克濟農等附牧奏入上曰噶爾亶多爾濟既係鄂齊爾圖汗之孫應令其與巴圖爾額爾克濟農等一同遊牧其拉都虎等所定地界并嚴禁盜竊之例理藩院其移文督撫提鎮通行曉諭聖祖仁皇帝親征平定朔漠方略卷三

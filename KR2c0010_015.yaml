body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷十五康熙三十四年正月丙寅黑龍江將軍薩卜素請㑹軍索嶽爾濟山先是上巡行口外諭薩卜素曰近有厄魯特蠢動聲息爾可回整兵預備設有事進𠞰盛京烏喇及爾處兵可㑹於形勝地相機前進科爾沁兵亦令隨行至是薩卜素奏言臣前遵上諭曾遍厯隂山前後惟索嶽爾濟山高大頗得形勢臣擬派官兵自盛京烏喇墨爾根三處至索嶽爾濟山一一按地丈量分記緩急行程無水之處掘井以待更請部院官各一員分路丈量嗣後若索嶽爾濟山之東北枯倫貝爾等處有警則與臣駐軍之地相近即先進兵烏喇盛京兵繼之若索嶽爾濟山之西烏爾惠等處有警則與盛京相近即先進兵烏喇及臣處兵繼之總期㑹於索嶽爾濟山以進奏至上從之尋遣兵部員外郎常岱理藩院員外郎特古忒鐵圖往同丈量鐵圖自盛京丈至索嶽爾濟山共計一千四百五里置急程二十五站緩程三十九站常岱自墨爾根丈至索嶽爾濟山共計一千一百七十七里置急程二十站緩程三十一站特古忒自吉林烏喇丈至索嶽爾濟山共計一千六百五十里置急程二十九站緩程四十八站丙戌命都統諾穆圖從征先是總統預備之漢軍火器營已派都統郎化麟至是都統諾穆圖以情願從軍效力請上命郎化麟停其預備出征著派諾穆圖前往二月丁酉命八旗兵增置馬匹上諭議政諸大臣及八旗滿洲䝉古漢軍都統等曰朕觀京城八旗兵卒俱已熟練器械亦稱整齊倘有舉動惟馬匹少缺故前命滿洲䝉古漢軍各佐領下拴馬一半給草豆錢糧喂養但軍行以馬為重今可令衆兵一概置馬一匹春冬則全給草豆錢糧自四月起發一半放靑留一半拴喂至九月驅回照常拴喂此所置馬匹令兵丁各自小心飼養其前鋒之馬交前鋒統領參領侍衛及前鋒校其上三旗親隨護軍之馬交領侍衛內大臣及親隨護軍校其下五旗親隨護軍之馬交長史司儀長及親隨護軍校其護軍之馬交護軍統領護軍參領及護軍校其滿洲鳥鎗護軍之馬交管鎗炮大臣護軍參領及護軍校其鎗炮撥什庫驍騎之馬交管鎗炮大臣參領散騎尉及驍騎校其漢軍火器營撥什庫驍騎之馬交管火器營大臣協領參領操練尉及操練校其驍騎之馬交都統副都統參領佐領驍騎校及撥什庫其傳宣之馬則交傳宣總管及傳宣校等嚴行稽察設有怠玩從事以致馬匹羸瘦遲誤公用者則將該管大臣從重治罪其參領協領以下撥什庫以上以及馬主俱照軍法治罪俟噶爾丹事畢之日仍照常養馬一半可通行曉諭臣謹按行師之道有陸戰有水戰水用舟師陸則騎卒理所必然若出邊行討騎兵尤要敵在險遠千里趨利者騎兵之力也兩軍相當衝堅陷陳者騎兵之威也敵人潰敗追奔逐北者騎兵之捷也是馬為軍中急需不可不預為之備矣我皇上神謨廟算動出機先念禁旅畜馬有數恐大舉取用未敷故發帑金以資購買分八旗以增維縶給月餉以充飼秣又慮厮養之怠玩責令該管官員不時嚴察後三路進𠞰人皆策肥深入絶域大創敵冦皆睿慮深遠洞晰軍機預使廣備馬匹之所致也詩曰四牡修廣其大有顒薄伐玁狁以奏膚功其斯之謂與乙卯敕諭噶爾丹時噶爾丹遣使人他西蘭和卓請安入貢以疏至其略曰洪仁皇帝敕諭賜物奉到之時不勝歡忭文內深意雖不盡曉奉有是則加恩非亦曲宥之㫖始敢以後先情事厯為上陳使臣馬迪被害之事不獲詳知難於答奏扎木巴爾臧布庫圖克圖於敕㫖未到前早已遁去所云約地㑹盟之事未便擅定俟命下再行奏聞欲遣丹津俄木布丹濟喇往覲所需資力多則倉卒難辦少則為路甚遙是以陳情上奏回子所行之事實不知情伏念洪仁皇帝恩養四十九旗蒙古及四厄魯特不啻赤子是以咸享安樂奈折卜尊丹巴及土謝圖汗二人背洪仁皇帝之㫖藐宗喀巴之位與達賴喇嘛之教以致諸蒙古盡皆敗壞若得如前措置請將喀爾喀七旗發回故土折卜尊丹巴及土謝圖汗二人仍照前三言內定一言之奏雖自戊辰以後烏䦨布通未戰以前厯有明諭總祈洪仁皇帝曲加恩宥一如當濟隆庫圖克圖之前與內大臣等定議之言加惠是望奏上更賜敕諭敕曰去歲諭爾敕內諸凡開示甚晰朕俯念中外咸在懷抱爾厄魯特與喀爾喀讐殺相尋日無寧息心實傷之且思爾等皆職貢之國朕一概秉公舉無偏庇後喀爾喀窮迫來歸朕乃收撫以全其生命此亦朕矜恤羣生之至意也爾噶爾丹不遵朕言亦自失其生理而已於我四十九旗蒙古何敗壞之有今爾縱戕害使臣馬迪之人不正法請罪乃悖棄誓言翻索喀爾喀定議已結之案且藉口已殁之吳丹及敗壞達賴喇嘛道法之濟隆庫圖克圖奉朕前諭僞為不知巧飾誑奏是爾違朕之㫖迷惑回子之教壞宗喀巴與達賴喇嘛之法明甚朕是以遣回爾使不令進邊嗣後若仍怙非不悛蔑視前諭爾永勿上疏遣使貿易故諭此敕即交噶爾丹來使賫往四月庚子命檄諭達賴喇嘛及諦巴時達賴喇嘛遣使朱爾摩隆堪布諦巴遣使得木伯兒囊蘇賫奏曰自聖上為護法之主使道法歸一以來我等悉為遵行遂蒙睿鑒錫以金册印敕不勝歡忭凡所陳詞皆在使口朱爾摩隆堪布等述達賴喇嘛諦巴奏請之語曰請勿革噶爾丹策旺喇卜灘汗號仍使存留且加敕印恩賜則於道法似為善舉近遵皇帝諭和之㫖特遣賴楞堪布達爾漢溫布前赴噶爾丹策旺喇卜灘所矣其西海等處向未嘗違聖上之㫖即其一帶厄魯特亦皆不敢獲罪於皇帝請將彼地方所置戍兵降㫖撤回庶衆生安寧大為有益據此奏聞上諭大學士伊桑阿等曰控治外藩不宜姑息亦不可不俯順其意諦巴者乃外藩人也何敢奏請撤我朝戍兵此特為噶爾丹計耳兹正宜直發其隱明言爾欲我罷戍非幸噶爾丹得蘇使乘間來擾乎我之守戍乃以噶爾丹闌入吾土之故向者噶爾丹敗於我軍已將就擒因爾之濟隆庫圖克圖來言噶爾丹乞降始得亡命今噶爾丹口中仍言索喀爾喀未巳則我朝既不當罷戍亦且當備師如噶爾丹來即行𠞰滅倘悔過乞降亦無有不撫之之理爾等可㑹同理藩院侍郎滿丕備檄曉諭達賴喇嘛及諦巴知之議曰皇上統馭宇內仁覆萬邦凡有外國之人誠心歸順者必加恩養畀以生全如喀爾喀土謝圖汗等窮迫來歸即存其汗號使各得其所而撫綏之亦噶爾丹之所灼見者也設噶爾丹亦籲請歸誠無不與喀爾喀一體眷顧之理至策旺喇卜灘敬愼職貢歷有年所今彼並未嘗陳奏乞仍存其汗號則達賴喇嘛諦巴之奏可無庸議應俟噶爾丹策旺喇卜灘奏請之日再議至曩者噶爾丹借追襲喀爾喀為名率兵闌入我邊劫掠烏朱穆秦之地濟隆庫圖克圖身在軍中知而不阻竟自深入始出師問故噶爾丹復拒戰於烏闌布通及其大敗正當立行𠞰滅而濟隆庫圖克圖與噶爾丹比誘稱講和往返數次依違論說之間噶爾丹晝夜奔竄始得出邊其時諸王大臣奏言當乘噶爾丹大敗窘迫之際悉發各處所備之兵一路窮追𠞰殺一路至土喇鄂爾渾等處邀噶爾丹之歸途而盡殄之皇上不忍盡誅念及噶爾丹素修職貢諭止各路追兵噶爾丹膽落於我兵之追惶迫已極乃以誓書來請罪乞命皇上復棄其舊惡念切好生遂命諸將撤軍噶爾丹當悔過改行感皇上不追不殺之恩恭順而行今反背棄誓言壞宗喀巴之法入回子之教恃其巢穴窵遠仍怙惡不悛侵擾喀爾喀是以令各處秣馬沿邊備兵此特為噶爾丹稍有蠢動立調𠞰除之戍卒並非為防西海台吉等而設者也噶爾丹乃奸宄莫測之人目今力薄難支故爾遠伏倘彼勢少張又復生事悖亂彰彰明甚其達賴喇嘛諦巴奏請撤回西海等處戍兵之事亦無庸議應將此曉諭達賴喇嘛及諦巴知之奏入上從之隨將此情節備文交來使朱爾摩隆堪布得木伯兒囊蘇賫往癸卯喀爾喀台吉車陳吳爾占以噶爾丹情形來報車陳吳爾占報稱我舊屬特古斯者前被厄魯特虜去今自厄魯特處逃出投我而告曰去年噶爾丹居於孔圭濟達渾耕於烏闌昆收歉者各半其屬下箭手約千餘人稍有駝馬絶無牛羊目今掘土中所産物以食杜噶爾阿喇卜灘居於察罕色渾耕於扎巴罕哈薩克圖亦收成一半其生計較噶爾丹稍勝策旺喇卜灘尚不與噶爾丹通使伊拉古克三庫圖克圖仍在噶爾丹處並無舉動聲息去歲八月間聞京師發兵往赴根敦帶青彼以為率根敦帶青來討故集兵為備置哨偵探逮後杳無聲信始撤回哨卒理藩院隨據奏聞甲辰遣使賫敕往諭班禪庫圖克圖時上以班禪庫圖克圖為高行僧欲識其面特遣內齊陀音庫圖克圖監察御史鍾申保等賫敕往召之敕曰庫圖克圖爾克闡揚佛教普濟羣生朕與爾心同一體曩者皇考召達賴喇嘛來中國以後佛教大興道法歸一朕與庫圖克圖雖每歲遣使不絶在朕之意必欲與庫圖克圖一見是以遣使前往己未命達賴喇嘛及諸扎薩克之往來使人各給符驗上諭大學士伊桑阿等曰聞外藩扎薩克人等或有私隨我朝遣赴達賴喇嘛處之使臣而去者或有同達賴喇嘛使人前來不返故土竟自存留於歸化城各扎薩克處者噶爾丹乃狡詐之人其各處安置奸細偵探聲息之事顯然敗露猶自不服巧飾上奏或令其屬下喇嘛潛隨達賴喇嘛之使人前來偵探反間敗好作亂亦未可定宜嚴行禁止爾等可㑹同理藩院大臣集議議曰嗣後達賴喇嘛等所遣之人俱令其給與印文符驗有符驗者始准各扎薩克等容留其各扎薩克有遣赴達賴喇嘛之人亦令其報部登記給以印文符驗方許其照常發往如此則噶爾丹之人不得詭稱達賴喇嘛之使矣應將此傳諭達賴喇嘛及歸化城各扎薩克等知之奏入上從之六月甲午命喀爾喀貝勒根敦帶青偵報噶爾丹聲息時根敦帶青遣人偵得噶爾丹行裝已至扎布堪河阿喇卜灘行裝已至敖拉海報至上諭理藩院曰據報噶爾丹已至扎布堪河爾院可即檄知根敦帶青令遠行偵探不時飛報其喀爾喀諸扎薩克汛哨之處著各遣其都統副都統嚴加稽察設有聲息一以報部一以報歸化城將軍費揚古處今所報雖無實據亦應行文與歸化城黑龍江兩將軍知之再檄知喀爾喀諸扎薩克凡根敦帶青經行之地事遇緊要即以馬匹支應毋誤命副都統阿南達赴甘州㑹將軍提督等相機邀擊噶爾丹上諭內大臣蘇爾達等曰聞噶爾丹將從嘉峪關外過哈密之南濟昆都倫及額濟內河往投達賴喇嘛應遣幹員赴彼偵探若果噶爾丹於此取道此機斷不可失應即行𠞰滅著副都統阿南達作速前往㑹同將軍博濟孫思克提督李林隆等公議確探擇便以行李林隆可選標兵一二百各速往甘州商酌行事兵部即檄將軍提督等知之庚戌命副都統扎喇克圖等預備出征兵部奏言所派預備出征之副都統瓦爾達已授為右衛護軍統領右翼火器營副都統科爾對已調補右衛左翼炮營副都統馮國相已調補右衛右翼炮營副都統王育秀病故伊等員缺恭請欽簡得㫖以正紅旗副都統扎喇克圖鑲藍旗副都統宗室巴賽正藍旗副都統喻維邦正黃旗副都統張所知派出預備從軍七月庚午諭侍郎滿丕乘驛赴將軍費揚古軍前上諭滿丕曰爾可乘驛速赴將軍費揚古處率滿洲官兵駐劄歸化城北形勝之地倘有警同費揚古相機行事壬午申諭噶爾丹仍來㑹閲時噶爾丹遣使梅寨桑布拉特和卓等賫奏前來疏曰使臣馬迪之故前經屢次奏覆總之不善措詞致獲罪愆無復更新另奏之處至於㑹盟非不願也竊以為難自此地定奪奏聞洪仁皇帝若遣丹濟喇丹津俄木布往覲固所願也但朝夕不給是以無策至折卜尊丹巴庫圖克圖土謝圖汗七旗喀爾喀之事前經奏請今乞准行吳丹身雖已故然其存日曾與濟隆庫圖克圖當面議定乞如議行行商回子使人向來常往請安我是以使之前往貿易又達賴喇嘛之事漸次興隆使四十九旗蒙古四厄魯特各在其地同享安樂乞照前行奏入上命議政大臣集議議曰據噶爾丹使人梅寨桑等之言噶爾丹今歲未嘗耕種馬匹烙印收集獵戶統之以遊牧於塔米兒之地意欲掠取根敦帶青順克魯倫下流經車陳汗科爾沁之西以試之此言雖不足深信而亦不可竟以為虛刻下即發大兵恐噶爾丹聞風逃遁則我兵徒勞若竟不為備而噶爾丹逼近內地則我兵一時不能猝至亦未可定應檄黑龍江將軍薩卜素加意哨探以備至歸化城將軍費揚古軍前已有侍郎滿丕恭奉訓㫖前往應著費揚古同滿丕相機行事目下遣尚書班第探聽聲息俟班第到後令根敦帶青等入內遊牧即著根敦帶青等使其屬人遠設汛哨偵信奏報噶爾丹使人梅寨桑有留住此地之請但梅寨桑留住此地恐其竊聽妄行應仍遣歸侍郎滿丕曾以梅寨桑等歸去如不給餱糧必至窘乏具奏業蒙俞㫖准其給與今應遵㫖加恩給與餱糧前屢頒敕文曉諭噶爾丹已極明晰今伊仍故作不知朦混陳奏應不必降敕將原疏發回奏上得㫖著仍撰敕交來使賫回餘如所議其敕曰今春諭爾敕書實為明顯兹覽爾奏仍以不曉文義巧為飾說是爾故違朕㫖也且爾歷來陳奏皆云行達賴喇嘛之教今春遣爾使歸後達賴喇嘛及諦巴有疏以寬爾罪仍留汗號致請且云遵皇帝諭和之㫖特遣賴楞堪卜達爾漢溫卜前赴爾處等語今爾來使梅寨桑等言爾遊牧於塔米兒之地東向以行爾之所為必欲異於達賴喇嘛諦巴之言者是為遵其教乎是為不遵乎以此觀之爾口雖云不悖達賴喇嘛之教而竟不遵行明矣今爾既東向近來應仍㑹閲庶於事有定不然縱復遣官布告終屬無成其奏請㑹閲可令丹濟喇丹津俄木布二人賫來倘執故見不遵朕言嗣後爾永勿上疏通使故諭乙酉命京城盛京等兵速備調遣時將軍伯費揚古報稱臣向遣土默特參領塞冷特爾至塔米兒等處哨探七月二十日薄暮塞冷特爾歸告曰職等行三十一日至塔米兒以內四十里所有濟拉馬臺山之南遇厄魯特二十許人一見職等即止步發鎗矢職等亦以鎗矢相持後厄魯特縮回職等共有九人力薄勢寡亦徐徐而退星夜回歸據此具奏上諭內大臣蘇爾達等曰據將軍伯費揚古報稱所差哨探塞冷特爾至塔米兒以內所有濟拉馬臺山遇厄魯特二十許人互發鎗矢而回正與梅寨桑所稱噶爾丹來至塔米兒地方之語相符此不可以不備兵矣著派盛京兵二千寧古塔兵一千以備倉卒黑龍江兵著將軍薩卜素酌撥預備前曾諭薩卜素先來今應差人迎往諭止其來使歸去預備盛京人員乏糧倘有兵興之事著以盛京倉糧計日支給京城派出之兵亦著預備整齊如噶爾丹不向前來只在土喇左近竊伏或發大兵今冬進𠞰或肥秣馬匹來春往征爾等公同詳議以聞僉議備兵甚要諭㫖已極周詳當欽遵而行今我兵不必趨赴土喇但俟噶爾丹逼近前來則合衆往征一舉殄滅倘噶爾丹竟逡巡不進只竊踞土喇應俟得有實信當作何行事再奏請㫖奏入上從之命遣官分購外藩馬匹上諭大學士伊桑阿等曰馬匹所繫甚重應於四十九旗分行購買歸化城著買一千匹六鄂爾多斯十科爾沁著各買二千匹其餘各旗馬數作何分購爾等酌量議定委官前往㑹同各王台吉等遵諭以行議曰四十九旗䝉古出馬多寡不等所買之數不能畫一應酌量限定分為十路以便遣行科爾沁鄂爾多斯所買馬數既多部復遼處應將科爾沁土謝圖親王沙津五旗為一路科爾沁達爾漢親王班第五旗為一路鄂爾多斯六旗分為二路歸化城自為一路凡五路每路委部院官二員或䝉古護軍參領或驍騎參領或侍衛派一員同往再將兩喀喇沁及土默特貝勒厄爾德穆圖旗下為一路買馬六百匹土默特貝子喇思查普旗下及敖漢奈曼為一路買馬五百四十匹兩翁牛特阿祿科爾沁兩扎魯特為一路買馬四百六十匹兩阿霸垓兩阿霸哈納爾為一路買馬五百匹兩蘇厄特四子部落及喀爾喀之達爾漢親王諾內為一路買馬三百一十匹凡五路每路委部院官一員或䝉古護軍參領或驍騎參領或侍衛派一員同往其餘旗分馬匹稀少可無容購遣去十路官員約計馬值於戶部支領往㑹同該王貝勒貝子公協理旗務台吉他布囊等不分佐領但於有馬處購之所購馬匹即令各旗酌派官兵㑹同差往之員護送前來議入上命喀爾喀車陳汗所屬旗分亦著遣官前去購馬二千匹餘如所議聖祖仁皇帝親征平定朔漠方略卷十五

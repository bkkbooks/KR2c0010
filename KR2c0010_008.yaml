body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷八八月庚申內大臣索額圖奏報貟外郎阿爾必特祜歸自噶爾丹先是上遣阿爾必特祜等赴索額圖軍前使於噶爾丹至是索額圖奏言阿爾必特祜等歸偕濟隆庫圖克圖使人拉木扎木巴噶爾丹使人尊對格蘇爾至營問其情由阿爾必特祜等述噶爾丹之言曰所有情事已同滿丕等遣使上奏不復具疏但以書問王與皇長子內大臣安請遵商南多爾濟所傳明旨以土謝圖汗折卜尊丹巴速去畀我述濟隆之言曰達賴喇嘛所以遣我者為聖上與噶爾丹向來和好且皆我施主無分內外但急欲定此大事以早復命耳此事非王及皇長子內大臣親身就我或我親身來面議不能定也又視來人形狀甚覺倉皇有窺探大軍意厄魯特現至烏瀾滚地方覔山林深塹倚險結營又聞其祭旗誦經距我軍僅四十里辛酉大將軍裕親王福全等奏報擊敗噶爾丹於烏闌布通裕親王等奏言七月二十九日臣等聞厄魯特屯於烏闌布通即整列隊伍八月初一日黎明前進日中見敵設鹿角鎗炮列兵徐進未時臨敵發鎗炮擊之至山下見厄魯特於林內隔河髙岸相拒橫卧駱駝以為障蔽自未時交戰至掌燈時左翼由山腰捲入大敗之斬殺甚多右翼進擊為河崖淖泥所阻回至原處而立本欲盡滅餘賊但昏夜地險收兵徐退其噶爾丹死於亂兵與否俟後查明另奏外事關大敗賊衆謹以奏聞得旨覽王等所奏統領大軍進討厄魯特至烏闌布通大敗賊衆斬殺甚多王等調度有方官兵奮勇可嘉在事有功人貟著議敘具奏命撤回寧夏駐防兵上諭議政大臣曰前於西安發滿兵二千漢軍一千往寧夏駐防今已大敗厄魯特此所備兵著撤回西安其緑旗兵亦令各回本汛速檄康親王等偵探厄魯特敗兵奔潰者即發兵堵𠞰并檄知四十九旗各部長趣大將軍裕親王福全等速進兵追𠞰上諭裕親王及參贊王大臣曰卿等奏報大敗噶爾丹疏初三日已到此皆上天鑒臨祖宗默祐諸王大臣盡心官兵效力之所致也朕聞之焚香謝天不勝欣恱此後當何以窮其根株平其餘黨熟籌始末一舉永清勿留遺孽其詳議以聞裕親王等尋奏言八月初一日擊敗噶爾丹薄暮收軍次日即前進𠞰殺餘寇見噶爾丹所據險惡堅壁拒抗故使我將士暫息而噶爾丹適遣伊拉古克三庫圖克圖來復理前説請以土謝圖汗折卜尊丹巴畀之且云一二日內濟隆庫圖克圖即來講禮修好臣等悉遵聖諭數噶爾丹前後逆惡而遣之矣初四日濟隆果率其弟子七十餘人來臣等營外設幕迎入帳中臣及皇長子參贊王大臣授之信帕就坐濟隆言博碩克圖汗信伊拉古克三及商南多爾濟之言深入邊內部下無知搶掠人畜皆大非理聖上乃一統宇宙之主博碩克圖汗不過小部頭目何敢妄行但索其仇上謝圖汗及折卜尊丹巴致有此誤彼今亦無索土謝圖汗之意但祈聖上慨允以折卜尊丹巴遣送其師達賴喇嘛榮光莫大矣余曽語噶爾丹汝既求以禮修好不當逼處宜逺駐以待故使回就水草之地相候臣等謂之曰土謝圖汗折卜尊丹巴即有罪愆皇上自加罪責豈有因噶爾丹之言遂遣送達賴喇嘛之理因待汝來稽我行事我今即前進矣濟隆言余歸當力説噶爾丹勿索折卜尊丹巴而出邊外臣等詰之曰汝往來行説能保噶爾丹不乘間奔逸掠我境內人民乎濟隆言王及諸大臣仰體聖上仁心休征罷戰彼焉敢行劫斷不逺去必待我也臣等謂之曰汝雖保噶爾丹不敢妄行但我各路兵分行進𠞰伊等不知汝來講好齊進亦未可定濟隆惶迫曰如此事敗矣將奈何臣等謂之曰我軍遇厄魯特即行掩擊必然之勢也我等仰體皇上好生許汝所請當各發印文一道與各路領軍諸王大臣汝執此往不論遇何路軍兵即令送本路王及大臣即止不擊也因付以檄康親王土謝圖親王達爾漢親王內大臣蘇爾達都統額黑訥副都統馬席印文各一道濟隆大喜又臣等欽遵前旨給濟隆黃蟒袍一領縀九端白金百兩又給濟隆前所遣三弟子袍縀濟隆先遣兩弟子馳報噶爾丹臣等思噶爾丹乃狡詐之人雖不可全信但戰之次日屢遣人來必多窘迫臣等欲即進𠞰則厄魯特據險堅拒且聖諭屢行誡飭務期兵卒不致太勞計一舉滅之假其往來講解之間俟盛京烏喇科爾沁諸軍之至齊行夾擊滅此狡寇如有可除之機斷不誤也命議政大臣集議議曰大將軍王等既大敗厄魯特乃不即行𠞰滅明知濟隆行説以誤我軍而故聽之豈不坐失事機請敕大將軍王等作速追𠞰可也得旨出征諸王大臣當同心效力大將軍王與皇子失誤機宜衆大臣不正言抗阻軍律甚明歸時斷不姑宥此役所關甚巨今科爾沁烏喇盛京之兵初四五間可至達爾腦兒矣若又失機會不進逼之王與大臣此行何所事事耶臣謹按帝王統馭區宇必攘外而後能安內噶爾丹一日不滅則邊境一日不寧中國之徴兵籌餉一日不息皇上命將出師授以方略聲罪致討敗敵之後又嚴促進𠞰意在盡絶根株無使滋蔓真師有成律算無遺謀者矣向使諸王大臣同心協力稟承諭旨奮迅窮追何難尅期掃蕩以成一勞永逸之功而乃誤失機宜致使逋寇稽誅復煩聖主數年之宵旰臣編緝至此益以知睿慮周詳廟謨深逺非諸王太臣所能及其萬一者也乙丑車駕還京師丙寅命都統希福馳驛赴大將軍裕親王軍前參贊命兵部監牧八旗馬匹上諭議政大臣曰軍需以馬政為急其令每佐領馬各以十匹交兵部委官監視牧養肥壯以待有事之用如本兵有所差遣仍取原馬騎用至不用之時仍各繳還兵部令馬主記明顔色辛未命皇長子胤禔還京師內大臣公福善等奏曰向者遣皇長子以有攻戰之事使親率士卒而行也今厄魯特噶爾丹已敗歸矣所有不過會議事件並無交戰之事應令皇長子酌帶隨從人等乘驛先回其餘大臣侍衛執事人役各乘其馬量馬之力從容而行上從之癸酉噶爾丹以誓書乞和先是大將軍裕親王等奏言噶爾丹迫於追襲自什拉磨楞河載水橫度大磧山連夜遁走剛阿腦兒臣等欲追而馬力不能前進又恐噶爾丹去逺因與濟隆庫圖克圖約使噶爾丹近我而止以定禮好遣侍衛吳丹護軍參領色爾濟等偕濟隆往諭之如盛京烏喇諸部落兵俱集噶爾丹在近則協力進𠞰乃前所遣各路趣兵筆帖式來福回云初九日於噶爾達泰河遇盛京烏喇科爾沁諸部落兵距大軍有百餘里土謝圖親王沙津達爾漢親王班第內大臣蘇爾達盛京將軍綽克託烏喇將軍薩卜素言厄魯特已往達爾腦兒河去矣我軍如赴格勒弼勞則在厄魯特後今當往敖布喇克邀擊之若議好則姑待大將軍王等語至是裕親王等又奏言吳丹色爾濟與濟隆帶噶爾丹使人達爾漢格隆西達額爾克寨桑持書至告曰噶爾丹跪於威靈佛前稽首誓曰若違此書惟佛鑒之其書詞云達賴喇嘛明鑒遣濟隆額爾德尼來責以禮法今倘蒙皇帝惠好則自此不敢犯喀爾喀謹以印文為驗云臣等閲書未載誓詞仍遣濟隆等歸開諭噶爾丹增書誓詞臣等竊思噶爾丹見盛京烏喇科爾沁諸軍形勢不由原路抄出西北希林河而奔逃亦未可定若沿途虜掠諸部落則我民被其害聞是月初九日掠克西克騰三佐領搶去羊二萬餘牛馬一千餘前噶爾丹與吳丹色爾濟約自立誓以後不少犯矣今若果從伊拉克三濟隆之言輸誠向化將書備載誓詞臣等請給以印文許其歸好奏至命議政王貝勒大臣集議議曰噶爾丹乃極狡詐之人屢遣人以立誓為辭今劫掠克西克騰之三佐領矣誓好不可深信蘇爾達等軍已到應立行𠞰滅但王等親在軍中事皆目擊應準所奏令噶爾丹堅誓而釋之王等仍率大軍駐彼探噶爾丹出邊逺去實音令蘇爾達等軍照常防守上從之乙亥諭量撤官兵上諭議政大臣曰今噶爾丹敗遁漸逺應將無馬兵丁酌量撤回再將隨軍二次駱駝所負之米分給無糧兵丁以此駱駝將運到坡賴村之米裝載以迎大兵至邇來部落蒙古內有出首與噶爾丹潛通往來者彼此仇扳誣陷亦未可定其一併議之議曰上諭極當應一一欽遵至出首與噶爾丹潛通往來者或借端誣陷應俱免其察議俟命下之日檄大將軍裕親王等傳諭可也上從之丙子噶爾丹上書請罪大將軍裕親王等奏言十一日遣伊拉古克三赴噶爾丹十五日賫噶爾丹奏章還其詞曰伏蒙照鑒下情普使安全正在歡忭伊拉古克三庫圖克圖來諭以禮法事永圖至信理所宜然未知如何可以贊襄王事伏兾至仁皇帝鑒察謹上書為永逺不絶之信誓云又伊拉古克三云噶爾丹頂佛像設誓曰我自恃理直追索土謝圖汗折卜尊丹巴而深入邊汛置佛天於前而不以己之罪為罪可乎佛天以仁恕為心聖上即佛天也乞鑒宥我罪凡有諭旨謹遵行之今往界上視水草善地無人之處駐扎候旨尋又據濟隆持噶爾丹誓書來且述噶爾丹之言曰我蒙王及皇長子大臣見憐我正歡忭伊拉古克三來諭以永逺歸好之意我思倚皇上以為生今往界外駐候聖旨臣等思噶爾丹軍敗力窮觀其語不敢抗拒皇上天威籲請寬宥有倚我求生之意雖不可深信既恭順奏請伏祈睿裁奏至命議政大臣集議議曰噶爾丹不敢抗拒天威設誓請罪既獻誓書適符皇上好生之心請準其所誓令出邊候旨再檄裕親王內大臣蘇爾達等仍俟噶爾丹出邊另行請旨撤兵議入上許之隨遣侍郎額爾赫圖等同伊拉古克三賫敕往諭噶爾丹敕曰朕統御宇內率土人民皆欲使得其所雖窮壤異域之民亦必撫育各享安樂此本願也前者喀爾喀為爾所敗來歸於朕朕以天下之人皆在朕覆育之中扶衰濟困乃元后當行之事故受而育之並非利七旗喀爾喀之土地况朕興滅繼絶之意非啻喀爾喀為然諸窮困來歸者一體撫而養之是亦諭爾敕中所有也爾厄魯特喀爾喀兩相搆怨何所底止必至塗炭朕與達賴喇嘛仁愛為心特欲使爾兩國和好罷戰共享安樂達賴喇嘛遣濟隆庫圖克圖朕遣伊拉古克三庫圖克圖商南多爾濟往赴爾所爾乃違達賴喇嘛之教及朕之旨以追喀爾喀為名率兵入我邊汛行劫烏朱穆秦朕雖聞之尚未深信我朝用兵越險阻踰山海以闢疆土抗拒者誅之而已無有他人入犯我境者爾噶爾丹博碩克圖豈不知之後聞汝深入騷擾朕仍念爾向來職貢通好是以遣和碩裕親王及皇長子等授之以兵與汝共議非令討汝也爾衆先動我兵始舉是戰之後王及大臣奏請再戰而朕止之盛京烏喇科爾沁軍又請與戰朕又以待爾回奏而止之今爾以誓書來請罪求和王及大臣體達賴喇嘛及朕好生之素心按兵不行追殺爾今率爾兵出塞而居不得擅犯我屬下部落喀爾喀一人一畜亦不得有一人與衆部落往來通使爾倘有窘迫奏聞於朕朕必如前旨撫養斷不念爾舊愆若再違誓言妄行劫奪生事朕厲兵秣馬現俱整備必務窮討斷不終止丁丑命預備官兵防噶爾丹背盟上諭議政大臣曰噶爾丹雖認罪立誓上書請降但人殊狡詐難以深信我大兵撤後背盟妄行亦未可定且諭噶爾丹敕內有厲兵秣馬現俱整備之語仍宜發兵預備萬一有悖亂之信則夕聞朝發即可撲滅若待有變而後發兵緩不及事矣現在各佐領有喂肥馬匹著每佐領派護軍七名甲兵五名六名整頓備之其即會議議曰諭旨甚當俱宜欽遵而行此所備兵應派每佐領護軍各七名每旗護軍參領五貟內以一貟署為夸蘭大以護軍校二員署參領每參領派實授護軍校一員驍騎兵各五名每旗應派實授參領一貟署夸蘭大每參領派署參領一員散騎郎一員驍騎校一員又此所備兵亦應派出前鋒及火器兵緑旗兵現在每佐領派前鋒一名每旗前鋒參領一員侍衛一員無前鋒參領之旗分則以前鋒侍衛署參領火器營派兵二千以何項大臣率之而往將辨作何派出著火器營副都統具奏請旨又現備於歸化城之宣府緑旗兵一千藤牌手一百大同備兵二千內撤回一千各於其地備之此兵仍著許盛鮑敬等率之遵化備兵一千仍著師帝賔率之以備遵化此所派發前鋒參領前鋒侍衛護軍參領實授驍騎參領署夸蘭大俱著各旗都統前鋒統領護軍統領親驗奏派署參領散騎郎俱著各旗都統統領派出此軍每翼應派都統一員護軍統領一貟副都統二員前鋒統領一員此所派大臣該部具奏其總統是軍者伏候上裁奏入上諭曰左翼軍令都統瓦代華善護軍統領洪海副都統方格領之右翼軍令都統喀代護軍統領輝蘭副都統陶賴馬齊領之以陶賴署前鋒統領據議每翼派都統一員副都統二貟今減去副都統一員其左翼特多派都統華善此軍非為出征而派也以噶爾丹雖降而人殊狡猾不可深信萬一叵測所以派出備之其以此故曉諭官兵知之癸未大將軍裕親王福全等奏報撤回官兵裕親王等奏言臣等議每旗夸蘭大一員每參領章京一員前鋒參領每翼二員侍衛二員其馬稍可者每佐領護軍二名前鋒二百火器營兵四百帶子母炮三門鐵心炮五門留後其餘護軍驍騎包衣兵領都統額黑訥班達爾沙護軍統領馬喇侍郎溫達副都統查木素噶爾馬老蠻色康喀喇塞格音張朝午領之於本月二十二日起行而回盛京烏喇兵二十日已會大軍亦令撤回臣所統大軍俟吳丹視噶爾丹出邊回報另奏請旨九月戊子朔諭免扣盛京出征官兵預借俸糧户部奏言公綽克託侍郎阿喇密等借給盛京出征官兵次年二月俸糧又違例借給五月錢糧應交部察議其借給錢糧應扣除補項上諭大學士伊桑阿等曰盛京兵丁惟恃田禾月糧為生去嵗米榖不登貧民艱食故以屯糧散給近有戎事差一等侍衛齊蘭布調盛京之兵諭以無馬者給以厰馬無糧者給之屯糧念官兵急遽啓行造次整頓器械借支俸糧因而星速啓行雖未嘗接戰伊等鋭意滅敵殊為可嘉今若扣除貧苦兵丁艱於度日朕心甚為矜念其預給次年二月俸糧及五月錢糧免其抵扣以示朕優恤勞苦之意其擅給大臣亦從寬免交部察議丁酉諭操練禁軍上諭大學士伊桑阿等曰我軍近與厄魯特戰排列太密為賊人亂鎗所中且進退併不鳴笳此皆不習戰陳之故也自古兵法無不預加訓練前者八旗之兵春秋校獵即訓練武備之意但校獵恐疲兵丁之馬今既停止校獵其令八旗兵丁春秋二季集於曠濶之地布陳鳴笳教演步伐十月戊午朔命大將軍裕親王福全等駐兵留後裕親王等奏言員外郎蒙古兒等原解米一千五百石支給大軍外給留後之兵扣至十月初十日止但伊拉古克三侍郎額爾黑圖自八月起程月餘不歸以此觀之噶爾丹似出邊逺遁矣駐軍以待糗糧不足欲往駝運則堪用駱駝僅四百餘頭請檄喀喇沁王以車運致上曰前王等疏言俟伊拉古克三等歸再請旨撤兵今聞大兵前來哈嗎爾嶺以內此乃朕圍獵最熟之地距有米之處才二百餘里離喀喇沁既逺而欲動其兵馬以車運米此説甚謬議政大臣其集議之議曰大將軍等不行請旨擅率大軍內徙俟歸日一併察議今伊拉古克三額爾黑圖等尚未歸應以前鋒護軍共四百名留大將軍處其餘兵卒及火器營兵俱令撤回以車運米之請無庸置議應將坡賴村之糧酌量足留後兵之用所餘駱駝運往得旨著裕親王索額圖明珠費揚古阿密達留後其餘俱令還京餘如所議癸亥命分駐官兵於宣大等處以備調遣上諭大學士伊桑阿等曰噶爾丹雖立盟而去其人狡詐不可深信著於陜西各營步兵內選素習征戰人材壯健善於步行能用大刀連節棍者二千人戍守大同宣府以備明春有事時調遣再需善用藤牌大刀福建人數百駐於石硤以備調用古北口石硤之軍應設總兵官即令與該部會同選擇此駐防之兵張家口亦選步兵一千名駐扎即令宣府總兵官統之此兩處新設兵糧應較步兵錢糧增給議政王貝勒大臣其集議之議曰欽遵上諭應檄川陜總督以陜西各營步兵內素經戰陳人材雄健善於步行能用大刀連節棍兵二千其副將參遊以下等官量兵派出著總督巡撫提督總兵官親選自延綏等處就近撥發以一千戍守大同一千戍守宣府此官兵行糧及家口坐糧該督撫照例給發期於十二月到汛俟來年夏月無事撤回古北口張家口各添設善用藤牌大刀兵一千檄山東山西河南巡撫以開墾福建人內或能用藤牌或能用大刀善於步行者每省挑選三百名於十二月送到該部亦於京城酌量招募與各省兵共足一千以六百駐古北口四百駐石峽設總兵官一員副將一員遊擊二員守備四員千總八貟把總十六員令總兵官駐古北口副將駐石峽遊擊以下等官各以其半分駐仍皆總兵官統之召募兵到該部會同總兵官選擇其設於張家口之兵著於直隸各營步兵內有人材壯健善於步行能用藤牌大刀者著巡撫總兵官親選一千送往張家口所設統領官員亦照古北口石峽例令宣府總兵官統之此所設總兵官一員副將二員恭候皇上簡授遊擊以下官員著總兵官選擇具奏此兩處兵皆每月給以銀二兩米照常支給奏入得旨此兵務足額數朕當親閲古北口創設藤牌軍統轄之總兵官務選習於戰陳材技優長之人授之使不時操練襄陽總兵官蔡元諳練戎事著有勞績著調授古北口等處地方總兵官龍泉營參將王廷標著升為副將其張家口副將員缺著兵部推補丙寅命撤康親王傑淑等兵上諭大學士伊桑阿等曰康親王之軍今已無事王等及八旗滿軍緑旗兵俱撤回馬錫等兵亦撤回至左翼四旗察哈爾旗下管旗參領等官各身率該旗兵駐於正藍鑲白二旗之末防守勿離有警速報甲申伊拉古克三庫圖克圖侍郎額爾黑圖攜噶爾丹奏疏還時噶爾丹敗遁出邊伊拉古克三額爾黑圖等賫敕追及之噶爾丹具疏以謝疏曰向以一道同軌通使請安貿易往來間因喀爾喀變亂使人失詞遂生小釁兩庫圖克圖來宣布諭旨使歸於好神聖垂慈不勝歡忭嗣以逺來糧畜匱乏妄行獲戾而伊拉古克三庫圖克圖傳旨使全禮法仍歸和好既已加恩又許陳情心甚喜恱惟有欽遵諭旨奉行不違而已命撤大將軍裕親王福全等兵上諭大學士伊桑阿等曰大將軍裕親王兵著撤回及防守遵化州緑旗兵亦著各歸本汛十一月戊子朔諭車臣汗喀爾喀內徙以避噶爾丹劫掠上諭理藩院曰馬第至奏噶爾丹已向俄儂爾去或襲車臣汗劫其餱糧亦未可定應令附近彼處之喀爾喀遊牧內徙其以此檄知阿南達壬寅達賴喇嘛使人濟隆庫圖克圖請陛見先是大將軍裕親王等奏稱濟隆庫圖克圖及其諸弟子與青海衆台吉使人來告臣前赴京師請加聖主尊號至是濟隆到京進達賴喇嘛及厄魯特諸台吉奏章求面聖請安上諭曰朕與達賴喇嘛向皆念切生成以濟衆為務厄魯特喀爾喀交惡相攻朕遣使於達賴喇嘛欲同定兩國之好達賴喇嘛甚喜而遣汝朕亦遣伊拉古克三庫圖克圖往説之如爾等能和兩國止其攻戰朕尚思加達賴喇嘛以嘉號爾等追及噶爾丹於克魯倫曽不宣諭止之反與同行殺掠喀爾喀而入邊汛劫奪烏朱穆秦克西克騰諸部落人畜朕稍出兵訊其情事爾在噶爾丹營中坐視其戰使厄魯特先動我軍不得已而擊之此皆爾等不能仰體達賴喇嘛與朕好生之心以致喀爾喀破壞失所厄魯特敗亡甚衆職此之故朕甚羞見汝等復何請覲為也甲辰達賴喇嘛率西海諸台吉及噶爾丹等具疏請上尊號達賴喇嘛等疏曰虔誠望闕拈香散花上奏奉天承運宇宙至聖皇帝睿覽伏以十乘諸菩薩為生靈下降出家則成佛在家則轉輪光現三十二種各妙相總持四大部洲諸福輪威儀畢具在世小紀之理不下八萬嵗而况論大紀則無量無涯也欽惟皇帝陛下闢空門而無倚現七寶以轉鈞奉神力於壽天自九重而錫福位正金獅之座恩澤覃敷文垂龍袞之衣祥光普照是以率邊境之君長向蓮跏而長跪仰見威行天討剪此凶頑仁慈懷柔覃於衆庶謹上尊號曰大慈普度息爭錫福至聖上乘文殊皇帝虔修貢賀伏乞天開淨目輪發金光江水長流源源垂照嵗在己巳月建星紀除日吉旦謹奏旨下議政王貝勒大臣集議議曰欽惟皇上聲教所及遍於方隅恩威所加極於覆載率土臣民莫不歸命矣今土伯特厄魯特等蒙古諸國君長會集西海衆台吉以達賴喇嘛為首請上皇上尊號此感恩懷德之舉出於至誠極敬之心自古以來藩國景從愛戴未有如今日者也臣等愚昧以為皇上宜體諸藩誠請之心允受尊號納其貢物伏乞睿鑒上諭曰朕統御宇內冀中外人民咸無戕賊共享升平是以前聞喀爾喀七旗兄弟不睦特遣使於達賴喇嘛欲使歸好達賴喇嘛遣噶爾丹西勒圖朕遣尚書阿爾尼前往而伊等所行不能仰體朕心及達賴喇嘛之意雖已和喀爾喀七旗而喀爾喀與厄魯特相仇之故實從此起後聞交惡興戎即遣使於達賴喇嘛達賴喇嘛遣齊緝克他賴堪布朕遣阿齊圖綽爾濟學士拜里等止彼相攻乃伊等不行宣諭止之聽其縱戰喀爾喀遂為所敗朕不忍坐視復遣使達賴喇嘛相與同定兩國之好達賴喇嘛遣濟隆庫圖克圖朕遣伊拉古克三庫圖克圖往説之詎意兩人見噶爾丹不行諭止與之偕行闌入邊汛搶奪人畜朕出兵問罪而兩人又不為諭止立視其戰我軍不得已而擊之致厄魯特大敗逺遁請罪朕與達賴喇嘛期於撫育衆生而使臣故違意旨遂至於此如能使兩國和好朕尚欲加達賴喇嘛嘉號此皆任事行人不能仰副朕心及達賴喇嘛之意或以貪得其和不成是以喀爾喀殘破厄魯特喪敗朕心甚為隱痛有何可賀而受尊號乎其以是曉諭達賴喇嘛諸汗衆台吉來使貢賀禮物其併發還優升克西克騰四等台吉莫倫等為一等台吉理藩院奏言克西克騰四等台吉莫倫噶爾必哨探斥堠著有勞績俱應升一級諭曰莫倫噶爾必哨探斥堠效力甚多俱著優升為一等台吉其以此曉諭諸部落己酉治烏闌布通交戰諸王大臣罪敘火器營左翼官兵功先是大將軍裕親王福全參贊諸王大臣率兵還京師上命王及大臣止宿城外聽勘至是信郡王俄扎等取供議罪奏言皇上深慮噶爾丹姦狡此役不行𠞰除必貽後患多派精兵盡發火器以裕親王福全為大將軍王大臣為參贊指授方略務期盡滅根株乃福全等調度乖方既經戰勝不能乘機𠞰滅收兵又不鳴笳賊敗不行追殺反行文禁止蘇爾達等進兵以致窮寇遁逃殊誤軍機且未經請旨率兵擅回哈嗎爾嶺內應將裕親王福全恭親王常寧簡親王雅布俱革去王爵福全撤去三佐領國舅內大臣佟國維內大臣索額圖明珠阿密達俱革職都統公彭沖前鋒統領班達爾沙護軍統領楊代苗齊納俱解任都統宗室蘇努喇克達都統阿錫坦諾邁不準敘功內大臣蘇爾達費揚古都統希福副都統色黑老蠻色俱罰俸一年散職大臣扎努喀革職奏入得旨噶爾丹於烏闌布通為我軍擊敗遁走而領兵諸王大臣不復追殺反信濟隆庫圖克圖議好之誑詞遣人語內大臣蘇爾達等令盛京烏喇諸路兵勿與之戰是以噶爾丹奔竄過盛京烏喇科爾沁軍營竟不邀擊縱之使去其時蘇爾達欲羈縻噶爾丹與土謝圖親王沙津達爾漢親王班第等公同商議選差公主之子阿喇善下人俄齊爾及郭爾羅斯台吉吳爾圖納蘇圖旗下佐領祈他邁往令噶爾丹且止將與之會語噶爾丹不少留倉皇宵遁如使蘇爾達等邀擊之則噶爾丹可以就擒矣伊等不戰乃大誤也福全等俱應依議治罪但此舉已擊敗厄魯特兵噶爾丹逺遁諸王大臣概從寬免革福全常寧罷議政與雅布俱罰俸三年福全撤去三佐領佟國維索額圖明珠蘇努喇克達阿錫坦諾邁俱罷議政與阿密達彭沖班達爾沙楊代苗齊納各降四級留任蘇爾達費揚古希福俱免罰俸色黑老蠻色俱罰俸一年扎努喀著革職火器營左翼戰功照常議敘嗣兵部議敘以火器營官兵及左翼交戰將士為頭等軍功十二月己未命賜噶爾丹白金千兩噶爾丹奏言自喀爾喀變亂以來貿易不行籲請恩賜白金以育衆庶理藩院及議政諸王大臣議以厄魯特汗諾顔台吉無賜白金之例上曰噶爾丹籲請懇切著賜白金千兩聖祖仁皇帝親征平定朔漠方略卷八

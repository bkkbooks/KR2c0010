body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷二康熙十九年二月庚午兵部督捕理事官拉都虎覆奏吳喇忒被劫事拉都虎奏言臣奉命至巴圖爾濟農所察訊劫掠吳喇忒事濟農言我䝉聖恩許我由水泉過邊往見我兄我乃擅在大草灘游牧方以不免罪戾是懼敢劫掠吳喇忒乎前額爾德尼和碩齊與我同來留六日即去聞其率兵四百往劫今尚在土謝圖汗之地游牧我試遣人追其所劫人畜以報臣因待之嘉峪關越四旬得歸者十八人臣復至濟農所令遣使召額爾德尼和碩齊面詰之至則曰我等為噶爾丹所敗拋棄妻子挈楚呼爾吳巴什之孫憨都台吉來奔饑不能自存遊行捕獵至吳喇忒之地殺奪人畜是實此事濟農等皆不知所掠人口除送到之外餘者已他售矣實無力償補因叩頭祈免死時濟農之弟羅卜臧台吉曾在寧夏相近毛明安地方劫掠馬匹濟農因屬下人等先曾劫掠鄂爾多斯牲畜遂向其弟查取馬百二十匹交臣謹一併奏聞上曰巴圖爾濟農既未行劫可勿罪額爾德尼和碩齊已檄噶爾丹令其收捕俟覆奏到日再議其察獲人口馬匹理藩院遣官交與被掠之部康熙二十年八月辛丑喀爾喀羅卜臧台吉仍舊制入貢順治十二年設立喀爾喀八扎薩克獻納年貢羅卜臧台吉其一也康煕元年右翼扎薩克圖汗與羅卜臧台吉等內自相亂扎薩克圖汗旗破身亡而羅卜臧台吉避入厄魯特噶爾丹部下九年特㫖以扎薩克圖汗之子襲為扎薩克圖汗而封阿海台吉之子阿海帶青為遵義盆楚克台吉授為扎薩克各賜敕印獻納年貢至是噶爾丹送羅卜臧台吉歸扎薩克圖汗扎薩克圖汗以羅卜臧台吉向係扎薩克仍令循舊制入貢奏至上允之乙巳巴圖爾額爾克濟農遣使進貢請罪巴圖爾額爾克濟農疏曰寶體居四海之中如須彌之固仰思儀範定得休和厄魯特時值大壞不能存活特來歸命原無違悖聖主之心祗以竊取牲畜深自悔罪思欲賠償因將他人所掠吳喇忒人口寧夏馬匹竭力凑納伏乞聖主鑒而憐之奏至諭曰此案前曾檄諭噶爾丹未經覆奏著將原由明白開列再行檄諭俟覆奏到日再議貢物著察收九月辛未命外藩䝉古王等議弭盜之策國家恢宏景運式廓疆宇自祖宗以來節次收服察哈爾科爾沁阿祿科爾沁巴林杜爾伯特扎賴特郭爾羅斯土默特喀喇沁敖漢奈曼翁牛特扎魯特克西克騰四子部落烏朱穆秦阿霸垓蒿齊忒阿霸哈納爾蘇尼特吳喇忒鄂爾多斯喀爾喀毛明安歸化城土默特蒙古諸部落一體編立旗分佐領布列塞外兼容並育救災恤患所以撫綏之者甚至至是以諸䝉古盜賊竊發不安其生諭大學士覺羅勒德洪明珠等曰烏朱穆秦等各旗䝉古住牧於喀爾喀巴爾虎之間先竊彼兩地馬畜以致喀爾喀巴爾虎等亦盜竊其馬畜以報之曩無盜賊時驅馬北至凉地牧養肥壯收回儘可度冬自盜賊繁興夜間不敢放馬拘於欄柵中牢籠防護馬不得肥以致不能度冬斃者甚多且喀爾喀巴爾虎等結黨行竊夜襲邊汛我汛地之人畏懼四五汛併居一處兩汛之間或距一日二日之程其間盜賊公行出入此汛雖覺不能立即達知彼汛且貧窮䝉古馬畜被竊急報該王貝勒及總統扎薩克等間有不肖者或貪飲沉醉不即遣人緝拿詳細察究縱有首告置若罔聞耽延時日有報一馬被竊者守候食費竟至數馬今有馬被竊不敢舉首多行隱匿誠以此也朕聞之深為惻然軫念作何籌畫得以屏息盜賊貧窮者各遂其生其令議政王貝勒大臣䝉古內大臣散秩大臣及來朝貢之外藩䝉古王以下一等台吉以上公同詳議具奏議政王大臣等奏曰外藩䝉古王貝勒公台吉等言聖諭誠是祗因臣等庸劣不能管轄所屬部落以致盜賊生發屬下䝉古失其生計皇上軫念欲使各遂其生臣等感激靡涯以臣等愚意各汛地應多增人數嚴密防守向來守汛不用內地十旗之兵今此十旗亦應照各旗一體守汛遇有馬畜被竊等事告之該扎薩克立即准行一切事件俱限日歸結違則嚴加治罪又圖納黑公議云䝉古遊牧地方之外邊汛之內各形勝處應屯兵百許掘濠障守查緝外賊之入內賊之出盜賊似可屏息又䝉古內大臣議云凡汛哨俱按該管旗分地方安置嗣後管扎薩克之諸王貝勒貝子公台吉等果能撫養旗人屏息盜賊俾屬下䝉古各得其生則進級議叙如該旗盜賊繁多屬下流離貧困則酌議治罪奏入諭曰喀爾喀各旗䝉古向來敬慎職貢本朝無故添汛置戍於理未洽其一切事件限日歸結所議誠是也朕思喀爾喀等歷世恭順往來進貢殊堪憐憫應遣賢能大臣前往喀爾喀厄魯特處大加恩賚以示柔遠至意即令遣往之大臣諭以前此內地䝉古盜竊馬畜以致喀爾喀巴爾虎亦行報復彼此互相盜竊不已其內地䝉古已經嚴察禁飭外爾等所屬亦應嚴加約束爾地亦宜設汛置哨遇有盜竊兩汛互相覺察議政王貝勒大臣䝉古大臣並外藩䝉古王等奏曰聖諭允當靡不包舉非臣等愚見所能及也欽遵諭㫖行之不但冦盜息而貧窮䝉古各遂其生即喀爾喀厄魯特等荒服之國愈仰戴浩蕩鴻恩於無盡矣康熙二十一年七月乙卯命大臣台吉等往使厄魯特喀爾喀先是上以三逆蕩平武功耆定將親詣盛京告祭陵寢諭大學士覺羅勒德洪明珠等曰今天下乂安應遣大臣使厄魯特喀爾喀大加賞賚俟盛京回日時和草青舉行洎禮成還京議政王大臣等奏請遣使擇吉起行得㫖厄魯特噶爾丹博碩克圖汗著內大臣祁他特一等他布囊俄齊爾一等侍衛覺羅孫果御前侍衛阿南達員外郎恩格森喇嘛薩木坦格隆去喀爾喀左翼土謝圖汗著領侍衛內大臣伯費掦古一等台吉額駙阿喇卜灘護軍參領巴圖郎中喀喇去折卜尊丹巴庫圖克圖著大喇嘛垂重格隆去車臣汗著散秩大臣波羅特一等台吉吳爾圖納蘇圖一等侍衛溫達郎中色稜去額爾克帶青諾顔著精竒尼哈番副都統班達爾沙二等台吉額駙諾木齊一等侍衛薩哈達員外郎鄂齊爾去墨爾根諾顔著內大臣壽世德副都統楊代四等他布囊索寧員外郎胡什巴去右翼扎薩克圖汗著都統阿密達二等台吉根敦什希卜一等侍衛班第員外郎偏圖去盆楚克台吉著內大臣覺羅吳默納一等他布囊鄂摩克圖一等侍衛馬塔員外郎達賴去額爾德尼濟農著都統宗室拉克達二等台吉扎木揚護軍參領庫蘇纍員外郎馬迪去色稜阿海台吉著一等侍衛拜音察克一等台吉拉第長史佛保員外郎巴朗去達爾馬希里諾顔著一等他布囊鄂齊爾前鋒參領扎木蘇長史河洛主事齊蘭保去羅卜臧台吉著一等侍衛多爾濟扎卜二等台吉額林辰長史哈納米員外郎桑格去尋令議所賞禮物厄魯特噶爾丹博碩克圖汗喀爾喀土謝圖汗車臣汗額爾克帶青諾顔墨爾根諾顔扎薩克圖汗盆楚克台吉色稜阿海台吉額爾德尼濟農達爾馬希里諾顔羅卜臧台吉每人各賞以貂皮蟒袍黑貂大褂茜黑貂帽珊瑚素珠各一件皮靴縀襪各一雙鑲嵌松石鞓帶一圍手巾合包小刀牙筒俱全鑲嵌松石珊瑚撒袋一副弓矢俱全鑲嵌松石珊瑚金茶桶鍍金篐銀飯桶銀盆各一具茜黑貂皮獺皮豹皮虎皮海豹皮各五張茶九簍大小綵縀各九十匹毛青三梭布各九百匹又喀爾喀折卜尊丹巴庫圖克圖賞以大手帕七副玉瓶有柄玉碗珊瑚素珠鏤金雕鞍鑲嵌松石珊瑚金茶桶鍍金篐銀飯桶銀盆各一具茜黑貂皮獺皮豹皮虎皮海豹皮各五張茶九簍大小彩縀各九十匹毛青三梭布九百匹瀕行上召祁他特費揚古等諭曰爾等俱係貴顯之臣凡事須仰副盛典以正大行之爾等皆屬一體勿以滿洲䝉古各分彼此務須同心協和滿洲大臣不諳䝉古語言凡議事爾台吉他布囊等譯宣於滿洲大臣一同商酌確妥對答之勿致失言爾等所言伊等所答及一切傳聞事件俱録之來奏至內地䝉古向與喀爾喀互相盜竊以致盜風大作如妄行作亂生事者各自擒拿懲究盜何自生盜賊既弭則牲畜可以散放牧養牲畜既肥則入冬不瘦春時孶孕無復可虞誠如是䝉古何至貧困又加以各置汛哨遇有妄行作亂之人即從公究處則民庶得安其生矣其以此曉諭之祁他特等奏言敕書賞物臣等作何交授伏請訓㫖上曰朕念厄魯特喀爾喀纍世恭順恪修職貢今以海宇升平乘此閒暇特遣爾等往賫重賞優加恩賚並無他故我朝威靈德意天下外國無不知之者諒厄魯特喀爾喀必大加恭敬然伊等向行之例俱用䝉古禮今若凡事指授而去或致相岐行事反多滯礙爾等皆遴選而使者凡事務須仰副盛典各持大體隨宜而行地方遙遠不及逐一指授厄魯特喀爾喀依彼䝉古之例大加尊敬則已祁他特等又奏曰厄魯特喀爾喀之汗貝勒有赴達賴喇嘛或至他處者則待之乎上曰在旬日半月內歸者則待之如遲則不必待誰為之首即交為首之人而來多爾濟扎卜等奏曰近聞人言羅卜臧台吉已為扎薩克圖汗所執如其說果真則敕書賞物將如之何上曰爾等可於沿途細加採探如果被執爾等即歸可也多爾濟扎卜等又奏曰羅卜臧設有子弟代襲則敕書賞賚可與之乎上曰不可與也雖有子弟代襲須喀爾喀通國保奏授為扎薩克准納九白之貢始可加以恩賚且部中向有定例祁他特等奏曰理藩院移文令臣等查詢定議收捕額爾德尼和碩齊巴圖爾額爾克濟農等并給發貢使符驗之事伏請訓㫖上曰此無庸多議也額爾德尼和碩齊等如係噶爾丹屬下即限日收捕如非彼屬下不能收捕我朝另有裁奪至給發貢使符驗前已諭檄噶爾丹矣近見來使有給符驗者亦有不給符驗者何項人等給以符驗須詢明至無符驗不准放入之例亦明白曉諭之祁他特等奏曰厄魯特喀爾喀等於臣等回時欲遣使同行則與之偕來乎上曰如無粗重囊槖途次無所耽延則與之同來上又諭曰爾等行路如馬駝等物被小盜偷竊當優容之勿令追賠更須約束隨從人等毋使妄行爭鬭厄魯特喀爾喀有至爾等旅寓者須以禮貌和藹接待之和則可識其心志祁他特等又奏曰厄魯特喀爾喀如因皇上重加恩賚有所餽遺臣等可受之乎上曰受之賜厄魯特噶爾丹博碩克圖汗敕曰朕惟自古帝王統馭㝢內遐邇同仁無分中外霈恩膏於萬邦布聲教於四海其歷年久遠誠敬職貢者愈加隆眷優錫殊恩爾噶爾丹博碩克圖汗自爾父兄歷世相承䖍修禮好敬貢有年延及爾身篤盡悃忱往來不絶殊為可嘉朕久欲加恩賚以示優恤至意祗以幾務殷繁是以未逮兹海宇升平惠澤宜溥特遣大臣侍衛官員等賫捧重賞大霈恩施爾承此寵錫當益戴德意殫心敬順以仰副朕柔遠同仁協和萬邦之至意賜喀爾喀汗濟農諾顔台吉等敕亦如之八月己卯詔停羅卜臧台吉賞奉使侍衛多爾濟扎卜台吉額林辰等至張家口外空郭爾鄂波之地遇厄魯特噶爾丹貢使薩拉克圖爾問羅卜臧台吉為喀爾喀扎薩克圖汗所執果有此事否其同來布庫班第係扎薩克圖汗之人對曰羅卜臧欲與俄羅斯合謀攻我汗我汗遣其子率兵萬人於今嵗二月終旬夜乘羅卜臧酣寢執之其屬下人俱為俘虜財物及馬駝牛羊俱為我軍所獲我曽執纛隨行此目擊之事也多爾濟扎卜等據此奏報得㫖羅卜臧台吉被執既真爾等携賞物即回乙酉督捕理事官拉都虎以龍頭山形勢覆奏先是厄魯特噶爾旦巴台吉之子鄂齊爾圖汗之孫羅卜臧滚卜疏稱我祖父向曾往來入貢後以內亂往依達賴喇嘛今幸得稍寧伏乞皇上俯鑒我等饑渴撫而恤之請率所轄居龍頭山之地理藩院轉奏得㫖此龍頭山在邊關何處自邊關行幾日可到與內地有關否或向係邊外無用之地否著即檄拉都虎察明原委作速奏報至是拉都虎覆奏曰䝉古稱龍頭山謂之阿喇克鄂拉乃甘州城北東大山之脉絡綿衍邊境山之觀音山口即邊關也距甘州城三十里距山丹城三里其夏口城距山口而建自夏口城至􅓳川堡相去五里山盡為寧遠堡此堡在邊外龍頭山與寧遠堡相去里許其間有長寧湖界之䝉古所謂鄂爾通也寧遠堡有內地人民種植輸賦沿湖則兵民牧養焉今諸䝉古俱於龍頭山北游牧羅卜臧滚卜之意欲占長寧湖耳邊汛要地似不宜令不諳法紀之䝉古居住理藩院兵部議以羅卜臧滚卜所請應不准行報可九月癸亥巴圖爾額爾克濟農償解盜竊馬匹巴圖爾額爾克濟農疏曰厄魯特時值敗壞饑餓來歸䝉皇上帡幪之庇得居邊境不意屬下人等不知法紀妄行盜竊悔罪無及除將額爾德尼和碩齊所掠人口追還上納外其竊馬人等窮困已極不能償還臣與衆屬裔竭力捐輸共得馬百匹解送交納伏乞聖主睿鑒又臣之屬裔貧困無聊寧夏地方與臣相近伏懇天恩許在寧夏貿易理藩院議應檄諭巴圖爾額爾克濟農將盜竊鄂爾多斯馬羣人等照彼例治罪缺解馬匹補償完日將巴圖爾額爾克濟農一併從重議處現解馬匹交發鄂爾多斯旗下其寧夏地方向無厄魯特喀爾喀貿易之例所請不准行議上諭曰巴圖爾額爾克濟農等自本地敗奔來至邊境因不諳法紀迫於饑困盜竊牲畜等物今陳其苦情諄諄奏請可將追償缺解馬匹并議處之處俱行寬免仍移文嚴禁嗣後毋得違法妄行生事此文即發拉都虎轉行曉諭之餘如所議十二月癸未喀爾喀汗等奉表謝恩領侍衛內大臣伯費揚古等賫敕至喀爾喀諸部汗及濟農諾顔台吉感戴皇仁優加恩賚各遣使護送欽使大臣等還朝併各遣子弟台吉來京代覲奉表謝恩其詞曰瓦察喇土謝圖汗等謹奏聖明皇帝陛下宏仁遠被剪滅諸凶道法廣施敉寧庶類奠輿圖於鞏固大振天聲握智慧之寶珠覃敷聖化恩施下逮曷任歡欣敬奉表箋上貢方物奏至上命給賞如順治十四年例且以御服貂裘賜之康熙二十二年七月戊戌使厄魯特內大臣祁他特等還以其使臣來覆命祁他特等奏曰臣等將至厄魯特之地先遣薩木坦格隆等前往於十一月二十八日至薩爾巴爾兔地方薩木坦格隆等回報曰我等已見噶爾丹言遣使之故噶爾丹云中國使臣從無臨我厄魯特者今聞遣使前來不勝欣悅爾明日可即起行我亦遣人往迎其來迎之人格塞爾尋至十二月初十日至茅西口噶爾丹又遣其寨桑色稜來迎設筵以待饋臣等四人馬各一匹給驛馬九十匹駱駝十頭及食用羊隻二十四日至齊齊哈止宿噶爾丹又遣其寨桑車臣來迎車臣以其私問曰自古以來從無遣使涉我地者今來有何事敕內辭意可得聞乎臣等曰敕辭並無他故今天下太平乘此閒暇特沛皇仁大加賞賚我等明日即到如何迎接如何行禮汝仍先來迎告以便交授敕書及賞賚幣物次日既近噶爾丹所居噶爾丹遣其格塞爾來告曰本當即與中國使臣相見受賞但自古及今從無使來今乃初次應擇吉受之臣等曰天子敕書所到之處當即祇領今既欲擇吉當少待之將所擇日期并如何行禮之處即來告我頃之格塞爾以其汗之言來告曰擇以二十八日為吉中國禮繁我國禮簡而易中國部臣受之上奏一月後方行賜宴我國雖無部院而有寨桑若使寨桑接受是行中國之禮也如我國之禮則使臣以敕書并賞賚諸物親授我汗我汗親身受之至二十八日臣等賫敕書並賞賚諸物進噶爾丹所居帷幕見噶爾丹膝席以俟及交敕書噶爾丹俯身兩手受之其衣服等物則彼左右之人受之其器用幣帛等物并駱駝牽入一一展視受之臣等傳㫖問噶爾丹無恙噶爾丹語其近坐之喇嘛曰幸無恙敢請皇上起居臣等答曰天子萬安既坐噶爾丹問曰聞中國有冦亂遲至數年始滅其信然乎臣等答曰比年曾有冦盜竊發我天子仁慈恐用兵擾民故漸次收服者有之𠞰滅者有之今已盡皆底定矣若似爾地曠野何至持久耶噶爾丹又曰聞遣八人至唐古特國習其文有學至精妙者乎臣等曰有學至精妙者乃設宴宴畢歸於旅次二十九日請觀喇嘛作儺舞臣等往閲之正月朔日請聽喇嘛講經講畢噶爾丹即邀入所居幕中設筵凡三日至初九日臣等召寨桑車臣吳爾占扎卜至將部發查訊額爾德尼和碩齊巴圖爾額爾克濟農之文授之曰此項事情先已檄行兩次並無回文故因我等此來之便令定議如額爾德尼和碩齊巴圖爾額爾克濟農係爾屬下人當限日收捕照例治罪賫罰贖送部若非爾屬下人或不能收捕我朝另有裁奪頃之寨桑車臣等以其汗之言來告曰前所行兩檄信有之第以為部文所以未答今諸大臣稱係聖㫖敢不以覆額爾德尼和碩齊者原係我屬下人得罪而逃至中國又復獲罪可往擒之其屬産等項悉聽上裁至額爾德尼和碩齊本身乞以畀我臣等曰額爾德尼和碩齊獲罪於中國乃欲擒彼與汝是何言耶且汝等止言及額爾德尼和碩齊而巴圖爾額爾克濟農與汝無涉乎車臣曰請以此再告我汗頃之來覆曰額爾德尼和碩齊巴圖爾額爾克濟農皆我所屬此二人已歸達賴喇嘛我當遣人往召之倘如命而至我治其罪爾等遣人來取罰贖若復他遁則無如彼何也臣等令彼約期期以丑年四月臣等曰嵗內可結之案何緩至三年乎曰遣人至額爾德尼和碩齊巴圖爾額爾克濟農處往返約須一年倘不能即結勢必遣使前往達賴喇嘛并達賴巴圖爾處道路遙遠不能不緩其期期內或得即結亦未可定臣等曰額爾德尼和碩齊等向在邊境作亂但念汝等職貢年久所以姑待今約期既遠其間未必不又作亂也彼稱噶爾丹之言曰其間或又作亂一惟上裁臣等又謂之曰去年七月有稱為汝汗之姪丹津溫卜之使者並無符驗前來進貢汝處何項人等給之符驗何項人等不給符驗彼復稱噶爾丹之言曰我遣使請安進貢必有印文至我屬下之人各處貿易潛至中國冒稱我使亦未可定且杜爾伯特圖爾古特和碩特等部落雖皆在我屬下其居住遙遠不便取我符驗我亦不及給之且伊等向來亦不用符驗也自今以後我若遣使當用印文開注年月日期而遣之臣等曰汝母弟子姪等各自遣使往來汝給以符驗否乎答曰此無庸給符驗也我有三印若非此印即非我使也臣等曰汝母與弟及子姪等若無汝符驗則不准入關汝知之乎曰准入關與否一惟上裁至十九日臣等召吳爾占扎卜至謂之曰我等將於二十一日起行矣其以我馬駝來吳爾占扎卜稱其汗之言曰願留一二日至二十一日臣等又召寨桑等至語之曰我等奉命而來不便久待越翼日行矣彼又稱噶爾丹之言曰道里遙遠䝉皇上俯念特遣使至諸大人起行之事我知之矣至二十三日設筵以餞臣等於正月二十七日起行噶爾丹博碩克圖汗遣其額爾克格隆察汗溫卜卓禮克圖溫卜盆楚克等四人貢馬四百匹駱駝六十頭貂皮三百銀鼠五百舍利孫皮三張沙狐皮一百黃狐皮二十活雕一隻貼金牛皮五張厄魯特鳥鎗四桿隨臣等來謝恩祁他特等又疏曰臣等去年十二月初至噶爾丹地方有歸化城都統顧慕德所屬班達爾善之子巴朗來投臣等告曰我於康熙十八年正月自歸化城歸途遇厄魯特所使寨桑阿卜都拉額爾克同入貢之格楚爾者將我捆縳帶至此地今聞大人至此特來相投臣等召其寨桑車臣等語之故且曰此巴朗乃天朝另戶之民非人家僕也其格楚爾以汝國例應治何罪車臣復告曰我汗言當拘格楚爾訊之越數日問之言格楚爾已他往矣早晚即歸候至十八日尚無覆臣等曰我等即日起行格楚爾事曾訊之否車臣等往見其汗來告曰格楚爾已回又復去矣以此觀之其所行之事是真故避去耳但我國一切罪犯從無殺之之例可罰格楚爾以十五九牲畜乞諸大人稍候帶歸臣等言我等奉差頒恩賞而來並非來取罰贖其妄行之人令汝等懲究聞之於我我等不便等候俟有貢使之便將罰贖附解可也疏入得㫖令議政王貝勒大臣等逐一詳議議曰噶爾丹博碩克圖汗纍代進貢往來通好今將敕書賞物照彼䝉古禮接受恭請聖安又稱嗣後遣使俱給用印符驗填注年月日期應無庸議其額爾德尼和碩齊等事約以丑年四月為期約期之內如仍復作亂悉聽皇上聖裁應俟所期之年再議攜回之巴朗交都統顧慕德其格楚爾應俟照彼國例治罪將罰贖牲畜解送到日所司再議上從之九月戊寅命拉都虎回京理藩院以鄂爾多斯多羅貝勒宋拉卜報稱厄魯特之巴圖爾額爾克濟農移近黃河對岸游收請遣官往㑹宋拉卜等諭令退回奏入得㫖不必遣官其以此情節檄發拉都虎曉諭退回拉都虎久勞於外事畢令竟來京回奏癸未命宣諭厄魯特噶爾丹約束貢使敕曰自聲教既一以來爾歷世相承䖍修職貢聘問有年朕嘉爾盡心敬順往來不絶故向來爾處所遣之使不限人數一概俱准放入邊關前此來使無多且頭目人等善於約束是以並無妄行作亂者比年爾處使來或千餘人或數千人連綿不絶沿途往回搶奪塞外䝉古馬匹牲畜進邊之後任意牧放牲畜踐食田禾捆縳平民搶掠財物妄行者甚多邊外䝉古與內地百姓非不能相拒報復祇以凛遵朕之法度耳朕俯念爾等素行恭順不將若輩照內地律例究處以致妄行殃民日以益衆用是限定數目放入邊關嗣後爾處所遣貢使有印驗者限二百名以內准入邊關其餘俱令在張家口歸化城等處貿易其向來不用爾處印驗另行納貢之厄魯特噶爾馬帶青和碩齊和碩特之博洛庫濟台吉杜爾伯特之阿爾達爾台吉圖爾古特之阿玉竒台吉等所遣貢使放入邊關者亦不許過二百人爾噶爾丹博碩克圖汗尚毋違朕視四海一家中外一體至意敬慎遵行嗣後遣使必選賢能頭目嚴行約束若仍前沿途搶掠殃民作亂即依本朝律例傷人者以傷人之罪罪之盜劫人財物者以盜劫之罪罪之特此先行曉諭爾其知之十一月壬申敕諭喀爾喀毋越境遊牧喀爾喀土謝圖汗車臣汗額爾克帶青諾顔墨爾根諾顔各遣子弟請安入貢並口奏曰去嵗䝉皇上諭令各牧地設立汛哨以警冦盜但我等就草游牧居止不定難以置哨聖上限以何處為界請遵㫖而行理藩院議曰康熙三年七月內喀爾喀等越噶爾拜瀚海之地前來游牧皇上軫念邊境地方亂之所生皆由於此特遣都統畢力克圖等賫敕於車臣汗丹津喇嘛令其曉諭部下屬衆毋許越境游牧今亦應撰寫敕書賫發曉諭上是之敕曰爾喀爾喀等向來不越噶爾拜瀚海之地游牧康熙三年七月內爾等越界而來朕念亂之所生皆此之故故特頒敕㫖曉諭爾等部下屬衆逮後喀爾喀間有一二違禁來近境遊牧以致逃盜紛紛不絶故令爾等設哨立界今爾等既稱就水草遷徙居止不定難以置哨請限以何地為界可停其置哨限以噶爾拜瀚海為界不得越此遊牧噶爾拜瀚海之地距我邊境有三日程其瀚海盡界之東亦須離我邊境三日之地不得內入朕視天下為一體率土之人靡不撫恤我邊境地方芻牧美好朕亦知之若喀爾喀或遇災旱芻草不生必不得已具奏請㫖方可內向遊牧俟草生時仍回原處如不請㫖擅入內地即令我邊地官兵驅逐聖祖仁皇帝親征平定朔漠方略卷二

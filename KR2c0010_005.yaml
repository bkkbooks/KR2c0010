body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷五九月庚午朔命派京師大兵及大同宣府等兵備噶爾丹時折卜尊丹巴庫圖克圖遣使報稱噶爾丹分兵三路沿途劫掠約㑹於我邊哨愛必汗喀喇鄂博之地侍郎溫達以聞上諭尚書阿爾尼等曰喀爾喀所告之言雖未審虛實而我邊塞不可不為之防禦應派京師八旗護軍每佐領七名驍騎每佐領二名前鋒二百名火器營兵一千子母炮八門限五日內起程再令大同宣府總兵官鮑敬藍理各選精兵一千親率而來我軍俱應在歸化城駐備其令議政王貝勒大臣議之議曰邉疆事關重大應遵上諭而行此所派京師大兵每翼應派都統二員副都統四員前鋒參領一員侍衛一員每旗護軍參領二員驍騎參領各一員又總統火器營之都統以及前鋒統領現在隨駕應請皇上簡用此所派大兵令何人總統督率而來應用何項將軍印伏候睿裁議入諭曰此係備兵不必用將軍印每翼置都統一員右翼著公蘇努率之左翼著公華善率之即以蘇努為統帥左翼著副都統邁圖納秦查木揚楊代來右翼著副都統希禪阿爾法牛鈕達爾泰來壬申命都統公諾敏彭春等赴安親王嶽樂軍前京師及各路大兵暫停起行上諭兵部曰前者侍郎溫達奏言噶爾丹分兵三路追土謝圖汗將近我喀倫朕以邉疆事關重大故頒諭㫖派京師大兵以備之今聞噶爾丹於我朝所遣使臣待之有加禮殊為恭順且又聞其遣使與我阿齊圖拜里等偕來請安應將京城大兵暫且停其起程仍令各為預備候㫖大同宣府總兵官之兵亦暫停起行令其候㫖行在所有之兵每佐領派護軍二名前鋒派二百名火器營兵全派令赴安親王軍前其存留官兵檢選肥壯馬匹給發前去之兵將青城運來之米計口授之此去之兵著都統諾敏彭春護軍統領托倫揮蘭副都統康喀拉尚圖酌量派發章京統率前往丁丑土謝圖汗折卜尊丹巴庫圖克圖率所屬請降先是巴林烏朱穆秦蒿齊忒克西克騰科爾沁阿霸哈納爾蘇尼特阿霸垓扎魯特歸化城土默特之各旗蒙古王台吉等節次奏報喀爾喀額爾克吳巴什顧魯帶青額爾德尼阿海憨都台吉額爾克伊爾登達爾漢台吉車卜登台吉伊達木扎卜台吉達賴台吉賓他海台吉丹津台吉達爾漢台吉色卜騰台吉帶青台吉額爾克綽克圖台吉沙克都爾台吉米梯克額爾克帶青台吉班第帶青親達摩尼帶青台吉巴忒馬巴圖爾台吉勞章巴圖爾台吉他爾占達爾漢台吉龔格台吉阿南達台吉吳巴第台吉朝罕台吉拉卜灘台吉車林達什台吉音扎納台吉折卜尊丹巴弟子西拉卜達什喇嘛又墨爾根帶青伊爾登卓力克圖台吉扎卜青台吉等為首各率屬下人衆奔入喀倫請降陸續具報上遣官往諭准令來降之喀爾喀在喀倫以內遊牧不許妄行盜竊仍嚴飭內地蒙古各禁止屬下不許侵凌盜竊至是土謝圖汗率其弟西地西里巴圖魯台吉等奏言謹奏皇帝睿覽諸凡情事曾兩次遣人入奏俱蒙俞㫖鑒納不勝歡忭謹率自古以來厯世所轄左翼及相附之右翼諾顔等同請歸依皇上大厦伏乞大沛鴻恩劻救臣等朔日吉旦遣奏又設站侍郎溫達報曰折卜尊丹巴庫圖克圖遣使來告曰向蒙皇上鴻恩勵以勤修功德欽遵諭㫖禮誦靡懈不意厄魯特來焚燬廟宇棄擲經典今未知再能仰副皇上聖㫖否久欲入覲天朝自念生於荒徼言詞粗陋恐不能奏對是以不果我諸弟子衆多願依皇上神聖太平之治以副夙望仰乞聖恩俯恤賜以水草善地且望重建前廟又左右兩翼諸台吉皆奉我為師言庫圖克圖欲入則我等願從又沿喀倫一帶阿霸哈納爾諸台吉亦欲從入因謂之曰我荷皇恩深重我意已確然不移汝等果欲誠心歸附各隨汝等之意我不便為汝等代奏也理藩院據報以聞㫖下議政王貝勒大臣集議議曰厄魯特喀爾喀向來歸化職貢有年今交惡相攻喀爾喀國破土謝圖汗折卜尊丹巴庫圖克圖等仰瞻皇上萬邦一體同在覆育誠心請降應受而養之為之安插俾其得所即令尚書阿爾尼前往喀倫靣見折卜尊丹巴庫圖克圖土謝圖汗等備宣諭㫖覆奏之日再請上裁得㫖如所議阿爾尼瀕行上諭之曰喀爾喀等雜處我邉汛內外應嚴禁屬下不許劫奪盜竊為亂如有違犯照內地律例正法至放火小偷亦照我例從重治罪其令喀爾喀該管屬下嚴加曉諭甲申學士拜里等攜噶爾丹疏歸覆命拜里阿齊圖等奉使至噶爾丹所噶爾丹遇之殊為恭順以入邉貿易事託阿齊圖等奏言頃奉明㫖限貿易人毋得過二百名我兄弟台吉等不知其故以為出自我意不容彼貿易皆與我不和乞為代奏照常進貢貿易并遣使根敦哈什哈等與阿齊圖偕來請安入貢疏曰頃接到使臣賫來敕諭禮物不勝歡忭喀爾喀土謝圖汗折卜尊丹巴兩人違達賴喇嘛之言降斥西勒圖坐位又違㫖侵擾我四厄魯特橫行如此實係恣肆無道之人也彼既悖道蔑法而行則我之理直矣倘欲敕諭大衆歸於蕩平和好此地亦當竭力圖之罔識忌諱特疏陳奏别有所言敬煩兩使代請奏至㫖下議政王貝勒大臣集議議曰噶爾丹向我使拜里阿齊圖等自陳理直訴其始終誠心敬上之意又䖍恭貢獻請准諸台吉貿易即應遣使往諭但目今喀爾喀俱各敗奔入我喀倫皇上詳諭尚書阿爾尼遣使往議安插俾令得所應俟阿爾尼前往喀倫查明後噶爾丹作何遣使賫敕往諭之處另行奏請議入上是之十月庚子朔諭撤安親王嶽樂軍上諭內大臣國舅佟國維等曰安親王軍及諾敏彭春等所率之軍今漸寒冷馬或疲瘦且軍士乘暑而往恐冬衣未備應將是軍撤回又侍衛阿南達去日已久馬匹糗糧或至窘乏尚書阿爾尼侍郎溫達等俱在喀倫其令阿爾尼等作速酌量備辦馬匹糗糧往迎阿南達毋致遲誤乙巳命尚書阿爾尼等安插來降喀爾喀阿爾尼奏言臣等於九月二十九日至喀爾喀問土謝圖汗折卜尊丹巴曰汝等入喀倫而居之意何也今又將何往告曰我等為厄魯特所敗奔進喀倫永歸聖主乞救餘生作何安插一惟上裁又曰我等敗遁盡棄部落牲畜而來雖少有所攜難以自存伏祈聖上俯賜宏恩臣等遂令土謝圖汗折卜尊丹巴等將彼從降台吉等名字及喇嘛班第部落人口數目查送計開現在偕來台吉三十餘人喇嘛班第六百餘人户二千人口二萬在後未到者尚多俟到時另將數目開送上命議政王貝勒大臣集議議曰土謝圖汗折卜尊丹巴等纍世恭順職貢有年今為厄魯特所敗其國殘破素仰天朝覆庇萬邦養育庶類來請歸命伏惟皇上從來興滅繼絶中外一體寬仁恩育宜准土謝圖汗折卜尊丹巴之降俾令得所命尚書阿爾尼侍郎溫達查明現在不能度日人等將副都統阿玉璽所運歸化城米糧均散賑濟土謝圖汗等本宜仰體聖慈即議給以名爵但各路請降喀爾喀首領甚多應俟到日再議上從之臣謹按方喀爾喀之內自相亂外挑強鄰皇上早灼知其必至敗亡不憚多方以告戒之及土謝圖汗等違我節制首起兵端以至敗衄時聞凶荒洊告又復宥其罪愆存其汗號且示之可生之路資以牲畜助以糗糧內之近邉示之法度使起待斃之衆相安相聚不至於流離凡所以養欲而給求者委曲周詳始終弗替我皇上之撫恤要荒興滅繼絶真可謂與覆載齊量怙恃同仁者歟十一月甲申遣官往諭土謝圖汗等侍衛阿南達喇嘛商南多爾濟等歸奏言噶爾丹謂七旗喀爾喀非吾讐也但土謝圖汗折卜尊丹巴兩人乃壞宗喀巴教之人中華皇帝欲彼安集反負恩違㫖殺扎薩克圖汗得克得黑墨爾根阿海盡俘其國我靜處於此而忽來侵掠我境殺我弟多爾濟扎卜壞教搆難誠無地可容之人也今若滅此想中華皇帝與達賴喇嘛之心亦得安矣若輩仍存必又違㫖不自靖也噶爾丹又問折卜尊丹巴所居何地臣等答以在邉汛之外及衆喀爾喀亦填居邉上噶爾丹言不放彼入邉彼將何往中華皇帝之意㫖行事與我吻合我不勝欣悅臣等又令商南多爾濟滚楚克達爾漢囊素轉說之噶爾丹曰汝等諭我以禮法我甚喜悅我並無自外於中華皇帝達賴喇嘛禮法之意但厄魯特行事粗鄙恐不相合耳噶爾丹又以貿易事遣滚楚克達爾漢囊素來告曰厄魯特從來進貢貿易各自分行今槩不得往來我國之人殊為憂苦今或用印文或不用印文照常行走候㫖定奪遵行乞以此轉奏奏至㫖下議政王貝勒大臣集議議曰皇上軫念兩國原無異視今土謝圖汗等背棄盟誓殺扎薩克圖汗及得克得黑墨爾根阿海又先犯厄魯特殺噶爾丹之弟多爾濟扎卜實係伊等之過應遣敕於達賴喇嘛命遣一有名大喇嘛同本朝所遣大臣前往召集噶爾丹土謝圖汗等令土謝圖汗等自陳其過大集會閲永議和好於未遣敕之前以此等情節先曉諭土謝圖汗等如皆允服願行則約期於來年㑹閲如别有推辭俟到日再議噶爾丹奏請貿易之事應俟遣使大臣時再議上從之十二月丁卯命以車臣汗之子吳默赫台吉承襲汗號時已故車臣汗之妻及其子吳默赫率其屬裔來降奏言昔當治化隆平之日臣祖車臣汗殁仰蒙聖鑒敕諭左右兩翼汗立臣父為汗旋又殁曾以情節上奏想因兩汗交惡稽遲未蒙見答為此具由謹奏上諭曰吳默赫准襲為車臣汗其車卜登車臣濟農達賴台吉布達扎卜額爾德尼台吉在已故車臣汗為祖輩車卜登車臣濟農應授為扎薩克其達賴台吉布達扎卜台吉授為濟農并授為扎薩克其已故車臣汗之叔達里伊爾登台吉已故車臣汗之弟盆楚克伊爾登台吉納木扎爾額爾德尼台吉俱授為濟農吳默赫年幼國事著伊親叔納木扎爾額爾德尼台吉協理康熙二十八年正月丁亥遣使賫敕諭達賴喇嘛時土謝圖汗以親往會閲為難具疏自陳上諭議政王等曰朕統御天下凡窮者救之絶者繼之離散者使之聚交惡興戎者必使之和協一切生靈無不欲其咸底於安樂也土謝圖汗折卜尊丹巴庫圖克圖等背棄盟誓殺扎薩克圖汗得克得黑墨爾根阿海又加兵厄魯特殺噶爾丹之弟多爾濟扎卜今為厄魯特所敗奔入我喀倫請降朕念土謝圖汗向來職貢惟謹久在屬國之列是以受而納之留於邉境矜其困窮給以米粟車臣汗之子亦准其承襲但兩國相攻生民不得乂安兵戎無日休息今土謝圖汗折卜尊丹巴等又難於會閲其以朕收養伊等中外一體不忍令人失所之德意併將土謝圖汗等背盟興戎之過一一申明遣使賫敕宣諭噶爾丹達賴喇嘛令達賴喇嘛亦遣使於噶爾丹如此則案可速結矣其達賴喇嘛處著伊拉古克三庫圖克圖商南多爾濟他巴克去噶爾丹處應遣之人俟草青時奏請賜達賴喇嘛敕曰朕統御寰區惟願中外息征戰之勞無敗亡之禍率土共享升平前聞喀爾喀兩翼部落內自作亂兄弟人民互相吞并日後必成戰爭之禍特敕諭爾喇嘛同遣使人諭和爾喇嘛亦謂朕鑒恤衆生心如父母誠至善也遣西勒圖來朕特使台吉巴忒馬什尚書阿爾尼等與西勒圖偕往召集七旗喀爾喀㑹閲誓和意謂從此兄弟相親可永享安樂後土謝圖汗奏言聞厄魯特興兵兩路來伐臣是以出兵往迎朕軫念厄魯特喀爾喀兩國相攻必有一傷復遣書於爾喇嘛息其干戈仍敕諭喀爾喀土謝圖汗以為厄魯特噶爾丹職貢恭順往來有年果似此大舉諒必奏聞於朕朕心猶未深信未必非不良之徒從中離間爾等慎毋先啓兵端務體朕不忍生民死亡之至意爾喇嘛亦遣齊緝克他賴堪布偕朕阿齊圖綽爾濟學士拜里往厄魯特諭和朕與爾反覆行事原不忍視喀爾喀厄魯特至於塗炭欲其相睦衆生得安之意也乃喀爾喀土謝圖汗折卜尊丹巴庫圖克圖等自取滅亡違㫖興戎首先起兵殺扎薩克圖汗又殺噶爾丹之弟多爾濟扎卜噶爾丹遂起兵破喀爾喀此喀爾喀先舉召釁之過朕不以之責噶爾丹也朕之初念本欲率土之民皆獲生成原無樂他人之敗亡以為己利之意今喀爾喀敗汗及濟農諾顔台吉等率其通國决計歸降於朕朕為天下主來歸之人不為收養其誰收養之爰納其降安插於喀倫之外發粟賑濟仍存其汗濟農諾顔台吉之號嗣立車臣汗之子為汗朕興滅繼絶之心非特於喀爾喀如是已也諸國有窮迫來歸者朕之愛養皆與之同不但朕之所行如此喀爾喀等如往歸爾喇嘛决不忍其死亡亦必如此愛養之也征戰非美事互相報復無有已時亦豈能保其常勝乎朕意欲使厄魯特喀爾喀盡釋前怨仍前協和各守地方休兵罷戰特遣使賫敕往諭噶爾丹噶爾丹向遵奉爾喇嘛道法爾喇嘛若遣使往諭務令兩國嗣後永息兵戎則朕與爾解紛恤難之本心亦可以慰矣爾喇嘛可即遣使與朕所遣伊拉古克三庫圖克圖商南多爾濟理藩院司員他巴克同往四月己卯命尚書阿爾尼等賫敕諭噶爾丹理藩院以遣使厄魯特之大臣官員喇嘛等上請諭曰此事關係重大著尚書阿爾尼散秩內大臣吳巴什歸化城扎薩克大喇嘛阿齊圖綽爾濟一等侍衛阿南達等前往阿爾尼等入請訓㫖上諭曰噶爾丹必問及巴圖爾額爾克濟農之事最為緊要爾等但述丑年四月之約並言達賴喇嘛向雖遣齊緝克他賴堪布至西海之地及我使者定議令羅卜臧滚布阿拉卜灘與巴圖爾額爾克濟農等同居一處至今尚未同居且巴圖爾額爾克濟農雖在我地駐扎並未受彼歸順分為旗隊况厄魯特喀爾喀交惡之後巴圖爾額爾克濟農請曰乘此機會欲復我讐但我兵器已易粟而食乞賜我等兵器亦曾諭而遣之曰厄魯特喀爾喀向俱誠心朝請職貢朕並未嘗異視但欲使兩國罷兵安生而已豈肯給爾兵器使爾興戎耶其以是答之將此等案卷俱録之以往爾等閒論時當以己意語吉爾噶郎寨桑曰噶爾丹倘不奉詔則絶爾等每年進貢貿易之路厄魯特人衆必大失利矣阿爾尼等又奏言噶爾丹有請安進貢貿易等使欲與臣等偕發臣等應令其同來上是之賜噶爾丹敕曰朕統御宇內率土生民皆朕赤子一夫失所朕心憫焉雖窮鄉異域之民亦必撫養俾以安和各得其所前聞喀爾喀右翼扎薩克內自作亂兄弟屬裔多歸左翼其左翼扎薩克兄弟屬裔亦有歸右翼者喀爾喀兩翼七旗汗濟農諾顔台吉等皆纍世職貢與本朝通好今彼兄弟互相吞噬異日必至交攻作亂特敕達賴喇嘛約同遣使諭令和好共享安樂達賴喇嘛謂朕埀憐衆生同於父母意甚善也故遣噶爾丹西勒圖與朕所遣台吉巴忒馬什尚書阿爾尼等偕往使七旗喀爾喀會閲令其兄弟立誓此乃朕欲喀爾喀汗濟農諾顔台吉等式好無尤同享安樂之意也其後土謝圖汗奏至云聞厄魯特兩路來攻因而興兵迎敵朕念厄魯特喀爾喀皆纍世職貢不絶並無異視若果交惡有一殘毁朕心殊為不忍故敕所司傳檄於爾復諭喀爾喀土謝圖汗曰厄魯特噶爾丹恭順職貢有年果舉此大事豈有不奏聞於朕者或係不逞之徒從中交搆離間若厄魯特未動而爾等先舉則此亂自爾始矣達賴喇嘛亦遣其齊緝克他賴堪布與爾解紛朕又遣阿齊圖綽圖濟學士拜里前往此朕待厄魯特喀爾喀一體無異之至意也乃喀爾喀土謝圖汗折卜尊丹巴庫圖克圖等自作弗靖違㫖興戎又先發兵殺扎薩克圖汗及得克得黑墨爾根阿海又殺爾弟多爾濟扎卜是自取滅亡耳爾因彼先舉遂興兵破喀爾喀其過在喀爾喀不在爾也爾本敬奉佛教之人雖焚喀爾喀地方廟宇毁其佛像朕亦不深責爾今喀爾喀為爾所敗其汗濟農諾顔台吉等率舉國之人前來歸朕朕矜其流離窮困雖向非屬國而隨屬國之列誠心職貢且追念彼為元之苗裔窮而來歸即以所屬待之朕統御天下來歸之人若不收撫誰撫之乎故受而安插於喀倫之外其窮困人民賑以米糧而嚴責其興戎之罪復其汗濟農諾顔台吉之號以車臣汗之子仍襲為汗朕興滅繼絶之念非特於喀爾喀已也諸國有窮迫來歸者朕皆一體撫養不但朕所行如此即達賴喇嘛養育衆生之洪仁亦與朕同伊若歸達賴喇嘛亦必如是撫之戰爭非美事展轉報復將無已時讐敵愈多亦不能保其常勝是以朕欲爾等解釋前讐互市交易安居輯睦永息戰爭特遣使賫㫖前來汝果遵朕持正執中令歸同好之㫖自今以後各守其地不興兵戎既不失輯睦之道與爾兩國人民亦免塗炭爾豈不欲爾屬人民安生樂業乎朕普恤羣生俯念爾素不違㫖特遣尚書阿爾尼等諭意又令伊拉古克三庫圖克圖商南多爾濟等與達賴喇嘛使人同往甲午遣侍衛吳大禪等監運張家口倉糧賑喀爾喀先是土謝圖汗等以恩賜米糧將盡續到二萬餘人不能贍給奏請賑濟上命內大臣費揚古明珠侍郎阿山學士拜里等賫銀兩茶布前往散給至是上諭大學士伊桑阿等曰朕聞喀爾喀乏食有至餓死者深為軫念頃雖令內大臣費揚古明珠等賫茶布銀兩採買牲畜賑其乏絶但採買尚須時日今若不速發糧以拯之則死者愈多矣折卜尊丹巴庫圖克圖現有貿易駱駝百餘在張家口費揚古明珠等同往大臣官員所有駱駝亦令其量捐並內駟厰及太僕寺駱駝共發一百將張家口倉米星速運到散給計支一兩月間而費揚古明珠等所買牲畜已繼之矣如此則喀爾喀可活也其令侍衛吳大禪侍讀學士西拉牧厰侍衛太僕寺堂官户部賢能司官各一員經理其事明日即馳驛速往五月壬戌命巴圖爾額爾克濟農暫統羅卜臧滚布部落時提督孫思克報稱厄魯特羅卜臧滚布病故其妻與寨桑等以噶爾亶多爾濟係車臣汗嫡孫年約十歲乃羅卜臧滚布叔伯之子為兄弟行欲遣人往召令其統領部衆理藩院以聞上曰羅卜臧滚布率所屬來歸恪守法度誠心職貢可遣官致賻羅卜臧滚布既亡部落人民無所統屬其弟噶爾亶多爾濟召之恐未能即到聞巴圖爾額爾克濟農意欲先往令馬迪傳諭巴圖爾額爾克濟農與之同去噶爾亶多爾濟未到之先令巴圖爾額爾克濟農暫為約束人民俟其到日仍歸本地毋得以噶爾亶多爾濟年幼欺凌謀占務期同心一意共相扶掖馬迪等仍遣人往召噶爾丹多爾濟癸亥命各旗蒙古並察哈爾等備兵理藩院奏言去年八月內因喀爾喀厄魯特於邉境搆兵上命蘇尼特四子部落毛明安吳喇忒鄂爾多斯等旗共派兵六千俱令環繞邉汛駐備形勝之地又令歸化城兩旗派兵一千屯駐城內以備緊急調遣今既傳聞厄魯特發兵二支一支從阿爾泰之後攻昆都倫一支從達爾漢親王旗分之北前進應較去嵗所發之兵量減其半仍令前所派領兵王貝勒台吉等照常備之八旗遊牧之地所有察哈爾兵內不論護軍驍騎選人材健壯者一千備之得㫖著各在家預備以候調遣九月庚申尚書吉爾他布等歸奏喀爾喀駐牧邉境情形時吉爾他布等奉命至顧爾班格得爾古之地分遣理藩院員外郎常夀户部郎中畢力克兵部郎中巴扎爾等往查喀倫內蘇尼特等地方所駐喀爾喀汗濟農諾顔台吉等遊牧處水草俱善內地蒙古水草亦不至匱乏偷竊小盜或時有之吉爾他布等具疏奏聞上以盜竊時有皆本管人員怠玩所致著兵部嚴行禁約十月辛未命科爾沁土謝圖親王沙津等以法度訓諭喀爾喀諸部上諭議政王等曰喀爾喀入降者饑困已極自相劫掠若不速置扎薩克遣賢能蒙古王台吉等曉示法度收集離散將益至泮渙爾等其確議以聞議曰喀爾喀敗散之後陸續來歸皇上俯視中外一體給以米糧牲畜俾得其生誠如天之仁也復以喀爾喀散亡之餘若無法度任意妄行必益至離散預為籌度聖諭周詳皆宜欽遵而行喀爾喀扎薩克內有已至者有未至者除左翼土謝圖汗折卜尊丹巴墨爾根濟農羅卜臧台吉等分編旗隊之處暫置不議外左翼車臣汗協理納木扎爾額爾德尼濟農盆楚克伊爾登濟農車臣伊爾登濟農洪俄爾帶青台吉車卜登額爾克台吉信順額爾克帶青諾顔所屬敖巴額爾克阿海台吉右翼白蘇特察罕巴爾諾顔車臣台吉額爾德尼哈灘巴圖爾台吉等皆大台吉也俱宜授為扎薩克仍存其喀爾喀名號又陸續來降喀爾喀沙布隆庫圖克圖所屬阿爾達兒諾爾卜等扎薩克俱未到各隨彼所願歸旗分收附俟扎薩克到日再議至土謝圖汗所屬齊巴克台吉之夥伴等皆令併與土謝圖汗及信順額爾克帶青諾顔其車臣汗之信順額爾克帶青諾顔等俱照四十九旗編為旗隊於隂山後各旗蒙古賢能都統副都統長史參領之中每一扎薩克選二人與派出之蒙古王等帶去令其駐扎彼地以來年草青時為期指示法禁如四十九旗一例施行喀爾喀所居遙隔應以車臣汗為兩路信順額爾克帶青諾顔為一路敖巴額爾克阿海台吉察罕巴爾諾顔為一路車臣台吉額爾德尼哈灘巴圖爾台吉為一路遣行此所遣蒙古王台吉等與理藩院大臣官員職名伏候上裁其㸃出之大臣台吉官員等至彼處明諭扎薩克等限來秋各將散失之人盡行收集若過期即給與收養之旗分倘仍有應授扎薩克者即會同扎薩克等授為扎薩克列名奏聞該衙門注册其車臣汗之信順額爾克帶青諾顔等向係扎薩克伊等所屬後授小扎薩克如有大事仍令禀聞完結右翼扎薩克察罕巴爾諾顔額爾德尼哈灘巴圖爾車臣台吉等其舊扎薩克未到伊等事件即令伊等自行完結議入諭曰車臣汗之兩路著為一路遣土謝圖親王沙津台吉阿拉卜灘台吉巴忒馬什侍郎溫達去信順額爾克帶青諾顔敖巴額爾克阿海台吉為一路遣達爾漢親王諾內台吉畢力克圖台吉德木楚克郎中布顔圖馬迪去察罕巴爾諾顔車臣台吉額爾德尼哈灘巴圖爾台吉為一路遣台吉多爾濟思希卜台吉吳爾圖納蘇圖副都統馬什侍讀學士達虎郎中巴扎爾去賜喀爾喀敕曰朕統御宇內撫育萬邦率土人民皆我赤子倘一夫失所朕心惻焉雖窮荒異域之民亦必撫養使之各得和樂此朕本意也前聞爾喀爾喀兩翼之汗濟農諾顔台吉等互吞屬裔不相親睦恐兄弟不和異日必致有侵凌之禍特遣尚書阿爾尼台吉巴忒馬什等會盟令爾兄弟誓和後果以不和之故與厄魯特噶爾丹交惡相攻爾為所敗棄其妻子土地屬裔牲畜迫而來歸朕念爾厯世誠心職貢不忍爾之散亡安插於喀倫內外賑其窮餓令爾汗濟農諾顔台吉等安集如故以車臣汗之子襲其汗號朕暫留爾等收集散亡俟厄魯特事定之日仍歸故地駐牧今見爾等並無法度不能約束以强凌弱自相劫奪倘不速行曉諭定法督察則汝現在人民益至離散矣是以將車臣汗旗下納木扎爾厄爾得尼濟農盆楚克伊爾登車臣伊爾登濟農洪俄爾帶青台吉車卜登額爾克台吉信順厄爾克帶青諾顔旗下敖巴厄爾克阿海台吉右翼白蘇特查漢巴爾諾顔車臣台吉額爾德尼哈灘巴圖爾台吉等增設扎薩克收集離散之衆分為旗隊以便督察禁止盜賊妄行教以法度特令土謝圖親王沙津達爾漢親王諾內台吉多爾濟思希卜等賫敕諭扎薩克王等旗下都統副都統長史等官每扎薩克著二員駐至來年草青之時示以規模安插前去爾等自今以後果能欽遵朕㫖謹守法度冦盜不興禍亂不作爾等遺民漸次得所庶不負朕撫育歸降愛養羣生之至意乙酉尚書阿爾尼自厄魯特歸覆命阿爾尼奏言臣等八月初七日抵厄魯特噶爾丹之地頒敕書賞物畢臣等與噶爾丹行抱見禮既坐問臣阿爾尼曰公即來盟喀爾喀七旗之尚書耶曰然又問云聞爾去歲往色稜格地方以何事而去亦有兵否臣答曰俄羅斯察罕汗奏請東方邉境之事當何地會議聖上遣我往諭以色稜格地方會議所攜兵僅及二千而已中途值汝厄魯特與喀爾喀之亂聖上聞之念厄魯特喀爾喀交戰我等經行汝等必各疑為援兵故令駐境上今年復遣議此事語畢乃饗臣等本月十八日噶爾丹招臣等入其廬屏人言曰聖上洪仁惠育羣生欲使協和共享升平我亦與其中也我身安樂之䇿孰者為善伏祈聖上指示願得遵行但折卜尊丹巴土謝圖汗等首作禍亂無故起兵殺扎薩克圖汗及得克得黑墨爾根阿海違聖上之㫖意前此再三陳奏為此兩人耳臣等答之曰折卜尊丹巴土謝圖汗等窮迫亡命來歸我皇上為統馭天下中國之主此一二人之命有不思生全之者乎至爾屢次章奏聖上明鑒久已晰彼之曲諒爾之直始降敕書諭止戰爭仍歸和好爾又何必屢以此事為言耶二十二日噶爾丹遣丹濟喇及格罍古英以覆奏疏授臣臣等詰之曰達賴喇嘛使人及伊拉古克三庫圖克圖等亦為此事將至亦此語覆之抑或有他語乎丹濟喇以其汗之言來覆曰達賴喇嘛所言之事若與聖上敕諭相同我自無他說也二十四日噶爾丹西向遊牧臣等越宿於次日起行而歸得㫖厄魯特喀爾喀皆職貢之國頃者兩國交惡相攻朕不忍見伊等無知爭殺不得安生特遣大臣開導曉諭仍前和好今噶爾丹稱聖上洪仁惠育衆生欲使協和共享升平我亦與其中聖上指示願得遵行已具悉矣所司知之十一月丙辰命厄魯特額林宸台吉與韓都台吉同居時額林宸奏言我父楚呼爾吳巴什乃厄魯特胡他蓋圖哈爾呼喇諾顔第三子也楚呼爾吳巴什生子五人長子班第為噶爾丹所殺次子阿南達三子羅卜臧庫圖克圖四子勞章俱歿五子額林宸即我也來投皇上我親兄班第長子多爾濟塞卜騰在噶爾丹所次子乃與巴圖爾額爾克濟農同居之韓都台吉是也康熙十五年噶爾丹伐我父楚呼爾吳巴什執之殺我親兄班第分散我屬裔監守我父子去嵗厄魯特喀爾喀作亂交戰守我之人乃我屬下舊人為所分散者皆背噶爾丹而向我我得間而攜我子弟台吉十餘人弓箭手五百餘人計一千餘口來投皇上我父不能得脫現在噶爾丹所我來至巴圖爾額爾克濟農額爾德尼和碩齊地方與我兄子韓都台吉同居安插何地作何措置伏候皇上埀憐加恩上曰額林宸台吉為噶爾丹所禁今逃出歸降其令與韓都台吉等暫且同居并令約束其下毋致盜竊生事現今理藩院郎中桑格往審番人情事即將此事交與桑格十二月辛未遣使賫敕諭達賴喇嘛時達賴喇嘛遣使善巴陵堪卜來貢請安且密奏言我起行時往達賴喇嘛所未見諦巴出語我曰達賴喇嘛令奏聖上但擒土謝圖汗折卜尊丹巴庫圖克圖畀噶爾丹則有利於生靈此兩人身命我當保全之奏聞上遣班雜爾拉木扎木巴額木齊格隆等賫敕諭達賴喇嘛敕曰朕恭膺天命統御率土人民無分中外皆欲使之罷征息戰各享安樂以免散亡諸處之民有困窮來歸者必使之得所初無異視爾喇嘛承奉釋教濟度衆生朕與爾同一意也厄魯特喀爾喀向于朕為職貢之國亦供奉爾喇嘛為施主聞兩國交惡相攻朕與爾會同諭其罷兵使相和睦發敕遣使不啻再三此朕與爾念厄魯特喀爾喀相攻必有一家敗亡失所而欲止其戰爭同歸于好原非有偏狥一家之意也後厄魯特喀爾喀不從朕與爾之㫖竟至交戰喀爾喀敗窮極來歸朕受之安插邉塞內外給米糧牲畜以濟其困若等如往歸爾喇嘛想喇嘛亦必如是以養之也今爾喇嘛所遣使人善巴陵堪卜奏稱爾之言曰當擒土謝圖汗折卜尊丹巴庫圖克圖畀噶爾丹伊等身命我當保之凡作君作師者濟窮繼絶乃不易之常經今如擒土謝圖汗折卜尊丹巴庫圖克圖而畀噶爾丹是偏于一家矣朕與爾向來欲厄魯特喀爾喀相與和好之意安在乎朕與爾向來之意舉無所偏庇是以屢屢遣使往諭即今亦仍冀其和好也目下朕遣尚書阿爾尼使于噶爾丹據其所奏言噶爾丹敗于策旺拉卜灘下人散亡略盡又極饑窘至以人肉為食喇嘛使人亦曾到彼想亦聞之耶倘噶爾丹甚不得已而來歸朕朕亦當受而養之使得其所有執之以畀其仇者乎朕撫視萬邦有如一體意無偏狥者如此爾喇嘛行事利濟衆生想善巴陵堪卜所奏未必為喇嘛之言如果喇嘛之言何以不具疏來奏乎朕心疑之特撰敕遣詢著將此項原由明白具本回奏丙子命厄魯特噶爾亶多爾濟為諾顔噶爾亶多爾濟奏言蒙聖明軫念鄂齊爾圖汗賜羅卜臧滚布遊牧之地正將遷移聞喀爾喀厄魯特交亂興戎因率兵前往未能全徙出征還羅卜臧滚布身故蒙聖上遣官二員賜羅卜臧滚布浩蕩之恩又恐人民散亡授我為諾顔聖主恩綸下頒如日重升不勝歡忭但地方逺隔且去年遭遇旱災牲畜倒斃人民困苦難以遷移伏祈皇上鑒恤理藩院議以噶爾亶多爾濟止令統轄羅卜臧滚布之衆並未授為諾顔乃奏內自稱諾顔不合其貧民應遣官往查再議得㫖噶爾亶多爾濟著授為諾顔遣達虎前往傳㫖併查看貧民聖祖仁皇帝親征平定朔漠方略卷五

body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷三十五康熙三十六年正月甲寅大將軍費揚古奏報于成龍等運米至喀喇穆冷先是于成龍等請曰大將軍領兵駐扎喀喇穆冷臣等情願運湖灘河朔倉糧三千五百石至喀喇穆冷地方上但準運一千五百石交將軍運米駱駝亦交將軍在水草佳處放牧至是費揚古奏曰于成龍等將湖灘河朔之米自十一月十二日始陸續起運親身往來監督共運米一千五百石至喀喇穆冷運米駱駝則于成龍三十五頭侍郎李鈵通政司通政喀拜等各三十頭侍郎王國昌喻成龍正卿辛保侍讀學士范承烈等各二十五頭共一千零五頭計部落佐領之多寡分給於水草佳處小心牧放為此奏聞上報聞乙卯使兩路出兵預備軍需上諭領侍衛內大臣尚書班第等曰今觀噶爾丹勢甚窮蹙天與不取坐失事機遣格壘沽英杜拉兒寨桑歸去期以八十日可得其聲息前所遣吳爾占扎卜之母齊巴哈齊信音將至若不撥兵預備恐致有誤事機今次出兵亦分為兩路一路兵三千名此兩路兵不必預定期約令相機而行緑旗兵多無用派兵從少馬則從多緑旗兵酌給馬匹方可與滿兵同行此畨出征米則照常隨行外沿邊有牛羊可買須動支正項錢糧每路備買牛羊各二萬發去於軍資大有裨益至馱米以馬駝為要亦當多買備用買此駝馬騾驢牛羊須遣能員往甘州寧夏兩處採買爾等集議以聞會議以為今噶爾丹窮蹙已極天與之機良不可失當謹遵聖諭而行除右衛前鋒四百鳥鎗手二百副將黃元緑旗兵一百已遵諭給大將軍伯費揚古預備應不議外大同所有前鋒四百鳥鎗護軍一千火器營兵二百四十黑龍江兵五百並皇上留駐大同新滿洲護軍二百駐扎寧夏副都統阿蘭泰兵八百共合為三千令一路進征將軍博濟率西安兵二千現駐肅州令將軍孫思克於彼屬下總兵官以下能員內選兵一千每人酌給馬匹共為三千令一路進征應給緑旗兵之馬即於緑旗兵之馬內選肥者給與此兩路兵不必預定期約令相機而行此軍所需駝馬騾驢牛羊在甘州寧夏採買每處選賢能官五人與督撫地方官會同動支正項錢糧照時價採買即交地方官動支正項錢糧喂肥至派賢能官聽該部引見隨軍之餉俟命下之日另行議奏得旨軍中所需駝馬牛羊在寧夏採買者交西安副都統阿蘭泰採買在肅州採買者交駐扎宣化侍郎席米圖往肅州採買俱係動支正項錢糧採買著照時值交易勿得短少選部院賢能官遣至阿蘭泰席米圖處與督撫地方官會同監買仍令地方官以所有駝馬驢騾捐助大學士等可會同部院大臣簡選人材可用家計殷實官員引見毋得徇情至大將軍伯費揚古目下有事仍率前鋒統領碩鼐所備之兵而行如目下無事或在大同養馬或出兵則率前鋒與是軍同行黑龍江兵器械全無正在控告難以逺行應令往右衛駐備爾等再與大將軍費揚古會同定議具奏仍照前議請遵旨行上從之臣謹按王者克詰戎兵奉彰天討以時進止事既貴乎知幾使軍實不先預備一旦舉薄伐之師申誕告之命無以作飽騰之氣而收臂指之效也我皇上神謨廣運事炳幾先知噶爾丹徼外遊魂窮困已極爰命師分兩路箕張翼舒戎馬車徒素具固已無事簡閲矣而又隆將帥以委任之權使之相機而行不必豫定期約然諸將凛遵節制罔敢踰尺寸而奏膚功良由制勝於廟堂之中不先時不後時察情偽而知虛實也若乃師行糧隨餽餉弗絶更敕沿邊畜牧之地廣置駝馬驢騾牛羊以供牽挽之需以資饗賚之用所以足軍需而壯士氣又何睿慮之周詳而恩施之遐訖也掃除凶逆不於此豫決其機哉大將軍費揚古報差侍讀學士伊道自湖灘河朔至郭多里巴兒哈孫閲路分站理藩院奏曰大將軍費揚古咨言差侍讀學士伊道鄉導額素克阿南達納木喀爾自湖灘河朔至郭多里巴兒哈孫詳視路途粗分站次限五十日內回於康熙三十五年十二月二十二日遣行上曰伊道非能事之人宜令他人去為是行文諭將軍知之將軍博濟報遣副都統席爾哈達馬雲霄出兵博濟奏曰兵部咨開副都統席爾哈達等奏請隨將軍博濟軍前效力上命於席爾哈達費揚固瓦爾達祖良璧馬雲霄內著該將軍酌量帶往欽此派副都統席爾哈達馬雲霄出兵為此奏聞上報聞戊午核計軍中馱載需用駝馬上諭大學士阿蘭泰等曰一路三千兵從盔甲器械鑼鍋帳房等物重幾斤百日口糧重幾斤馱此當用牲口幾何及二萬牛羊可食幾日著與部院大臣會同核議具奏此次兵丁行李須比去年春季兵丁行李從輕估算會議曰查康熙三十五年進討噶爾丹兵丁以僕從一人算每人給馬四匹四人為一朋一朋合帳房二間鑼鍋二口搭連四個錛斧鍬鐝各一柄一朋八口拴帶八十日口糧四石二斗以十五斤算重六百三十九斤有餘盔甲四副重一百二十斤合帳房二間連樁二梁柱重五十斤箭二百二十枝重二十二斤大小鍋二口重十五斤錛斧鍬鐝重九斤搭連四個栳斗皮稍馬等雜物重一百二十斤連米共重九百七十五斤零一朋馬十六匹本身與僕從騎坐八匹所餘八匹每匹原以馱一百二十一斤餘算後每朋增給騾子一匹故每匹以馱一百七斤算今寧夏所有三千兵丁亦照前每人一僕四人合為一朋其帳房鑼鍋搭連錛斧鍬鐝等物俱照前帶去前帶口糧八十日今帶百日較前多二十日每朋之米增倉斛一石六斗零重增一百六十斤今將馱子比前減輕則兵丁每人以馬五匹算一朋二十匹馬均馱每匹得九十四斤餘一口每月以倉斗二斗算則六千口所需百日之米共倉斛四千石其自大同赴寧夏之大臣官員及在寧夏之大臣官員本身親隨披甲僕從共一千三百五十五口一口每月以倉斗二斗算百日共需米九百三石二斗零自大同赴寧夏之兵二千在大同之新滿洲護軍二百每人已撥給馬四匹伊等俱應增給馬一匹為五匹在寧夏之西安兵八百僅馬各三匹此兵八百俱應增給馬二匹亦使為五匹此增給之馬將學士朱都納寧夏所喂五千馬內撥給各拴帶百日之糧此枝兵隨糧百日共需倉斛五千石又肅州一路將軍博濟兵二千孫思克緑旗兵一千共三千除博濟兵二千撥給牲口已經會議應不議外孫思克緑旗兵前經預備六千其馬六千每日以料八升喂四十日今伹用一千緑旗兵則所拴帶百日之米應將前所喂緑旗兵之馬內令將軍孫思克酌量撥給此一路滿洲官兵僕從連緑旗兵共五千六百二十口其緑旗官兵僕從數目原未申報約略以三百為率計之該共五千九百二十口應隨百日糧一口每月以倉斗二斗算需倉斛三千九百四十六石零此兩路應隨百日之糧共八千九百四十六石零兩路隨糧俱用寧夏兵押運駱駝一頭以馱倉斛一石二斗算重一百八十斤所需駱駝七千四百五十六頭騾一頭以馱倉斛八斗算重一百二十斤所需騾一萬一千一百八十二頭馬一匹以馱倉斛六斗算重九十斤所需馬一萬四千九百十匹驢一頭以馱倉斛四斗算重六十斤所需驢二萬二千三百六十五頭此兩路百日隨糧馱運牲口當取京城解往駱駝一千一百一十頭騾三千六百十七頭學士朱都納所喂五千馬內撥給兵丁餘剩之馬及于成龍等捐助不合例人員在寧夏捐助之三千餘牲口部員所買之牲口地方官捐助之牲口撥用馱米牽此項米馱者著撥緑旗兵一千于成龍王國昌喻成龍李鈵喀拜辛保范承烈等俱情願效勞運米則寧夏兩路隨運之米俱應交伊等運往命下之日著于成龍等速往寧夏將押米緑旗兵丁口糧等物及派管理官員等事與該督撫會同料理又前者牛一頭算八十口羊一隻算十五口今所買牛羊隨其所得押送可也得旨總督及甘肅巡撫內著一員來寧夏理事一員往肅州理事餘如所議己未撥官十員採買軍需駝馬等物大學士阿蘭泰等與兵部會題曰臣等奉旨撥官十員赴肅州寧夏等處採買駝馬騾驢牛羊有出而願往效力者乃內閣侍讀學士阿爾賽翰林院侍講學士朱臣御史蘇克濟常綬顧素宗人府郎中敖海工部郎中朱蘭泰户部員外沙里布刑部員外王鴻烈理藩院員外喇都渾等十人又備選翰林院侍讀學士覺羅華顯光祿寺少卿常賽吏部郎中乖哈兵部郎中金圖刑部郎中常武工部郎中滿都凱察里宗人府員外殷達禮刑部貟外溫察等九人以緑頭牌列名具奏上命願往效力之十人去於是集願往效力者侍讀學士阿爾賽等十人掣籖侍講學士朱臣御史常綬蘇克濟員外王鴻烈喇都渾掣得肅州侍讀學士阿爾賽御史顧素郎中敖海朱蘭泰員外沙里布掣得寧夏召將軍薩卜素回京養病領侍衛內大臣班第傳上諭曰著黑龍江將軍薩卜素回京養病以賢員一人為首領代彼管轄兵丁今日明日有便行文前去癸亥給大將軍費揚古官兵僕從口糧戶部奏曰大將軍費揚古咨稱奉上諭云著於解往五千兩銀內給留駐一百名之兵比照察哈爾兩個月糧亦給為兩個月糧欽此欽遵計留駐一百名兵自喀倫地方給過兩月糗糧滿日為始至今年正月初五日止採買兩個月糗糧已經給與今除前往喂馬之官兵僕從現在此地者共一百二十六口所需口糧八石四斗近奉上諭云于成龍等解往一千五百石之米著節省支用或動支此米即給伊等或另作措置乞大部定奪施行查于成龍等解去之米奉旨節用且為數不多應照大將軍所請將于成龍等解去米一千五百石內動支八石四斗給之上許之戊辰副都統阿南達報哈密國擒逆賊噶爾丹之子色卜騰巴兒珠爾來獻阿南達奏曰哈密回子額貝都拉達爾漢白克聞噶爾丹之子色卜騰巴兒珠爾在巴爾思庫兒地方周行捕獸遣其長子郭帕白克率兵擒色卜騰巴兒珠爾及其乳父揮特和碩齊等人解至臣軍中為此將色卜騰巴兒珠爾等送往御前謹具奏聞上命示議政諸臣己巳使將軍孫思克設哨禦噶爾丹議政諸臣奏曰將軍孫思克疏言哈密達爾漢白克額貝都拉報稱噶爾丹有至巴爾庫兒之狀我軍所喂馬若至二月二十則可得臕臣請於二月二十間進布隆吉爾等處探聽如噶爾丹來至哈密巴爾庫兒則遵訓旨而行如仍在格格特哈郎古特等處則候皇上神謨指示查噶爾丹今窮困已極二月二十日之前未必不至巴爾庫兒等處地方應著將軍孫思克等逺設斥堠以探實音如噶爾丹至巴爾庫兒等處將軍孫思克等作速領兵立刻堵剿如兵丁馬匹稽遲則擇汛地官兵馬之肥者而行毋失機會噶爾丹尚未有來信則二十日間不必往布隆吉爾去候旨而行可也上從之烏朱穆秦等處蒙古諸王奏請從軍效力不許理藩院奏曰烏朱穆秦和碩車陳親王色登端多卜阿霸垓多羅郡王吳爾占噶喇卜多羅卓禮克圖郡王達馬林扎卜蒿齊忒多羅郡王雅木批兒阿霸哈納爾多羅貝勒布昭阿霸哈納爾固山貝子額林辰達什阿霸垓吳爾占噶喇卜王旗下固山貝子車林敦魯卜協理台吉巴魯巴巴格根羅卜親洪郭爾津他爾土巴扎卜噶爾臧巴特馬薩馬達阿霸垓多羅卓禮克圖郡王達馬林扎卜旗下二等台吉賔等附併土默特多羅貝勒額駙厄爾德木圖旗下喀爾喀多羅貝勒羅卜臧喀爾喀部長鎮國公齊卜騰輔國公車陵達什等情願自備馬匹什物軍前效力為此轉奏上曰伊等馬畜不足著各歸家不必從軍後有奏請者皆以此旨覆之勿受庚午勞賜大將軍費揚古上諭費揚古曰駐扎肅州副都統阿南達疏言擒噶爾丹之子色卜騰巴兒珠爾於哈密之地正月十六日晚正在暢春苑西門放燈及煙火衆蒙古及厄魯特投誠男婦皆集其疏一到衆皆大悅爾防守窮壤不得在朕左右故抄阿南達報文發汝知之時當年節通國老少皆嬉戲行樂爾獨居寒塞無聊之地殊深軫念是以賜之胙肉鹿尾關東魚匏瓜等物且問爾無恙朕躬安即如與爾相見時爾無恙否噶爾丹作何料理不失機會朕與諸臣議定後另有旨特諭辛未都統蘇努等出征諭以行兵之法都統蘇努巴渾代阿什坦齊什塞稜格等入請訓旨上諭曰凡我兵厮不齊起行退落在後造飯而食任意混行勞馬者甚多或有大臣官員亦久卧不起一二人留落在後者有之爾等當嚴督趲行其囓雪之馬不可即飲水著曉諭深戒今方春時已有旨令拴繫齊臕著小心看視又大同兵前已給三個月錢糧今再令支三個月錢糧支此錢糧在大同右衛等處支取至食米亦在右衛殺虎口支取帶去勿動湖灘河朔之米其大同新滿洲護軍二百仍令在大同照常喂馬候駕即將諭汝等之旨交與兵部速發諭馬思喀壬申安插厄魯特降人於張家口外上諭內大臣曰前以在京厄魯特應與建房居住故命議政諸臣集議今厄魯特在此患病物故者甚多此屬既己輸誠歸化殊為可憫其將伊等令各該佐領幫助帳房行李送至張家口外牧場之地在彼散處應給糧餉仍照常分給令伊等食其米積銀以買牲畜則可以謀生矣以後天時漸熱疾病死亡者庶幾亦少著議政諸臣集議尋奏臣等欽惟上諭極是應傳諭三旗令厄魯特所𨽻各該佐領捐助資裝送至張家口外交與各該旗遊牧地方參領監管所給糧米應動支張家口倉米每年兩季令住居遊牧地方三旗均輳車輛駱駝差官運往散給所給餉銀令戶部算數行文直𨽻巡撫動支張家口附近州縣正項錢糧給與此銀交兩季送米官帶去將銀與米一併眼同散給此項厄魯特既安插張家口外應停止建房上可其奏臣謹按招携懷逺帝王之大德故即獷悍難馴之輩一旦革面嚮風歸仁慕義尤必示以矜全之意加以軫恤之恩其或風土異宜疾疢間作煦嫗覆育有痌瘝一體之誼焉我皇上憫厄魯特之屬輸誠歸命豢養京師慮其寒燠之失時以至食飲之違性籠禽檻獸有投林集木之思爰命所屬佐領豫以廬幕贍以資糧移插張家口外仍優給廩餉俾得置牲畜以滋蕃息從此遊牧得所食息晏如物無夭札之虞人有更生之樂皇仁如天不以荒徼絶域而二視之也癸酉左都御史于成龍等告請效力許之時于成龍王國昌李鈵喻成龍辛保范承烈喀拜等以上將三舉北征自寧夏進剿因復以隨行效力為請上曰于成龍等七人既願隨駕效力準其前去著多備牲口以行甲戌增給察哈爾官兵俸糧先是察哈爾八旗官兵原無俸糧上念其征行勞苦諭理藩院戶部曰屢年以來察哈爾八旗官兵處處從軍效力甚苦伊等向無俸糧欲俟滅噶爾丹後於恩詔內增添俸糧但覺太遲自今察哈爾官員著比照京官俸量減給與目下護軍暫給二兩驍騎暫給一兩自今以後護軍每月仍給二兩驍騎一兩爾等作速定議具奏即於二月支俸時給之尋尚書班第馬齊等議八旗察哈爾在邊外者其世襲官俸應照京官俸四分減三給之三等公一員應給一百六十五兩一等精竒尼哈番四員應各給一百二兩五錢二等精竒尼哈番一員應給九十六兩二錢三等精竒尼哈番二員應各給九十兩一等阿思哈尼哈番一員應給七十七兩五錢二等阿思哈尼哈番三員應各給七十一兩二錢三等阿思哈尼哈番一員應給六十五兩一等阿達哈哈番兼一拖沙拉哈番一員應給五十八兩七錢一等阿達哈哈番三員應各給五十二兩五錢二等阿達哈哈番四員應各給四十六兩二錢三等阿達哈哈番二員應各給四十兩拜他拉布勒哈番十七員應各給二十七兩五錢拖沙拉哈番二十四員應各給二十一兩二錢世襲官俸四分給一共計銀二千六百六十五兩零參領等官九員佐領等官三十七員五品官十九員六品官八十一員應照京官俸減半給之共計銀五千六百九十兩零前鋒護軍一千八十五名每月一名給二兩驍騎及執事人員一千七百六十名每月一名給一兩一年應給兵餉共計四萬七千一百兩零以上官員兵丁一年所需共計銀五萬五千五百兩零此官員內有現食俸者仍照常給與現任官員內有世襲者當照減等之數量給年幼官員兵丁尚未當差宜停其給與所給官兵俸糧俟行役既罷生養充足之日再行奏止從之丙子使都御史于成龍仍管運米事先是奉有著于成龍等與吏部尚書庫勒納監押駝騾前赴寧夏之旨于成龍等入請訓旨上問曰爾等既云情願效力今仍告請運糧否乎于成龍等曰皇上前付臣等以運米重任奈臣等疏庸致誤軍機現在議處尚且不勝悚懼何敢復行告請如蒙聖恩收其後效補其前愆臣等敢不竭盡心力以饋輸是任上云于成龍等七人可復為朕督運爾等臕瘦之馬許於八旗官馬內各易肥健者二十匹帶去其效勞官員或五匹或十匹亦準更換帶去己卯定出師日期先是上諭兵部曰朕欲幸右衛駐蹕近則易於調遣出師日期著於二月朔以後選擇欽天監先擬二月初十日改擬二月初四日至是諭另擇期隨擬二月初六日丁亥辰時利破賊行師從之庚辰以必牙思呼郎等為主事帥兒等為筆帖式使之從軍理藩院奏曰臣部原任郎中今任三等侍衛正藍旗必牙思呼郎原任員外今任佐領鑲紅旗三布代正黃旗祈他特原任員外今任護軍校鑲藍旗薩哈連等告請隨駕效力伊等俱在臣部年久諳練之人請將伊等俱授為主事此次帶去用其力俟缺出開除原任員外正藍旗蒙古帥兒鑲藍旗蒙古傅昌伊等告稱此次我等願隨駕效力伊等在臣部年久俱請授為無品筆帖式帶往用其力可也上從之癸巳大將軍費揚古奏報諸部長及從征官捐助馬駝之數費揚古奏言去春大兵進剿之時奉旨令諸部長捐助馬匹計捐助者西勒圖庫圖克圖馬二十九匹陀音庫圖克圖馬八匹擦雅班達達庫圖克圖駱駝五頭馬三匹住持大喇嘛阿齊圖綽爾濟馬二十匹住持喇嘛勞占尼瑪馬七匹住持喇嘛彭蘇克馬十一匹住持喇嘛恩木齊馬十九匹住持喇嘛克卜松馬四匹喇嘛代哈丹津馬二匹喇嘛達賴綽爾濟馬二匹又去春大兵出塞馱負大炮及火藥鉛子繩索等物急需駱駝其捐助者計吳喇忒公都稜駝五頭吳喇忒公鄂爾奔五頭吳喇忒公達爾馬什里五頭毛明安部長台吉諾爾布五頭喀爾喀和碩親王善巴十頭親王善巴旗下額爾德尼班達達庫圖克圖五十頭多羅郡王滚布十頭多羅郡王默爾根濟農顧魯什希十頭默爾根濟農顧魯什希旗下達爾漢喇嘛五十頭公汪舒克四頭公烏巴達四頭部長台吉額兒濟亨哈坦巴圖爾滚占三頭部長台吉丹津額爾德尼三頭部長台吉吳爾占三頭部長台吉汪舒克三頭部長台吉圖巴三頭衛徵帶青台吉凱木楚克二頭多羅郡王彭蘇克阿拉卜灘二頭察罕巴爾貝子寶貝二頭部長台吉額爾德尼滚布二頭貝勒薩漫多爾濟四頭又喀爾喀和碩親王善巴以兵丁馬匹缺少復捐馬四十匹此項捐助馬駝載炮火藥鉛彈繩索等物又給駕舟新滿洲侍衛護軍校護軍五品官厄魯特鄂欣等無馬駝者後又正卿辛保等運米而來令侍讀學士布泰郎中桑格遍諭衆部落有駱駝者暫行捐助運完之日仍各給還原主為此喀爾喀達爾漢親王諾內助十頭吳喇忒公鄂爾奔旗下協理台吉吳爾圖納蘇圖二頭吳喇忒公達爾馬什里旗下協理台吉􅀈顆爾二頭鄂爾多斯公杜稜三頭四子部落多羅郡王三濟扎卜旗下協理台吉龎三頭毛明安部長台吉諾爾布二頭土默特都統阿爾納副都統阿迪二頭土默特阿必達旗下副都統阿玉什多爾濟二頭喀爾喀和碩親王善巴十頭公吳巴達一頭公蘇泰伊爾登二頭部落台吉丹津額爾德尼一頭揚威將軍覺羅舒恕一頭振武將軍孫思克一頭西安將軍博濟一頭都統公彭春一頭都統伊勒慎一頭護軍統領宗室費揚固一頭副都統碩太一頭侍郎滿丕二頭副都統黨愛一頭拜布一頭戈爾對一頭侍讀學士布泰一頭郎中桑格一頭用此項捐助駱駝運米訖為此奏聞上報聞聖祖仁皇帝親征平定朔漠方略卷三十五

body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方畧卷三十五康熙三十六年正月甲寅大將軍費揚古奏報于成龍等運米至喀喇穆冷先是于成龍等請曰大將軍領兵駐扎喀喇穆冷臣等情願運湖灘河朔倉糧三千五百石至喀喇穆冷地方上但准運一千五百石交將軍運米駱駝亦交將軍在水草佳處放牧至是費揚古奏曰于成龍等将湖灘河朔之米自十一月十二日始陸續起運親身往来監督共運米一千五百石至喀喇穆冷運米駱駝則于成龍三十五頭侍郎李鈵通政司通政喀拜等各三十頭侍郎王國昌喻成龍正卿辛保侍讀學士范承烈等各二十五頭共一千零五頭計部落佐領之多寡分給於水草佳處小心牧放為此奏聞上報聞乙卯使兩路出兵預備軍需上諭領侍衞内大臣尚書班第等曰今觀噶爾丹勢甚窮蹙天與不取坐失事機遣格壘沽英杜拉兒寨桑歸去期以八十日可得其聲息前所遣吳爾占扎卜之母齊巴哈齊信音将至若不撥兵預備恐致有悞事機今次出兵亦分為兩路一路兵三千名此兩路兵不必預定期約令相機而行綠旗兵多無用派兵従少馬則従多綠旗兵酌給馬匹方可與滿兵同行此畨出征米則照常随行外沿邊有牛羊可買須動支正項錢糧每路備買牛羊各二萬發去於軍資大有裨益至䭾米以馬駝為要亦當多買備用買此駝馬騾驢牛羊須遣能員往甘州寧夏兩處採買爾等集議以聞㑹議以為今噶爾丹窮蹙已極天與之機良不可失當謹遵聖諭而行除右衛前鋒四百鳥鎗手二百副將黄元綠旗兵一百已遵諭給大將軍伯費揚古預備應不議外大同所有前鋒四百鳥鎗䕶軍一千火器營兵二百四十黑龍江兵五百並皇上留駐大同新滿洲䕶軍二百駐扎寧夏副都統阿蘭泰兵八百共合為三千令一路進征將軍博濟率西安兵二千現駐肅州令將軍孫思克於彼屬下總兵官以下能員内選兵一千每人酌給馬匹共為三千令一路進征應給綠旗兵之馬即於綠旗兵之馬内選肥者給與此兩路兵不必預定期約令相機而行此軍所需駝馬騾驢牛羊在甘州寧夏採買每䖏選賢能官五人與督撫地方官㑹同動支正項錢糧照時價採買即交地方官動支正項錢糧喂肥至派賢能官聽該部引見随軍之餉俟命下之日另行議奏得㫖軍中所需駝馬牛羊在寧夏採買者交西安副都統阿蘭泰採買在肅州採買者交駐扎宣化侍郎席米圖往肅州採買俱係動支正項錢糧採買著照時值交易勿得短少選部院賢能官遣至阿蘭泰席米圖䖏與督撫地方官㑹同監買仍令地方官以所有駝馬驢騾捐助大學士等可㑹同部院大臣簡選人材可用家計殷實官員引見毋得狥情至大將軍伯費揚古目下有事仍率前鋒統領碩鼐所備之兵而行如目下無事或在大同養馬或出兵則率前鋒與是軍同行黑龍江兵器械全無正在控告難以逺行應令往右衛駐備爾等再與大將軍費揚古會同定議具奏仍照前議請遵㫖行上從之臣謹按王者克詰戎兵奉彰天討以時進止事既貴乎知㡬使軍實不先預備一旦舉薄伐之師申誕告之命無以作飽騰之氣而收臂指之効也我皇上神謨廣運事炳幾先知噶爾丹徼外㳺魂窮困已極爰命師分兩路箕張翼舒戎馬車徒素具固已無事簡閱矣而又隆將帥以委任之權使之相機而行不必豫定期約然諸將凛遵節制罔敢踰尺寸而奏膚功良由制勝於廟堂之中不先時不後時察情偽而知虛實也若乃師行糧随餽餉弗絶更勅沿邊畜牧之地廣置駝馬驢騾牛羊以供牽輓之需以資饗賚之用所以足軍需而壮士氣又何睿慮之周詳而恩施之遐訖也掃除兇逆不於此豫决其機哉大將軍費揚古報差侍讀學士伊道自湖灘河朔至郭多里巴兒哈孫閱路分站理藩院奏曰大將軍費揚古咨言差侍讀學士伊道鄉導額素克阿南達納木喀爾自湖灘河朔至郭多里巴兒哈孫詳視路途粗分站次限五十日内回於康熈三十五年十二月二十二日遣行上曰伊道非能事之人宜令他人去為是行文諭將軍知之將軍博濟報遣副都統席爾哈達馬雲霄出兵博濟奏曰兵部咨開副都統席爾哈達等奏請随將軍博濟軍前効力上命於席爾哈達費揚固瓦爾達祖良璧馬雲霄内著該將軍酌量帶往欽此派副都統席爾哈達馬雲霄出兵為此奏聞上報聞戊午核計軍中䭾載需用駝馬上諭大學士阿蘭泰等曰一路三千兵従盔甲器械鑼鍋帳房等物重㡬觔百日口糧重㡬觔䭾此當用牲口㡬何及二萬牛羊可食㡬日著與部院大臣㑹同核議具奏此次兵丁行李須比去年春季兵丁行李従輕估算㑹議曰查康熈三十五年進討噶爾丹兵丁以僕從一人算毎人給馬四匹四人為一朋一朋合帳房二間鑼鍋二口搭連四個錛斧鍬鐝各一柄一朋八口拴帶八十日口糧四石二斗以十五觔算重六百三十九觔有餘盔甲四副重一百二十觔合帳房二間連樁二梁柱重五十觔箭二百二十枝重二十二觔大小鍋二口重十五觔錛斧鍬鐝重九觔搭連四個栳斗皮稍馬等雜物重一百二十觔連米共重九百七十五觔零一朋馬十六匹本身與僕従騎坐八匹所餘八匹每匹原以䭾一百二十一觔餘算後每朋增給騾子一匹故每匹以䭾一百七觔算今寧夏所有三千兵丁亦照前每人一僕四人合為一朋其帳房鑼鍋搭連錛斧鍬鐝等物俱照前帶去前帶口糧八十日今帶百日較前多二十日每朋之米增倉斛一石六斗零重增一百六十觔今將䭾子比前減輕則兵丁每人以馬五匹算一朋二十匹馬均䭾每匹得九十四觔餘一口每月以倉斗二斗算則六千口所需百日之米共倉斛四千石其自大同赴寧夏之大臣官員及在寧夏之大臣官員本身親随披甲僕従共一千三百五十五口一口每月以倉斗二斗算百日共需米九百三石二斗零自大同赴寧夏之兵二千在大同之新滿洲䕶軍二百每人已撥給馬四匹伊等俱應增給馬一匹為五匹在寧夏之西安兵八百僅馬各三匹此兵八百俱應增給馬二匹亦使為五匹此增給之馬将學士朱都納寧夏所喂五千馬内撥給各拴帶百日之糧此枝兵随糧百日共需倉斛五千石又肅州一路將軍博濟兵二千孫思克綠旗兵一千共三千除博濟兵二千撥給牲口已經會議應不議外孫思克綠旗兵前經預備六千其馬六千每日以料八升喂四十日今伹用一千綠旗兵則所拴帶百日之米應將前所喂綠旗兵之馬内令將軍孫思克酌量撥給此一路滿洲官兵僕從連綠旗兵共五千六百二十口其綠旗官兵僕従數目原未申報約畧以三百為率計之該共五千九百二十口應隨百日糧一口每月以倉斗二斗算需倉斛三千九百四十六石零此兩路應随百日之糧共八千九百四十六石零兩路随糧俱用寧夏兵押運駱駝一頭以䭾倉斛一石二斗算重一百八十觔所需駱駝七千四百五十六頭騾一頭以䭾倉斛八斗算重一百二十觔所需騾一萬一千一百八十二頭馬一匹以䭾倉斛六斗算重九十觔所需馬一萬四千九百十匹驢一頭以䭾倉斛四斗算重六十觔所需驢二萬二千三百六十五頭此兩路百日隨糧䭾運牲口當取京城解往駱駝一千一百一十頭騾三千六百十七頭學士朱都納所喂五千馬内撥給兵丁餘剰之馬及于成龍等捐助不合例人員在寧夏捐助之三千餘牲口部員所買之牲口地方官捐助之牲口撥用䭾米牽此項米䭾者著撥綠旗兵一千于成龍王國昌喻成龍李鈵喀拜辛保范承烈等俱情願効勞運米則寧夏兩路随運之米俱應交伊等運往命下之日著于成龍等速往寧夏将押米綠旗兵丁口糧等物及派管理官員等事與該督撫㑹同料理又前者牛一頭算八十口羊一隻算十五口今所買牛羊随其所得押送可也得㫖總督及甘肅廵撫内著一員來寧夏理事一員往肅州理事餘如所議己未撥官十員採買軍需駝馬等物大學士阿蘭泰等與兵部㑹題曰臣等奉㫖撥官十員赴肅州寧夏等䖏採買駝馬騾驢牛羊有出而願往効力者乃内閣侍讀學士阿爾賽翰林院侍講學士朱臣御史蘇克濟常綬顧素宗人府郎中敖海工部郎中朱蘭泰户部員外沙里布刑部員外王鴻烈理藩院員外喇都渾等十人又備選翰林院侍讀學士覺羅華顯光禄寺少卿常賽吏部郎中乖哈兵部郎中金圖刑部郎中常武工部郎中滿都凱察里宗人府員外殷達禮刑部貟外温察等九人以綠頭牌列名具奏上命願往効力之十人去於是集願往効力者侍讀學士阿爾賽等十人掣籖侍講學士朱臣御史常綬蘇克濟員外王鴻烈喇都渾掣得肅州侍讀學士阿爾賽御史顧素郎中敖海朱蘭泰員外沙里布掣得寧夏召將軍薩卜素囘京養病領侍衞内大臣班第傳上諭曰著黒龍江將軍薩卜素囘京養病以賢員一人為首領代彼管轄兵丁今日明日有便行文前去癸亥給大將軍費揚古官兵僕從口糧戸部奏曰大將軍費揚古咨稱奉上諭云著於解往五千兩銀内給留駐一百名之兵比照察哈爾兩個月糧亦給為兩個月糧欽此欽遵計留駐一百名兵自喀倫地方給過兩月糗糧滿日為始至今年正月初五日止採買兩個月糗糧已經給與今除前往喂馬之官兵僕従現在此地者共一百二十六口所需口糧八石四斗近奉上諭云于成龍等解往一千五百石之米著節省支用或動支此米即給伊等或另作措置乞大部定奪施行查于成龍等解去之米奉㫖節用且為數不多應照大將軍所請將于成龍等解去米一千五百石内動支八石四斗給之上許之戊辰副都統阿南達報哈宻國擒逆賊噶爾丹之子色卜騰巴兒珠爾来獻阿南達奏曰哈宻囘子額貝都拉達爾漢白克聞噶爾丹之子色卜騰巴兒珠爾在巴爾思庫兒地方周行捕獸遣其長子郭帕白克率兵擒色卜騰巴兒珠爾及其乳父揮特和碩齊等人解至臣軍中為此將色卜騰巴兒珠爾等送往御前謹具奏聞上命示議政諸臣己巳使將軍孫思克設哨禦噶爾丹議政諸臣奏曰將軍孫思克疏言哈宻達爾漢白克額貝都拉報稱噶爾丹有至巴爾庫兒之狀我軍所喂馬若至二月二十則可得臕臣請於二月二十間進布隆吉爾等處探聽如噶爾丹来至哈宻巴爾庫兒則遵訓旨而行如仍在格格特哈郎古特等處則候皇上神謨指示查噶爾丹今窮困已極二月二十日之前未必不至巴爾庫兒等處地方應著將軍孫思克等逺設斥堠以探實音如噶爾丹至巴爾庫兒等處將軍孫思克等作速領兵立刻堵剿如兵丁馬匹稽遲則擇汛地官兵馬之肥者而行毋失機㑹噶爾丹尚未有来信則二十日間不必往布隆吉爾去候㫖而行可也上從之烏朱穆秦等處蒙古諸王奏請従軍効力不許理藩院奏曰烏朱穆秦和碩車陳親王色登端多卜阿霸垓多羅郡王吳爾占噶喇卜多羅卓禮克圖郡王達馬林扎卜蒿齊忒多羅郡王雅木批兒阿霸哈納爾多羅貝勒布昭阿霸哈納爾固山貝子額林辰達什阿霸垓吳爾占噶喇卜王旗下固山貝子車林敦魯卜協理台吉巴魯巴巴格根羅卜親洪郭爾津他爾土巴扎卜噶爾臧巴特馬薩馬達阿霸垓多羅卓禮克圖郡王達馬林扎卜旗下二等台吉賔等附併土默特多羅貝勒額駙厄爾德木圖旗下喀爾喀多羅貝勒羅卜臧喀爾喀部長鎮國公齊卜騰輔國公車陵達什等情願自備馬匹什物軍前効力為此轉奏上曰伊等馬畜不足著各歸家不必從軍後有奏請者皆以此㫖覆之勿受庚午勞賜大將軍費揚古上諭費揚古曰駐扎肅州副都統阿南達疏言擒噶爾丹之子色卜騰巴兒珠爾於哈宻之地正月十六日晩正在暢春苑西門放燈及煙火衆蒙古及厄魯特投誠男婦皆集其疏一到衆皆大悦爾防守窮壤不得在朕左右故抄阿南達報文發汝知之時當年節通國老少皆嬉戲行樂爾獨居寒塞無聊之地殊深軫念是以賜之胙肉鹿尾關東魚匏𤓰等物且問爾無恙朕躬安即如與爾相見時爾無恙否噶爾丹作何料理不失機㑹朕與諸臣議定後另有㫖特諭辛未都統蘇努等出征諭以行兵之法都統蘇努巴渾代阿什坦齊什塞稜格等入請訓㫖上諭曰凡我兵厮不齊起行退落在後造飯而食任意混行勞馬者甚多或有大臣官員亦久卧不起一二人留落在後者有之爾等當嚴督趲行其囓雪之馬不可即飲水著曉諭深戒今方春時已有㫖令拴繫齊臕著小心㸔視又大同兵前已給三個月錢糧今再令支三個月錢糧支此錢糧在大同右衞等處支取至食米亦在右衞殺虎口支取帶去勿動湖灘河朔之米其大同新滿洲䕶軍二百仍令在大同照常喂馬候駕即將諭汝等之㫖交與兵部速發諭馬思喀壬申安插厄魯特降人於張家口外上諭内大臣曰前以在京厄魯特應與建房居住故命議政諸臣集議今厄魯特在此患病物故者甚多此屬既己輸誠歸化殊為可憫其將伊等令各該佐領幇助帳房行李送至張家口外牧塲之地在彼散處應給糧餉仍照常分給令伊等食其米積銀以買牲畜則可以謀生矣以後天時漸熱疾病死亡者庶㡬亦少著議政諸臣集議尋奏臣等欽惟上諭極是應傳諭三旗令厄魯特所𨽻各該佐領捐助資裝送至張家口外交與各該旗游牧地方叅領監管所給糧米應動支張家口倉米毎年兩季令住居游牧地方三旗均輳車輛駱駝差官運往散給所給餉銀令戸部算數行文直𨽻廵撫動支張家口附近州縣正項錢糧給與此銀交兩季送米官帶去將銀與米一併眼同散給此項厄魯特既安插張家口外應停止建房上可其奏臣謹按招携懷逺帝王之大德故即獷猂難馴之軰一旦革面嚮風歸仁慕義尤必示以矜全之意加以軫恤之恩其或風土異宜疾疢間作煦嫗覆育有痌瘝一體之誼焉我皇上憫厄魯特之屬輸誠歸命豢養京師慮其寒燠之失時以至食飲之違性籠禽檻獸有投林集木之思爰命所屬佐領予以廬幕贍以資糧移插張家口外仍優給廩餉俾得置牲畜以滋蕃息従此游牧得所食息晏如物無夭札之虞人有更生之樂皇仁如天不以荒徼絶域而二視之也癸酉左都御史于成龍等告請効力許之時于成龍王國昌李鈵喻成龍辛保范承烈喀拜等以上將三舉北征自寧夏進剿因復以随行効力為請上曰于成龍等七人既願随駕効力准其前去著多備牲口以行甲戌増給察哈爾官兵俸糧先是察哈爾八旗官兵原無俸糧上念其征行勞苦諭理藩院戸部曰屢年以来察哈爾八旗官兵處處從軍効力甚苦伊等向無俸糧欲俟滅噶爾丹後於恩詔内增添俸糧但覺太遲自今察哈爾官員著比照京官俸量減給與目下䕶軍暫給二兩驍騎暫給一兩自今以後䕶軍每月仍給二兩驍騎一兩爾等作速定議具奏即於二月支俸時給之尋尚書班第馬齊等議八旗察哈爾在邊外者其世襲官俸應照京官俸四分減三給之三等公一員應給一百六十五兩一等精竒尼哈番四員應各給一百二兩五錢二等精竒尼哈番一員應給九十六兩二錢三等精竒尼哈番二員應各給九十兩一等阿思哈尼哈番一員應給七十七兩五錢二等阿思哈尼哈番三員應各給七十一兩二錢三等阿思哈尼哈番一員應給六十五兩一等阿達哈哈番兼一拖沙拉哈番一員應給五十八兩七錢一等阿達哈哈番三員應各給五十二兩五錢二等阿達哈哈番四員應各給四十六兩二錢三等阿達哈哈番二員應各給四十兩拜他拉布勒哈番十七員應各給二十七兩五錢拖沙拉哈番二十四員應各給二十一兩二錢世襲官俸四分給一共計銀二千六百六十五兩零叅領等官九員佐領等官三十七員五品官十九員六品官八十一員應照京官俸減半給之共計銀五千六百九十兩零前鋒䕶軍一千八十五名毎月一名給二兩驍騎及執事人員一千七百六十名每月一名給一兩一年應給兵餉共計四萬七千一百兩零以上官員兵丁一年所需共計銀五萬五千五百兩零此官員内有現食俸者仍照常給與現任官員内有世襲者當照減等之數量給年㓜官員兵丁尚未當差宜停其給與所給官兵俸糧俟行役既罷生養充足之日再行奏止從之丙子使都御史于成龍仍管運米事先是奉有著于成龍等與吏部尚書庫勒納監押駝騾前赴寧夏之㫖于成龍等入請訓㫖上問曰爾等既云情願効力今仍告請運糧否乎于成龍等曰皇上前付臣等以運米重任奈臣等疎庸致悞軍機現在議處尚且不勝悚懼何敢復行告請如蒙聖恩收其後効補其前愆臣等敢不竭盡心力以饋輸是任上云于成龍等七人可復為朕督運爾等臕瘦之馬許於八旗官馬内各易肥健者二十匹帶去其効勞官員或五匹或十匹亦准更換帶去己卯定出師日期先是上諭兵部曰朕欲幸右衞駐蹕近則易於調遣出師日期著於二月朔以後選擇欽天監先擬二月初十日改擬二月初四日至是諭另擇期随擬二月初六日丁亥辰時利破賊行師從之庚辰以必牙思呼郎等為主事帥兒等為筆帖式使之從軍理藩院奏曰臣部原任郎中今任三等侍衛正藍旗必牙思呼郎原任員外今任佐領鑲紅旗三布代正黃旗祈他特原任員外今任䕶軍校鑲藍旗薩哈連等告請随駕効力伊等俱在臣部年久諳練之人請將伊等俱授為主事此次帶去用其力俟缺出開除原任員外正藍旗蒙古帥兒鑲藍旗蒙古傅昌伊等告稱此次我等願随駕効力伊等在臣部年久俱請授為無品筆帖式帶往用其力可也上從之癸巳大將軍費揚古奏報諸部長及従征官捐助馬駝之數費揚古奏言去春大兵進剿之時奉㫖令諸部長捐助馬匹計捐助者西勒圖庫圖克圖馬二十九匹陀音庫圖克圖馬八匹擦雅班達達庫圖克圖駱駝五頭馬三匹住持大喇嘛阿齊圖綽爾濟馬二十匹住持喇嘛勞占尼瑪馬七匹住持喇嘛彭蘇克馬十一匹住持喇嘛恩木齊馬十九匹住持喇嘛克卜松馬四匹喇嘛代哈丹津馬二匹喇嘛達頼綽爾濟馬二匹又去春大兵出塞䭾負大砲及火藥鉛子繩索等物急需駱駝其捐助者計吳喇忒公都稜駝五頭吳喇忒公鄂爾奔五頭吳喇忒公達爾馬什里五頭毛明安部長台吉諾爾布五頭喀爾喀和碩親王善巴十頭親王善巴旗下額爾徳尼班達達庫圖克圖五十頭多羅郡王滚布十頭多羅郡王黙爾根濟農顧魯什希十頭黙爾根濟農顧魯什希旗下達爾漢喇嘛五十頭公汪舒克四頭公烏巴達四頭部長台吉額兒濟亨哈坦巴圖爾滚占三頭部長台吉丹津額爾徳尼三頭部長台吉吳爾占三頭部長台吉汪舒克三頭部長台吉圖巴三頭衞徵帶青台吉凱木楚克二頭多羅郡王彭蘇克阿拉卜灘二頭察罕巴爾貝子寶貝二頭部長台吉額爾徳尼滚布二頭貝勒薩漫多爾濟四頭又喀爾喀和碩親王善巴以兵丁馬匹缺少復捐馬四十匹此項捐助馬駝載礮火藥鉛彈繩索等物又給駕舟新滿洲侍衞䕶軍校䕶軍五品官厄魯特鄂欣等無馬駝者後又正卿辛保等運米而来令侍讀學士布泰郎中桑格遍諭衆部落有駱駝者暫行捐助運完之日仍各給還原主為此喀爾喀達爾漢親王諾内助十頭吳喇忒公鄂爾奔旗下協理台吉吳爾圖納蘇圖二頭吳喇忒公達爾馬什里旗下協理台吉􅀈顆爾二頭鄂爾多斯公杜稜三頭四子部落多羅郡王三濟扎卜旗下協理台吉龎三頭毛明安部長台吉諾爾布二頭土黙特都統阿爾納副都統阿廸二頭土黙特阿必達旗下副都統阿玉什多爾濟二頭喀爾喀和碩親王善巴十頭公吳巴達一頭公蘇泰伊爾登二頭部落台吉丹津額爾徳尼一頭揚威將軍覺羅舒恕一頭振武將軍孫思克一頭西安將軍博濟一頭都統公彭春一頭都統伊勒慎一頭䕶軍統領宗室費揚固一頭副都統碩太一頭侍郎滿丕二頭副都統黨愛一頭拜布一頭戈爾對一頭侍讀學士布泰一頭郎中桑格一頭用此項捐助駱駝運米訖為此奏聞上報聞聖祖仁皇帝親征平定朔漠方畧卷三十五

body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷三十二甲辰頒招撫噶爾丹敕書先是擊敗噶爾丹於昭莫多之地有厄魯曼濟受傷被擒曼濟以其妻子皆在噶爾丹所求歸上命遣曼濟至大將軍處偕阿旺丹津往噶爾丹所其諭噶爾丹敕文令議政諸臣撰擬呈覽再照敕文譯蒙古文數張使曼濟帶去議政諸臣擬撰敕文呈覽上親改定以示議政諸臣敕曰皇帝敕諭噶爾丹博碩克圖汗丹濟拉等朕統御天下要以中外一體為務往者烏闌布通之役爾等雖經敗北朕尚欲與爾等會約以定喀爾喀之事故使命屢頒爾等乃違棄誓言搶掠納木札爾陀音竟至克魯倫地方朕親帥師欲與爾會同定議遣使申諭爾復狐疑不信不親見朕使及朕躬至克魯倫爾遂望風奔潰遇朕西路之兵爾先犯我顔行遂至喪兵敗衄盡棄駝馬牛羊子女廬帳什物爾衆寨桑台吉等接踵來降丹濟拉格壘古英車陵奔等寨桑十五人亦願歸服遣察罕哈什漢來陳奏悃誠朕已面諭遣還今朕又親率六師逺涖於此且各處調兵邀截爾等妻子馬畜諸物俱已散亡衣食已盡勢迫無歸況時漸嚴寒朕不忍爾屬下厄魯特妻子相失窮困凍餓而死特遣諭招撫今重復降敕爾等若悔前愆俯首向化朕並不異視加恩撫恤俾各得所爾部下厄魯特亦得妻子完聚咸獲生全朕斷不計爾後罪況爾部落人內有被我軍所俘其父母妻子尚在爾處不忍分離願歸故土者朕皆恩賚賜之坐騎糗糧即令遣歸使與其骨肉完聚其欲內附不願歸者朕皆富貴之各得生養爾部人曼濟重傷為我軍所擒今曼濟言其妻子尚在爾處因欲告歸朕是以給之恩賞賜之坐騎糗糧使賫敕遣回爾地爾等思尚能永存有能收養爾等之人否其熟籌之今已無所歸噶爾丹博碩克圖汗丹濟拉爾等可領餘衆作速來降朕必令爾家富身榮各遂生養惜此厄魯特如許生靈被爾噶爾丹博碩克圖汗驅迫至於此極今若又不覺悟聽信匪言則後悔莫追矣爾其勿疑勿懼特諭臣按一怒以安天下而四征以綏兆民至人之師皆不忍人之心也皇上唯不忍邊境之侵凌而陳師進討又不忍生靈之塗炭而降諭招徠而且於厄魯特降人不忍其無衣也而衣之不忍其無食也而食之不忍其妻子之離散也而歸之其歸也則又特賜敕書開陳禍福溫言周摯至於再三匪直不忍乘其窮蹙戮鯨鯢以為京觀而安全生養之心惟恐一夫或失其所聖德好生侔於天地仁心義問宣布於十行尺一之間其與詩書所載固異世而同揆也乙巳沙濟出征逃避革職治罪先是固山貝子喇思札卜以出征驍騎校沙濟在逃報理藩院院檄嚴查沙濟拿到之日再議今協理台吉丹巴松以拿獲沙濟在吳爾揮地方正撥官兵解送之時又復逃去報院院議革去沙濟驍騎校之職拿獲之日枷號兩個月鞭一百罰三九牲畜著披甲上從之丙午留散秩大臣宗室庸吉等駐歸化城受厄魯特降人上諭內大臣曰歸化城當留一大臣受厄魯特降人完其夫婦給其衣食著散秩大臣宗室庸吉乾清門侍衛哈楚哈員外董殿邦副都統阿迪等公同商議而行取有面皮襖二百件無面皮襖一百件銀三百兩付之如有頒給支用此銀造册記數勿𣲖歸化城土默特蒙古厄魯特降人內上人則給有面皮襖下人則給無面皮襖著庸吉哈楚哈隨駕至湖灘河朔回住歸化城安郡王等出行已久俟察哈爾兵往替與黑龍江兵同歸到歸化城後著安郡王副都統雅圖駐歸化城其下人發回京城將軍薩卜素目下有病未愈不必隨駕著帶所率官兵一百十人往大同養馬伺候大將軍伯費揚古處兵五百到後亦往大同餧馬如大將軍處有緊急事務即撥其兵六百前赴大將軍處此俟行文大將軍之便發去封多爾濟青台吉為札薩克一等台吉上諭內大臣索額圖等曰公西卜退哈灘巴圖爾之弟青台吉來請安伊奏言臣未嘗來赴操亦未嘗一次來請上安臣亦無職名亦不在部册去嵗車陵札卜台吉阿爾薩郎衛寨桑往土喇旁探聽噶爾丹聲息臣之人與彼偕往擒厄魯特名津巴者來臣身亦曽與侍讀學士喇錫出征著內大臣索額圖尚書馬齊副都統吳達禪等將多爾濟青台吉授職之處議奏伊等俱習居林中仍著暫住林中伊等所居地方近倭羅斯倭羅斯人已與本朝修睦著該部給之印文諭彼勿相侵奪其行倭羅斯該部印文即交多爾濟青台吉令彼附近倭羅斯人送去索額圖等會議曰多爾濟青台吉來請上安進貢問之據云屬下有箭手一百五十人烏郎海一百五十人共三百丁云彼既以身無職銜名亦不在部册諄諄奏請應封為札薩克一等台吉餘皆欽遵諭旨而行上從之命督運于成龍等運米至大將軍軍前喀喇穆冷地方于成龍等奏曰臣等奉皇上訓諭而不能運米到軍前皆當罪死蒙皇上不即重懲仍令效力贖罪臣等粉骨不能圖報今大將軍伯費揚古率兵駐扎喀喇穆冷地方臣等願竭力將湖灘河朔倉米三千五百石運致喀喇穆冷但此米到後應付何人謹奏請旨上諭曰如許米無所用爾等但運到一千五百石亦大有益矣米到即交將軍費揚古其運米駱駝若又帶回時值嚴寒定致有損亦交將軍費揚古在水草佳處飼養天時既寒運米亦是難事朕亦知之爾等之事即朕之事也以噶爾丹情形諭皇太子上諭皇太子曰二十日早噶爾丹處兩厄魯特來降日午又兩厄魯特來降朕皆召至賞之其內一人之妻向為我軍所獲一到即給還兩人相抱而哭蒙古自王以下無不下淚者皆悅曰善事云詳問之云丹濟拉歸十九日至庫冷白兒齊爾見噶爾丹告之曰大兵各處堵截我詐許降而來噶爾丹大恨曰我專望於爾今將何以自存且兵又堵截此地不可留當往哈密取米為食二十一日已起行矣我等隨行一二日方向此而來途中多盜互相殺奪云若果往哈密乃其絶地必獲噶爾丹彼處已布置完密更無可慮今來降者殆多矣當陸續寄聞二十一二十二宿此二十三仍宿此二十四日乃起程向黃河沿去我軍之馬皆肥壯此地尚暖河亦未凍衣棉袍人多負販者尚未衣裸而行土著年老人皆大竒之言我祖父以來未聞有此時河未凍無風霜雨雪之美年云朕觀之與京城無異朕御薄羊裘棉套而騎射尚熱而有汗丁未上由歸化城駐蹕衣赫圖爾根郭爾之南減御膳兩餐賜右衛官兵食大賚衆人上諭內大臣曰右衛兵明日當到此地自出行以來朕與汝等皆嬉笑飽食兩餐明日但早食一餐其晚餐停止皆持去給右衛勞苦之兵為食御膳兩餐諸皇子膳兩餐俱持去賜右衛兵為食著以此遍諭諸大臣官員執事人員通營各自送去賜飲之茶自茶房備辦又諭尚書馬齊曰前因右衛兵勞苦差侍衛馬武往送牛羊馬武歸朕問之言右衛回師內步行者多食亦少云著每人賞銀三兩其兵數令即查明來奏又差大學士阿蘭泰侍衛馬武至右衛兵下營地方宣上諭曰右衛官兵自來戍右衛以來連次出征甚為勞苦朕心殊軫惻爾等所借公庫銀已皆蠲免陳亡官兵僕從已皆給身價銀其軍中病故得傷人等已皆加恩賞矣官兵皆歡呼稽首奏曰我等臣僕蒙聖上豢養戎行效力乃我等當然之事今聖上念我等勞苦沛以鴻恩將我等所借官庫銀俱已豁免陳亡人員俱已給身價軍中病故得傷者俱已加恩雖欲奏謝總不能措一辭此後但當效死力以圖報鴻恩於萬一耳戊申上親臨賜右衛兵食右衛兵既到上往親視賜食八旗官兵排齊迎接駕至衆官兵趨進跪而同聲請安上下馬坐定引官兵俱近前坐自官兵以至僕從遍賜食及茶畢上命內大臣索額圖副都統吳達禪牧場侍衛黃海傳諭曰戎行效力我滿洲從來以為常事朕欲滅噶爾丹而親統大軍進討噶爾丹不能抗望風逃竄遇爾西路之兵遂大敗之爾等俱絶糧步行以極窮極乏之兵奮勇敗敵殊為可嘉是以朕親臨賜食盡免汝等所借官庫銀加恩於得傷病故之人先已有旨不必復宣又顧護軍統領宗室費揚固等曰朕原欲在軍中賜汝等宴因朕親追噶爾丹至拖諾山尚欲前進以糧誤不到回來迎糧是以今日方得賜汝等食爾等兵卒誠勞苦矣費揚固等奏曰此軍乃皇上豢養之兵義當效力聖主為天下計周詳籌畫然後出師噶爾丹不能抗皇上神威連夜奔逃困乏已極僅餘殘喘得至昭莫多地方大將軍伯費揚古遵皇上密諭而行遂爾大敗賊寇此皆皇上蓋世竒功於將士何有蒙皇上賞賚重疊又親臨賜食誠古今未有之盛事也臣等自此以後但當遵奉指揮效命而已衆軍歡聲動地上起步行往來遍閲八旗官兵回至行宫諭內大臣曰乘此駐蹕之日著察王以下及諸人乘來馬數多者至數百少者亦有之可察其數朕欲知之併察內府馬數另察衆人馬內其臕僅可行十日之馬朕駕所行之程逺此馬不能到現有右衛無馬兵丁可給與騎歸馬上令各主書名拴記伊等有現成官草料著彼自行肥秣如有軍務乘之而往俟回時各將馬匹交還原主若有缺少倒斃朕償之差官至伊竒里口收西路隨軍餘剩馬駝行兵部奏曰大將軍伯費揚古咨稱右翼四旗察哈爾所趕隨西路兵之馬駝除給京城右衛八旗兵丁給新滿洲侍衛給欽差藍翎侍衛殷濟納等給駕炮車給馱炮及炮藥炮子給運米留於喀爾喀部長額爾德尼哈灘巴圖爾滾占道斃等項馬駝外現在正黃旗察哈爾餘剩馬四十四匹駱駝十頭鑲紅旗察哈爾餘剩馬六百二匹鑲藍旗察哈爾餘剩馬四十匹今天時已寒此項馬駝當如何安插請定奪移文察哈爾總管遵行查前者宣化大同所餧駱駝一千一百二十九頭宣化所餧馬內七千六百十匹山西官員捐助馬八百七十二匹俱隨西路兵行今大將軍伯費揚古既稱察哈爾等所趕馬駝內餘剩馬駝天時既寒請定奪如何安插應行文右翼察哈爾總管將現存馬六百八十六匹駱駝十頭趕至殺虎口徐行餧養勿使勞苦撥臣部及理藩院司官一員往殺虎口查明殘疾馬駝收領量此馬駝撥緑旗官兵趕至大同以馬一半駝十頭交侍郎多竒以馬一半趕至宣化府交侍郎席密圖俱令敬愼飼養倘有取用再往調撥自殺虎口至宣化府照例沿途給空草一束其各處撥給倒缺馬駝之數大將軍造清册報部併行文大將軍伯費揚古侍郎多竒席密圖知之上曰此項馬匹若遣官至殺虎口收領則迂逺二三百里不等右翼察哈爾住居與伊竒爾口相近著兵部理藩院各遣官一員至伊竒爾口收領餘如所議己酉加恩右衛官兵賜以衣銀食物坐馬上遣諸皇子至右衛兵營中賜茶酒又差膳房章京莫洛渾撤御膳賜官兵賜右衛護軍統領宗室費揚固短貂褂副都統黨愛科爾對銀鼠褂賜右衛查出兵丁二千五百人銀七千五百兩及到殺虎口口糧上以馬三百四十六匹給右衛兵乘坐諭議政諸臣曰此馬皆官馬亦有朕所御內廄馬聞右衛兵無馬步行故給與乘坐可將此馬攤給無馬之人乘坐負裝到右衛既到右衛後兵丁各自有草料使之肥秣此馬倘有軍務使乘之而往若無軍務至肥時解京此皆官馬一匹亦不可費其右衛兵丁所借官庫銀雖已蠲免若該管官員催促兵丁置馬又必借官庫銀以置之則兵丁難以謀生著暫停兵丁置馬令彼徐徐措處此所乘馬或解大同餧養或留右衛餧養聽從其便著兵部即行文右衛護軍統領知之臣謹按昔之投醪挾纊為將者能與士卒同其甘苦猶且傳為盛事至於東山杕杜之詩勞軍士之旋歸先儒謂上下之情意交孚雖家人父子之相與無以過此然於恤其死亡而起其傷痍者無述焉皇上仁同覆載念行間效命之人或身殞疆場或親罹鋒鏑不惜數十萬府庫之財而大賚普於存殁又慮其徒行不能購馬給以天間之乘於其將至賜以牛羊且命尚食止進一餐自皇子以下俱減膳以食將士其至也親臨燕勞下逮厮養無不蒙恩真所謂悅以使民民忘其死者使作為雅歌以歌詠聖朝勤歸勞還之盛事萬世猶為感動而况三軍之士哉發敕招撫厄魯特台吉阿拉卜灘丹津鄂木布先是厄魯特羅卜臧班珠爾叩閽請曰臣原係阿拉卜灘之人正黃旗察哈爾阿木呼朗佐領下撥什庫克什圖虜臣等來給與西勒圖庫圖克圖臣乃喇嘛並未有效力皇上之處臣有七十嵗老母又在杜噶爾阿拉卜灘處請皇上差人同臣往招杜噶爾阿拉卜灘如不能招杜噶爾阿拉卜灘亦招其下人而來上以交議政諸臣且諭內大臣明珠曰今命諸臣議差人招撫羅卜臧杜噶爾阿喇卜灘但杜噶爾阿喇卜灘另在一處亦當撥親王策旺札卜昆都倫博碩克圖滾布默爾根濟農王顧祿什希之人遣往招撫著諸臣一併議之至是會議奏曰當遣羅卜臧班珠爾往招杜噶爾阿喇卜灘來降再令和碩親王策旺札卜長史馬尼圖多羅郡王昆都倫博碩克圖滾布之烏勒木濟多羅郡王默爾根濟農顧祿什希之阿玉西備辦遣行撥理藩院撥什庫一名送往大將軍伯費揚古處視與噶爾丹無涉平安地方遣使前去上曰筆帖式黑色當處斬即差黑色效力於是點出筆帖式黑色長史馬尼圖等賫送敕書招撫厄魯特阿喇卜灘丹津鄂木布敕曰皇帝敕諭台吉阿喇卜灘丹津鄂木布朕統御天下撫恤黎元務使人人各得其所先是爾厄魯特與喀爾喀互相讐怨朕欲爾等和好已頒敕諭喀爾喀厄魯特俱違朕諭自起戰爭喀爾喀既敗來歸朕為天下元后不忍坐視其滅亡於是納之注其名籍酌量封為王貝勒貝子公扎薩克與以厚祿咸致富貴俾各得所噶爾丹博碩克圖汗乃不願朕拯救天下生靈借喀爾喀為兵端闌入烏闌布通之地既被我兵所敗雖詭誓遁逃朕猶數遣使頒諭令其會兵以定喀爾喀之事噶爾丹博碩克圖汗違背誓言掠納木扎爾陀音越克魯倫而前朕親統大軍欲與觀兵特遣使直告噶爾丹博碩克圖汗狐疑不信奪朕使馬不與一見及朕親至克魯倫即望風敗遁遇朕西路官兵彼先逆戰遂至大敗子女牲畜盡被俘獲丹巴哈什哈等先來抒誠後沙克朱牧等接踵歸附俱給以官職令其貴顯足其衣食使之富有固已各得其所其來降之衆內有子女被我兵所俘者皆行察出令其父子兄弟夫婦完聚今朕又親統六師各路皆已調兵阻截噶爾丹博碩克圖汗倘不來降必窮之於其所往爾阿喇卜灘丹津鄂木布前雖附噶爾丹然皆非倡亂之人今歸降之人皆云爾等與噶爾丹分析各居朕嘉爾猶知天道能自振拔憐爾之馬畜等物被虜衣食已絶特遣和碩扎薩克圖親王之長史馬尼圖多羅郡王昆都倫博碩克圖之烏勒木濟多羅郡王墨爾根濟農之阿玉西又爾屬下之喇嘛羅卜臧班珠兒亦願招安爾等今同持諭前往其札薩克圖汗之子先經離散朕已收留覔爾嶽母令與相會封為親王食以厚祿頻加撫恤頃又賜以牛馬羊羣擇地令其遊牧使之得安生業享有富貴此顯然之明驗也敕書一到著即率爾部落來降前此依附噶爾丹博碩克圖汗之咎朕概不介意必待爾以富貴顯榮爾之部落亦使各得生業妻子完聚從容度日丹巴哈什哈等朕尚憐恤使之富貴况爾等乎若爾尚有疑懼今春䇿旺拉卜灘之使來時稱爾與䇿旺拉卜灘甚善皇上若滅噶爾丹請勿討阿喇卜灘令其與我會合等語且策旺拉卜灘屢遣使納貢敬愼有加故朕亦深加憐惜爾若同丹津鄂木布往附䇿旺拉卜灘處朕亦不窮詰爾其優禮朕使明白回奏倘於此二者不審一自處徼幸於厄黑阿拉爾空屋賴齊斯希等峻險之處棲身茍免朕斷不姑容必會同䇿旺拉卜灘根敦帶青貝勒等尅期進討爾其早作良圖特諭庚戌駕至麗蘇諭兵丁以牧養馬畜之法上諭內大臣曰朕日行二三十里牧放之馬何用早取此正嚙草之時嗣後當緩取至黃河水深飲馬勿拌其足墜則難出著通行曉諭又以出行事諭皇太子上諭皇太子曰朕二十二日仍駐蹕歸化城往觀北山麓之二廟二十三日駐蹕集衆射且手搏二十四日自歸化城起行駐蹕於三十三里外渾津村之南歸化城老少依戀繾綣揮淚道左二十五日駐蹕是日右衛兵二千五百俱到朕躬迎勞大備牛羊飯餌親饗之諸軍士歡聲動地朕間居歸化城各處獻俘甚多皆給價收納有各種工藝笳歌彈筝者俱有之內有一吹笳老人年六十五嵗笳吹甚精殊滑稽能言初見時朕給之衣冠賜食及茶酒彼謝恩畢攘袂點首瞪視良久指朕曰所謂大丈夫者汝耶膽氣如此英勇如此滅我名邦以敵國之臣而臣之以敵國之歌者而使歌之如此國富兵強乃不事驕侈但利濟羣生安集離散惟務積福而今已矣諸國實無與敵俱為臣僕理所必然耳於是叩頭而坐彼初指朕而言衆亦以為醉及聽至末句莫不稱其人雖鄙而言亦有合於理云一彈筝者名齊倫其技甚精二十六日駐蹕達爾漢拜上出歸化城向西南行地平壙新設御莊正當此路田多耕之不盡諸塞之外未見有如此地之平壙者且草美水佳朕行如許路不聞有一病者阿米達桑格周卜世明珠輩諸老臣皆顔色加豐可將此項事謄出奏聞皇太后并令宫中知之辛亥上駐蹕湖灘河朔指授牧馬之法上諭護軍統領曰放馬時當放於來路東方飲則飲於池不可飲於黃河其草或用以炊爨營之四圍帳之附近草皆刈去是日上觀黃河回行宫壬子員外郎鐵圖等問明翁金交戰事還復命先是上諭遣官一員偕參將張文華往寧夏祖良璧處將彼如何交戰之事來奏𣲖出員外鐵圖鐵圖等請訓旨上諭曰汝等前往可問祖良璧云巡撫舒恕副都統西爾哈達按察司囊吉里爾等俱係運西路米者舒恕等歸去如何付汝在翁金守糧汝又久住如何不報將軍九月初六日爾等起行厄魯特伏於山谷爾等半度出於伏中來犯我師參將張憲載守備張林等奮勇擊敗敵人據厄魯特降人言厄魯特有千許人炮無藥鎗無鐵云爾等之戰厄魯特執何兵器穿何衣服爾等非戰卒乃守糧之兵耳擊敗厄魯特殊為可憐將敘爾功其將此問明祖良璧如已往西安祖良璧帶去之兵俱係寧夏官兵爾等可問伊等聞翁金有米朕即差一筆帖式馳報此筆帖式庸劣幾誤乃事朕今欲斬此筆帖式又爾等前去可慰問總督吳赫總兵官王化行如請朕安云朕躬安容顔亦好朕來至歸化城者一則巡閲地方且近厄魯特降人朕將相機調度厄魯特於土喇地方為我軍所敗廬帳衣食俱盡况四面俱讐敵斷不能踰今冬沿邊有來降者爾等受之解京總督吳赫如已歸爾等移文知之又趙良棟在寧夏爾等可慰問病已愈否併將朕至歸化城之故告之至是鐵圖等還奏曰臣等十月二十一日到寧夏問總兵官王化行言總督吳赫九月二十九日已起行矣祖良璧十月初四日已起行是以謹將諭旨移文總督吳赫外問之守備張林把總吳進等言我等在翁金有滿洲漢軍緑旗兵共一千奉將軍孫思克令曰爾等可在翁金守米以俟大兵回師之用直至八月十四日不聞大兵歸來副都統祖良璧參將張憲載因扣算米糧僅可至十月二十七八大兵雖歸無米可給是以備文開具翁金之兵或留或撤原由於八月十六日差正紅旗散騎校劉秉智送至寧夏直至九月初一日又無聲息乃計此米僅可足我兵歸來之用公同商議領兵而回於九月初六日起行起行之時滿洲漢軍緑旗兵前鋒在前輜重居中祖良璧率兵護後自翁金向西南行不數里前鋒僕從一人馱米驢上前行有厄魯特八人出傷僕人奪米而去我前鋒驅至二十里山谷中所伏厄魯特率兵突出沖截輜重於是前鋒軍回就大軍此一戰也厄魯特有戰卒五六百其障後而立者千餘賊繞我軍尾後團團圍住副都統祖良璧率兵從東方殺出背河而陳排列子母炮鳥鎗以戰厄魯特不能敵而奔厄魯特雖有鳥鎗而藥少發來無力鎗無刃削尖塗油火炙為之所以不堪馬亦羸瘦且遇王師一戰大敗其膽已破不能復抗我軍隨即奔潰陳上雖奪去些須物件俱追往取還因賊逃入山我軍乃退為此奏聞上命語大學士知之使蒙古巴特馬兄弟完聚理藩院奏曰副都統根格咨言蒙古巴特馬訴稱我乃巴爾虎洪郭爾帶青屬下人鑲紅旗巴爾虎佐領鄂欽乃我親伯之子我前自噶爾丹軍中逃出各處糊口延至此地乞使我與我兄鄂欽完聚問之鄂欽云巴特馬實係我親叔之子乞準與我完聚應許巴特馬與其兄鄂欽完聚與否伏祈定奪等語巴特馬係鄂欽親叔之子是真應準伊等完聚上從之癸丑宥山陜緑旗兵擅歸罪上諭內大臣曰今春出征山陜兩省緑旗兵米糧不敷迤邐在後結隊而回不得比之於私逃之例彼既乏糧且去將軍逺各覔歸本營若議其罪殊為寃苦著從寬免察議現在拿禁者俱釋之通行曉諭盡免西路官兵賠償馬匹行兵部奏曰西路出征八旗夸蘭大羅密等呈稱前大將軍伯費揚古隨行太原捐助給兵之馬宣大餧養之官馬內共一千五百七十八匹其中陳上倒斃一百八十二匹病死一千二百三十四匹留於坐塘筆帖式噶爾圖察哈爾參領阿木呼朗等三十九匹現存馬一百二十三匹等語查得陳上倒斃一百八十二匹不議外現存一百二十三匹應入各旗拴餧額中使之拴餧其乏留驛中交與蒙古之三十九匹應赴各處查明解來分給八旗拴餧其病死一千二百三十四匹俱不小心牧放玩怠之故著俱照數賠償亦入各旗於拴餧額中使之拴餧上曰西路出征兵丁勞苦殊甚是以屢加恩賞此愈斃馬缺免其賠償餘如所議聖祖仁皇帝親征平定朔漠方略卷三十二

body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷十二康熙三十一年二月辛卯西安副都綂馬自徳請赴寧夏軍前自徳疏言臣幼時即蒙皇上豢養之恩歴有年所今新任滿洲副都綂阿蘭泰傳諭滿洲副都綂西爾哈達速赴將軍軍前竊思臣身現在陜省且寧夏亦有漢軍官兵理宜往赴寧夏請命前往庶得馳驅邊塞少効微勞矣上許之乙丑侍衞阿南達奏報巴圖爾額爾克濟農降先是上諭大學士伊桑阿阿蘭泰等曰頃有喀爾喀杜稜逃來言彼向在巴圖爾額爾克濟農之弟博濟所博濟經我兵掩殺徒歩逃出至伊巴賴之地遇巴圖爾額爾克濟農屬下祁齊克台吉等博濟取彼馬及糧糗往覓其兄巴圖爾額爾克濟農食盡困極自相竊奪現在厄濟内地方厄濟内之地距嘉峪關四日程云目下西安大兵正往戍寧夏可令侍衞阿南達携杜稜至寧夏㑹同將軍馬喇提督孫思克及總兵官等詳議確探聲息如巴圖爾額爾克濟農彼所居果近嘉峪關二郞保格什現在彼地可即遣伊等前往招撫如抗拒不降即選發滿洲綠旗兵𠞰除之至是侍衞阿南達等奏報巴圖爾額爾克濟農降上諭議政大臣蘇爾達等曰覽侍衞阿南達等奏報巴圖爾額爾克濟農已降將遣其子來朝但其人未可深信或時序不宜馬匹羸瘦不得已而降令其子來朝往返之際馬匹休息又復逋逃亦未可定將軍馬喇提督孫思克等既身與逼近目擊情形宜乘此機會共商徙入内地之策斷不可縱使復逸尋馬喇等奏至言濟農下人共二千二百餘口今雖絶糧窮困已極然臣等揆其情狀亦不爲此誠以皇上鴻恩浩蕩不敢背棄即醜類色稜扎木素等亦禁戢其下未嘗使窺邊塞兩次遣人陳情雖不能上達仍望皇上降㫖收納是以臣等招撫之文甫到即不疑而來降以此觀之不可謂之不向聖化者也又查其弟姪博濟等諸台吉及屬下離散之人俱在西海地方今所存不過六七百人且復受巴圖爾額爾克濟農之降關繫遠人視聽皇上懷柔遠人仁聲遐播不得不議所以保全之是以曉諭地方官各隨宜捐助糧米給食至寧夏其歩行人千餘内有不能行者四百人撥内地驢車逓送若巴圖爾額爾克濟農本身將其下色目五十餘人與臣馬喇親從口内同帶往寧夏必不使之再逃既至寧夏亦不問其願否即令渡黄河彼亦無可如何矣但困窮已極倘不給之糧騎實不能至歸化城伏乞勅部遣官至黄河之寧夏渡口按人給騎計口授糧令鄂爾多斯逓送即可至歸化城如此則寧夏地方不必撥官兵押送矣奏入命理藩院遣官一員至寧夏使巴圖爾額爾克濟農少攜僕從乘驛而來沿途酌撥綠旗兵逓送俟朝見後遣歸後巴圖爾額爾克濟農率其子雲木春台吉至京朝見優賚而遣之丙寅命加提督孫思克太子少保並賜拜他喇布勒哈番上諭兵部曰國家簡用武臣委任封疆重寄專期軍民輯睦邊境乂安其實有宣力累年茂樹偉伐則旌庸之典必加渥焉甘肅提督孫思克久歴邊地熟諳機宜當秦省用兵之時素著勞績自任提督以來益殫謀猷實心幹濟惠愛洽於士卒威望讋乎外彝特霈殊恩用昭寵奬著加太子少保給一拜他喇布勒哈番以示朕展勲酬勞至意癸酉命原任郞中格什等仍留哨探侍衞阿南達等疏言今巴圖爾額爾克濟農既降諸事已畢請撤回郞中格什等得㫖本什偵探日久著回京命格什二郞保代彼駐扎偵探五月癸酉頒喀爾喀衆扎薩克印理藩院奏喀爾喀既與四十九旗同列應照四十九旗例給與印信請將土謝圖汗車臣汗及親王策旺扎卜三部落分爲三路土謝圖汗部落爲北路喀爾喀車臣汗部落爲東路喀爾喀親王策旺扎卜部落爲西路喀爾喀以土謝圖汗管北路中軍事扎薩克墨爾根濟農郡王顧祿什希管北路左翼中軍事扎薩克信順郡王善巴管北路右翼中軍事昆都倫博碩克圖郡王滾布管北路中左軍事扎薩克貝勒西第西里管北路中右軍事扎薩克公蘇泰伊爾登管北路中前軍事扎薩克公托多額爾徳尼管北路中後軍事扎薩克公汪舒克管北路左翼左軍事扎薩克台吉車木楚克納木扎爾管北路右翼左軍事扎薩克台吉丹津額爾徳尼管北路左翼右軍事扎薩克台吉班珠兒多爾濟管北路右翼右軍事扎薩克達爾漢台吉巴郞管北路左翼前軍事扎薩克台吉衞徴諾顏阿玉璽管北路右翼前軍事扎薩克台吉李塔爾管北路左翼後軍事扎薩克台吉薩木濟忒管北路右翼後軍事扎薩克台吉墨爾根帶靑車陵管北路左翼下軍事扎薩克台吉土巴管北路右翼下軍事以車臣汗管東路中軍事扎薩克額爾徳尼濟農郡王納木扎爾管東路左翼中軍事扎薩克額爾克貝勒車卜登管東路右翼中軍事扎薩克額爾徳尼濟農貝子布達扎卜管東路中左軍事扎薩克伊爾登濟農貝子彭蘇克管東路中右軍事扎薩克達賴濟農貝子阿南達管東路中前軍事扎薩克車臣濟農貝子車卜登管東路中後軍事扎薩克伊爾登濟農貝子達里管東路中下軍事管理洪郭爾帶靑旗務公憨都管東路左翼前軍事扎薩克額爾徳尼阿海台吉車林達什管東路左翼後軍事扎薩克額爾克台吉塞稜達什管東路右翼後軍事以親王䇿旺扎卜管西路中軍事扎薩克郡王色稜阿海管西路左翼左軍事扎薩克額爾徳尼濟農郡王彭楚克喇卜灘管西路右翼左軍事扎薩克察罕巴爾諾顏貝子博貝管西路右翼右軍事扎薩克台吉額爾徳尼哈灘巴圖爾滾占管西路左翼前軍事扎薩克車臣台吉吳爾占管西路右翼前軍事扎薩克墨爾根濟農台吉索諾木伊思扎卜管西路左翼後軍事扎薩克台吉額爾徳尼滾布管西路右翼後軍事俱各授之印信奏入得㫖土謝圖汗車臣汗暫停給印餘如議六月己丑命遷喀爾喀羅卜臧賽音台吉暫駐歸化城周圍地方先是上諭侍讀學士達虎曰聞羅卜臧賽音台吉在西寧欲來而不能來此乃歸降於我之人殊為可憫著交與所司理藩院議羅卜臧賽音台吉不能前來臣衙門差官二員乘驛而往將西海諸台吉所有羅卜臧賽音台吉子女人畜盡行收來使之完聚目前時序未宜令暫查明造册賫送如無食則支寧夏倉所貯之米每口給米五倉斗如無馬匹難以遷移則轉檄甘肅廵撫扣數給與馬匹酌量授地暫行安插目前交與寧夏總兵及地方官照料至來年草靑時應於何地安插另行請㫖命下之日臣衙門檄知甘肅廵撫寧夏總兵官可也隨遣内閣侍讀海三岱遷羅卜臧賽音台吉暫駐寧夏邊外至是理藩院奏據海三岱報稱羅卜臧賽音台吉已安插寧夏邊外每口給倉米五斗矣復稱羅卜臧賽音台吉牲畜已盡無力前來應臣衙門遣官一員將羅卜臧賽音台吉及其子女屬裔給驛自寧夏送至鄂爾多斯自鄂爾多斯驛送歸化城附近安插俟羅卜臧賽音台吉到日再議授職上從之癸卯免厄魯特台吉祁齊克等死令與巴圖爾額爾克濟農完聚提督孫思克疏言據總兵官潘育龍報稱台吉憨都既與巴圖爾額爾克濟農一同來降又與羅卜臧額林臣祁齊克等潛謀逃亡欲赴策旺阿喇布灘所已發官兵追𠞰之矣臣按憨都等蒙古狼子野心叛服靡常潛謀逃遁今官兵追至庫勒圖地方憨都雖遠遁已殺其部落四十餘人擒其男婦大小一百二十人獲其馬駝一百二十餘匹足以振國威而懲諸彝矣但祁齊克一人自稱台吉同謀逃遁理合正法至陣擒四十三人隨祁齊克之九人亦應正法然此輩俱係奴僕其主欲逃不得不從之而去罪雖當死情似可原應否寛宥及䝉古妻子應否解京處置所獲馬駝牛器械等物應否賞給有功官役謹奏以聞部議祁齊克宜正法宥其從人妻子解京其駝馬等物賞給有功將士奏入上寛祁齊克死免妻子解京令與巴圖爾額爾克濟農完聚餘如議七月壬戌筆帖式常壽等報伊拉古克三庫圖克圖逃遁先是伊拉古克三庫圖克圖請自察罕托會遷其父吳巴什及弟子往居宋拉布貝勒地方上不許令遷歸化城尋伊拉古克三以其父病故奏請安塟上立限期遣理藩院筆帖式常壽偕往遷其弟子至是常壽報云五月初八日同伊拉古克三至察罕托會地方問伊拉古克三曰爾弟子何日發往歸化城對云我以父殁奏上蒙給三月假來時須一月住時須一月歸時須一月今未及二十日行期如何可定至一月後復促其速遣諸弟子起行伊拉古克三曰今欲從鄂爾多斯而往則自此渡黃河必需十日行路需半月及渡歸化城黄河渡口又需三四日且既渡黄河鄂爾多斯之地又無水草故不便從鄂爾多斯而行我等若渡黄河岔則兩三日内可以畢渡沿黄河涯而去水草又佳一月内可抵歸化城我將率弟子於是月十二日起行常壽親視伊拉古克三及其弟子渡黄河岔畢謂之曰取我坐馬來與爾偕行伊拉古克三曰不便同往此路無蒙古部落雖有喀爾喀而無驛站我弟子亦無餘騎汝自從鄂爾多斯而往可也七月初十間當與我會於歸化城常壽再四索馬竟不之與又不便擅取馬於鄂爾多斯而與伊拉古克三偕行不得已來至鄂爾多斯六月二十六日到歸化城欲於七月初十日往迎伊拉古克三初九日有賫喀爾喀善巴王印文而來者乃伊拉古克三弟子吳巴什也據言伊拉古克三身率諸弟子北去我則逃囘常壽即赴善巴王所探其虚實又據王善巴報文云伊拉古克三奔走之人吳巴什六月二十九日來此隨已遣行外仍急遣章京多爾濟諭察罕托會之鄂爾多斯白蘇特喀喇城諾顏博貝等云此事果實爾等當隨踪往追如往投噶爾丹則我等當從古爾班賽罕往覓其踪吾身亦起行往追之矣理藩院據報入奏得㫖常壽著逮問伊拉古克三弟子及屬下人留之無益可令查其徒衆隨彼去踪遣之著大學士等會議具奏隨議筆帖式常壽乃特遣與伊拉古克三同往同來者也見彼屢次推辭不來之狀不即以情形報部目覩其渡河而自回歸化城應將常壽革去筆帖式交刑部從重議處至伊拉古克三皇上授以總領喇嘛班第之職豢養已深理宜効力圖報而竟逃歸大干法紀或逃往達賴喇嘛處或逃往西海處俱未可定應檄丼肅提督孫思克詳探如遇彼逃去即行拿解如或抗拒即行𠞰殺併西海諸台吉亦應遣文諭之至伊拉古克三既逃京城有從厄魯特攜來格隆五人班第五人平人四人㓜童二人婦女一人俱應隨彼去踪遣出境外再遣官一員往查歸化城中有從厄魯特攜來格隆班第平人亦照此例遣出境外伊拉古克三所收京城歸化城旗下人及喀爾喀人等爲格隆班第者俱交墨爾根綽爾濟安插寺廟平人各歸原主京城及歸化城中所有伊拉古克三家產牲畜什物入官交内務府上從之後筆帖式常壽擬絞監候己巳命喀爾喀格楚兒喀屯附於鑲黄䝉古旗下格楚兒喀屯以屬裔來歸上曰格楚兒喀屯既有屬裔佐領著居口外應附何旗安插兵部議奏隨議查上三旗遊牧地方察哈爾内鑲黄旗蒙古人丁缺額應將格楚兒喀屯及其兩孫並屬裔一佐領附於鑲黄䝉古旗下臣部遣官往遷俟到日交該旗安插至格楚兒喀屯屬裔有佐領官阿南達驍騎校扎木巴拉另戸䝉古壯丁八十六名家下䝉古壯丁四十三名應將一百二十九丁編為一佐領此佐領内已有舊管官員不必再設其䕶軍校前鋒䕶軍驍騎俱照察哈爾例補充上從之八月戊戌以江寧將軍博濟調補西安將軍時西安將軍馬拉病殁故有是命九月戊申提督孫思克奏報員外郞馬廸等爲噶爾丹屬下䝉古所害孫思克疏言欽差員外郞馬廸既至甘州言廸奉命往使於䇿旺阿拉卜灘如提鎭標下守備千把等官有願隨行者許廸攜之而往其兵丁亦令酌量帶去臣即與馬廸議撥臣標兵十名肅州鎭標及各路兵二十名臣與肅州總兵官潘育龍遊守千把等官共捐助每人馬各二匹駝各一頭并給食物其願隨行者有臣標中營守備高天福肅州總兵官標下右營千總馬惟恒撥隨馬廸出嘉峪關而去今據肅州總兵官潘育龍呈稱鄉導蒙古巴素隨馬廸前去今歸報云馬廸諸人行至哈密地方距城五六里許駐劄有噶爾丹屬下蒙古五百忽攘臂殺馬廸及筆帖式諸人盡劫馬駝行李而去執原任郞中格什守備高天福千總馬惟恒併受傷未受傷兵共二十四人到哈密城未知存亡據報以聞辛酉命遣兵備大同先是撥每佐領鎗手䕶軍各一名前鋒親軍䕶軍各十名漢軍火器營兵二千給與修整器械銀各十兩左翼撥都綂阿什坦宗室公華善䕶軍綂領噶爾馬副都綂噶爾璧碩代納親方格火器營撥都綂鄂倫代副都綂孫徵灝右翼撥都綂巴渾徳希福䕶軍綂領蘇丹副都綂鄂克濟哈趙山達寧阿龍什庫火器營撥都綂諾邁副都綂李林隆前鋒撥綂領碩鼐在京預備至是上諭大學士伊桑阿阿蘭泰等曰著將現備兵内每佐領撥䕶軍七名前鋒四百名火器營一半於十月下旬遣往大同養馬整備應遣大臣兵部奏聞除隨駕䕶軍一名及京城備兵之事亦著議奏議曰遣往大同預備之兵除前所撥預備兵内隨駕從圍每佐領下䕶軍一名所餘䕶軍七名俱令遣往每旗應遣䕶軍叅領五員每叅領下遣䕶軍校五員前鋒四百每旗或前鋒叅領或前鋒侍衞各一員前鋒校各三員火器營兵一千每翼或協領或叅領各二員每旗章京各三員驍騎校各三員此軍於十月下旬發行起行日期交欽天監選擇此軍係在口内養馬駐備其行糧草料交戸部照例給發至京城所備現剩前鋒四百名每佐領下撥親軍各一名鎗手䕶軍各一名驍騎各二名火器營一千名於此再増撥每佐領下䕶軍各二名預備此項増發䕶軍人等亦照賞銀十兩所備之礮及因礮所撥都綂副都綂官兵包衣官兵依舊預備既增發䕶軍各二名則每旗應增撥䕶軍叅領各一員每叅領下撥䕶軍校各二員所備大臣内應遣何人往備大同應撥何人預備京城伏候上裁得㫖著都綂希福阿什坦䕶軍綂領蘇丹副都綂噶爾璧鄂克濟哈趙山方格火器營都綂諾邁副都綂孫徵灝去以希福為將軍授之勅印以䕶軍綂領噶爾馬為前鋒綂領遣之前去留前鋒綂領碩鼐於預備軍中餘如議尋兵部以遣往大同兵所撥大臣内應以何人為叅贊奏請上命都綂諾邁䕶軍綂領噶爾馬蘇丹為叅贊乙丑命酌減備兵時噶爾丹遣使額爾徳尼綽爾濟等奉表請安入貢上諭大學士伊桑阿阿蘭泰等曰覽噶爾丹奏詞語恭順並無不軌之意詢諸來使亦無他故今備兵而無所用似乎徒勞士卒然噶爾丹非可信之人如不之備萬一有事又貽後悔應備與否爾等與議政諸臣會議具奏議噶爾丹斷乎不來然備兵不過略費錢糧並無所勞苦也如有警息自此出兵較自大同前行甚便且所備之兵俱已賞給銀兩此軍似仍預備大同爲宜至目下並無實音則京城前所預備之兵仍應預備後增撥䕶軍二名應請停止奏入得㫖遣備大同每佐領䕶軍七名内減去一名留於京城預備兵内後增撥䕶軍二名著停止戊辰勅諭噶爾丹及達賴喇嘛時噶爾丹疏言前爲折卜尊丹巴土謝圖汗之故陳奏三言乞以一言爲定初意即欲往請宏仁發回七旗於故土止因地方既遠糧騎不足且我未歸之前凡所留輜重俱被策旺阿喇卜灘劫去諸物無存今惟恃達賴喇嘛之恩得以安集謹將我從前遲久之處遣使陳奏請勅裁斷奏至賜噶爾丹達賴喇嘛勅勅諭噶爾丹曰朕撫馭天下惟欲率土無事各享安樂原不欲興戎耀武荼毒生民今爾疏稱爲折卜尊丹巴土謝圖汗之故上奏三言乞以一言爲定併請發回七旗於故土前者爾喀爾喀厄魯特交惡相攻朕念兩國皆奉貢之邦不忍坐視黎民塗炭遣使於達賴喇嘛令屢諭爾等和好爾不奉朕㫖及達賴喇嘛之言戕伐喀爾喀七旗喀爾喀人等紛紛離散各無衣食皆來歸朕求生然爾違朕之㫖朕並未嘗以介意乃爾復以追喀爾喀爲名深入我邊徼直至烏闌布通地方及發兵問故爾兵輒先攘臂我軍始與之戰爾大敗窘迫跪於威靈佛前誓不犯中華皇帝屬下喀爾喀以及衆民印文誓書現在且濟隆庫圖克圖亦在及伊拉古克三庫圖克圖往爾處爾頂禮達賴喇嘛所遺佛像而設誓曰我斷不違㫖矣前者深入邊境已自知罪佛在此而敢不以我罪爲罪乎聖上即佛天也乞姑宥我所奏亦甚明朕以爾言爲信遂止各路軍馬不使窮追此亦爾所灼知也喀爾喀人等窘迫來歸若不收養則皆至死地是以朕親出閱安插近邊給糧米畜產以活之今尚窮困未甦死亡殆盡或一旗僅存數人喀爾喀並無糧畜如遣回故土誰養之乎且喀爾喀人等肯明知饑餓而歸死乎前以養喀爾喀之故曾勅達賴喇嘛遣諭爾等達賴喇嘛亦甚喜奏言喀爾喀如此窮餓博施惠養與佛慈悲同行聞之不勝懽忭博碩克圖原當從濟隆之言而竟不從大君宜責而誅之乃俯憐衆生有如赤子復垂恩宥今以其疏發汝汝其視之若達賴喇嘛致書於爾或有異言爾亦陳奏可也前聞策旺喇卜灘與汝不睦流言未審虛實是以遣學士達虎等往問䇿旺喇卜灘請朕加恩故遣員外馬廸等往頒恩賜並不欲敗汝事而遣之也所差馬廸既爲爾之人所害勅書現在爾所爾視之自不謬也今嘉峪關報稱馬廸同行之人名巴素者歸告曰我等八月十一日行至哈密有厄魯特噶爾丹屬下圖克齊哈什哈哈爾海達顏額爾克兩人爲首率兵五百許奪去員外馬廸等馬駝行李戕害員外郞馬廸及筆帖式撥什庫等其他兵卒亦有被掠者亦有留於哈密者從來爭戰之國無害往來使人之理烏闌布通地方爾雖與我軍拒戰然前所遣使人察罕古英寨桑阿卜都賴額爾克寨桑等千有餘人俱遣大臣送出境外歸還於汝果宜加害則爾目下所遣使人朕即不許歸何不可乎爾前所奏言朕許以折卜尊丹巴土謝圖汗畀汝此小人欲自脫其身而有此言耳果有此㫖豈不早諭汝乎况執來降之人以畀讐人有是理乎前亦嘗以此諭汝矣今爾背棄誓言索我降人喀爾喀害我奉差策旺喇卜灘之使臣馬廸諸人以此觀之是爾陽奉達賴喇嘛之言而陰違達賴喇嘛之命全棄誓言生事起釁彰彰明矣達賴喇嘛曾令汝犯我使臣索我降人乎况喀爾喀人等朕已養之數年方且俟其生聚將擇可居之地安插之爾如此背誓生事本應不納爾使逐之歸去但念爾使皆係小人必至困迫是以放入仍使貢獻市易今將爾背誓及爾人害我使臣之事詳開勅中發爾使沙哈孫巴克綽爾般下賫往其餘俟市易畢遣歸其即查明害我使臣之事及汝欲陳之言具疏與現在覊留之人一併奏遣朕當熟籌一策焉以上情事已頒諭達賴喇嘛矣勅諭達賴喇嘛曰朕奉承天命綂馭萬邦惟以人民得所爲至願是以率土有邦無不恪恭來享亦無不遵朕詔㫖爾喇嘛領奉佛法濟度衆生西域蒙古亦尊奉爾喇嘛之敎朕與爾道法本一心志亦同是以喀爾喀厄魯特之事朕多與爾喇嘛商畫前聞厄魯特喀爾喀交惡相攻朕遣使於爾喇嘛欲與汝共息其爭使相和好爾即欣然發使同往噶爾丹所不啻三四矣噶爾丹竟不遵我諭和之㫖而破喀爾喀以致喀爾喀竆極流亡無衣無食匍匐歸朕以求活然朕猶未嘗因拒命之故有惡於噶爾丹其後噶爾丹復借追喀爾喀爲名深入我邊境直至烏闌布通及發兵問故噶爾丹兵又先犯我顏行我軍始與之戰噶爾丹大敗不得已跪誓於威靈佛前謂永不犯中華皇帝屬下喀爾喀以及衆民誓書印文具在見証濟隆庫圖克圖亦在迨伊拉古克三庫圖克圖前往噶爾丹頂禮爾喇嘛所遺佛像而誓曰我斷不復違㫖矣深入邊界實我之罪佛在此敢不自服乎聖上即佛天也乞終宥我所奏甚明朕以噶爾丹誓言爲信止各路軍馬不使竆追此亦噶爾丹之所明知也以勅諭爾喇嘛不啻數次矣喀爾喀人等困極來歸若不收養則皆死亡是以朕親出閱安插近邊給糧畜以養之今尚竆困未甦僅有七旗之名死亡殆盡有一旗僅存數人者喀爾喀並無騎無糧倘遣歸故土其誰養之豈有明知饑餓而肯就死地者乎前以賑濟喀爾喀之故曾勅諭爾喇嘛亦遣諭噶爾丹爾喇嘛亦甚喜言喀爾喀如彼竆餓全而活之眞佛之慈悲也聞之不勝懽忭博碩克圖原應從濟隆之言而竟不從大君宜責而誅之乃俯恤衆生有如赤子仍加恩宥汝奏尚在今噶爾丹違棄誓言云爲折卜尊丹巴土謝圖汗之故上奏三言乞以一言爲定發回七旗於故土又前聞策旺喇卜灘與噶爾丹不睦流傳之言未審虛實故遣學士達虎等往問其故策旺喇卜灘請朕加恩勿絶乃遣員外馬廸等往頒恩賜並非欲敗噶爾丹之事也今嘉峪關報有員外郞馬廸同行之人名巴素者歸告曰我等八月十一日至哈密有厄魯特噶爾丹屬下圖克齊哈什哈哈爾海達顏額爾克兩人爲首率兵五百許奪員外郞馬廸之馬駝行李器械戕害員外郞馬廸及筆帖式撥什庫等其他人等亦有被擒者亦有留於哈密者從來戰爭之國無害往來使人之理烏闌布通地方噶爾丹雖與我軍拒戰而噶爾丹所遣使人察罕古英寨桑阿卜都賴額爾克寨桑等千有餘人俱命大臣送之出境遣歸噶爾丹且喀爾喀人等朕方欲養之數年待其生聚擇可居之地安插之噶爾丹背棄誓言奏索我措置已畢之折卜尊丹巴土謝圖汗又將遣往䇿旺喇卜灘之使臣戕害以此觀之誠反覆奸頑之徒也已將彼罪備開勅内付其貢使賫往令彼覆奏噶爾丹陽奉爾言肆爲欺罔陰則不從爾言不奉爾教生事妄行彰彰明甚不知爾意以爲何如今以噶爾丹生事朕秣馬勵兵治具已畢俟噶爾丹回奏以决一䇿特以此故命伊什格隆賫勅諭汝知之十月辛卯諭大同暫停備兵上諭大學士伊桑阿等曰近欲發兵備大同但天時寒冷若竟無事則士卒徒勞倘不加預備萬一有警又恐不及朕意欲暫停發兵至大同以現在京城餧養之馬駝驅往大同飼秣如有當行之事立發京城所備之兵星馳而往即乘所飼之馬似於事無悞爾等可集議具奏隨議奏言上諭極當應暫停發兵往備大同查大同現有積貯之糧請以每佐領所餧駱駝一頭馬六匹再增馬四匹共得一萬二千有餘但在大同一處牧養恐不能容查宣府亦有米糧應將馬駝分五旗於大同分三旗於宣府交直撫晉撫撥賢能道府分附近州縣餧養勿致瘉斃如豆不足以米代之其解送此馬駝者每佐領下派撥什庫驍騎每叅領下派章京每旗派叅領按旗起程解往更撥戸兵兩部司官將馬駝面交地方官餧養此馬駝於途中每站支空草一束餧之凢餧此馬駝者照京城餧養之法自初餧日起每馬駝給料八倉升草七觔兩月滿後減二升再餧一月後又減二升至來年三月再奏請㫖奏入上是其議著將每佐領現養駱駝一頭馬六匹發往宣府大同餧養所增馬四匹令於京城餧養暫停發兵往備大同乙未命罷備巴圖爾額爾克濟農之兵先是以備巴圖爾額爾克濟農之故撥鄂爾多斯六旗吳喇忒三旗喀爾喀七旗共四千五百名兵各在本地預備至是理藩院奏言今巴圖爾額爾克濟農業已歸誠向所備兵伏乞罷之上曰可罷備兵令吉爾他布等遠展哨汛以探聲息十一月丁卯發勅諭噶爾丹時噶爾丹之使額爾徳尼綽爾濟色卜登額爾克白等挾噶爾丹書劄散布内屬蒙古上聞之乃發勅諭噶爾丹勅曰朕綂御萬邦惟願天下之民共享昇平無生事無作亂兼容并包誠心撫恤殘刻之事素所不爲諸國遠人誠能恭順職貢不改其常朕益加愛惜施恩不絶若陽奉陰違狡詐百出者朕未嘗不知亦不究竟每從寛敎戒冀其改悔自新是以中外之人無不歸誠向化雖極隱密之事必來奏聞無敢欺蔽今爾所遣奉貢使人持爾書來與朕屬下蒙古告以爾語皆以奏聞於朕朕盡知之矣此等譎詐祗自欺取禍而已何能欺人且朕屬下蒙古皆世受豢養厚恩豈能負朕而墮汝計乎據爾書云爲宗喀巴之法而行朕不得不將䕶持宗喀巴之法爲之宣布本朝龍興之際與達賴喇嘛道一風同延召達賴喇嘛至京此天下之所共知也康熙八年達賴喇嘛疏稱前蒙皇上惠賜臣勅印仗一綂大君之仁慈平治土伯特國三部落而紅帽帕克木取兩族之人而去請將伊等還歸於噶爾馬朕即降㫖特遣官取紅帽帕克木發還康熙十三年達賴喇嘛疏稱巴忒馬三寶瓦巴克什之經請勅諭中國僧俗勿得誦習朕即降勅禁止僧俗概不許誦習康熙十八年達賴喇嘛疏稱自聖主三朝以來道一風同謹將平治漢人土伯特蒙古之要略奏請睿覽其奏尚在累代以來宗喀巴之法達賴喇嘛之敎與朕相符是以朕此地所行皆宗喀巴之法達賴喇嘛之敎喇嘛班第所服皆黄帽所誦皆達賴喇嘛之經朕之敬禮若是爾喀爾喀厄魯特未必如朕之敬禮宗喀巴之法與達賴喇嘛之敎也且達賴喇嘛洞見朕䕶持宗喀巴黄帽之法而深相信服故凡事直陳無隱朕亦以蒙古諸事與之共决厯年通使不絶於此可以知朕與達賴喇嘛道法合一久矣爾喀爾喀厄魯特之人陽則誑言爲宗喀巴之法達賴喇嘛之敎而行陰則違之率土皆知爾前者敗於烏闌布通之時爾屬下人皆驚懼而謗汝俱請降朕朕素無離間害人之意是以准爾誓書訓爾等以依常安處勿懷異心此伊拉古克三庫圖克圖所深知也至於䇿旺喇卜灘雖聞與汝不協朕但恤其貧苦加之以恩而已未有使與汝惡之意此皆至實之情朕思爾斷無此等譎詐之事必爾下人及爾使人欺爾而離間之耳然若軰如此行事豈使汝善全之意乎爾當熟計之朕凡有所聞見即與宣說向無隱諱特開始末降勅諭爾知之此勅交與來使賫往戊辰烏喇佐領畢立克圖以噶爾丹使人所授書出首先是噶爾丹於烏闌布通之地爲我軍所擊走内大臣蘇爾達與土謝圖親王沙津達爾漢親王班第等共商遣阿喇善下人俄齊爾等令止噶爾丹於是衆皆疑科爾沁以爲已附噶爾丹矣將軍薩卜素傳郭爾羅斯吳爾圖納蘇圖台吉之言亦疑科爾沁密奏其有異心上以科爾沁臣服已久斷無此意略不之疑至是烏喇佐領畢立克圖往厄魯特館中遇噶爾丹使人濟爾哈郞格隆見之問爾爲誰畢立克圖曰吾乃科爾沁台吉濟爾哈郞格隆又問曰爾識土謝圖王否畢立克圖曰我係土謝圖王親信之人濟爾哈郞格隆遂延畢立克圖入其廬飲之酒使誓於佛前出書一封授之令致土謝圖王復贈畢立克圖貂皮一張猩猩氊一件畢立克圖以其事密首上取其書留中不令宣露甲戌授提督孫思克振武將軍時孫思克以軍政自陳上曰孫思克自簡用提督以來克副委任和輯兵民殫心籌畫久鎭巖疆勞績懋著深爲可嘉著加授將軍彈壓地方以示朕奬勵勞臣之意尋授振武將軍十二月壬寅發官兵駐防右衞上以西北有警前命戸部尚書馬齊兵部尚書索諾和往勘歸化城駐兵之地至是馬齊等奏言臣等往歸化城時恭請訓㫖奉命將内外地方加意詳勘臣等欽遵至大同見所屬右衞地方離殺虎口十七里殺虎口離歸化城一百八十里右衞與歸化城相近移右衞人民出城外令住郭内城中葢造房屋可以駐兵口外迤北五十里東西五十里内所有熟荒地畝近者給兵遠者給大臣官員歸化城小地荒田鹵難以耕種歸化城西南三十四里外則爲渾津村村南十里外有渾津巴兒哈孫舊城基址城北有大土爾根河向西而流四圍三里餘宜展此城將北面從河邊向南二十丈爲城北址一面三里築土爲城造房駐劄官兵城之四圍所有田地可取以給官兵耕種奏入命議政諸臣議議曰歸化城之渾津巴兒哈孫無城右衞現有城且近歸化城大宜駐兵其往駐時應撥每佐領䕶軍三名驍騎三名漢軍火器營兵一千駐劄撥發時有父子兄弟爲親軍前鋒情願往駐者則令本佐領内䕶軍驍騎更代遣往綂以將軍一員每翼䕶軍綂領各一員滿洲副都綂各一員漢軍副都綂各一員每旗協領各一員佐領各七員拖沙喇哈番等官各七員驍騎校各七員其協領以實授叅領遣往䕶軍每旗以實授䕶軍叅領各四員䕶軍校各七員漢軍一千名以每翼協領各一員每旗佐領各二員拖沙喇哈番等官各二員驍騎校各二員令其約束每佐領撥撥什庫六名䕶軍撥什庫驍騎仍照京城例給以錢糧駐兵既發之後按缺補足其喀爾喀阿爾薩闌帶青等人丁共二千八百九十七名三丁合披一甲可得甲九百六十五名以五十名爲一佐領共計編成十九佐領蒿齊忒郡王達爾馬吉里第旗下兵丁四百六十一名亦以三丁合披一甲共甲一百五十四名編爲三佐領所餘人丁作爲附丁此所編佐領中選擇材幹善於約束之台吉頭目授以佐領驍騎校附歸化城土黙特兩旗在歸化城四圍遊牧再撥綠旗馬兵一千歩兵二千駐劄設總兵官一員標下立爲五營每營設遊擊一員守備一員千總二員把總四員其總兵官候上簡授遊擊以下官員聽總兵官選品缺相當者具奏兵丁於本地召募此綠旗兵駐劄之地衙署房屋器械糧餉草料等項俟滿兵往駐之日再議如有事當行此新設總兵官及宣大兩鎭標下官兵俱聽將軍調遣將軍以下佐領以上大小官員口糧及馬之草料一槩停給以口外五十里以内荒地給之自力開墾至䕶軍校驍騎校及兵丁俱給以田或僕從鮮少難以力耕則䕶軍校驍騎校兵丁停給給以口糧草料夏秋停給草料令在口外牧放至所給拖沙喇哈番等官之田撥遣大臣官員至殺虎口外開墾耕種右衞城内所有民房俱給價購買安插官兵其房屋不足令該撫擇賢能官於城内照數增造給之所需錢糧俱動支正項造房工畢再發官兵往駐奏入上曰城内居民若令移於郭外必致困苦可勿令遷移照常居住若造官兵房屋城内難容即於城外建造此軍有事即行不必授田大臣官員亦宜給與口糧馬給草料若動支錢糧建造官兵房屋必致累民亦不得速竣應照湖灘河朔運米例捐造著再議隨議此項駐劄官兵應給以口糧及馬匹冬春二季草料夏秋停給草料令其牧放其口糧草料一半折給一半本色但大同府一年所徵本色米撥給本地綠旗兵所餘無幾應停徵地丁銀改徵本色米豆草束以給官兵一半之本色官兵所住房屋間數應視荆州例給之城内民居不必遷移官兵住房城内不敷則於城外建造綠旗官兵住房亦令建造此項建造房屋俱令捐助餘如前議上曰右衞駐劄滿兵原爲遇有機會即時遣發故滿兵務使勢力有餘至於綠旗官兵遇調用則宣大綠旗兵在近調發甚便停其添設其缺以滿洲官兵增駐可也所發䕶軍之缺應即補足代充驍騎火器營兵之缺應行停止官兵住房止交捐助者葢造斷不堅固宜仍撥往駐大臣官員監修仍著覆議議應停增設綠旗官兵其缺於前發每佐領䕶軍三名再增䕶軍三名驍騎三名再增驍騎一名計每佐領兵爲十名使之往駐其䕶軍每旗發實授䕶軍叅領七員内以一員爲夸蘭大設䕶軍校十四員以領之駐兵既撥之後其䕶軍之缺補足驍騎火器營兵之缺不必補足造房之時撥工部堂官一員駐防大臣内每翼一員每旗䕶軍叅領一員滿洲蒙古章京各一員每翼漢軍章京各一員監造得㫖每佐領減去䕶軍一名驍騎一名餘如議隨授都綂希福爲建威將軍噶爾馬爲左翼䕶軍綂領四格爲右翼䕶軍綂領方格爲左翼副都綂馬七爲右翼副都綂張素義爲左翼漢軍副都綂吳興祚爲右翼漢軍副都綂令駐右衞甲辰以羣疑科爾沁密奏情事開誠面諭時各部落諸王台吉以元旦來朝上召集科爾沁諸王台吉諭土謝圖親王沙津等曰昔烏闌布通之役内大臣蘇爾達及爾等共商遣爾屬下人俄齊爾等於噶爾丹衆皆疑爾等已附噶爾丹矣將軍薩卜素等亦皆疑之曾密奏以爲爾等有異心後又有烏喇佐領畢立克圖以噶爾丹遺爾等之書密首朕思爾科爾沁自太祖太宗時歸附世世職貢相爲婣親歴有年所爾等斷無此意朕略無所疑果有可疑亦不如是顯然宣諭爾等矣明諭之頃沙津免冠叩首奏曰衆皆疑我科爾沁有異心既有密奏而畢立克圖又舉首噶爾丹之書蒙皇上仁恕略不疑我科爾沁反顯然明諭臣亦何所措詞但效死以圖報聖恩之高厚而已且内大臣蘇爾達原欲差臣之人於噶爾丹臣不之從蘇爾達遂與達爾漢親王班第及臣公同商議差阿喇善之人俄齊爾臣等世蒙聖上寵遇優隆臣等豈有萌此意之理其科爾沁衆台吉亦皆歡忭叩首奏曰謂科爾沁俱附噶爾丹則臣等亦皆在其中矣若非聖上洞鑒此情則臣等寃抑何能自白臣等實無此意聖祖仁皇帝親征平定朔漠方略卷十二

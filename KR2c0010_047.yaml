  text: 欽定四庫全書祖仁皇帝親征平定朔漠方略卷四十七
  hash: sha256:b507b41bfc8dd0b8a0965f060617bfe69b3ffb11c8dbc98082efe16deb29f4ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0010_WYG_047-1a, image: WYG0355/WYG0355-0635a.png}
body:
  text: 十一月甲申命議叙督運諸臣時吏部請議中路西路督運于成龍王國昌等罪上曰于成龍王國昌李鈵喀拜辛保范承烈喻成龍此役俱有效力之處從寬免議罪仍著議叙於是于成龍等七人入謝恩奏曰臣等庸劣無能轉輸多誤自分莫逃罪譴敢云有禆軍需乃皇上功邁古今量同天地生全曲賜議叙重加凡此格外殊施真屬從來異數拜恩踴躍陳謝悚惶具奏尋兵部奏曰中路西路寧夏三路軍糧得以運到者皆皇上神謨內斷指示周詳克奏大勳運米官員有何勞勩但皇上念此輩效力特霈恩綸許其議叙則總河于成龍安徽巡撫李鈵甘肅巡撫喀拜山東巡撫王國昌督捕侍郎喻成龍刑部侍郎辛保內閣侍讀學士范承烈等俱係總督運務大臣應加四級至三路運米墊道官員內專管一事者亦有之兼理兩事者亦有之效力一次者亦有之效力兩次者亦有之身往效力又捐助駝馬車輛者亦有之伊等效力多寡不同而所到之地又有逺近不便一概議叙應將中西兩路運米墊道官員分為四等議叙寧夏運米官員分為兩等議叙至扈從御營官員所到地方亦與運米人等一例議叙運米而又墊道者兼理兩事應視其所到地方加一等議叙效力兩次者一次視其所到極逺驛站議叙外其一次不論所居何項俱加一等議叙監押三路銀米緞茶車輛及牧馬守米人員雖非專管運米者但彼親身既經效力亦應視其所到地方議叙運米墊道官員內有急公捐助車騎者視其所捐數目議叙至噶禮在衆人未到之初運米先到奉㫖准先升用應將噶禮一同先到之人雖在二等亦俱以一等議叙原任巡撫布顔努原任副都統色赫布政使劉暟贊善宋大業鳴贊薩克蘇俱奉㫖記名之官其內在二等者亦俱以一等議叙將伊等議叙時各視所到地方分等一等者扈從御營阿達哈哈番柏天祐等八人中路第三十站至第三十九站專管運米廬鳳道佟育秀守備盛天祉等五十一人中路第二十三站至第二十七站運米而又墊道正黃旗佐領李樹德河南學道張仕可饒州府同知李育德等四十人西路第三十站至四十八站運米御史勒貝員外郭瑮等二十八人自寧夏運米至郭多里巴爾哈孫等地方者運到參領郭朝楨佐領于起鳳等二十二人以上一等人員內現任官以應升之缺即用其大寮無應升即用之缺應加四級其候缺考職者缺出即用功加外推者以守禦所千總用革職降級者復原官原級效力閒散人員授五品頂帶榮身二等者扈從御營通政司左參議鮑復盛等六人中路自第二十五站至二十九站專管運米御史顧素郎中甘文炳等四十一人中路自第十六站至第二十二站運米而又墊道阿達哈哈番于永裕等四十人自寧夏運至船站阿達哈哈番吳㑹督捕司務德明等二十三人以上二等人員內現任官加三級候缺考職者補官之日加三級功加外推者以衛千總用革職效力人員給六品官頂帶榮身三等者扈從御營鑾儀衛治儀正張國勳等三人中路第十六站至第二十四站專運濟東道朱士傑開封府知府張國卿等四十六人中路自第八站至第十五站運米而乂墊道東昌府知府侯居廣安慶副將韓世臣候缺同知李梅等七十二人西路第十六站至第二十三站運米御史色德禮等十八人以上三等人員內現任官加二級候缺考職者補官之日加二級罷職隨旗上朝者亦加二級功加外推者以營千總用革職效勞人員給七品官頂帶榮身四等者扈從御營直𨽻巡撫標下干總李進等二人中路自第八站至第十五站專運博興縣知縣陳之琦等十八人中路六站至七站運米而又墊道守備張龍貴等五十四人西路第十三站至第十五站運米員外桑格等四十二人以上四等人員內現任官加一級候缺考職者補官之日各加一級功加外委者以營把總用生員准入監革職效勞者給八品官頂帶榮身至中西寧夏三路專管墊路押護米車守米牧馬員外王登魁佐領吳汝翼逰擊郭榮副將劉官統張文煥及候缺革職功加外委人員貢生監生生員兵夫工匠閒散人等人各不同效力亦異或加級或紀功或以營千總把總用或給頂帶榮身請逐項詳盡不遺纖悉至應議叙官員內捐助馬騾二匹者紀録一次八匹者加一級駱駝一頭作馬二匹或車八輛作牛四頭或羊四十羫作馬一匹有多捐者照所捐數目議叙如此各隨勞勩議叙則凡效力急公官員無不䝉皇上浩蕩之恩矣奏入上曰運米機宜雖朕所指揮但于成龍率先效力數次著加四級仍授一拜他喇布勒哈番色黑著還其副都統之職布顔努以侍郎用餘如所議丙戌命吳巴為一等台吉管部長事理藩院奏言喀爾喀部長一等台吉默爾根帶青車陵病故其缺應補據其次子噶爾馬扎卜呈稱我父遺言使我繼襲曾語默爾根濟農王顧祿什希公蘇泰伊爾登以此兩部長為證其長子吳巴呈稱我父病後使我管旗務給我祖遺佛像銀盆為據出征噶爾丹時我曾領兵前往我父病篤我母及弟瞞父而致書於蘇泰公使之為證查王貝勒公台吉部長俱長子承襲應將車陵部長一等台吉使吳巴承襲上從之己丑使甘州駐防官兵歸西安大學士伊桑阿等為西安滿兵一千原留將軍孫思克軍前駐防甘州請暫戍蘭州上曰今邊境無事西安滿洲官兵留戍甘州者著復歸西安戊戌命以什喇卜額爾克叛裔即賞給捕獲之台吉博羅烏納罕等理藩院奏曰前台吉什喇卜額爾克妻呈稱憨都叛逃時帶我屬裔三隊而去王彭蘇克納木占公車卜登等共分之乞皇上收取此項屬裔給還於我臣部遣員外博羅叩往徙之今博羅叩覆稱查什喇卜額爾克屬裔貝子阿南達旗下有羅卜臧陶賴等十三户公車卜登有班達爾沙阿思希卜等八户王納木扎兒有班扎爾等十三户烏拉哈達地方有色稜等二户趂食遷伊等人户及什喇卜額爾克之妻同居顧祿二户共三十八户五十七丁一百五十五口交正白旗游牧章京多爾濟扎卜其納木扎兒王旗下台吉巴哈阿海彭蘇克王旗下台吉博羅羅卜臧額爾德尼阿海博思烘綽罕俱在克魯倫河外古爾班地方王彭蘇克帶我往古爾班之薩喇什保台地方覓之不見已經徙去王彭蘇克言雪大天寒不知去向難以尋覓請從此歸我差人緝獲再報查王納木扎兒遣人於博羅烏納罕而博羅烏納罕已徙至俄儂羅卜臧額爾德尼阿海等言憨都逃去時王彭蘇克差人令我等追𠞰我等即率兵往追及之於俄儂之地與戰收其屬裔俟我等往請上安候㫖再給今問王彭蘇克言憨都逃去時我差護衛穆扎噶爾於博羅烏納罕博羅烏納罕羅卜臧額爾德尼阿海巴哈阿海綽哈博思烘等領兵至俄儂地方追及憨都與戰而擒之此雖什喇卜額爾克屬裔俱欲叛歸噶爾丹偕憨都逃出與我等交戰之人應給何人一唯上裁查博羅烏納罕等所有什喇卜額爾克屬裔皆與憨都同叛往投噶爾丹博羅烏納罕等率兵追戰擒回之人不得與尋常離散者比應將此屬裔俱給原捕台吉博羅烏納罕羅卜臧額爾德尼阿海巴哈阿海綽哈博思烘等上從之己亥王布特達阿卜迪遣使進貢理藩院奏言王布特達阿卜迪疏言致心合掌長跪謹奏至聖皇帝陛下敕書及賜幣六端主事保住薩哈連等賫到不勝歡忭第五代達賴喇嘛躬詣上邦以來敬奉主上有裨道法臣亦竭力自效於天朝去嵗嚴㫖下頒臣殊為憂慮今欽差保住來宣皇上溫綸臣又無任踴躍䝉如此慰安大惠誠無時不銘刻於心也此王布特達阿卜迪感戴恩賜覆奏之意無庸議又疏言噶爾丹作亂骸骨皆至聖明之前從此禍亂之本除矣神威如天鼓之聲震驚宇內逢此大凱特進織字手帕喇嘛宗喀巴像巴咱爾班達喇納佛像邁達禮佛像上獻之後伏乞天開淨目為之照鑒此王布特達阿卜迪因滅噶爾丹而除亂源獻手帕一幅佛像三身無庸議又疏言䇿旺拉卜灘自以所居地方近噶爾丹將來恐致興戎是以舉兵博碩克圖處逃人來言噶爾丹力已衰弱是以退兵達爾漢額木齊往能止兵與否上乘普慧必能鑒察至策旺拉卜灘托爾古特等所行是非總祈聖明息怒垂鑒此王布特達阿卜迪以策旺拉卜灘恐噶爾丹來侵備兵之故具奏無庸議又疏言去嵗青海各將徴稅人家放火焚燒之事皆數台吉所為聖明必有所不悅矣噶爾丹之來否未實青海衆人共商屢差善巴陵堪布約噶爾旦多爾濟㑹盟於喀木巴爾喀木國小有動兵之事乞聖明息怒垂鑒此王布特達阿卜迪以青海諸台吉為噶爾丹來侵而㑹盟遂征喀木巴爾喀木國之故具奏無庸議又疏言欽差保住言上命我見第六世達賴喇嘛但達賴喇嘛之身尚在坐禪奉達賴喇嘛法㫖一概參見之事俱於九月後出定之時故衆人放參之事在十月二十五日去嵗曾經啓奏為諦穆庫圖克圖事䝉諭保住賞以手帕一條整縀二端當使哈灘巴圖爾仰體皇上諭㫖竭力謹遵斷不敢二特奏此王布特達阿卜迪以達賴喇嘛於九月後為出定之時賞諦穆庫圖克圖緞匹遣發哈灘巴圖爾等事具奏無庸議又疏言濟隆庫圖克圖尚未遣行故不及諭諦穆庫圖克圖其賜物當於去時給之與張家庫圖克圖一同遣發陸續遣發之意俱在欽差口奏無庸議又疏言畫匠雕刻匠遣二人前去如有不㑹不能不如意則發回應將畫匠雕刻匠二人暫留此地不用之時交後來使人發回又疏言濟隆庫圖克圖以所居甚逺而聖㫖又甚重是以惶懼托言身病已極日久伏乞大加慈憫勿及其身命此王布特達阿卜迪已於四月內奏明津巴扎木素等帶濟隆庫圖克圖前去亦無庸議又疏言班禪庫必兒漢之去未奉諭㫖應俟班禪庫必兒漢來王布特達阿卜迪奏聞時再議又疏言博碩克圖濟農之子所娶阿奴之女其原由已經奏明噶爾丹已死其國民人俱已歸降皇上僅此一女伏乞寬宥但噶爾丹抗拒皇上為我師所敗凶逆賊冦情罪重大其女斷不可留於青海務令解來已經差主事保住賫敕前去矣今博碩克圖濟農若擕噶爾丹之女而來請上安奏求寬宥則皇上矜恕或可寬宥噶爾丹之女而博碩克圖濟農不親來請上安籲奏反求王布特達阿卜迪代奏則噶爾丹之女不得留於青海務令解來臣部備文交目下王布特達阿卜迪來使發去上從之後帶青和碩齊察罕丹津言其弟車陳帶青金塔爾之妻乃噶爾丹之女皇上屢諭第巴令遣發噶爾丹之女第巴屢經奏請未䝉皇上矜許但聖主憐憫衆生殊眷顧實汗之子姓乞以臣弟車陳帶青金塔爾之妻布木仍給配臣弟具呈到部為之轉奏上曰諭帶青和碩齊金塔爾之妻布木免其解送癸卯青海台吉扎西巴圖爾等來朝上御保和殿理藩院引青海扎西巴圖爾台吉圖謝土代青納木扎爾額爾德尼台吉阿七滾布之子彭楚克台吉等至殿前行三跪九叩頭禮畢喇嘛商南多爾濟又引近御座前叩見上顧扎西巴圖爾等曰台吉爾父顧實汗自太宗皇帝至今歷來進貢輸誠已久今至爾身往來不絶朕至寧夏時遣喇嘛商南多爾濟并大臣至爾處令爾等來覲爾等即遵朕㫖欲來陛見殊屬可嘉朕若即於寧夏候爾等來恐天氣炎熱爾等未便故云俟秋凉時令爾等來朝爾已年高逺涉至此可行抱見禮扎西巴圖爾台吉膝行至前躬捧御膝又以雙手捧御手加額奏曰臣係邊塞山谷草莾小人䝉皇上念臣祖父命臣前來陛見臣竊歡忭而來見聖駕臣身並無纖毫為皇上效力之處皇上如此恩榮眷顧不勝欣躍竊懼臣福薄安能受皇上如此洪恩異數此後惟思所以報皇上豢養之德耳上曰朕並非威攝爾等前來念向日道法合一所行和好故令爾等前來爾即能應命朕甚喜悅不但爾等即四十九旗部落七旗之喀爾喀小台吉等朕俱以客禮待之上又曰朕巡行寧夏令爾等來朝之意不過欲令天下生靈各得其所乃朕本懷朕何物不備且朕之尊不在爾等來否朕所望於爾等者此後務體朕心各遂安全庶克副朕好生之至意耳扎西巴圖爾奏曰聖諭誠然非臣等微末小人意見所能及真降生聖帝以治斯世既致衆生於升平復宣佛法之幽祕經典之深微無不備悉臣等微末小人向未知皇上聖明如此嗣後臣及子孫惟有圖報皇上隆恩於萬一耳商南多爾濟引至坐次叩頭謝坐訖排宴奏樂上曰台吉爾已年老放心飽食若不食朕亦不悅扎西巴圖爾奏曰臣今日獲覲至聖皇帝不勝歡忭然亦不意皇上如此寵遇既䝉如此寵遇敢不飽食上曰噶爾丹朕亦未嘗先加征討因彼屢侵邊境邊民不安朕方征討朕性從不以威武臨人扎西巴圖爾奏曰皇上神聖𠞰滅噶爾丹天下生靈皆得安業臣等久聞皇上神武仁德欣慶靡既今臣等䝉皇上洪恩得以共享升平因合掌頓首上命扎西巴圖爾升陛近御座前即於跪處親賜酒又召納木扎爾額爾德尼彭楚克親賜酒俱跪受而起退至陛側叩頭飲訖其彭楚克喇布灘等台吉十七人俱召升陛令侍衛賜酒其在殿外列坐寨桑等俱召入殿令侍衛賜酒畢上回宫尋商南多爾濟自大內捧賞賜物件出以上用帽一頂素珠一串貂鼠蠎裘一件補褂一件黃帶一條白金五百兩賜扎西巴圖爾傳諭曰爾等自祖父以來世奉職貢其來已久故此番加意優錫以寵爾歸所賜者無非進見之儀耳此銀五百兩可暫為爾在京日用之費又以上用帽袍褂帶白金二百兩賜納木扎爾額爾德尼彭楚克其餘台吉等俱賜白金五十兩又諭曰此外仍造衣賜給爾等扎西巴圖爾台吉等奏曰臣等邊土螻蟻䝉皇上寵命厚賜不勝歡忭弗獲措詞如此厚恩隆賜固有生以來所未覩即夢寐亦未之及皇上厚恩何以仰報臣等惟日夜向佛天仰祝皇上萬夀無疆耳奏訖因率衆叩首謝恩十二月己酉命叙翁金擊賊官兵功為第二等先是西安副都統祖良璧奏言翁金地方遇賊夷來劫輜重即飭官兵排列炮鎗執長鎗木棍殺入自卯至己放鳥鎗三四十回發矢十餘枝賊夷大敗向西北而走即督滿漢官兵同參將張憲載率緑旗官兵追殺二十餘里上命在事有功官兵著分别議叙具奏至是部議應叙為四等軍功上從優改為二等辛亥命議都統公彭春等不收回遺兵罪兵部奏言都統公彭春原任都統拖沙喇哈番伊勒愼不撥將領全收馬疲步行人等帶回僅交於護軍校祁祿致彭春本隊護軍驍騎桑格等十八人並無踪影殊為不合查定例內凡攻城野戰不携出陳亡將卒遺骸分戰督戰大將俱罰俸一年應將都統公彭春拖沙喇哈番伊勒愼比照此例各罰俸一年但彭春伊勒愼於昭木多之戰擊敗敵人應免罰俸一年不准論功鑲白旗桑格佐領下署護軍校馬爾泰俱係特留為首領收回馬疲步行人等之人乃不將交付伊等之護軍收在一處而行縱之使前零星留落致無踪影殊為不合本當照護軍校驍騎校不舉出遺骸之例治罪但係護軍應鞭責八十查馬爾泰有昭木多之戰功應免責不准論功得㫖依議桑格等俱從軍效力之人因諸將率領者不善死而失尸殊為可矜伊等照陳亡例給之身價癸丑命叙二等侍衛達魯肯等軍功為上上等兵部奏言鑲黃旗二等侍衛達魯肯三等侍衛濟魯喀博富齊卓爾叨費揚固博以和步軍校查布正黃旗二等侍衛倪喇凱三等侍衛穆克什塔徽張阿察木巴特哈正白旗二等侍衛森特黑袁謙藍翎侍衛鄂叩坤都倫法兒吉護軍校鄂諾分侍講禪布郎中桑格員外羅米近侍護軍校劉八十等俱以擊敗對陳敵人軍功牌呈部查達魯肯等乃特遣至大將軍軍前出戰之侍衛大將軍既稱伊等俱在纛前擊敗對陳敵人應給伊等以本陳軍功等級侍講禪布等並非往統軍馬數內之官不准算功近侍護軍校向無議叙之例亦不准算功至大將軍咨言昭木多之戰厄魯特震懾於皇上天威肝膽破裂抱頭鼠竄職遵皇上指揮禦而敗之不能乘交戰之時生擒噶爾丹至今愧悔羞慙不意皇上寵眷優擢為一等公不能當此隆恩夢寐不安職有何殊勞職未敢請功也查恩詔內將大將軍費揚古之伯已經優升為一等公既授費揚古為一等公無庸另議上從之乙卯治將軍馬思喀等不急追擒伊拉古克三庫圖克圖隨軍食羊瘦損罪先是閏三月馬思喀等使隨軍羊隻至於瘦損上以發議政諸臣議罪議政諸臣奏言馬思喀等本當立治其罪但現在出兵俟歸時再議上從之後六月間馬思喀等往追伊拉古克三庫圖克圖不及而歸上曰費揚古遣馬思喀等並不扣數限日輕行乃多發官兵是以遲重不能追及伊拉古克三庫圖克圖著交議政諸臣議於是議曰查將軍馬思喀疏言伊拉古克三庫圖克圖大小二百許口馬二百餘匹牛五頭羊八隻又報大將軍費揚古轉奏曰一日行一百二三十里馬思喀明知伊拉古克三庫圖克圖困窮已極遁去踪跡乃一日僅行三四十里至九十里不等不急追尋伊拉古克三庫圖克圖殊為不合又隨軍羊隻乃大兵糗糧身為將軍不特委賢能將領小心交付出寧夏六十里間致三千餘羊疲損且為兵丁給米事詔㫖下頒不行宣諭諸軍殊為不合坐此情罪應將馬思喀議政大臣領侍衛內大臣管滿洲火器營大臣內務府大臣佐領加一級盡行革去巴渾代齊什邵鼐俱係議政大臣其奏章及大將軍費揚古奏章俱開列其名與馬思喀同奏乃不急往追擒伊拉古克三庫圖克圖而隨軍羊隻又不小心交付將領以致三千餘羊瘦損殊為不合坐此情罪應將巴渾代所加二級削去併罷其議政大臣都統管滿洲火器大臣以侯上朝將齊什所加一級削去併罷其議政大臣都統以佐領上朝將邵鼐所加二級削去併罷其議政大臣都統管滿洲火器大臣留前鋒統領任宋住乃議政大臣而隨軍羊隻不小心交付致三千餘羊瘦損馬思喀不將諭㫖傳諭諸軍而彼竟不提醒傳諭不合坐此情罪將宋住所加一級削去罰俸一年米里布濫厠將軍大臣之間將軍未傳之令擅自宣傳情罪殊為可惡坐此情罪應將米里布擬絞監候秋後處决班布爾善改換前供與巴渾代等順口抵飾殊為不合坐此情罪應將班布爾善枷號三個月鞭一百不准折贖正黃旗護軍參領禪布驍騎參領桑格正紅旗驍騎參領常明正紅旗護軍參領一等阿達哈哈番又一拖沙喇哈番加二級伊德渾鑲藍旗驍騎參領三等阿思哈尼哈番佐領加一級西濟渾鑲黃旗前鋒參領特古思正黃旗前鋒侍衛署參領阿哈占正白旗前鋒參領畢揚古里侍衛博福齊正紅旗前鋒參領黑雅圖侍衛索爾孫鑲白旗前鋒參領阿玉什侍衛黑碩色鑲紅旗前鋒參領柯卜朔正藍旗前鋒參領托和齊侍衛渾達禮鑲藍旗前鋒參領噶爾吉山等口供不實俱附和巴渾代等坐此情罪俱應降三級調用查伊等內禪布桑格常明西濟渾特古思畢揚古里黑雅圖阿玉什渾達禮喀爾吉山俱有加一級以伊等所加一級抵所降一級仍降二級調用阿哈占有加五級以所加三級抵所降三級仍留任托和齊有加二級以所加二級抵所降二級仍降一級調用伊德渾既附和巴渾代等又求額納布換其原供坐此情罪應革職將其所襲世襲職銜與應襲之人承襲額納布稱伊德渾求彼換供是實應免議行營協領達爾扎等八人審係無干應無庸議黑龍江將軍薩卜素總兵官王化行等帶去羊隻不致疲損應免議同知周之煥不小心飼羊又不聽將軍令往所指地方應將同知周之煥革職趕羊將領綽欣代等理應議罪但馬思喀等供未經專付伊等致羊隻疲損皆我等之罪已自承當應將署將領綽欣代等免議罪馬思喀等留於平樂城之羊一千三百六十隻既經總督吳赫變價奏訖無庸議奏入得㫖著將馬思喀議政大臣領侍衛內大臣管滿洲火器大臣俱革去從寬留其內務府大臣佐領巴渾代所加二級革去仍降三級從寬留原任齊什所加一級革去仍降四級從寬留原任邵鼐所加二級革去從寬留原任宋住所加一級革去罰俸一年伊德渾革職從寬留任禪布等從寬免其調用各帶所降之級留任米里布依擬處絞監候秋後處决班布爾善不准折贖枷號三個月鞭一百餘依議又諭大學士伊桑阿阿蘭泰曰此後行軍户部兵部總尉著於該部司官內特舉遣去武官署總尉永著停止該部司官雖經戰陳不得叙功如此則伊等為居中之人凡事俱從公矣以此交部永為定例爾衙門亦記之丙辰命坐塘廢官復還原職隨旗上朝兵部議叙坐塘人員具奏上曰坐塘人員僅議加級殊覺寃苦此內亦有從去年坐至今未換者伊等坐塘日久馬於殺虎口更番喂養運致米糧一應馳報事務略無稽誤伊等之勞苦較倍於西路兵丁于成龍運米人員著將罷職人員復其原官隨旗上朝丁巳以孫思克等捐助馬駝撥給營伍先是兵部奏言沿邊提鎮各率屬官捐助馬駝以備運炮運米之用今噶爾丹已滅北方無事此項捐備馬五百一十三匹駱駝三百六十頭仍給草料養之空縻錢糧而已應停給草料喂養原捐官員仍在任者各交還所助馬駝若升任調用罷職者其馬駝各撥該營扣價報部奏入得㫖此事著㑹同户部議奏查前者將軍孫思克等疏稱對陳破鋭者無過子母炮炮子火藥等物甚重若非任重牲口不能隨軍速到乞令率屬官捐備馬駝每年春冬則在廄喂養夏秋則在野牧放該部奏言孫思克等捐備馬五百一十三匹駱駝三百六十頭夏秋則牧放春冬則照喂養營馬例給之草料准行在案此項馬駝春冬二季共需料四千七百一十四石二斗草三十一萬四千二百八十束用價銀共八千七十八兩七錢六分此項捐助馬駝該將軍總兵官等既稱炮子火藥等物甚重若非任重牲口不能隨軍速到應將此馬駝仍前夏秋二季牧放春冬二季給草料喂養奏入奉㫖依議倘此項馬駝或查時或用時其數不實該管官員俱著從重治罪己未命改訂敕文授纂修方略諸臣先是康熙三十六年八月二十二日開局纂修方略命大學士伊桑阿等為總裁官其授諸臣敕文交與內閣撰擬至是伊桑阿等撰擬敕文進呈御覽文曰皇帝敕諭大學士伊桑阿等曰朕惟自古帝王御宇成功以斷惟力排羣議乃克有勳制勝在謀須動出萬全斯無失䇿故攘外乃以安內蕩冦斯可寧人理則相因事非得已我國家肇造區夏混一車書功業懋昭聲靈遐暢朕纘承丕基孜孜圖治惟期海隅向化使世登熙皥時慶諴和乃厄魯特噶爾丹恃其險逺輒肆跳梁藉喀爾喀搆怨為名擾我邊陲侵我內地屢經懲創而頑黠不悛叠沛恩施而負固自若朕思邊徼一日弗寧則民生一日不靖與其每嵗逺防曷若一勞永逸爰親總六師三臨絶塞踰越險阻衝冒炎寒深入不毛之域直窮大漠之鄉仰賴天地祖宗之靈社稷之福克殄巨憝掃清蟻聚寰海自此升平人民得以休息是用益切勵精勤求化理而諸臣咸謂進𠞰機宜悉出朕躬指授一時禀命密議罕傳諸路行師勞心最久若非宣付史館無以垂信將來再四懇陳從所請於康熙三十六年八月二十二日開局纂修特命卿等為總裁官卿等督率在館諸臣次第詮訂資衆手之編摩藏三征之令典豈曰鋪揚簡䇿用張撻伐之威庶幾昭示來兹不忘艱難之自卿等勉之上覽畢諭曰文內有成功以斷惟力排羣議乃克有勳制勝在謀須動出萬全斯無失䇿之語雖係實事然因朕洞悉其情故不從衆意獨斷而行僥幸得當耳若必以此為是可乎後若倣此必致窮兵黷武矣伊桑阿等曰聖諭極是皇上聖明洞鑒方能得當若意稍扞格所見不到誠不可謂之萬全上曰此數語著刪改進呈伊桑阿等將成功以斷數語改為欲億兆永底於時雍必遐荒無間於聲教進呈御覽上曰可甲子命山西大計附入運米科瓜官員革職例山西巡撫倭倫請暫停大計吏部議行奏入上曰倭倫頃有密奏言科𣲖事俱因製造運米車輛巡撫溫保顯然行文以為軍務緊急目下暫𣲖隨後即還而准徴之其時太原府有部員在是以償還他處雖未償還而除公務取用外餘銀俱貯庫內即今湖廣協解十八萬兩仍存庫內如中路運米之車朕撥部官動支庫銀製造直𨽻河南山東不造車地方大小官員捐俸及衙役工食以買馬騾並不科𣲖民間前在大同溫保來見奏此科𣲖事朕謂錢糧若難卒辦何不預奏爾若急請餉銀立動附近錢糧解往何不及之有溫保竟不能對然大家恃彼地餉銀不預動內帑至於科𣲖此所𣲖者原為公務並未入已尚有可原但其時州縣官員豈無借此多𣲖者乎大計所關重大仍著舉行舉行之時將伊等附入罷軟內革職伊桑阿等奏曰聖諭極是退斥不肖則地方之民心始安矣丙寅命撤回湖灘河朔等處三路坐塘人員以應得之缺補用先是兵部以湖灘河朔等處三路坐塘人員議叙具奏上曰西路坐塘有罪人員俱還原品隨旗上朝而現任情願效力人員反止加級所議者輕著重議來奏部臣覆議叙入奏上曰此內自備馬匹情願前去者議叙處仍薄噶爾圖等乃革職之人伊等俱還其原品而現任官員情願效力前去坐塘自去冬至今尚未更換勞苦殊甚該部止加以一級所議未稱因笑曰朕凡事俱欲從公西路武辨以其行事訴之大將軍為之達部于成龍等又為彼同運人員申說而無一人為若輩言者朕若不言誰為若輩言哉果論效力則若輩亦大效力矣朕意以為若輩仍以應升之缺先用殆無不可也伊桑阿等奏曰聖諭甚公論其效力以其應升之缺先用固宜庚午上大閲於玉泉山因以示來朝之青海札西巴圖爾等是日於玉泉山西南曠處列八旗紅衣大炮等火器及馬步鳥鎗軍士其護軍驍騎按旗分為三隊且設兩翼後殿而陳焉上躬擐甲胄遍閲畢登玉泉山之南岡御黃幄三鳴角擊鼓步軍舉鹿角火炮諸軍並進金鳴衆止炮火齊發如是者九進止第十次炮聲連發而火器營馬步軍亦遍放連環鎗毫無間斷聲震山谷畢各收軍士復歸本陳隊伍精嚴旗幟顯赫其來朝之青海台吉扎西巴圖爾等衆俱相顧戰栗驚嘆曰天朝兵威精嚴堅鋭如是可畏也我輩生長沙漠窮荒不惟目未經見即耳亦未曾聞兵威如此所向又何敵不克乎臣謹按青海諸台吉乃四厄魯特之一支也自其祖顧實汗以來雖纍世遣使貢獻然未嘗親身赴闕朝見皇上既𠞰滅其種類厄魯特噶爾丹天威震於絶域於是先遣使說之扎西巴圖爾等即悚懼來朝皇上惻然軫念顯示懷柔至意靣加溫語以慰勞之又廷宴厚賚以喜悅之扎西巴圖爾等得沐浩蕩之恩無不自悔其來之後者今復示以大閲上躬擐甲遍閲軍馬精鋭器械輝煌隊伍嚴明進止有度且鎗炮之聲轟雷掣電時扎西巴圖爾等皆驚懼戰栗無不嘖嘖嘆異皇上恩威如是不但扎西巴圖爾等傾心靡服彼歸傳語其下亦莫不戴德畏威皇上神謨妙略誠御外之道之至神者也聖祖仁皇帝親征平定朔漠方略卷四十七

body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷四十六九月癸未厄魯特丹濟拉等來降先是理藩院奏準副都統阿南達咨言據回子達爾漢白克額貝都拉報稱丹濟拉原與郭蠻喇嘛同在德白色克地方彼見皇上敕書到六日後挈裝內行其附近諾顔格隆設為詭計隨行二日次日上馬詐言各覓其物遂劫去丹濟拉行裝策旺喇卜灘兵到復劫之策旺喇卜灘之兵為首者乃額爾德尼布木之子車稜端多卜堪度牢占林辰托克塔咱布等率千許人住扎郭蠻喇嘛所噶爾丹骸骨噶爾丹之女鍾齊海及程貝臧布其妻與幼子諾顔格隆皆被策旺喇卜灘所差堪度等截奪伊拉古克三庫圖克圖往投策旺喇卜灘策旺喇卜灘執吳爾占扎卜色稜阿己等阿喇兒拜自經死車林布木往投丹津俄木布丹濟拉於六月十五日至哈密城我迎之入五六日後丹濟拉有一夥伴叛敵人而來九日後丹濟拉之子多爾濟塞卜騰至我供應丹濟拉牲畜糗糧撥我長子郭帕白克送丹濟拉面聖已於六月二十八日起行丹濟拉人口共七十有九報至奏聞上命該部檄阿南達迎丹濟拉等來交將軍孫思克發兵護送至是理藩院員外郎喇都渾迎取丹濟拉等行至可汗鐵領地方遇駕奏聞上以丹濟拉向係有名之人授為散秩大臣其子多爾濟塞卜騰授為一等侍衛俱安插張家口外後俱編入察哈爾旗分佐領其屬下人等酌其可用者盡令披甲給與錢糧乙未命中路西路軍前效力人員準其先用吏部奏言中路西路軍前效力監生俟烏闌布通軍前效力監生用完之日再用謹奏請旨上曰西路之兵大克噶爾丹之時效力甚多中路之兵深入追逼故噶爾丹驚迫逃竄而去今將伊等後用所議不當應先用西路人員次用中路人員後用烏闌布通監生命中路軍前效力鄉導護軍參領等官俱加一級兵部以中路軍前鄉導護軍參領等官俱應加一級具奏請旨上從之辛丑以驛站捐助馬匹交鄂爾多斯牧放運米駝馬撥給直𨽻驛站都察院都御史于成龍等運米事竣回京奏曰前因鄂爾多斯驛站馬匹羸瘦故於運米馬內每站選給五匹助彼馳報今驛遞奔馳俱至瘦損鄂爾多斯王董羅卜言此馬若從逺趕回道斃必多請暫留水草佳處牧放俟肥腯後候調解還是以暫留之於鄂爾多斯地方至臣等運米駝馬行路遙遠亦皆羸瘠除選用外其餘仍請交兵部太僕寺喂養上諭爾等與兵部太僕寺會議來奏議曰運米帶來牲口除前選擇償給八旗兵丁自備馬匹缺額外其餘無殘疾者應撥給直𨽻驛站照例估價報部駱駝交太僕寺喂養有殘疾者俱交運米官員折價交户部上皆從之癸卯議內大臣索額圖擅撤兵馬驛站罪兵部奏曰準船站留後內大臣索額圖咨稱近奉旨云內大臣索額圖已無所事著星速回京多羅額駙阿喇卜灘台吉德木楚克仍俟青海衆台吉偕來是以令額駙阿喇卜灘德木楚克暫留此地職親率護軍一百二十名并帶官馬起行赴京其橫城口至湖灘河朔所設驛站職親往一齊撤回職等由張家口進邊為此奏聞上曰止命索額圖獨來耳今索額圖盡撤一百二十名護軍官馬驛站而來則青海衆台吉來朝之事仍有未全著兵部及大學士議奏集議曰奉旨命索額圖單身獨來今將驛站官兵盡行帶回不合青海衆台吉來朝之事猶有未全應令照舊設驛都統阿什坦噶爾馬等率一百二十護軍及官馬而還已有數日應著住扎湖灘河朔俟青海衆台吉來朝歸去後令伊等回京著索額圖單身速來到日該部明白取供察議上從之尋索額圖至問之曰奉旨著汝單身自來而汝盡撤兵丁官馬驛站者何也供曰奉部文因某不復有事著作速回京多羅額駙阿喇卜灘台吉德木楚克仍著俟青海諸台吉某愚昧無知撤回兵馬驛站亦有何辨查青海衆台吉來朝之事猶有未全而索額圖遽撤驛站兵馬不合坐此應銷去所加一級罰俸一年奉旨索額圖著從寬免其銷去加一級罰俸一年十月乙酉以哈密國達爾漢白克額貝都拉為部長給之印纛議政諸臣奏曰據達爾漢白克額貝都拉疏言噶爾丹地方有土克齊哈什哈等來已經擒解又聞噶爾丹之子塞卜騰巴兒珠爾在巴喇思庫兒四圍捕獸臣令長子郭帕白克率兵執之又有達什爾鄂木克圖哈什哈二十餘人滾占之使人恩客達爾漢寨桑等三十人亦盡執之今將塞卜騰巴兒珠爾之乳父徽忒和碩齊噶爾丹之乳母之子丹濟丹卜鄂倫帶達爾扎及兩使本身差臣子白奇白克解送如噶爾丹近來可執則執之如彼不來探實奏聞但臣既擒塞卜騰巴兒珠爾厄魯特必不悅臣而我哈密又復單薄用是危懼伏乞庇而安之且臣所畏者策旺喇卜灘也祈皇上降敕勿使害臣又懇給臣敕書保我地方俾有所恃以無恐又懇移我回子屯於肅州以便朝覲往來使臣地聲息傳致住扎肅州之人告知肅州總管之人則臣奏章及貿易者併地方諸信俱得至聖上之前矣查額貝都拉誠心向化屢擒噶爾丹使人來獻又奏言願竭力效勞於聖上殊為可嘉應議敘以示皇上眷恤之至意回子風俗與蒙古無異應將伊屬下人照各部落編為旗隊授達爾漢白克額貝都拉為一等部長食俸掌印又其子郭帕白克白竒白克亦經效力亦應授為二等部長協理旗務俟來年草青之時理藩院差官二員酌帶肅鎮識路之人乘驛前往同達爾漢白克額貝都拉照定例分編旗隊又請以其子郭帕白克率一百人住扎肅州應準所請許其住扎此項回子擇賢能之人為首同地方官管轄巡察住扎人民數目開明報部注册印交禮部鑄造印文該部請旨給賞銀幣戶部支取應賞達爾漢白克額貝都拉銀一千兩蠎縀四匹片金四匹表紬二十四匹裏紬二十四匹印成之日并銀幣差理藩院官一員乘驛同郭帕白克送至將軍孫思克所孫思克酌撥標下官兵送往達爾漢白克額貝都拉可也上是之賜額貝都拉管轄哈密國印遣郎中布爾賽奔什往編旗隊郭帕白克又奏曰臣自哈密來時臣父語臣曰皇上如準給印汝可再請給纛如準給纛則葉爾欽吐魯番等回子聞之必共羡我之得恩眷矣又請曰請安進貢俱乞自肅州乘驛交部議準上允之纛用紅有應報聞之事準十五人乘驛戊子以軍法斬四格子兵部理藩院會同三法司奏曰四格子趙山前奉旨差一人於丹津俄木布差一人於阿喇卜灘告以噶爾丹之死且招撫之身與俱來如事不成或半途而返著大將軍即於彼地立斬示衆今四格子歸雖稱我與趙山同至阿喇卜灘所趙山留彼地給我以丹津俄木布之垂朱爾台吉為鄉導至河通呼爾哈地方糗糧坐騎俱無回至額黑阿喇兒食路棄死牲肉步行而回但四格子乃奉旨效力告以噶爾丹之死招撫丹津俄木布身與俱來而出差之人也理應遵旨往撫丹津俄木布身與俱來為是竟不到丹津俄木布所但至阿喇卜灘所居前行七日即借稱糧騎告乏而歸情罪殊為可惡應將四格子立斬示衆奏入得旨趙山至所指之地其事已竣著令歸家四格子既於阿喇卜灘處給之鄉導十日之程即是所指之地而竟不到著將四格子立斬乙卯遣使賫敕招撫丹津俄木布理藩院奏曰先是大將軍公費揚古疏言臣等至瀚海克克爾地方有厄魯特丹津俄木布差彭楚克車陳白克阿兒達爾俄木布等男子十人婦女一人騎馬二十二匹駱駝七頭來告曰我等乃丹津俄木布所差使人為覆奏聖上敕旨而來問彭楚克車陳白克阿兒達爾俄木布等曰丹津俄木布奏章之外與爾等有何言丹津俄木布在何地方距策旺喇卜灘所居有幾日程爾等何日起行告曰丹津俄木布謂我等云凡有所言皆在奏章內並無他語丹津俄木布住河通郭爾磨多地方策旺喇卜灘住波羅塔拉此兩間有二十日程阿喇卜灘住喀喇伊齊思地方距丹津俄木布所居有六七日程阿喇卜灘策旺喇卜灘所居之間有十二三日程我等於六月二十日自河通郭爾磨多起行取丹津俄木布奏章視之有馬尼圖賫到敕旨臣擬定往與策旺喇卜灘合故遣人於策旺喇卜灘求彼轉達策喇卜灘言一慿上命如何無用我轉達想皇上必加眷恤也等語是以令彭楚克車陳白克阿兒達爾鄂木布乘驛交撥什庫奈蠻代併丹津俄木布奏章奏聞命議政諸臣議奏議政諸臣奏言俟彭楚克車陳白克阿兒達爾鄂木布到日再議上許之今彭楚克車陳白克阿兒達爾鄂木布已到問之曰丹津俄木布來投聖上乎居目下所住河通郭爾磨多地方乎抑往策旺喇卜灘處與之同處乎奏章之外令汝等有口奏之言乎阿喇卜灘使人諾顔格隆與汝等同往何以不來乎告曰我等與諾顔格隆同賫聖上敕書於五月二十五日至阿喇卜灘所居呼里木圖之地以敕書示阿喇卜灘阿喇卜灘言吾已見敕書矣可使丹津俄木布觀之速於十五日內來同我之人往送奏章因以敕書授我等我等賫敕書於六月初十日至憨地追及丹津俄木布示以敕書自彼地西南行三日至河通郭爾磨多之地因我等同伴少而阿卜都賴額爾克寨桑早晚將到故令我等待之將於其中撥數人與之偕行及阿卜都賴額爾克寨桑到乃撥六人與我等同行授以覆本而語之曰我遵馬尼圖賫到敕書將往吾兄策旺喇卜灘所爾等為我賫奏前去六月二十日自河通郭爾磨多地方遣我等起行我等行十日至垂地聞阿喇卜灘使人已行思往阿喇卜灘處迂而且逺又逾十五日之限我等是以不往過之即向此而來阿喇卜灘使人路中並無稽留之處想俟我等故日久也諒必來矣目下丹津俄木布所居河通郭爾磨多地方甚冷不可久居我等來後殆遷至其兄策旺喇卜灘處去矣未嘗語我等來投聖上之言奏章之外並無他言上奏又問之曰阿卜都賴額爾克寨桑何時到汝所居之地彼住丹津俄木布所乎抑往策旺喇卜灘所乎抑來降聖上乎人幾口馬幾匹汝等欲居此乎抑回丹津俄木布處乎告曰阿卜都賴額爾克寨桑六月十六日到我等所居之地阿卜都賴額爾克寨桑者回回國人也雖有所愛地方亦存諸心而已口言之可乎阿卜都賴額爾克寨桑有俟我等歸彼來進貢之語共有三百餘口牲畜亦多我等乃奉差使人留此與遣回唯聖上裁奪查丹津俄木布向與策旺喇卜灘不合今已無所歸矣當遣人招之使來前有丹津俄木布下厄魯特來降現居此地請於其內擇人賫敕往諭再於侍郎安布祿處將彭楚克車陳白克等所留八人內酌遣同行伊等坐騎口糧著安布祿於附近部落湊取給遣敕文內閣撰擬將彭楚克車陳白克阿兒達爾鄂木布送往歸化城會彼夥伴將帶來貨物貿易以俟奉差之人奏入上準之差羅卜臧丹巴賫敕前去其敕丹津俄木布文云皇帝敕諭台吉丹津俄木布曰朕前聞爾與噶爾丹分拆遊行故差黑色馬尼圖捧敕諭以來降必使富貴優加愛養爾如同阿喇卜灘往歸策旺喇卜灘朕亦不之究著明白覆奏如兩無所歸欲於額黑阿喇兒洪郭羅等處據險竄伏朕斷不容必刻期破之爾使人諾顔格隆臧布額爾克俄木布阿旺達什等來奏云倘噶爾丹至我近地我必擒而殺之歸降聖朝又以敕書使諾顔格隆臧布賫去諭爾雖不能擒殺噶爾丹而身率屬下來降亦必使之富貴而優養之毋疑毋阻今爾竟不往歸策旺喇卜灘仍另自遊行豈因爾向與策旺喇卜灘不睦有歸噶爾丹之事故不便復歸策旺喇卜灘乎今噶爾丹身死國亡生擒其子塞卜騰巴兒珠爾又擒伊拉古克三庫圖克圖今爾不速來漸至日久則爾生計亦漸迫若爾率屬下星速來降朕必加以厚恩優榮愛養目下丹濟拉車陵等來降俱使得所而愛養之爾亦當聞之詳矣今軫念爾無所歸生計窘迫欲使得所之意爾當籌之速來歸降毋貽後悔為此特遣爾幼時服役識認之人羅卜臧丹巴賫敕往諭丙辰命監候回子俱從寬釋放上諭大學士伊桑阿等曰前以回子間諜之事正法者二人遣回者二人監禁者至今尚存問厄魯特來降之要人及丹濟拉等俱言無遣回子為間諜之事前以敵國之人潛居內地以為間諜而執之今噶爾丹已滅下人悉降應將監候回子從寬免死朕已諭刑部諸臣矣伊桑阿等奏曰聖諭極當皇上如天好生之仁誠頌揚所不能盡也戊午遣使賫敕招撫阿喇卜灘理藩院奏曰阿喇卜灘疏言黑色奉差賫到敕書內開臣當兄弟同居臣曾遵旨通使渾台吉亦答使與臣使同來語之曰我輩先宜各自遊牧故因竒薩兒巴思湖多魚臣往居其間又蒙諭臣諾顔格隆令臣至彼地臣不勝歡忭臣身原欲即往與之一處遊牧將諸事上奏聖明因臣妻扎兒大病今年不能親身往覲微賤小人何敢有違上旨不但臣當然即渾台吉亦當遵旨况天下之人無不各以其疾苦上奏聖明者不論所居何地總之請安進貢者也查阿喇卜灘原與策旺喇卜灘不睦下人無食窮無所歸故以為當招阿喇卜灘使之來應遣阿喇卜灘使人諾顔格隆臧布及其偕來留於歸化城之達什俄木布賫敕使歸臣部撥賢能筆帖式一員乘驛將諾顔格隆送至侍郎安布祿所將伊等坐騎糗糧著安布祿於附近部落酌量湊給遣行敕文交內閣撰擬奏入上允行即差諾顔格隆臧布達什俄木布賫敕而歸其敕阿喇卜灘文云皇帝敕諭台吉阿喇卜灘曰朕前聞爾與噶爾丹分拆遊行故遣黑色馬尼圖捧敕諭以來降必使富貴而優養之爾如偕丹津俄木布往歸策旺喇卜灘朕亦不之究著明白覆奏如兩無所歸欲於額黑阿喇兒洪郭羅等處據險竄伏朕斷不容必刻期破之爾使人諾顔格隆臧布額爾克俄木布阿旺達什等來奏云倘噶爾丹至我近地我必擒之執之我等歸降聖上而已又以敕書使諾顔格隆臧布等賫去諭爾雖不能擒殺噶爾丹而身率屬下來降亦必使之富貴而優養之毋疑毋阻今爾疏言蒙諭來降不勝歡忭即欲親往上奏一處遊牧諸情節因臣妻扎兒大病是以今年不能親身往覲不論所居何地總之請安進貢者也以此觀之則無懇降誠意尚在首鼠兩端而今時事爾心所灼知者也丹濟拉車陵等來降朕則大加寵眷策旺喇卜灘擒伊拉古克三庫圖克圖授朕所差使臣爾當深思之至於一概來降人員盡皆恩養使得其所此項情事爾皆詳聞之矣爾如欲他往勿復望加爾厚恩顯榮之事毋貽後悔今憐爾無歸迫於生計欲使得所爾當熟籌之作速來降為此即遣爾使人諾顔格隆臧布達什俄木布賫敕特諭後壬午年阿喇卜灘來降上賜宴及銀衣袍封阿喇卜灘為郡王命於洪郭爾阿濟爾罕周圍遊牧阿喇卜灘奏曰臣等被策旺喇卜灘劫掠無食無衣窮困已極死在目前蒙聖上屢差大臣近臣救濟賞給糗糧牛羊牲畜裘服鍋帳等物俾得重生今來請萬安又蒙皇上俯恤沿途給食乘傳差侍衛携駝馬來迎而臣阿喇卜灘一到即賜宴差近臣賞以臣阿喇卜灘所未經見御用珍服白金今又優封為王聖恩救我衆庶重生俾以榮顯天地髙厚之恩誠此生所不能報但期臣阿喇卜灘之身及臣屬下人員子孫世世捐軀效力而已謹請謝恩至臣屬員今即請授官職編為旗隊恐彼心志未寧應一二年後再請授官職編為旗隊上是之許阿喇卜灘謝恩後使阿喇卜灘另為部落下編旗隊己未命授車克楚竒薩木拖沙喇哈番上諭兵部曰去年中路軍前差車克楚竒薩木往探噶爾丹營壘伊等身臨視之而歸故授車克楚竒薩木俱以拖沙喇哈番伊等同行諸蒙古亦皆授之官職其時未經諭明該部即著爾部議行吏部部議應給車克楚竒薩木敕命上是之辛酉從寬免布爾哈圖祁泰死發黑龍江議政諸臣奏曰前準將軍馬思哈咨言副都統祖良璧軍前西安驍騎布爾哈圖祁泰奉旨交職使之效力而並不效力故回至郭多里巴爾哈孫已交副都統阿蘭泰上曰俟會議之便議奏欽此查布爾哈圖祁泰乃翁金守米之兵遇敵不戰而走今又不遵旨效力立功應擬布爾哈圖祁泰立斬奏入奉旨布爾哈圖祁泰俱從寬免死依例減等發黑龍江當差壬戌蠲免山西康熙三十七年地丁銀米上諭戶部曰比年出師討寇總為中外生民永圖休息故不憚軍興征繕之煩逺臨邊塞其一切飛芻挽粟皆動支正供額賦不使纍及閭閻獨大兵牧養馬匹及三次師行出入皆經山西地方緣邉各州縣衛所固皆勉力急公其餘諸郡雖非師旅所經亦有協辦轉輸行賫居送之事又該省嵗屢不登谷價翔貴民間生計甚屬艱難朕乘輿頻臨目所親覩軫念殷切未嘗一日釋懷昨嵗曾有諭旨俟噶爾丹殄滅之後誕布德音渙敷庥澤今寇氛盡滌邉境輯寧是宜格外加恩用綏黎庶康熙三十七年山西通省地丁銀米著一概蠲免爾部移文該撫令遍飭各屬實心奉行家喻户曉務俾深山窮谷均沾朝廷德惠倘或借端徵派澤不下究事覺定行從重治罪爾部即遵諭行癸亥磔誅伊拉古克三庫圖克圖等先是工部侍郎常綬等奏言六月十五日臣等至策旺喇卜灘所授之敕書賜物臣等謂策旺喇卜灘曰台吉爾昔有擒斬噶爾丹等之奏皇上亦特遣我等宣諭使台吉興兵擒斬噶爾丹噶爾丹雖死而丹濟拉乃噶爾丹一體之人今近至爾地台吉既發兵往征當將丹濟拉本身噶爾丹男女及其骸骨并取畀我策旺喇卜灘言我厄魯特風俗兵機戒預泄六月二十八夜半策旺喇卜灘遣其寨桑托卜齊來告曰往征丹濟拉之兵未到前丹濟拉覺之率妻子十五人向哈密遁去追之不及獲噶爾丹男女又伊拉古克三庫圖克圖率百許人已至額冷哈畢爾罕地方矣臣等次日見策旺喇卜灘謂之曰伊拉古克三庫圖克圖乃本朝人得罪逃歸噶爾丹凡百禍端興之者此人也台吉假我兵二百往擒之策旺喇卜灘言我發兵授諸大人即至漏泄伊拉古克三庫圖克圖未必不遁當密差往討丹濟拉之兵陡然前執之噶爾丹之子及其母亦併發去我已擒獻噶爾丹之子其已灰之骨無用之女豈復有所愛惜但我風俗不讐無用之女子至噶爾丹之骨我不沉之水則棄之野即往送皇上亦無異也想聖主亦鑒許之也是以臣等七月初五日起行迎往十四日至庫色木素克地方策旺喇卜灘使人彭蘇克丹津喇木扎木巴喇嘛多爾濟寨桑等以伊拉古克三庫圖克圖本身及其弟托博克孟克里噶爾丹之子車陵三魯卜及其母布林交付臣等授之而歸伏惟皇帝廟謨預燭噶爾丹之死其遺孽必走䇿旺喇卜灘既遣臣等又密諭行事之䇿無不符合逺邦感戴即擒逆賊祇獻西北諸蒙古土魯蠻哈密等國大為驚異即臣等亦不勝驚異仗聖上威德廣播遐方臣等往來略無阻誤得旨據常綬等奏言索噶爾丹之女而不與常綬等乃特遣之人何以不索取而竟歸至吳爾占扎卜阿巴塞稜阿爾拜又何以不索取而來著伊等將不行索取併其行事原由逐一開明具奏至伊拉古克三庫圖克圖執彼以來彼有何言一併開明具奏常綬等奏言臣等六月十五日見䇿旺喇卜灘宣旨曰朕親率數路大兵出征噶爾丹此行但討先叛之人兵到爾境勿疑勿懼並不侵爾至敕中雖命爾興兵征噶爾丹但爾國鄰近哈薩克諸國為爾之仇恐兵興乘隙失爾妻子至噶爾丹下人離散在爾地者亦有之如有願歸我者即付我等如在吾地有願歸爾者告於往差大臣記明來奏諭畢䇿旺喇卜灘言乞諸大人少待聲息至歸人之事請俟我奏使格色爾歸來不能即付臣等又見䇿旺喇卜灘言台吉令我等少待我等已待數日矣或與或不與竟無決絶台吉如與我等則我等携之而去如不與則我等奏之皇上矣䇿旺喇卜灘言丹濟拉已遁至中國不必言矣請以噶爾丹之子相付鍾齊海乃無用之女噶爾丹乃已灰之骨我土風俗不以為讐不便相付臣等言中國律例大凡叛人不存其後不留其尸必窮究掃除皇上親統大軍特出征討若不獲此必不中止今台吉不與則台吉前所奏擒殺噶爾丹之語大背而前此台吉奔走之勞皆虛矣當細思之至歸我之人何必待格色爾當即交發我等策旺喇卜灘言噶爾丹乃我仇人我既執其子畀之無用之女已灰之骨豈復有所愛惜但我土風俗與無用之女已灰之骨為仇人必嗤之故不畀爾等至歸人之事應俟格色爾不能即與以是為詞竟不之與臣等聞吳爾占扎卜色稜等在策旺喇卜灘所謂策旺喇卜灘曰目下噶爾丹地方來投台吉者皆我之仇俱應畀我至欲歸我之人亦應併畀我在我土者有欲歸爾之人台吉可語我奏之皇上策旺喇卜灘言給人等事當待格色爾不能即與前言已畢夫復何言臣等言台吉所給之人既欲待格色爾相付則我等待之策旺喇卜灘言我有當奏之事故差格色爾往奏不能遽授爾等臣等又見策旺喇卜灘言巴圖爾額爾克濟農噶爾旦多爾濟等俱歸降皇上已極顯榮青海衆台吉今皆已降台吉乘時歸主倚之為生必極顯榮與衆逈異矣策旺喇卜灘言我自始至終盡悃誠而事皇上即今亦但仰戴皇上而已是以我不必效法青海衆台吉也我意中自以為所行已極善矣諸大人之出此言也豈以我前所行有未善乎臣等言巴圖爾額爾克濟農等歸降皇上已極顯榮台吉果歸降皇上倚之為生必更顯榮與伊等逈别如衆人皆降至於顯榮台吉獨如此能安處乎况哈薩克國與爾為難我等此言大有益於台吉者也良時不可失故我等陳其所見如此台吉當深思此言策旺喇卜灘言總之但以悃誠事聖上而已不必效法他人也續執伊拉古克三庫圖克圖交付臣等臣等語之曰當將伊拉古克三庫圖克圖下人全交我等為是策旺喇卜灘言請以伊拉古克三庫圖克圖及其諸弟相付他人皆無用之人不必交與臣等語之曰伊拉古克三庫圖克圖乃本朝之人其下人亦不可不與其諸弟諸子妻妾下人及降我之格壘沽英之子吳巴什之妻俱畀我為是策旺喇卜灘言伊拉古克三庫圖克圖乃為首之人併其諸弟付爾等足矣其他皆無涉之人不必相付遂將伊拉古克三庫圖克圖其弟托博克孟克里及噶爾丹之子車陵三魯卜其母布林及程貝臧布保母察罕交付臣等又達爾扎納親哈什哈之妻色稜達什訴於臣等曰聖上使我與丈夫完聚故與吳爾占扎卜之母一齊發放今聞我丈夫自哈密擒解御前乞大臣帶我歸去與我夫完聚臣等遂諭之亦携之而來問伊拉古克三庫圖克圖供曰蒙皇上恩恤小人因前蒙世祖皇帝有準我去住隨意之旨且水土不服故不奏皇上而往青海我問之達賴喇嘛苐巴當往何處為宜彼令我當往厄魯特去又值噶爾丹遣使人喇馬扎卜來召我是以往歸噶爾丹聞噶爾丹至杭愛左側遊牧我曾往語之曰爾於此地遊牧大不是矣皇上遣侍衛克什圖使於噶爾丹之時我曾遣人名雲端者請皇上安且陳奏我來此之故後在克魯倫皇上差阿喇卜灘之兄宣諭溫旨我曾謂噶爾丹當差好人遵奉聖旨為是噶爾丹破敗之後我又差人名羅卜臧喇什者請皇上安陳奏衷情在古爾班賽堪地方待之三月我差人不歸故往歸丹濟拉被往征丹濟拉之兵所擒不能負荷皇上洪恩罹此大罪應作何處治一唯聖斷我有何辭因臣等與策旺喇卜灘言詞繁多欲俟到京之日再奏是以僅將執噶爾丹之子伊拉古克三庫圖克圖之事奏聞今奉旨著將臣等行事始末逐一奏明謹奏上命議政大臣會議具奏至是會議伊拉古克三庫圖克圖孟克里托博克三人擬凌遲程貝臧布伊拉古克三庫圖克圖之徒弟羅卜臧多爾濟二人擬斬婦人布林察罕自噶爾旦多爾濟處帶去鄉導諾木齊交該部得旨伊拉古克三庫圖克圖孟克里托博克凌遲處死程貝臧布暫緩決有要言問之今即取來伊拉古克三庫圖克圖之徒弟羅卜臧多爾濟隨其師而行與彼無涉著免死布林察罕兩婦人鄉導諾木齊交該部議政大臣又奏曰先是侍衛巴布希津巴遇伊拉古克三庫圖克圖劫掠褫裸之時托博克與皮裘及馬一匹使巴布希衣之而歸為此奏聞得旨托博克暫緩凌遲問托博克果真則宥之尋解伊拉古克三庫圖克圖到後集諸王以下蒙古王文武大臣官員喇嘛於黃寺磔誅伊拉古克三庫圖克圖孟克里問托博克給巴布希津巴裘馬是實免其死命免鄂爾多斯處分照常敘功理藩院奏鄂爾多斯運米坐塘遲誤議將王董羅卜貝勒顧祿什希卜貝子根都什希卜公杜稜等革爵上曰鄂爾多斯兵丁雖有遲留後各皆效力無所失誤王董羅卜等俱從寬免議罪仍照常敘功以鎮國公蘇努為貝子上諭大學士伊桑阿等曰從軍三次大小臣工著各加一級鎮國公宗室蘇努三次從軍於烏闌布通之役左翼出戰又甚力衆所共知公蘇努著升一等為貝子仍留都統任爾等可即宣旨乙丑命敘昭木多破賊功為上上等兵部奏曰先是大將軍公費揚古以昭木多臨陳京城右衛西安衆官兵每人給功牌二次交在臣部臣部請旨或作一次敘或作兩次敘得旨著作一次敘敵人遊牧而來驟到即奔此可謂之擊敗乎所謂擊敗敵人者擊敗堂堂正正相持不動之敵始謂之擊敗也欽此請將此一枝兵作上上等軍功議敘奏入上從之丁卯西寧總兵官韓弼奏報赴闕請朝青海諸台吉入邊日期韓弼奏曰恭惟皇上德威逺播聲化覃敷溥天之下莫不來朝獨有無知賊寇噶爾丹螳臂當車肆行悖逆大小臣工或以為當𠞰或以為不當𠞰議論不同皇上神謀獨斷上協天心親行征討寇隨𠞰滅若非天地篤生神聖之人烏能如此生殺中窽浩浩蕩蕩頃刻之間建立大勳自此之後天下之人益仰戴威德而抒誠恐後矣前聖駕往巡寧夏青海諸台吉即奏請赴行在朝見皇上念逺方蒙古炎暑來朝恐水土不宜特諭立秋之後來京入覲諸台吉欽遵前旨呈報入邊日期臣仰體皇上柔遠之心思外方蒙古初至我疆不諳條例偕西寧道劉殿衡預在鎮海營關口會同欽差喇嘛都統等俟之於安門之地為首台吉扎什巴圖爾彭楚克等大小台吉率其部落頭目而來於九月十八日進邉口後臣等即集諸台吉宴之至西寧後又集於公衙門宴之給以豬羊牛酒等物撥標下官兵送至莊浪交涼州總兵屬下官兵挨次遞送諸台吉至西寧宴會之日官兵士庶無老無幼皆言皇上威德齊天故能統一萬邦亘古以來未有如今世之隆盛者街衢喧頌除將諸台吉來降蒙古數目查明依例造册送理藩院外謹以諸台吉入邊日期奏報命下所司聖祖仁皇帝親征平定朔漠方略卷四十六

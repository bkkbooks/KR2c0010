body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷三十三十一月乙卯班禪庫圖克圖上疏謝恩理藩院奏曰班禪庫圖克圖疏言奉到敕書銀壺銀瓶銀碗巾幣之賜不勝歡忭先是使人內齊傳諭召臣赴京此皆皇上無疆之仁愛也實有欽遵聖旨前往之意三寶可證但臣身尚未出痘疹皆前世之命也畏忌實深而且有鬼沮之或見之夢或見之卜云宜坐禪用是陳情伏祈慈鑒弗罪為幸查得班禪庫圖克圖為敕書銀壺幣物之賜且陳奏其不來原由無庸議者也上從之丙辰檄大將軍伯費揚古詳明報探上諭議政諸臣曰費揚古報文內止稱參領阿爾納伯爾黑奉差偵探還報云職等十月十四日到頽河之和爾博爾津腦兒等處地方見有厄魯特住迹行蹤其日已久是以前行一日因馬乏而返並未視其駐扎之迹竟未詳其人之多寡馬畜廬帳之有無夫去蹤雖日久尚可見也差人屣探者原欲知其情爾兹不驗明來報但開奉差人員之往返勞人勞馬差之何為其檄將軍費揚古嗣後哨探之事務必一一問明條列奏報諭皇太子曰二十七日駐蹕於麗蘇村二十八日駐蹕湖灘河朔漢人稱此為脫脫城此即黃河之岸向彼岸仰射之朕及皇長子新滿洲之善射者射過甚易波流亦緩非南方黃河之比較天津入海狹河尤狹二十九日駐宿是日早鄂爾多斯之王貝勒貝子公台吉等俱渡河來見朕詣河干將河測量其濶五十三丈仰射而過五十餘步於是登舟朕與新滿洲逆流舉棹以試水勢船猶可行惟行船之具不佳不便用力衆蒙古等皆驚訝以為此黃河逆流行舟自我祖宗纍世以來所未有往來過渡試之斷不致飄往下流現流氷澌衆人難以全渡惟冀其早凍耳自古以來過十月下旬未有不凍者京師水泊氷結之日可記之報聞自歸化城至黃河岸一百七十里自黃河岸至殺虎口未經量測到黃河之日初覺寒冷與京師凍河之日相似在此衣灰鼠羊裘狐腋其年老之人衣略加厚厄魯特赤馬一匹遣送皇太子馬甚佳足健而善走又甚調良以豆飼肥更不知若何又此處喀爾喀所産羊或係水土之故甚厚朕故親視用水烹熟因候凍河間暇無事親手執刀去其骨置匣中馳送可恭進皇太后前三十日初一日駐宿初二日早蒙古等來報稱距此地五十里西爾哈地方今夜凍冰二假每假有一里餘我等官長皆以為奇特遣我來今已衆人行走試看若可渡即來奏聞於是令鄉導官特固斯等往視又念此時若送盛京所進之物驛遞勞苦朕此處各種食物皆有但鹿尾鹿舌各五十鱖魚鯽魚赭魯魚到時送少許至其他大魚腥朕所不食野雉亦勿送來此地多而且肥橘子柑子等物雖到亦勿送來果麵諸物此地自寧夏取來食之甚佳雖御用好麵製為餅餌以之相比猶覺稍黑而硬寧夏之麵白而柔細雖多食亦易化葡萄亦佳其名公領孫大葡萄之蒂環繞有小鎖子葡萄曩時常食鎖子葡萄而未見其如此結實亦覺奇異産梨亦佳初三日早遣人渡河將鄂爾多斯王貝勒貝子公等所獻良馬一百二十二匹內四十匹所獻常馬三百匹內一百二十匹令驅赴黃河彼岸馬鞍從船渡過渡時見冰凌貼於兩岸河水比朕初到日不同水波不興與渡暢春園之河相似截流徑渡兩岸蒙古等俱合掌稽首相與約誓云此乃我等纍世所居之地此河尚且如此效靈更有何人於我皇上之前敢萌異志於是乘其馬歷二時布小圍三次果鄂爾多斯之地言語不虛圍獵嫻熟雉復多此地雖有沙岡然皆平阜草多叢生馳騁并無可慮朕自幼聞鄂爾多斯之今親見之圍獵畢申時照前渡河至駐蹕處日暮時庫斯等來奏從西爾哈地方河之上流皆凍伊等往來渡試不致阻誤朕於初四日駐宿初五日向西爾哈渡處移營觀之輜重可渡則渡若稍可虞則駐宿一二日此等事俱繕寫奏聞皇太后宮中咸令聞之丁巳給右衛兵草料先是大將軍伯費揚古奏曰今春進征馬匹短少一到右衛隨調官兵疾行於瀚海之間是以馬愈羸瘦副都統拜布等移稱今催喂馬兵丁一時不能置馬請就近在大同令借銀二十兩補買又奏曰右衛兵冬春兩季原給三匹草料今請增給兵丁各馬一匹為四匹給之草料照大同喂馬例喂養上以交議政諸臣議至是議曰查得近來奉旨著右衛兵丁徐徐置馬又奉旨右衛之兵倘有調用發京城每佐領四匹之馬給與兵丁上駟院馬太僕寺馬共一千五百匹俟回時分撥但蒙皇上矜憐著給右衛兵春冬俱三匹草料為定應於右衛兵不計馬之有無俱給三匹草料則兵丁可以整治器械而資生矣命下之日行文大將軍及右衛統領等以文到之日為始令支三匹草料至大將軍伯費揚古所稱借銀二十兩增馬一匹為四匹照大同喂馬例之請無庸議者也上從之貝勒宋喇卜請於察罕托揮以外捕獵造船許之上諭尚書班第曰鄂爾多斯多羅貝勒宋喇卜奏言察罕托揮以外地方多獸請準臣等捕獵準臣等於黃河造船往來過渡準雇邊內民夫在臣等地方耕田爾可往宣旨準其所請察罕托揮以外捕獵黃河造船過渡戊午駕次喀林托會員外二郎保報䇿旺喇卜灘出兵設哨禦噶爾丹達賴喇嘛遣尼麻唐來奏事議政諸臣奏曰二郎保報稱阿玉奇台吉發兵一千以塞爾濟札卜寨桑領之䇿旺喇卜灘發兵一千以楚呼郎寨桑領之額爾克巴圖爾台吉親率兵千許俱會集於阿爾台以內土魯圖地方駐扎四面設哨如遇噶爾丹將擒而殺之如擒噶爾丹則解送聖上云又達賴喇嘛使人尼麻唐庫圖克圖卓磨龍堪布丹巴囊素達賴汗之使人寨桑及喀爾喀折卜尊丹巴庫圖克圖在西方之喀尊共一百七十餘人十一月十五間可到西寧邊口到則往京城奏請聖安探訪其情言為青海諸台吉之事而來其行甚急如到西寧邊口地方官必阻之此尼麻唐庫圖克圖或有緊急事務亦未可定彼到西寧邊口欲往京城或於此處撥人乘驛帶往或任彼照常自往乞大部奏聞俟文到遵行等語應撥理藩院官一員乘驛往西寧暫止尼麻唐住西寧問明前來之故如有奏章取之而來如當放入尼麻唐等再差人往召如不當放入即遣之歸去亦行文二郎保著止尼麻唐等於西寧併不時探聽阿玉奇台吉䇿旺喇卜灘等備兵出行聲息上曰差官則遲矣著行文二郎保親身問明具奏以給賞黑龍江兵餘銀留將軍費揚古軍前以備兵糧行兵部奏曰大將軍伯費揚古咨稱奉旨賞黑龍江兵銀伍千兩到後即交衆部長買裘帽襦裩牛羊等物陸續解到分給將完所餘二千四百兩原欲隨便再買給與兵丁奉到敕旨始知黑龍江兵更換黑龍江兵既經更換此項餘銀應交何處乞轉奏星速檄知等語查近奉旨點察哈爾兵五百使散秩大臣吳巴什率之給以兩月糗糧赴大將軍伯費揚古軍前俟是兵到後視黑龍江兵內人強馬壯者選留百名其將辨扣兵數留用於前解銀五千內酌給所留一百兵比照察哈爾兩月糧數扣給兩月口糧其餘兵著令歸來欽此應檄大將軍伯費揚古所買現在牛羊如不足黑龍江兵兩月糗糧於此餘銀內採買補給兩月之糧其餘銀兩藏貯大將軍伯費揚古軍前以備軍需上從之以烏拉羸馬發右衛喂養統領鄂克濟哈等奏言驍騎校托雷等自烏拉來所乘馬匹俱已羸瘦不能行矣上曰使伊等附於殷實之人其騎來馬匹交部發右衛喂養上諭皇太子曰初四日晚來降之厄魯特布達里奏稱於十月初四日起程噶爾丹兵千餘數日食用既乏天時寒冽潰散逃亡者甚多亦有死者其領事寨桑土謝圖諾爾布率衆來歸尚未至等語噶爾丹雖云前往哈密今咨訪彼知地勢之人及喀爾喀皆言齊七克那孔俄羅阿即兒漢等處與枯倫白爾七爾相距三日程不過仍繞舊地而行度其情勢難奔他所既無可往之處事更易圖又詳詢之鳥鎗鉛子火蘖已盡鎗亦全無投順之人成羣而來所言甚悉今遣布達里赴京其妻在鄂欣家可令完聚皇太子并與諸臣細問之此一大快事也土謝圖諾爾布係厄魯特大臣此人若來則噶爾丹之行藏即可決定俟來時再諭爾知之此語奏聞皇太后兼恭請皇太后萬安初四日駐宿初五日移營前向河之上流冰堅可渡處己未上渡黃河駐蹕東斯垓辛酉取大同所喂侍衛坐馬至軍前上諭內大臣曰大同所喂新滿洲侍衛護軍執事人員坐馬著監喂內大臣侍衛趕來大小官員自備之馬有願取來聽其取來不欲取來者仍令地方官監喂壬戌駕至察罕布喇克副都統阿南達奏報率兵往駐布隆吉爾等處偵探阿南達奏曰理藩院咨稱奉旨噶爾丹窘迫已極必亡命往投哈密著檄將軍孫思克率其標兵往肅州在阿南達處預備著將軍博濟於西安兵內未行者擇人材矯健者二千亦赴阿南達處與孫思克合如噶爾丹有往哈密聲息即行𠞰滅并將朕自十九日出行及為厄魯特奏報之事皆抄發阿南達使知情形欽遵知會等語臣前者曾在布隆吉爾之杜爾白兒濟等處坐哨偵探如有小隊疾行而過之人相機行事如力不敵則報提督李林隆并力而行會同提督李林隆奏聞率緑旗官兵駐劄布隆吉爾之杜爾白兒濟等處地方因所帶兵丁糗糧已盡不得已於十月初七日撤兵十二日到肅州具奏請旨今聖上周詳籌畫諭旨下頒若臣等仍居肅州遙探消息倘有由塔爾納秦等路疾行而過之人則布隆吉爾有五百餘里必不能追及思布隆吉爾諸處乃係要路今不得顧天寒兵苦是以臣身會同提督李林隆於預備兵內率馬兵八百步兵二百仍前在布隆吉爾坐哨偵探倘小隊經過則相機行事若有往哈密聲息謹遵上諭與將軍孫思克會同而行已於十一月初一日自肅州起程矣其帶去人員米糧交地方官至將盡之日運解上報聞核查撥給西路進征兵丁之馬行兵部奏曰先是議政諸臣會議西路進𠞰之兵或將留駐緑旗營馬或將捐助之馬各給一匹倘取緑旗營馬去則以捐助馬補給之不足則取換茶馬為用又不足則動支正項錢糧採買分給在案今甘肅巡撫送到册開撥給大兵營驛馬一萬二千六百八十六匹此內捐助馬七百三十五匹採買馬六千五百八匹換茶馬五千四百四十三匹當照數補給等語此無庸議者也應仍檄該撫將買馬價值及交收茶馬日月作速開造清册呈報該部以慿查核上從之令軍中謹慎火燭上諭內大臣曰草甚叢密各當嚴禁火燭恐上風失火御營有何可慮但為衆人耳著通行曉諭又今日出獵有願步行之人許其步行僮僕一概俱令步行野甚多大臣馬多者俱乘馬在前排圍其騎官馬之人及馬少者僮僕人等俱照哨鹿例在乘馬人後步行排圍野甚多使各殺之為食甲子上駐蹕胡斯泰噶爾丹之寨桑土謝圖諾爾布等來降土謝圖諾爾布等來降後上諭皇太子曰前諭原欲渡什爾哈已凍渡口初五日向黃河上流行十八里至喀喇音托揮之地見黃河已凍遂駐蹕於其地鑿冰驗之已有一尺甚堅乃分三旗使三路墊土初六日輜重皆渡其東六里以外亦未凍西三里以外亦未凍衆蒙古訝云向來黃河之凍自北方寒處凍起如此溫暖河皆不凍獨在中間結成厚冰不但未見亦所未聞渡河後晚下營王貝勒貝子公之母與妻俱來朝朕至鄂爾多斯地方始知鄂爾多斯皆有禮貌其規模略不失舊時蒙古大理六旗王貝勒貝子公台吉俱和睦如一體不分爾我盜賊全無駝馬牛羊不必防守或有馬走失兩三年者他人獲之亦不隱藏解之部長令原主識認王之母貝勒之母俱非生母彼敬其母比生母更甚殊雅馴他蒙古見之當愧死鄂爾多斯生計周全牲畜蕃盛良馬亦多雖比察哈爾生計略有不如較之他蒙古殷富逺甚其騎射之法雖不佳美已極嫺熟多能中的此地黃河石花魚甚多口內亦來獻蒙古亦來獻甚新故肥美皇太后不食大魚故不遣送朕及諸人在此習久水土甚佳食物柴薪豐饒人皆相宜且不甚冷向朕與諸人在克魯倫河四月間所服之衣今猶可不用京城小寒身內覺冷噤斯獨不然亦一異處但自兹以後未知其寒何如耳初六日駐蹕東四海驛初七日仍駐蹕於此是日撥置鄂爾多斯所貢馬駝諸物初八日仍駐蹕於此初九日移營十四里駐蹕於察罕布喇克此數日揀視鄂爾多斯所獻之馬皆極佳而馴鄂爾多斯規矩取馬不用套竿趨入隨手執之未見有一用套竿者幼齡諸皇子可騎之馬亦有之初十日移營十九里駐蹕於呼斯臺十一日仍駐此休息朕此行原欲有所為今間居而天復不寒惟就水草移營以俟噶爾丹困斃消息收納降人朕獲肥雉三十乳酥一匣獻皇太后餘俱照單付去此處肥雉甚多恐纍驛馬故不多遣十一日發報後厄魯特降人吳山泰到細訊之彼於十月初六日逃來其所言與朕所遣赴京人無異但云噶爾丹差察罕古英寨桑來奏事已備馬匹如其果真今已將近正問未畢噶爾丹大寨桑土謝圖諾爾布到此乃彼要人所知情事甚悉細詢噶爾丹困蹙是實是月必見端緒其餘大略如前又言前定意往哈密今聞阿南達率兵阻截蓋已不往有居薩克薩特呼里克之狀視其人頗佳材貌亦偉帶來人八十口如噶爾丹遣使來朕亦酌遣使往朕在此想可坐待噶爾丹困斃也噶爾丹既無生路時屆嚴寒步行者多今將何往譬猶檻中之獸必自斃矣為此星速遣諭知之其以此奏聞皇太后并傳知宫中諸大臣咸令聞之乙丑駕次華拖羅海使侍郎滿丕郎中桑格駐喀倫探噶爾丹聲息上諭議政諸臣曰視厄魯特人携妻子來降則噶爾丹窮困已極但噶爾丹乃極狡之賊恐彼不得已來降乘我兵不戒勢力寡薄竊奪零散喀爾喀財物軼去應著侍郎滿丕郎中桑格往善巴王喀倫地方駐扎不時差人出喀倫外偵探如有聲息即收喀爾喀入喀倫內越大將軍營安插一面星速馳報前已有文檄知令滿丕等到彼後口傳旨諭大將軍伯費揚古可也丙寅設哨於要害以禦噶爾丹先是上諭大將軍伯費揚古曰聞右衛兵歸來遣侍衛馬武驅牛羊以迎之二十四日朕躬迎至渾津村二十五日賜宴各湊給三日米行餉三兩其兵已疲甚矣見彼徒步委頓形狀不覺慘然朕親閲視下及兵丁飼以飯餌肉食飲以茶酒自大臣以下兵丁以上歡聲動地前聞調右衛兵朕灼知此軍斷不能行雖匍匐而往不能到指示之地故朕以現喂馬駝之力比量噶爾丹之力携來行事行至途中聞丹濟拉退去又遣朕所帶察哈爾兵五百給百日糗糧往換黑龍江兵朕駐蹕歸化城十日未嘗用歸化城抄撮之米每見降人再三細問俱言噶爾丹向哈密去矣如果往哈密朕意中以為擒之益易哈密距嘉峪關十日程是以朕意欲將朕所帶兵環居寧夏朕入寧夏如有調度就近相機而行務獲噶爾丹殺之朕心始畢但朕啓行後噶爾丹丹濟拉等來降爾等力薄右衛兵無馬朕是以躊躇欲與爾商爾等可議定具本速奏朕駐蹕湖灘河朔俟爾覆奏大將軍費揚古回奏曰十月二十九日奉到諭旨悉知聖意矣皇上前者軫念右衛官兵全免所借官庫數十萬銀兩其陳亡病故得傷人等不俟議敘格外重賞下逮僕從資其生計官兵於此雖肝腦塗地不能仰報今皇上又差侍衛馬武驅牛羊迎軍駕臨渾津村大宴官兵聖躬親閲下逮兵卒飲之茶酒食之飯餌肉食又給米及行餉三兩洪恩浩蕩誠亘古以來所未有也臣等不勝感激不能措辭奏謝此地黑龍江官兵蒙古扎薩克喀爾喀等聞之無不同聲歡呼者今降人俱言噶爾丹往哈密皇上以隨駕兵繞寧夏駐扎倘有調度就近相機行事御駕啓行後噶爾丹丹濟拉來降臣此地力薄右衛兵無馬為此躊躇下頒諭旨誠是也竊思太原不逺應調太原滿兵及晉撫標下騎兵共一千及大同殺虎口不出征騎兵五百遣至臣處與臣等此地察哈爾兵總計可得二千噶爾丹困極不得已來詐降竊取馬畜亦未可定果噶爾丹丹濟拉等由此路來降有詭詐之事即以此衆行𠞰又善塔卜喀倫外地方水少俱係小泉又因盡凍難以飲馬是以臣等來至喀喇穆冷等處駐扎十月二十八日喀爾喀善巴王到傳旨諭臣率彼之兵回探聲息請遵旨遣善巴歸去令彼預備其喀爾喀俱駐喀倫外應令昆都倫博碩克圖王汪舒克公吳巴達公扎薩克台吉哈灘巴圖爾滚占吳爾占丹津額爾德尼圖巴汪舒克衛徵帶青台吉凱木楚克等共四百餘兵亦俱發回本地預備各撥能事人員逺逺探聽倘有聲息一面速報臣等一面令諸部長親身率兵速赴臣等軍前奏至上諭大將軍伯費揚古曰覽爾二十九日奏欲調太原府兵晉撫標兵一千大同殺虎口未出征騎兵五百朕思太原府兵未嫻行陳且至歸化城殆將千里緑旗兵皆騎馬一匹此嚴寒之時即能得到已不自支緩急用之必至誤事是以將朕所帶火器護軍一千炮手二百四十前鋒二百六十共足爾所調一千五百之數為爾預備目前馬甚肥衣亦厚此兵乃與朕同行之兵故極嫻熟朝聞其信晚即可行朕暫駐蹕於此急俟噶爾丹實信今若來降即交善馳人員星速遣至行在如有噶爾丹來降之信若不速檄喀倫外喀爾喀信其降而坐待之則誤大事不淺矣近來丹濟拉差人請降而又犯糧可為明鑒今不得復誤當敬慎逺籌費揚古覆奏曰皇上洞鑒訓諭極當俱宜謹識遵行但喀爾喀人等在喀倫外迤邐居住相隔踈逺恐報信有誤是以臣等備文傳諭喀爾喀親王善巴多羅郡王滾布等衆部長曰今噶爾丹困迫已極爾等當各按本旗汛地復過瀚海住險要之地以材能之人為首領使之哨探倘有聲息一面速來報知軍中令各部長率兵殿後輜重居前作速移入喀倫內恐噶爾丹丹濟拉詐降輕騎行劫亦未可定如哨探怠玩或失一牲畜有誤聲息近到某旗退而歸去吾必指參至遣哨之時務選人強馬壯者以速報為要上命以此疏示諾木齊岱曰與朕諭諾木齊岱之旨無異也己巳駕次浙固思台大將軍伯費揚古奏報遣侍郎滿丕等坐哨於他拉布喇克先是往解厄魯吳山台之撥什庫根忒傳旨諭大將軍曰噶爾丹窮困已極應令侍郎滿丕等往善巴王喀倫地方駐扎為此口傳費揚古知之費揚古奏曰查前令喀爾喀親王善巴等諸部長各於本旗汛地復過瀚海住形勢之地以才能人員為首領哨探倘有聲息星速來報令部長等親率兵護其輜重遷入喀倫內已經奏聞在案今又奉諭旨故臣等遵旨會議令侍郎滿丕郎中桑格往喀爾喀遊牧地方以外瀚海以內沿他拉布拉克駐扎探聽於是月十四日遣行矣上報聞庚午噶爾丹遣格壘沽英來議好大將軍伯費揚古奏曰王善巴差長史伊白根來報噶爾丹使其下格壘沽英等二十人乘駝二十馬二十言來議好奉有軍令止厄魯特在喀倫外枯卜地方先遣來報近者奉旨噶爾丹遣使來如一人則作速遣赴行在如二人則遣一人回天時寒冷令携衆而來其一人作速遣赴行在今欲使噶爾丹使人即赴行在但傳報者僅有議好之語并未知其何意遣使是以不便遽使之來使窺見我營壘於是差人知會侍郎滿丕親身就見厄魯特使人或有奏章取來驗視如無奏章問明速報俟差員歸日另奏外此際倘皇上有訓旨臣請遵而行之上命議政諸臣集議隨議當速檄大將軍伯費揚古將格壘沽英本身及一僕人撥官一員星速乘驛押來本朝所差厄魯特津巴等如與伊等同至則皆遣行其餘厄魯特暫留枯卜地方如有奏章取來呈驗上從之且云格壘沽英寨桑等如未到費揚古處不得使見營壘亦不得令見費揚古逺逺從外而來增學士朱都納喂馬草料大學士阿蘭泰尚書馬齊奏曰學士朱都納疏稱户部等衙門準馬一匹給草一束倉升料二升視茶換之馬甚瘦若不加草料喂不能肥一面酌加草料用心喂肥使不誤調用馬肥後減其草料至奉旨馬七千匹今但有五千匹請檄李學聖有茶換之馬再增解二千匹等語查宣化府等處喂馬照京城喂馬例每匹七斤草二束倉升豆八升喂兩月後減去二升喂以六升又一月再減去二升喂以四升應準朱都納等所喂之馬照此例與地方官會同小心喂養現有解到馬五千匹可以敷用其二千匹不必往取上從之副都統阿南達擒噶爾丹族姪顧孟多爾濟來獻阿南達奏曰十一月初七日哨卒來報見有飛塵臣等率兵往邀其來路因彼已過追百餘里及之於素爾河邊皆拘之其達賴喇嘛使人達爾漢鄂木布青海博朔克圖濟農使人阿爾達爾寨桑彭楚克台吉使人寨桑和碩齊言達賴喇嘛苐巴青海諸台吉遣我等通問於噶爾丹我等到噶爾丹所而今歸去現有噶爾丹使人與我等同行查噶爾丹使人喇克巴彭楚克格隆索諾木喇什拉木扎木巴衛徵陀音等男婦子女五十餘噶爾丹族姪顧孟多爾濟本身及其男婦子女三十許又什賴古爾卓里克圖等三台吉本身及男婦子女十餘言我等奉噶爾丹差答使於達賴喇嘛苐巴青海諸台吉我等自噶爾丹所居庫冷白兒齊爾於十月初五日出門而來我等出門之時噶爾丹丹濟拉向白格爾察罕厄爾格移營有兵千餘阿拉卜灘在扎巴喀滾占有兵千許丹津鄂木布與噶爾丹不睦在塔米爾散去自特勒兒濟被聖上大兵擊敗而遁我輩無住居無冬衣絶無牛羊生計已窮但能就近蹢躅遷移而已青草未生之前此冬寸步難行若至來春下人死亡離散是實難以為國矣今差格壘沽英使於聖朝竊思皇上灼見其窮困情形周詳籌畫使禦之於布隆吉爾等處果如聖意即獲達爾漢鄂木布欲交官兵解往恐路近青海之人事生意外亦未可定是以臣阿南達親率兵為殿全押至肅州交鴻臚寺檔子房官綏黑圖遣達爾漢鄂木布前往外餘俱拘禁肅州候旨其噶爾丹送達賴喇嘛書十四封一并呈奏上以示議政諸臣上諭皇太子曰十二日駐蹕於花託羅會十三日駐宿是日上駟院侍衛瓦色阿薩納送馬至薄暮閲馬俱肥壯與朕帶來間日更替騎乘之馬相似我軍之馬皆未甚瘦尚有極肥者觀此時甚與駝馬相宜十四日駐宿將鄂爾多斯所獻之馬揀擇始畢發御馬羣七十一匹大馬羣六百十一匹駱駝一百四十三隻十五日駐宿是日甚暇無事將我軍中歌者鄂爾多斯之歌者及厄魯特之歌唱彈箏者二人令之歌其厄魯特之歌者雅克西云我年六十五歲厄魯特四部落之主皆曽見之今見聖主至德全備仁慈無所不周恩惠無人不洽諸藩蒙古咸加撫恤不棄貧賤我舊主則不然一切人皆不令見惟自尊大而已由此觀之興主真天縱之人也十六日駐蹕於即格蘇台十七日駐宿是日報至即遣回朕今循河岸而行歇息馬力以俟音信可將此奏聞皇太后并宫中咸令知之諸皇子亦令知之上又諭皇太子曰朕躬安善汝佳否來人於十六日早到諸事悉已奏聞皇太子所問甚周密而詳盡凡事皆欲明悉之意正與朕心相同不勝喜悅且汝居京師辦理事務如泰山之固故朕在邊外心意舒暢事無煩擾數時優間冀此豈易得乎朕之福澤想由行善所致耶朕在此凡所遇人靡不告以汝之如此盡孝以事父凡事皆誠􅈤肫切朕亦願爾年齡遐逺子孫亦若爾之如此盡孝以敬事汝矣因洞悉汝諸事敬慎故書此以寄辛未副都統西爾哈達費揚固瓦爾達祖良璧馬雲霄等奏請隨將軍博濟出兵𠞰滅噶爾丹西爾哈達等奏曰臣等叨沐皇上洪恩捐糜頂踵不能仰報兹奉旨云今噶爾丹窘迫已極必亡命走哈密著將軍博濟擇西安兵內未出征人才強壯者二千赴阿南達所與孫思克會齊倘噶爾丹有往哈密聲息即行𠞰滅欽此思博濟現率兵往肅州臣等願出兵效犬馬之力以報皇上髙厚之恩上曰西爾哈達費揚固瓦爾達祖良璧馬雲霄內著將軍酌量帶往上諭皇太子曰十九日我師已駐宿時費揚古伯急報奏章至閲知噶爾丹遣人乞降兹以費揚古所上章急令聞知故遣馳報可奏聞皇太后恭請慈安宫中並使聞知宣諭諸大臣兹事雖未明悉朕自有裁度汝等勿慮朕嘗謂噶爾丹破滅已盡以今觀之斯言殆適合也為此諭知癸酉賜噶爾旦多爾濟白金噶爾旦多爾濟遣使阿約請上安上諭尚書馬齊曰厄魯特之噶爾旦多爾濟貧苦在此地賜銀則路逺而難馱俟主事華善到甘肅後於地方官支銀千兩賜噶爾旦多爾濟其銀即交其來使阿約賫往賜阿約銀三十兩其同行兩人各賜二十兩督運于成龍等以運米之便效力坐塘先是于成龍等自備馬駝車輛自脫脫城裝載米一千五百石運往喀拉穆冷諭尚書馬齊曰著都御史于成龍等運米之便就近助馬坐塘效力至是于成龍等運米到喀拉穆冷交大將軍後自喀拉穆冷起各自分塘效力侍讀范承烈在第十四站侍郎李鈵在第十三站都御史于成龍在第十二站原任侍郎王國昌在第十一站大理寺正卿喻成龍在第十站光祿寺正卿辛保在第九站左通政使喀拜在第八站俟更替官員到後始還命安郡王馬爾渾撤兵先是行兵部奉旨檄安郡王云大將軍伯費揚古兵少著安郡王等齊赴大將軍處文到即起行至瀚海外呼爾都圖地方已與大將軍會續奉諭云安郡王出行日久著伊等回暫居歸化城安郡王等遂往歸化城至是聞駕駐鄂爾多斯哲固斯臺前來請安上曰是軍出外日久著歸家甲戌將軍博濟奏報選擇西安寧夏駐防官兵前赴肅州博濟奏曰臣等奉旨將在家兵中未經出征人材壯健者選擇外現有滿洲漢軍八百名在寧夏駐扎西安肅州相去三千餘里寧夏肅州相去二千許里肅州近於寧夏是以於寧夏官兵內視人材壯健者足撥二千名之數其名缺將西安官兵撥補寧夏上命該部知之召大將軍伯費揚古商議軍機費揚古奏曰噶爾丹自抗天威大敗逃遁以來厄魯特之人絡繹來降不絶丹津鄂木布與噶爾丹反顔而去杜噶爾阿拉卜坦分異而處近有諾爾布寨桑等人數起携其妻子來皈聖化而不能禁止以此觀之人心不定散亂已極噶爾丹及其下逃死餘生有限數人罪惡貫盈上天舉以畀之皇上即在旦夕其事顯然但蒙古之性易於煽惑而頗輕信噶爾丹者原一狡猾之人彼自知不能保其餘衆故遣格壘沽英等二十五人借通使為名欺誑目前以暫慰之格壘沽英等歸去後必揑造種種詐偽之言以欺罔之未必非安慰人心求逺逃逺遁脫身藏身之䇿也請將噶爾丹所遣格壘沽英等拘之入內且勿遣回使噶爾丹以下人等猜疑擾亂今年聖上親率大兵來臨厄魯特大敗心膽碎裂不能保其妻子破壞已極今鼯鼠跳梁無所藏身聖上簡選士馬付託賢能討噶爾丹𠞰而滅之乘此大兵起行之時隨遣格壘沽英歸去此際如噶爾丹悔悟而即來降一惟皇上成算作何裁度似於行兵之機滅賊之事少有禆益又思厄魯特原係纍世職貢天朝之部落噶爾丹賦性凶頑包藏禍心侵擾喀爾喀悖叛天朝之賊寇則噶爾丹所遣格壘沽英等不比他國之使即將格壘沽英等竟不遣歸未為不可如竟不遣伊等歸去則於厄魯特先降人內擇其心實語明妥幹者一二人細細指示令傳告皇上待厄魯特降人眷顧寵榮之事揚言格壘沽英等不願歸去之心設動搖厄魯特人心之計使之遊移迷惑今正當厄魯特生計窘迫之時人心互動未必不事出意外誅噶爾丹而獻之也奏至上曰著大將軍伯費揚古減從乘驛星速前來商議軍中機務此時將軍事著舒恕暫理使前鋒參領阿魯等偕貝勒宋喇卜運糧多羅貝勒宋喇卜奏請效力運糧既派出押運上諭尚書馬齊曰與貝勒宋喇卜同行者以前鋒參領阿魯一等侍衛巴兒楚喀為首領伊等之糧雖貝勒宋喇卜已經給與恐有不足亦未可定著交阿魯銀百兩不足之時補用滿人從來穀食不可缺米倘米已完著於寧夏支取口糧如馬疲不能行於學士朱都納馬內換騎交疲馬喂養上諭皇太子曰十九日遣報時親近侍衛阿南達奏章適至噶爾丹遣往達賴喇嘛及瑚瑚瑙兒處之心腹喇嘛索諾木拉西等俱如朕所指示堵截之盡皆擒獲故將其原奏章謄寫發往共人一百六十口馬八十餘匹駱駝百餘隻駝馬俱瘦食物皆盡從噶爾丹處行經一月於蘇爾河地方擒獲噶爾丹遣往西域書十四封欲皆翻譯洞悉其情然後報知故未即發十九二十兩日譯畢觀彼將破敗困迫情狀俱行掩􅎖極其無恥卑屈至於不堪譬之掩耳盜鈴曽不知逹賴喇嘛瑚瑚瑙兒聞之已久矣十四封書雖無用亦俱謄寫發往可將此繕寫奏聞皇太后宮中皆令聞之滿洲大臣令其親看特諭二十日晚駐營時阿南達又遣俄齊爾圖車臣汗之孫噶爾旦多爾濟所使阿由寨桑賫奏章前來亦謄寫發往皇太子欲知始末情事問阿爾尼自悉矣又諭戊寅以大義開諭噶爾丹使人格壘沽英是日駕自胡斯泰起行噶爾丹使人格壘沽英至上即佇坐山岡上引格壘沽英近坐不介一人賜茶詳問噶爾丹情事諭之曰朕為天下元后萬國一家今日科爾沁諸王貝勒台吉及喀爾喀厄魯特皆在此朕將公言之喀爾喀厄魯特向皆職貢本朝之國朕並無所偏徇喀爾喀土謝圖汗執喀爾喀扎薩克圖汗而殺之又殺汝主噶爾丹之弟喀爾喀之罪也喀爾喀後為爾國所敗爾來歸朕朕憐彼十萬餘身命失其生路受而養之凡有人急迫來歸朕者朕皆收養無分彼此不但喀爾喀已也即爾厄魯特今為敵國有來降之人朕皆恤之各使得其生路量材授之官職雖俘虜之人皆贖其妻子完彼骨肉朕豈有喀爾喀厄魯特之異視乎前以噶爾丹無故闌入我境侵內地蒙古朕遣兵敗之於烏闌布通之地爾主噶爾丹窘極遁逃立誓不復犯邊朕向以至誠待人故不遣兵窮追爾主噶爾丹逆天背誓離其故巢至我克魯倫之地掠納木扎爾陀音朕乃不得已率兵而出然仍再三遣人約噶爾丹會盟修好此朕不嗜殺之心也爾主不自引罪朕始整兵進討爾主噶爾丹不能抗朕之威日夜奔逃遇我西路預堵之兵仍因汝噶爾丹先我攘臂我師乃進戰大敗之汝今窮困至此極者皆汝所自取也朕曽往陵之否爾來為使苐公言之毋隱格壘沽英初與諸大臣言猶支吾巧辨及聞皇上諭旨傾心降服叩首奏曰誠天下之聖主也語皆逈異我厄魯特無知但貪得喀爾喀子女財物今聖上闡發大義大理始知天意無私及我厄魯特之罪矣現有沙克朱木諾爾布等人皆近日來降較在我國時更加榮顯誰不願歸洪仁之內吾主亦不日與喀爾喀同列矣上笑視近臣曰此言甚公雖外國之人亦知理也衆蒙古王貝勒台吉跪而奏曰皇上諭旨炳如日月噶爾丹雖昏迷無知不從仁化特自取其死而已賜格壘沽英裘帽駐蹕東斯垓己卯使備禦西路以𠞰滅噶爾丹上諭議政諸臣曰欲盡滅噶爾丹尤以備西路為要除西安調至二千滿兵之馬緑旗兵之馬李學聖解到五千之馬外其後有換得馬匹應撥賢能官會同巡撫於甘肅等處喂養敕撫噶爾丹諸人上諭議政諸臣曰天下當以仁感不可徒以威服今朕原無征噶爾丹之意皆噶爾丹之所自取喀爾喀厄魯特向皆職貢本朝之國因土謝圖汗殺喀爾喀扎薩克圖汗又殺噶爾丹之弟釁從喀爾喀起此喀爾喀之曲也逮喀爾喀為厄魯特所敗奔走無路前來投朕朕憐喀爾喀十餘萬生靈受而養之後噶爾丹無故興兵直入我境內鴟張橫行曽遣兵敗之於烏闌布通之地時噶爾丹窘甚誓不復犯我邊疆朕是以不遣兵窮追頃噶爾丹怙惡不悛背棄誓言輒離故巢竊伏克魯倫之地窺伺我邊徼朕猶不念其惡遣人約之會盟歸好噶爾丹反侵掠我降人納木扎爾陀音朕不得已統兵出塞然朕尚不忍即加鋒刃再三遣人開示利害噶爾丹迷謬不悟朕方整旅進討噶爾丹懾我軍威星夜亡命而朕早遣西師堵截與之相遇亦係噶爾丹先攘其臂故我兵奮擊遂至敗亡此噶爾丹先來犯我曲在噶爾丹也且噶爾丹如此凶暴朕惟待以寬仁噶爾丹如此姦狡朕惟示以誠信嘗覽經史云惟仁者無敵今噶爾丹窮迫已極遣格壘沽英前來乞憐朕意仍欲撫之諸臣奏曰噶爾丹逆天違誓極姦極狡凶惡貫盈真世所難容神人共憤而我皇上尚不忍誅滅仍欲聽其歸順此真天地好生之心且彼來降諸將皆列之大臣侍衛親任不疑其餘降人亦皆分𨽻旗隊俾獲生理又查我軍及蒙古軍所俘厄魯特子女皆發內帑贖與完聚陸續來降之厄魯特又以天寒皆換給裘帽如此浩蕩洪仁實從古所未有臣等竊謂噶爾丹雖頑悖必來歸聖化矣上曰古之將帥雖善用兵多戮已降或其身不得善終或子孫不昌此皆好殺之明戒也又古之人主或窮兵黷武好大喜功朕意不然惟願宇宙雍熙四海升平家給人足各得其生而已故今仍欲遣格壘沽英回噶爾丹處著司官一員筆帖式一員賫敕往撫噶爾丹丹濟拉等可速撰敕呈覽諸臣派擬理藩院員外博什希筆帖式常壽往撫噶爾丹等併敕書進呈御覽上報可敕曰皇帝敕諭噶爾丹博什克圖汗台吉丹濟拉等前一次遣察哈代又一次遣曼濟賫去敕開爾等如引罪來降則朕並無異視概為矜恤務使得所爾屬下厄魯特亦得見其妻子各安其生朕斷不念爾等所造過惡當詳計之有能收養汝等之人否今已無所歸矣爾等其率所餘厄魯特作速來降朕必使爾等富貴各得其所今若仍不悔悟聽匪人之言後悔難追毋疑毋懼亦已明白開諭汝等矣今爾噶爾丹博碩克圖汗丹濟拉又遣格壘沽英奏曰蒙大霈恩綸不勝歡忭意必大加恩恤故遣格壘沽英覆奏朕以諸事詳諭格壘沽英遣之歸去前二次遣諭汝等敕內開載甚明但遵前旨速降之外更無别旨為此特差員外博什希八品筆帖式常壽賫敕前往特諭上諭皇太子曰二十五日之晨噶爾丹所遣格壘沽英至較之朕昔年見時藍縷憔悴宛如老乞丐詳問其情狀噶爾丹之欲降蓋其實也其地之寨桑頭目人等附書者亦甚衆具言此事丹濟拉慫恿倡説又以事關重要特為詰問噶爾丹之意見於言詞其生計困蹙情事其説甚長不備書惟以噶爾丹之來降實情書寄可照前奏聞傳知臣謹按天地之大德曰生故雨露固所以涵濡而風雷亦歸於煦育我皇上總六師以行天伐義惟戢暴而意主好生其叛也則討之其乞降也則納之蓋聖人之心天地之心也以戮降嗜殺為鮮終故餘黨脅從並歸肆赦以窮兵黷武為炯戒故渠魁悔過亦豫生全曰寬曰仁曰誠曰信洋洋聖謨誠萬世所當取法也庚辰上自東斯垓回鑾是日將遣噶爾丹使人格壘沽英還上諭格壘沽英曰爾還語噶爾丹凡事務必覿面會語不然則事無終局彼如不來朕必嚙雪往討斷不中止朕在此地行獵待爾限爾七十日內還報如過此期朕必進兵矣正立限遣發之時包衣大達都虎奏曰御用米糧將盡矣當即還師上甚怒諭曰達都虎之奏搖惑衆心即當斬首如糧盡則取湖灘河朔之米可也何慮之有糧雖盡朕必嚙雪窮追噶爾丹斷不回師宣諭之後又將往幸邁達禮廟遣鄉導修路於是諸軍皆不悅既遣格壘沽英復使人隨之出二十里外歸報曰去已絶逺矣上遂傳令還師衆皆大悅臣謹按噶爾丹敗於昭莫多全軍盡覆餘黨亦潰又恐我進兵其衆駭散故遣格壘沽英來請和好以緩我師皇上洞照其情因彼求和隨降敕招撫付來使格壘沽英賫回遣行之時又有務必嚙雪窮追噶爾丹之諭且嚴責達都虎糧盡還師之請隨發鄉導修路特欲使格壘沽英以皇上追討噶爾丹斷不中止之意歸告其衆使噶爾丹聞之驚駭並令其部曲潰散之計時無一人知者於此益見皇上睿慮深逺謨略精詳非衆人所能識也駕次黃河西界薩爾虎拖會以瘠馬發牧厰喂養上諭內大臣曰羸瘦馬駝明日一宿後日遣往大同彼地現成草料甚多著查大臣侍衛官員執事兵丁羸瘦馬駝酌撥大臣侍衛送往喂養辛巳寧夏營馬缺額照數補足行兵部奏曰寧夏總兵官王化行疏稱噶爾丹正在逃竄無定之際倘一時有可滅之機或近某口得其聲息其地官兵即可前進𠞰滅是以沿邊兵馬乘時全備方可濟倉卒之用但征行俱賴馬力今河西營之馬因出征倒斃缺額甚多臣屬下額馬所缺千匹現存之馬俱逺征才回額既缺而皆瘦倘有滅噶爾丹之機倉卒用兵不能深入坐失事機等語查陜西營馬缺額俱以茶換之馬給之今該鎮既稱馬少而瘦不能乘機深入應將此缺額一千之馬著總督吳赫行文茶馬衙門除交付學士朱都納之馬外以茶換之馬作速照數補給如有不足急支錢糧採買補給至河西各營出征倒斃缺額之馬著該督查明亦作速補給勿誤馳驅之務造清册報部又疏稱該營馬所需春冬二季草料舊例將本汛徵收者撥給如草不足照時價估算以銀給兵丁令其自行買喂屢經估算呈請奉部駁回每年於布政司支給兵丁至三十五年草料留於寧夏為駐防大兵之用故折給本色今大兵尚未來駐寧夏祈暫那上項草料給之等語查此項馬草户部俱照該督撫原奏定數每束自五釐至一分已於藩庫支給其三十一年不足之草該撫奏請每束二分三釐至二分五釐從多估算户部以為價值過浮著核減再奏行文在案今該鎮既稱三十五年草料留於寧夏以為駐防大兵之用故全照本色估給今大兵尚未來駐寧夏乞暫那給應行文該督撫如其所請動支上項草料分給如或不足採買應付不得有誤上項草料仍照數採買補完原項預備上從之聖祖仁皇帝親征平定朔漠方略卷三十三

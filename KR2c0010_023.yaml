body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷二十三五月丙辰朔自察罕布喇克起行上諭曰察罕布喇克地方草已無多後三旗兵前來不必在此安營過此八九里有水泉處令其駐扎上諭行兵部曰內府管駱駝首領郝尚圖等星馳運米到此著傳諭八旗夸蘭大每旗給米各三十石古北口宣府緑旗兵給二十二日米及牛羊其米經留貯不敷八十日者亦著補給是日上駐蹕拖陵布喇克上諭兵部曰前曾令後三旗兵於明日至察罕布喇克駐扎一日後日至拖陵布喇克今不必令其駐察罕布喇克令明日至忒克布喇克地方後日至拖陵布喇克兵部隨移文鑲紅正藍鑲藍旗大臣等知之定隨營牧馬法內大臣等奏言防護馬羣甚屬緊要先到之前鋒兵及漢軍察哈爾營所設防護人內應將現在此處五旗每旗派護軍五十人增入周圍防護再每旗各派大臣一員宿於各旗防護之處御營內領侍衛內大臣及護軍統領等仍照前輪班行走今既逼近厄魯特竄處之地御營內既添設宿衛其防護等處不必著侍衛及內府護軍前往奏入奉㫖甚善侍衛及護軍等皆不令往亦為未可伊等各有馬匹無人看守且牧馬處有信息亦須令其來報應著三旗內合派侍衛九員內府護軍十五人前往又傳諭曰馬匹最為緊要嗣後安營不必向南宜各隨其方惟視有水處周圍環繞令兩黃旗居御營後其餘悉照旗分次察哈爾兵漢軍火器營兵又其次緑旗兵於御營外環立大營勿令踐營中之草其馬匹則白晝於各旗營外近處牧放至夜若有消息即收入營內斯馬匹不艱於水草而兵行甚為有益著議政大臣㑹議具奏議曰上諭極是如此則營制堅固而馬匹於水草不致艱難兵行良有裨益應即遵㫖行從之酌留人馬於拖陵以原任尚書杭愛領之上諭內大臣索額圖尚書班第曰步行厮役及羸瘦馬匹應留於拖陵地方著留總兵官白斌標下緑旗兵二百名馬進良標下緑旗兵一百名令其踞水濬濠築壘扎立一營擇曉兵法能管轄大臣令其總管杭愛人材壯健堪任管轄著留杭愛於拖陵地方令其總管總兵官嶽升龍所領兵二百名人材壯健著撥給白斌以補所留二百兵之缺又八旗滿兵內有馬匹疲憊不能前行者亦應察明留之又遣使往噶爾丹時應將所擒厄魯特四人發回著一併㑹議具奏又諭議政大臣等曰喀喇沁王扎西公沙木巴喇錫等亦有步兵此兵或留或否著問明扎西王等㑹議具奏議得問扎西王等據扎西王云我所屬步兵須盡帶去不留於後公沙木巴喇錫云我旗下趕車步兵共七百名今現到者惟一百十八人其餘俱未到此數內五十人我等料理帶去其餘六十八名及未到者盡行留後應俱照扎西王等所言行奉㫖公沙木巴喇錫所留之兵著交杭愛其餘知道了理藩院奏拖陵地方所留喀喇沁公沙木巴喇錫旗下趕車步兵六百五十人內現到六十八人俱無口糧應將噶禮所運米糧給與其後至者若有餘米令其食用若亦無口糧則令左都御史于成龍原任尚書杭愛量其食用將後至車內米糧給與奉㫖依議著再留牛十頭羊一百隻若有米時則不必用其已斃者食之在後米糧陸續可到若未到不能接續即將牛羊節省食用著明白交與杭愛丁巳酌留人馬於拖陵併縱所俘厄魯特議政大臣等奏今大兵進征𠞰滅噶爾丹其步行厮役羸瘦馬匹一遵上諭留於拖陵地方應留總兵官白斌標下兵二百名馬進良標下兵五十名令其踞水濬濠築壘扎營此所留兵丁應酌派官員著原任尚書杭愛留於拖陵令其總管又八旗滿兵內有馬匹疲憊不能前行者亦令各營大臣夸蘭大等查明奏留先經㑹議到拖陵地方時再行遣使往噶爾丹處今遣使往噶爾丹應將所擒厄魯特四人一併放回或於本月初二日初三日遣往候㫖定奪奉㫖依議著明日遣去命免官兵所貸俸餉上諭議政大臣等曰這次中路西路兵所乘馬人各四匹內借官庫銀買者幾匹出私槖買者幾匹著移文尚書馬齊令文一到即將馬主姓名一一察明存案又傳上諭議政大臣等曰這次中路西路兵所騎四匹馬內有借庫銀買者著盡免還庫佐領下兵丁各出私槖買給出征人者著官給馬價即通行曉諭又諭曰出征護軍校及護軍等俱得官馬大臣侍衛等馬匹牲口俱各自備自出師以來俱於斥堠防護等處行走衆皆獲有恩賞惟大臣侍衛及內府官員並無可賞之物著將大臣侍衛內府官員等起程時預支八月一季俸銀俱免扣除又命總兵官嶽升龍等戍官兵退縮者先斬後聞上諭行兵部曰征討莫要於法令奮勇登先者錫之恩賞怯懦退後者議罪俱繫定例嶽升龍馬進良白斌等人材壯健饒有韜略繫簡選任用之人其所帶來官兵皆願效力具呈來者今已逼近厄魯特噶爾丹若遇敵交戰時副將以下至兵衆人等有退怯違令者著該總兵官正法奏聞嚴飭督運于成龍于成龍移咨行在兵部內開兵部咨稱四月二十七日傳諭今中路大兵已逼近噶爾丹西路大將軍費揚古兵亦已甚近大兵糧餉關繫甚要兩路大兵合在一處則需用糧餉甚多著速行文于成龍令其多方設法將所運之米作速運至為此移咨前來我在和爾博等處督催車運於沙上鋪墊柳枝令車輛易過將直𨽻八運車內所餘米糧酌留和爾博等處因此車輛稍輕於二十九日盡出沙磧又將山東第一運車內米糧亦令酌留已過噶爾圖地方我即於二十九日自滚諾爾啓行盡力催趲前運車輛將後運車內米糧亦令酌留令侍郎李鈵左通政喀拜親身催趲前行所留餘米即便交付三省道府等官令其接續轉運至喀倫內諸驛站得㫖于成龍報內止稱米車已出沙磧竝未開寫運至何處及米糧數目著兵部再移咨去優擢藍翎侍衛興永朝郎中噶禮上諭內大臣等曰藍翎侍衛興永朝前因其自大性躁故爾革職今因其有膽氣人材壯健著署副都統於鑲黃旗漢軍火器營內行走又諭大學士伊桑阿曰噶禮將第一運米星速運至殊有勞績其人亦堪用著於其應升之缺遇缺即補召裕親王福全等前赴大營上諭吳達禪曰今日裕親王恭親王簡親王勿宿特克布喇克著至此地宿仍令諸王親帶厄魯特逃來阿木呼郎多爾濟塞稜偕來可令彼在前行五月初二丁巳上諭皇太子曰比來未得汝奏章朕懷懸念今汝奏至得仰悉皇太后萬安因待費揚古之兵駐蹕數日馬皆稍肥風土水草與前示汝者無異恐敵人知覺前哨仍附近大營未令逺去此時彼聞知與否無由能悉朕躬固安但早夜焦勞洵為至極諸皇子諸王并諸臣工以及將士皆好皇太子佳否在京諸皇子俱佳否此處别無他物惟有砂石耳四月三十日車林渣卜等七台吉至伊等與納木渣爾托音同在一處向被噶爾丹搶掠敗遁渡克魯倫河北在俄濃一帶地方因馬匹疲乏今始得向內地移營來言其故并遣送所獲厄魯特二人赴京與朕差往烏爾輝之人相遇因來傍大兵之後朕厚加賞賚諭以噶爾丹去此不逺爾等速入喀倫車林渣卜欲來請朕安願為效力止將伊眷屬遣入喀倫身赴朕營喀爾喀之車陳汗亦來今尚未至自京師所賫奏章於五月初二日辰時至朕在此整齊軍旅於初四日進勦敵人情景尚未得聞相距二百三十里地已漸近規模略可見矣四月二十九日頭運糧車至八旗緑旗內府兵䝉古兵及職事人員酌量增給支放米糧時營外堆積如山觀者擁塞內喀爾喀諸人云我等意料滿洲斷不能如此而來由今觀之凡聖主所經可將京師諸物盡載行營中也真為可畏莫不嬌舌驚駭將士志氣與在京同其勇奮情狀未能備述朕之心思則非如在京時矣事體重大期出萬全非可茍圖僥幸故既殫心力復默禱上蒼以行之耳特諭戊午命繪陳圖傳示八旗上諭內大臣公常泰曰緑旗兵著列於鹿角中間緑旗兵之次將兩翼八旗之漢軍炮位鳥鎗排列漢軍火器之次將八旗滿兵馬上所載之炮位分翼排列鹿角後之頭隊兵令各按旗分排列鳥鎗護軍次列護軍又次列鳥鎗驍騎凡八旗俱照此排列二隊兵著於頭隊後排列傍隊兵既無炮位將漢軍子母炮每旗給與兩位此炮位著滿洲鳥鎗手驍騎兼管看護陳勢著分張排列爾與議政大臣等㑹議具奏常泰等隨即遵照上諭繪圖陳勢式樣進呈奉㫖這式樣甚好著議政大臣等同閲議奏欽此臣等㑹議得皇上諭㫖指授俱已周到應即照此遵行交與兵部曉諭八旗并行注冊報可命各塘報到驛米數諭行兵部曰今第一運米車米䭾若至某驛站即令管站人等問明所至米數急速報聞命衆軍節省米糧上諭行兵部曰米糧關繫緊要後隊米糧恐不能即至朕盡力節省食用衆人亦應各盡力節省各營內若某營米糧先盡俟回京時朕必嚴察議處某營米糧因節省有餘多食數日者朕亦必嘉美格外視之著曉諭各營又傳諭內大臣等曰八旗前鋒漢軍火器營及緑旗兵著今日飯畢即行離此十里有水泉處扎營明日著在大營行李前啓行命設驛於塔爾渾柴達木以便挽運上諭行兵部曰五處驛站人及馬匹著留於原任尚書杭愛處其前途設站人員馬匹照常帶往安設俟御營至克勒和朔即遣賢能官一員前往杭愛處將所留五處驛站從塔爾渾柴達木一帶速行安站令運米車輛由此站路行走俟五處驛站安置畢將歐德哈爾哈一路驛站撤回以內大臣阿密達等分𨽻兩脅軍時內大臣阿密達閒散宗室哈爾薩都統喀代護軍統領桑格俱奏請效力上命內大臣阿密達護軍統領桑格在左脅軍中出戰閒散宗室哈爾薩都統喀代在右脅軍中出戰己未命趣運糧至拖陵酌留米於喀倫近地以備旋師諭大學士伊桑阿曰移文運糧左都御史于成龍著將後運糧內六七千石選擇牲口作速運至拖陵地方預備其餘米石俱著留貯喀倫近地以備凱旋之用如此則米糧得以速至牲口亦不至困乏矣著㑹議具奏議曰若將後運之糧盡行運送不能即到且牲口亦致困乏應皆欽遵諭㫖行奉㫖依議遣長史多禪等賫敕往諭噶爾丹先是議政諸臣議俟到拖陵日遣使於噶爾丹奉㫖准行至是以敕書賜物及所俘厄魯特窩齊爾等四人交公主長史多禪中書阿必達令一等侍衛喀瓦爾達一等台吉阿喇卜坦以兵衛之送至燕圖庫列圖厄魯特窩齊爾等四人俱賞以衣服曉諭以師來之故上諭喀瓦爾達阿喇卜坦曰爾等不必到克魯倫度其地形古爾班土爾罕巴爾代哈當有敵人戍守爾等若往克魯倫則略迂繞彼必截爾等之後爾等勿得過燕圖庫列圖即從彼地遣伊等前去未遣伊等之前縱我所擒四厄魯特往致聲息續遣我使臣可也倘遇厄魯特勿與之戰但令敕書使臣到彼則已敕諭噶爾丹曰朕統御萬邦惟以人命為重從來不喜殺伐爾厄魯特喀爾喀向皆奉我職貢之國爾等交惡搆兵以來朕並未嘗偏狥喀爾喀而於爾有異視也喀爾喀為爾所敗投朕乞命如朕不救之則皆饑斃矣朕之濟人非特於喀爾喀如此也凡諸國人有窘迫來歸朕即救之與此相同已明諭爾數次矣爾奏章來索喀爾喀折卜尊丹巴庫圖克圖土謝圖汗言之不已朕始終不以喀爾喀為直曾諭爾此事非懸議所能結當㑹盟以講之爾又以生計窘乏不能前來又以誓書所無之言屢向我使臣喇嘛支吾回奏阿爾尼巡行邊塞猝遇爾兵不待朕㫖與爾交戰特遣王與皇子與爾議好爾屬下人又先攘臂吾人不能默坐是以與戰其時所發他路之兵朕急遣人止之勿與汝戰爾前年就水草野獸之地游牧至巴顔烏闌遂掠喀爾喀之納木扎爾陀音朕部下喀爾喀不安特遣問故又約與議盟今朕與汝若不覿面明議此事而定之不但爾國難存而我界上人民亦不得寧居因爾來既近故欲與㑹盟朕已秣馬繕備朕躬於三月初旬起行西路之兵於二月十八日起行黑龍江兵於四月初六日起行盛京寧古塔兵於三月起行今朕躬及各處兵俱已出喀倫與汝逼近西路之兵俱已到土喇河東路之兵俱已溯克魯倫河而來朕向崇禮義順天理而行不恃勢力戕滅他人朕果恃勢力則不遣使矣竟統各路之兵而勦滅汝無所不可朕乃不忍生靈橫被鋒鏑是以抒誠特遣使命朕與汝等覿而定議指示地界爾照舊貢獻貿易則爾國安生而我邊民亦安乃協朕保列國如赤子之意豈不休歟朕斷不以計誘人爾勿疑畏爾若疑畏退而避去則事無了期矣爾亦一有識之人何不曉事如此朕來欲與各處將帥閲兵已傳令伊等勿戰此非朕虛言也爾如不信可遣人往視若再不信可留朕所遣使臣內一人在於爾地倘各處兵進而攻汝汝即差所留人沮而止之一面遣汝舊使前曾廷見朕所識之人為使爾遣大寮朕亦回遣大寮朕為統御萬邦之元后斷不誘人而破滅之爾或不信妄動而去則虛朕種種美意而生靈有不利矣朕兹開誠特賜汝暖帽蠎袍粧縀掛純金鉤併巾纓帶一條靴襪及幣十端銀二百兩以公主長史多禪中書阿必達為使爾其籌之五日內遣汝使偕我使來復自古以來雖敵國無害使臣之理况朕與汝向無隙乎若期內不來則必害我使矣特諭庚申上駐蹕阿敦齊陸阿魯布喇克命䝉古兵編為行伍上諭大學士伊桑阿曰䝉古兵未諳戰法著議政大臣等將領蒙古兵之大臣㑹議派出具奏隨以䝉古大臣等職名入奏奉㫖著將阿爾尼拜音察克西喇喇錫派出理藩院開列外藩隨駕出征札薩克喀爾喀王以下附丁以上共一千九百九十二人入奏奉㫖著問其中有欲爭先效力者爾等編為隊伍具奏理藩院隨㑹集札薩克喀爾喀諸王台吉等遍問之諸王台吉等皆願頭隊行走爭先前進奏入侍衛關保傳上諭曰部院大臣等今亦編次隊伍可諭土謝圖王達爾漢王等爾等編次隊伍今已如何朕意欲令札薩克喀爾喀王等領其護衛隨從一二人侍從朕側其餘共為一隊選其能者使領之俱在一處侍從朕後隨所指授即令前進若不如此伊等俱繫各札薩克處湊合之人與在內熟鍊之兵衆共在一處不諳隊伍不通言語必致錯亂與在內兵同編隊伍似為不妥據土謝圖親王等奏云臣等前因不諳故欲在頭隊行走爭先前進䝉皇上明白傳諭臣等今始得知我等䝉古俱繫各札薩克凑合之人不諳隊伍言語不便入隊行走上諭極是臣等一遵上諭指授行走土謝圖王達爾漢王又奏云臣等札薩克人內年少者多喀爾喀等又俱繫新人不諳軍法我朝軍法素嚴理應明白曉諭奉㫖欲曉示軍法甚善喀爾喀貝勒西地西里貝子盆楚克俱令在朕處其編次隊伍亦宜照此行公沙木巴喇錫亦令率所屬兵入此隊行走其札薩克兵著貝勒巴克席姑爾為總統將十人列為一小旗現今人多旗少著添給小旗每旗選一材能者為長編為隊伍令其操演理藩院隨議得札薩克喀爾喀諸王及貝勒貝子公札薩克台吉外自台吉以下附丁以上十人為一小旗十小旗為一甲喇俱照例設參領一人以轄之伏候欽㸃至兵部律例向譯蒙古文俱已頒行今當再發得㫖著貝勒阿必達博木博原封王之俄七里公格勒爾沙木巴喇錫車木楚克納木渣爾阿玉西等管領甲喇伊等叙功時俱同台吉等叙功令各旗推台吉等為長旗內官員及間散人令其背旗餘依議辛酉早上於途次命蒙古兵設伏諭科爾沁巴克席姑爾貝勒喀爾喀車木楚克納木扎爾公等曰顧爾班圖爾漢等地方有賊所設哨探彼處有阿思哈圖山爾等可在彼埋伏賊必出阿思哈圖山來窺我營我軍前往追擒爾等即行接應是日上駐蹕枯庫車爾命扎西王兼領察哈爾兵諭行兵部曰扎西王人材壯健其屬下兵亦堪用應令兼領察哈爾兵行走著㑹議具奏隨議扎西王人材果健其屬下人亦好且繫王爵察哈爾兵應令兼領總管而行上從之喀瓦爾達等奉差護送多禪等還復命先是遣發公主長史多禪中書阿必達賫敕往諭噶爾丹之時使一等侍衛喀瓦爾達一等台吉阿喇卜灘等率前鋒二百名護送多禪等上諭喀瓦爾達等曰爾等勿得過燕圖庫列圖即從彼地使伊等前去如遇厄魯特勿與交戰但敕書使臣得到則已至是喀瓦爾達等還奏臣等五月初五日到克魯倫河不見敵人踪跡想敵人已去不甚戒備而厄魯特自山上探望見之初六日黎明有厄魯特千許人來截取馬羣馬羣中護軍伙軍人等發矢射之收馬匹至本營我兵排列正欲交兵臣等仰遵諭㫖喝止諸人勿動敕書重大必達之始善遂令侍讀學士殷札納帶厄魯特名俄齊爾者前去殷札納往控丹濟喇馬勒言曰我等係聖朝使臣不得無禮又厄魯特俄齊爾自言既不殺彼又賞賜遣回告之以聖上親來矣將軍費揚古亦下俄爾洪上喇而來丹濟拉大駭失聲遂領敕書收兵急去臣等亦收兵而還上諭皇太子曰朕所統大兵以初四日前進㑹天雨於五日進兵軍丁馬健在京所給馬有全存者亦有存四匹三匹二匹者大概整肅此行也喀爾喀及內扎薩克蒙古甚得其力凡偵探斥堠單行差遣之處皆用此屬一一書示不勝其煩旋師之日面言之朕所遣羅卜臧額爾得尼台吉來據奏俄濃下流有塔布囊烏特引弓之人千名胡倫布爾之土爾希木地方有齊卜齊努特數百家今阿里牙扎薩克之阿爾薩蘭衛寨桑等似欲全收伊等向喀倫前來此等人若歸降則巴爾呼喀爾喀更無餘矣此亦大快事也今漸近克魯倫河我蒙古馬健故於初五日射獵野騾黃羊蒙古喀爾喀等陸續來㑹者二千有餘遣用有濟給以軍律署為官校編之部伍車陳汗來見其較前頗優兹已過瀚海山川形勢雖同而草漸蕃廡初六日次枯庫車爾湖此地即去年噶爾丹掠納木渣爾拖音之處也去克魯倫百七十里壬戌命大兵排列前進時已得噶爾丹所在實音上重列軍行次序躬率前鋒兵行次八旗前鋒兵排列而行次緑旗兵居鹿角之中次左右翼八旗漢軍炮位鳥鎗兵次八旗滿兵馬上䭾載炮位俱按翼排列而行其鹿角後頭隊兵列各旗內鳥鎗手護軍次列護軍次列鳥鎗手驍騎排列而行二隊兵亦照頭隊排列傍隊兵每旗子母炮著滿洲鳥鎗驍騎兼管協力看護此後三旗大臣侍衛等領龍纛而行諸王及皇子等各在纛前進發內府官兵執事人等部院官員及䝉古兵俱排隊伍按列而行御用行李及各營行李按各旗分隨兵後行俱有防護行李官兵軍威之盛彌山遍野不見涯際前一日微雨是日天氣晴明蒙古地方寬廣大兵整齊嚴密肅然無聲旗纛甲胄火器刀鎗日中晃耀奪目深可震怖噶爾丹雖素凶悍暸望軍容未有不膽裂思遁者矣上在途時一等侍衛喀丢遣人來奏曰臣等奉㫖前往阿思哈圖山探視遇厄魯特數人俱牽散馬前來潛窺我軍營壘賊遙見我等倉皇逃遁追至阿思哈圖山之東遇巴克席姑爾貝勒等一同追逐上笑曰何必追逐任伊等往報噶爾丹可也駕至燕圖庫列圖地方將駐蹕所有水泊俱涸衆皆憂之鄉導大窘四走覓水上見之諭喀爾喀和碩額駙噶爾臧云此地向為有水之地今忽無水豈上天欲我軍直抵克魯倫河乎但步兵已行五十餘里今又行四十餘里無水之地倘遇敵人何以進戰况後隊之兵日暮乃得至爾今即往可諭爾父杜稜王札什率其兵千餘人立於燕圖山之髙處殿後以俟大軍過畢倘有聲息令一面出戰一面來報如無事則至黃昏後由北撤歸慎無使之知覺又遣侍衛伍什率鄉導覓有水之地伍什馳至一平山即見一泉下流六七里水甘而甚大大軍兵馬可足一夜之用回奏上大喜亟往前閲立營掘壕之地明示各旗遂駐蹕西巴爾台諭護軍統領托倫蘇丹等曰明日駐扎地方朕親身指示駐扎各將行李須跟隨兵後結隊而行切勿零星散走又諭衆等明日黎明著各炊飯食畢起程中路督運于成龍報稱直𨽻第一運郎中噶禮米一千石第二運遊擊劉澤寰米四百石第三運都司丁延祥米六百石第四運按察使劉皚米七百石第五運編修宋大業米七百石第六運參領陳鏐米三百六十石原任知府于漢翔米八十石俱已過第十五站格德爾庫地方現在第七運郎中索爾璧米六百石第八運候補知府祝鍾俊米六百五十石俱於初四日至第十四站之和爾和地方山東省第一運員外郎碩色米六百二十石至第十二站之蘇勒圖地方後運山東河南兩省之車輛侍郎李鈵左通政喀拜督催陸續而來又郎中噶禮報第四運夸蘭大劉皚從和爾博驛將米七百石麵八千斤以駱駝馬騾䭾載於四月十六日起程五月初五日至第二十三站西巴爾台地方初六日自西巴爾台起程前去命彭素克格隆隨中書阿必達往諭噶爾丹時中書阿必達等賫敕往授噶爾丹還奏曰初六日清晨臣等未起行之前厄魯特千許人來截前鋒營外馬驅之而去臣等急捧敕書至前鋒排列之地侍讀學士殷扎納侍衛夸色亦與臣等前進往說厄魯特而厄魯特近薄臣等竟不通問奪去馬匹使臣等步行臣等回至前鋒營取賞噶爾丹之衣幣果品負於駱駝之上臣等進覓噶爾丹踪跡遇厄魯特二十餘人伊等謂臣阿必達曰使臣請回已於前使口中聞聖上親統大軍而來之實音乞聖上大兵暫停倘或即來則我厄魯特震懼我噶爾丹在土喇地方不在此處往返須數日乞暫緩師若即來薄我我當避去若必窮追我亦能拒乞使臣代奏聖上今請留一使於此聖上敕書已連夜送我博碩克圖汗矣俟覆本到當付所留使臣賫回今令汝還恐中途遇我國之人妄行邀劫我等發哈什哈二人送汝歸去遂給臣身及家僕二人又多禪僕人二人坐馬五匹兩哈什哈率十餘人帶弓刀持鳥鎗送臣等來至燕圖庫列圖地方逺見我軍之形伊等乃返上諭阿必達曰噶爾丹處爾曾一往今復差汝汝若獨行噶爾丹之人亦不汝信札薩克喇嘛彭素克格隆告請效力故遣與汝偕行諭彭素克格隆曰喇嘛爾可與中書阿必達今晚宿於前鋒營中明晨往赴厄魯特宣朕之㫖爾等若果富足豈盜我前鋒之馬乎惟不足之故乃竊取耳雖取馬百匹亦不汝責汝等勿懼而走務追及偷馬之厄魯特宣朕㫖而歸阿必達等請帶鄉導上曰爾可帶撥什庫諾爾布前去告厄魯特云朕此來乃為諸蒙古不得安生之故非必欲殺汝等也今汝等欲我緩兵我師在此地乏水明日到克魯倫河後當再緩行其以此明告之是日密諭大小營中大臣等令安扎營壘如故而營內盡撤去帳房即御用行幄幔城亦俱不設各處皆伏兵空壁以待之抵暮上親巡視營伍癸亥上親追噶爾丹向克魯倫河前進時上以克魯倫河乃噶爾丹至要必爭之地賊若欲戰必於克魯倫河拒戰矣乃將兵分布隊伍躬在前鋒前行上於途次率數人登髙執圓鏡逺望見河不見人形上待後軍坐於髙處見東有額爾德尼拖羅海山西有山麓從巴爾代哈迤邐接河岸隱見不真上諭科爾沁上謝圖親王沙津達爾漢親王班第喀爾喀車陳汗納木扎爾王西第什里貝勒盆楚克貝子曰汝等各率汝屬下䝉古十許人往據西方巴爾代哈山麓髙處佯作全軍從此經行之狀敵人來犯勿與之戰誘之前來敵若有備則大兵爭先據河阿必達遣撥什庫諾爾布還報言臣等到前次追見厄魯特之地視之厄魯特皆已去矣臣等追躡又行數里至克魯倫河有厄魯特七人望見我等即遡河馳去又視馬矢似遁去二日故阿必達及喇嘛遣我還奏伊等仍追踪去矣駕先抵克魯倫河見無賊寇河北界有賊安營之跡賊去未久上顧左右諭曰向言噶爾丹熟練戎行攻拔西方回子千餘城收服四厄魯特殺其兄弟全滅七旗喀爾喀所向無敵今觀其不據克魯倫河拒戰則其怯懦顯然所言有俄羅斯六萬亦僞也今我軍不復有與戰之期但追之為急耳於是俟各隊領軍大臣畢至上謂諸大臣曰噶爾丹若於克魯倫河拒戰我兵奪河交戰猶稍廢力今觀其不於此拒戰而竟逃竄噶爾丹於行兵之道一無所知是自開門户以與我也除此地外於他處斷不能拒我軍審其情形未必駐扎他處必連夜逃遁矣當輕騎急追之諸大臣奏曰此與聖明所豫料者一一相符合也是日上駐蹕額爾德尼拖洛海克魯倫布隆乃設哨卒南向巴爾代哈北向達爾幾爾濟口生古爾口東向額爾德尼托羅海西向克魯倫河上流內又立八旗防衛上顧前鋒親隨侍衛喀瓦爾達曰明日擒敵一哨卒獲其生口則有實音矣正商擒之之法統領碩鼐擒一厄魯特至問之言天使到後我噶爾丹尚不信聖駕親來云皇上不在中國享安樂而飛渡此無水大沙漠乎及向釋回四厄魯特逐一問及黃幄布城網城進止方信是真今日親身至北方孟納爾山立觀大兵營中見行列規模大驚曰是兵從天而降耶此無水之沙漠不知聖上率如許兵衆如何行路此兵不比烏闌布通之兵極其精鍊我等難以脫免惟乘夜遁走可幸得生耳不則死於是兵矣遂傳令衆人欲盡棄廬帳器械乘夜逃去上命賜所擒厄魯特衣服使撥什庫諾爾布追送與兩使臣又遣喀瓦爾達往額爾德尼拖羅海探視有無賊寇諭內大臣索額圖曰車陳汗喀喇沁王札西奏厄魯特噶爾丹不能抵敵皇威已經逃竄願帶臣等䝉古兵追𠞰伊若抗敵即行奏聞以俟大兵伊若逃竄即隨後進𠞰以掠其妻子此事關繫重大著㑹議具奏隨議王扎西所奏甚是但今遣去若兵力微小恐致危險聖駕親臨又不便分兵以重勢遣往自明日著往塔爾吉而即僧枯爾河地方屣尋踪跡如是則可得的信王扎西仍令遣伊兵追趕尋踪偵探的信奏入得㫖俟明日再行斟酌又諭大學士伊桑阿曰我兵甚勇器械整齊又遵法度無可議處止兵丁僕從人等一切宜加意謹慎毋令懈弛致煩朕慮將此著遍傳八旗以至僕從人等通行曉諭上諭皇太子曰我師以初五日發拖陵前進初四日即遣公主長史多禪中書阿必達賫敕諭與噶爾丹令阿喇布灘喀瓦爾達等二百人與之偕往朕曾訓之曰汝等勿至克魯倫河觀地方情形古爾班圖爾漢巴爾泰喀等處敵人恆駐有哨兵汝等往克魯倫河乃紆曲之道彼必來截汝後惟從顔土庫烈圖地方即將伊等遣發未遣發之前將我軍所獲厄魯特四人縱之使去令其傳信我使臣相繼而往乃伊等於初五日徑抵克魯倫河以未見敵哨踪跡意謂哨兵已去疏於防備厄魯特人從山巔見之於初六日黎明時厄魯特近千人將馬羣堵截驅逐馬羣中護軍及跟隨人役將厄魯特人射殺仍驅馬羣回營我兵整齊排列放鎗殺厄魯特數人我兵雖有數人為厄魯特鳥鎗所中因綿甲皆未透惟一人微有傷痕時喀瓦爾達令我兵且勿與戰敕諭事大務期必達為善令侍讀學士殷渣納與厄魯特人俄七爾偕往彼即將丹濟喇之馬挽住云此乃聖主遣來使臣不可加以無禮於是俄七爾將彼䝉不殺之恩賞賫遣回及聖主親臨將軍費揚古從俄而渾土喇順下流而來告之丹濟喇失聲驚恐即領受敕諭收兵急去喀瓦爾達等亦收兵而回於初六日申時到初七日駐蹕於庫烈圖西巴爾台布喇克地方中書阿必達從厄魯特營中來奏厄魯特人之言大聖主請稍緩師若即來我等甚懼我主今在土喇地方往來必需數日求少待之初八日早一面向克魯倫河進兵一面仍遣阿必逹盆蘇克格隆往諭彼曰汝等勿懼惟議和好耳我師不駐克魯倫河則水泉不給遣去後遂抵克魯倫河河之兩岸皆山山大概多險峻而少平坦河亦甚小較之南苑中河差大耳是日厄魯特處處哨兵皆見之不知其實在何處今我師相機而進彼宜於我師抵克魯倫之日迎而拒之不以河與我而戰為是乃即令河為我有其庸懦誠可見矣向後情事俟再報將士志氣皆奮勇精鋭恐汝等在京懸念急示知之可於皇太后前奏聞大學士滿尚書等咸令觀看特諭甲子遣大學士伊桑阿致祭克魯倫河之神上以統大軍臨克魯倫河於是遣大學士伊桑阿祭其神文祝曰朕統御寰宇懷柔百神遐邇內外罔有殊視凡乘輿巡歷之地必䖍告所過名山大川所以昭秩祀也頃因厄魯特噶爾丹悖德逆天俶擾邊境朕躬統大軍逺出聲討以期殄寇安民兹已行次克魯倫河惟神夙以巨浸名於絶塞溯長源之濬發引千里之衆流朕率師涖止臨觀嘉嘆是用備陳牲帛遣官申祭神其丕彰靈應默贊軍威迅蕩滌夫穢氛永澄清乎朔漠異日垂諸史冊蔚有休光惟神鑒焉皇上親率前鋒兵窮追噶爾丹噶爾丹倉皇遁走是後數日沿途大獲所遺器械帳房食用等物是日上距克魯倫布隆駐蹕十八里地方甫到即傳㫖著各營合為一大營日間將馬於營外牧放夜間於營內牧放於是馬皆得飽而昏夜復無遺失之憂誠至計也又諭內大臣等及大學士伊桑阿曰明日路程稍逺將帳房行李乘早䭾載豫備完畢欲行即行著僕從人各近伊主行走若遇戰時令僕從人稍後如此齊行凡事俱善况今日得遺失馬百餘匹非皆兵丁之馬乎朕若遇此等人必即行正法决不姑貸須加意謹慎馬匹著將此遍行嚴諭八旗又命留步兵於後輕騎進巴顔烏闌進𠞰噶爾丹時厄魯特逃人來言噶爾丹初不信御駕統軍而來及兵馬爭渡克魯倫河分隊而進厄魯特哨卒俱被逐散言進克魯倫河之兵計有三隊不知幾萬遂爾驚動下人言曰皇上不好殺戮陳獲之人尚賜衣放回吾輩隨噶爾丹何日為了期無不嗟怨欲來降者多又厄魯特降人言皇上親統大兵已到克魯倫四路大兵亦到噶爾丹隨即遁去諭內大臣索額圖曰今日據投誠厄魯特人言聞朕親率大兵而來四路竝進噶爾丹即行逃竄朕若率緑旗步兵前進則牽綴遲悮朕意揀選緑旗馬兵㑹合大將軍費揚古向巴顔烏闌追𠞰噶爾丹其緑旗步兵應留大臣管轄著隨後緩行前來滿洲兵每旗留二十名應派章京護軍校管轄緑旗步兵著全留宣化府取來炮二十四門亦著留下漢軍炮十六門能帶則盡帶往若不能帶著留炮一二門所留之兵應派賢能大臣一員統轄克魯倫之克勒和朔地方去此地一百三十里朕作二日程前行到彼所留兵丁著作四日程前行到彼擡鹿角兵有不能到者著漢軍大臣等酌量調撥帶往前去大學士伊桑阿為派大臣管領所留之兵開列領侍衛內大臣以下副都統副都御史以上職名入奏得㫖內大臣阿密達著充將軍副都統胡什巴沙濟左副都御史阿山著為參謀令從此分四日至克勒和朔若有調遣著酌量趲行前來命放馬於大營內上諭內大臣索額圖曰今晚將馬匹俱入大營內牧放若有將馬於營外牧放被拿獲者將厮役及伊主一併正法著將此通行嚴諭八旗是日喀爾喀扎薩克一品台吉齊旺巴爾珠爾旗下僧格佐領下驍騎杭吉代聞知皇上親征前來進馬六匹奉㫖彼繫小人前來進馬甚屬可憫著照良馬例加賞於是厚賞杭吉代復遣中書阿必達賫敕往諭噶爾丹中書阿必達還奏曰臣等本月初七日晚附近前鋒營宿次日黎明起行至厄魯特盜馬之地見厄魯特皆已遁去屣踪追至克魯倫河見有七人望見臣等隨向河上流而走又視厄魯特馬矢去似兩日矣乃遣諾爾布以此事回奏皇上臣等循克魯倫河而上追一日夜有燈火光見克魯倫河岸有馬二匹近往視之地上棄鳥鎗一桿涯下一人匍匐而行執之問曰爾係何人在此何為爾噶爾丹今在何處其人言我乃伊喇古克三庫圖克圖之人吾名庫濟欲來偷爾軍中之馬故我厄魯特共千餘人來盜馬而去我兩馬俱乏故獨留在後我衆夥昨已棄我去矣至噶爾丹本身則率兵往克勒河朔云上諭阿必達等曰著以爾等所擒厄魯特庫濟為鄉導賫敕前往授噶爾丹爾等乘驛而往酌携乾糧仍帶撥什庫諾爾布同去爾等見噶爾丹行踪即遣諾爾布回奏爾等徑入朕駐此待爾等三日隨以蠎袍及馬一匹賜所擒厄魯特庫濟諭阿必達等曰爾等往傳諭厄魯特云朕在途中搜獵遇河捕魚恐厄魯特聞朕統軍而來倉猝遁走朕非來伐之也朕斷不伐汝欲與汝議約而來耳汝若不懼親身來議懼則於丹濟拉丹津俄木布杜噶爾阿喇卜灘內遣一二人來議不則於寨桑內前曾充使為朕所識者遣一二人來使之定議則善矣汝勿遁走如或遁走則事不能了而汝身與下人俱敝朕塞上居人亦不得安爾等追三日如不能及即回可也於是以諭噶爾丹敕授阿必達等令之起行敕文曰朕以仁御宇內養育羣生惟禮義是尚以祈天眷是以昔曾發敕諭汝盟議爾又以生計極艱極窘不能前赴為辭於是朕一切偫備來至克魯倫河欲與爾㑹盟使之永安度日抒我誠心朕與汝覿而定議汝仍照舊職貢貿易則汝下人得以寧居而朕邊民亦得休息朕斷不愚誑他人汝勿疑懼汝若疑懼避去則事無了期而朕種種美意皆虛矣近遣我使偕汝向日充使朕所識認之人前往令五日內遣回特使賫賜汝銀幣以公主司儀長多禪中書阿必達為使不知汝國人受我使否得至汝所否朕使又不獲聞汝之言是以又特遣扎薩克喇嘛彭素克格隆仍以中書阿必達為使朕今已到克魯倫河爾其反覆熟籌之或㑹盟或另議作速遣使來告不則爾下人未必盡如爾心爾未必安枕也爾當細思隨遣使來復朕用是抒結好之心賞賚汝馬疲落後之人使之引導遣至汝所特諭諭皇太子曰因噶爾丹逃遁特示知之初九日早我軍中遣拿活口之新滿洲擒厄魯特一人至問之彼云因我馬疲乏衆人棄我而去我言汝等不挈我往我食已乏今將殺馬以食衆言汝勿殺馬但急隨我等踪跡前來言畢而去等語朕於是賞賚之令同喇嘛及中書阿必達偕往辰時從厄魯特逃來人云噶爾丹始不信皇上親統兵至昨見爭據克魯倫河分隊進兵彼處處哨兵俱被追逐星散逃奔皆言向克魯倫河兵三隊不知數萬已抵克魯倫聞語遂爾潰遁其衆私相議曰康熙汗性不嗜殺於陳前擒獲之人皆賞以衣服而遣之我等從噶爾丹何所底止因大相怨恨欲投誠而來者甚衆觀此則噶爾丹逃遁是實費揚古之兵當前堵截我師追隨於後荷上天之眷佑成功大概可期矣故報京師知之可於皇太后前奏聞宫中亦令咸知正在軍中倥偬之際未及詳悉書來為此特諭乙丑上親率前鋒兵窮追噶爾丹獲厄魯特人言噶爾丹逃往巴顔烏闌入樹林內尋險固之處棲身駕次扎克寨阿必達使撥什庫諾爾布還報曰諾爾布隨阿必達等到克勒河朔見厄魯特下營之地盡燬其廬帳棄其什物而走臣等緊隨其遁跡前往逺見有一人中書阿必達令諾爾布拘之問噶爾丹已到何地其人言我乃喀爾喀自巴顔烏闌逃出今已兩日矣不知噶爾丹今在何處我聞聖主收養窮人故逃來投降為此解其人來奏阿必達緊隨厄魯特踪跡前去矣復遣大喇嘛埀喇克查木蘇格隆賫敕往諭噶爾丹上諭埀喇克查木蘇格隆曰茲遣爾賫敕往諭噶爾丹爾其以敕書賜幣追及噶爾丹授之言我聖上竝非來勦但為衆生來與爾定約耳皇帝敕㫖諭厄魯特噶爾丹博什克圖曰朕惟治道原期有益羣生朕親統大兵欲與爾共議俾羣生享其利益故至此與爾相近之處兩次遣使其到否未知爾何竟無一次遣人來也朕為天下大一統之主斷不肯欺罔人而行已經屢頒諭㫖爾仍不信逃遁而去朕視爾所逃之路將兵仗器皿盡皆拋棄爾所屬之人乞降而來者甚多爾生計迫蹙朕所深悉爾前此奪朕使臣之駝馬令其步行而歸今次又劫朕使臣之衣併奪隨行之人駝馬朕皆不介意將爾逃去遺棄疾病之人與來歸之人盡皆收養朕若實存戰征嗜殺之心豈肯將爾所屬之人收養之理爾仍不信遁去朕西路大兵已至巴顔烏闌朕親統大兵至克魯倫河諒爾亦必知之黑龍江盛京寧古塔等處大兵今皆㑹集於克魯倫河再斷爾歸路之大兵亦已至厄嫩巴爾查地方爾即欲遁去安可得乎朕不忍生靈之塗炭故復遣使前來爾可將丹濟拉丹津俄木布阿拉布灘三人中遣一人前來朕非欺罔而行彼自可見爾仍疑而不信將所屬羣生塗炭爾安忍坐視之乎否則爾所屬之衆悉皆散而歸朕爾豈得晏然而已乎朕言出至誠爾猶不信日後雖悔無及朕以道法為念故遣使前來竝不欲將爾𠞰滅出自誠心賜爾緞十匹著大喇嘛垂拉克查木蘇格隆為使前去爾試反覆思之若欲免生靈於塗炭而來歸順可於丹濟拉丹津俄木布阿拉布灘三人中速遣一人來為此特諭聖祖仁皇帝親征平定朔漠方略卷二十三

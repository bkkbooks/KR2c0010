body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方畧巻十七十一月壬戌命分兵三路進𠞰噶爾丹時将軍伯費揚古奏言關保賫兵部文到臣并傳上諭以噶爾丹若在巴顔烏闌度冬徂春應作何行事為善下詢於臣臣敢不竭吐愚衷一一陳奏竊思大興師衆直扺和卜多傾其巢窟自是勝筭但窮荒遼絶師行似難今乗其在巴顔烏闌之地分軍殄滅誠計之得者若俟塞草青發我軍始進則冦馬已肥雖噶爾丹震懾天威不敢犯我顔行或藉馬力之強竄逃亦易今請右衞兵五千再増以京師兵五千此増發之兵即於深冬秣馬咸令肥健俟青草方萌時我軍突至則噶爾丹馬正羸瘦似可即行𠞰滅不致遁逸至所集察哈爾兵六百歸化城兵八百四子部落達爾漢親王毛明安三吳喇忒等兵六百鄂爾多斯兵一千俱令裹兩月糧以進其大同綠旗官兵五千宣化府綠旗官兵三千俱以鳥鎗從事再上所頒發子母礮攻營破壘大為有濟乞勅下附近省分協助一二百門送至軍前備用奏至㫖下議政大臣集議議曰右衞兵大同宣化綠旗兵歸化城及四子部落諸蒙古兵俱應照将軍費揚古所請如數徴派其請増京師大兵可於毎佐領預備十名兵内選撥䕶軍三名鳥鎗驍騎一名各帶厮役一人合為一幕毎兵給馬四匹派官分率恭請親簡大臣統領前赴費揚古處再檄知江南省速送子母礮二百門來京到日酌發西路議入上曰我大軍進𠞰噶爾丹宜分為三路東一路仍派盛京兵二千寧古塔兵一千黑龍江兵交将軍薩卜素酌量派出再著科爾沁派兵四千令定期㑹合沿克魯倫進𠞰其西一路徵調各處官兵總轄於費揚古由歸化城進𠞰至中一路以京城毎佐領下所餘預備兵六名及火器營兵與費揚古所請宣化府綠旗兵停其發往西路皆定為中路進𠞰此三路官兵俱令裹糧八十日中路隨運米石著諸王大臣官員急公之駝馬䭾負倘不足即動支正項錢糧僱車裝載西路軍糧應隨運幾日著費揚古明白具奏再師行惟馬最要東光吳橋景州三處户部現貯有芻豆毎佐領下發馬十匹照宣化府例交地方官飼養特遣大臣一員往督之是師於來年何月何日啟行著費揚古定議以聞尋以東光吳橋景州三處督飼馬匹派出刑部侍郎陳汝器前往甲子命以右衛所貯子母礮運至歸化城将軍伯費揚古奏言軍器中子母礮之用甚大蒙發臣軍子母礮二十四門現貯右衛倘有所用請飭右衞地方官運至歸化城自歸化城經行之地即於沿途所過旗分取駱駝為用囘時亦照此例預備上從之乙丑諭䝉古備兵上諭理藩院曰歸化城四子部落喀爾喀逹爾漢親王毛明安三吳喇忒六鄂爾多斯十科爾沁其兵數已經派定應各傳示務厲兵秣馬以待至其餘旗分雖未派定兵數亦應先期曉諭其軍器馬匹俱令預加整備以俟徴發爾衙門可通行檄知丙寅命都統伊勒慎等率増發兵赴西路兵部奏増發西路毎佐領䕶軍三名鳥鎗驍騎一名請派大臣率往上曰著都統伊勒慎䕶軍統領蘇丹副都統碩岱率往命都統齊什出中路軍時中路備征之都統胡巴病故此缺開列右翼滿洲蒙古都統職名具奏上命派都統齊什預備戊辰命製綿甲上諭兵部曰近将内造綿甲試以鳥鎗不能貫入是此甲大有造於軍士也應令浙江省製造五千江南省製造三千福建省製造二千山東江西省各製造一千倘乏絲綿處即以紬疋代之不必俟齊隨得隨解可頒内造綿甲五領差筆帖式分送五省以為式樣授厄魯特降人阿穆呼郎等官時有厄魯特阿穆呼郎等四人來降㫖下議政大臣詢明具奏議政大臣隨詢阿穆呼郎等對以我等係阿喇卜灘台吉屬好貧乏異常兼隨噶爾丹游牧不堪勞苦近聞聖主之國太平鞏固凢屬歸順之人靡不坐享安樂故我等四人自巴顔烏闌逃出星夜疾走來歸聖明噶爾丹向踞和卜多地方於本年二月間挈家遊牧直至八月内至克魯倫河源處屯聚隨授阿喇卜灘台吉丹濟喇丹津俄木布等兵三千渡克魯倫河掠喀爾喀納木扎爾陀音及巴爾虎等沿克魯倫上流而返噶爾丹順流來迎㑹於巴顔烏䦨遂合家環居其地作度冬計兵有六千因掠得納木扎爾陀音等以故牲畜備具噶爾丹於枯庫得勒蘇一路俄濃巴爾濟一路克魯倫下流一路此三路毎路遣人三十名安置汛哨策旺喇卜灘現駐厄輪哈必爾哈之地與噶爾丹仍前不睦絶不通使噶爾丹屬下人衆多有逃往策旺喇卜灘處者喀爾喀根敦帶青聞現居七斯希卜其餘喀爾喀不獲詳知再噶爾丹意欲舉兵内入因伊拉古克三庫圖克圖以路逺勸止據此轉奏諭曰可将伊等歸併上三旗阿穆呼郎等俱授為六品官仍給田産衣食等物加意軫䘏尋噶爾丹屬裔舒格卓里克等來歸其安置亦如之己巳將軍伯費揚古等奏報率兵駐劄形勝偵探禦備費揚古奏言臣等接理藩院咨稱奉上諭據班第報噶爾丹有欲掠墨爾根濟農之言可速檄将軍費揚古尚書班第加意防備臣等欽遵僉議於本月初八日起行墨爾根濟農等現居蘇尼特王杜稜旗下甌耳之地以故寧夏将軍覺羅舒恕率兵一千五百往歸化城北山後厄勒蘇台地方屯劄備禦臣費揚古親率兵一千五百往四子部落旗分阿爾察圖蘇木哈逹地方屯劄備禦副都統阿南達侍郎滿丕二人酌率喀爾喀兵赴阿爾察圖蘇木哈達以至甌耳地方擇兩間形勝處屯劄備禦臣等三處各行偵探倘有警臣等公商行事奏入上從之乙亥以衞徴喇嘛等交通伊拉古克三執而囚之先是副都統阿南達以喀爾喀王善巴長史多爾濟有囘子告之云伊拉古克三前世僧徒俱住居河套爾等當防之必有日受此軰之害奏聞上使阿南達将伊拉古克三僧徒内大弟子俱遣至京交将軍費揚古等查明具奏至是阿南逹解伊拉古克三僧徒衞徴喇嘛其弟孫魯卜其徒喇克巴格隆海喇圖囊素羅卜臧丹津丹津厄木齊沙塔爾及家人朱喇圖達爾扎來費揚古等查厄魯特察罕台吉之囘子巴圖哈什哈所首尼克塔鄂木布喀爾喀扎薩克一等台吉額爾徳尼滾占哈灘巴圖爾旗下地方伊拉古克三所遣羅卜臧端魯卜及其弟逹爾扎尼爾巴格隆台吉諾爾布之妻其子老章噶爾旦等陸續解到理藩院同三法司奉㫖㑹審以羅卜臧端魯卜尼爾巴格隆尼克塔鄂木布皆伊拉古克三所遣奸細是實伊等不但為奸細且煽惑蒙古之心應皆凌遲處死衛徴喇嘛喇克巴格隆海喇圖囊素羅卜臧丹津朱喇圖達爾扎等不但與伊拉古克三交通信息又祭壇致禱願與伊拉古克三完聚意欲迎噶爾丹之兵而降應将伊等立斬其財産俱入官丹津厄木齊及羅卜臧端魯卜之弟達爾扎俱病故無庸議奸細羅卜臧端魯卜往衛徵喇嘛家探信時有孫魯卜沙塔爾在坐知情是實應将伊等枷號兩個月鞭一百諾爾布之妻收逃叛人伊拉古克三弟托博克妻所寄物而不出首當枷號兩個月鞭一百但係婦人准贖老章噶爾旦革去四等台吉枷號兩個月鞭一百衛徴喇嘛喇克巴格隆海喇圖囊素羅卜臧丹津丹津鄂木齊之徒弟二百餘人及衞徵喇嘛家中所有貲産人口應差官查明解京其奴僕財物入官其徒弟為喇嘛者發盛京廟中交與大喇嘛安插孫魯卜沙塔爾枷號完日鞭一百亦皆交盛京廟中大喇嘛仍檄盛京将軍查安插之喇嘛不許他往其内厄魯特之人皆發往杭州與窮披甲為奴囘子巴圖哈什哈既經出首奸細羅卜臧端魯卜尼克塔鄂木布應安插正黄旗蒙古旗下食䕶軍之糧議入上曰此奏暫存之丙子将軍伯費揚古奏報西路進兵日期先是上以大兵進發檄費揚古定期具奏至是費揚古奏言巴顔烏䦨距歸化城約二千里西路進𠞰官兵除自賫糧八十日外應復隨運兩月行糧其所調各路兵衆俱令明歲齊集歸化城定於二月二十日前後啟行京師馬匹雖飼養肥澤但自京至歸化城千里驅行不無蹄傷臕減請預發兵至大同近邉之地秣養四十日為便奏至上諭議政大臣公宗室蘇努等曰㑹兵期發秣馬贏糧俱如費揚古所請其隨運之米可定為五十日現今大同附近諸處未經積貯草豆著户部派才能官一員往同該撫約計馬二萬匹四十日芻秣之需速行購備京城毎佐領下添撥西路之䕶軍三名鳥鎗兵一名令於今冬十二月望後起程至大同養馬四十日如期赴歸化城進發再宣化府現餧馬匹亦著帶往西路備用其中路進兵之期俟遣往費揚古處人囘定奪至中西二路隨運軍糧另核議以聞命左都御史于成龍督捕侍郎李鈵大理寺卿喻成龍督運中路軍糧上諭大學士伊桑阿阿蘭泰户部尚書馬齊等曰中路進𠞰首重軍糈其輓運一事必得大臣統攝始克有濟如于成龍李鈵喻成龍願為朕効力不及此時更待何日于成龍等踴躍請行遂有是命丁丑命議中西二路輓運事宜時大學士伊桑阿等遵㫖㑹同兵部集議西路進𠞰右衞兵五千京城増發兵三千四百七十大同綠旗兵五千合官兵厮役計二萬四千二百六十名有竒先經議政大臣僉議京城増發兵毎佐領下䕶軍三名鳥鎗兵一名俱給馬四匹帶厮役各一名合為一幕各賫口糧八十日共四石二斗六升餘甲胄四副戰箭二百二十枝帳房二鍋二鑹斧鐝鍁各一行囊四及各種需用雜物通重九百七十五觔零馬十六匹兵身厮役各乘一餘八匹以充䭾負毎匹應分負一百二十觔零右衞兵亦照此例凢西路各處官兵所自賫口糧外毎名月給米二倉斗計五十日需米八千八十七石零以湖灘河朔倉貯之米隨運其運車令山西省備具一千一百輛除車夫口糧馬騾料豆毎車約載米六石共裝六千六百石所餘之米将宣大二府所餧駱駝負運其運車令山西省官役俸工銀捐僱至馬騾所食料豆輓車兵口糧以及鞍屉繩索米袋等物俱著該撫備給并遴才幹道官一員同知知州知縣等官四員同選派部院衙門賢能官四員隨車押運請於特簡于成龍等三大臣内分撥一人佐以一滿洲堂官速赴山西㑹同廵撫温保料理諸務其輓車牽駝應用兵二千以撫標歩兵派之倘不足以鎮標步兵足之至中路進𠞰京中毎佐領兵六名漢軍火器營兵二千及隨礮兵共計八千一百三十名毎名給馬四匹各帶厮役一名合為一幕所帶帳房諸物俱照西路例礮手綿甲軍八百八十八名兩名合一厮役又盛京兵二千寧古塔兵一千黑龍江兵約二千宣化府綠旗兵三千合官兵厮役通計三萬二千九百七十名零京中官兵及盛京寧古塔黑龍江官兵各賫八十日口糧外毎名月給米二倉斗共需米一萬三千一百八十八石零以通倉米運給其運車令直𨽻山東河南三省各出一千三百三十三輛毎輛載米六石與西路同計共載二萬四千石車自河南出者即派本撫標步兵輓之不足繼以本省鎮標步兵自直𨽻山東出者以直𨽻撫標及天津古北二鎮標之步兵充用三省捐僱車輛及兵夫馬騾需用食物并才能押運官員俱著各該撫備給遴選亦與西路同再遴部院衙門賢能官十二員毎省派四員分管尾隨中路大兵前進其總理運務既經派出于成龍等諸事應令㑹同料理議上上曰運米車輛著動正項錢糧備造既派出于成龍等使之專任嗣後凢關運米機務即自行奏請不必㑹同該部押運官員亦著伊等選擇具題牽輓兵卒給與行糧餘如所議戊寅命通政司左通政喀拜協理中路運務命發内帑金製造中路米車上諭大學士伊桑阿等曰中路運米車四千輛若責令直𨽻山東河南三省捐僱恐各地方官不體朕意借端科派致累小民朕今并不動户部錢糧特發内帑金六萬兩著于成龍等督造但毎車載米六石及炊具營帳諸物過重可添造一千輛以足用至朕營需用車輛亦不必令地方官預備即於添造車内撥二百餘輛供應尋于成龍等請以監察御史鮑復盛等十員分任監造車輛上從之命光祿寺卿辛寶内閣侍讀學士范承烈督運西路軍糧命喀爾喀台吉車卜登襲封䕶國公授為扎薩克時郎中殷扎納奏言内大臣吳巴什等遣臣往諭喀爾喀公憨都等内移臣攜王納木扎爾之子汪扎爾四十餘人前往在喀拉呼濟爾地方以俟憨都之至憨都於十月初四日至臣所駐劄初六日早憨都及台吉占巴喇等首倡率衆身擐甲胄執我等四十餘人劫去諸物褫去衣服而北徙帶至五站外納罕臺地方始釋臣等彼竟北徙而去臣等南歸日夜步行憨都親兄台吉車卜登使其子圖巴等攜衣食牲畜迎至吳爾圖地方乃乘馬駝於十五日到車卜登家車卜登言憨都遣其台吉占巴喇招我作速遷往吾言我軰皆卑微台吉並未嘗効蟻力於聖主䝉皇上垂念祖先錫之以公授為扎薩克今叛投何邦欲比此更求榮顯乎我豈肯偕爾福盡之人同行悖逆而負聖上之恩玷祖父之名乎以是語占巴喇而遣之去我當即與貝勒盆楚克率所有兵衆往追憨都謹具奏聞上曰憨都逃去時台吉車卜登感朕之恩念其祖父之名不與偕往且授其子圖巴等餱糧牲畜令迎章京殷扎納誠心効力親率兵往追殊為可嘉著將憨都䕶國公革去即以車卜登襲封授為扎薩克後俄羅斯擒解憨都併其諸子俱正法庚辰上幸南苑閱兵上諭内大臣國舅佟國維等曰用兵之道以賞罰為要今日大閱朕将降勅以昭示勸懲爾等其視之勅曰本朝用兵以來所向無敵野戰則勝攻城則克惟有弓矢劍㦸為用自三逆叛後南方皆稻田賊人雖用火器相持而凡遇之敵靡不摧敗朕以故洞悉特立火器製備鎗礮交發八旗由是我朝之威靈益震於四域矣今噶爾丹遊魂假息於喀爾喀左近肆行竊掠朕欲一舉立殄是以整理諸路糧餉器械熟計而行是師之舉與昔不同兹爾将卒以下厮役以上各當勉力如不遇敵自不必言倘遇敵奏凱而還朕必大霈殊恩陣亡者除照常給賜身價外䕶軍則廕一子為七品官食俸驍騎則廕一子為八品官食俸如無子則照本身錢糧給其孀妻終老所借公庫官銀另加寛䘏倘違軍令勿得仍望如前矜宥必照太祖太宗世祖皇帝之律治罪内大臣等讀畢奏曰陣前効力兵丁向有叙賞之例今皇上破格授官於䕶軍驍騎且加恩於其妻子誠亘古未有之浩蕩宏恩也衆官兵自當感激奮勇百倍於常一遇噶爾丹則生擒無疑矣上曰今日大閱畢可宣勅曉之維時南苑西紅門内曠地八旗官兵鎗礮按旗排為三隊第一隊以漢軍火器營鳥鎗步軍居中礮位排列左右滿洲火器營鳥鎗馬軍列於礮位兩頭第二隊以前鋒兵居中八旗䕶軍續列兩頭第三隊排列八旗䕶軍兩翼則設立應援兵軍馬衆多不見涯際器械鮮整旌旗蔽天耀日爭輝神威莫敵辰時上率皇太子諸皇子俱擐甲前張黄蓋内大臣親近侍衞大學士及兵部諸大臣俱擐甲附近䕶從繼以豹尾鎗侍衞隨行鎗後建兩大纛上三旗侍衞俱擐甲整肅擁䕶隨之上遍閱八旗兵陣及火器營軍容畢中立於馬軍之前鳴角者三擊皷步軍舉鹿角大礮衆兵齊進鳴金而止齊發鎗礮一次如此九進至十次連發大礮火器營馬步軍循環連發鳥鎗畧無間斷其聲震地礮聲畢各開鹿角為門後二隊馬兵逐隊而出頃刻列齊鳴角大呼而進復鳴角收軍立於本陣結隊徐旋行伍甚整其殿軍擁後而立時噶爾丹處降來阿穆呼郎等見此大閱駭甚戰慄而言曰天朝之兵廼如是可畏耶噶爾丹不日殄滅矣我輩早降者誠大幸也上顧用兵諸臣問曰爾等遇敵其交戰之狀亦若是乎諸臣奏曰雖大畧如是而無此嚴整至火器營規模不但與綠旗兵逈異即前古亦未能比有何敵之不摧乎大閱畢上還至行宮前率皇太子諸皇子甲而騎射上騎而射者再步而射者再矢無虛發皆中其的侍立大小諸臣皆以皇上武畧絶倫天縱神竒無不驚異尋内大臣國舅佟國維等奏曰臣等遵㫖於大閱之地宣聖諭畢衆官兵皆踴躍歡呼而言曰我等小卒䝉聖主豢養已極今復降温㫖加我等妻子以厚惠我等真不克當但願幸遇敵冦各効死力寸磔噶爾丹以報我皇上之恩而已諭曰行軍以得人心為要衆心恱則誠為大快矣是日上加惠官兵於未閱之前賜食既閱之後賜酒臣謹按我國家兵力精鋭所向無敵由來舊矣但領兵将帥或違皇上指麾是以前此烏䦨布通未能殄寇致噶爾丹逸去失此機㑹時厪聖衷念噶爾丹一日不滅則疆場一日不安遂决計定謀親行征討又恐彼避我軍鋒向西奔遁乃議分兵一支授大将軍費揚古堵截西路籌畫既備聿整師旅練彌加練精益求精爰駕臨南苑集衆大閱是日躬擐甲胄丕揚威武天宇晴和鎧仗鮮麗新造火礮制度精竒紀律嚴明隊伍整肅又特降諭㫖申明賞罰大加恩賚以鼓勵人心於是将士無不踴躍感奮勇氣倍加一可當百後皇上親統六師深入絶域噶爾丹不能抗拒天威果棄其妻子輜重星夜奔竄又猝遇我西路預備之兵遮擊大敗畜産無存噶爾丹僅以身免未幾自戕餘衆潰散於以知皇上智勇天授誠邁百王而超千古也癸未内大臣索額圖明珠等奏報分派外藩兵安設汛哨索額圖等奏言臣等欽遵上諭往派兩蘇尼特兩阿霸垓兩阿霸哈納爾兩蒿齊忒兩烏朱穆秦及喀爾喀折卜尊丹巴土謝圖汗貝勒席地西里扎薩克台吉班朱兒多爾濟等旗兵令俱於各扎薩克處預備合兩旗為一汛哨共立六汛以偵聲息臣等現於阿霸垓王所居蘇巴海之地駐劄甲申諭卿辛寳等㑹同山西廵撫督造西路米車時西路督運臣辛寶范承烈瀕行恭請訓㫖上諭輓輸朔漠車輛甚為𦂳要爾等其㑹同山西廵撫動支正項錢糧速行備造勿致累民輓車兵卒給與行糧地方官有才具者任爾等選擇帶往其管兵官員與輓車人等亦必擇精壯者用之乙酉命平陽總兵官毛來鳳率兵䕶運西路軍糧先是上諭兵部山西省輓車牽駝兵卒著平陽總兵官毛來鳳率領隨督運大臣前往至是毛來鳳奏言撫標及臣標下共選派兵二千四百名但均係步卒祗供牽輓其前後防禦恐不能緩急為用臣請選騎兵二百名帶往以備驅使上從之戊子命以安北将軍伯費揚古為撫逺大将軍欽天監奏定増發西路大兵行期先是户部遵諭派員外郎綽竒往同山西廵撫温保購置草豆以備京城添撥西路大兵赴大同養馬之用至是綽竒賫温保奏至以馬匹所需草豆臣已派官速辦親自督催必無遲悞京師所派官兵應令擇吉啟行㫖下欽天監奏十二月二十戊申日巳時大利軍行阿爾必特祜以噶爾丹奏章歸復命先是噶爾丹率兵近至西卜退哈灘巴圖爾納木扎爾陀音所居之地侵掠喀爾喀特遣五品官阿爾必特祜賫勅往訊噶爾丹來意至是阿爾必特祜歸以噶爾丹奏章至其詞曰謹奏洪仁皇帝睿覽蒙遣使書不勝歡忭辛未年來草美獸蕃乘便有行想皇上亦鑒悉之矣念與蒙古疆界相近恐有妄行故為之禁止遣人一隊遺書道意而納木扎爾陀音等反以為往攻棄其牲畜而去至所云掠喀爾喀之事乃我界上行人所劫我不之知至逹賴喇嘛所差濟隆庫圖克圖與内大臣吳丹等所定之議前經節次上奏伏乞洪仁皇帝仍照前奏加恩雖有罪愆亦乞寛宥果若有理乞降温㫖不勝欣悦聖祖仁皇帝親征平定朔漠方畧巻十七

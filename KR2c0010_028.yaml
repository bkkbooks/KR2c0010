body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷二十八八月甲申朔命召肅州總兵官潘育龍赴京上諭議政大臣曰者追召肅州總兵官潘育龍偕孫思克來京員外二郎保奏報青海諸台吉情事先是上命二郎保賫敕往諭青海諸台吉如伊等執噶爾丹屬下人與之即令二郎保親身帶來併以此敕遍諭沿途居人至是二郎保報曰臣身自甘州起程出西寧邊口至青海之察罕托羅海地方見善巴陵堪布讀部發印文使之聞之又以擊敗噶爾丹斬殺俘虜之事備告堪布臣乃言堪布者乃達賴喇嘛所遣治青海之政而管理其事者也青海諸台吉有不聽堪布之言者乎堪布之意如何堪布言此事大我不得獨主其議今青海諸台吉俱來會盟俟諸台吉同在盟壇定議再覆七月初八日達什巴圖爾等三十一台吉全到盟所以檄文授之達什巴圖爾邀臣至其廬彼言東方有聖上西方有達賴喇嘛二聖同好為年已久我青海諸台吉住居近邊六十餘年未嘗生一事噶爾丹殺我窩齊爾汗取我屬裔與我亦有仇但噶爾丹之女嫁博碩克圖濟農之子乃聞之於西方結姻者也我等俱達賴喇嘛之徒我等諸事俱啓聞西方視其言何如遵依而行非可任我等之意覆奏也為此謹奏上命議政大臣會議議曰青海達什巴圖爾台吉既稱噶爾丹與彼亦有仇其女當聞之於達賴喇嘛遵而行之應令達什巴圖爾等將遣人於達賴喇嘛作何定奪之處備文覆部並將此等情由增入達賴喇嘛敕諭內上從之命暫停經理多巴白塔兒番回之事刑部尚書圖納等奏言臣等會於肅州正尋議多巴等處番子禁其輸租於蒙古併遷白塔兒所在番子回子令入內地之事隨據西寧送到員外二郎保咨文內言青海諸台吉以收噶爾丹屬人等事推諉於達賴喇嘛臣等仔細尋思噶爾丹之人在西寧所屬地方者甚少與青海諸台吉毫無干涉尚不肯收而給之况多巴輸租有利於彼者乎若併欲收白塔兒衆回子番子雖與言之必不從令彰彰明甚如此必至遣兵於蒙古之地以收之矣我內地回子與白塔兒回子交易牟利則收白塔兒回子必無掣肘然西寧等處兵民大半皆是回子以回子征回子甚覺可虞且陜省兵丁之馬俱用之於進𠞰之兵目下陝省馬匹亦盡矣即急催補置不能立辦今雖邊塞無事如我兵馬不齊亦似難行且目下總兵官潘育龍標兵鼓譟至劾署總兵官事遊擊王之秀兵丁之心始安今若外征而內地無可虞之事始可以行今青海諸台吉之情我邊內兵丁之形有掣肘大可虞之事不得不密聞於皇上且多巴之事奉皇上訓諭云視青海諸台吉情之順否而行今其情與皇上所洞見者纎毫不爽應將措置多巴白塔兒之事暫且停止或可或否臣等會商具本密題以請訓旨又臣等駐劄甘州其輸租於噶爾丹之西喇古兒黃番人等已經招降現到頭目開呈人口數目六千許未到頭目亦報起行而來俟到日將人口數目及措置之事具本另奏上命集議皆以為應如圖納所奏行其招降黃番事目下無庸議上從之命商南多爾濟赴大將軍費揚古軍前上諭商南多爾濟曰大將軍駐劄善巴王喀倫地方正在有事之際爾可乘驛往會大將軍費揚古約會駐劄之處著費揚古預遣人通知命運米官兵各歸本汛召嶽升龍赴京運米侍郎李鈵奏言臣等運米有都御史于成龍隨行總兵官嶽升龍携來副將王起龍等官兵及管兵衆官事畢歸來京中無伊等之事應令官兵皆各歸本汛御車人夫諸項工匠俱交地方官遣歸本地其陸續歸來武辨兵丁人夫工匠隨其到日俱遣歸本地得旨嶽升龍著來京餘如所議命議糧運事務侍郎李鈵奏言臣與左通政喀拜於科圖地方料理西路大兵給糧之事欽召臣至京料理未完事件臣已於七月十三日起行歸來矣科圖地方所存正米三千七十六石餘不知西路大兵駐科圖幾月科圖所存米足與不足有餘無餘不能遽定臣等以車七百五十九輛馬騾二千八百三十五匹夫八百五十三名兵五百一名留科圖備用又都御史于成龍堆貯察罕腦兒地方正米三千八百四十八石零堆貯奎宿地方正米三千七百七十六石零又運米兵丁夫役食剩穀米四千五百九十二石零上命李鈵議奏議曰奎宿等處所存米俱都御史于成龍親視堆貯交該汛扎薩克蒙古官兵謹守不議外科圖所存烏喇將軍薩卜素官兵支剩之米應交都御史于成龍左通政喀拜以留在科圖之車裝載運至察罕腦兒于堆米之所堆貯空車仍交各原管官牲口愛養解回其陸續到來車輛仍交工部捐助牲口俱交兵部三省原備牲口仍交三省官員各帶歸本省暫養上命集議議曰三省原備牲口俱係各省官俸衙役工食所買應仍交三省原解官帶回聽該撫料理其完全車輛分給八旗滿洲蒙古漢軍佐領藏貯其廢棄損壞車輛免其補造賠償著諸大臣收交原價其所存之米應如李鈵議上從之乙酉命免防護牧圉輜重曠班各官罪先是正黃旗驍騎校署佐領西代正藍旗驍騎校署佐領巴錫鑲紅旗護軍校署佐領伍什正藍旗護軍校署參領阿米達等俱防護輜重曠班正白旗漢軍驍騎校署佐領王惠民防護牧圉曠班奉旨俱革職交部嚴加議處具奏至是兵刑二部會議以為定例雖無防護牧圉防護輜重曠班作何治罪欵項但行軍以防護牧圉防護輜重為要務西代等係實授防護輜重防護牧圉佐領官而規避曠不赴班坐此應將西代巴錫伍什阿米達王惠民等俱枷號三個月鞭一百上曰西代等從寬免枷責發黑龍江披甲當差庚寅命查巴拜台吉屬下人歸之先是喀喇沁王扎西旗下附籍厄魯特台吉巴拜因屬下博克寨桑來請安附奏云聞投誠之厄魯特在張家口外者有臣屬下人二三百上諭尚書馬齊曰此厄魯特乃先降有功之人著撥官一員帶此二人乘驛而往查認具奏至是馬齊等奏曰臣部差員外諾木齊代帶台吉巴拜博克寨桑前往認識回文云巴拜台吉屬下共男子六十三人婦女六十口童男十七人幼女二十三口格隆班第十二人以上一百七十五口令相識認俱云係台吉屬下人是實上命歸巴拜台吉辛卯命督運于成龍事畢還京于成龍報曰科圖所存米三千七十六石二斗內先給撫逺大將軍同駐科圖官兵後給大將軍隨行官兵總兵官嶽升龍標下官兵共三百二十一石零又黑龍江將軍薩卜素七月十六日到科圖至八月十六日一個月口糧支四百九十一石所剩之米二千六十四石零于是問烏喇兵再支幾月之米將軍薩卜素言我不能預定俟一月終再支目下科圖所在牽挽米車人夫及緑旗兵以京城備解穀米一百四十日已將給完或再給烏喇將軍官兵數月及給剩之米或在科圖暫俟烏喇將軍或運回至察罕腦兒貯米之處堆貯統俟部定奏至上曰科圖所在黑龍江將軍薩卜素官兵給至十月初一日口糧歸途行糧不必支給即將坐糧為食而歸押車人夫緑旗兵丁食米若完亦於此所剩米內酌給勿使困乏此事著于成龍等八月內料理完畢回京壬辰理藩院員外舍稜奏報厄魯特丹巴哈什哈之妻諸人來降及噶爾丹情形舍稜報曰臣率喀爾喀公車木楚克納木扎兒等向土喇前行至一地名衛徴克勒德地方差公車木楚克納木扎兒旗下佐領蘇布體博羅長史查木巴拉配兵各十名分三路哨探蘇布體前往見一隊行人即近前視之乃厄魯特人也因擒之而歸問之供言皆噶爾丹屬下人吾名莽奈我夥伴十四人我等在噶爾丹地方聞我厄魯特之人來降聖上不殺加以厚恩特此來降我等以外别無他人七月初四日自塔米爾地方來我等戰敗各自逃竄至塔米爾見噶爾丹欲會盟以議行止往召阿拉卜灘阿拉卜灘至噶爾丹言欲往翁金掠其界上人取糧以往哈密丹濟拉言我等之力不能往翁金欲往阿爾台阿拉卜灘丹津俄木布言欲掠俄羅斯之哈喇特布喇特等之糧往阿爾台衆論與噶爾丹之意不合故無定議而散阿拉卜灘丹津俄木布不願往翁金而敗遁之時噶爾丹屬下馬駝被丹津俄木布屬下竊騎而去故相會之後噶爾丹查此馬駝使還原主丹津俄木布不從是以內自不睦阿拉卜灘與丹津俄木布善故叛噶爾丹去路遇明古特人等收而取之宿于吉齊根特之地隨走洪郭爾阿拉卜灘等自得明古特之後有兵二千餘噶爾丹丹濟拉土爾伯特之車陵伊拉古克三庫圖克圖俱同往塔米爾我等不知其所往噶爾丹有兵千許阿拉卜灘未叛噶爾丹之前噶爾丹下人言我等居無廬食無食衣無衣從彼以死而已盍於未寒之先覓一有國土之地乎下人互相嗟怨如此至我等來時達賴喇嘛所差使人達爾漢俄木布到現在噶爾丹處于是查厄魯特降人計箭手十一人婦女三人內有丹巴哈什哈之妻丹巴哈什哈之弟索諾木之妻又有丹巴哈什哈之兄子名胡代丹巴哈什哈之妻達氏言我自别我丈夫隨噶爾丹至塔米爾地方聞我丈夫在此我乃告於丹津俄木布曰我夫妻向與爾無仇我丈夫既往降聖上乞爾使我與丈夫完聚丹津俄木布曰我將逺避噶爾丹定一栖止之地欲遣使於西方策旺喇卜灘併遣使於聖上俟遣此使時帶爾同去我欲待使人偕行恐其遲久故我先逃來歸降聖主於是以丹巴哈什哈之妻等十三口送交安王等沿途小心押護給之糗糧送與丹巴哈什哈完聚外臣不往土喇率兵回至喀倫以待將軍費揚古為此將收獲厄魯特之事奏聞併以降人莽奈交小校俄木克圖解往上曰著以此示議政大臣癸巳命遣官召回回國王阿卜都里什特赴京先是郎中滿都密報曰回回國阿卜都里什特汗及其子額爾克蘇爾唐自厄魯特噶爾丹處來降告曰康熙二十一年噶爾丹遣人於我誑言議事我等往所約伊里地方噶爾丹盡執我父子及從人帶我等各處行走今皇上大兵擊敗噶爾丹之次日我等才得脫身來歸聖朝近聞厄魯特人言噶爾丹本身有二千許人在古爾班塔米爾臺庫魯地方廬帳什物皆無噶爾丹既窮斷不能久居塔米爾殆往青海耳舍哈密土魯番葉爾欽三路外别無他路如從哈密往則哈密與嘉峪關相近嘉峪關有皇上大兵必不去也未必不奔往土魯番若葉爾欽則有我回回兵二萬許在彼土魯番則有五千兵哈密則有五百兵又聞策旺喇卜灘住扎博羅塔喇我父子受噶爾丹拘執十四年之苦我今已老雖入中國蒙聖主天恩度日並無可報效噶爾丹不但有執我之仇我回子通國俱有仇現今噶爾丹敗困流行之際我願得留我子媳諸孫於此我身携我妻默民白克往土魯番以聖上好生之德宣諭我屬下衆回子策旺喇卜灘所居博羅塔喇與土魯番相近往與策旺喇卜灘合謀如噶爾丹來人少則執之以報我父子十四年受辱之仇謹奏上命議政大臣集議議曰皇上神威擊敗噶爾丹而回回國君阿卜都里什特即入降今欲留其子媳諸孫於此而其身往土魯番以聖上好生之德宣諭衆回子且與策旺喇卜灘合謀邀執噶爾丹誠心諄請自當準行令理藩院差官一員往召阿卜都里什特併其妻默民白克至京加之恩賜撥賢能官一員送至嘉峪關令地方官量撥本地回子足給坐馬口糧遣出嘉峪關上曰著遣官召阿卜都里特本身及其妻子諸孫星速赴京可傳旨云其妻子諸孫俱一同遣歸不必留此命議收撫巴爾虎之事先是理藩院奏言前令黑龍江將軍薩卜素如遇生巴爾虎收之而來後據薩卜素以收巴爾虎之事復行奏請得旨巴爾虎之事已經遣人往諭該屬車卜登貝勒矣俟所遣人歸當再遣人往諭將軍薩卜素今奉旨云著將軍薩卜素於回汛之時乘便來赴京城修整行裝遣使歸去則收巴爾虎之事當如何處置為此請旨命議政諸臣集議至是議曰今將軍薩卜素來京則收生巴爾虎之事不當交將軍薩卜素應檄貝勒汪扎兒扎薩克台吉阿里雅阿爾薩郎衛賽桑等云生巴爾虎等可收則收之如不可收則將巴爾虎所居何地人數幾何奏明之時再議上曰今無生巴爾虎矣汪扎爾貝勒屬下齊巴齊努特他布囊古特六百户在扎薩克台吉阿里雅阿爾薩郎衛賽桑處其夥伴五百戶在呼倫之烏冷地方已有旨諭汪扎兒貝勒之母波底素克云爾可收汝之人如不能收朕將收之至呼倫所在他布囊古特則車陳汗奏言奪竊其牲畜臣之人民少如皇上以此給臣臣將收之倘收而不服將以力取之亦已有旨諭之云伊等俱有主汪扎兒貝勒之母波底蘇克喀通將收此他布囊古特等如不能收朕另有裁奪不便將伊等給汝命暫停屯兵之議先是理藩院奏言自正藍旗察哈爾界上至喀爾喀河理合屯兵請差大臣往視得旨屯兵之地應否差大臣往視著集議至是議曰今皇上親統六師擊敗厄魯特噶爾丹噶爾丹棄其妻子孑身逃遁窮困已極滅在旦夕應暫停差大臣往視屯兵之地俟噶爾丹實有聲息其時再將往視屯兵之事應行應止復議具奏奏入上從之甲午遣使賫敕往諭達賴喇嘛班禪達賴汗第巴策旺喇卜灘先是達賴喇嘛達賴汗第巴等使人於六月三十日到京上簡次等大喇嘛晉巴扎木素德木齊索諾木臧布主事保住為使賫敕往諭達賴喇嘛等至是保住以其行事繕摺奏請訓旨第巴倘仍如前以達賴喇嘛坐禪不可得見為辭則將如何若第巴以為將遣班禪來則臣即携之來乎抑先遣人奏聞乎倘到彼地而遇策旺喇卜灘使人則當如何宣諭至噶爾丹流散之人及其四圍居人有願降者即率之來乎為此具奏請旨得旨托言達賴喇嘛坐禪不使相見之事敕內開載甚明如第巴堅執不使相見爾等取其根據決絶而歸如云遣班禪來則先奏聞衆厄魯特有來降者俱携之來晉巴扎木素德木齊索諾木兩喇嘛但為彼識達賴喇嘛之面而差之耳非為行事也保住朕簡用爾此行事關重大爾對第巴言諸事須著實緊峭照常尊稱達賴喇嘛班禪如第巴又言達賴喇嘛將使垂楞為之卜爾但詰之曰垂楞所禱祠者惟達賴喇嘛耳達賴喇嘛尤有問垂楞而行之理乎至達賴喇嘛身故果真則言使班禪主喇嘛之教待為至尊爾務索濟隆庫圖克圖而來如發濟隆來萬事俱休如第巴以殺濟隆革喇嘛為疑爾則極口保之如不遣濟隆來爾則謂第巴曰爾為一人而傷億萬生靈有是理乎如不從聖上之旨我聖上豈輕已乎凡事爾當深計日後雖悔莫追矣至敕內開載使遣汝等歸及正月到京爾但一到即言奉聖旨限我等正月到京如正月不到必殺之爾如略使久留我等亦居於此耳斷不歸去矣爾等欲殺則殺我等數人無甚關係或有為之報仇者亦未可知併將爾往使於噶爾丹噶爾丹拘禁爾三月使徒步而歸之事俱口語第巴如在其地遇策旺喇卜灘之使爾其略加平和以噶爾丹前後諸事詳告之言我聖上無誅噶爾丹之意至今猶使將軍留大兵以招撫噶爾丹保住又奏曰保住一介庸愚蒙皇上簡充信使事關重大願得欽遵聖諭行事星速歸來復命如與達賴喇嘛使人同往恐行遲日久請携達賴汗第巴使人前行上許之令保住十一日起程尋理藩院奏言達賴汗第巴使人偕保住先起程達賴喇嘛使人於本月十五日起程上曰善諭達賴喇嘛曰朕統御寰區以生成為務尊崇佛教以道律為本故特往召班禪將以化導悖亂中外禮法歸一也爾喇嘛與朕從來意誼如一交好六十餘年想已將朕深眷之心宣告班禪是實但第巴與噶爾丹朋比恐嚇班禪言噶爾丹之兵將要而殺之不遣之行先是烏闌布通之役遣濟隆庫圖克圖為噶爾丹誦經擇戰日及噶爾丹敗又誘我軍講和遂使噶爾丹得以逺遁朕與喇嘛向來同心相好有年深知斷不作此舉動明皆第巴指喇嘛之名而為之也至噶爾丹大敗於烏闌布通將走之時頂爾所給威靈佛像於首誓不復犯歸降聖朝之喀爾喀矣乃去歲背誓至克魯倫內青城地方掠納木扎爾陀音朕數遣使問故而怙惡不悛不見我使敢行無禮奪其馬徒步遣歸朕乃震怒調兵親統六師近逼噶爾丹彼猶不知朕不忍遽加誅滅矜憐衆生死亡諭噶爾丹會盟定議喀爾喀之事差長史多禪中書阿必達賫敕且遣所擒厄魯特生還曉以我兵各處堵截之事噶爾丹又奪使臣護送兵丁之馬褫使臣之衣朕又遣彭素克格隆等問故而竟不遣歸朕沿克魯倫而上以探使人聲息噶爾丹不能抗朕之威棄其廬帳器械什物遁至特勒爾濟地方遇我堵禦西路大將軍費揚古之兵噶爾丹復先攘臂我兵即大破噶爾丹盡俘之臨陳阿奴等諸貴人亦被殺斬有名賽桑等甚多共殺厄魯特二千餘其丹巴哈什哈察罕西達爾哈什哈等皆來降盡獲其馬駝牛羊噶爾丹棄其佛像經籍以及各色物件僅携二十許人先衆逃入林中朕留喀爾喀兵務索噶爾丹執而誅之噶爾丹敗好凶惡已極以致絶滅此喇嘛來使親身灼見而去者也至降人厄魯特言達賴喇嘛卜云噶爾丹東征吉此種指使噶爾丹及阻止班禪之事皆第巴目無爾達賴喇嘛之所為也朕明知之朕不以爾事之有無介意是以别降旨於第巴兹為滅噶爾丹告捷禮以噶爾丹佩刀一阿奴之佛像一佩符一特遣使賫往併發伴敕禮縀十匹又朕嘗遣員外二郎保往諭青海達什巴圖爾等台吉云如有噶爾丹之人在汝等地方執之解來據二郎保報稱青海達什巴圖爾等三十一台吉俱到盟所已將檄文遍給諸台吉矣達什巴圖爾邀臣至其廬彼言東方有聖上西方有達賴喇嘛兩聖同好歷有年所我青海諸台吉近邊居住六十餘年未嘗生一事噶爾丹殺我俄齊爾圖汗取我屬裔於我亦有仇但噶爾丹之女嫁博碩克圖濟農之子乃啓聞西方而結姻者也我等俱達賴喇嘛之徒我等凡事皆啓聞西方彼地之言如何則遵而行之不得據我等之意覆奏故檄達什巴圖爾等遣人於達賴喇嘛後作何定奪速備文知會理藩院為此諭達賴喇嘛知之其達什巴圖爾台吉等蒙古原文併發敕諭班禪庫圖克圖曰朕撫御萬邦無分中外一視同仁尊崇佛教以道法歸一為要務今以達賴喇嘛已老爾庫圖克圖道法不二勤修不倦誦經行善特往召爾庫圖克圖朕將與爾同化導悖亂使中外道法歸一而第巴心懷嫉妒與噶爾丹朋比恐嚇爾庫圖克圖言噶爾丹兵將要而殺之阻不使行先是烏闌布通之用兵也第巴亦指達賴喇嘛之名遣濟隆庫圖克圖為噶爾丹誦經且擇戰日及噶爾丹敗後又詭言講和以悮我軍使噶爾丹得以逺遁朕已别有敕諭第巴指出第巴種種助噶爾丹之事及阻爾不行之舉當噶爾丹大敗於烏闌布通遁走之時頂達賴喇嘛所授威靈佛於首誓不復侵歸降聖朝之喀爾喀矣去歲背誓至克魯倫內青城地方掠喀爾喀納木扎爾托音朕屢遣使問故而彼怙惡不悛不見我使輒行無禮奪其馬徒步遣歸朕乃震怒調兵親統六師近逼噶爾丹彼尚不知朕猶不忍遽滅之憫念噶爾丹之死諭噶爾丹姑來會盟定議喀爾喀之事使公主長史多禪中書阿必達等賫敕釋所擒厄魯特生還曉以我兵各處堵截之事噶爾丹又奪使臣護送兵丁之馬褫使臣之衣朕又遣彭素克格隆等問故竟不遣歸朕於是循克魯倫而上噶爾丹不能抗朕之威棄其廬釡器械什物遁至特勒爾濟地方遇朕所遣堵截西路大將軍費揚古兵噶爾丹又先攘臂我軍遂大破噶爾丹盡俘之臨陳阿奴等諸貴人亦被殺斬有名賽桑無算共殺厄魯特有二千餘之數其丹巴哈什哈察罕西達爾哈什哈等人俱來降盡獲其馬駝牛羊噶爾丹盡棄其佛像經籍以至各色物件僅率二十許人先衆遁入林中朕留喀爾喀兵務索噶爾丹擒而殺之噶爾丹敗好凶惡已極至於永滅特遣使諭知併發伴敕禮幣八端諭達賴汗曰朕欽崇佛教總持道法但皈道法之人則嘉之悖道法之人則懲之爾自顧實汗以來同心專尚宗喀巴之道與本朝和協至爾汗之身益誠信不渝舊好頃者噶爾丹陽護宗喀巴之佛教隂主悖逆之邪行詐傳達賴喇嘛之語遍地興戎殺掠喀爾喀毁壞道法而第巴反從中聳慂烏闌布通之役遣有玷僧規之濟隆庫圖克圖為之誦經且擇戰日及噶爾丹敗後又借講和以誤我軍使噶爾丹得以逺遁後又指達賴喇嘛之言南征吉大慶也種種煽誘噶爾丹遂敢背誓至土喇克魯倫等處劫奪我納木扎爾陀音朕始親率大兵出討分路𠞰滅之夫第巴者乃達賴喇嘛下司事之人理應篤敬道法今反不遵達賴喇嘛而欺凌衆人是以朕别有旨深加責讓惟爾汗不違前好朕使之往依然敬待每對使欵接時預以噶爾丹之事密使聞之朕灼知爾不忘舊好甚堅且篤凡敗壞道法煽誘噶爾丹者汗殆知之也至青海諸台吉亦與之無涉是以特遣使以示褒善貶惡之意併發伴敕禮幣八端諭第巴曰朕崇道法而愛衆生故實心以護道法者加之眷祐隂誘人以壞道法者加之罪譴爾第巴原係達賴喇嘛下司事之人因爾不違達賴喇嘛之旨輔助道法朕是以優封爾為土伯特國王今觀爾陽則奉宗喀巴之教隂則專與噶爾丹比欺達賴喇嘛班禪庫圖克圖而壞宗喀巴之教先是爾以久故之達賴喇嘛詐稱尚存遣濟隆庫圖克圖至噶爾丹所烏闌布通之役為噶爾丹誦經且擇戰日及噶爾丹敗又以講和為辭貽誤我軍使噶爾丹得以逺遁朕為衆生遣人往召班禪庫圖克圖爾又誑嚇班禪庫圖克圖謂噶爾丹將要而殺之而不遣行青海博碩克圖濟農潛與噶爾丹結姻往來通使而爾又不舉發如噶爾丹博碩克圖濟農無爾之言有相與為姻者乎噶爾丹信爾唆誘之言故不遵朕之旨昔噶爾丹在烏闌布通大敗而走之時首頂威靈佛立誓乃背棄誓言去年至克魯倫左側掠我喀爾喀降人朕特遣員外阿爾必特祜為使問其事因乃噶爾丹不即見我使臣遲之日久反盡奪其坐馬徒步遣歸繼又遣侍衛克什圖筆帖式薩哈連等為使仍前盡奪其馬匹徒步遣歸其後又遣主事保住為使亦如此遣歸是以朕大震怒調集各路兵馬親統六師近逼噶爾丹即欲率大兵𠞰滅之又不忍衆生橫罹鋒鏑特遣公主長史多禪中書阿必達為使賫敕往諭噶爾丹曰朕將與汝會好言定議喀爾喀之事爾勿疑懼朕斷不欺罔人也不意厄魯特噶爾丹仍凶惡不已奪我使護送兵丁之馬褫使臣之衣又遣彭素克格隆賫敕特問其故仍未遣歸朕正待所遣使臣聲息遡克魯倫而上噶爾丹畏朕之威棄其子女廬釡而遁至特勒爾濟地方遇西路大將軍費揚古等大兵噶爾丹即來拒戰大兵乃進擊之噶爾丹不得旋踵遂大敗陳斬阿奴併斬沙津車陳寨桑古英寨桑孔郭羅額爾克寨桑根敦寨桑俄爾古克圖卜新寨桑額爾克台吉楚呼拉格隆厄魯特人二千餘被殺回回國王阿卜都里什特厄魯特台吉韓都塞冷扎卜梅寨桑馬穆古英寨桑巴圖爾台吉顧祿默爾根台吉額林辰哈什哈古英吳巴什筆齊齊等及厄魯特二千餘人皆來降盡獲其子女駝馬牛羊廬帳噶爾丹僅率二十許人而遁丹巴哈什哈察罕哈什哈等來降博碩克圖濟農遣往噶爾丹使人羅壘厄木齊等被擒皆言達賴喇嘛歿已九年矣達賴喇嘛者乃至大普慧喇嘛本朝為護法之主尊奉六十餘年則其訃音即當奏聞於朕爾乃匿而欺衆倚噶爾丹以興戎其罪甚大降人丹巴哈什哈又告曰噶爾丹聞上親統六師已到克魯倫遁走之時傳語衆人曰我來此克魯倫非吾意欲深入也奉達賴喇嘛之旨云南征元吉大有慶也我是以深入蓋達賴喇嘛殺我而我殺爾衆矣達賴喇嘛與朕道法合一相敬有年如達賴喇嘛尚存決無此等事明係達賴喇嘛亡後爾私指達賴喇嘛誑噶爾丹也爾之所行為道法乎抑為己行詐乎朕乃養育衆生之元后彰善疸惡斷然不爽爾果改過仍思遵宗喀巴之道奏明達賴喇嘛已故始末尊奉班禪庫圖克圖使主喇嘛之教副朕之召遣之使來執濟隆庫圖克圖以畀我解青海博碩克圖濟農所娶噶爾丹之女朕仍前待汝以尊崇之禮不然數者或缺其一朕必問爾詭詐欺達賴喇嘛班禪庫圖克圖助噶爾丹之罪發雲南四川陜西等處大兵如破噶爾丹之例或朕親行討汝或遣諸王大臣討汝爾向對朕使喇嘛言四厄魯特為爾護法之主爾其召四厄魯特助汝朕將觀其助汝何如也爾其速辦此事及正月星速來奏否則後悔無及矣為此特遣使臣往諭併發伴敕禮幣六端諭策旺喇卜灘曰朕統御寰區遐邇一體仁育萬民皆欲使之共享安樂朕躬為一統之主懷保萬方奬善良懲凶逆未嘗或爽先是爾策旺喇卜灘陳奏噶爾丹之狡詐與侵害爾之實情誠心懇請眷恤朕嘉爾恭順全受爾之貢獻且以噶爾丹狂悖不靖闌入烏闌布通為朕偏師所敗跪誓於威靈佛前後又背誓害我使臣掠喀爾喀沮止班禪庫圖克圖之來又至巴顔烏闌將為禍亂其意顯露因發三路大兵𠞰殺噶爾丹諸事降敕詳諭矣朕親統中路大兵近逼噶爾丹即欲率大兵𠞰滅之又不忍衆生橫罹鋒鏑是以暫停撲𠞰遣諭噶爾丹使與我會好定議喀爾喀之事爾勿疑懼朕躬俟使臣覆奏遡克魯倫而上噶爾丹聞之不能抗天威心膽俱裂棄其子女廬帳釡鐺什物遁去遇朕所遣堵截西路大將軍費揚古兵於特勒爾濟之地噶爾丹即來戰大兵乃進擊之噶爾丹不得旋踵遂大敗斬噶爾丹之妻阿奴及厄魯特二千餘人丹巴哈什哈察罕西達里哈什哈等人二千餘俱降盡俘獲其人口馬駝牛羊廬帳什物噶爾丹丹濟喇丹津俄木布阿喇卜灘等紛紛潰遁噶爾丹今已困窮矣爾向誠心肫篤請安進貢不絶於道與噶爾丹有不共戴天之仇噶爾丹窮凶極惡不可留於人世一刻尚存即為生民之不利務必𠞰除以安厄魯特蒙古之生今或流行爾屬下厄魯特地方或奔往哈密地方如生擒噶爾丹則擒之來殺之則以其首來如此則爾向來恭順之心益著而朕眷顧之恩益無窮矣至於達賴喇嘛班禪庫圖克圖達賴汗第巴等皆有敕諭之并以其藁發爾知之丁酉命停點巡邊大臣尚書馬齊奏曰請照前例點巡邊大臣上曰著停派大臣巡邊厄魯特巴拜台吉奏請禁廷效力理藩院奏曰附籍喀喇沁扎什王下巴拜台吉呈稱我原以身獻皇上而不能為皇上效力乞使灑掃街道為此具奏上曰巴拜先衆來降朕另有旨加恩著彼暫率其人歸去巴拜台吉又呈稱恭逢皇上親征擊敗噶爾丹凱還奏賀之便以我屬裔來降之事奏聞蒙皇上俯憐以我屬裔復歸於我但皇上恤我屬裔而我力不能帶回乞給驛遣歸為此具奏上曰著給之驛傳己亥宥額駙尚之隆等罪諸王公等免察議先是上諭議政大臣曰是行也皇七子實𨽻鑲黃旗軍中其副都統兼長史穆森至鑲黃旗來甚倨作氣勢奏請已給兵丁之米令彼執事人員支取皇子日用之物俱遲悮不給向來軍中功罪俱自途間開册携歸是役之事皆朕親裁故無册籍朕不舉出更無大臣知之穆森本身官職副都統長史俱革去著議政諸臣議罪具奏此旗原交額駙尚之隆都統杜思噶爾理事官溫達料理營務著將伊等一併議奏與朕子同行之人朕若不舉出則事不公有得則身任之有失則默然可乎至王以下公以上朕皆指授某旗某營或有違朕指揮隨意而行者此皆關係軍政朕不舉出誰復舉之至撥前鋒二百名護送使臣以喀瓦爾達阿喇卜灘為首併以俄齊爾台噶爾臧額駙亦為首朕諭而遣之曰爾等勿過燕圖庫列圖即自彼地縱去乃違朕旨前往致被厄魯特奪去如許馬匹亦著議政諸臣會同察議至是議政諸臣議穆森乃皇七子長史而皇子日用之物俱遲悮不給又在皇子鑲黃旗中不黽勉效力甚倨傲故作氣勢已給兵糧數尚不敷乃請使執事人員支取殊為不合應將穆森鞭一百不準折贖額駙尚之隆都統杜思噶爾理事官溫達交理皇七子鑲黃旗營務穆森甚倨傲故作氣勢皇子日用之物俱遲悮不給並不劾奏又穆森欲將已給兵糧令執事人員支取並不沮之一同奏請不合應將額駙尚之隆都統杜思噶爾督捕右理事官溫達俱降三級調用尚之隆原銜內大臣兼太子太保革去太子太保抵降一級罷內大臣仍降二級隨旗行走至違指揮之王公等俟命下之日察議入奏得旨尚之隆革去太子太保抵所降一級仍降二級留任杜思噶爾溫達俱降三級從寬免調用留任穆森從寬免責諸王公內有效力者亦有不效力者此役已竣大兵凱旋從寬免察議癸卯侍讀學士喇錫奏報噶爾丹情形喇錫奏曰臣等至工噶牢臺噶爾丹屬下額圖格等來降言噶爾丹阿喇卜灘等俱在塔米爾欲從翁金前往瀚海雖此言真偽尚不可料當驗明噶爾丹等人之衆寡所向之地再商行事及到噶薩納之察罕奴和乃我大兵擊敗噶爾丹之地七月十二日遣正藍旗佐領恩格森等令從俄爾洪土喇總路直至塞稜格屣探又備印文發根敦代青交恩格森去訖又於塔米爾地方差都統噶爾旦等照前屣探聲息臣等親身于伊等未還之際在特勒爾濟河上下憨山四圍山谷林莽之中搜厄魯特所委棄之人七月二十一日至土喇駐扎烏列臺河上恩格森等歸言我等於本月十六日到塞稜格河之古爾班古庫兒對岸見無小路於是沿河岸上下行三四十里屣覓新舊蹤迹俱無原思得小路則渡河再為屣覓因不得小路我等在彼地宿次日方回噶爾丹等未嘗往俄爾洪土喇總路去視其行蹤蓋遡特勒爾濟而上至扎克墩地方後渡土喇河向西南去矣根敦代青之蹤迹音息亦無我等於奎塔爾地方遇阿喇卜灘屬下男婦十二人騎馬十二匹帶烏鎗二桿撒袋二副刀二口來投我軍今携之而來問之據俄齊爾等言我原係右翼扎薩克圖汗屬下俄兒哈諾特之人自破扎薩克圖汗後我兄弟二人遂離衆人略帶所剩牲畜往居瀚海之內採捕狐獸度命後牲畜漸完不能資生前年乃降厄魯特在阿喇卜灘下阿喇卜灘被皇上大兵擊敗遁走之後我等亦隨之遁走阿喇卜灘對其寨桑等言曰我輩除各自身命妻子外其餘衆人俱不能保矣是以我等恐見殺取我一二牲畜而去自扎克都兒內阿喇卜灘屬下厄魯特人齊倫夫婦及我兄弟各携妻子向此逃來半路又遇數起潰走者盡奪所餘些須牲畜徒步而行又拾得我所棄馬二匹然無糗糧各處採捕狐獸將及兩月仍住居此處遇佐領恩格森帶之前來本月二十五日噶爾旦等到憨山見臣告曰我等循土喇行視噶爾丹遁迹本月十八日到塔米爾之布爾哈見厄魯特一人亦無有住彼地數日之迹於是我等留人於其地撥什庫俄爾和代及我四人向翁金之路塞稜達什等四人向臺庫勒之地屣探蹤迹見臺庫勒以內有彼來蹤無外去之迹乃起程向翁金行一二日又有向西南斜去順頽塔而往之迹因青草茂長蹤迹不甚分明視其各處煮肉為食行竈之灰似從我等所到之地起程前往十日有餘矣於是我等回又縱橫屣探並無蹤迹噶爾丹等往頺塔是真云切思塔米爾之地距憨山千里有餘噶爾丹等自塔米爾前去又二十餘日地里相隔甚逺是以不能復遣人臣等在憨山四圍候其聲息使人屣探憨山前後土喇河上下並無蹤迹聲息臣等乃率車陵扎卜阿爾薩闌衛寨桑等兵正將歸時本月二十九日丹巴哈什哈嫡姐夫噶爾丹屬下祁齊克默爾根薩圖二人來降告曰我等戰敗之後尋覓妻子不得於是我等隨我汗之蹤到塔米爾始知我妻子已與丹巴哈什哈同降我等即欲來投聖上而不得其便是月初四日丹津俄木布叛噶爾丹去初五日噶爾丹親率兵往追之乃乘其隙於初六日我兩人騎馬七匹隨大兵之蹤向憨山而來中途遇烏里揚海之人奪我等馬我等徒步而行才得至此前者噶爾丹到塔米爾後各遣人召衆共議將視無兵之地掠瀚海四圍居民取其糗糧以往哈密丹津俄木布言哈密皆村落我不慣居其地議定後阿喇卜灘因行裝在額得爾齊牢是以阿喇卜灘隨噶爾丹行二日往取行裝後丹津俄木布率其所轄左翼於是月初四日叛向西而去博羅特寨桑和碩齊亦在丹津俄木布所潛遣人來告噶爾丹曰丹津俄木布叛汝與阿喇卜灘合往投䇿旺阿拉卜灘我不能脫身無可奈何隨之而去如得一藏身密地我將留與汝會噶爾丹方知之遂不往翁金遣妻子赴庫冷白爾齊爾相待其身儘其所有率兵千許往追之我等次日即向內逃來不知其後如何聞有棄丹津俄木布而來者言明安特納馬什希台吉率五百人亦隨丹津俄木布而去兩起相合其人殆有千餘阿喇卜灘蓋一無所預自覓生路去矣若丹濟喇則斷不背噶爾丹也我等明知大軍早還向喀倫大道而行固近然不識其途聞瀚海又無水土喇克魯倫乃我等所知之地雖不能追赴軍中然隨大兵蹤迹想可到喀倫是以從此來聞丹巴哈什哈之妻亦逃未知得出與否如再有一二逃來之人想亦由我等行蹤而來耳因其言如此恐來降者果從土喇來地之相去甚逺無人收集必至有乏糧之困且噶爾丹丹津俄木布交惡相攻其潰散之人欲前去者前路又逺未必不至土喇憨山地方捕獸取魚以度生命是以臣等量糗糧之數率車陵扎卜旗下兵二百名阿里雅扎薩克兵五十名暫於憨山四圍守候聲息遣人屣探為此奏報命撤坐塘人員上諭大學士伊桑阿曰此行坐塘人員勤勞奏績不與運糧各官同今已戒寒著該部行文撤回內除馬匹倒斃缺額外其效力人員俱交部議敘允大將軍費揚古調發蒙古兵費揚古奏言臣率黑龍江兵五百名於七月二十五日起行赴王善巴喀倫已經報部外其達爾漢親王四子部落毛明安三吳喇忒六旗每旗乞發兵一百歸化城土默特兩旗乞各發兵一百遣至臣所居善巴王喀倫之地亦皆報訖至王善巴之兵俟臣到後與王善巴同商酌發其所需之米俟到其地之後隨宜度勢扣兵足用之數留貯其餘交王國昌令給七旗所留米數俟定後報部上交該部議理藩院議以為所發兵應皆如大將軍所奏撥發其給兵米數聽大將軍奏聞上從之督運于成龍等奏報以米給黑龍江將軍官兵餘米運貯察罕腦兒于成龍等報曰黑龍江將軍官兵僕從共一千二百三十三口自八月十六日起算至十月初一日止共給四十五日口糧三百六十九石九斗零其餘米一千八百九十四石零於本月十二日自科圖運回堆貯察罕腦兒為此奏報甲辰尚書圖納奏報招撫黃番黑番圖納報言臣與總督吳赫提督李林隆署理巡撫事布政使戈洪同駐甘州招撫噶爾丹納賦人西爾古兒黃番頭目伊扎卜順等男婦大小六千七十九口黑番頭目喇咱噶卜楚等男婦大小一千一百六十九口共七千二百四十八口此外管理伊等坐收賦稅者乃噶爾丹屬下厄魯特達爾漢寨桑布爾竒等大小一百六十八口亦俱招降因伊等係真正噶爾丹屬下厄魯特人故於八月初四日令彼起行赴京奉旨事理俱畢臣亦於八月初四日自甘州起行赴京為此奏報命宥悮驛官員罪查驛兵部員外常泰舉奏知縣魯貽哲等文武官員站馬缺少驛務廢壞部議分别降級罰俸具奏上曰此所查驛乃未出兵以前之事既出兵以來此路驛站並無違悮俱從寬免治罪丙午命撥官護送回回國王阿卜都里什特至西寧先是上諭理藩院曰著問京城四圍居住回子有願自備資力護送回回國王阿卜都里什特等至西寧回子葉大魁處者送到歸來之時議敘其往運米之楊回子亦著召問至是理藩院奏曰集問在京回子有前次運米候缺主事回子楊國琳候缺守備王嘉謨候缺知縣改肇新俱情願自備坐馬衣服沿途食物護送回回國王阿卜都里什特等至西寧回子葉大魁處其中應撥何人護送謹奏請旨上曰著撥候缺主事楊國琳不必再遣部員即交彼遣行尋理藩院又奏曰本月二十五日皇上御殿回回國王阿卜都里什特及其子額爾克蘇爾唐謝恩謝畢飲茶應令阿卜都里什特坐於貝子之下額爾克蘇爾唐坐於公之下又四十九旗諸王台吉及喀爾喀等謝恩俱與中國諸王大臣官員同班行禮回回國王阿卜都里特等無有朝服應使另為一班行禮上從之命黑龍江將軍薩卜素赴京上諭兵部曰著檄諭將軍薩卜素云其兵已給米至十月初一日為止如携兵到京餵馬則道途迂曲著將軍薩卜素以兵交賢能之人從邊外發回薩卜素自身量帶人員來京若此軍之馬瘦難以到家薩卜素同帶至京養馬而去薩卜素不必再奏請旨一面起行一面奏聞揚威將軍舒恕奏請赴大將軍費揚古軍中將軍舒恕侍郎滿丕奏言大將軍伯費揚古率兵往善巴王喀倫臣等前次奉查之事已俱奏聞外目下歸化城更無别事大將軍伯費揚古既領兵在喀倫臣等願往大將軍伯費揚古軍中效力上允之命安郡王馬爾渾回京上諭大學士阿蘭泰尚書馬齊曰大將軍伯費揚古既在喀倫可著安王率兵徐行養馬而歸著員外舍稜在安王駐劄之地偵探聲息丁未命革俄齊爾邵塞他布囊之職先是土默特多羅達爾漢貝勒額爾德木圖奏言去年有厄魯特之警而備兵也四等他布囊俄齊爾邵塞詐稱患病不往臣親與協理他布囊善達俄齊爾俄齊賴台吉羅卜藏等會議將俄齊爾邵塞照律罰馬五十匹今俄齊爾他布囊屬下佐領官額林辰等首言康熙十四年察哈爾布爾呢叛他布囊俄齊爾詐病不出兵二十九年出兵又病而不出連今一次共計三次訊問得詐病不出是實俄齊爾他布囊三次詐病不出殊為可惡如此規避者若不懲治則俄齊爾等不知警戒而無效力之人矣二十九年俄齊爾他布囊病之真偽未經詳查舉出乞併將臣等議處奉旨交該部議理藩院奏令他布囊俄齊爾邵塞速赴軍前俟凱還之日再將伊等規避不出兵之事詳審奉上準行至是他布囊俄齊爾邵塞已歸理藩院議他布囊俄齊爾邵塞有厄魯特之警發兵不赴依律罰馬各五十匹貝勒額爾德木圖等未經察出請議處無庸議上曰他布囊俄齊爾邵塞出兵規避可惡俱革去他布囊餘如所議戊申理藩院員外多爾濟奏報噶爾丹情形多爾濟奏言臣至扎薩克台吉車陵扎卜所居喀倫之外喀喇莽奈地方札薩克台吉車陵扎卜阿爾薩闌衛寨桑等已率兵而歸因侍讀學士喇錫量帶兵丁住滾噶牢臺阿爾哈蘇臺河俟伊闌他米爾偵探一到即歸是以不向前行住於扎薩克台吉車陵扎卜所居之地有厄魯特噶爾丹屬下達什俄欽納木喀達爾扎班第三人來投臣等喀爾喀王盆素克旗下阿爾巴楚爾等見之携至臣所問之供曰噶爾丹敗率二十許人遁至他米爾之台庫勒地方以俟衆人將收之丹濟喇丹津俄木布伊喇古克三庫圖克圖等俱陸續往會阿喇卜灘自敗以來不見噶爾丹另率其屬下人行至他米爾其身獨往見噶爾丹遂與其衆俱去丹津俄木布托言創發欲往浴溫泉率其屬下男婦共六七百許人於七月初一日叛噶爾丹而去噶爾丹乃留其輜重於台庫爾親率其所有七八百許兵本月初三日往追之初七日及之於額德爾齊勞圖之地取回男婦五百餘人丹津俄木布本身携妻子及六十許男婦向西而逃不知所往噶爾丹於本月十七日回至台庫勒率丹濟喇伊喇古克三庫圖克圖及達賴喇嘛之使人俄木布喇嘛等於十八日向庫冷白兒齊爾挈裝而行住於其內其地名頽伊等男婦共一千七八百阿喇卜灘去噶爾丹所住之地六七日程仍向西行其人數我不之知噶爾丹下人馬駝不過一二匹而已牛羊全無噶爾丹遣其人名羅卜臧者往謂阿喇卜灘曰我等無食當往瀚海之外有善巴代青等衆力弱則掠之力強則盜其馬畜以為糗糧其人猶未歸又有噶爾丹捕獸之人來告曰有五六匹馬迹順瀚海而去噶爾丹對衆寨桑言殆我逃人去爾倘泄其語於善巴代青則我等之去亦徒然矣又下人言噶爾丹議欲往瀚海其地無水亦且無獸雖到瀚海難以歸來我等食無食居無廬隨噶爾丹餓而死耳俟到瀚海後即與聖主地方相近從彼入投聖主可以求生也我聞吳克爾言吾兄他喇卜及妻俱投聖主是以我等三人與我姐夫阿喇兒拜盜阿爾薩闌寨桑馬六匹乘之乞與吾兄吾妻完聚七月二十八日自頽之地逃出來投聖主云為此奏報庚戌大將軍伯費揚古奏報噶爾丹遁走翁金地方費揚古奏言準理藩院咨稱原著員外舍稜與蘇尼特多羅郡王額駙薩瑪扎之子多爾濟扎卜多羅貝勒博木布之子蘇達尼喀爾喀公車木楚克納木扎兒衛徵諾顔阿玉什親身率其兵至土喇地方偵探聲息今停其前往著率伊等暫在安王所駐喀倫候大將軍伯費揚古到聽其指揮而行等語八月初十日臣至員外舍稜所駐喀倫移文舍稜等著仍在所駐喀倫不時遣人逺探聲息如有厄魯特人來降報部奏聞今舍稜報稱職奉將軍令駐扎喀倫遣蘇尼特多羅郡王額駙薩木扎旗下佐領察罕喀爾喀公車木楚克納木扎兒之三等護衛齊旺等配兵三十名直至朱兒揮克爾阿濟爾罕為一路遣蘇尼特多羅杜稜郡王達林扎卜旗下鄉導汪舒克喀爾喀公衛徵諾顔阿玉什之三等護衛俄欽等配兵三十名直至伊察扎罕為一路在此兩路偵探消息齊旺等到朱爾揮遇兩厄魯特執之而來問之言我等乃噶爾丹屬下阿喇兒拜寨桑之人吾名丹濟吾弟名多爾穆我等在噶爾丹處食無食衣無衣且聞我妻在此特來歸投聖上我等之外别無夥伴前者噶爾丹丹濟喇阿喇卜灘丹津俄木布伊喇古克三庫圖克圖及杜爾伯特之車陵等俱會於他米爾丹津俄木布率明安特之衆叛噶爾丹而去之時約阿喇卜灘阿喇卜灘潛遣人告噶爾丹曰丹津俄木布將叛汝去遣人招我同行我畏丹津俄木布勢強故佯從其言矣噶爾丹遂率兵往追之丹津俄木布聞其來追率其屬下人及明安特共千餘人逃出白杭哈爾海而去噶爾丹阿喇卜灘丹濟喇伊喇古克三庫圖克圖及杜爾伯特之車陵等俱會於一處其兵有一千五六百噶爾丹敗走至他米爾後向土喇遙望遣人通問於我吳馬第台吉等覆之曰大兵俱已歸去矣以我輩潰散故使喀爾喀等各歸故土遊牧目下喀爾喀七台吉移其家産住居土喇矣噶爾丹遂會盟言衆喀爾喀如此徙則踰伊克敖喇巴哈敖喇向翁金而行在瀚海以內遊牧則掠其偏旁之人再定度冬之策遂自他米爾前徙八日於七月二十五日至俄羅海腦兒駐扎我等即於是夜自俄羅海腦兒逃來除將降人厄魯特丹濟同報文送部外遣厄魯特多爾穆三等護衛齊旺咨將軍知之等語今噶爾丹敗遁窘迫無糧未必不踉蹌奔突是以檄令舍稜率蘇尼特多羅郡王額駙薩木扎之子多爾濟扎卜多羅貝勒木布之子蘇達尼喀爾喀公車木楚克納木扎兒衛徵諾顔阿玉什等親身帶兵速赴臣軍又發降人厄魯特多爾穆交齊旺解送張家口謹奏辛亥命留貯喀倫米糧一千石餘米散給七旗蒙古兵先是大將軍伯費揚古奏言臣所領黑龍江官兵口糧一月需二百六十許石請將喀倫之米截留一千石按月支給官兵餘米交侍郎王國昌等給賞此截留之米足充官兵四個月之食如用之不盡七旗之兵現在臣所請將餘米分給隨征七旗協理台吉都統副都統帶去均分各旗人衆應將大將軍伯費揚古所留一千石米支給官兵如有所餘將餘米亦分給王善巴等七旗協理台吉都統副都統等均分各旗人衆除截留喀倫米外餘米交王國昌給賞之處無容議者也上從之命遣帥達禮歸其主理藩院奏曰據回回國王阿卜都里什特告稱現在京城回子帥達禮之父向教某書乞大部轉奏遣歸給某等語查帥達禮乃噶爾丹屬下回子與噶爾丹使人梅寨桑同來及不放梅寨桑入邊驅之使歸梅寨桑謂帥達禮之兄沙和卓等漏泄機務殺之奪其家産牲畜帥達禮乃率其餘回子騷批達欽阿舒爾等步行來投歸化城解部部議伊等與噶爾丹使人同來留下者不便安插旗下應發往杭州巡撫充緑旗兵奉旨著將帥達禮與前次厄魯特降人阿木呼郎等附居收養今當作何定奪謹奏請旨上曰著遣帥達禮歸阿卜都里什特壬子命宥兵部侍郎馬爾漢罪先是以發往軍中馬匹至於瘦損命以兵部侍郎馬爾漢交該部議處至是吏部議曰馬一千匹乃緊急軍需也在蒙古地方牧養理應遣蒙古章京監視而遣一無所知之漢軍滿洲章京以致馬皆瘦損殊為不合應將侍郎馬爾漢革職上曰馬爾漢從寬免革職外藩諸王請上尊號科爾沁和碩達爾漢親王額駙班第等會同奏言我太祖太宗開基以來臣等世享太平身受洪恩兹逢聖主仁德人皆安樂詎厄魯特噶爾丹獨不自量背天忘恩殘害邊民皇上視民如子惻然憫之不憚勞苦親統六軍討噶爾丹行於無水草之地謀必萬全坦然逺度出噶爾丹之所不意皇上神威如霆如雷夫兵整肅廟算預成遂大創之噶爾丹亡命棄其資財孑身逃竄雖得脫出而無用之人終為皇上所擒臣等竊思聖主俯恤天下之民滅逆天之噶爾丹於俄頃且使自古未服之諸國盡皆來享來王臣等以下至於萬民各得所欲靡不踴躍歡忭聖上豐功大德當加尊號臣等誠惶誠恐謹擬聖主徽號曰𢎞仁睿德神化以養育萬邦英武以𠞰除殘暴一統升平上聖皇帝伏乞聖上睿鑒副臣等之望上以發大學士等聖祖仁皇帝親征平定朔漠方略卷二十八

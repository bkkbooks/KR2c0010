body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷十三康熙三十二年二月丙子命遷扎薩克圖汗之妻扎爾穆與其子完聚扎薩克圖汗之妻扎爾穆疏言聞聖上封臣妾之幼子為親王不勝歡忭臣妾等為西海之厄魯特所掠欲歸皇上既無騎乘亦無飲食又不知厄魯特放遣與否伏望皇上軫念使我母子完聚疏至上曰商南多爾濟等今往西海可著攜扎薩克圖汗之妻扎爾穆來與䇿旺扎卜完聚丁丑諭以大同鎮標兵殺虎口協鎮兵俱充騎兵上諭兵部曰大同右衛駐扎大兵有事則大同總兵官偕行其鎮標及殺虎口協鎮步兵俱當充為騎兵爾部其議之議曰大同鎮標步兵一千四百四十四名殺虎口協鎮步兵八百名俱請改為騎兵需馬二千二百四十四匹應動支本省朋扣銀兩令本鎮買給上從之辛巳命喇嘛商南多爾濟等遷喀爾喀台吉阿海帶青班第理藩院奏喀爾喀台吉阿海帶青班第呈稱我於寅年隨察罕巴爾諾顔來貢請安遭喀爾喀變亂妻子並為厄魯特羅卜臧額林辰憨都所掠欲歸聖上力不能達故往西海之達賴巴圖爾所遂得領達賴喇嘛之文來歸皇上我妻子人民百有餘口皆在西海薩楚墨爾根台吉所查台吉阿海帶青班第乃貝子寶貝親弟應檄喇嘛商南多爾濟員外本什使之遷來若本人有馬即令乘用如或不足令地方官扣數給車上從之壬午發敕諭䇿旺喇卜灘理藩院奏員外馬迪等中途為噶爾丹人所害䇿旺喇卜灘立遣沙克海喇圖來奏殊為可嘉應降敕奬之上可其奏賜䇿旺喇卜灘敕曰朕統御寰區撫綏萬國中外一體果能終始效順則寵賚頻加爾䇿旺喇卜灘僻處窮荒立心誠懇貢獻方物問安之使不絶於道是以屢遣達虎馬迪等加爾恩賜馬迪等中途被害爾即遣使奏聞朕深嘉之今全受爾所貢物因爾使沙克海喇圖等歸賜爾以御用彩縀十端爾所密奏諸情事朕已悉之矣命查歸巴圖爾額爾克濟農離散人民巴圖爾額爾克濟農以前因逃遁人民失散奏請查歸得㫖巴圖爾額爾克濟農失散之人可令所司查歸之丁亥封喀爾喀羅卜臧賽音台吉為輔國公時羅卜臧賽音台吉赴闕請安上曰羅卜臧賽音台吉舊係扎薩克可即封為輔國公戊子命增撥官兵駐防甘肅上諭大學士伊桑阿尚書馬齊等曰聞噶爾丹乏糧至哈密覓食哈密逼近邊塞如不預防則乘虛有警其時不及備矣今甘肅雖有滿洲緑旗兵其力尚薄當於京城每佐領下撥護軍二名從邊外往至寧夏赴提督孫思克處備之更撥陜西督標火器兵二千騎兵一千亦遣往孫思克處備之爾等與議政諸臣㑹同領侍衛內大臣索額圖郎坦副都統阿南達議奏議曰京城應撥每佐領下護軍二名鎗手護軍四百名驍騎四百名前鋒四百名由邊外至寧夏赴提督孫思克所駐防再檄陜西總督佛倫選擇本標火器兵二千騎卒一千擇賢能官領至孫思克所預備併檄孫思克整飭本標官兵俱遵前㫖不時遠探如有機㑹勿致失誤奏入上曰增兵甚善應如所議軍中大臣不必多也領侍衛內大臣郎坦既嘗踏勘地方即授為將軍遣行副都統阿南達曾經周行偵探亦應派出既發前鋒則前鋒統領碩鼐亦應派出其餘大臣官員皆朕所簡授自酌量調用不得妄請從軍是軍發現備之兵不可遲久限三月望內起行此地備兵亦關緊要可即撥兵以補所發之缺尋授郎坦昭武將軍印以將軍博濟孫思克為參贊駐防右衛護軍統領伯四哥管轄護軍己丑遣使賫敕往諭達賴喇嘛時達賴喇嘛疏至言彭素克格隆達木奔爾囊素等賫到恩賜不勝歡忭上諭之意臣已明曉屢欲使喀爾喀厄魯特修好而生靈合有災眚弗能和協濟隆庫圖克圖不克盡力雖有小愆仍求大君寬宥巴圖爾額爾克濟農倘許安插於西海可以保無盜賊而教之遵行法度皇上各項差員遇舊時駐牧之人忽生亂端皆難辨晰伏祈鑒宥䝉遣濟隆庫圖克圖於博碩克圖諭彼遵誓但厄魯特大半附䇿旺喇卜灘雖諭以修好若厄魯特不從而生亂端則西海大小土伯特力有不支伏祈不棄鑒而察之至打箭爐等處地方在漢人與土伯特之間一如吳三桂時居住奉皇上敕㫖云土伯特行商者無用徒生亂耳其止之是以土伯特照前例行漢人地方雖有不軌之事如發䝉古前往恐不當聖心是以未經遣發尼馬唐喇嘛呼必爾漢勒令起行其餘似乎不願以上情事俱已口陳於彭素克喇嘛乞仍前頒賜溫諭奏至敕諭達賴喇嘛曰朕統御宇內撫綏萬邦好惡不偏凡出令行政務本公誠以為懲勸爾喇嘛亦護持佛法利濟生靈所勸所懲與朕同揆是以前者濟隆庫圖克圖違㫖僨事已發敕諭爾喇嘛知之今爾喇嘛疏言濟隆庫圖克圖不能盡力雖有小愆仍望大君寬宥向為喀爾喀厄魯特之事爾喇嘛節次遣使皆不能體爾喇嘛之意後又遣濟隆庫圖克圖亦不體爾喇嘛之意反與噶爾丹偕行殺掠喀爾喀入塞劫取牲畜所行凶悖以致厄魯特喀爾喀殘破人多死亡凡奉使行人不悖㫖而成事則賞以勸之違㫖而敗事則罰以懲之國家一定之大法也如或不然則善人何以為勸惡人何以為懲乎至巴圖爾額爾克濟農前以困窮而來歸朕朕優恤之使居賀蘭山俾得其所乃忘朕豢養之恩妄生猜二四處奔竄今窮而復歸朕又宥其前愆安插之矣並無欲得其利欲用其力之心也今爾言巴圖爾額爾克濟農安插西海即可以無盜賊亦可教之遵行法度爾喇嘛何不即撥人夫乘便遷巴圖爾額爾克濟農種類盡至西海安插之乎爾喇嘛疏又言皇上各項差員遇舊時駐牧之人忽生亂端皆難辨晰伏乞鑒宥又言厄魯特大半附䇿旺喇卜灘雖諭以修好若厄魯特不從而生亂端則西海大小土伯特力有不支伏祈不棄鑒而察之朕遣使於爾喇嘛往來不絶途中無一舛錯爾喇嘛屬下人近邊而居歷年已久亦從未嘗啓釁生事况䇿旺喇卜灘目下並無妄為之事何所見而懸擬之乎茍有此等事端其時自有從公裁度之處爾喇嘛又奏打箭爐交市之事殆欲屯戍之意也今天下太平並無一事爾喇嘛與朕一道同風歷年已久何嫌何疑爾喇嘛如設立駐防我內地必量增戍守兩家俱勞况我內地兵丁約束甚嚴非奉朕旨何敢私出邊境爾喇嘛但須嚴禁屬下不使妄行有何釁之可開戍兵之設似無用也因尼麻唐喇嘛呼必爾漢能治病故召之尼麻唐呼必爾漢何敢違爾喇嘛之語惟爾喇嘛即以朕意諭之遣之使來朕留彼數年當復遣歸也特此遣大喇嘛垂喇克格隆根敦林辰格隆往諭三月庚申命給大同鎮標殺虎口協鎮兵甲胄兵部奏山西大同總兵官康調元呈稱本標左右兩營及殺虎口協鎮步兵俱改騎兵向無甲胄乞依例製盔甲頒給應如所請上從之庚午命趙良棟暫管寧夏總兵官事兵部奏言寧夏鎮標騎兵二千四百步卒一千六百防守地方所關甚要今總兵馮德昌與將軍郎坦同赴甘州軍中則其標兵當酌量留守應帶何兵隨往總兵官印務應畀才能者代理令與總督將軍提督商確奏聞上曰甘州有孫思克兵可令馮德昌獨往其寧夏鎮兵趙良棟身係舊臣可暫行管領四月丙戌命賞喀爾喀台吉車陵扎卜理藩院奏言喀爾喀台吉車陵扎卜呈稱我父達什台吉本土謝圖汗六扎薩克中之一扎薩克也我向與族中弟姪六人及土謝圖汗叔父帶青諾顔之孫瓦察拉怛喇庫圖克圖之弟滾濟扎卜遇噶爾丹之亂俱往投俄羅斯今謹集衆來歸查台吉車陵扎卜等遇噶爾丹之亂往投俄羅斯今集其族類歸附我皇上應視喀爾喀初來之例賞以袍服布幣其姪台吉齊克巴他爾等應視屬下台吉例賞以布幣又車陵扎卜言我等願得與西卜退哈灘巴圖爾同在克魯倫巴顔烏闌遊牧應如所請臣部遣官驗明伊等所有丁數俟其到日應否編設佐領授為扎薩克之處再議奏聞上從之五月庚戌朔以領侍衛內大臣伯費揚古為安北將軍駐歸化城兵部奏言歸化城乃總要之地增戍之兵甚多應專設將軍一員總管歸化城都統副都統訓練官兵凡有當行事務協同右衛將軍而行其設立將軍按定例開列八旗滿洲䝉古副都統職名具奏恭候皇上簡授奏入上曰歸化城初設將軍總管官兵整飭訓練關係甚重可令費揚古往尋給安北將軍印丁巳發敕往諭噶爾丹先是以戕殺員外郎馬迪事降敕詰問噶爾丹至是噶爾丹遣使賫奏陳情上命發敕令彼使人賫回敕曰朕躬膺天命撫綏萬邦凡恭順之國無不加恩以示奬勸其有未孚者亦必曲加優容以匡正其非使歸於善前者朕遣員外郎馬迪於䇿旺喇卜灘為爾屬下土克齊哈什哈哈爾海達顔額爾克所害敕汝查奏今爾疏言非但皇帝之使臣不宜爾也向來小國使臣亦無殺害之事敕使因遇羅卜臧林辰憨都滾布扎卜是以見殺其名土克齊哈什哈哈爾海達顔額爾克之人雖在其內但原遣與哈密通問非自我教之行劫也害使臣者乃羅卜臧林辰等現在塔爾納齊納爾地方伊等情由想皇上早已洞鑒之矣諸凡大小罪過總祈皇帝如天之度兼容并包爾於朕敕未到之前護送使臣同行之格什等至嘉峪關奏其情事朕甚嘉許但爾既已立盟修好則害我使臣之土克齊哈什哈哈爾海達顔額爾克等當即擒拿治罪以戒後來橫行之人爾疏又言吳爾揮地方兩尚書擊我倘伊等有成原欲置我等於不堪我等亦知非皇帝之㫖其時已籲奏矣爾前者借追喀爾喀為名犯我邊塞掠我人民尚書阿爾尼等因巡邊遇之彼凜遵國法率邊上䝉古兵與戰並非內地所遣之兵然此乃爾未誓以前事爾既誓以後不得復執此以為言又前者爾於烏闌布通地方首頂達賴喇嘛之佛誓不再違聖㫖又跪於威靈佛之前誓不再犯中華皇帝屬下之喀爾喀以及衆民爾今疏言昔當濟隆庫圖克圖內大臣吳丹色爾濟之前跪告曰請將折卜尊丹巴土謝圖汗兩人於所奏三言中以一言為定逐出七旗歸於故土則皇帝覆育之䝉古再不為非矣今亦不敢異於從前有所誑奏爾誓書印文猶在並無此等語爾奏此言與誓書原辭自相悖謬且朕安集喀爾喀之事已檄知達賴喇嘛併敕諭爾矣達賴喇嘛甚喜奏喀爾喀如彼饑困全加愛養同佛慈悲聞之不勝歡忭誠撫恤衆生如赤子也其疏前已示爾爾亦當詳覩之矣日者達賴喇嘛因與喀爾喀折卜尊丹巴庫圖克圖土謝圖汗車臣汗諸台吉俱相隔數年未遣使通問今特遣其弟子綽木巴喀巴額木齊往問朕恐行路羈遲特給驛傳送往以此觀之達賴喇嘛以喀爾喀等向為護法主加惠之意彰彰明矣爾今違誓仍索折卜尊丹巴庫圖克圖土謝圖汗等豈合達賴喇嘛之意乎况近今達賴喇嘛奏言倘厄魯特不從復生亂端西海大小土伯特力有不支伏祈不棄鑒而察之達賴喇嘛與我一道同風多歷年所西海諸台吉不違朕㫖恭順奉貢若厄魯特人等稍犯達賴喇嘛地方及西海地方朕即立加征討真實不爽也前者爾敗於烏䦨布通歸時人畜多死極其窘迫沿途委棄器械而去朕巡邉大臣直躡爾後皆目擊之今聞爾地乏食窮困已極爾鄰近國土皆與爾為讐䇿旺喇卜灘又與爾不睦從來諸國之人窮迫歸朕者養育皆如一體如汝窮迫來降前敕諭中已許活汝可即徙至近邊當加厚恩撫養母疑毋畏至喀爾喀扎木巴拉臧布庫圖克圖乃此地敗壞釋教之罪人逃在爾所如果有用則留之不爾可即發回今頒緞十匹付爾使沙哈孫白克綽爾奔下賫往六月辛丑命給土謝圖汗人驛馬糗糧令往送達賴喇嘛使者先是達賴喇嘛以與喀爾喀折卜尊丹巴土謝圖汗車臣汗衆台吉俱間隔數年不及聘問遣其弟子綽木巴喀巴額木齊問訊同使臣善巴陵堪布至京上遣喇嘛彭蘇克郎中關住乘驛攜使者往會喀爾喀諸部落至是土謝圖汗疏言達賴喇嘛所遣使人䝉皇上撥喇嘛及部員率之偕來周行喀爾喀衆部落送至臣所今遣使往答若非敕書天使不能前行欲遣人護送則糧騎難得若不遣使又恐未能達臣書之意伏乞皇上睿鑒奏至上曰土謝圖汗之人若不給與糗糧難以到彼著給驛馬糗糧令送達賴喇嘛使人至西寧遣之前去八月丁亥命以殺虎口緑旗兵六百五十人為藤牌軍將軍費揚古疏言臣向歸化城而來見張家口所有宣府鎮標緑旗兵一千俱有藤牌殺虎口緑旗兵一千俱無藤牌歸化城與殺虎口相距二百里許倘有調遣則其兵先到軍中有藤牌為利奏至命所司議奏議曰張家口協標所有步兵一千已製藤牌六百五十劈刀六百五十給之矣向者殺虎口額設騎兵二百步兵八百邇來奉命俱改騎兵應全留一千騎兵之馬以此內六百五十人為藤牌手其藤牌六百五十面檄浙閩總督火速造解劈刀六百五十把令工部製給上從之九月己酉將軍郎坦奏請來春進兵郎坦疏言臣意將馬秣肥來春深入直臨和卜多索其同哈密國人戕害使臣之土克齊哈什哈哈爾海達顔額爾克等彼既起釁當乘機而行噶爾丹如不迎敵遁入深林則窮追之即不獲其身而散其族屬誤其農田大兵回經哈密殺散噶爾丹供賦之回子刈其禾苖毁噶爾丹所恃以為常産者彼自困窮矣奏至命議政諸王貝勒大臣㑹議議曰前噶爾丹戰於烏闌布通退回之時誓不復擾我邊境近以欽差頒賞員外郎馬迪被害噶爾丹不及與知乃其種類所為己遣使請罪䝉上寬宥賜以敕書目下噶爾丹並無逼近邊塞之釁將軍郎坦所奏皆不必議又郎坦疏言臣請選兵親臨額濟內布郎吉爾等處隨機行事務探實音如在額濟內等處偵探不辨是否噶爾丹之人妄行擒拿互有舉動以致開釁亦未可定應檄將軍郎坦孫思克但遣材能者遠行偵探如獲噶爾丹實音具奏請㫖其現擒哈密八人令將軍給以糗糧遣歸奏入上曰此事所關甚大郎坦等身在行間必有所見進則易於奏功亦未可定倘有可乘之便此機亦不可失兹軍行之期尚早當遣護軍統領蘇丹侍郎西爾達㑹同總督佛倫往與郎坦博濟孫思克等將可進不可進與當進當守之事詳議回奏今時炎熱俟立秋後減從乘驛而往可也逮後蘇丹等疏言昭武將軍郎坦等請行之意謂噶爾丹聞大軍仍駐甘州彼必不來哈密以內之地且問所擒哈密國人則曰噶爾丹之屬裔牛羊已盡牲畜全無貧者甚多皆捕魚為生遣人至哈密載糧三次今在烏郎塢耕種不聞動作之信夫噶爾丹等向賴畜牧為生今以其耕種觀之乃畜産盡而始耕種也倘耕種年久食漸豐足牲畜繁滋根基完固恐不能安靜為邊境䝉古之患其乏糧情狀既與前所聞相符應將我官兵口糧於年內運至嘉峪關邊上來春大兵出邊趨哈密城地方以收回子從嘉峪關以外不動民夫酌用緑旗兵鱗次擺站固其營壘以兵夫護送米䭾陸續運致哈密於運米之際遣人於䇿旺喇卜灘加恩以結之探明噶爾丹果在和卜多烏郎塢耕種之地伏處不動則酌量留兵於哈密絶其與西海諸台吉達賴喇嘛往來之路其進和卜多烏郎塢時除官兵攜帶之米外須駱駝一千負米以兵護行此駱駝即於年內在寧夏喂養將近進兵之時解付甘州預備如此長驅直入如噶爾丹不拒先奔則除其種類躪其田禾如噶爾丹探事人在哈密城聞大兵進發馳告噶爾丹噶爾丹親援哈密則仰仗皇上威靈即當行事大兵回經哈密殺散回子除其田苗而平其城則噶爾丹補救之計絶勢難復振矣如大兵不進仍在甘州防守恐達賴喇嘛使人往來不絶令噶爾丹叔姪歸好雖䇿旺喇卜灘不願與和其下衆人皆以和為請獨䇿旺喇卜灘一人亦無可如何也至取哈密則西海之博碩克圖濟農與噶爾丹和親之事亦可破矣來春進兵之意蓋如此臣等議以為聞噶爾丹有已離和卜多之信且目下噶爾丹人力單薄馬畜鮮少斷不與大兵抗拒今率兵征𠞰糧餉關係重大噶爾丹遊牧為生無一定之巢穴所請來春直臨和卜多之奏宜罷之哈密回子向來納賦於噶爾丹等䝉古歷有年所非自今創始也蓋此等䝉古多有納賦之番人今以納賦於噶爾丹之故遽興兵擊散非所以仰體皇上如天好生之至仁也且䇿旺喇卜灘聘問往來未嘗違誤既議罷征噶爾丹則所稱殺散哈密回子刈其禾苖之語當不必議但將噶爾丹之事付將軍孫思克遣緑旗材幹人員不時遠探聲息其回子八人禁在甘州哈密者乃諸使之通衢也宜令放歸併將皇上好生至德大書告示付此回子持往諭其頭目仍給此回子等糧騎奏入上從之丙辰命移甘凉官兵駐寧夏蘭州護軍統領蘇丹等疏言臣等看得甘州凉州在西北陲一年一種所植之苗惟麥黍菀豆而已其外更無他榖甘州所屬雖略種稻而不甚多民居稀少間有種植難比內地大兵到甘州後糧草不足遠自臨洮鞏昌各府屬州縣協運糧草供應每一州縣或相距一千四五百里甚至二千里且山嶺路多平坦路少難以車運故不能到驢駝人負所運不過米數斗草數束而已除本身所食併牲口之料外所餘無幾雖有捐助之小麥而無菀豆稻榖大兵不便單給小麥邊塞所在緑旗官兵支給本色皆出本地今大兵於甘州凉州多住一日則地方之糧多耗一日倘或久住則緑旗兵馬之糧草似甚艱窘乞令自京撥駐甘凉之大兵暫駐寧夏駐扎蘭州之西安兵暫駐蘭州其西安調至督標官兵發回省城西安官兵既皆在蘭州則西安將軍博濟應遣往蘭州奏至上從之庚午命選到䝉古兵附駐右衛將軍伯費揚古疏言散秩大臣杜思噶爾尚書班第選來堪披甲䝉古共三千六十五人共九千四百八十五口俱到歸化城分為三十佐領伊等錢糧未到之前以大臣等自耕米榖給之又益以歸化城之貯倉舊米俟收割後令土默特官兵撥人夫車輌往殺虎口取米如數補倉散秩大臣杜思噶爾等選到䝉古俱堪披甲伏乞皇上睿鑒附於內地滿兵一二年間即如旗下舊兵矣奏至得㫖此項䝉古兵勿安插歸化城令駐扎右衛量減往駐右衛滿洲護軍驍騎其官員仍照前所撥遣往訓練此項䝉古兵則一二年內可比旗下舊兵矣議政諸王貝勒大臣集議以聞議曰往駐右衛軍中每佐領下應減去護軍二名驍騎一名將此三十佐領官兵充為八旗䝉古驍騎住劄右衛伊等既給口糧草料則兵丁應每月給餉銀一兩官員給半俸至滿官不減照前所撥遣往訓練䝉古兵將所減護軍驍騎之住房撥給安插軍器諸物俱照滿兵例撥給未遷以前不必給餉銀仍依前計口給米奏入上從之十月辛未朔授厄魯特降人鄂欣等職銜理藩院奏言副都統吉爾他布報稱自厄魯特噶爾丹處逃來者有阿兒達爾哈什哈鄂欣楚揚和碩齊多爾濟色稜併其弟博托及鄂欣之婦人二口童男一人馬二十一匹來告曰我等皆噶爾丹之人噶爾丹在和卜多之源其地名索和克薩里我等與之同居因不能自存來投聖上疏奏上命大學士領侍衛內大臣理藩院㑹議以聞議以鄂欣等宜附入上三旗缺丁旗分鄂欣授為五品官多爾濟色稜博托授六品官其房田奴僕衣食器用俱令該部頒給其妻子馬匹在善巴王所者往取還之奏入上許之己卯諭納秦和碩齊諸回子俟噶爾丹使人到日遣歸先是留寓歸化城者有賽必定額爾克白克及沙和卓納秦和碩齊留寓張家口者有莫洛等原議與沙哈孫額爾克白克一同遣歸至是理藩院奏臣衙門主事法材報稱納秦和碩齊等四十戶一百三十口莫洛等十一戶四十口召至沙哈孫額爾克白克等之前諭之遣還俱言居此年久又無糧騎願死於此地斷不去也沙哈孫額爾克白克等言伊等既無糧騎我亦不能携歸是以令伊等仍住原地其賽必定額爾克白克併沙和卓共二百口自歸化城遣行出四子部落邊汛濟魯克俄博地方同沙哈孫額爾克白克等歸去矣據報納秦和碩齊莫洛等皆不願去應暫留歸化城奏入得㫖納秦和碩齊等著將軍等防護俟噶爾丹使至遣歸十一月戊辰命撤西安分戍蘭州兵時駕出謁陵上諭大學士阿蘭泰曰西安地方今年大豐西安分戍蘭州兵宜撤回西安設有噶爾丹之警西安亦近調之不久可到爾等進京之日與議政諸臣㑹議之嗣會議寧夏既有京城大兵駐防應撤駐防蘭州西安官兵令將軍博濟等率之回西安奏入上曰所有京城兵於來年草青時亦撤回餘如議十二月辛酉諭給諦巴敕印達賴喇嘛疏言為喀爾喀厄魯特事奉到敕㫖併伊什格隆所傳口諭聞之不勝歡忭諸凡䝉古皆奉貢天朝之國而厄魯特不聽訓誡近害敕使又博碩克圖汗以三事陳奏其見責於聖明極當但臣已年邁國事大半諦巴主之已在睿照中即諦巴向亦仰體聖意實心行事目前現遵㫖而行倘臣意有所未及力有所未到伏祈時頒訓諭又達賴喇嘛令伊什格隆口奏云吾國之事皆諦巴為主乞皇上給印封之以為光寵又諦巴令口奏云乞換我玉印給之金印得㫖此事頗大著議政大臣領侍衛內大臣及原任領侍衛內大臣覺羅塔達䝉古內大臣阿爾迪杜思噶爾散秩大臣博第集議以聞議曰達賴喇嘛自頒給册印受封以來恭順職貢有年今達賴喇嘛又以其身已老國事皆諦巴主之乞封諦巴授之印信以光寵之為之懇請而諦巴又戴皇上恩眷誠心乞請金印應准所請但印作何字敕撰何文俟內閣擬定進呈御覽又按此玉印乃明朝給闡化王之印今諦巴既已繳還應付所司奏入上從之辛巳命賜陳傷人員身價銀兩兵部奏言准都統阿靈阿等咨送出征厄魯特陳傷廢疾人員請給身價一半銀兩開具齊格等六十一人到部以其傷勘對撫遠大將軍裕親王册內俱各相符應交戶部給之銀兩上從之己丑諭賞㑹閲官兵先是烏闌布通之役將士未奏膚功故車駕親臨指授每嵗兩季㑹閲操練至是上諭兵部曰本朝滿洲官兵從來精鋭勇壯遇寇必克所向無敵曩於厄魯特噶爾丹之役官兵並不仰副朕意即行𠞰除致失機㑹大功未奏朕心嘗為之不懌是以比年以來兩季操練官兵朕皆親臨指授近觀㑹閲時士卒行陳整肅隊伍精嚴進退純熟絶不喧譁凛遵紀律官員約束極其嚴明此皆官兵同心協慮各自奮勵之所致也朕心深用嘉悅八旗前鋒護軍撥什庫驍騎通賞一月餉銀無職掌官賞如護軍例有職掌官通賞內庫緞匹至所賞縀匹著戶部㑹同內務府集議以聞此番㑹閲官員內有降級罰俸者俱令開復以昭朕撫恤官兵申明賞罰之至意庚寅命檄諭西卜退哈灘巴圖爾等先是上諭理藩院曰聞喀爾喀公西布退哈灘巴圖爾納木扎爾陀音扎薩克台吉阿里雅阿爾薩蘭衛寨桑等自克魯倫前徙已至俄爾渾圖喇矣其和托揮特之根敦帶青不與衆喀爾喀同來在色稜格地方今厄魯特未必不動而若輩不知遊行牧放恐猝遇厄魯特當遣能言材幹之人往說根敦帶青併西布退哈灘巴圖爾等俱令內移不得越克魯倫巴顔烏䦨遊牧爾部議奏隨議宜遵諭行臣衙門遣材能官二員乘驛而往自歸化城以前途中所需驛糧及護送人夫著土默特兩旗備給命下之日開應差官員職名伏候上裁奏入命尚書班第往至是班第奏曰臣原奏十五日起程今根敦帶青使至臣請俟之偕行上曰根敦帶青不知在何地又聞西布退哈灘巴圖爾納木扎爾陀音扎薩克阿里雅台吉阿爾薩蘭衛寨桑外向遊牧故特遣爾往漸收入內今既有使來應發檄付來使攜歸爾衙門其議以聞議喀爾喀和托揮特根敦帶青疏言未年扎爾布奈扎薩克圖汗等使臣繼臣伯之缺置之右翼寅年噶爾旦西勒圖折卜尊丹巴庫圖克圖尚書喀爾喀兩汗諸諾顔授臣為扎薩克卯年與濟喇克衛徵哈什哈交戰敗之巳年與車臣諾顔交戰敗之往禦噶爾丹雖不之值曾殺察罕台吉以及衆兵與厄爾坤交戰擊斬之諾木齊台吉等叛擊取其半丹津陀音之子扎郎阿伊爾扎海台吉等叛復擊還而取之其他族類及我屬裔併衆饑人俱已收集我部落叛入俄羅斯者亦掠取以歸緣歷年征伐是以有誤請安查庫倫白爾齊爾之地尚書阿爾尼前此㑹閲曾授根敦帶青為扎薩克今根敦帶青未來其扎薩克之處姑不議俟彼親至應授何秩安插何地另議奏聞來使達爾漢諾顔他布囊言根敦帶青在杭愛今既誠心遣使請安進貢當移文諭之其文略曰前者衆喀爾喀窮困來降皇帝受之俱依品級加封編為旗分佐領撥給地方使各得其所矣惟爾根敦帶青獨留在後聖上聞之常念爾近厄魯特遊牧恐為彼所侵害特將此故差大臣諭爾已皆㸃出今達爾漢諾顔他布囊至以爾疏陳奏聖上方知爾與車臣諾顔交戰堵禦噶爾丹擊殺察罕台吉厄爾坤等征討諾木齊台吉等之事大加奬許今爾仍在杭愛遊牧不知有厄魯特侵害可慮之事否是以檄爾或爾仍在杭愛並無可虞或即欲內遷可速備文報本衙門且爾既誠心奉貢似宜親來請皇上起居我等職在所司特檄諭爾此文應用臣衙門印信令來使賫往又聞公西布退哈灘巴圖爾納木扎爾陀音扎薩克台吉阿里雅阿爾薩闌衛寨桑等在土喇等地方土喇乃厄魯特行路若無妨礙宜各於遊牧之地遠設偵探加意防禦臣部亦備印文諭之奏入上允行聖祖仁皇帝親征平定朔漠方略卷十三

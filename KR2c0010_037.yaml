body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷三十七乙未駐蹕天城撥官修道上諭大學士伊桑阿曰修道之事若責地方官則必太過可遣鄉導官法保布達照朕幸穆闌例修一車可行之道山西修道則著按察使巴錫道員王輔前往集夫督修令侍郎常綬前去備各站草料柴薪併備後來尚書庫勒納等解到駝騾所需草料柴薪渡黃河後陜西之道甚濶無庸大修或有宜略修處亦未可定著常綬法保布達視有應修之處指示地方官修之尚書馬齊所擬宿處太近著法保布達照朕此行以五六十里為一宿如大修道路以致纍民與地方官無涉皆法保布達之事著交明恩賞哈密使人哈薩克呼里拜理藩院奏言大學士伊桑阿傳上諭曰哈密達爾漢白克之人阿南達家人解托克齊哈什哈來現在京城著行文該部此文一到即驛遞遣行其達爾漢白克之人著啓皇太子酌量給賞達爾漢白克之子白竒解塞卜騰巴兒珠爾來與伊等一同遣行欽遵查得先是達爾漢白克使人納林白克俄羅斯和卓賞以蟒鑲領羊皮縀袍各一件縀各三匹布各二十四匹在案解托克齊哈什哈之回子哈薩克呼里拜等應照納林白克等例給賞阿南達家人端多卜已回阿南達處應臣部差撥什庫一名將回子哈薩克呼里拜驛送至行在上從之丙申駕至陽和城遣督運于成龍等先赴寧夏是時于成龍到大同府上召至行在諭曰噶爾丹年踰六十命懸旦夕其妻為我大兵所殺其子旋亦就擒朕今親統六師征車三駕諒彼終被俘獲必不能復至披猖爾等先赴寧夏候駕途中如遇塞卜騰巴兒珠爾可審視之至爾等牲口宜加愛惜緩緩而行毋得急馳丁酉駕次聚樂城命貝勒宋喇卜撥蒙古兵以備裝載監牧之事上諭內大臣曰著諭貝勒宋喇卜噶爾丹已將擒獲阿南達解其子塞卜騰巴兒珠爾旦夕將到今聞噶爾丹在薩克薩特呼里克之南格格特哈郎古特之地其人僅餘四五百人又青海諸台吉俱降現有人來請安朕今親往寧夏著將右翼三旗貝勒公台吉之兵共撥二千預備爾等蒙古裝載駱駝監管牧放素常習練可預備以待俟駕到寧夏應從何路前進候旨行侍衛綽克圖前去可諭左翼王貝勒貝子台吉爾等倘聞朕往寧夏不必從間道來請安爾等有能效力者往貝勒宋喇卜處伺候以聽指揮安插厄魯特降人於張家口外上諭副都統吳達禪曰右衛所有厄魯特著撥戶部司官一員理藩院筆帖式一員解往張家口伊等携來馬匹目前未必可用聞其羸瘦應令用其駝馬往張家口赴曼都所此去如彼腳力不足著董殿邦助之馬駝沿途食物及馬草亦著董殿邦給與此去恐厄魯特馬匹拋棄路上著小心送到至各項賞賜衣服等類俱在董殿邦處著董殿邦居住右衛如大將軍處解到厄魯特著董殿邦收而養之如解來厄魯特多則逐隊解往張家口俟青草出後著董殿邦往歸化城住如大將軍解到厄魯特著從外解往張家口曼都處厄魯特携來馬七匹交大同侍郎阿爾拜餧養戊戌上駐蹕大同命致祭於經過地方帝王陵寢先賢墳墓及名山大川上諭大學士伊桑阿曰自古人君巡狩凡所過地方前代帝王陵寢先賢墳墓及名山大川無不致祭此甚盛典也朕此行沿途所有古帝王陵寢先賢墳墓名山大川著查明具奏應祭者祭之自湖灘河朔至寧夏設立驛站行兵部奏曰情願坐塘效力原任巡撫布顔努等十三人併效勞贖罪五十七人或俱從邊內帶往或從邊外遣行請旨定奪上曰著情願效力十三人自湖灘河朔至寧夏隨伊等內自酌便均派為十三站將安站之期移知大將軍費揚古如期後事到俱於湖灘河朔所設驛站馳送倘期前事到仍令於邊內驛站馳送可以是告議政諸臣其前來贖罪之五十七人俱著自邊外前往以侍郎多竒飼馬瘦損革職上諭內大臣曰侍郎多竒自去年九月起餧馬後撥侍郎阿爾拜餧馬多竒所餧之馬既多數月較瘦於阿爾拜所餧之馬交與該管大臣大學士嚴加議處具奏會議以為侍郎多竒自去年九月起餧馬後撥侍郎阿爾拜餧馬多竒所餧之馬既多數月較瘦於阿爾拜所餧之馬多竒理合勤勉小心餧養而將預備軍需之馬怠玩不餧肥壯殊為可惡坐此將多竒侍郎及佐領之職盡行革去拿送刑部得旨多竒依議革職著於此次從軍效力旋師之日拿交刑部命給官兵沿途馬匹草料或折價銀上諭內大臣曰視衆人坐馬腹皆枵然殆買草不得之故耳著查明由邊內前去大臣侍衛護軍執事之馬數若沿途有草則給草無草則折給價銀己亥上仍駐蹕大同府城內足撥邊內邊外兩路兵丁馬匹糧餉上諭內大臣曰大同餧馬新滿洲護軍二百京城所取新滿洲護軍一百內有馬斃人劣者一百留大同其一百由邊內帶去一百由邊外遣往留於大同一百護軍之馬各取肥者二百給前去二百護軍各一匹乘坐既帶黑龍江將軍薩卜素標兵前去則大將軍費揚古處不可以不備兵著撥右衛兵七百預備右衛兵無馬多竒所餧馬又甚瘦前所撥二百兵有備餧馬六百著再增發兵五百將上駟院馬一千二百五十匹右衛兵丁在大同餧馬二百五十匹此一千五百馬為後增發五百兵備餧共兵七百名計備馬二千一百匹大同餧馬則以布喀為首領監餧馬數不多撥部員兩人參之其黑龍江將軍薩卜素題充伙軍之兵丁五十名照各給兩個月錢糧例給以兩個月錢糧著議政諸臣會議具奏會議以為護軍從邊內帶往從邊外遣行留於大同備於右衛之兵給充伙軍之兵丁錢糧等事俱欽遵上諭而行至三旗親隨護軍亦應以馬斃人劣者留三十名於大同餧馬取留大同三十護軍肥馬各二匹給隨行六十名親隨護軍各一匹乘坐上從之命却諸部長請安進貢上諭侍郎安布祿曰朕自邊內前臨寧夏者遣爾衙門司官一員往殺虎口有來請安進貢者告以車駕前發已逺爾等雖往亦無益俱令歸去計朕到寧夏時令此司官由邊外前赴寧夏庚子駐蹕懷仁縣諭大將軍費揚古以撥發兵馬啓行幸寧夏日期上諭費揚古曰朕於十七日抵大同分晰兵馬十九日朕躬由邊內啓行赴寧夏因黑龍江兵俱帶去故發右衛兵七百每名備上駟院現餧之馬交明右衛將軍費揚固矣今噶爾丹如此窮蹙斷不至於用兵萬一有噶爾丹前來聲息須星速報聞朕當從寧夏進襲其後今如有噶爾丹屬下人來降或遣使來當訊明原由星速奏聞其人當少少陸續遣發至爾軍前所有察哈爾兵黑龍江兵糧盡且勿動支于成龍等所運米量取歸化城米給之如取糧甚難可於一千五百石內節用五百石其一千石不得輕動特諭辛丑駕次鄭家莊之東諭巡撫倭倫等禁止擾民上諭山西巡撫倭倫陜西巡撫黨愛甘肅巡撫郭洪曰朕比年出師剿寇總期乂安邊徼永輯民生茲厄魯特噶爾丹業已勢蹙力窮畏死悔罪遣使具奏乞降朕特親統六師再臨邊塞相機𠞰撫因欲乘便循覽邊境形勢並察視軍民生理遂遣發禁旅取道邊外朕自大同從內地前赴寧夏一路地方見緣邊州縣地土瘠薄軍民生計艱難朕心深切軫念一切御用所需皆自內廷措辦不以煩民扈從人員俱極簡少市易之物悉依時值誠恐有強取抑價等事已令都察院及科道官逐日稽察糾劾其經過城堡衢市輒多結綵亦殊覺擾纍嗣後著通行停止乘輿巡幸本為安民豈可反勞民力爾等務嚴飭有司不得借端妄行科派仍張示曉諭俾窮簷編戶咸悉朕曲體民依至意壬寅駐蹕榆林村前桑乾河崖第巴上表陳情籲請恩旨第巴疏曰頃奉嚴旨訓飭懼不克當謹陳其故北方一帶蕃漢皆崇事達賴喇嘛及宗喀巴之教然其中護法之主無有過於先帝太宗皇帝者且世祖皇帝時召達賴喇嘛至京寵加敕封俾佛法光昭於域內炳如日月今達賴喇嘛年髙舉彼諸務付托於臣傳諭大衆以至土伯特國喀爾喀國厄魯特國令待臣與達賴喇嘛無異押有手印可證臣亦敬事達賴喇嘛而我土伯特通國但願天下元后為護法主使一切道法極其安寧此外倘有異心三寶鑒謫我土伯特國史有云雖行善事難稱佛心皇上嚴旨下頒適符此語懼不能當心殊憂惕向因喇嘛奈沖謂達賴喇嘛當坐禪避忌是以避忌而坐禪前者內齊陀音來已告之以三年內出定矣後又伊什格隆來亦明告之以丑年出定矣自去嵗子年以後凶月既滿當遣使奏聞皇上及達賴喇嘛之衆護法主亦曾以此告之丹巴塞爾濟矣故今以丑年出定之事謹令尼麻唐庫圖克圖密奏博碩克圖毁棄道法皇上為一統之主赫然震怒懲其凶悖甚當於理大合經義臣不勝歡忭先是博碩克圖取葉爾欽獻之達賴喇嘛因欲悅其意略有飾詞是實至喀爾喀厄魯特相殘之時求助於青海諸台吉達賴喇嘛再三諭止青海諸台吉曰爾等與我同憂同樂不可負護法之主反助他人後博碩克圖追喀爾喀時又求助於青海諸台吉亦或有欲得其俘獲而赴之者達賴喇嘛又嚴諭止之曰爾等當敬事皇上不可反助他人此項事情前經奏聞來使到我國者亦曾灼見至博碩克圖謂青海諸台吉曰當往取皇上恩賞種種煽惑之語及臣一切之意俱已告之內齊陀音庫圖克圖矣西寧等處設兵無用亦曾上奏雖因博碩克圖為護法主往來遣使不絶然未嘗敢稍悖皇上之旨有非理之言或行人從中揑造非理之言奏聞皇上以為戲談想自有明鑒也內齊陀音庫圖克圖來召班禪庫圖克圖臣反覆勸導不知班禪庫圖克圖為其年命乎抑為蕃漢相會之緣未到乎將為未出痘疹之故乎抑為皇上神聖非常僧巴陳布庫圖克圖噶爾旦西勒圖濟隆庫圖克圖諸喇嘛尚不克當上心想已亦未能得當故不赴召耳非懼博碩克圖沮之而不往也臣亦竭力欽奉聖旨諄切勸諭而未能得當博碩克圖來書已交商南多爾濟轉奏是以臣無另奏之語伏祈不棄班禪庫圖克圖及臣兩人所奏而垂鑒焉再當奉皇上聖旨問明班禪庫圖克圖或今即赴京或另日赴京定議具奏濟隆庫圖克圖者乃宗喀巴七綽爾濟內之一綽爾濟也而為第六世西勒圖巴素埀濟扎爾贊之化身故不便拘拿目下雖不能仰副皇上聖意後當竭力致之送京伏祈不棄小人所奏而明鑒焉濟隆去年不能如密奏之語力説博碩克圖行事不仰副皇上聖心總祈鑒宥尚書之兵與博碩克圖兵戰敗濟隆獻手帕稱賀稍有不是故遵聖旨治罪撤其廟宇不許居青海不許離巴克朔特而遊行僅留其身命戒體而已伏祈皇上俯念宗喀巴達賴喇嘛之教不毁其身命戒體而留之博碩克圖濟農之子娶阿奴之女在未交戰之前結親去嵗已告之商南多爾濟矣但念在禮義和好之時出嫁此女或令離異與否伏祈睿鑒至四厄魯特雖均係護法主但青海之厄魯特憂樂與共其他厄魯特或降與未降祈比之博碩克圖而垂鑒焉倘臣所奏事內有非理處伏祈寬宥據臣愚意自以為一切並無凶悖但以無知或違皇上聖意伏祈寬宥前曾奏請遵旨效力即今亦但欽奉上諭竭力自效而已倘垂念達賴喇嘛伏祈賜以溫綸主事保住賫其疏呈奏上召議政諸臣入行宫問曰第巴奏疏爾等之意以為何如議政諸臣奏曰彼雖云達賴喇嘛將出定當令我所遣喇嘛見之而還而我所遣喇嘛未回彼雖又云當説班禪庫圖克圗赴京併送濟隆庫圖克圖到京而尚未到至彼懇留噶爾丹之女現在遣大臣往諭青海諸台吉諸事皆未畢臣等不能裁度彼又差尼麻唐庫圖克圖面奏駕前俟尼麻唐庫圖克圖到日臣等再行議奏上曰朕意與諸卿之意不同朕閲經史塞外蒙古多與中國抗衡自漢唐宋以至於明歷代俱被其害而克宣威蒙古併令歸心如我朝者未之有也夫兵者凶器聖人不得已而用之譬之人身生瘡瘍方用針灸若肌膚無恙而妄尋痛楚可乎治天下之道亦如是亂則聲討治則撫綏此理之自然也且自古以來好勤逺略者國家元氣罔不虧損是以朕意惟以不生事為貴達賴喇嘛蒙古等尊之如佛第巴者即代達賴喇嘛理事之人噶爾丹叛逆皆第巴之故因朕遣主事保住嚴頒諭旨第巴極其悚懼悉遵朕諭奏辭甚恭自陳乞憐畏罪矢誓此亦云敬謹之至矣至達賴喇嘛身故朕已悉知今第巴云遣尼麻唐庫圖克圖前來代彼密陳其情想尼麻唐庫圖克圖到後必奏明達賴喇嘛已經物故懇朕為伊等掩飾耳達賴喇嘛與我朝和好六十餘年並未相惡第巴既如此奏懇事亦可行即此可以寬宥其罪允厥所請第巴必感恩而衆蒙古亦歡悅矣爾等之意如何諸臣奏曰蒙古向係強悍之國噶爾丹尤為蒙古中姦惡之賊皇上親統六師如雷如霆奮擊噶爾丹而破之是以敕諭甫到第巴魂驚魄散罔知所措皇上神功聖武誠開闢以來所未有者我朝軍旅精鋭所向無敵而皇上即欲罷兵以養元氣且以人之一身喻治天下之道至精至微此真古哲王之所不能舉行不能闡發臣等無任歡欣贊揚難盡尼麻唐到日斷不出皇上之所料也癸卯駕至朔州城遣大臣督輜重度橋上諭內大臣公福善曰輜重前行踐壞橋梁巡撫連夜造成著爾親視輜重逐一過渡甲辰駕次大水溝嚴禁馳騁駱駝上諭內大臣曰今日見行裝駱駝皆馳騁前行著到駐蹕之地嚴行禁止如有仍前馳騁駱駝者朕或遇之斷不輕恕必治其罪著諭衆通知乙巳駕至義井大雨雪命苫蓋馬騾上諭內大臣曰今日雨雪邊內邊外馬騾有氈則苫蓋之毋忽著諭衆通知丙午駐蹕三岔堡授鄉導額蘇克阿南達等為達爾漢賜銀理藩院奏曰大將軍費揚古咨稱軍中第一等鄉導乃喀爾喀達爾漢親王諾內旗下額蘇克阿南達已欽賜孔雀翎授為達爾漢外第二等鄉導乃土默特阿拉納旗下納木喀爾喀爾喀和碩親王善巴旗下羅卜張西拉卜喀爾喀公蘇泰伊爾登旗下納木哈喀爾喀默爾根濟農王顧祿什希旗下烏孫達爾第三等鄉導乃四子部落三濟扎卜王旗下顧祿喀爾喀和碩親王善巴旗下山都克喀爾喀部長台吉汪舒克旗下莽格爾喀爾喀公烏巴達旗下四等台吉扎卜第四等鄉導乃鄂爾多斯公杜稜旗下佐領阿齊蘭土默特阿必達旗下洪俄岱喀爾喀蘇泰伊爾登公旗下陶李喀爾喀默爾根濟農王顧祿什希旗下沙克朱穆納親乞乘便啓奏查去年臣部以鄉導汪舒克博羅扎卜達濟桑阿伊魯爾圗索諾木馬哈杜拉兒八人議奏上準授為達爾漢矣伏查太宗皇帝時以肯濟黑同阿賴胡魯克追毛明安善於引路授達爾漢名號免供屝履糧糗子孫承襲順治三年十二月烏朱穆秦車陳親王率兵追滕吉思之役善於引路直抵喀爾喀國授達爾漢名號免供屝履糧糗承襲三次應將鄉導汪舒克等八人作何承襲伏候上裁得旨汪舒克著照肯濟黑例博羅等之達爾漢準襲四次餘依議又查去年諭賜蒙古頭等鄉導銀五十兩二等鄉導銀亦五十兩三等鄉導銀四十兩今大將軍既稱鄉導額蘇克阿南達欽賜孔雀翎授為達爾漢則額蘇克阿南達所有達爾漢之職應襲幾世伏候上裁至大將軍費揚古開列所敘二等鄉導納木喀爾等四人三等鄉導顧祿等四人四等鄉導阿齊蘭等五人送部應照中路軍中引道之人賞例酌減賞二等納木喀爾等四人各四十兩三等顧祿等四人各三十兩四等阿齊蘭等五人各二十兩此銀自户部支給奏入奉旨額蘇克阿南達所有達爾漢之職準襲四世餘如所議嚴查兵厮強買民物上諭大學士伊桑阿曰朕此番往幸寧夏所以觀民生計也今聞兵厮前往置買草料有強買民物者在前者如此則在後者可云無之乎朕特遣都察院副都御史及科道官查參竟不擒一人來奏嗣後若不嚴查經朕拿獲決不輕恕命預議乏水之地飲馬駝之處上諭內大臣鄉導首領等曰明日李家溝有一小泉一井已注水三百缸為備水當如何料理著議奏會議以為明日宿處乏水所貯水三百缸不便分撥衆人俱備為御前馬駝之用隨駕大臣侍衛官員執事護軍俱清晨在此一餐飲馬隨駕前去除御用輜重外衆人行裝俱未時傳餐飲馬傍晚抵營上從之丁未駕向李家溝進發上諭內大臣曰今日雨雪駝鞍及馬騾鞍勿得解去加意苫蓋著遍行曉諭至明日宿處逺著早將馬畜飲足各自携水而行及有車者亦使知之先因鄉導報李家溝無水故有是諭及行至河曲縣界見渠中有水問之水至兩三日矣駕至營忽山溪之水滔滔而流不移時長二三尺成河人馬用之不盡各鄉人羣至聚觀咸驚異曰此地向無大水今聖駕來臨山川效靈百神助順為此地人永逺之利無不踴躍歡忭戊申駕次輦鄢村親督輜重使度峻嶺上於途次見隨從人輜重不能越險峻之地親督近侍助使過盡然後行沿途有嶺皆遣大臣侍衛相助使過先是尚書馬齊設驛派程奏輦鄢村有井二口少水前行鄉導及地方官亦報有井二口隨從之人皆以乏水為慮上甫至行宫南山之下灼然見水衆趣往環視間地中各處出泉清水上湧頃刻溢出四流衆皆驚訝歡呼曰昨言水少水即驟至今言無水地中甘泉忽出如此神異誠天之所以佑聖主也臣謹按初大兵之出塞也於喀倫外掘井而巴爾幾烏瀾和朔哨口及塔爾竒喇之地俱於氷雪未消之後忽湧甘泉而師行以濟至是地復效靈醴泉觱沸養而不窮收而勿幕其為井也大矣蓋皇上順天而動至誠感神故屢致大順之徴如此蠲免岢嵐州等處州縣衛所康熙三十六年地丁銀米上諭山西巡撫倭倫曰朕撫御區宇念切民依故不憚勤勞親厯邊境惟孶孳以靖寇安民為急茲簡約扈從人員從大同一路緣邊地方進指寧夏因遍察閭閻生聚及土壤肥瘠收獲豐歉之狀見邊氓生計維艱朕心深用軫惻雖一切供御之物纎毫不以纍民而乘輿巡幸經臨宜特敷澤以示恩恤除大同府額賦已有諭旨豁免外其經過岢嵐州河曲縣保德州所屬地方並各衛所康熙三十六年應徵地丁銀米著通與蠲免爾即行令該管官員張示遍諭務俾窮鄉僻壤均沾實惠以稱朕子育黎元至意己酉上駐蹕保德州賜巡撫倭倫貂服親隨侍衛關保伍什捧出貂袍套使倭倫跪宣上諭曰聞爾居官好爾家計亦清是以賜爾御用貂袍套朕理政事日惟以民生為念爾誠以朕保民如赤子之心保民即所以報朕也朕之言從之亦易負之亦易爾識之而行可也倭倫奏曰臣原係一微末之人皇上優擢授斯重任臣有何知總謹識聖諭遵行之而已蒙隆恩異數臣復何所願但竭力黽勉體皇上保赤之心保民臣斷不敢負皇上隆恩請許謝恩奉旨今日不必謝明日到營謝使衆知之又上諭皇太子曰朕躬安善皇太子佳否朕自大同起程而來視民生計與前所聞不同不甚貧困糧草充裕後到之駝騾並無阻滯自大水口至三岔口百姓生計有限自三岔口駐蹕李家溝之日地乏水泉前行鄉導預貯水三百缸以備扈從人馬之需正行路間天忽大雪又百姓自李家溝來者屢言岢嵐州發來小村河乾道水來已三日地方官恐御路泥濘築堤壅之三岔乾河之水今早亦流至韓家樓亦築堤壅之朕到韓家樓視其水甚大小村河壅水處已深六七尺於是將兩處之堤俱開而放之申時水至李家溝下營處深至馬鐙自李家溝至輦鄢村五十三里仍然無水照前貯水且山嶺險峻跋涉維艱前一日之雪因風凝聚如堆積之狀驅車者皆食此不勞而至因無地可以安營遂駐蹕山巔山之南約一里許覓得一河前此行人俱未曾見有此河百姓亦隱而不告此路乃馬齊所經過詢之便可明晰朕初不欲寄示但官兵百姓共知之事日後爾等聞之恐以不書示為懷故特書寄此事此亦偶然耳並無竒異二十八日至保德州黃河水流平緩較湖灘河朔更平而水不甚深篙可到底上項情事可奏聞皇太后併語諸大臣哈密擒獻噶爾丹之子塞卜騰巴兒珠爾解往京城欲使經大同宣府之路因附近塞垣朕深以為慮思此子非易得之物是以到保德州後令解往太原由太原解至京城比大同之路不過迂三百里三月初五六間當到行在俟到京後應作何處分另有諭旨庚戌遣大臣祭黃河之神上以巡幸寧夏祭黃河之神遣侍郎席爾達行禮其文曰自昔帝王省方問俗輒於所過名山大川虔申秩祀所以示懷柔百神之義甚盛典也朕撫綏中外宵旰靡寧兹念切靖寇安民欲周覽疆圉之形勝與閭閻之生聚遂取道沿邊州邑自晉入秦行次保德州將濟河西指惟神絶塞洪流之始北條諸水之宗利濟宏長沃膏汪濊朕乘輿至止式欽靈爽特用遣官告祭馨香祗薦牲帛具陳惟神默鑒焉上自保德州渡黃河見水溜船少不易到岸上親臨視截河繫䉡令坐船人皆挽䉡而渡到對岸甚速兼命皇長子及領侍衛大臣親督禁止爭船者魚貫而渡頃刻渡畢駐蹕府谷城侍讀常明請率兵追勦噶爾丹不許先是副都統阿南逹奏曰內閣侍讀常明來請云職願往策旺拉卜灘處率其兵隨後進𠞰似可擒獲噶爾丹矣據此奏聞上曰常明之往䇿旺拉卜灘也甚難噶爾丹捕獵之人四散成羣各處不下二三十若去則爾一身之死所關亦小而失我使臣關於國體者甚大著阿南達再商至是阿南達奏曰皇上睿慮周詳無微不到如欲往策旺拉卜灘處俟出兵之時再相機而行今則勿去便報可侍讀常明奏報由昆都倫至薩克薩特呼里克路程常明奏曰奉旨涼州之北有一口出此由額濟內古拉喀奈經昆都倫至薩克薩特呼里克之地向經俞木楚木報稱水草俱佳著常明前往問明俞木楚木等其程當行幾日水草如何星速具奏欽此欽遵臣至布隆吉爾問副都統阿南達言俞木楚木已差出呼巴塔爾賽哈等處坐哨故問之俞木楚克同行之兄台吉羅卜臧丹津及識地里者言自鎮番下戈河兩宿第三日宿喀喇腦爾此三宿俱有六十里自此馱水行七十里宿自此至呼馬溪布喇克宿九十里自此馱水行五十里宿自此至烏黑爾烏素宿五十里自此至伊巴賴俄白爾塔塔爾水宿四十里自此至伊巴賴敖蘭呼都克宿四十里自此馱水行七十里宿自此至俄羅蘇台布喇克宿六十里自此至哈蘭馬克台布喇克宿四十里自此至庫勒圗布喇克宿五十里自此至默勒黑圖布喇克宿五十里自此馱水行六十里宿自此至博羅托羅海多倫呼都克宿九十里自此馱水行大砂岡內八十里宿自此亦行大砂岡內八十里至乖咱河宿自此乖咱河而下兩宿第三日至湍多果爾津呼都克宿此三宿俱各五十里自此馱水行七十里宿自此至畢齊克圖呼都克宿八十里自此至毛申拖羅海呼都克宿四十里自此至額濟內河宿四十里由額濟內河而下四宿第五日至昆都倫此皆一日五十里自昆都倫馱水行八十里宿自此至呼爾書特水宿一百三十里自此至特古思布喇克宿八十里自此馱水行六十里宿自此至庫滕山丹宿七十里自此至葫蘆蘇臺布喇克宿九十里自此至拖賴布喇克宿五十里自此馱水至厄魯蘇台呼都克宿六十里自此至塔濟格爾布喇克宿六十里自此至察罕河宿六十里自此至納林布喇克宿八十里自此至哈爾占布喇克宿五十里自此至呼布爾布喇克宿五十里自此馱水宿溫達地方五十里自此至濟默格爾布喇克宿八十里自此至達蘭土魯宿七十里自此至巴罕腦爾宿五十里自此至垂郎河宿七十里自此至哈爾察克河宿六十里自此至哈郎古特河宿四十里自此至格格特河宿四十里自此至西喇達郎地方宿七十里自此到薩克薩特呼里克八十里自昆都倫以至薩克薩特呼里克水草可用自鎮番至厄濟內之間大兵人衆不可行惟魚貫而進僅足三四百牲口之水兵如魚貫而進則後隊無草矣此路最惡惟無可如何不得已之人行之而已難以行兵謹具奏聞上命收貯辛亥上仍駐蹕府谷縣城南是目遍賜船户水手銀兩聖祖仁皇帝親征平定朔漠方略卷三十七

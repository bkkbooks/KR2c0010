body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方畧卷四十三四月庚戌朔預備軍餉馬匹接濟回師駕出行宫親臨大路閱視八旗鎗手綠旗兵起行諭議政諸臣曰兹官米以駱駞一頭運倉斛一石至兩狼山地方衆大臣侍衞官員執事殷實者本身既不出征著查堪用駱駞䭾解其解之者不必另給坐馬即騎負米駱駞前去著將駱駞之數查奏查奏曰大小官員堪用之駱駞共三百二十有六頭官米俱遵諭以駱駞負送之上曰善此駱駞著於明早起程其行也著内大臣明珠都統噶爾馬王永譽押去中途一宿次日到彼既到之後著噶爾馬王永譽留彼守米著明珠小心帶回駱駞又自寧夏一路行來見有亡人骸骨此皆因去年運米措置失宜人遭饑餒以至死亡舊歳中路進兵各驛備米供給兵厮商販故人不至饑餓死亡此次進兵所闗甚要凡事不得不周詳籌畫朕已遣往寧夏取米五百石矣俟到後留貯於此湖灘河朔有米著大臣侍衞官員執事䕶軍人等除寧夏所支兩月米至於此地已食之米令帶食至湖灘河朔者而去有餘之米亦留於此隨來兵丁酌量留之留一大臣駐此管轄將此米即令所留大臣從驛站陸續緩運每驛量留其米俟回師之兵厮商販乏米者煮粥食之則不至饑餓矣上駟院趕來馬一千四百餘匹亦留於此於水草善地牧放肥壯俟回師之兵有乏馬者給之乘坐則其餘逗留之瘦馬亦得歸矣著鄂克濟哈仍駐寧夏凡馳報之事由新設邊外驛站馳送則路近而無悞所設驛站至總督呉赫船站照常安設船站以外令設䝉古驛站著議政諸臣議奏議曰皇上睿慮周詳諭㫖極當俱應遵行所取寧夏米五百石到日留於此地湖灘河朔有米應將大臣侍衞官員執事䕶軍支過寧夏兩個月之米除食至此地者計給至湖灘河朔二十日米帶去所剩二十五日米留於此地隨駕前來之前鋒一百六十名鎗手䕶軍二百名應於鎗手䕶軍二百名毎翼留䕶軍叅領二員鎮之將所留䕶軍臕大馬匹換下前去前鋒臕小馬匹此米從驛站陸續令留駐大臣徐徐運致各驛將米酌留以俟還軍僕從商販乏米之人煮粥飼之則不至饑餓矣將上駟院趕來馬匹一千四百餘匹亦留於此地就水草佳處牧肥給回軍乏馬者乘坐則存留之瘠馬亦可到家矣䕶軍綂領俄克濟哈仍留寧夏凡馳報之事若從新設口外驛站行則地近而無悞應留所設驛站直至總督呉赫之船站船站以外安設蒙古驛站將此所設蒙古驛站交于成龍等此地所留䕶軍叅領四員䕶軍二百名將現存此地之米給四個月共需四個月米三百五十石至留駐此地之大臣伏候欽㸃所㸃大臣亦應給四個月米上從之換給各驛肥馬上諭督運于成龍曰朕計程設站者所以使之馳報軍務也今汝等奏言坐驛鄂爾多斯之兵馬瘦者多馳事者似覺少遲著將汝等肥馬每站酌給令其供用換取驛中之馬牧放于成龍遵㫖每驛各給馬五匹訖查明行途宿次理藩院以行途宿次奏聞曰鄂爾多斯鎮國公杜稜旗下班第佐領驍騎校博羅問去路於披甲達特巴告曰黄河内地沿岸泥濘不可以行荆棘叢密湖灘河朔不知其路但知車根穆冷至穆納和邵之路自此地渡河為第一宿駐於布克忒有五十餘里食黄河之水第二宿駐於和多都五十里食車根穆冷之水第三宿駐於阿齋五十里食車根穆冷之水第四宿駐於巴顔和邵五十里食車根穆冷之水第五宿駐於哈喇圖以内有四十餘里食車根穆冷之水第六宿駐於濟爾馬臺有四十餘里食車根穆冷之水第七宿駐於塔巴納有五十餘里食車根穆冷之水第八宿駐於呼戸烏素四十里食黄河之水第九宿駐於穆納和邵之南濟勒磨墩四十里食黄河之水上曰善甚明著藏之是日諭皇太子曰朕自白塔發駕至二十五里駐驆二十九日親閱前鋒及黑龍江兵起行初一日親閱烏鎗兵綠旗兵起行米俱由水路順黄河運來除途中已食者自初一日起扣足四個月米遣發前去馬駞肥健兵有腴色自朕駐驆之地丈量至兩狼山一百二十里漢人謂之兩狼山蒙古謂之哈爾哈納此地無水故集軍中駱駞於于成龍等未到之前送米過此無水之地待此駱駞歸後朕即回鑾乘熱時而行自京乘來馬及前發來馬臕色俱好駱駞亦好聞由水路行八九日可到湖灘河朔馬駞負裝不能趨赴由陸路行則需二十日今朕區畫之事已畢送米於哈爾哈納之駱駞俱安好到彼將於初五日到此矣擬於初六日仍留宿一日渡過馬駞遣衆人由陸路往朕自水路行倘有思戀果食之意何如此遠道三次來乎以後不得再送辛亥命暫停鄂爾多斯王貝勒貝子公等處分理藩院奏曰督運于成龍咨言鄂爾多斯六部落兵原額三千名除坐驛七百五十人外現存兵二千二百五十名查貝勒顧祿什希卜旗下兵五百名内三百七十五人不到貝子根都什希卜旗下兵三百名内一百二十九人不到王董羅卜旗下兵二百名内七十五人不到問之各部長俱云無來意公杜稜旗下兵三百五十名内缺六十人問之公杜稜云遣歸取糧賞銀之時公杜稜之兵如數在彼于成龍起身之後又以遣六十人歸去取糧報部查米者大兵之急需輓運所闗甚大王董羅卜貝勒顧祿什希卜貝子根都什希卜派兵運米乃缺額不如數公杜稜全領兵丁賞銀又遣回六十人大玩軍中機務根都什希卜前以帶兵缺少之故議革貝子具奏奉㫖俟到京再議不議外應將董羅卜顧祿什希卜杜稜革去王貝勒公部長名號與應襲之人承襲仍令各旗星速差人往催不到兵丁及遣歸兵丁飛馳趨赴上曰此事姑存之趣其兵來到後再奏命覆核已行軍務上諭議政諸臣曰朕調遣軍務大概已畢或有缺畧亦未可定著議政諸臣覆議來奏奏曰駕臨寧夏已將所調兩路軍中肥馬肥駞撥與乘坐又以于成龍所運之米瀚海難行令以駱駞負米過瀚海交運米官員又以御用羊隻遣官盡趕過瀚海隨軍為糗糧百凡調度經理諸務皇上早已布置妥帖臣等備悉思之並無缺畧可容尋議者矣議政諸臣又奏曰阿喇卜灘使人諾顔格隆臧布等言我等偕來之人帶有貨物及阿喇卜灘等進上禮物俱在邊汛之外留於侍郎滿丕之處其所留人應安插何地所帶貨物禮物應作何撥置請㫖定奪上曰此輩亦令暫至歸化城著議政諸臣議之會議曰阿喇卜灘使人諾顔格隆臧布等邊外所留人畜貨物及進上禮物俱應取至歸化城令侍郎滿丕於附近部落酌量撥人送至歸化城交都綂副都綂看管俟去使歸日將伊等作何撥置之處再議上從之又諭議政諸臣曰寧夏所有渡馬􅑉子大船一隻及目下携來樓船三隻之門窓交與總督此文一到撥賢能官一員量數多帶好水手連夜於初五日到來壬子命酌議安劄䕶軍綂領杜什希等所領軍馬上諭議政諸臣曰自寧夏往拿伊拉古克三庫圖克圖之大臣官員兵丁回日著西安之兵仍赴寧夏其由西路往拿伊拉古克三庫圖克圖之西安兵綠旗兵著俱赴甘州京城大臣官員兵丁回日或留此地或歸京城著議政諸臣議奏奏曰請將自寧夏往拿伊拉古克三庫圖克圖之西安兵遣赴寧夏其由西路往拿伊拉古克三庫圖克圖之西安兵綠旗兵俱留於甘州由郭多里巴兒哈孫而往者乃䕶軍綂領杜什希親隨一等侍衞色克圖又由甘州而往者乃䕶軍綂領孫札齊䕶軍叅領車克楚等到此地後俱著乘驛趕來京城大臣官員兵丁行李現俱留在船站應令他處大臣官員騎其私馬携行李來令伊等騎往官馬留於此地又新滿洲䕶軍厄魯特等已騎官馬而去伊等原騎之馬俱交留於此地之大臣俟伊等到日令彼騎往之馬留於此地騎彼原騎之馬而去又兩路大臣官員兵丁自此地支取至湖灘河朔之米自湖灘河朔支取至張家口之米厄魯特等其妻子俱在張家口外不必赴京上從之命議水路設站之事上以自船站起行向穆納和邵設站之事交大學士伊桑阿等議奏伊桑阿等議奏曰駕由黄河而往此地之站應留官一員船一隻再撥官一員向穆納和邵設站凡西來奏報之事令留於此地之官拆視如其緊要即由船站追送駕前如或常事或京城送來之事則由陸路之站交向穆納和邵設站之官候駕到穆納和邵尋往啟奏令留於此地之官量駕到穆納和邵之日依站道追送去上曰甚善不必留官著留内大臣索額圖理其事將汝等所議交索額圖著喀爾喀公車木楚克納木津衞徴諾顏阿玉璽同索額圖俱留於船站其他蒙古王公台吉俱由陸路而去遣大同所留官兵回京䕶軍綂領蘓丹等奏曰前於大同毎翼留將領一員䕶軍百名兹解馬之便亦應令伊等偕來上曰伊等馬匹已經調來與其至此地無寧行文令彼量力徐徐回京癸丑駕由船站至黄河西岸歐徳地方駐蹕命飭官兵小心渡河上諭内大臣曰明日移營行二十里許令衆人行裝俱渡河著遍行曉諭見所僱船隻因裝載過重船身出水無多黄河非他河可此萬一錯悞人固受害物亦難存著諭衆嚴禁大將軍伯費揚古奏黑龍江兵告請効力許之先是以黑龍江兵不能拴帶四個月米部檄大將軍伯費揚古令黑龍江兵不必前進留於將軍舒恕所至是大將軍伯費揚古奏曰近奉諭㫖遣黑龍江兵往將軍舒恕所黑龍江官兵㑹集再三告請云我等俱係末陲小卒累世以來受聖上豢養之恩坐食俸糧去嵗出兵並無効力又費皇上如許錢糧喂養馬匹俱得肥壯皇上浩蕩洪恩雖使官兵肝腦塗地不能仰報現今我等有追來馬匹早晩俱到我官兵將四個月口糧䭾於馬上即步而行亦斷不至有悞我等願捨命以効死力縱不給口糧我等宰馬為食步行前去懇切哀求臣等看得黑龍江官兵馬經喂養其臕肥壯追來馬匹將到而此官兵皆奉㫖選留者其人亦強察哈爾官兵來自年前十月在軍中度冬故馬臕不齊近又准督運于成龍咨言臣帶來黑龍江兵一百名及察哈爾兵約作千口筭一月需米二百二十石云是以視察哈爾兵之馬不堪者減去之以抵黑龍江官兵口數即以察哈爾兵已領之米給黑龍江官兵其兵共為千口已將減留察哈爾官兵遣回將軍舒恕所矣臣等當於四月十三日往至郭多里巴兒哈孫也上報聞且以示議政諸臣甲寅上駐蹕黄河西岸達希圖海地方命留内大臣索額圖等供備回師官兵之米糧馬匹上諭議政諸臣曰今諸事俱畢唯噶爾丹僅存各處逃竄大兵前進搜𠞰不乆旋師路必由此當議逐站致米師回乏糧者以米給之商販則煮粥食之之事來降之厄魯特亦由此而來青海來朝之台吉等亦由此而來米糧馬匹已留於此則駐此而理事者尤為緊要朕本欲駐此理之但天下事大是以回鑾領侍衞内大臣原任䕶從朕躬之職籌之數日以此任尤重故留領侍衞内大臣索額圖併留都綂阿錫坦噶爾馬王永譽䕶軍綂領蘇赫副都綂巴賽於此伊等應理事務著留駐大臣隨駕大臣會同詳悉議奏集議以為噶爾丹窮廹已極各處逃竄大兵前進搜𠞰不日旋師應逐站致米俟師還乏糧者及厮役商販煮粥食之青海來朝之台吉等來降之厄魯特等俱由此而來米糧馬匹亦已留於此地趕羊者亦由此而來凡事皆籌畫周詳諭㫖極當俱宜欽遵行之請於進兵之路每站用驛站脚力各運致米五石如驛站脚力不敷與運米大臣于成龍等會商令于成龍等所備牲口運致交與坐站官員作粥以食歸來之兵厮商販又所留馬一千四百餘匹令於此處擇地放青牧肥俟歸來之兵乏馬者給之乘坐寧夏解來羊九千九十隻亦留於此仍令總督撥官役看守擇地放青即以此羊量給青海來朝之台吉歸來之兵丁及來降之厄魯特仍偵探軍情不時奏報上從之酌撥大小官員所僱船隻行兵部奏曰隨行部院大小官員所僱船共十一隻此内五隻内閣翰林院兵部理藩院戸部備有銀兩請酌撥司官筆帖式乘此五隻隨駕而往其餘六隻請交領侍衞内大臣撥用上曰著内閣兵部理藩院隨往翰林院戸部不必隨往所備銀兩交闗保則又餘一二隻矣其餘船隻俱交領侍衞内大臣乙卯厄魯特俄兒遮圖來降理藩院奏言將軍覺羅舒恕咨稱邊汛送到降人厄魯特俄兒遮圖告云我乃格壘沽英之人隨格壘沽英而來為伊拉古克三庫圖克圖所擄自什魯特西北行二日於閠三月十七日携我弟薩木談竊馬五匹逃出來歸聖主見伊拉古克三庫圖克圖之三人從後追來故我擇大臕馬二匹與吾弟乘之先令疾馳我乘馬一匹牽馬二匹奔出為伊拉古克三庫圖克圖之人所追及執我而盡褫所衣使之下馬驅而逐之吾弟薩木談不知所之伊拉古克三庫圖克圖之人併格壘沽英之人有百許我等逃來時伊拉古克三庫圖克圖在西里聞其言向策旺喇卜灘而去不知噶爾丹在何地伊拉古克三庫圖克圖之人馬駞各有一二匹與我同被伊拉古克三庫圖克圖掠去者格壘沽英之人現在伊拉古克三庫圖克圖所伊拉古克三庫圖克圖之人捕獸為食外更無他物云故令俄兒遮圖乘驛飛馳伏乞轉奏今據咨轉奏報聞丙辰上自駐蹕地方登舟至布克忒之東海喇圖地方駐蹕厄魯特俄兒遮圖祁齊克來降理藩院奏言將軍覺羅舒恕咨稱邊汛送至厄魯特俄兒遮圖祁齊克二人來降俄兒遮圖告云我原係厄魯特之人去歳自此地同曼濟偕賫皇上勅書而去曼濟歸噶爾丹留我捕獸以供其女鍾齊海噶爾丹使其女鍾齊海近丹濟拉游牧我亦隨鍾齊海近丹濟拉游牧三月十一日自厄黑阿喇兒西向一日之程到阿察阿木塔台地方前一夜我帶丹濟拉下人祁齊克逃出來歸聖上我二人騎馬三匹帶鳥鎗二桿而來祁齊克告云我係丹濟拉之人與俄兒遮圖同來降聖上噶爾丹曾遣人約丹濟拉㑹於阿察阿木塔台地方一同屯扎未㑹之前我兩人逃來噶爾丹所有諾顏格隆阿喇兒拜下人有一百餘呉爾占扎卜色稜車稜布木在達爾必地方呉思塔台吉阿巴在丹濟拉一日之程阿喇卜灘在阿兒台山隂之旁圖爾巴地方丹津俄木布等在阿保哈卜親之地所聞如此又傳聞齊集於阿察阿木塔台後商往厄黑阿喇兒西北游牧伊等未㑹之前我等己逃出矣噶爾丹下人但捕獸為食外並無餘物視衆人形狀窘廹已極問其馬亦甚瘠臕大者少云於是令俄兒遮圖馳驛先往俟祁齊克馬三匹到後送往歸化城伏乞轉奏據咨奏入上報聞丁巳上駐蹕薩爾竒喇地方命督率舟行次序上諭内大臣曰舟行之時諸臣各自約束魚貫而進視前船既泊後船即停則不致喧競行亦不亂前塗著諸臣各自嚴行管轄厄魯特丹木巴札木素來降將軍覺羅舒恕奏言侍郎滿丕咨稱降人厄魯特丹木巴札木素告曰我乃呉爾占札卜之弟色稜之人三月十五日自阿察阿木塔圖地方獨乘一馬來歸聖上我所乘馬至邊汛而斃又云三月十五日在阿察阿木塔圖地方噶爾丹諾顏格隆阿喇兒拜丹濟拉阿巴拉思倫呉爾占札卜色稜車稜布木呉思塔等俱已㑹於一處未集之先見東方空魁扎巴喀對面火煙已有兩日矣衆皆謂此火其根敦帶青兵來乎抑他國兵來乎與其卧而待之不如行也將於次日十六自阿察阿木塔圖過楚呼里渡瀚海而去聞車稜布木所言如此不知其往何處定居亦不知阿喇卜灘丹津俄木布所在何地問丹木巴扎木素曰彼所見之火爾逃來時猶見之否是何火耶答曰我未嘗見火但聞人言之耳不知其為何火也又問噶爾丹丹濟拉同㑹之地其人有幾所乘馬幾匹何所食以度日答云同㑹之地人不過五六百馬駞各有一二匹無有贏餘所食獸肉外無長物若不得獸則殺馬而食又問噶爾丹之子塞卜騰巴兒珠爾被聖上差人擒獲噶爾丹曾聞之乎爾乃色稜之人在呉爾占扎卜等一處呉爾占扎卜色稜車稜布木等又何所言答云塞卜騰巴兒珠爾被擒噶爾丹未嘗聞之呉爾占扎卜謂其弟色稜車稜布木曰噶爾丹甚屬可憂我輩無所苦也我輩可以往歸皇上亦可以往赴䇿旺喇卜灘亦可以往投達頼喇嘛彼三人言之我在旁聞之又問下人之意何如答曰下人言從噶爾丹既無結局而我輩皆死而後已或往歸聖上或往赴䇿旺喇卜灘則我輩皆得生路矣是以將丹木巴扎木素令彼乘驛星速送赴行在疏到具奏上報聞事下所司壬戌上駐蹕鄂兒綳阿木地方上諭大學士伊桑阿曰原約水陸兩路俱於十五日到湖灘河朔兹風汛稍阻緩緩而行令遣官一員乘傳往穆納倘有京報俱令賫來鄉導兩員内著一人前來癸亥上駐蹕達拉布隆地方思賜大將軍伯費揚古時費揚古率兵進抵巴竒爾巴爾哈孫地方上追賜馬駞食物尋費揚古上疏謝曰臣前此屢蒙聖主便蕃錫予稠叠恩施寵渥既多自難悉數兹於康熙三十六年四月十四日伏蒙聖恩除令上駟院賜馬五十匹駱駞十匹外又另加恩賜馬五十九匹駱駞十匹并京米食品珍味種種到臣臣齒牙搖落所食白粲既盡輾轉購求正不易得忽承上賜玉粒佐以珍饈拜寵自天感恩無地臣不勝懽忭之至謹瞻天仰聖跪受謝恩訖臣生際昌期遭逢聖主殊恩異數悉數難窮惟有竭盡駑駘長効犬馬之力圖報高厚深恩於萬一耳報聞甲子上駐蹕布古圖地方大將軍伯費揚古報逆冦噶爾丹死費揚古奏為飛報噶爾丹已死丹濟拉來降事康熙三十六年四月初九日臣等至薩竒爾巴爾哈孫地方厄魯特丹濟拉等遣齊竒爾寨桑等九人來告曰我等乃丹濟拉所遣之使三月十三日噶爾丹死於阿察阿穆塔台地方丹濟拉諾顏格隆丹濟拉之壻拉思倫携噶爾丹尸骸及噶爾丹之女鍾齊海共率三百户來歸聖上住於巴雅恩都爾地方候㫖請皇上作何發落以便遵㫖施行其呉爾占扎卜色稜阿巴塔爾阿喇爾拜額爾徳尼呉扎忒喇嘛等帶二百户投䇿旺喇卜灘而去額爾徳尼寨桑呉思塔台吉博羅齊寨桑和碩齊車林奔寨桑等帶二百户投丹津俄木布而去問齊竒爾寨桑等曰噶爾丹之死何故丹濟拉何不即行前來而住於巴雅恩都爾地方候㫖據云噶爾丹於閏三月十三日清晨得病其晩即死不知是何症丹濟拉欲即行前來因馬甚瘠而所帶人等大半無馬俱屬歩行又無糗糧是以住巴雅恩都爾地方候㫖聖上許其來則來矣今若將丹濟拉所遣之使盡送行在恐人多驛馬不敷故僅將齊竒爾寨桑交郎中諾木齊代飛送行在其阿爾達爾格隆等八人臣等帶往郭多里巴爾哈孫地方由所設驛站送往行在臣等伏思聖上中外一體視若赤子念噶爾丹一日不滅則蒙古部落一日不得安居去歳皇上不憚勞苦躬率大兵親臨克魯倫等地方仰仗天威噶爾丹大敗狼狽已極厄魯特人等絡繹來降不可勝數今年聖駕復臨寧夏調度官兵所乘馬匹糧餉諸務盡行備辦始遣發大兵今噶爾丹罪惡貫盈已伏天誅其屬下人上天舉而授之皇上丹濟拉等來降獻噶爾丹之尸噶爾丹之女現藉皇上詳畫周備遣行之兵力請直抵丹濟拉所住巴雅恩都爾地方即押丹濟拉等而來如丹濟拉等尚心懐反覆即當盡行𠞰滅臣等仍於是月十三日往赴郭多里巴爾哈孫總領大軍而進奏至諭曰今噶爾丹已死其屬下三百餘戸帶噶爾丹之尸噶爾丹之女來降著大將軍伯費揚古精選帶去之兵往覓丹濟拉所在押䕶前來餘兵遣回黑龍江兵路逺亦遣回費揚古所綂之兵既足阿南達一路兵亦令遣囘著議政大臣作速議奏集議曰噶爾丹乃狡猾巨宼皇上驅除暴虐永奠疆圉聖躬不憚勤勞一連出兵三次終除賊之根株實史册中未有之事且於寧夏啓行之前諭以噶爾丹已無去路或自盡或來降否則必為我所擒今果自殺臣等不勝傾服恭逢大喜請行慶賀禮上曰噶爾丹之死乃天之所助宜先謝天遂排香案於行宫外上率皇長子及文武大小官員對天三跪九叩頭畢上入行宫羣臣在外行慶賀禮又奏曰噶爾丹者乃獲罪於天之逆賊也神謨上符天意謂不滅此宼則生民不安故不憚勞苦親綂六師三次出討終滅噶爾丹自古以來雖有征伐蒙古者如此擒戮渠魁聖徳神功巍巍超越亘古莫之比也應欽遵諭㫖令大將軍精選帶去之兵往覓丹濟拉所在押解前來餘兵遣囘黑龍江兵路遠亦遣囘既大將軍一路精兵前進則阿南達一路兵亦令班師遍檄商南多爾濟杜思噶爾及衆部落俱令知悉于成龍等所運之米應行應止著大將軍伯費揚古與于成龍等㑹商行事上從之仍令速行命以四等台吉南冲為一等台吉上諭侍郎安布祿曰呉喇忒達爾馬什里公旗下四等台吉南冲朕初不識雖赴京進貢一二次無復記憶朕昨一到見朕極致頌禱之詞適與符合今日聞報噶爾丹已死丹濟拉來降又甘霖大霈兆民歡悦著授南冲為一等台吉是日上諭皇太子曰朕定於初七日由水路起駕因黄河多曲折而泥濘居人鮮少不便傳驛故令一㮣奏章送往穆納和邵以待朕四日内到彼俱遣從陸路而行交内大臣索額圖鳥鎗手二百名京城旗下馬一千四百餘匹及朕浮帶米八百石留於白塔照去嵗尚書班第接濟囘師兵從商販交明起駕日來風波大而多阻十四夜朕前經過額爾徳尼班第達庫圖克圖處差人來報云今日日將落見一小舟不勝其急言有緊急事務上奏噶爾丹已死丹濟拉來降是以我庫圖克圖遣我馳來以此喜音奏報皇上於是朕令自夜達旦速覓馬由河兩岸迎之又令迎之於小舟水路十五日辰刻散秩大臣布克圖方到告云皇上以此小舟留於内大臣索額圖倘駕未到穆納間如有緊要事務馬不能達令乘此小舟追發行在今緊急喜慶之大事無有過於此者是以令臣等連夜追赴臣等行兩日夜到此併賫大將軍伯費揚古奏章在此故抄出費揚古疏辭發京朕三臨絶塞止為此㓂不可一日留也所見不明豈肯貽笑後人而為此舉乎今賴天地祖宗之靈諸厄魯特皆已收集蒙古屬國靡不臣服不遺一人此報到京即傳集諸王貝勒貝子公滿漢大小臣工宣告其事令㑹議遣奏朕􅇆不勝喜悦握管不能成文匆匆發諭臣謹按噶爾丹狡焉作宼跳梁者幾數十年部衆漸強土地浸廣稔惡己極怙終不悛揆之人事當亟除騐之天道當速滅皇上洞鑒情形獨排廷議决策親征不辭三駕䟦涉之勞身兼將將將兵之事而數十載之巨㓂乃盡殱於兩載之間嚮使從羣臣之請而僅遣將臨邊則賊即敗䘐未必不如前遁逃茍延喘息自非大聖人智勇天錫果毅絶倫焉能立奏膚功若是耶昔皇上一聞厄魯特情形之報即有噶爾丹已無所歸必然自盡或擒或降之㫖今噶爾丹果爾自盡恰符諭㫖皇上先事如見料敵如神宜天下萬世無不景服也乙丑上駐蹕薩察莫墩地方命軍中所餘騾馬仍送至京城尚書庫勒納等奏言臣等送到駱駞一千一百三十九頭騾三千六百三十四頭此内大兵取用駱駞五百三十頭騾二百九十五頭運米都御史于成龍等取用駱駞四百五十一頭騾二千三百二十九頭侍衞䕶軍執事人員取用騾四百四十九頭共選取駱駞九百八十一頭騾共三千七十三頭現存小臕駱駞一百五十八頭大臕騾四百頭小臕騾一百六十一頭今行兵部咨言侍衞䕶軍執事人員騎來騾匹俱交于成龍等無可發囘應將所存駞騾或臣等仍在寧夏同地方官監喂或交地方官喂養請㫖定奪得㫖庫勒納等所喂馬騾駱駞併朱都納之馬一百五十八匹俱送至内大臣索額圖所著索額圖將此馬騾駱駞仍交伊等勿致損少分羣送至京城副都綂阿南達奏報官兵起行日期阿南達奏言滿洲綠旗官兵四月初一日至臣等所臣等於部落黙爾根濟農索諾木伊思扎卜台吉約木楚木藍翎侍衞布達等設哨之兵加以蒙古兵為二百名交一等侍衞俄欣台言帶青巴圖爾哈米爾等令與伊等前去設哨防禦於初二日遣行將綠旗一千兵内痼病及迎鞍損傷之馬百匹退出并提督李林隆標下兵一百名共滿洲綠旗兵二千與提督李林隆等分作四隊初三日自布隆吉爾梭爾地方起行訖又噶爾旦多爾濟已到彼所奏梭爾布爾哈台齊希木等處且言時序不佳馬匹又瘦又閲有馬之兵量帶一百名而來是以臣與彼親身率兵一百名一同起行矣一併奏聞上報聞是日上諭皇太子曰朕由黄河順流而下行十日猶未到穆納水險行危不可輕視前訪得四日可到穆納故令諸報俱送穆納伺候既知其遲乃遣官迎往穆納取来十六日方到行在稽遲之故如此又河中漁者多洲渚有鹿豕及雉河魚雖不多亦不空雁甚多河内乃鄂爾多斯地方河北乃喀爾喀地方又其内乃呉喇忒地方呉喇忒生計頗優牛羊甚夥兩岸老少男婦喧填叩首因此為之稍延賀噶爾丹就戮獻駞馬牛羊者不可勝計御前人俱以舟行不便收納但以御前人所捕之物飽食而遣之蒙古諸人戴徳畏威無可復加朕今但令往取噶爾丹首級星速囘京急為歡暢云爾丁卯上駐蹕都勒地方丹濟拉使人齊竒爾寨桑至齊竒爾寨桑至奏曰噶爾丹三月十三日病死即於是夜焚其尸携噶爾丹之女鍾齊海諾顏格隆拉思倫程貝臧布納爾巴噶卜楚陳奔自阿察阿穆塔台於十六日起程宿十站已到巴雅恩都爾矣意欲前來奈我諸人無馬畜無糗糧若進瀚海皆餓而死矣故暫止於巴雅恩都爾以候聖㫖欽遵而行現在右翼壯丁四百共人口千餘每丁各有馬一匹共駱駞一百五十頭此外並無他物呉爾占扎卜色稜阿巴塔爾阿喇兒拜等率二百餘人往策旺喇卜灘所去矣呉思塔台吉車稜布木額爾徳尼和碩齊博羅齊等率二百餘人往丹津俄木布所去矣我等來歸皇上我於閏三月十四日自巴雅恩都爾而來上曰齊竒爾寨桑一二日後當即遣囘著議政大臣有當問之事問之當議之事議之來奏議政大臣問齊竒爾寨桑與大將軍伯費揚古所奏無異但言噶爾丹之尸已焚臣等共議以為應令大將軍伯費揚古選兵前進將丹濟拉押䕶前來等因前奉諭㫖已極周詳無庸另議但不知噶爾丹之尸已焚故前檄大將軍斬噶爾丹首級星速解送今齊竒爾寨桑言噶爾丹之尸已焚應仍檄大將軍作速驛逓噶爾丹之骨前來至齊竒爾寨桑應令乘驛發至大將軍軍前或先遣彼即赴丹濟拉所或同大兵帶往大將軍既已身臨近地聽其酌奪施行上從之賜厄魯特齊竒爾寨桑蠎袍褂帶戊辰上駐蹕烏闌托羅海地方大將軍伯費揚古奏報師抵郭多里巴兒哈孫費揚古疏言臣等率黑龍江兵察哈爾兵於四月十三日已到郭多里巴兒哈孫出寧夏之前鋒亦於是日到大兵尚未到俟大兵到後臣等公議施行外謹將到郭多里巴兒哈孫日期奏報上報聞是日皇太子諸王以下九卿諸臣以上上表賀皇太子奏言恭請父皇萬安四月十九日已時接到喜報有噶爾丹已死丹濟拉來降衆厄魯特俱已收集蒙古屬國俱已臣服一無所遺報到即傳集諸王貝勒貝子公滿漢大臣明諭縁由令議遣奏之㫖覩此懽忭不知所措即遵㫖率諸皇子詣乾清宫丹墀上恭設香燭向上天叩謝即趨寧壽宫奏知皇太后祖母又捧諭㫖及大將軍伯費揚古奏章呈覽遍示宫中以及外廷奉皇太后祖母㫖皇上屢次遠征每冀聞殄滅噶爾丹之聲息忽得此大喜㨗音不勝歡悦此皆皇上至仁至明天心眷佑聖躬不憚勞苦三次出臨究集大勲予今夢寐已安喜慶之事孰有大於此乎又父皇以噶爾丹之故幸歸化城諭臣以若獲噶爾丹朕於此地發落傳首京師其子必生致於爾聽爾發落此行果於聖算諭㫖不差毫黍生擒其子今噶爾丹又復傳首京城臣等不勝懽忭之至謹奉表稱賀恭惟父皇聖謨神功奉天威靈逆賊伏誅黨與盡降邊徼從此永寧普天歡忭無極叛賊噶爾丹逆天犯順稔惡有年曩者借追索喀爾喀之名竟深入烏闌布通之地我師奮擊窮蹙乞命誓不敢復來侵犯宥之而歸不意狡詐不悛違棄誓言復竄伏於巴顏烏闌之地蓄叵測之奸情煽誘諸藩父皇念切安邊六師親綂遠踰瀚海直臨㓂穴大敗賊人賊雖孑身脱逃而喪胆奪魄已如阱獸釜魚矣去歳冬父皇又念籌邊必須親蒞不憚風雪寒涼之苦躬往邊外駐蹕經畫布置威徳並行賊之羽黨來降不絶賊勢益孤僅存喘息茍延荒徼父皇又於二月親往寧夏丕揚聖武廣運神謨如雷霆之震擊枯朽莫能當如日月之照臨魑魅無所遁孽子就擒而青海諸台吉又率其部落歸降於是賊益魂消惶懼而死其下丹濟拉等盡收其家屬倂挈其尸來降數年頑梗逆㓂盡皆掃除荒徼蒙古屬國靡不臣服從此邊境長享清寧而外藩永無侵擾總由父皇以乂安生民為心三次親臨邊外焦心勞思櫛風沐雨事之勤苦人所不堪皆躬歴之竟不為倦是以獲天眷佑克奏大勲凡賊情形父皇籌畫瞭若指掌無一能逃洞鍳之外此冦之必滅乆在父皇成算中矣今四月十九日辰時報到臣及宫中以至諸王文武大小臣工軍民人等不勝踴躍歡忭皆以為自此宇内無纎芥可虞之事而太平之治益隆矣臣等不勝慶幸之至謹具本稱賀以聞和碩顯親王丹臻等王貝勒貝子公内大臣九卿等奏曰臣等竊惟噶爾丹逆天悖㫖而行聖上三次臨邊為此生民躬勞征伐務在窮追噶爾丹今噶爾丹殄滅應行慶賀祭告天地太廟社稷詔諭天下俟各部院請㫖外今應將噶爾丹伏誅之事先曉諭各省懸噶爾丹首級於兩黄旗教塲示衆俟御駕入京傳噶爾丹首級於諸蕃部落喀爾喀差官周行遍示訖仍懸原處上報聞庚午上駐蹕烏闌腦爾地方設湖灘河朔迄張家口驛站理藩院奏言臣部已遣鄉導官由湖灘河朔過烏闌穆楞之路至張家口分派宿站查由此路過殺虎口路驛站後即與所設驛站相隔應移張家口路之驛酌於此路暫且設驛毎驛各馬二十匹官一員兵十名遣臣部司官宋山祁塔特薩哈蓮及筆帖式等往與管張家口路坐塘官赫色恊同料理著前去官員筆帖式扣數或兩驛一員或三驛一員坐待事務傳報如驛中現在官弁兵丁馬匹不敷著前去官員酌便於附近旗下取察哈爾官弁兵馬設驛俟御駕入邊撤之各遣歸本汛上從之是日上諭皇太子曰朕躬安皇太子佳否十八日過穆納齊竒爾寨桑到除問彼之事已詳開發汝外朕面詰之噶爾丹之死仰藥自殺是實或衆人酖之或自服毒俟程貝臧布到後緩緩辨之朕大事已完心中並無他事每日與大臣侍衞一為言及輙以為快但噶爾丹尸已焚即係全尸其首亦一乾腊而已前呉三桂尸亦焚取之於决囚之地舂碎抛棄榜樣甚明特諭辛未上駐蹕濟特庫地方命議誅塞卜騰巴兒珠爾上諭尚書班第曰塞卜騰巴兒珠爾即當正法著議奏議曰塞卜騰巴兒珠爾乃獲罪於大逆賊之子擒獲之頃理合即行正法皇上豫期𠞰滅噶爾丹暫且覊候至噶爾丹就擒之時一併誅戮今果符皇上睿算噶爾丹既已授首塞卜騰巴兒珠爾不可稽遲即行正法為是俟命下之日將塞卜騰巴兒珠爾赴兩黄旗演武塲處斬收其首俟噶爾丹之尸到日併懸藁街示衆再傳首於四十九旗喀爾喀衆部落仍懸示通衢其徽忒和碩齊塞卜騰巴兒珠爾乳父亦應斬首免其梟示議上上命議政諸臣集議議曰據丹濟拉所差齊竒爾寨桑言噶爾丹之尸業經焚解且已檄大將軍令將噶爾丹之尸驛逓飛解應俟噶爾丹骸骨到日照呉三桂粉骨揚灰例至通衢法塲灰其骨示衆而揚棄之斬塞卜騰巴兒珠爾懸首示衆至傳示諸部落俱照前議上從之塞卜騰巴兒珠爾仍俟駕旋正法大將軍伯費揚古奏報率師赴巴雅恩都爾起程日期費揚古奏言臣等率黑龍江兵察哈爾兵於四月十三日已至郭多里巴兒哈孫俟出寧夏之大兵到後公議施行具奏在案出寧夏之大兵已於是月十四日到運米都御史于成龍等猶未到臣等原應俟于成龍等商酌致米何地藏貯之事但丹濟拉所遣賫奏齊竒爾寨桑言噶爾丹已死丹濟拉等携噶爾丹之尸及其女鍾齊海併其屬人來降住於巴雅恩都爾地方欲即行前來因馬甚瘠而其屬人大半皆無騎步行又無糗糧是以候㫖聖上許來則來云臣等竊思今賊首噶爾丹死丹濟拉等無所逃竄來獻噶爾丹之尸及其女歸降皇上所餘呉爾占扎卜等一二遊魂零星竄散臣等之兵所携口糧扣算收取丹濟拉行程日期似無不足是以將于成龍等所運之米即令貯於郭多里巴兒哈孫以備囘師降㓂之用又齊竒爾寨桑等言丹濟拉無糧臣等率大兵携糗糧羊隻等物前往酌量撥給丹濟拉等收集前來如萬一兵乆需糧再檄于成龍等以彼乆息之力獲休之馬星速運至臣等所指之地臣等於本月十七日綂領大兵向丹濟拉所住巴雅恩都爾進發上報聞是日皇太子奏至言恭請父皇萬安竊惟父皇一連三次親臨塞外務取噶爾丹之首終符聖意總由神畧天威天地宗廟眷祐斯世不復聞㓂之一字矣父皇之意已遂臣思此三次睿慮焦勞聖躬過瘁惟冀炎暑之前早旋京師俾得快覩天顏臣聞㨗音之日喜極不知所措忘食忘寢至於兩日匪但臣歡忭已也往奏皇太后凱音之時内左門外衆人擁塞無路可行歡笑之聲動地謹奏壬申上駐蹕哈喇烏蘇地方隨駕諸臣請行慶賀禮議政大臣都綂宗室公蘇努等奏言臣等欽惟皇上仁同天地明並日月威吓雷霆自三逆蕩平以後十餘年間下臺灣定俄羅斯收服七旗喀爾喀皆决策廟堂之上制勝萬里之外敷天薄海罔不來享來王獨厄魯特噶爾丹肆逆犯順擾亂邊塞曩年託辭追喀爾喀闌入界内輙掠我烏闌布通至近之地比出師聲問其故隨經擊敗遁走顧因聖駕未親蒞軍致此役未能滅賊而噶爾丹雖抗我顏行皇上猶不計其罪惡惟求上合於天頒賜勅諭謂爾居塞外進貢市易資生如常則爾之人民咸獲生理我必不加兵摉討倘爾不行悛改虐我邊氓我之兵力何所不届爾衆亦安能寧處乃噶爾丹仍不悔禍復恣荼毒於時聖心惻然軫念邊塞生靈亟思殄㓂以安良善謂此㓂一日不除則塞外䝉古一日不靖内地生民亦一日不寧以是睿謨獨斷鋭意親征去年五月從克魯倫躬先士卒追奔逐北逼賊度巴顏烏喇適與兩路大軍相遇於昭木多地方遂截擊大敗之噶爾丹既敗之後勢已全潰不可復支猶不遵屢頒勅㫖面縳歸順仍收拾餘衆竄伏於西北荒塞之地以延殘喘皇上廼特命大將軍伯費揚古駐軍喀倫將軍愽濟副都綂阿南達偕提督孫思克李林隆等駐軍肅州凡狡㓂奔赴乞援之路悉遣將率師遏其要害又遍諭厄魯特人衆曲示招徠而聖駕復於冬月沍寒親蒞塞外濟河至鄂爾多斯經畫軍務維時噶爾丹困乏無所得食遣其台吉丹濟拉率兵劫我餘糧為官軍所覺奮擊敗走嗣是厄魯特台吉寨桑人等先後來歸者絡繹相屬皆厚加恩養並授官職噶爾丹雖亦遣其格壘沽英賫奏乞降而我皇上深察此賊詭詐不可信仍留大兵駐牧大同候來春進𠞰頃以二月初駕發京師次雲中令禁旅取道塞外乘輿巡緣邊城堡䟦渉山川踰越險阻直抵寧夏迨大將畢㑹皇上親閲將士馬匹整飭戎行指畫轉餉兼授諸將方畧遣行實進次於狼居胥山之境聖駕三臨邊塞為民除害不憚勤勞於斯極矣其哈密囘人又遵奉諭㫖悉心自効生擒噶爾丹之子塞卜騰巴兒珠爾俘送行在第巴亦遣使馳奏深謝前罪具言嗣後諭㫖無不祗遵而瑚瑚腦爾台吉濟農等與厄魯特舊同族類亦奏請朝貢𨽻於屬國至噶爾丹親信之丹濟拉及阿喇卜灘丹津俄木布等俱遣人輸誠嚮順噶爾丹力竆勢蹙衆叛親離一子就擒外援盡絶驚聞車駕復出朔塞遣發大師竆摉撲剿投足無所自知罪惡山積為天地所不容人心所共憤遂以閏三月十三日仰藥自盡丹濟拉携噶爾丹遺骸及其女子並人口三百戸來歸於是厄魯特部落殄滅無遺類而西北絶塞數千里自此更無一不臣之國不服之人猗歟盛矣自昔蒙古侵軼邊境有兵連禍結數十年而不息者即其馭之有道亦不過如呼韓邪之欵塞啟民突利之來朝覊縻之使不為患而已未有匝歳之内掃蕩無餘且六軍親行凾首獻㨗如今日之滅噶爾丹者夫以沙漠荒遠之區而蹙之如在檻穽以鳥獸飄忽之跡而制之如受羈紲以二十餘年横行無忌之勁㓂而翦刈之如在掌握之中惟我皇上至仁率育上格天心故獲自天之祐而明睿燭幾神威震讋實為千古帝王所不及用能耆定大勲悉符成算如此臣等叨扈聖駕獲覩成功不勝慶忭榮幸之至伏乞勅下該部察明典例詳議告祭天地宗社及詔告中外事宜恭候駕還京師即請舉行並祈命史館編輯平定北冦方畧昭示億禩埀休無極為此具題請㫖奏入上曰諸卿奏賀朕已具悉著詳察應行典禮具奏即下所司甲戌上駐蹕黄河西岸喀喇蘇巴克地方陸路諸臣請行慶賀禮由陸路後至大小諸臣以𠞰滅噶爾丹奏請行慶賀禮來降之厄魯特寨桑諾爾布等亦奏請叩賀上諭曰往者噶爾丹以追逐喀爾喀為名直入我扎薩克烏闌布通之地故朕命皇兄裕親王及皇長子率師往剿之噶爾丹大敗使濟隆庫圖克圖徃復陳説自今以徃不敢再犯邊陲噶爾丹頂威靈佛立誓此爾衆之所共聞嗣後無故過土喇潛處巴顏烏闌掠我臣服之納木查爾拖音故朕親綂六師聲罪致討然猶不忍遂加誅滅再四遣使諭以和好而噶爾丹怙惡不悛朕故整師進剿噶爾丹不能當我軍威驚潰奔逃遇我西路大兵亦因噶爾丹輙先攘臂我軍乃奮擊大敗之此皆噶爾丹違天背盟以致禍患及身國隨以亡朕但思掃除殘暴拯救羣生誠悃懇懇求符天理故大軍所向無水之方靈泉觱沸不毛之地瑞草蕃滋山川効靈百神顯祐聞噶爾丹所至之地必有烈風暴雨災異頻逢驚聞我軍之來寢食俱廢反覆思維無計能逃竆急仰藥而死由此觀之天可違乎其助順惡逆亦顯然矣夫與朕為敵者僅噶爾丹一人與衆何與不惟噶爾丹在日爾等降者必加恩撫䘏今噶爾丹已死凡有降者朕亦如爾輩恩育豈忍異視耶然噶爾丹之滅朕之大小官員當奏請慶賀爾諾爾布等皆厄魯特寨桑受恩於噶爾丹之人不當奏請諾爾布寨桑等叩首奏曰我等實同禽獸毫無知識䝉聖上將大節大義詳明曉諭始覺我等之非今我等不行慶賀請謝皇上聖誨叩首而退副都綂阿南達等奏報率師赴巴爾坤起程日期阿南達李林隆疏言臣等率兵於四月初十日至塔爾河哈密之達爾漢白克額貝都拉遣人賫書云我前有親隨之人杜拉兒自丹濟拉處逃歸言噶爾丹於三月十三日死於阿察阿木塔台地方呉爾占扎卜色稜阿布等已奔策旺喇卜灘處車稜布木呉思塔博羅齊等已奔丹津俄木布處丹濟拉原欲西行聞阿南達在布隆吉爾地方乃不由布隆吉爾前往與諾顔格隆查渾喇錫之子拉思倫等率四五百人由博克達尼隴哈爾巴漢之南取道噶斯欲奔達頼喇嘛處曾住於巴爾坤爾地方本月十七日於我北村搶去人一口馬二十四匹牛二頭云問賫書之囘子白稜曰噶爾丹得何病而死據云逃人杜拉兒稱噶爾丹曾云我向以折滾噶爾為良善之國不意無信如此怨恨數日飲食俱廢於十二日頭痛召丹濟拉前去十三日午前身死葢由皇上大克之之後以至家國滅亡妻子離散恥辱難堪正在悔恨之時皇上遣人再三諭以歸降否則即遣大兵剿滅以此竆困急廹而死云查先是閏三月二十八日哈密之達爾漢白克額貝都拉報稱色稜所逃十八人内二人來告噶爾丹自格格特哈朗古特地方起程到台西里地方我等於三月二十九日自噶爾丹處逃出前來已經奏聞今逃人杜喇兒所稱雖與色稜家下逃人之語不符既云丹濟拉現在巴爾坤爾地方臣等率兵急趨巴爾坤爾探視確信另行具奏報聞事下所司命舟運湖灘河朔米以濟晉民之乏食者上諭大學士伊桑阿曰前山西巡撫倭倫以去歳山西數州縣歉收今米價甚貴奏聞頃噶爾丹殱滅天下悉已無事惟愛養兵民是為要務山西米價騰貴民生困苦朕聞之中懐軫惻扈從前來大臣侍衞官員執事人自船站坐來船隻現有水手若至湖灘河朔後將此船隻逆流牽挽囘至寧夏甚難前亦曾諭總督呉赫就此船隻將湖灘河朔積貯米或三千石或再加多量行裝載遣賢能官員順流而下運至保徳州比時價減少糶賣於民大有裨益爾等議之待至湖灘河朔奏聞諸臣會議曰我皇上以兵計生民為念或居宫禁或出巡幸無不咨詢訪問今聞山西米價稍長爰是軫念以現在船隻水手將湖灘河朔之米順流運至保徳州減價糶之於民甚為有益聖諭如斯雖堯舜之仁何以加焉此事顯然有益於民俱應欽遵聖諭施行查隨駕大臣侍衞官員執事人等坐來之船共九十五隻載馬大船二隻樓船三隻及一等侍衞思格等坐船一隻共一百一隻將湖灘河朔之米或三千石或再加一二百石令其滿載遣部院才能官四員運至保徳州㑹同地方官較時價稍減糶之船上水手三百餘人應自湖灘河朔各給十五日口糧此事既與山西百姓甚有益應移知該撫派才能官前來迎運㑹同監賣其船至保徳州時該撫即於本省留用應遣官員職名開列請㫖上曰坐來之船既多保徳之路又近應於所運米石外加增轉運著與巡撫倭倫㑹議具奏諸臣㑹同巡撫倭倫議查隨駕大臣侍衞官員執事人等坐來之船共一百一隻船數既多路途又近應撥米五千石視船大小載徃若有餘則著緩緩運至乏米之處減價糶之巡撫倭倫言若將運米之事付臣臣自能運到應將此米交與倭倫令派所屬才能官員轉運部院官員不必另遣仍令將運至米石所賣銀兩數目造册報部其水手三百餘人自湖灘河朔各給十五日口糧其船至保徳州即於本省留用奉㫖依議運此米石著學士黄謩前往率部院司官二員同行侍郎安布禄留此監發米石畢星速前來乙亥上駐蹕喀喇蘇巴克地方宥坐塘馬之徳等死議政大臣奏曰前閏三月初五日奉諭曰自邊外湖灘河朔至横城安站已畢屢檄大將軍一概報事俱由口外逓奏近者大將軍所奏三事何以從内來著查如何遲悞由内驛前來之處查巴牙思呼朗報安站已畢之事哈什闌坐塘囘子馬之徳不親身送交次站金鐸遲至五日其部發大將軍之事葫蘇台坐塘金鐸因封破不收以致失去金鋐不遣信實之人自代失去命下封套凡馳驛之事皆關係軍機不可少遲時刻馬之徳遲延五日金鐸失文情由殊為可惡應將伊等俱照軍法處斬金鋐不遣信實之人自代仍應𤼵配奏入上命寛此二人免死拿𤼵京中刑部議罪大將軍伯費揚古奏外藩蒙古諸部落各願從軍効力費揚古奏言先經奉㫖宣諭現在軍前諸扎薩克王貝勒貝子公台吉等及附近喀爾喀扎薩克等聽其從軍効力據現在軍前喀爾喀和碩達爾漢親王諾内毛明安貝勒班第等王貝勒台吉等領伊等䕶衞併所屬附丁願各自備四月資糧從軍効力申詳具題在案今據喀爾喀達爾漢親王諾内旗下多羅郡王古魯席熙等諸扎薩克王貝勒貝子公台吉等俱各願率部衆自備四月資糧從軍効力俱於四月十七日到郭多里巴爾哈孫地方臣遍問諸扎薩克王貝勒公台吉等今留米此地爾諸扎薩克内有牲畜疲乏齎糧不足者俱留此就粟據云我等馬畜俱好倂無疲乏願從大軍効力不願留此相應奏聞上報可把總李應龍以船上効力補授守備上諭行兵部曰把總李應龍此次船上効力甚為勤慎如有寧夏該屬守備缺出即行補用總督吳赫奏以古水堡守備授之上從之以侍郎席宻圗規避革職治罪議政諸臣以席密圗所買牲畜數目具奏上著問席密圗爾言由内路去何以又從外路來遵問席密圖奏曰臣事既畢於閏三月十八日由涼州起行而來行兩日道聞十五已囘鑾臣愚以為從寧夏將有千里如追赴行在恐不能及故由内往在大同宣化左右候駕報部後勅㫖既到臣始自知其謬甚為惶懼連夜追到行在此皆臣庸劣所致夫復何辯上曰部院人員習氣即此也凡事皆先自言其庸劣而已朕躬在軍中彼事畢不追赴駕前棄之而從内路以去可以為是乎著拿交議政諸臣隨議曰上躬出兵在外席密圖理應事畢即追赴駕前乃不至行在即欲囘京由内路而去殊為可惡應將席密圖革職枷號兩個月鞭一百不准折贖上從之丙子上駐蹕鄂爾紀庫布拉克地方厄魯特車稜台吉來降大將軍伯費揚古疏言康熙三十六年四月二十日大兵前進正行之間喀爾喀衞徴帶青凱木楚克引厄魯特台吉車稜下龔格厄爾克來告曰車稜率部衆來降聖上臣等即發官兵押車稜及其屬衆至屯營固林扎拉之地台吉車稜告曰去年五月初十日我見大兵厮役人等掠我衆什物心甚驚懼率十餘人由山内奔逃至達馬爾地方遇噶爾丹同往薩克薩特呼里克駐扎數日欲各自游牧乃離噶爾丹往額黑阿喇兒我屬下陸續有百許人率其妻子來與我㑹我思噶爾丹為人素惡與彼為伍徒死無益聞聖上待厄魯特降人甚加恩撫終不如往歸聖上之為愈因謀之部衆率百許人及其妻孥百許口正月初三日起行前來養我馬畜緩緩而行由憨山翁金來降聖上又烏闌布通戰後蒙皇上賜我父呉爾坤勅書蠎袍我父來歸皇上之意極其誠切但無便脱走未得來歸耳臣等將車稜併所屬龔格厄爾克傳送行在外其車稜之妻併車稜帶來男婦子女即令自乘其馬畜交與驛站送往張家口奏至上報聞併示議政諸臣命以軍中有餘馬騾駱駞撥給營驛行兵部奏言席密圖等疏稱臣等同甘肅巡撫及地方官員採買馬騾一千一百五十六匹駱駞八十五頭牛三百十二頭羊七千隻共用銀二萬一千四十八兩臣自助駱駞四頭馬騾四十匹侍講學士朱臣等每人助馬三十匹總督巡撫地方官員共助馬騾五百六匹以此撥給進剿及留駐兵丁馬騾一千五百匹其牛羊俱儘數隨軍後到馬二百七十二匹騾八十匹駱駞六十八頭已交凉州等處官員喂養所買牲口細數該撫另行奏銷竊思皇上親綂六師出征絶域已將噶爾丹剿滅現在馬畜並無所用若將所剩馬騾交地方官喂養徒費錢糧應將此馬檄該督撫撥給營站騾駞變價報部其採買牲畜用過銀兩細數該撫造册具奏以憑查核上從之騾駞亦著撥營丁丑上駐蹕烏闌巴兒哈孫地方厄魯特滾布察罕等來降䕶軍綂領鄂克濟哈疏言察罕多爾濟之父滾布察罕率其妻子六十九口台吉阿喇卜灘之四口寨桑徳倫之十口尼爾齊海呉巴什四十二口於四月二十三日既到寧夏問之以噶爾丹情形滾布察罕言彼與噶爾丹分居已乆不知噶爾丹情形特來投聖上耳問之徳倫呉巴什等則言去年九月初八日自齊金腦兒地方噶爾丹遣我等歸家不知噶爾丹之事又據副都綂阿南達檄山西巡撫言察罕多爾濟養於大同煩將滾布察罕等送交山西巡撫云應作何處置請㫖定奪上曰此屬若從内地送出時方炎暑恐致疾疫著自寧夏送往船站撥内大臣索額圖等馬畜由口外送至張家口上又諭大學士伊桑阿曰前以察罕多爾濟顧孟多爾濟留於大同交晉撫倭倫撫養今著將此二人文到即出徳勝口迎駕而來該地方官酌給馬與糧撥人送來是日皇太子奏至言恭請父皇萬安四月二十四日辰時奉到諭㫖朕大事已集意中無事日與諸臣一言及之以為快臣讀之不勝懽忭但臣更有不盡之喜躍者自去年三月至今年四月臣計三次整十一月不得依父皇膝下以承聖訓皆逆㓂噶爾丹之故今父皇斷不宥彼必發兵勦之彼亦灼知斷不能脱飲藥而死羽黨皆降此後永無乆離父皇之憂矣臣愈一思之喜之不盡今噶爾丹自裁其子被擒朔漠永寧又並無家事臣欲減帶從人赴父皇之前於此四月展晝夜戀慕之情且以稱賀併應與諸皇子中某某偕往伏候諭㫖父皇􅂷鑒務賜准行得㫖朕目前即入京皇太子不必率諸皇子來迎散秩大臣巴當阿等奏報囘師散秩大臣巴當阿前鋒綂領杜什希等奏曰臣等至恩克所逃空郭羅地方不見伊拉古克三庫圖克圖即躧踪前行三日於四月初八日在古爾班忒克地方兩路之軍相㑹臣等㑹同追之六日到瀚海之喀屯敖拉視之則已向西而去矣向散秩大臣沙克准等問其去向伊等以為向祁齊希納空郭羅阿濟而漢去矣是以臣等於四月十四日各人取路而囘奏至上報聞著示議政諸臣併示呉達禪喇錫戊寅上駐蹕席納拜星地方命塘報由邊外馳逓上諭大學士伊桑阿曰朕今日發報至京已諭之以内來報事俱由張家口遣發爾等亦曉示坐塘人員俱由張家口逓送併遣理藩院或司官或筆帖式一員往大同接西來諸事俱由邊外送來朕進張家口後再照常由内驛逓送是日諭皇太子曰朕過湖灘河朔三十日過殺虎口往張家口如由内地而往則暑熱而又值農時邊外近而且凉今年水草甚佳我軍之馬駞雖在四月行值草青之時無論貧富咸皆肥腯一無損棄朕多方區畫必令全歸大畧計之五月望間可到京城京城之馬一無所用此諭到後凡報從張家口遣奏御用茶湯氷水出張家口來迎從驛站遣發此時乳酥饒足蒙古來迎者充塞於道食物亦多不必賫來迎接可將上項諸事奏之皇太后併宫中俱令知之聖祖仁皇帝親征平定朔漠方畧卷四十三

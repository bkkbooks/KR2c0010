body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷四十二乙未駕自寧夏城趨白塔聞鄂爾多斯兵将渡河使督運于成龍喀拜前往察罕托海䕶其駝馬撥船五隻以濟是日駐蹕堯甫堡丙申上駐蹕流穆河西岸以巴錫為陜西巡撫鄂海為陜西按察使上諭大學士伊桑阿曰陜西巡撫党愛按察司納壘俱已衰老今用兵之時伊等不能勝任俱著解任党愛速赴行在山西按察司巴錫著授陜西廵撫其納壘員缺查隨駕及運米採買牲口䕶送駱駝騾子帶養新滿洲之御史給事中郎中職名具奏吏部以緑頭牌開列職名入奏得㫖以郎中鄂海為陜西按察使又諭内大臣曰昨聞各處喧譁此皆八旗兵丁聚集之聲也朕姑容之嗣後著嚴禁又見輜裝行路皆無次序任意趨走嗣後著按隊伍行又諭曰乗官馬者如有倒斃遺失著各該管官員首領照前查奏使䕶送使人回子伊什噶噶雅哈齊至哈密回子伊什噶噶雅哈齊言䝉皇上恩賞銀兩欲買服用諸物帶歸恐路有不虞難以行走理藩院為之轉奏上曰往使策旺喇卜灘之侍郎常綬等起行未久伊什噶噶等照京城前來例給之驛馬令前押送筆帖式石圖將伊等追送常綬同常綬携至嘉峪闗於地方官取助馬糧等物著伊等親身小心照管携至哈密將彼留下伊等前去丁酉上駐蹕哨馬營西南隅之峽河西岸諭内大臣曰今日風雨此處再駐蹕一日著概行曉諭是日上諭皇太子曰因出使噶爾丹之員外博什希及降人格壘沽英之子呉巴什丹濟拉使人察哈代遣令復往又格壘沽英曼濟噶爾丹使人喇木札卜丹濟拉使人羅卜臧等未到且録所問伊等口詞及噶爾丹奏章是以稍留待之初十日清晨曼濟羅卜臧到申刻出使阿喇卜灘丹津俄木布之筆帖式黑色長史馬尼圖等至喀倫奏報之事及大將軍伯費揚古奏報之事俱到初十日晚格壘沽英喇木札􅁲等到故開所問伊等口詞遣諭知之視噶爾丹情狀與丹濟拉不睦是真今阿喇卜灘丹津俄木布又遵朕㫖歸附於我人心已離廹於饑餓是實今向額克阿喇兒移徙者為彼地有魚耳豈有人隨往乎兹來降者不絶屢得其聲息朕謀定行事㫁不輕舉亦不必急今撥餉已完發兵亦畢候諸聲息未定日期糧草駞馬乾糧俱大有餘並不苦累官兵百姓又朕所遣前鋒侍衛竒薩木等擒一厄魯特男婦而歸奏曰臣等謹遵指授三月十九日自寧夏起行閏三月初一日至古爾班賽堪地方獲此厄魯特而返云其厄魯特札木素口供另開示外其以此諭示滿洲諸臣又諭皇太子曰朕區處軍務畢十五日起行進趨白塔其事俱已抄發白塔乃河套地方鄂爾多斯杜稜公汛地此諭到後報文勿由内遣發若出殺虎口由外遣發徑千里許而易行内地之路惡不可言雨水暑氣人病馬斃必多寕夏地當瀚海中央年髙體弱者甚不相宜雖無病者常有胸膈不寛形容消減者朕則無所覺寕夏距賀蘭山邊塞百里有餘水草佳美不必言随駕大臣侍衛䕶軍執事人員之馬御用馬駞牛羊俱發至察罕拖海喂養此二十日内俱略有起色矣不取地方草一束豆一抄以為喂養之資米豆與草大有餘各處俱停其運解令隨所到收貯朕此番逺行特為經理糧餉定奪兵馬進止之機而來可行累民擾地方之事乎今事已畢詳開専諭其以此遍示議政諸臣訓諭按察司鄂海鄂海以授為陜西按察使奏請聖訓上曰爾何庸訓為向如爾外任之官每於朕前奏言潔清其身以圖報恩者多及至蒞任後頓渝素行與向所奏者異矣陜西地方甚屬緊要朕於從官二十餘員内簡任爾為按察使爾蒞任居官若善朕别有裁度如其不善不止於姑罷之也著於大學士前傳諭是日遣内大臣明珠侍讀學士黄謩以銀賞運米鄂爾多斯䝉古戊戌上駐蹕哨馬營喇嘛商南多爾濟奏報青海諸台吉來朝喇嘛商南多爾濟等奏曰欽奉上諭以阿喇􅁲灘去後之事著理藩院檄知商南多爾濟今將青海台吉應令誰來朝見作速定議來奏隨檄臣商南多爾濟云近日尼麻唐庫圖克圖至奏稱逹賴喇嘛去世已十有六年再生後身今已十有五嵗已將此所奏之言曉諭於衆復以主事保住等為使賫捧勅書與尼麻唐庫圖克圖同使於第巴矣又丹濟拉欲降告諸我使員外博什希等又遣其使羅卜臧囑之密奏即令羅卜臧賫捧勅書歸諭丹濟拉速降矣又格壘沽英與噶爾丹相惡挈其妻子而逃偕博什希齊來歸降已授格壘沽英為散秩大臣授其子呉巴什為侍衛矣續有阿喇卜灘丹津俄木布察罕台吉皆欲來降遣使偕我筆帖式黑色來上疏亦令賫捧勅書諭以速降遣彼使歸矣又遣哈密擒解之厄魯特恩克逹爾漢寨桑賫部文招撫其主滚占之妻子去矣又遣工部侍郎常綬等往諭䇿旺喇卜灘乗噶爾丹困窮之時速圖之以報其讐又遣散秩大臣巴當阿䕶軍統領孫渣齊散秩大臣䇿旺諾爾布䕶軍統領杜什希率兵分兩路往擒伊拉古克三庫圖克圖去矣目下調將軍馬思喀率大兵從郭多里巴兒哈孫至額克阿喇兒將軍博濟孫思克副都統阿南逹率兵出嘉峪闗往禦西方為此檄知青海衆台吉何時入朝皇上何人前來爾等作速議定星馳來奏臣恭惟皇上仁聖性成智勇天錫恩威並用是以青海四姓厄魯特諸台吉俱懽欣鼓舞願往覲聖明前者已將阿拉􅁲灘等前去之名起程之日陳奏外西寕屬下回子頭目業已起行矣其逹兒寺掌教垂臧庫圖克圖温都孫寺掌教逹賴綽爾濟喇嘛及十三寺院之囊素通事等厄魯特之工匠小人皆願往朝聖明其人甚多不能逐一舉其名字又札西巴圖爾台吉言我此地額爾徳尼巴圖爾台吉素行甚髙衆台吉凡事皆推之以為長故我將勸其駕乞皇上俯視比和碩特一姓之台吉臣等答之云爾説之往朝甚是皇上㫁不輕待爾等所親之人也又青台吉遣人來告云我首領台吉留我等守禦地方目下不獲往覲聖明遣我子羅卜臧行可乎臣等言會盟之時曽明諭云召爾等青海八台吉舊逹賴台吉之子逹賴帶青逹賴汗之子拉臧等來如不能親來則遣子弟代之凡有願往者皆來又札什巴圖爾台吉言我等親身目下往覲聖明奕世承其恩寵而留守各地方者永不獲承恩寵甚可憐憫我請通行曉諭俾令遣使聘問又原屬噶爾丹之人有姓徽特之色稜厄爾克台吉親來告曰我自厄魯特阿喇􅁲灘所出逃來歸皇上失路而至青海我目下在拉臧左右願得入内此人俟衆台吉到後問明可否另報又有姓徽特之五六嵗童子一人此外更無有名之人住居青海者僅有噶爾丹之兄趙特巴巴圖爾之子姓鍾阿爾名色卜騰札兒車陳帶青因彼父䘮不得親往合掌稽顙訖此外更無有名之人臣等欽惟去年内外大小臣工之意俱謂噶爾丹且不必伐皇上宸衷獨㫁决意親征謂噶爾丹不速行𠞰滅生民何由得安親統六師逺出塞外此至仁也皇上自出師以來率先徒行日御一餐暑不張盖不擇水泉之甘苦掘井而飲深踰瀚海直至巴顔烏拉之地此大勇也皇上神謀既定灼知洞見噶爾丹㫁不可使之瓦全留其餘孽近臨巴顔烏拉之地天威所加莫能抗拒噶爾丹棄其一切所有之物敗遁而去適遇皇上預調西路大將軍伯費揚古之兵遵奉指畫盡殱醜類噶爾丹止携數人逃遁為萬目之所共見此大智也今離散之衆相繼歸降皆受而養之噶爾丹之子塞卜騰巴兒珠爾為哈密回子逹爾漢白克所擒獻今年皇帝親臨寕夏青海四姓厄魯特俱來歸順丹濟拉丹津俄木布阿喇卜灘格壘沽英等俱乞降來歸臣等不諳文義取通鑑而一一歴誦之自古人君可方皇上之仁智勇得以同年而語者未之有也臣等百官兆民仰賴皇上神靈含哺鼓腹以享太平謹以慶賀禮同行間諸臣併地方文武官員及軍民人等在西寕望行在叩頭商南多爾濟又奏曰老僕之意衆台吉來時路之兩旁正有禾苗無地牧放應勅地方官略助牲口草料糗糧又衆台吉俱問及獅象且其内自相謂曰我等往朝皇上殆必以身所未見聞之物示之也乞將驚竒可喜諸劇示之上命議政大臣集議議行文商南多爾濟除先奏來朝台吉不議外著現欲來朝為首之人將庫圖克圖喇嘛及留守地方台吉之子弟自行酌量分别伊等行時率之俱來餘如商南多爾濟所奏可也上從之己亥上駐蹕石嘴子西南隅黄河西岸厄魯特羅卜臧格素兒及其弟逹什夫婦偕來降揚威將軍舒恕奏曰侍郎滿丕送到來降厄魯特羅􅁲臧格素兒及其弟逹什夫婦告云我等乃噶爾丹下之人自什爾哈地方乗馬五匹出逃而來我等骨氣乃喀爾喀也原係喀爾喀額爾徳尼班第逹庫圖克圖之父賽音楚呼爾之人小時投入厄魯特我兄弟皆居於厄魯特羅卜臧格素兒告曰我未來之前晚衆喇嘛在噶爾丹所居廬中誦經我亦曽偕往因問羅卜臧格素兒曰爾等逃來之地名什爾哈距薩克薩特呼里克有幾日程從何而往噶爾丹所有寨桑為誰共有幾人駞馬居食又何如答曰自噶爾丹薩克薩特呼里克向西北行十六日至什爾哈地方我等從什爾哈逃來噶爾丹在薩克薩特呼里克游行噶爾丹左右有諾顔格隆阿喇兒拜率其下百餘人呉思塔台吉率其下百餘人在噶爾丹右翼半日程而行噶爾丹之前一日程丹濟拉阿巴丹濟拉壻拉思倫博羅齊率其下三百餘人而行丹濟拉之前一日程呉爾占札卜色稜車陵布木等率其下一百餘人而行駞馬有二三匹者少有一匹者多亦有無馬者並無牛羊捕獸為食不得獸則殺馬駞為食聞滚占之妻察罕古英寨桑塔爾寨桑等所在之地名波兒哈問羅卜臧格素兒等曰噶爾丹丹濟拉原早晚不離同行同住今丹濟拉離噶爾丹而前行其故何也爾等其以實告噶爾丹欲往何處棲止下人之意何如爾等之外猶有來降者否答曰丹濟拉原與噶爾丹同處日夜不離近日丹濟拉撻噶爾丹近侍醫人自此分離噶爾丹不言往棲之地我等下人不得而知下人之意皆謂從噶爾丹終無結局願得來歸聖上有父母兄弟在䇿旺喇􅁲灘處者欲往投䇿旺喇卜灘者亦有之問羅卜臧格素兒曰伊拉古克三庫圖克圖今在何地答曰聞伊拉古克三庫圖克圖去冬在古爾班賽堪今不知其所在問羅卜臧格素兒等曰杜哈爾阿喇卜灘丹津俄木布在何地答曰阿喇卜灘去冬在布顔圖果兒河丹津俄木布進洪郭羅後又出洪郭羅矣又問逹什曰噶爾丹之子塞卜騰巴兒珠爾被聖上差人擒獲噶爾丹曽聞之乎答曰噶爾丹未聞於是令逹什乗驛星速遞送赴行在外俟羅卜臧格素兒及其妻車陵到日并弓矢馬匹送交歸化城副都統阿玉什等為此具奏上報聞命掩埋運米人役遺骸上諭内大臣曰前者親隨侍衛色克圖探路而歸奏稱此路猶有去嵗運米人役遺骸自今日以後交與管輜重大臣若遇遺骸俱收埋立為一塜每日收埋幾何至駐蹕處奏聞臣按掩胔埋骼史紀周文然時必先目擊而後不忍之念生焉今皇上聞奏心傷即垂惻隠特諭隨路起塜掩埋猶慮奉行者未盡細心復命將埋過數目逐日奏報何皇仁之周密乃爾也茫茫沙磧頓化春臺落落枯骸不至暴露誠不啻文王之施仁矣庚子上仍駐蹕石嘴子西南隅黄河西岸將軍馬思喀等以隨軍食羊痩損請罪馬思喀等奏曰採買羊隻一萬五千押解臣軍查收之時羊甚羸痩因時當草青擇其稍可者共取八千九百十二隻於十八日起行至堯甫堡查得疲乏者有三千零二隻已交李岡堡把總朱乾訖但此羊係充米數按日食用者乞著應償官員將所缺羊九千九十照數賠償解至臣軍得㫖羊為軍食要需馬思喀等將此羊八千九百十二隻應特委能員於兵未起行時乗早凉就好水草趕去乃不特委能員趕解致疲乏者三千餘隻著議政大臣將馬思喀等嚴議具奏集議曰查羊係軍食要需馬思喀等當専委能員小心趕去乃不委人押往隨軍冲塵而走致三千餘羊疲乏殊為不合今即採買可得亦不能追赴軍前且寕夏除此一萬五千外並無另備之羊應將馬思喀等選來之羊五千九百十隻専委人員於兵起行前乗凉爽時就好水草飼秣不使疲乏趕解而去其餘九千九十痩羊交該督於好水草處牧放俟肥日另奏請㫖得㫖疲乏之羊不交與道員大吏而交與把總此五千九百餘羊於一二日内又當以疲乏告矣其趕羊者撥兵幾人所委何官亦應查訊爾等以馬思喀同寮狥彼情靣若朕則何情靣之狥耶著再議具奏覆議曰羊者軍中要需馬思喀等當特撥官兵趨水草佳處小心飼秣驅趕而去乃彼所自擇來之羊行不數日使三千餘羊至於疲乏此皆䕶送不謹之所致也且將疲乏之羊不交道員大吏而交付把總殊為不合如此驅行則一二日内彼所帶來五千九百餘羊又將以疲乏告矣應將驅送此羊撥兵幾人交付何官之處查明具奏後將將軍馬思喀等一併議處其將軍馬思喀等選來羊五千九百十隻著特撥能員於兵未行前乗早凉時趨水草佳處飼秣不使疲乏趕解而去所剰痩羊九千九十隻今無所用應交該督量𣲖能員解役乗凉爽時於水草佳處飼秣緩行不使疲乏追送御營可也得㫖馬思喀等所云羸痩而留於寕夏疲乏而留於堯甫堡羊九千九十隻著都統愛必逹侍郎阿爾拜帶慶封司員外常泰御史馬色前去將此羊如何羸痩如何疲乏斃者幾何同總督查明先報伊等即與總督所撥官員協同趕至白塔地方愛必逹等與總督會問採買羊隻御史顧素按察司鄂海據顧素供稱職在寕夏中衛用價四錢買羊六千四百隻皆有五分臕陸續俱交送道員呉秉謙訖據鄂海供稱職在衛屬地方用價銀四錢買羊九千皆有七分臕陸續交送道員呉秉謙後呉秉謙受領印文稱同知周志煥揀收羊八千六百其四百因痩不收即照數取回原價還庫訖據同知周志煥供稱一總此羊自三月十五日起至閏三月十五日止收完前所收喂之羊將軍已取去矣續到之羊俱自逺方採買趕來一時喂養不曾蘇息至於痩乏職有何辨共倒斃之羊八百六十七隻職皆照數買補臣等查得此項羊内原買痩者亦有之喂養官員不勤慎喂養而痩者亦有之甄視所有羊内有堪趕往之羊六千九百十隻有極痩不堪趕往之羊二千一百八十隻著令總督呉赫照數買補共九千九十之羊視水草佳處一日行二三十里小心從容趕往據將軍馬思喀等疏稱臣等領來羊隻分給八旗叅領綽新帶張古費雅思哈米立布胡鈕勒徳里闗保元寳等每旗各一䕶軍校兵各一十一名令其領去其前鋒處交軍校前鋒每日輪趕無専管之人黑龍江叅領呉爾圖納蘇圖所領羊内疲斃五十五隻原帶交羊之同知周志煥隨臣等同來及至堯甫堡疲乏之羊計三千二隻欲覔同知周志煥交付尋之不獲故交李岡堡把總朱乾也不喚寕夏道大吏交與六十里之間致使如許羊隻疲斃此皆臣等之罪也奏至上命議政諸臣集議議曰羊者大軍急需皇上特命動支錢糧採買為大軍儲備將軍及叅謀諸臣理合仰副皇上為兵儲備之意特撥官兵小心趕行乃出寕夏六十里間致三千餘羊疲乏且有倒斃者此皆不能敬慎之所致也其將軍叅謀及趕羊之署叅領綽新帶等理當即行治罪但現在出兵請俟歸日議處奏入得㫖依議馬思喀等帶來之羊若痩朕行在亦有採買之羊換而給之如馬駞有羸痩疲乏者朕亦以馬駞換而給之是日運米都御史于成龍等將六隊之米俱全上船撥郎中常有守備林之本同地方官七人前後管轄從黃河順流發行辛丑上駐蹕石臺西北隅黃河西岸内大臣明珠等回奏賜鄂爾多斯䝉古兵白金事先是上諭曰念鄂爾多斯貝勒宋喇卜等各率其兵隨駕勞苦爾其率學士一人賫銀六千兩前去同都御史于成龍賞鄂爾多斯現到之兵人各二兩務使遍沾實惠毋虚朕意至是明珠奏曰臣與學士黄謩於本月十九日同至伊克俄羅木會同都御史于成龍計鄂爾多斯現到兵二千二百七十八名每人各二兩算皆一一親付共賞銀四千五百五十六兩餘銀帶歸奏入上報聞是日皇太子奏至曰奉閏三月十六日諭㫖言視噶爾丹情形與丹濟拉交惡是真今阿喇卜灘丹津俄木布又附於我矣人心離散廹於饑饉是實兹向額克阿喇兒而游行者為其有魚也豈有隨往之人乎今來降之人不絶屢得其聲息朕計定行事不敢輕亦無庸急竊思丹濟拉者乃噶爾丹一體信任之人既丹濟拉交惡阿喇卜灘丹津俄木布皆遵㫖附我則噶爾丹將誰與處乎下人全廹於饑饉甚真故源源不絶以來降噶爾丹雖欲往額克阿喇兒誰從之去耶又將察哈代格壘之子呉巴什曼濟額林辰哈什哈格壘古英寨桑喇木札卜札木素答問之詞一一詳悉觀之皆謂丹濟拉與噶爾丹交惡大寮離心至於下人皆牲盡糧絶至於流散語皆相同無異父皇又於此役謀定而行噶爾丹必於目前被擒雖臣亦似可决之不勝欣悦謹奏壬寅上駐蹕黄河西岸環洞將軍孫思克博濟奏報阿南逹等自肅州進兵日期先是行兵部檄孫思克博濟發滿洲緑旗兵各一千著阿南逹李林隆率是軍追𠞰噶爾丹續檄甘州副都統西爾哈逹馬雲霄等將存留之馬增給是軍令星速起行兹以是軍於本月二十二三到肅州支糧於二十四日自肅州發行報部轉奏上報聞是日上諭内大臣公福善曰衆人帶來車輛其所載者非現需之物奚用兼程前進既至白塔信宿之地隨後徐到可也著通行曉諭是日侍郎席米圖咨行兵部文稱職等之事已竣是月十八日自凉州赴寕夏迎駕行二日至大井地方聞駕於十五日自寕夏起行出邊職乃以身將回京之故具咨交大井坐塘筆帖式言此非緊急事務随便附送行兵部可也等因咨到侍郎哈雅爾圖為之轉奏上曰朕躬尚在外席米圖或來迎駕或住候駕當請㫖為是今言回京大非理矣癸卯上駐蹕黃河西岸黄差頭灣大將軍伯費揚古疏辭大將軍任上不允費揚古疏曰臣本一介庸劣之人䝉聖上簡畀以非常之重任臣於去嵗統軍數萬未能仰遵聖訓以致覊遲於聖駕之後且天威所加噶爾丹肝胆碎裂棄老幼子女鍋釜什物而鼠竄遇之即當剪除而未能撲滅以副聖主仁愛中外欲𠞰滅噶爾丹使諸䝉古遂生樂業之意皆縁臣庸劣不能上紓宸慮正在晝夜靡寕之際復䝉聖主垂憐俾臣瓦全臣不勝歡欣感戴至駐扎汛地不意又命臣總領大軍進發臣一見部咨曷勝惶恐伏祈睿鑒收回成命罷臣大將軍任仍著領大兵進發之人料理將軍事務惟責臣以戰鬬之事如此則臣心安可以竭力圖報皇上髙厚之恩於萬一至領黑龍江察哈爾兵赴郭多里巴哈爾孫地方會大兵進發之日另行奏聞外謹具疏請㫖命議政諸臣議奏僉曰大將軍費揚古應遵前㫖而行所懇罷理大將軍事務處無庸議上從之費揚古又疏曰黑龍江一百官兵之馬𤼵往大同喂養本年春取回一半今雖差人往取㫁不能趕上起行若此馬後到則黑龍江官兵不能拴帶四個月之米是以目前酌量伊等所有牲口随力拴帶俟遇于成龍之時請支運往餘米給之上曰黑龍江兵如以于成龍所運之米給之則費揚古馬思喀必至争競矣若此軍似無用則當罷之著議政諸臣集議以聞議曰于成龍所運之米俱有額數並無贏餘今大將軍伯費揚古既稱黑龍江兵不能拴帶四箇月之米應停止此軍留於將軍舒恕處如已起行亦發回舒恕處上從之遣提督李林隆標兵回固原李林隆奏言臣俟肅州兵一至即同副都統阿南逹領兵進發但前令臣駐扎甘州時臣曽奏請將標下二千兵調來防守甘肅今臣遵㫖進𠞰則應先調臣標兵丁往將軍孫思克處乞諭總督酌量於附近處訓練之疏至下議政諸臣集議僉曰將軍孫思克兵多足用若又將固原之兵遣往孫思克處恐兵丁勞頓應將先調提督李林隆標兵二千仍令還固原可也上允之甲辰上駐蹕黃河西岸雙阿堡總督運務于成龍等發軍糧由白塔陸運時于成龍同喀拜前往伊克俄羅木地方監視鄂爾多斯兵丁渡河遇頭隊米恰到次隊米亦随至即令鄂爾多斯貝勒宋喇􅁲貝子根都什希卜貝勒汪舒克公杜稜貝勒顧禄什希卜王東羅卜等本身及其屬下現在兵丁分為六隊均匀配撘隨管運諸大臣陸續進發乙巳上駐蹕黄河西沙棗樹多羅額駙阿喇卜灘等自青海還復命先是阿喇卜灘等使於青海遵奉聖上指授宣㫖於青海札什巴圖爾博碩克圖濟農等台吉諸台吉俱欣從聖化伊等親身於四月起行來朝已有成言具疏來奏命示議政諸臣集議以為青海諸台吉者厄魯特為首之汗之子孫也皇上俯念西方邊境遣説阿喇卜灘諸台吉聞㫖即請來朝誠大喜也臣等請於此地行慶賀禮上曰青海衆台吉向來職貢本朝其來朝也亦常事耳不必賀諸臣奏曰青海衆台吉皆厄魯特之人於噶爾丹為近親今皇上預籌定䇿以噶爾丹大敗窘廹青海衆台吉莫不驚惶不可不乗此時安集特遣大臣説之青海諸台吉震懾天威感戴聖恩不出一兵不發一矢傾心向化親身來朝皆如聖上所料誠非常之舉也理宜慶賀祈俯賜准行得㫖俟至白塔再賀至是多羅額駙阿喇􅁲灘台吉徳木楚克還奏曰臣等欽遵皇上諭㫖到青海察罕拖羅海地方宣上諭於扎西巴圖爾台吉等曰太宗文皇帝時爾顧實汗遣使請安納貢世祖章皇帝時逹賴喇嘛來覲道一風同往來年久今聖駕巡幸寕夏施恩念舊遣我等召青海諸台吉相見以加恩澤又諭扎什巴圖爾台吉曰皇上念爾顧實汗遺嗣惟汝一人兹特以猞猁猻裘賜汝扎什巴圖爾台吉服裘跪於坐處合掌稽首對曰䝉至聖皇帝為禮法降諭誰敢不從俟我等會商覆㫖次日扎什巴圖爾台吉延臣等告之云我等理應遵奉聖㫖悉往朝覲但今嵗逹賴喇嘛出定又地方守禦不可不留大台吉故我等公議欲遣博碩克圖濟農額爾徳尼台吉二人前去臣等答之曰雖逹賴喇嘛今年出定但爾等往朝乃常職也聖上巡幸寕夏爾等難逄之事想爾等當往朝聖上為是扎西巴圖爾台吉等云誠如諸大臣言向者凡事俱禀逹賴喇嘛而行今䝉皇上念我祖父逺頒恩諭竟不必聞之於逹賴喇嘛除量留台吉於我地方外扎什巴圖爾本身博碩克圖濟農額爾徳尼台吉賓圖台吉阿齊滚布之子盆楚克台吉等俱當往朝四月二十日至鎮海堡前往又逹賴汗之子拉臧云我等奉皇帝之㫖原皆欲往朝因我為首之台吉議使我等留守請遣使請皇上萬安臣等一到宣揚皇上仁徳恩威被於青海諸台吉皆懽忭踴躍仰承聖化咸欲共享太平其來朝之台吉令都統杜思哈爾員外二郎保等在鎮海堡候之偕來奏至上諭大學士伊桑阿親随一等侍衛闗保曰青海台吉扎什巴圖爾等欲來朝若令伊等候於曠野受朝於大典未協且四月起行而來則邊内正值暑熱似宜令秋時來朝著議政大臣與阿喇卜灘徳木楚克會同定議具奏議曰扎什巴圖爾台吉等乃唐古特厄魯特兩國之台吉皆顧實汗之正𣲖也今戴皇上聖徳神功誠心嚮化來朝較之往時外藩來朝者逈異新來朝覲事闗大典似不宜遣至行在况扎什巴圖爾台吉四月起行而來邊内又值大暑應令伊等於九月十月赴闕朝見上從其議命都統杜思哈爾喇嘛商南多爾濟等俟青海諸台吉到後率之偕來到京日期著令預奏尋議政大臣都統公宗室蘇努等奏曰臣等欽惟皇上宏仁丕覆容保無疆舉薄海内外咸欲使之並生率育以偕歸於至治比年以來因厄魯特噶爾丹逆天犯順擾虐邊境皇上赫然震怒思為生靈永除後患遂不惮勤勞親統六軍逺涖漠北迅張天討噶爾丹大敗潰遁之後衆叛親離展轉鼠竄無所投止皇上復兩臨塞外運籌制勝曲當機宜於是厄魯特寨桑人等先後絡繹來歸而哈宻頭目先納貢於噶爾丹者頃又擒噶爾丹之子塞卜騰巴兒珠爾獻於行在其噶爾丹親信之人丹濟喇阿拉布灘丹津俄木布等亦遣人輸情欲來歸順噶爾丹孑身窮蹙生理盡絶其滅亡直在俄頃間矣至於呼呼諾爾台吉等係顧實汗之嫡系向來雖經修貢未曾𨽻于臣屬之國頃䝉皇上特頒諭㫖命一等台吉多羅額駙阿喇布坦等偕往曉以大義令奉職來覲兹阿喇布坦等還奏臣等至察罕拖羅海地方集扎什巴圖魯等宣布聖諭扎什巴圖魯等衆台吉咸奏聖恩深厚如此孰敢不嚮順臣等敬遵諭㫖定以來月啓行趨赴御前朝謁夫以呼呼諾爾介在西海絶塞之地數十年以來從未臣屬之人今其衆台吉等祗畏天威感仰聖徳傾心内嚮比於外藩前史所載異域歸忠之蹟未有若斯之盛者也且此衆台吉皆相率來歸則噶爾丹益無奔竄偷生之路臣等竊以塞卜騰巴兒珠爾既經俘獲呼呼諾爾台吉又復歸誠狡冦逆熖盡銷已無餘燼塞外䝉古可自此晏然無事我皇上安内攘外為民除患之聖心今得允惬而永清邊徼綏乂蒸黎之駿烈真可超軼百王而垂光萬禩矣臣等遭遇昌期私衷不勝慶忭之至為此合詞稱賀報聞員外郎納黑回奏給賞甘肅等處陣亡被傷官兵銀兩先是上諭大學士伊桑阿曰甘州肅州等處兵丁去年與厄魯特交戰有陣亡被傷者著兵部司官一員馳驛前去會同該管官員查明原案給賞身價傷銀銀兩事畢即回大學士伊桑阿奏請遣兵部員外郎納黑前去至是回奏曰臣於三月十四日至肅州查將軍孫思克去嵗報部原案内肅州總兵官李世逹標下與厄魯特交戰陣亡馬兵十五名被頭等傷總兵官潘育龍千總郭永盛被頭等傷馬兵十名二等傷馬兵五名三等傷馬兵一名在甘州將軍孫思克所屬左營陣亡把總張仲金馬兵三名被頭等傷把總蘭國蔭頭等傷馬兵五名二等傷馬兵九名三等傷馬兵三名凉州總兵官董大成標下陣亡馬兵二名被頭等傷馬兵六名二等傷馬兵一名三等傷馬兵六名被傷總兵官潘育龍已轉天津總兵應不給賞銀外此三處陣亡把總一員照例給身價銀一百兩陣亡馬兵二十名每名給銀三十兩被頭等傷官兵二十三名每名給銀三十兩二等傷兵十五名每名給銀二十五兩三等傷兵十名給銀二十兩給賞銀兩於肅州會同將軍孫思克甘州中營副將魏勲凉州總兵董大成同視賞畢將軍孫思克凉州總兵官董大成甘州副將魏勲率現在官兵妻子併父兄及被傷兵丁皆跪叩奏曰吾等官兵係聖主累代豢養之衆行間効力死敵受傷理所宜然今䝉聖主垂念螻蟻勅諭遣官加恩於陣亡及被傷人等此浩蕩殊恩亘古未有鼠賊噶爾丹奸狡無知竊行搶掠化内之喀爾喀聖主去嵗親統大軍從中路進討噶爾丹震懾天威狐鼠遊魂我等幸值而敗之併未嘗分外効尺寸之功今聖上又親臨寕夏相機調兵致費籌畫是皆我等官兵庸劣不能殱滅噶爾丹以致逺勞聖躬再臨邊塞雖肝腦塗地不能仰報萬一乃復荷殊恩用是懽聲震地叩首謝恩三處陣亡被傷官兵共賞白金二千三百六十五兩奏至上命交内閣訓飭寕夏官兵百姓先是上駐蹕寕夏時其地兵民籲請御書勒碑至是上以御製碑文發出命寕夏地方官勒碑文曰諭寕夏文武官員兵民人等朕體天育物日以治安為念雖身在宫庭而心恒周四海頃因指畫軍務不惮勤勞逺蒞寕夏無非為盪滌㓂氛綏乂生靈計也縁邊千餘里土壤磽瘠惟寕夏洪流灌輸諸渠環匝巡覽所至甚惬朕懐夫農桑者衣食之本積儲者殷阜之原爾官吏宜董勸父老子弟三時力田以盡地利比屋勤殖以裕盖藏縱使嵗偶不登亦可無憂匱乏若夫秦風健勇自昔為然其在朔方尤勝他郡爾等或職居將領或身𨽻戎行尚各厲精鋭以効干城禦侮之用斯國家有厚賴焉至於忠信慈惠服官之良軌孝弟齒譲生人之大經法紀不可不明禮教不可不肅勿以地處邊陲而不治以經術勿以習尚氣力而不澤於詩書總期上率下從庶幾馴臻雅化兹乗輿返蹕距靈朔雖逺而睠念塞垣如在几席爾等誠能敬體朕言將吏協恭兵民咸理生聚日益厚風俗日益淳則疆圉實有攸禆朕心亦用深慰慎勿視為具文辜朝廷惓惓牖𨗳之意欽哉特諭丙午上駐蹕黄河西岸白塔大將軍伯費揚古奏赴郭多里巴爾哈孫行期費揚古奏曰奉㫖由寕夏進發之兵於閏三月十七日起程令臣領所屬之兵於四月初十以外十五以内前至郭多里巴爾哈孫之地應即裹糧起程但因官兵買換馬駝食物稍有遲悞擬於本月二十四日䟎趣前行於四月十五日内必至矣謹具奏以聞命示議政諸臣是日諭郎中碩色著將駕車之牛給管運糧務于成龍等丁未命縁事人員効力軍中上諭大學士伊桑阿曰原任侍郎趙山著交將軍馬思喀令同原任侍郎四格子一同解送牛羊前去或有差遣招撫噶爾丹併効力行走之處遣此二人將光禄寺少卿常在革職交將軍馬思喀令其於軍前効力將郎中碩色等所送之羊撥三千隻送與將軍馬思喀軍中己酉上駐蹕黄河西岸船站親視大兵起行上出行宫至大兵行走道上親視八旂前鋒黑龍江兵起程及兵丁行李一一閲過遇馬駝中稍有跛蹇者皆以内廐馬駝易之聖祖仁皇帝親征平定朔漠方略卷四十二

body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方畧卷一欽惟皇上綂御萬邦為中外生民主文徳誕敷武功丕顯仁育義正乆道化成聲教訖乎遐荒太和洽於宇宙比自削平三逆十數年來定臺灣海外之區郡邑其地翦西北塞察哈爾部落平羅刹來俄羅斯之貢收服七旗喀爾喀數十萬衆而臣屬之東西朔南車書四逹薄海内外無一不臣之民不服之國矣獨厄魯特噶爾丹窮竒醜類梗化陸梁恃其險逺荒忽習於戰鬭積二十餘年之狡寇侵囓迤西諸國城堡殆盡其地斥磧緜邈不水不毛絶漠窮沙非可以疆里計也其人兇鷙桀驁無禮無義滅理亂倫非可以恩信孚也飽颺饑嘯遷徙不常蠶食隣封饕餮無厭爰與我屬部之喀爾喀搆難侵掠其牲畜人民土地擾害邊氓志驕氣溢我皇上仁同天地不忍加兵勅諭屢頒俾其輯睦廼怙終不悛讐殺無已且闌入内地重我藩服之不寧於是遣將出師于烏闌布通大張天討是時噶爾丹脫能悔禍歸誠皇上猶許以進貢市易資生如常乃賊計不出此大創之後猶收其餘黨侵我邉陲窺我斥堠聖心惻然軫念塞外生靈謂此宼一日不除疆宇一日不靖中原之轉輸供億未有巳時三十五年春皇上决策親征統貔貅百萬之師逺度瀚海疾馳深入直抵拖諾之境白旄黄鉞霆擊颷飛逆寇震懾天威抱頭宵遁奔命於巴顔烏喇而西路諸將領先已仰藉指授遏賊歸途奮擊於昭木多大敗之獲其駝馬牛羊甲仗糗糧輜重之物無算逆賊脫身挺險暫緩須臾而我皇上一怒安民計必滅此而後朝食是年冬駕復幸塞外濟河至鄂爾多斯籌畫邉機訓練兵士賊遣其渠帥丹濟拉率衆襲我餘糧為官軍覺擊走之困敗無所得食逆屬之頭目寨桑人等相率來歸悉厚加恩養授以官爵於是羽黨離心脅從悔罪賊益窘廹就斃遣其格罍古英賫奏揺尾乞降為緩兵逃死計而我皇上明燭幾先逆知此賊之譎詐不信仍令大軍駐牧邉境以俟春和捲甲長驅搗其巢穴務使根株盡絶毋令萌蘖復生三十六年二月駕發京師由雲中抵寧夏分命諸路大將棊布星羅調集蕃兵運籌饋餉指示撲𠞰搜捕之宜營壘部伍坐作進退之法戈鋋耀日旌旗蔽天萬乘臨戎風雲變色於四月朔庚戌進次於狼居胥山時哈宻遵諭㫖生擒逆子塞卜騰巴爾珠兒俘送行在由是丹濟拉及阿拉卜灘丹津温卜等為賊素所親信㒺不瓦觧四竄逆賊危巢既覆托足無門兇黨盡除乞援無路自知罪惡貫盈難延晷刻之生遂自仰藥絶吭而死厄魯特種類悉皆歸順無復遺孽從此朔漠永清邉方大定爰振旅還京凱旋飲至命所司詳察典禮擇日祭告天地宗廟社稷頒詔肆赦慶典舉行濊澤滂流神人胥悅諸王貝勒大臣暨外藩蒙古王等咸謂功徳隆盛曠古所無長治乆安與天無極請上尊號以􅇺羣心上謙讓弗居於是在廷大小臣工士庶人等咸披悃陳請謂聖天子心存除暴志切安民雖萬里遥荒異類吞并猶欲怙冒而矜全之至不得已而用兵而饋餉不煩於里閻賦稅不加於常額師徒不疲於徵發玉石不至於俱焚大駕親征殊方底定櫛風沐雨不辭寒暑之勞減膳分餐頻恤將士之苦用能剪除強寇綏輯逺藩邉徼為耕牧之區寰宇享昇平之福萬姓同心恭上尊號天高聽卑冀從民願搏顙呼籲至再至三上終未之聽許御史臣阮爾詢疏言皇上親綂六師宣威制勝摧枯拉朽電捲星馳自出蹕以迄回鑾徃還三閱月而大功底定一切用兵方略出自宸衷咸宜詳示史臣令其纂輯成書光昭萬禩疏入下禮部翰林院集議禮部尚書臣佛倫等謹議皇上蕩平逆寇邉塵永靖率土同歡竒勲冠乎百王偉略超乎千古自夫運籌帷幄以及躬歴遐荒分布諸路之兵獨握中權之要一切糧餉之轉輸師徒之簡閱以及奇正分合之勢歩伐止齊之方定韜略於幾先指山川於掌上鉅細逺邇靡事不周激勵拊循無微不至凡此神功之迅速皆由廟算之萬全允宜勒成一書昭垂億世其設局編纂事宜俟閣臣詳議以請内閣大學士伊桑阿等奏言皇上親臨朔漠勦滅兇頑念切乎除暴安民事期乎一勞永逸宸謨獨斷議絶旁撓睿鑒周詳動無遺策凡决機制勝之要調遣策應之方期㑹遲速之程征行駐劄之地無不仰煩天授上厪聖衷至於更番斥堠設伏偵探相水草之利籌輸輓之宜指畫情形至精至備灼知理勢萬舉萬全用能迅奏膚功丕揚神武徃返一百日之内馳驅五千里而遥勲高乎虞帝之征苗徳邁乎夏王之滅扈凡有歴年用兵方略一切宻諭機宜以及起居隨征記注并各衙門載籍有闗兵事者悉請宣付史舘編輯成書庶幾垂盛事於無疆播鴻猷於不朽上俞其請啓舘纂脩親征平定朔漠方畧自康熙十六年六月始訖於康熙三十七年臣等學殖膚淺才識疎庸謹按前後用兵始末據事實書懼不足以鋪揚盛烈於萬一云爾康熙十六年六月丁未厄魯特台吉噶爾丹初奉表入貢厄魯特西北大國也分部散處各立名號然實本一姓至本朝有顧實汗者國初即脩職貢世祖章皇帝錫以冊印授為遵文行義敏慧顧實汗其屬鄂齊爾圖汗阿巴頼諾顔駐牧黄河西套謂之套彝有車臣温卜者以擊白帽賊有功亦賜璽書授為土謝圖巴圖爾帶青其屬達頼巴圖爾台吉墨爾根台吉駐牧西海謂之海彝噶爾丹之父曰和多和親自號巴圖爾台吉駐牧北方阿爾台之地是之謂北厄魯特和多和親死子僧格嗣噶爾丹為僧格同母弟時尚㓜棄家投逹頼喇嘛習沙門法未幾其異母兄車臣及巴圖爾以爭屬産故與僧格有隙乘夜劫殺之部内大亂達頼喇嘛遣噶爾丹歸綂其衆噶爾丹性既狡黠且險狠好鬪外假達頼喇嘛為援内以結其父兄舊屬臣民藉名報讐殺車臣巴圖爾遂自襲為台吉肆其兇鋒稍稍蠶食西北諸部漸至猖獗初隨小台吉附貢而已至是遣使奉表入貢上命優賚之十月甲辰朔達頼喇嘛具疏謝恩入貢方物達頼喇嘛生唐古特部落廼西域釋教之長也諸蒙古咸尊奉之順治九年來朝世祖章皇帝親宴之太和殿賜以金冊金印授為西天大善自在佛領天下釋教普通瓦赤喇怛喇達頼喇嘛其後遣使貢獻方物不絶康熙十四年上特遣使存問賜以璽書至是具疏請安謝恩其詞曰欽惟皇帝陛下作天人之主宰為億兆所依歸不棄釋迦後進法派寵加遣使欣奉各種隆重布施親手接受敬獻紅素柔罽諸物望明鑒而恤之謹鞠躬合掌潔心上奏得㫖貢獻禮物著察收甲寅諭厄魯特喀爾喀罷兵脩好喀爾喀亦西北大國元之苗裔也太宗文皇帝時馬哈薩瑪第汗始通聘使世祖章皇帝初年土謝圖汗等遣使貢馬駝貂皮諸物請脩好順治五年扎薩克圖汗諾門汗來朝宴之太和殿土謝圖汗碩雷汗貢馬千匹駝百頭貢賞初無定額十二年授土謝圖汗車臣汗丹津喇嘛墨爾根諾顔畢希勒爾圖汗羅卜臧諾顔車臣濟農昆都倫陀音為八扎薩克定其貢額每嵗汗及濟農諾顔大台吉等各貢白馬八匹白駝一頭謂之九白之貢年貢也此外小台吉他布囊不限色不計數隨所有而貢常貢也著為令旋定答賞之例每扎薩克各賞以銀茶桶銀盆縀布等物其餘小台吉貢使等亦各賞縀布有差定例後喀爾喀汗等益加恭順遣使絡繹嵗以為常顧其部落與厄魯特壤地相接噶爾丹既吞并族屬兵力漸強因與之互相劫奪兵連無寧嵗至是靖逆將軍張勇川陜總督哈占凉州提督孫思克等會疏曰厄魯特濟農等為噶爾丹所敗逃至沿邉違禁䦨入塞内奪番目馬匹及居民牲畜守汛官兵驅之使出濟農等言我等皆鄂齊爾圖汗之子姪窮無所歸故至此聞噶爾丹復逞兵未巳或來追我或趨喀爾喀俱未可知臣等竊思噶爾丹乃北厄魯特之雄長兵馬衆多如果興兵即内地亦亟宜嚴加防禦除嚴飭守汛官兵防䕶竝驅逐濟農等出境外謹疏奏聞又理藩院奏曰據張家口報稱厄魯特來使博瑞額葉圖等不敢歸言來時鄂齊爾圖汗喀爾喀土謝圖汗曽夾攻我台吉近又聞歸化城來貿易人言喀爾喀色稜達什台吉率三百餘人將邀劫我等於喀倫我等得在皇上邉塞之内即如金城之固請暫居此俟本地使來同歸奏至上諭大學士覺羅勒徳洪等曰聞厄魯特喀爾喀交惡興戎雖虚實未確朕統御寰區一切生民皆朕赤子中外竝無異視厄魯特喀爾喀倘因細故交惡至於散亾朕心大為不忍兩部落向相和好貢獻本朝徃來不絶若交惡果真當遣使評其曲直以免生民於塗炭如仰副朕一視同仁之意仍前和好相與優游太平朕大嘉悅焉但天寒路逺若遣使徃向無飼馬馳驛之所或致有誤今厄魯特喀爾喀使至其令理藩院明白備檄交發來使傳諭之臣謹按自古遐方外域互相吞噬漢唐人主徃徃幸其削弱易於制馭輒視為國家利我皇上如天好生撫視中外無有畛域咸同一體諄諄然欲令罷兵息爭共安無事特頒温㫖令其協和此後勅諭再三不憚辭費至誠懇惻之意可以孚及豚魚噶爾丹若能祇遵聖諭悔禍革心則雖至今日猶得竝生堯舜之世乃怙終不悛遂至殄滅豈非其所自取哉是日諭噶爾丹台吉給發貢使符驗先是回子諾顔和卓巴顔白克等以進貢來至邉口自相屠害作亂上數遣官徃察命檄行噶爾丹台吉此後入貢遣使務令有材識真厄魯特為首不得仍遣回子如係真厄魯特方許放入邉口至是有回子佟噶爾代等八人冒陳貢使與噶爾丹所遣之西白里達爾漢和碩齊等偕來理藩院奏請檄行噶爾丹台吉究處上以厄魯特貢使徃來若無符驗仍復假冒亦未可定令檄行噶爾丹將佟噶爾代等用彼例照常治罪嗣後進貢遣使務給符驗方准放入十二月辛未將軍張勇等奏報厄魯特蒙古䦨入内地情形將軍張勇總督哈占提督孫思克奏曰甘肅凉三州自南山至北邉一帶延袤二千餘里其間山口邉隘甚多數年以來雖海彝時或闌入内地游牧地方官猶可防禦今外彝狡焉生心合謀糾黨潛入内地甘肅凉所屬大草灘諸地處處充斥所在告警查甘凉近南山一帶則有西海墨爾根阿喇柰多爾濟台吉等部廬帳數千餘肅州境内游牧彝人頭目則有濟農布第巴圖爾羅卜臧卓思巴額爾徳尼和碩齊寨桑吴巴什擺帶麻木吴巴什額爾克格隆廬帳萬餘若輩皆為噶爾丹所敗自西套來奔窮困異常現在殺人為食見内地人民牲畜有不思劫奪者乎似此嚴冬草枯水涸廹於饑寒安能保其無事前䝉聖諭軍務無㫖不得妄動但視其情形善為隄防嚴備内地毋先輕舉致啓兵端又蒙諭彝人入塞當婉諭退回不得妄殺臣等欲會兵徃逐恐蹈違㫖開釁之愆因差營弁通事婉詞開諭彼竟抗拒不從臣等除一面嚴飭汛守各官分防要害一面咨撫逺大將軍圖海外此等彝人或臣等親率兵𠞰滅或差官赴彝人頭目曉諭驅逐伏惟上裁疏入諭曰大將軍圖海身在陜西其沿邉流彝或令提督等率兵徃逐或嚴飭邉汛官兵各固守汛地選幹練人員至彝目處開誠曉諭令其退囘著大將軍圖海酌量指授而行毋致生釁康熙十七年三月丁酉撫逺大將軍圖海奏報驅逐流彝圖海疏曰塞外流彝䦨入内地即應發兵征勦但甘肅為三邉要地倘將軍提督等軍馬猝至彝人震驚或至生事是以一面嚴飭邉闗將弁酌調官兵安置要害隘口加意防守一面遣兵部督捕理事官拉都虎署叅領南達海率領將軍提督標下妥幹官員通事等赴彝人頭目處將䦨入大草灘情由訊明開誠曉諭令歸故巢兹拉都虎等歸報彝人頭目濟農部落竝未入邉惟額林辰台吉等部落因敗亾難存不知法度就水草挈裝進邉又西海墨爾根台吉部落亦懼噶爾丹之侵逃避來牧邉境拉都虎等轉傳上諭令各退歸故巢衆彝不敢違㫖隨有數起陸續出口竊思厄魯特等雖有退回者但彝情叵測邉疆闗係重大蘭州以西要地祈遣重臣一員駐劄固守三邉奏至上曰將軍張勇駐劄邉地年乆深知地方情形著自蘭州遷移仍駐甘州固守沿邉地方閏三月庚申諭將軍張勇提督孫思克等防禦噶爾丹寇邉兵部理藩院會奏曰大將軍圖海遣理事官拉都虎來京報稱將軍張勇言厄魯特噶爾丹將征西海厄魯特若來或入大草灘亦未可定又陜督哈占移文臣部内稱西套厄魯特台吉等聞噶爾丹有三月内舉兵之語因遣其三人至達頼台吉所言我兵俱已整頓爾處亦當備以待之故達頼台吉亦令屬下脩治鞍馬器械據此奏聞上諭曰噶爾丹興兵徃攻西海厄魯特如逺從達布素圖瀚海而去則無庸置議若來至近邉欲經大草灘前去則將軍張勇提督孫思克等務須令其堅立信誓不許騷擾人民仍整飭我軍嚴加防䕶一面放噶爾丹過徃一面奏聞倘或肆横强欲入邉將軍提督等固守地方一面堅拒止之一面星速奏聞仍將噶爾丹果否興兵探實奏報尋命拉都虎前赴甘州一帶地方偵探彝情四月甲午諭吴喇忒等旗嚴防汛地先是吴喇忒鎮國公諾門等奏報閏三月内賊寇數百人闌入邉汛劫殺本旗巴達里察罕吴爾圖三台吉及巴逹里台吉之妻并男婦子女共二十人又搶掠男婦子女六十餘人馬駝二千九百餘匹并帳房盔甲等物奏至上差員外郎色稜恩格森等馳驛徃勘至是理藩院奏曰色稜等覆稱厄魯特四百餘人搶掠吴喇忒等逺遁無踪查鄂齊爾圖汗為噶爾丹所敗其屬下濟農四散奔竄或係濟農等肆行劫掠亦未可定但未獲賊寇真情不便懸擬應存案俟發覺定議疏入諭曰濟農輩竄散人等或又如此劫掠應檄吴喇忒三旗鄂爾多斯六旗扎薩克諾爾布台吉四子部落扎木揚台吉等遴選精壮軍士不時廵防汛地其巴達里台吉等幼穉著諾門公收養之五月甲子諭將軍張勇親逐濟農先是厄魯特濟農遣人至張勇所言我祖顧實汗以來職貢不絶今為噶爾丹所敗窮廹來此欲赴西海徃會我叔達頼台吉兄墨爾根台吉若由邉外遶去則行月餘中途數日乏水如由内地行則限於主上邉境不敢徑度祈准由内地過邉張勇以由水泉出邉竟日可到墨爾根台吉處五日可到達頼台吉處奏請令其由水泉過邉得㫖允行乃濟農逗遛月餘草盡北向游牧未由水泉過邉至是濟農以布隆吉爾地方見有火光探聞噶爾丹追廹已近竟由雙井䦨入内地提督孫思克奏請率兵逐之上以將軍張勇現赴甘州即著親身騐看驅逐濟農部落過邉赴伊叔兄處所加意防䕶勿使擾民尋將軍張勇奏報驅逐濟農等出邉八月己巳朔將軍張勇等奏報噶爾丹情形張勇奏曰前奉諭㫖確探噶爾丹情形奏報臣與提督孫思克及理事官拉都虎選擇通事宻行逺探據回報云有鄂齊爾圖汗屬下達爾漢哈什罕曽為噶爾丹擄去今徃西海遇而問之彼言噶爾丹既殺鄂齊爾圖汗今嵗二月内令其屬下兵丁殷實者各備馬十匹駱駝三頭羊十隻窘乏者馬五匹駱駝一頭羊五隻自其地起兵不知何向臣向聞甘屬番人素與僧格輸租僧格殁屬於噶爾丹臣召其頭目永柱等訊之言噶爾丹居西北金山距嘉峪闗兩月程即古大宛國也臣聞噶爾丹遣喇嘛萬春來召番人頭目至河套議事臣宻遣人誘問之萬春言噶爾丹隣近諸彝有從之者亦有從之而復去者噶爾丹向有侵西海之意因人心不一西海路逺恐一動而本地有事不敢輕舉臣復遣人至墨爾根台吉所審視之衆皆寂然安居苐彝情難以預料謹疏奏聞疏入上曰噶爾丹雖無起兵聲息應仍檄該將軍等不時偵探加意防守邉境十月戊辰朔喀爾喀台吉色稜阿海遣使補進九白之貢色稜阿海台吉所居地方與厄魯特偪近聞噶爾丹將舉兵來侵逺避游牧致誤去嵗年貢至是色稜阿海台吉陳其遲誤緣由補進年貢理藩院議應許其照常上納報可康熙十八年三月丁未喀爾喀畢馬拉吉里第台吉奏報厄魯特額爾徳尼和碩齊劫掠吴喇忒事畢馬拉吉里第台吉遣其羅卜臧希拉布來報云厄魯特額爾徳尼和碩齊等兩次劫我台吉屬民徃索之不還我台吉令我偽為逃人徃投額爾德尼和碩齊遂留其側給我衣服馬匹弓箭月餘見額爾徳尼和碩齊巴圖爾濟農毛濟拉克台吉滾布等四起約二千餘人繞額濟内河而居旋遇吴喇忒被擄之博捶以情宻告之適額爾徳尼内向劫掠因潛與博捶自烏黑爾吴素之地驅其馬四十餘歸報我台吉台吉云可同是人徃告三吴喇忒令備兵一面徃奏皇上我台吉隨發兵四百徃迎之我至吴喇忒旗下告之故諾門公等親率兵赴喀倫一面遣佐領班第什希卜送我來此理藩院奏聞上諭曰額爾徳尼和碩齊復率兵刧掠爾院應差官馳驛前徃傳諭扎薩克諾爾布台吉四子部落扎木揚台吉竝鄂爾多斯等六旗各汛地増發官兵防守遇有賊警協力應援吴喇忒前去之兵囘日仍於邉汛酌派官兵嚴加防守喀爾喀畢馬拉吉里第台吉遣人諜探奏報殊屬可嘉其優加恩賚四月丙寅勅諭逹頼巴圖爾台吉等察詢額爾徳尼和碩齊劫掠吴喇忒事理藩院奏曰厄魯特墨爾根台吉遣人至言我台吉聞額爾徳尼和碩齊等掠取吴喇忒諸台吉妻子因令人謂之曰汝妄行搶擄台吉妻子以供驅使殊為非理遂索取巴達里台吉之子納木及納木之妹送至吴喇忒旗下諾門公不敢擅受特撥人一同送部查額爾徳尼和碩齊巴圖爾濟農皆鄂齊爾圖汗屬下為噶爾丹所敗四散劫掠去嵗濟農等欲徃會達頼台吉墨爾根台吉奏請由内地徃今墨爾根台吉向伊等索取納木等觧送來京應遣官賫勅徃諭達頼巴圖爾台吉等令其察明將額爾徳尼和碩齊等照伊例治罪其納木等應交吴喇忒旗下疏入上遣理藩院郎中額爾塞員外郎占巴拉賫勅徃諭勅曰去年閏三月吴喇忒巴達里台吉等男婦子女馬駝盔甲為賊所劫掠自部奏報交發嚴察尚未據覆茲墨爾根台吉遣人將巴達里台吉之子納木及其妹送到訊之納木據云厄魯特額爾徳尼和碩齊率四百許人劫去爾墨爾根台吉將被盗劫掠之人轉行察獲差人觧送誠屬可嘉夫勸善懲惡者國之法也今聞額爾徳尼和碩齊等棲息額濟内河之地爾達頼巴圖爾台吉墨爾根台吉其將汝屬下額爾徳尼和碩齊等照汝例嚴加治罪所掠人畜什物照數察還如此則同脩和好之舉益堅而邉境人等不敢互相戕害生民得安矣墨爾根台吉察還劫掠之人可嘉事畢之日應加恩賚五月己未厄魯特巴圖爾濟農具表恭請聖安凉州提督孫思克奏厄魯特濟農遣其寨桑卜克等來見臣云我台吉率衆部落駐肅州邉外不敢壊法生事戴皇上洪恩賫有恭請聖安表文懇祈代奏外彝仰慕皇上鴻化臣不敢隠匿謹以原文奏覽部議以濟農等不徃伊叔兄處仍在邉近游牧殊屬不合所奏應無庸議諭曰拉都虎現在甘肅地方著率領張勇孫思克標下賢能官員通事親赴巴圖爾濟農所詳細察訊殺掠吴喇忒者實係何人據實奏聞其畢馬拉吉里第台吉墨爾根台吉所報之文并發拉都虎知之七月甲辰將軍張勇奏報噶爾丹發兵侵土魯番張勇疏言准提督孫思克移咨云通丁白金印報稱噶爾丹委其屬下阿爾達爾和碩齊等三頭目領兵三萬將侵土魯番前哨已至哈宻達頼台吉等現差古禄等率百人前赴哈宻偵探矣噶爾丹素稱強悍人馬繁衆然其住牧地方與甘肅相去尚逺今漸次内移住居西套一旦發兵徃侵土魯番前撥已至哈宻去肅州計程僅十數日耳雖傳聞未可盡信然彝情甚為叵測除一面遣人前赴嘉峪闗探聽并嚴飭各汛固守邉疆外所有偵探彝情謹具奏以聞八月己丑將軍張勇奏報噶爾丹與之通使張勇奏曰噶爾丹遣其寨桑莽柰㩦隨從三十餘人致書於臣言我台吉向欲通使因地方有事未暇今特遣人獻馬三匹貂裘一襲又言我台吉云西北一帶地方皆得之矣惟西海向係我祖與伊祖同奪取者今伊等獨㨿之欲徃索取因係將軍所轄之地不敢輕舉臣念彼逺餽受其裘馬厚賞來使而遣之前此噶爾丹曽遣人調集甘州南山一帶番目赴西套臣因遴選通事宻探噶爾丹年紀性情竝興兵徃侵西海之故歸覆云噶爾丹申年所生年三十六嵗為人兇惡躭於酒色去嵗舉兵欲侵西海行十一日撤歸今夏又兩次出兵至纒頭囘子之地而還見近邉諸將軍統兵駐扎不敢輕犯臣查近者入邉行劫皆係噶爾丹擊敗來奔貧無所依之人詳視噶爾丹情形尚無興兵之舉河西地方似可無患謹將噶爾丹原書一并恭呈上覽奏入命以此情節檄知大將軍圖海九月丁酉噶爾丹台吉入貢請安并遵諭覆奏請安疏曰謹奏皇帝陛下證位於廣大之菩提恢宏夫天人之運會建妙勝於十方胥威力而具足此際光輝炳如日月道法兩固聞聲懽忭覆奏疏曰我使西白里達爾漢和碩齊同行佟古爾伐因其妄為已治罪矣從前囘子充諸台吉之使而徃原不之知今接來文問之囘子僉云前充諸台吉之使而徃者部内竝不查訊已年以後乃不准放入信如所言是囘子詐冒向不責罰以致縱惡若本地從前遣使皆與文并發即如今次所遣阿卜都拉額爾克寨桑是也敬具禮物吉日遣奏奏入上嘉納之給賞如十六年例戊戌噶爾丹台吉以達頼喇嘛授為博碩克圖汗遣使奉貢入告理藩院奏曰噶爾丹稱為博碩克圖汗遣使貢獻鎖子甲鳥鎗馬駝貂皮等物查厄魯特部落向有鄂齊爾圖汗阿霸頼諾顔噶爾丹台吉徃來通貢竝無以博碩克圖汗遣使者今訊之來使言達頼喇嘛加噶爾丹台吉以博碩克圖汗之號是以奉貢入告從前厄魯特喀爾喀有奏請勅印來貢者准其納貢授以勅印竝加恩賚從無以擅稱汗號者准其納貢之例但噶爾丹台吉敬貢方物特遣使入告應准其獻納上從之十月壬申上命遣檄噶爾丹收捕額爾徳尼和碩齊等理藩院郎中額爾塞等歸奏曰臣等至達頼巴圖爾台吉所交授勅諭達頼巴圖爾台吉等覆稱額爾徳尼和碩齊及滾布等原係噶爾丹之叔楚呼爾吴巴什屬下之人今與野獸同羣逺徙游牧我等不便查議毛濟喇克台吉乆居此地巴圖爾濟農向曽奏請皇上由内地來至我處皆無劫掠吴喇忒之事上諭理藩院曰額爾徳尼和碩齊既係噶爾丹之叔楚呼爾吴巴什屬下之人應檄噶爾丹將額爾徳尼和碩齊等即行收捕照伊例治罪勿使妄行劫掠竝將從前所掠吴喇忒人畜察還如不能收捕仍在沿邊生事當另行裁度爾院即備印文發噶爾丹兩次所遣來使各馳一文前去檄到務令噶爾丹速覆聖祖仁皇帝親征平定朔漠方畧卷一

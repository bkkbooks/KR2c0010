body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方畧卷三十六二月癸未督運于成龍等請以旗員蒙古兵分運併携理藩院官同行于成龍等奏曰此次運米俱用牲口䭾運止有臣等七人恐前後不能管攝請將部院官及旗員酌量帶往其情願効力人等亦令随行分管押運至牽駱駝負米逺行之事蒙古兵所習請調取專任之上曰旗員及効力人等並准帶往大同現有察哈爾兵一百六十名爾等經其地可率之前去如有用蒙古兵之處再來奏請于成龍等又奏曰臣等七人前後魚貫而行請以肥馬居前上曰馬聚一處必至受傷肥馬在前極是但所負過重則逺道長驅終有何益爾等應加酌量可負二百觔者率以百觔為凖至運之之法亦照坐塘逓運為便于成龍等又奏曰轉運所經盡蒙古部落或有調遣滿文漢字難以通逹恐於機宜不便請帶理藩院章京二員筆帖式二員撥什庫五員及勘合火牌用印空白紙牌随行以便遣用上曰蒙古地方理藩院官吏甚有用可従多帶往甲申嚴飭都御史于成龍援引朋黨時于成龍等為運米事入奏曰臣等所運米㡬九千石用駱駝負之需七千餘頭用馬騾負之需萬餘匹牽萬餘牲畜需人甚多諸臣㑹議但撥綠旗兵一千人不足用請将附近地方之鄂爾多斯従多派出使之牽䭾上曰朕已知悉爾等可将鄂爾多斯貝勒該管官員一併帶去于成龍又奏曰諸臣㑹議運米僅令備正額牲口沿途倘有疲乏無可更替矣臣等願酌備餘馬以待上曰可著該督撫布政使酌量多備于成龍等奏事畢而出上呼于成龍問曰爾等何日起程于成龍奏曰臣等俟効勞運米官同行上曰爾此意即謬矣凡為人臣者宜以國事為重黽勉自効不當援引朋類當此𦂳急軍務爾宜率先起行餘令陸續随往若必俟衆同行寧不悞事爾自任廵撫以及總河皆唯為人行事其後運米亦仍如此爾前在河工曾帶二百餘人前往迄今未用一人欲任意援引得乎爾前此運米已甚失策凡人有優劣馬有肥瘦若果人馬相稱爾身先率領催趲前行自可早至克魯倫地方不致有悞爾遲遲而行務期與衆同到㡬悞國家大事爾又云寧殺于成龍至捐納人等不可不用此語豈非沽名干譽之意乎汝一生品行皆於此玷矣朕前此屢加嚴飭爾竟不悛此是何故朕於國家之事惟虗已以視機宜斷不膠執已見即用兵之道亦復如是一日之中有千變萬化朕統大兵至克魯倫時亦視賊之形勢随機而應並不預立己見孔子云毋意毋必毋固毋我聖人之言至當不易爾于成龍惟執己見而已前此運米因待衆悞事今又欲候齊同行此不過扶助爾之黨類令感激汝恩之意殊不知用人之權為人臣者不得而專之朕今用人若有保舉官員亦必就其中論俸補用即有素所深知者亦視其効力之處酌量擢用否則俱使論俸朕乃天下之主用人之際尚不肯任意而行為人臣者乃欲妄意自擅可乎大抵欲援助人者後必自己獲罪于成龍奏曰臣向愚昧無知妄行今聞皇上聖訓臣實無辭可辯嗣後必不敢為人自䧟死罪免冠叩頭而出乙酉覈實諸王捐助馬匹上諭内大臣曰著諭捐馬諸王大臣將此番出兵汝等所捐之馬於還師之日各查其數開明某人先捐助若干今回来若干交奏事人傳奏如此奏明知其實在數目其中自不至虧損觀去年所助馬匹今猶有未到者其中有所虧損亦未可定爾等所捐馬果好則顯然收納加恩汝等如其不然暗中虧損豈不可惜著諭衆知之丙戌諭運米當随宜而行不得預定次序于成龍等瀕行因運米事重恭請聖訓以遵成算上曰前中路糧運雖未到土喇尚運至哆囉克等處西路軍士可以無饑西路之米雖未運至翁金地方然其途甚遠俱情有可原故爾寛宥若無可原朕豈容爾等至今日耶于成龍等頓首謝又奏曰臣等七人俱願前進効力應令何人居先上曰若定先後則此瞻彼顧或至遲延軍糈事屬重大爾等酌量而行又諭曰今次所運之米或随大兵後行或與大兵同行資其照料可與大將軍伯費揚古酌行大將軍伯費揚古以擒獲噶爾丹之子上疏稱賀勅㫖内開抄出阿南達報哈宻地方擒獲噶爾丹之子塞卜騰巴兒珠爾之疏發汝知之臣思噶爾丹逆天而行皇上俯視中外皆如赤子念噶爾丹一日尚存則外藩一日不安皇上親統六師往臨克魯倫噶爾丹不能抗皇上天威胆破魂飛遂至大敗不能保其妻子盡棄老幼鍋釡廬帳抱頭鼠竄噶爾丹游魂無定其屬下厄魯特来歸王化者不可勝數鋒鏑之餘尚存厄魯特數人茍延殘喘捕獸乞食噶爾丹之子塞卜騰巴兒珠爾遂為我所擒料噶爾丹身命存亡即在旦夕間矣此誠皆皇上天縱至聖前知預定獨斷于衷聖躬不恤勞苦暑日不張盖日御一飡統領大軍深入大敗噶爾丹之所致也臣等與軍中官兵衆部落諸王貝勒貝子公台吉等聞擒噶爾丹之子塞卜騰巴兒珠爾不勝懽忭又差各哨卒報知喀爾喀諸部長矣為此奏賀上報聞發部丁亥上統六師啟行先是御史周士皇奏言厄魯特噶爾丹以沙漠小醜敢肆狂悖皇上親統大軍犁庭掃穴殄其逆衆收其牲畜器械復命將追奔斬殺殆盡噶爾丹僅以身竄今其子又復被擒是勢已窮矣黨已盡矣臣愚以為極窮極困之小醜無煩逺御六龍再臨沙漠請於諸王大臣内擇其可專閫者面授進止機宜倂勅在邊諸將奮勇前驅彼釜底游魚有不計日而就戮者乎奏入上諭曰從前噶爾丹心懷狡詐䦨入烏䦨布通至近之地遣王及大臣等率領大軍征討應即盡行撲滅因爾時不能𠞰除致令詭遁蔓延至今為邊外生民之患昨嵗聞賊復至魯克倫巴顔烏闌等處虐害蒙古朕思此賊窮兇稔惡不可一日容留遂親統師従中路搜𠞰仍遣兵由西路截噶爾丹敗遁之道刻期合擊賊聞朕躬親征倉皇奔竄之際適遇西師擒斬無算大敗潰散及至秋月噶爾丹復收殘賊擾亂西陲朕因再出邊外經畫機宜厄魯特丹濟拉等敗遁寨桑人等按踵来歸者甚衆餘孽無㡬頃噶爾丹之子又經擒獲賊勢窮蹙已極自應乗此機㑹絶彼根株朕躬親涖近邊地方籌畫調度庶軍務不致稽遲而郵遞亦免疲憊朕不憚勤勞除殘靖冦實非得已至是上將率師啟行又諭大學士伊桑阿等曰覽周士皇條奏雖臣子當然之事但彼未知其中之故耳噶爾丹窮兇極惡一日不可留於斯世者也昔在烏闌布通猖狂肆逆朕遣兵克之噶爾丹猶不悔禍竊伏我克魯倫地方朕統大軍𠞰除畧盡今窮困已極故乗此機㑹親臨塞外酌量調度前三逆反叛呉三桂煽惑人心遂至滋蔓延及榆林等處朕日夜綢繆調遣大兵㡬費心力方得撲滅今逆賊蕩平年久人遂視為易事且窮兵黷武好大喜功朕所深戒朕亦曽作詩發明此意著諭周士皇彼所奏雖不當朕亦不介意于是陳設鹵簿由神武門出徳勝門至昌平州駐蹕上諭内大臣公福善曰時當春令馬不可輒令飲水當略拴之使嚙草再令飲水著遍諭大臣侍衞䕶軍執事人員及部院衙門知之臣謹按蒙古向稱强悍之國噶爾丹尤蒙古中狡猾之㓂前者刧掠喀爾喀直入烏闌布通之時皇上即遣諸王大臣詳授方略率師往征諸王不克遵行訓諭致使噶爾丹逸去乃噶爾丹稔惡不悛又来踞克魯倫巴顔烏闌上懲烏闌布通之悞計非親征不可用是不牽浮議乾剛獨斷立統六師由中路進討别遣將士趨西路以遏其奔竄噶爾丹聞知躬行撻伐不能抗拒天威旋即遁逃果遇偏師至於大敗既而上聞噶爾丹西走亟詣鄂爾多斯地方相機調度丹濟拉敗遁其下絡繹来降紛紛離􅄆而噶爾丹之子又復被擒賊之大勢以潰困窮已極御史周士皇但知敵形如此有不必復煩皇上躬臨止遣將卒立可𠞰除之奏殊不知噶爾丹肆行劫掠收服諸部乃鏖戰之積㓂也若不乗彼窮挫之時迅掃根株則將集其遺醜復成巨勢恐致久延時日皇上深謀逺念圖一勞永逸之策仍必親臨近地經畫如前而膚功立奏也以此觀之聖主之廟算與臣下之臆見真不啻霄壤矣事出於不得已而猶諭以窮兵黷武好大喜功為深戒誠可以為萬世之法則也戊子駕次岔道遣員外阿爾必特祜驛致達賴喇嘛使人尼麻唐庫圖克圖上諭大學士伊桑阿等曰據阿爾必特祜疏言達頼喇嘛有額外一疏口奏三語詢而索之尼麻唐庫圖克圖不與曰此額外一疏口奏三語奉達賴喇嘛第巴之命不論何人不得與之不得告之俟見聖上方許呈覽云今朕駕在外著員外阿爾必特祜驛送尼麻唐庫圖克圖及卓磨隆堪布等减其人從使之前来可也派大臣侍衞嚴查輜重上諭内大臣曰管押輜重甚屬緊要若照常派一大臣管理則将視為故套嗣後派大臣二員每旗侍衞十員䕶軍校三員令其管理其大臣職名每日啟奏朕親㸃派出侍衞無論新舊輪班派出管領視輜重欹斜者扶掖之遇險阻則協助之朕躬時在輜重前後巡查經朕拿獲定行治罪斷不寛宥其随輜重大臣每日籍記之命動支庫銀於歸化城等處採買牛羊解至寧夏諭戸部曰著以右衞庫銀千兩給御史麻色營造司員外邁圖候府道缺丁克昌将歸化城所存牛一百二十加足五百羊一千八百加足三千自歸化城鄂爾多斯等䖏星速採買送至寧夏著歸化城都統阿必達副都統多爾濟等併酌撥官兵管押解至寧夏去員所携資費若少准借庫銀帶去命定奏事時刻侍郎哈雅爾圖等奏請一概報到如上未寢則即進奏如上已寢則次早進奏上曰善至捕斬噶爾丹之事到則不待時即行奏聞如别事則更盡時進奏朕之起也早己丑駐蹕懷來縣城西主事保住使於第巴以第巴情形上疏奏報保住疏言臣謹遵上諭於十一月二十二日到烏思藏奉聖㫖一一曉諭王第巴第巴奏言臣庸流末品蒙皇上俯念達賴喇嘛優封臣為土白特國王臣正思何以仰答皇恩焉敢違聖上及達賴喇嘛之㫖而附逆賊噶爾丹乎况皇上乃曼殊釋利佛此情可諒而知臣之榮顯安樂皆皇上與達賴喇嘛之恩臣茍背皇上而向他人固當夀數夭折即奉皇上之意與達賴喇嘛稍異亦且不得善終總之謹遵聖㫖而外更無異辭遂合掌稽首至上諭四事第巴回奏云皇上聖明凡事先知遂知達賴喇嘛明嵗出定遣此兩喇嘛前来識認臣心甚喜此温春喇嘛向與逹賴喇嘛同居十年令伊識認自能立辨俟此兩喇嘛至達賴喇嘛出定騐明回奏皇上其時皇上自知臣之誠而衆疑亦釋矣若達賴喇嘛果係亡故臣焉敢以為尚在稱其出定而遣尼麻唐庫圖克圖妄奏皇上乎逹賴喇嘛前身現在是實至前者皇上遣内齊陀音庫圖克圖等召班禪庫圖克圖之時自逹賴喇嘛以及臣等衆人皆遣使勸彼赴京以副聖意班禪庫圖克圖初本欲往後因来使口出恫喝過激之言遂云不往迨使臣已歸班禪庫圖克圖决言不往之後噶爾丹之使始至臣並不借噶爾丹巧辯即班禪庫圖克圖亦豈肯聽噶爾丹之言乎今皇上必欲班禪赴京臣雖不能主焉敢違㫖臣當竭力啟聞達賴喇嘛務期委婉令班禪口許赴京之年交後歸之喇嘛晉巴扎木素奏明其時作何加恩遣使總祈睿鑒至濟隆庫圖克圖於烏闌布通之役不遵皇上達賴喇嘛之㫖致事未成反在噶爾丹與尚書阿爾尼交戰後慫慂噶爾丹賀噶爾丹以白首帕故臣籍没其家產遷之於喀木地方今欲遣之與欽差赴京所在遼逺徃返須兩三月恐為日遲乆皇上仁化覃敷柔遠能邇好生之心自土白特國以至天下無不知者濟隆庫圖克圖臣固灼知皇上不加誅罰也且濟隆庫圖克圖乃七世化身臣安敢擒之然必委婉引来與後歸之喇嘛晉巴札木素同往以副聖意至博碩克圖濟農與噶爾丹結姻之事在喀爾喀厄魯特未交惡之前阿奴尚在策旺拉卜灘之際即已結姻其餘臣雖不敢保而青海八台吉俱達賴喇嘛之弟子但願為皇上効力宣勞並無二心異圖臣可保其不背皇上與達賴喇嘛也皇上仁愛天下黎民有如赤子此一女子即送至京於國家何益無非因噶爾丹所行背道滅法皇上欲絶其後裔耳然此不過一女子而已乞免其夫婦離散仍使完聚惟此一事臣第巴稽首頓首所禱而求之者也至我土白特國人向不諳禮法止以無知獲罪皇上臣第巴未嘗知而故犯也即臣有無知之罪乞欽差奏明皇上寛宥其罪仍賜恩綸遂於十二月初十日以覆奏本章交臣保住使之起程而歸臣保住正月二十三日到西寧二十五日起程前来距荘浪將四百里因無驛馬計行三日恐前途驛站猶遲一至荘浪即將第巴奏答情由具本由驛逓馳奏外其第巴覆奏本章倂賫滅噶爾丹賀表使人囊素楚柰臣保住親身随後帶領急行臣身到京後將第巴惶懼情形欽遵聖㫖口奏等語及青海諸台吉情事言語再詳奏上前又喇嘛晉巴札木素等使於第巴疏言臣等欽遵上諭捧勅書授王第巴除主事保住欽遵訓㫖宣諭行事畢親回覆奏外緣前者奉㫖謂臣等二人素識達賴喇嘛著騐明回奏而第巴又謂汝二喇嘛之来甚善逹賴喇嘛前身現在是實爾等可看明回奏皇上竊思皇上遣委之事尚未明晰如何可棄而去之是以臣等公議將給達賴喇嘛勅書賞賚諸物不曽頒給俟達賴喇嘛出定時騐明再歸復命故爾留此侍郎安布祿以是轉奏上報聞且以示議政諸臣川陜總督呉赫以寧夏等處採買馬匹請借調營馬随後補償允之呉赫奏言准兵部咨稱大軍所需駞馬騾驢牛羊令於肅州寧夏等處採買每處遣賢能司官五員㑹同督撫地方官員動支正項錢糧照時價購買等因到臣臣思此購買各項俱係臣職内應行事宜皇上念軍務緊急特遣大臣公同料理於事大有裨益又特㫖令駱駞馬騾俱照時價購買不許短少價値乃皇上仁愛百姓之至意臣敢不仰體施行查甘肅廵撫郭洪現在肅州辦事即令與侍郎席米圖等於肅州等處購買臣則往寧夏與副都統阿蘭泰等公同督買外臣伏思馬駞係大兵𦂳急軍需斷不可遲悞查去嵗滿洲綠旗兵自寧夏出邊又陸續運糧所需駱駞馬騾甚多且各省營驛馬匹又皆自陜西買去又以茶易馬數千匹現給綠旗兵丁折馬銀兩各相補買陜西雖產馬然所用與買去者甚多今此購買未可必其足用若不豫籌以緩應急權宜調用止恃購買萬一遲悞所係非輕臣再三籌慮不如暫借兵丁馬匹先行調用查西安八旗漢軍滿洲現有四千二百每兵有馬三匹於此三匹内選取一匹可得馬四千二百匹臣標下兵五千除廣元駐防兵一千外尚有四千此内馬選取二千匹陜西提督標下馬兵三千内選取馬一千五百匹興安總兵官標下馬兵一千五百内選取馬七百匹陜西廵撫標下三百五十馬兵内選取馬一百五十匹俟命下之日將此項馬匹令各處該管大臣官員親閲擇其肥壯者派出官兵送至寧夏沿路每匹應給草一束豆三倉升盡心喂養勿令疲瘦此扣取八千五百餘馬匹不可久缺臣今現徃寧夏將此交與陜西廵撫謹遵上諭動支正項錢糧照時估價給與不許短少如此調用兵丁既得銀兩各自購買添補營伍不致空缺且於軍需大有裨益若購買不足後始行題請必致遲悞軍需臣謹預題請㫖上命兵部速議具奏欽此欽遵議得均應如督臣所題行其選取馬缺著陜撫動支正項錢糧照時價發給兵丁買補其所用銀兩草料數目仍開明報部俟命下之日行文該督撫并駐防寧夏副都統阿蘭泰可也奉㫖依議速行庚寅駕次沙城堡主事諾爾布奏報噶爾丹情形諾爾布奏曰臣欽遵上諭於康熙三十五年十一月二十九日到多羅貝勒根敦額爾克帶青所居塞稜格之都蘭諾和地方多羅貝勒根敦額爾克帶青已於十一月初三日病故十二月初二日差僧古爾濟達爾漢巴圖爾等六人往頽等地方偵探噶爾丹聲息本月二十四日僧古爾濟達爾漢巴圖爾等歸言我等去時自七勞圖踰杭愛山前至庫倫白兒齊爾地方回時由頽而返並不曽遇見一人本月二十六日阿拉卜灘處有達什等男子六人婦女童穉共二十三人逃來達什等言我等皆阿拉卜灘之人噶爾丹丹濟拉皆在巴格爾察罕烏爾克地方阿拉卜灘在扎巴哈之濟思布隆地方丹津俄木布從古爾班塔米爾率三百人叛噶爾丹往洪郭羅而去十一月初一日噶爾丹差車陵奔言於阿拉卜灘曰我今在巴格爾察罕烏爾克勢不能居因哈密城中有糧欲往彼處爾今何如阿拉卜灘言我亦欲往河卜多去留車陵奔兩日遣還本月十七日從扎巴哈之濟思布隆向河卜多㳺牧而去我等随行至濟達渾地方而留於後奪後行人之馬十匹駞四頭併我等原有之馬駞於二十日逃出向聞根敦額爾克帶青在塞稜格故我等向塞稜格而來阿拉卜灘有七百許人噶爾丹阿拉卜灘之人逃回策旺拉卜灘者甚多目下不知有人㡬何為此奏聞上曰多羅貝勒根敦額爾克帶青及阿爾薩闌衞寨桑之處有厄魯特男子婦人仍著主事諾爾布筆帖式鄂禮鄉導達濟索諾木等照前次去時例自王顧祿什希貝勒汪扎兒旗分取馬駞糗糧赴根敦帶青阿爾薩闌衞寨桑處令諾爾布鄂禮等分行盡收伊等所有男子婦人徐徐遷至喀倫地方如其内婦人有喀爾喀已娶為妻及单身男子或不願來者聽之勿强上又諭内大臣曰嗣後凡乘官馬及佐領之馬者如馬匹倒斃遺失著該管人員帶失主親身啟奏辛卯駐蹕上花園東遣大臣招撫青海衆台吉上諭大學士伊桑阿等曰今欲遣才辨大臣一員携青海扎西巴圖爾台吉之使鄂木布博碩克圖濟農之使羅壘額木齊博碩克圖濟農之族子額爾德尼台吉屬下納木喀拉木扎卜等往青海説其台吉等來覲著議政諸臣集議以聞共議曰噶爾丹大敗之後孑身逃遁所屬人衆悉來歸附今窮極埀斃青海衆台吉聞之無不惶懼此時欽差能臣携扎西巴圖爾台吉等使人宣諭招徠誠是也應簡大臣携扎西巴圖爾台吉之使俄木布等三人往青海宣示皇上仁德諭之入覲其遣往大臣候㫖簡定請諭扎西巴圖爾台吉博碩克圖濟農之㫖上命都統杜思噶爾台吉阿拉卜灘德木楚克併少卿薩爾圖去厄魯特阿玉什等來降理藩院奏准大將軍費揚古咨稱侍郎滿丕送降人厄魯特阿玉什夫婦阿克楚必夫婦及㓜童一名索諾木自言彼係厄魯特噶爾丹屬下人去歳十二月初九日自薩克薩特呼里克地方逃出來歸聖上我等不知噶爾丹之行止我等來時仍在薩克薩特呼里克我等來此畏避而行未嘗遇見天使但於巴扎爾虧滕地方見有行踪於是將阿玉什夫婦阿克楚必夫婦㓜男索諾木馬八匹駱駞一頭解往收管厄魯特歸化城副都統伏乞轉奏為此奏聞上命發厄魯特阿玉什至張家口交坐塘官員俟後來厄魯特到後歸併撫飬壬辰駕次宣化府噶爾旦多爾濟告請随軍進征以報祖讐許之議政諸大臣奏曰據副都統阿南達疏言噶爾旦多爾濟親至臣所告曰我寨桑阿昭往覲蒙聖上俯念我祖窩齊爾圖車陳汗降以温綸許加優寵我不勝懽忭即欲赴京請皇上安但噶爾丹乃殺我祖父不共戴天之仇幸聖上大克之今思乘其妻子不保紛紛離散窮迫已極之時我力雖不能報復仗聖上威靈願從大軍前進効力仰答皇上格外殊㤙且以復我私讐俟噶爾丹事畢我親偕侍衞赴京叩謝皇恩噶爾旦多爾濟既欲答皇上撫恤之恩以報祖父之讐願從大軍前往應於大軍進𠞰時令噶爾旦多爾濟随便率其部曲従軍前往事畢之後令阿南達携噶爾旦多爾濟前來謝㤙應以此檄知阿南達可也從之副都統阿南達奏遣喀爾喀扎薩克台吉索諾木伊思濟卜等坐哨於巴㙮爾賽哈等處地方阿南達奏曰臣遣喀爾喀扎薩克台吉索諾木伊思濟卜台吉玉木楚木藍翎侍衞布達率一百四十人如噶爾丹之兵比汝勢弱可擒則擒如勢强難敵則探明去路來報至哈密以内四五日程呼巴㙮爾賽哈等處形勝地方坐哨於二月初一日起行矣上報聞命大將軍費揚古議進兵之路上諭費揚古曰朕二月初六日出行十一日至宣化府觀此際情形噶爾丹窮困已極雖欲降何易得至此地寧夏地方去噶爾丹所在薩克薩特呼里克格格特哈朗古特甚近故遣叅領車克楚親随侍衞僧圖等授以西安寧夏兵一百探視至於伊克敖拉伊等報稱二月初三日已起程矣為此諭知朕意以為將軍孫思克博濟等率兵三千出嘉峪關或進哈密或進巴爾庫兒之路俟車克楚歸如可行則一路三千兵出寧夏進新勘之路如不可行則以兩路為一路擇地而進殆功可成矣朕欲往寧夏視軍中糧餉及諸情形爾之意何如為此諭爾商之主事保住使於第巴報文併發爾知之癸已駕次左衞南遣副都御史努赫查兵丁搶奪上諭努赫曰爾每日親率科道官一員在輜重之後如沿途兵厮匪類有爭鬭搶奪民間財物者即行查拿指名題叅有如此者爾等如不查拿駕前控告决不輕貸爾每晚無事則具結交大學士又諭内大臣索額圖曰朕按路而行並不圍獵如有無故馳馬者擒之著通行曉諭副都統阿南達報解噶爾丹之子塞卜騰巴兒珠爾起行日期阿南達奏曰臣以噶爾丹之子塞卜騰巴兒珠爾將到令一等侍衞鄂欣台吉帶青巴圖爾哈嘛爾䕶軍校阿啟納巴圖爾額爾克濟農之喇嘛額爾克哈什哈率兵迎去臣随領兵到阿齊春際地方前使於哈密者有臣家人扎木素及噶爾旦多爾濟之十人達爾漢白克額貝都拉之子白竒等三十餘人解塞卜騰巴兒珠爾前來二月初一日遇侍衞鄂欣等初二日到臣軍前白竒言吾父達爾漢白克額貝都拉差我解塞卜騰巴兒珠爾及送噶爾丹所發桑克拉什庫圖克圖曼朱庫圖克圖和碩齊台吉貝博等之書又擒往哈密取糧之鄂摩克圖哈什哈等二人及噶爾丹送與桑克拉什庫圖克圖書四封一併送來原令我解塞卜騰巴兒珠爾往京云問鄂摩克圖哈什哈達什里鄂摩克圖哈什哈言差我送書於桑克拉什庫圖克圖等我等去年十二月二十四日出行我等來時噶爾丹仍在格格特哈朗古特聞阿拉卜灘在扎巴哈之濟思布隆伊拉古克三庫圖克圖在伊克敖拉山之隂他爾烘努各我等人因乏食各自星散捕獵不知噶爾丹兵數大約不過六七百人但差我賫書送與桑克拉什庫圖克圖等不知其中原故俱在書中達什里言差我來哈密取糧餘皆如鄂摩克圖哈什哈語於是將達什里等共十四口交地方官解部留白竒随從之人併其馬駞交地方官在肅州喂養以待白竒之歸又遣臣家人一名往哈密坐探聲息教彼若得聲息即帶達爾漢白克額貝都拉之人日夜前來速報外將塞卜騰巴兒珠爾徽特和碩齊鄂木克圖哈什哈交䕶軍校阿啓納巴圖爾額爾克濟農之喇嘛額爾克哈什哈達爾漢白克額貝都拉之子白竒等臣與提督李林隆總兵官李世達㑹商撥綠旗官兵押解於二月初三日起行併將噶爾丹所發桑克拉什庫圖克圖等䝉古書四封先行奏聞上命議政諸臣入行宫諭曰前既陣斬噶爾丹之妻阿奴喀屯今又生擒噶爾丹之子塞卜騰巴兒珠爾爾等諸臣即為朕効力不過能在軍中擒噶爾丹本身而已噶爾丹之子如絶跡遠遁焉能即擒茍獲噶爾丹而不獲噶爾丹之子事猶未結今雖未獲噶爾丹而獲噶爾丹之子則賊之本根已斬噶爾丹雖各處偷生年已老邁所延㡬何我實不意得塞卜騰巴兒珠爾是乃天之所賜也朕心甚喜諸臣奏曰哈密乃塞外回回國觀其傾心歸服將噶爾丹之子併其大臣俘獲進獻可見皇上恩威所被無遠不届凡人生總為妻子計耳噶爾丹之妻陣前被戮止有一子又被俘獲噶爾丹已無家可歸無國可投天下雖大一身無復可容有死而已上曰用兵之道要在乘機噶爾丹窮蹙已極宜乘此際速行𠞰滅不可稍緩朕今親臨寜夏相度機宜調遣軍士諒噶爾丹聞我分塗進𠞰魂魄俱䘮其部屬亦必張皇而别部落蒙古聞朕親臨寜夏各欲見功扼噶爾丹而圖之噶爾丹若不自盡亦必爲人擒獻克成大事正在此舉爾等之意云何諸臣奏曰皇上所見極是聖躬親臨寜夏威聲甚大臣等咸謂必如聖明之所預料上曰朕親歴行間塞外情形知之甚悉自古以來所謂難以用兵者是也其土不毛間亦無水至瀚海砂磧地方糧運尤苦而雨水之際樵採頗難區畫不周豈可妄動朕今親臨寧夏凡有可用兵之地必詳審行道水草全備駞馬糧糗什物然後啓行稍有可商雖諸臣勸進朕亦不允諸臣奏曰克魯倫之役皇上於出師之先籌畫萬全師出之後事無巨細俱宸𠂻獨斷頃刻之間狡㓂破滅茲諭𠞰滅賊㓂之方行兵朔漠之策瞭如指掌臣等愚見噶爾丹雖肘生翼斷不能脱矣一等侍衞米請偕往撫青海台吉之使臣收集彼地所存回子而來許之米奏曰前者噶爾丹以臣充使率回子一千五百人來至邊哨地方侍郎滿丕阻臣不許進内差臣捧勅書歸覆噶爾丹臣去後回子俱往投青海臣重來復命侍郎滿丕又差臣捧勅書歸臣至噶爾丹處後噶爾丹為此項回子往投青海事遣薩木坦達爾漢鄂木布使於扎什巴圖爾令彼收此項回子即留彼處不得使伊等至皇上及圖爾古特策旺喇卜灘處是以此項回子現俱在青海今皇上招集噶爾丹屬下之人此項回子原係臣所帶來之人目下皇上差大臣使於青海臣願得随往收此項回子而來上使議政諸臣集議以為一等侍衞米欲往收其所携來之人所奏甚是當遣之前去上允米與出差大臣同往給巴圖爾額爾克濟農所收離散屬裔口糧理藩院奏曰員外二郎保呈稱奉部文為巴圖爾額爾克濟農屬裔散投青海諸台吉著巴圖爾額爾克濟農派出才能之人同西寧坐哨員外二郎保往青海查收而來巴圖爾額爾克濟農之達爾漢噶卜楚車陳寨桑於本年正月二十六日到鎭海堡在多巴周圍查獲丹厄里克等八戸共三十三口駱駞一頭牛十頭羊二十隻噶卜楚請給伊等口糧坐騎職以為口糧坐騎俱有但不便擅給若有部中印文行至地方官方應付車馬口糧雖我許給地方官亦不與爾等之來何不將此情由告之大臣轉奏今我等但往查收使無牲畜之人附於有牲畜者率之前行可也噶卜楚言先是我濟農波濟台吉祁齊克台吉三次至賀蘭山皆無騎無糧而每口給食及官車以行我等以為必照此例支給故不曾奏請如青海諸台吉遵㫖給還我屬裔恐貧窮之人不能到賀蘭山乞代我行文咨問大部為此併伊䝉古文同封具呈如得准行乞於西寧凉州甘州三處近邊之城預備今擬於二月初七日出鎭海堡邊口前往等語譯蒙古文觀之則一紙呈内大臣索額圖一紙呈部其中情由俱為坐騎糗糧之事二郎保又呈稱青海諸台吉若遵㫖全給還濟農之屬裔則人口衆多矣如沿途無䕶送之兵則貧人逸出橫行亦不可定乞併行文提督總兵官酌撥官兵防䕶逓送至賀蘭山則沿途無擾而得全到矣等語謹題請㫖上命議政諸臣㑹議咸以為查得噶卜楚既稱青海諸台吉若遵㫖給還我屬裔如無坐騎糗糧則貧人不能到賀蘭山應行文西寜凉州甘州地方官各於近邊城内備米視二郎保收來之人扣至賀蘭山給之口糧現在多巴之三十三口亦但給米遣行所給米數著地方官報部再行文該提督總兵官扣所收屬裔數目撥發官兵沿途小心防䕶送至賀蘭山可也上從之甲午駕次懷安縣阿齊滾布巴圖爾台吉遣使入覲員外二即保奏曰本年正月十六日回子葉大魁通事馬五帶特卜新寨桑來據寨桑言我乃阿齊滾布巴圖爾台吉之特卜新寨桑名馬木特我台吉遣我請皇上安併奏明前兩次聖上遣回子等往策旺拉卜灘處我遣人自備馬匹糗糧導引而行使安然抵策旺拉卜灘處青海諸台吉想聽從吾言矣但未知聖上肯加恩否惟候㫖遵行問特卜新寨桑馬木特曰遣爾來者有别意否今噶爾丹若向此來能出兵擒之否台吉一應言語盡以告我細問兩日言我台吉意以為别無事因難以奏請倘聖上或不加恩則於青海衆人亦覺無色故遣我請皇上安併奏此情如聖上加以恩綸我台吉皆當遵依而行厯年盟㑹及今年盟㑹商議覆部之文我台吉皆不在其内臣二郎保因盛稱皇上統御萬方中外一體俾各享安樂仁恩廣被天下神威播揚海外併問阿齊滾布有歸降之意否馬木特云聖上若加寵眷特賜諭㫖自即歸降希沐皇恩故借此事遣我前來緣回子葉大魁通事馬五俱能保之故將寨桑馬木特一併送部為此具奏上命㑹議來奏尋㑹議奏言問特卜新寨桑通事馬五其口詞與二郎保所奏無異先是聖上豫籌此際宜遣大臣往説青海諸台吉所遣大臣已經奉㫖派出今阿齊滾布巴圖爾遣其特卜新寨桑馬木特來請上安祈皇上加恩並奏青海諸台吉聽從其言之處恰與上㫖相符阿齊滾布巴圖爾台吉應加奬賚其褒嘉諭㫖聽奉差大臣請㫖即令奉差大臣與阿齊滾布巴圖爾台吉共商相機招撫青海諸台吉其阿齊滾布巴圖爾台吉之使人特卜新寨桑及偕來之通事馬五随奉差大臣一齊遣回賞阿齊滾布巴圖爾台吉之物交奉差大臣帶去其來使馬木特通事馬五令該部酌議賞賜奉㫖如議行治侍即安布祿等未經奏請擅調鄉導之罪上諭大學士伊桑阿等曰邊外地方俱朕去年所經欲調鄉導理合奏朕往調乃不奏請擅自給驛調取䝉古鄉導殊為不合著理藩院將鄉導首領交大學士查議具奏嗣後一概用驛俱著奏請如不奏請不得給驛㑹議以為侍即安布祿以鄉導首領䕶軍統領托倫交彼預備䝉古鄉導理應奏聞於上使筆帖式撥什庫乘驛而去乃不行奏聞殊屬不合鄉導首領䕶軍統領托倫不將預備鄉導之事奏聞即交理藩院亦屬不合坐此情罪應將侍即安布祿䕶軍統領托倫俱罰俸六個月不必遣筆帖式撥什庫可也上曰安布祿托倫俱著罰俸六個月餘依議安挿厄魯特投誠台吉察罕多爾濟等理藩院奏言副都統阿南逹解到厄魯特投誠台吉察罕多爾濟顧孟多爾濟并從人一名送部俟其父母妻子到日另奏請㫖上曰伊等俱係投誠有功之人著交山西廵撫携至大同好生贍養俟其父母妻子到日令與完聚仍暫養於大同聖祖仁皇帝親征平定朔漠方畧卷三十六

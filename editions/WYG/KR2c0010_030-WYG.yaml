body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷三十戊辰命撥大臣領兵起行内大臣公常泰為領兵起行事開列出征大臣職名入奏上曰左翼營内以内大臣馬思喀都統公俄倫代䕶軍統領宗室塞稜格主之右翼營内以内大臣公常泰都統侯巴渾徳都統齊實主之其餘大臣各隨本翼𨽻在營内其前鋒營自有本翼大臣其去時四營左翼之營于十七日起行其次十八日右翼之營起行自此次第起行再傳諭大臣兵丁云馬匹關係重大從夜拴至天明天明之後放嚙青草再緩緩起行則馬不勞此時雖不忌水然係肥馬仍以緩飲為宜朕于各驛俱備有草料爾等行路一日行一站為宜則馬畜不勞矣命給出征官兵行餉上諭大學士伊桑阿曰此番出兵諸王以下及大小官員俱照今年出征例給兩個月行餉如在前出兵今次又往則各賞銀十兩朕將往駐蹕驛中每驛使備空草以喂出兵者之馬照各處定例散給尚書圖納等以招撫噶爾丹屬下人及西喇古爾番人之事奏聞圖納等奏臣欽遵上諭乗驛速行至于莊浪會同總督呉赫提督李林隆署理巡撫事布政使郭洪西凉總兵官韓弼等訪問噶爾丹征賦之西喇古爾番人俱云在甘州附近地方是以臣等親身俱前進甘州因西寕距甘州一千二百餘里而地方𦂳要故遣總兵官韓弼回西寧臣等往甘州詳查噶爾丹征賦之西喇古爾番人遣副將衛勲游擊張當之守備王良柱通事俞嘉心宣諭皇帝仁徳告以𠞰滅噶爾丹之故西喇古爾黃番人大頭目厄勒者爾順等黑番人大頭目喇咱噶卜楚等俱大歡悦率其下次等衆頭目來降計西喇古爾黃番人大小六千七十九口黑番人大小一千一百六十九口及噶爾丹下管轄番人坐征賦税之厄魯特逹爾漢寨桑布爾竒寨桑塞稜丹巴等自十五嵗以上一百一十九口十四嵗以下六十口男婦大小共一百七十九口亦率之來降上三項人共七千四百二十七口此等坐征賦税噶爾丹下人皆係厄魯特不便仍留本處故撥游擊侯定之守備劉金玉千總周文梁把總張英從驛解京至西喇古爾黃番黑番人數甚多不便遷來且既將管轄伊等坐征賦税之厄魯特離彼遷來故不復遷番人止將邊外所有番人俱遷入邊内矣為此奏聞上曰西喇古爾番人向來納賦於噶爾丹送硫黃倭鉛諸物頃以噶爾丹大敗遁逃特遣大臣曉諭招撫覽圖納奏黃番黑番人及噶爾丹下管轄番人坐征賦税七千四百餘口俱誠心歸順分别解京安挿已悉知之矣并令所司知之己巳諭大將軍伯費揚古相機行事時費揚古因欽差卓力克圖逹爾漢巴克什及丹濟喇所遣察哈代等到後遣郎中本什押䕶入奏之時使口奏行事謹候訓㫖乃發勅諭費揚古曰爾賫奏本什到後情事已悉今丹濟喇雖乞降而噶爾丹之奏未至雖不來降破壊已盡如或來降大將軍可婉言誘至歸化城以便共商措置若遣其使至朕前於朕甚難不得不降㫖許降如據㫖來降不便有異議矣今丹濟喇以下通使仍遣來入見如噶爾丹遣使爾即覆之言我乃大將軍凡事皆我所主吾主殆不違吾言也今爾等往奏而歸天氣愈寒恐爾諸人盡至凍死爾等可即歸諭噶爾丹來降其時我當為爾陳奏加之奬賞作速遣回此項事一面奏聞一面大加防備防備之事馬匹為要朕統軍而行見我兵之勇無復遺議但不經心防馬萬一詐降夜中乗我無備驅馬而出所關匪淺爾等諳練之人無不經歴之事偶以朕慮所及一為書之朕一聞噶爾丹聲息即以京中所喂之馬給兵乗坐親于九月十九日出行赴歸化城此際情形仍當奏報朕心不勝喜悦急欲得其實音特諭命嚴禁外藩䝉古偷盗馬匹上諭理藩院曰是役之行經䝉古地方官兵馬駞擺站馬匹關係重大爾衙門可檄外藩衆札薩克喀爾喀札薩克各自嚴禁本旗盗賊如竊取官兵馬駞擺站馬匹什物借交易為名而來偷盗立正軍法梟首示衆抄沒子女家産入官該札薩克管轄人員從重治罪嚴行傳諭可也命封車陵逹什為輔國公上諭尚書馬齊等曰喀爾喀札薩克厄爾徳尼阿海台吉下一等台吉車陵逹什是役軍中効力供應公差馬匹食物略無遲悞良可嘉也著照車木楚克納木札爾例封為輔國公命速授善巴盆素克封册先是議政大臣奏封善巴為和碩親王優封盆素克為多羅郡王命作速撰册差官送往至是理藩院奏言吏部撰完善巴盆素克封册送到臣衙門應差衙門官一員乗驛星速送往上命速發授封命增發坐塘筆帖式理藩院奏請坐塘部院筆帖式再撥八員又今年出兵理藩院撥什庫應以兵丁給剰馬匹并選各旗馬内有臕者毎撥什庫各取二匹乗坐上從之庚午諭諸大臣追討噶爾丹情事時厄魯特格壘古英寨桑等遣察罕哈什哈來請降上諭大學士伊桑阿等曰近有厄魯特格壘古英寨桑乃噶爾丹信任之大臣遣使請降言噶爾丹困窮已極糗糧廬帳皆無四向已無去路狼狽不堪目下掘草根為食八月初四日大雪深數尺昔謂䝉古之地不論經由何方皆可以行難以尋覓由今觀之皆有一定行路一定住處不可妄行亦不能妄住欲覓噶爾丹所在亦無所難草木非人所食惟厄魯特乃能延至此時他人何以堪此伊桑阿阿蘭泰奏曰天時正寒如此窮困何以能久王熙奏曰食草木之根如何可久及今不降自求死也張玉書李天馥奏曰如此窮困何以度冬乎壬申駕發京城巡行北邊經理機務命都御史于成龍赴歸化城理西路糧務上諭大學士伊桑阿曰中路之糧俱已安貯于成龍李鈵喀拜在此無事西路糧務尚未措置畢著伊等自備馬匹乗坐明日即行過駐蹕所赴歸化城同理西路糧務遣人賫勅往詰大將軍伯費揚古費揚古等奏據西安正藍旗索保佐領下小撥什庫阿蘭泰鑲藍旗漢軍驍騎張正宗來報曰我等乃駐劄翁金之兵副都統祖良璧等議餘米不多兵丁住此已將至五十一日當分給此米起行遂以米盡給兵丁我等于本月初六清晨起程而來行至十五里外突遇厄魯特二千餘賊副都統祖良璧等率官兵接戰挫之我等因而内來問阿蘭泰曰祖良璧等如何矣言我等被截向内而來不知祖良璧如何奏至發勅詰大將軍伯費揚古曰爾以翁金守米副都統祖良璧等之事具疏來奏于九月十九日早駕發之時已到行在前五月十三交戰以來曽為西路尾後之事發勅書部文俱有案巻何待朕言此數月不撤者何故遣將軍舒恕侍郎滿丕前去者又何故爾之前往又何事朕實不解朕一人在京獨以西路所闕意所不到之事種種言之衆心俱不之服今果如吾言矣噶爾丹困窮已極早晚凍死如遣大僚人員往撫此大機會正為之喜今與之戰則降者必懼而止且又收其帳房鍋釜朕深以不及撤兵為憾又疏内並不開翁金有兵幾何將領為誰器械如何其戰久否如何被挫此撥什庫驍騎何以得脱懸度之不勝悶人嗣後一槩奏事必開明始末為宜特諭上又命内大臣䇿旺諾爾布一等侍衛俄齊爾杜喇爾赴大將軍伯費揚古所曰可傳㫖諭大將軍伯費揚古朕出張家口沿邊而行著大將軍不時探聽噶爾丹聲息來奏命刋發招撫噶爾丹勅文通行曉諭先是上諭内大臣蘇爾逹公福善索額圖大學士阿蘭泰尚書馬齊等擬招撫噶爾丹勅文奏覽至是大學士阿蘭泰撰勅呈覽上裁定之諭大學士阿蘭泰曰著將此勅文發至京城兼書滿洲䝉古字以榜紙单書䝉古字使内府良工刋刻刷印三百張與勅書一併馳驛賫來以勅書及刷印䝉古文俱交去員令將勅書授噶爾丹刷印䝉古文逢人頒示諭噶爾丹丹濟喇等曰朕統馭寰區中外一體效順者必撫綏以生之梗化者必誅𠞰而滅之爾于烏闌布通雖大敗逃遁朕仍欲與爾期約定喀爾喀之事幾經發勅遣使爾等背誓掠納木扎爾陀音直犯克魯倫朕乃親統六師遣使諭爾期會定約爾狐疑不信不見我使朕抵克魯倫爾不能抗威遁去遇我西師爾先逆戰至於大敗士卒死亡盡棄馬駞牛羊子女廬帳諸物遁走衆寨桑台吉等人絡繹來降丹濟喇格壘古英車陵奔遣其察罕哈什哈亦來請降朕已面許之遣使歸去今朕躬復統軍而出各處亦調兵為備爾等既失妻子馬畜什物無衣無食窮困已極更無所之天時漸寒死在旦夕朕不忍視爾屬衆妻子仳􅍣寒凍而死特降勅招撫爾等果悔前愆能來歸命朕不分異同無不豢養俾得其所爾屬下衆人亦得見其妻子各安其生朕㫁不念爾等後作之孽倘猶迷而不從試熟籌爾等長久之䇿有能收納汝等而活之者乎爾等已無所歸各當來降朕必使爾等富貴咸得其所毋疑毋懼特諭命布克韜等赴大同宣化府監喂馬匹上諭議政大臣曰大同府宣化府積貯草料甚多著於坐用官馬之新滿洲䕶軍三百内使二百一十䕶軍乗鹽池厰馬前去九十䕶軍携其所乗官馬九百匹往大同喂養其不乗官馬大臣侍衛官員之馬各照定例亦携往大同府喂養解此項喂養馬匹之時令三旗大臣每旗各一員侍衛各三員前去其在前兩隊之兵亦發往大同府喂養馬匹如此則不悞軍行而於事大有裨益爾等可會議來奏隨議將三百新滿洲䕶軍所乗九百官馬九十親隨䕶軍所乗三百六十馬帶往大同府喂養除部院大臣官員之馬不喂外其不乗官馬之大臣侍衛官員之馬照定額亦帶往大同府喂養所喂馬匹俱交侍郎多竒小心監喂三旗大臣毎旗各𣲖一員䕶軍㕘領各一員侍衛各三員亦發往大同府監喂其在前兩隊之兵亦發往大同府會同監喂人之口糧馬之草料俱照去年例支給奏入上命布克韜蘇永祚唐保住前往監喂餘如議命以哈灘巴圖爾滚占解京馬駞給右衛兵丁先是大將軍伯費揚古奏言右衛官兵到家未久調兵文書又於九月初一日到初二日即起行而來此項官兵歸未久而來甚速乞將哈灘巴圖爾滚占所有馬駞停其解京給右衛八旗兵為用上曰前次大將軍伯費揚古存留馬匹原令解京今費揚古請停解此馬分給其軍著該部作速議奏至是兵部奏大將軍伯費揚古既稱此項馬駞請停解京給右衛兵丁乗用應准所請給右衛兵俟兵歸日以馬匹數目報部前遣司官往迎此項馬駞應發文追回仍檄知大將軍伯費揚古可也上命依議速行甲戌命以大同宣府等處所喂駱駝交侍郎多竒監喂行兵部奏據大將軍伯費揚古咨准西路運米正卿辛保等移稱前大將軍發解喀倫駱駞共一百九十四頭除倒斃外現剰八十六頭已解右衛今青草將盡之時此項駱駞應交何處伏乞指示此皆大同宣化府等處地方喂養之駱駞應貴部撥人收取作何喂養何處安置請賜裁奪查目下侍郎多竒已往大同喂馬此項發往右衛官駱駞八十六頭如到右衛應扣數撥發官兵解至大同交侍郎多竒喂養以此檄右衛副都統正卿辛保併檄知大將軍上從之乙亥命以諭噶爾丹勅文及所印䝉古文𤼵往大將軍伯費揚古軍前時奉皇上手定勅文書於龍箋又刷印三百張大學士伊桑阿啟皇太子送至行在上諭大學士阿蘭泰等曰著以此勅併䝉古文今即撥善馳材能司官筆帖式送往將軍費揚古所差人賫去其勅授噶爾丹其䝉古文令彼逢人各給一張命備儀仗音樂於歸化城上諭内大臣福善等曰此行儀仗音樂俱未携來既往歸化城駐蹕如厄魯特䝉古來降無儀仗音樂似失觀瞻著取儀仗音樂俱裝載驛車併鼓手前來如排列儀仗大同軍士歸化城軍士執之丙子主事巴什納奏報副都統祖良璧與厄魯特戰于翁金之地巴什納報西安正白旗䝉古旗分布達佐領下披甲祁台布爾哈圖于九月十八日到寧夏報稱副都統祖良璧張㕘將等率滿洲緑旗兵在翁金守米因天時寒冷軍士難以久屯馬匹凍斃者多副都統祖良璧等遂以現存之米分給兵丁餘皆焚燬前鋒當前輜重居中副都統等親身殿後九月初六日自翁金起程行五六里忽有䝉古五六人闌入我軍輜重行劫我軍前鋒逐至西方山谷中忽有䝉古兵自谷中大呼而出發鳥鎗弓矢來逐我前鋒及於輜重防䕶之兵與之接戰又入副都統陣中相與混戰因路被阻截難以復回我等欲來報信同董總兵趕馬之人迭乗所趕馬三十餘匹而出䝉古見之以五十餘人追我等一日一夜我等棄疲馬換好馬始得脱出至兩狼山因馬已疲故留下正白旗蘇巴代佐領下披甲伊林住布逹佐領下披甲伍寳鑲藍旗漢軍披甲劉姓僅我二人選好馬乗之先來報知問披甲祁台曰爾等脱出時見副都統否䝉古兵形影大畧有幾何是噶爾丹之人否言䝉古兵自谷中驟出掩襲我軍相與混戰我不能逹副都統所䝉古俱有鳥鎗弓矢亦有執長鎗者視其形影大都千餘不及二千皆乗馬是否噶爾丹之兵不得而知我軍大半無馬報至上命抄此報發大將軍伯費揚古命免宣化府三十六年錢糧上諭户部曰宣化府錢糧曾已屢次蠲免但此數年該地方各州縣飼養軍中馬匹大兵往來經行各項需用雖俱動正項錢糧而供應甚繁人民勞苦朕巡察至此見之中心不勝軫念著將康熙三十六年宣化府地丁銀米盡行蠲免檄該撫通行曉諭俾小民均沾實惠以副朕愛䘏黎民至意爾部即遵諭行上又諭曰將此上傳令即交知府諭衆通知命黑龍江將軍薩卜素留歸化城養病薩卜素奏臣自科圖起程向張家口南行八百餘里九月初十日奉到兵部檄令臣速赴大將軍軍前是日即起程疾行又行八百餘里於十九日到歸化城歸化城距大將軍所駐西白圖地方千有餘里但臣居科圖時舊疾復作而又急行病勢漸增頭目旋暈左邊手足麻木不能長乗鞍馬但竭力䟎行而已上曰將軍薩􅁲素舊疾復作著賫奏筆帖式安泰今即連夜儘力速往追回將軍住歸化城養病候駕丁丑大將軍伯費揚古奏報副都統祖良璧擊敗厄魯特於翁金之地費揚古奏副都統祖良璧報稱職於九月初六日率八旗滿洲漢軍緑旗官兵擊敗厄魯特自翁金起行矣本月十八日遇理藩院撥什庫阿孫於哈爾哈納阿克逹地方發此文報知據此將前次來報之人阿蘭泰張正宗拿禁謹具奏聞上以示議政大臣且諭内大臣蘇爾逹福善索額圖明珠大學士阿蘭泰尚書馬齊曰前以祖良璧被厄魯特掩劫米糧什物朕甚憂之噶爾丹為我軍所擊敗但存坐馬衣服奔逃而出食盡衣单漸及寒凍勢在必亡雖獲米糧什物能度幾日有何大濟第目下丹濟喇請降而又劫米彼既得糧食其降尚少遲朕深憂之今將軍費揚古報祖良璧擊敗厄魯特朕甚喜悦噶爾丹今已困極雖不進討亦必滅亡今但以招撫為要是以朕諭大將軍頻遣噶爾丹下人往招之頻遣其人往招則噶爾丹雖不降下人必散自來歸降諭大將軍費揚古勅曰朕覽爾報知副都統祖良璧擊敗厄魯特不勝欣􅇺此軍克之固不必言即或不克噶爾丹一無所獲舍散之外更有何法爾將軍但以招撫為要使之散盡勅文及招撫事件已令本什等傳致不必更及但好言誘入我掌握中當另畫一䇿特諭命皇太子以副都統祖良璧擊敗厄魯特于翁金之事諭將軍孫思克博濟諭皇太子曰朕來時曾以祖良璧之事語將軍孫思克博濟矣今祖良璧以擊敗厄魯特具奏此事到後即抄一紙遣兵部司官一員賫示孫思克博濟尋孫思克博濟覆奏曰皇上真聖人也於臨行時即揣知此事命臣等聽㨗音今不出聖上所料臣等何人乃遣章京來諭臣等臣等惟有踴躍歡忭於無盡而已今御駕親出必擒噶爾丹而斬之或迎降於皇上馬前也命川陕總督呉赫駐白塔偵探副都統阿蘭泰駐寧夏防守先是呉赫奏言據披甲祁泰報稱副都統祖良璧等自翁金起行而來忽有䝉古五六人闌入搶奪輜重我前鋒逐至西邊山谷有䝉古一枝自谷中大呼而出薄我前鋒近至輜重我防䕶輜重軍士與之接戰又入副都統陣中相與混戰我等因路阻截難以復回故前來報信竊思噶爾丹乃極狡詐之人被皇上天威奮擊失其巢穴食盡困窮蹢躅游行希圖劫掠未必不聞翁金有米來覓度命之䇿是以傳令提督李林隆及衆總兵官防守邊塞臣身親率兵二千出邊趨白塔倘有機會隨宜行事又副都統阿蘭泰奏言臣身親往協助祖良璧上命議政大臣集議至是議曰大將軍伯費揚古疏稱副都統祖良璧率八旗滿漢緑旗兵九月初六日擊敗厄魯特自翁金起行今總督呉赫又稱率兵前赴白塔應令暫駐白塔偵探令副都統阿蘭泰不必出兵駐寧夏防守檄總督呉赫提督李林隆副都統阿蘭泰知之至披甲祁泰布爾哈圖遇敵不戰探信不真輙自奔遁大干軍紀應交副都統阿蘭泰拿禁上依議著速行命遣侍郎阿爾拜以右衛兵丁馬匹分喂大同附近州縣上諭大學士阿蘭泰尚書馬齊曰前令右衛兵丁馬匹分喂大同宣化兩處右衛近大同將馬逺解宣化不若在大同喂養爾等速議具奏隨議右衛兵丁馬匹停其解至宣化令全解大同交侍郎多竒監餵上曰餵養此項馬匹若在大同一處喂養苦累小民著侍郎阿爾拜前去與監餵内大臣閲視分喂附近州縣不得累民公平給價戊寅命賞宣化府張家口緑旗兵宣化府騎兵一百名張家口步兵一百名上毎人賜銀諭曰此銀可留爾等家中日用俟到張家口給米下營者可近御駕駐扎不時賞給爾等是行凡内外朝貢諸王貝勒貝子台吉官員部落男婦人等皆賜金幣裘帽無虚日己卯總督呉赫奏報副都統祖良璧等擊敗厄魯特呉赫奏言前以披甲祁泰等來報副都統祖良璧等率兵而歸突遇䝉古賊人出截與之混戰臣一面奏聞即率官兵起行急到邊外哨馬營地方遇臣前遣哨探把總傅益隆差兵丁田貴迎報云副都統祖良璧㕘將張憲載等率官兵掩擊䝉古賊人大克之乃率官兵而還臣等仍往迎祖良璧覿面問明另行奏報喀爾喀多羅貝勒根敦帶青貢使至尚書班第奏言本年九月二十二日喀爾喀多羅貝勒根敦額爾克帶青之青寨桑來至臣所言去嵗噶爾丹至巴顔烏闌我等被彼阻截住居色楞格之布隆哈地方噶爾丹遣二十人往烏郎海征賦止而殺之續有噶爾丹下阿海納青等十人逃來又殺之又有噶爾丹下圖卜申寨桑之子安逹爾轄等六十户烏郎海額爾徳尼轄等六十户烏郎海額爾徳尼轄逹魯哈塞濟木多爾通格等百户俱降之本年七月間我哨探之人於杭愛山陰額什根頺嶺擒額魯竒十二人彼言噶爾丹被大兵擊敗率三十人而逃從庫克納塔爾哈趨杭愛山噶爾丹下人離散者追而及之與之復會丹濟喇丹津俄木布等台吉之兵與噶爾丹兵共千有餘人至阿喇􅁲灘之兵千許伊等僅有本身所乗馬駞更無多餘馬駞牽行其牛羊糧食住房全無其内自相竊奪馬駞為食又丹津俄木布納馬什希諾顔阿喇卜灘與噶爾丹不睦阿喇􅁲灘踰杭愛山從俄羅海西喇烏素向西而去丹津俄木布納馬什希諾顔亦防噶爾丹分途相避而行噶爾丹率其黨羽踰杭愛山由庫冷白兒齊爾趨塔米爾塞欽向正西而去我十二人皆阿喇􅁲灘之人因無糧食欲捕獸而至此于是始聞噶爾丹之敗斬所擒十二人是以差楚楊和碩齊等四人往克木祁木齊克等處問烏郎海人探噶爾丹情形去向聲息差我等請皇上安併奏原由且令來告尚書我等來時我貝勒挈裝自塞稜格向博羅罕而來據此遣青寨桑呉勒木濟乗驛往奏青寨桑等口奏曰聞皇上親統大軍滅噶爾丹我貝勒向内而來但欲立功擒噶爾丹有精兵千餘但馬畧少今貝勒遣我等來貢請安上諭皇太子曰朕躬安好此行較前不同諸物豐盈天時頗佳每日愉快以行聞塞外今年暄燠問馬習言沿路水草並佳野多山間有獸殆可遣懐每年進獻皇太后禮物汝於初三日親身詣送朕亦續遣太監賫進途中所有數種物也此書書畢適根敦帶青貝勒書至來人云聞皇上親統大兵𠞰滅噶爾丹我貝勒領兵前赴惟祈擒獲噶爾丹以立功勞有精兵千餘但馬畧少耳兹併以尚書班第書發往庚辰命根敦帶青乗時𠞰滅噶爾丹上諭議政大臣曰根敦帶青久無音耗朕甚念之今根敦帶青將噶爾丹下人亦招降六十餘户殺四十餘人又招降噶爾丹徵賦之烏郎海人一百六十户遣使來奏噶爾丹為我軍所擊敗兼之祖良璧兵又擊敗之根敦帶青又在意外𠞰撫噶爾丹之人則噶爾丹之滅速矣今事已竣朕心大慰卿等亦必喜悦也併明諭來使著根敦帶青如有𠞰滅噶爾丹機會當預備𠞰滅之如擒獲噶爾丹勿得生獻即在爾地立决尋議政大臣奏多羅貝勒根敦額爾克帶青前既避噶爾丹與之分居噶爾丹敗後又四處堵禦𠞰撫其衆又遷至博隆哈地方陳奏原由殊為可嘉請將今年五月内皇上親統六師抵克魯倫河噶爾丹不能抗拒天威即棄其子女逃遁適遇大將軍伯費揚古之兵遮其西路一戰大敗盡棄其妻子廬帳駱駞牛羊等物孑身遁出大殺厄魯特併殺阿奴丹巴哈什哈察罕西逹爾哈什哈等寨桑厄魯特二千餘人來降丹濟喇遣使説噶爾丹歸降厄魯特男婦來降絡繹不絶噶爾丹無衣無食窮困已極皇上現統大兵親出塞外大將軍伯費揚古又率大兵進討噶爾丹各項情事該部備文檄知多羅貝勒根敦額爾克帶青至噶爾丹目下無衣無食四向無歸困窮已極應令主事諾爾布鄉𨗳索諾木及根敦帶青使人青寨桑呉勒木濟楚雅哈等乗驛速往蒿齊特邊哨自邊哨以外擇馬乗坐給之糗糧從御駕前行之路西蒿齊特邊哨釵逹木哈喇俄博由伊克扎喇之西過俄羅壘由呼巴海阿爾噶賴之東抄過伊扎爾額爾竒納克踰阿爾噶蘇台嶺到特勒爾濟口自特勒爾濟口以外之路青寨桑呉勒木濟等識之即令呉勒木濟等指引星速送文交根敦帶青仍令多羅貝勒根敦帶青乗噶爾丹窮廹之際整飭軍士𠞰滅噶爾丹可也奏入上命檄知大將軍伯費揚古餘如議命查給根敦帶青俸上諭尚書馬齊等曰著查喀爾喀多羅貝勒根敦帶青俸禄再取裘帽十三副交郎中滿都員外拉都渾管張家口驛站員外黑色收貯留根敦帶青現到使人青寨桑夥伴博垂俟後來貿易之十三人到後以此裘帽分給所獻大鹿角諸物令滿都等受而藏之其貨物令滿都等親交八家商人代彼貿易諸貨俱照時價從多估賣及賣後所買貨物俱照時價畧減估買遣回之時撥理藩院撥什庫同賫根敦帶青俸銀務令送到此撥什庫歸時仍於根敦帶青人來之便設法同來辛巳駕出張家口駐蹕察罕拖羅海大將軍伯費揚古報丹濟喇敗于翁金聲息費揚古奏康熙三十五年九月二十日厄魯特降人名阿玉什者來言我自伊扎爾布都納隨丹濟喇往趨翁金貯米之地本月初六日早見翁金兵起行我等藏匿俟其少過丹濟喇率我厄魯特往攻欲奪其行裝馬匹而輜重後殿兵發鎗礮接戰輜重前𨗳兵又返而夾擊之我厄魯特敗向西而走次日晚我自下營處逃來據此將厄魯特降人阿玉什交筆帖式詹住往奏上復命問阿玉什據云往奪米時丹濟喇原以為不可衆小人言聞翁金現有米與其餓死何不取以為食遂往行一日程我厄魯特哨卒執喀爾喀三人于是潜伏一小山俟歸來大兵稍過當中截入䕶米之兵不及披甲鳴角首尾夾擊發礮四次我等遂走我出逃之路見厄魯特死者十餘人不知其他又問我軍得傷否據云丹濟喇傳令原云逢人勿殺但取米與行裝今不但殺人我厄魯特反失馬無筭丹濟喇出大悔曰欲向清水捕魚徒攪水渾而不得魚今奈何甚為懊恨因馬臕落盡步行者多在我後來者甚多為此奏報壬午上諭皇太子曰撫逺大將軍領侍衛内大臣伯移咨理藩院為知會事康熙三十五年九月二十日未時厄魯特之人阿玉什來投順云我自阿濟爾布都納隨丹濟喇回至翁金貯米地方於本月初六日早見翁金之兵起營我等在傍潜伏俟其絡繹前行丹濟喇率衆衝突欲搶馬駞行李其殿後大兵隨放礮銃拒戰在行李之前兵馬亦回顧夾攻我厄魯特敗遁而西次日天晚下營我遂逃奔前來等語其投順之阿玉什乗汝衙門筆帖式詹住回京之便將此文並人於二十八日晚間到問阿玉什對云此番搶米非丹濟喇本意衆人言翁金現有米與其餓死不如取而食之於是前往行及一程遇我哨兵搶喀爾喀三人遂隐伏山坡待我兵迤􅆔前行從中衝截守米之兵不及甲胄鳴笳首尾夾攻礮擊四次隨即敗遁彼一路見有厄魯特死者十餘人别無所見又問我兵曽失利乎彼云丹濟喇曽傳勿殺人止搶米之令今勿言殺人并厄魯特之馬反損失多矣丹濟喇脱身後甚是怨悔惟思清水捕魚水雖已渾魚終不得將如之何氣忿至極其馬俱羸弱徒步者衆在我之後接踵而來者甚多先示大略俟有報至再傳諭川陜總督呉赫奏報祖良璧擊敗厄魯特之事呉赫奏言臣于九月二十三日至石嘴子地方見副都統祖良璧㕘將張憲載問之據言我等翁金看守之米所餘無幾再畧待之則兵丁歸途糧食不敷是以盡將餘米捆載于九月初六日起行頃之前𨗳署前鋒章京屯住虎遇䝉古賊人八人來奪行裝即同千總劉進孝率緑旗兵三十名往逐之故遣人來報我乃親率官兵往迎行不數里突有厄魯特賊人二千來截我急令滿漢軍緑旗兵發鎗矢奮勇殺入賊分兩隊圍我于中我親率官兵從東方殺出重整官兵排列子母礮鳥鎗令僕從俱執鎗棍併力進戰自卯至巳拒敵良久仰仗天威賊人大敗向西北遁走追二十餘里因山谷險峻不便深入于是退歸陣斬䝉古賊人百餘我軍糧米什物並未嘗被賊劫去其知縣佟世典守備王佩等運到哈爾哈納阿逹白塔米一千石俱已焚燬奏至上命議政大臣集議隨議副都統祖良璧率領官兵擊敗厄魯特䝉古九月二十七日可到寧夏應檄知大將軍伯費揚古其哈爾哈納阿逹白塔所貯之米既已焚燬無庸議上從之命罷右衛兵前進上諭内大臣蘇爾逹等據厄魯特降人言噶爾丹往博羅烏納罕空音扎巴哈等處地方度冬令丹濟喇至博羅烏納罕就之所云博羅烏納罕者乃扎薩克圖汗舊居之地問其所在距喀倫有四十餘日之程大將軍伯費揚古進兵之時右衛兵每人乗馬一匹以驢騾負裝其臕亦瘦云朕料㫁不能到噶爾丹所在之地必自翁金等處因馬痩而還如到翁金始退則兵徒勞而無益于事朕所以使大同餵馬者正欲探實噶爾丹所在如立刻可行則于黑龍江六百兵内選前鋒二百新滿洲四百察哈爾兵一千整備鎗礮全用肥健馬駞充足米糧進𠞰乗其窮困可一舉立滅之噶爾丹業已盡破今我軍何故不深筭𠞰滅之䇿而徒勞人馬乎今速檄大將軍伯費揚古不必進兵如有决然可取之機則勿停止噶爾丹已窮極而無所歸矣倘今冬不可行至來年青草萌時肥秣馬駞以備視噶爾丹所往務期追覓𠞰而除之此際頻遣厄魯特降人招撫為要使彼降盡爾等其集議以聞議曰𠞰噶爾丹而滅之及招之散之之䇿皇上皆已詳畫諭㫖誠是俱應欽遵上諭而行請速檄大將軍伯費揚古奉㫖行事仍著作速回奏上命如議速行癸未上駐蹕海柳圖命調俄爾多斯兵上諭尚書班第曰爾可往歸化城遣人于俄爾多斯旗分因俄爾多斯左翼三旗近歸化城令于三旗内調兵二百至黃河對岸伺候如俄爾多斯王貝勒貝子公台吉有來請安已過河者令赴歸化城來如未渡河則與所調兵同在對岸候駕理藩院筆帖式海夀奏報遷移喀爾喀扎薩克台吉阿里雅等户口之事先是筆帖式海夀奉差往遷喀爾喀台吉阿里雅阿爾薩闌衛寨桑等户口至是海夀奏言喀爾喀扎薩克台吉阿里雅阿爾薩闌衛寨桑等户口及同居游牧之喀爾喀多羅貝勒汪扎爾屬下巴爾虎二百餘户公西卜退哈灘巴圖爾旗下多爾濟青台吉二十許户俱遷來歸併于逹里岡阿地方喀爾喀扎薩克台吉車陵扎􅁲所居安插扎薩克台吉阿里雅旗下無力者二十許户俱留克魯倫地方俟雪消後阿里雅遣人遷來上命議政大臣集議隨議喀爾喀扎薩克台吉車陵扎􅁲奏請安插有樹木地方已准與扎薩克台吉阿里雅阿爾薩闌衛寨桑多爾濟青台吉車陵扎􅁲住居一處就水草佳地逺設哨卒西探聲息小心防範貝勒汪扎爾屬下巴爾虎等既與阿里雅等同居游牧應仍令暫與阿里雅等一處安插俟來年貝勒汪扎爾祖母波底蘇克使人到後問明再議阿里雅旗下無力者二十許户既稱俟雪消後阿里雅遷來應無庸議奏入上從之聖祖仁皇帝親征平定朔漠方略卷三十

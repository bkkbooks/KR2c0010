body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方畧卷四十四五月庚辰朔上駐蹕諾木渾河命大兵牧馬于水草善地上諭内大臣曰視諸軍馬匹惟恐遺失附營放牧是以食不如意宜遠擇水草佳處放牧雖瘠可無碍也著諭衆知之又今日我軍所屯與蒙古雜處當諭我軍以至僕從毋得盗竊蒙古之馬如盗馬被獲即依蒙古盗我軍之馬例處斬著交各該管人員傳諭辛巳上駐蹕阿祿十八里臺大將軍伯費揚古奏報選兵進覓丹濟拉發囘餘兵費揚古奏言准行兵部咨稱奉諭著費揚古精選所部兵往覓丹濟拉所在招之俱來餘兵遣囘黑龍江兵阿南達兵亦令遣囘于成龍所運之米㑹商料理臣等遵㫖㑹同選擇前鋒四百名䕶軍鎗手五百名毎旗砲各一門八旗驍騎砲手八十名察哈爾兵二百名寧夏綠旗兵二百五十名共精兵一千四百餘即於發囘兵中駝馬内酌量通融臣等率之往覓丹濟拉所在巴雅恩都爾地方收集丹濟拉而來所餘前鋒一百名䕶軍鎗手一百名砲八門八旗驍騎砲手八十名扣數派出將領管轄毎翼派出大臣一員今正值邊塞内外務農之時恐兵丁妄行踐踏交與嚴禁察哈爾兵一百六十五名出寧夏之黑龍江官兵四百名坐哨之博爾徳城守禦闗保等兵一百名寧夏鎮標兵二百五十名俱于四月二十六日發囘起程矣今臣等遵㫖選兵往收丹濟拉餘遣囘則都御史于成龍所運之米不必全至郭多里巴兒哈孫請將三分之一運至郭多里巴兒哈孫以備囘師降夷之用其餘二分即留現在運到之地至遣囘一千一百餘官兵僕從給以兩月口糧可到歸化城邊上地方應裁伊等一月之米交于成龍等於郭多里巴兒哈孫地方收貯備用所裁黑龍江官兵一月之米俟黑龍江兵到歸化城後支倉糧帶去上曰善著以此檄知于成龍等尋于成龍等准大將軍伯費揚古咨率令官兵將一分内一千石餘米運至郭多里巴兒哈孫地方所剩兩分米留于船站兩狼山侍郎李鈵左通政喀拜領運來兩隊之米亦已停其前運矣謹此奏聞上報聞費揚古等又奏曰四月十六日大兵到郭多里巴兒哈孫後臣等公議遣散秩大臣丹巴哈什哈署叅領顧葉里於丹濟拉諾顏格隆拉思倫謂之曰爾等所遣使人齊竒爾寨桑來言噶爾丹至阿㕓阿木塔泰地方于三月十三日已死丹濟拉等携噶爾丹骸骨及其女共三百戸人前來歸降聖上住于巴雅恩都爾丹濟拉等欲即來而下人三分之中有兩分無坐騎俱係步行且皆無糧食是以住于巴雅恩都爾候㫖但聽諭㫖如何以便遵行其言如是聞爾丹濟拉携噶爾丹骸骨及其女并屬下人誠心來歸聖化我輩甚喜今吾與汝皆同朝人已為寮友特遣散秩大臣丹巴哈什哈等通問可明告此項差員凡步行人需坐騎幾何共需口糧幾何當計數送馬匹牛羊米糧等物往迎仍有一言相告爾丹濟拉何不輕身先携噶爾丹骸骨并其女來其屬下人隨後徐來則愈合聖上軫念之心矣吾輩以僚友之道抒情相告以是作蒙古書用印鈐封令丹巴哈什哈賫往訖上曰大將軍費揚古軍前有帶罪發往從軍効力之人今進兵之路各處多有伊拉古克三庫圖克圖之人及流散之厄魯特至使人于丹濟拉應遣從軍効力者乃差散秩大臣丹巴前去殊為草率著商度來奏僉謂大將軍使人於丹濟拉應差發往軍前効力之罪人而差散秩大臣丹巴前去殊為草率請嚴飭大將軍費揚古仍令大將軍費揚古等率領精兵直至巴雅恩都爾收丹濟拉等而來至發囘黑龍江等處兵及撥糧諸事俱准該將軍等所奏行上從之停止二次運米赴保徳州上諭大學士伊桑阿曰前以湖灘河朔之米五千石裝船一百一隻令運致保徳州今侍郎安布祿來奏言已經量船所容裝米三千三百六十石開行矣俟至老牛灣帶囘船隻將所餘一千六百四十石于第二次起行云但將米作兩次運為日既乆而船戸亦辛苦且現運三千三百六十石亦無不足之處作速檄知第二次不必再運壬午命遣四格子趙山招撫阿喇卜灘丹津俄木布副都綂阿南達提督李林隆奏言臣等率兵于四月十八日至巴爾庫爾見前行哨探者報云丹濟拉已起行不在屯劄之地乃問逃來杜喇爾曰丹濟拉前言欲往何地答曰我未出逃之前丹濟拉與衆議時一人言我等或暫栖巴爾庫爾不則往投聖上丹濟拉言汝等但知自為計耳何以不一言及利我之事我等不便乆居巴爾庫爾兹我屬下屢有逃亡如策旺喇卜灘知而阻我則難脱矣况遣使以誑聖上遷徙來此今又可往降乎我馬臕尚壯當乘人未覺之先急從噶思渡瀚海將汗之骸骨及鍾齊海送至達賴喇嘛所吾心盡矣斷不可緩也曾有此等語未敢告諸大人是以臣等至彼營地視之人踪漫滅馬通枯燥行跡向布克達額冷哈巴爾罕而去臣等竊思聖上籌畫周詳各處堵禦是以噶爾丹仰藥而死丹濟拉無路可出甚不得已從額冷哈巴爾罕往趣噶思如隨丹濟拉之踪追之隔日已乆難以相及是以臣等急向瀚海南竟趣噶思口以禦之十九日自巴爾庫爾起行矣奏至上以之發議政諸臣集議曰據阿南達疏言至丹濟拉屯劄之地見人踪漫滅馬通枯燥行踪欲渡瀚海往達賴喇嘛所折向額冷哈巴爾罕而去如隨丹濟拉之踪追之隔日已乆難以相及是以急趨噶思口禦之已于十九日起行矣查前者大將軍費揚古遣散秩大臣丹巴至丹濟拉所通候曰爾既來降聖上則我皆同朝之臣故我以一言告之爾當携噶爾丹骸骨及噶爾丹之女先輕騎而來其屬下擇可托之人交授緩緩而行則甚合聖上之意已作蒙古書用印發去矣又齊竒爾寨桑來奏曰丹濟拉言爾往奏聖上此處四圍皆我仇人如乆住巴雅恩都爾倘人知之未必不來侵犯故我于瀚海四圍處處留踪如我離巴雅恩都爾而他往我必埋書于巴雅恩都爾而去爾往奏聖上歸來而我不在此則覓我所埋之書既得我書則知我所在矣曾以此言密語我人無知者又問降人厄魯特大臣格壘沽英言噶爾丹身存之日曾集衆寨桑商其所往一無可去而止今丹濟拉以寡弱之衆而繞䇿旺喇卜灘附近之地游行數月以為欲往達賴喇嘛所我料其必無是事此正合語齊竒爾寨桑處處留踪之言逃人杜喇爾不知故言欲向達賴喇嘛而去亦未可定應將目下大將軍費揚古兩疏俱抄發阿南達李林隆知之奏入得㫖依議遣使于丹濟拉之時當遣戴罪立功人等如趙山四格子者為是伊等俱素行不端善于鑽營之人故諸大臣狥情不遣而遣散秩大臣丹巴丹巴必遇不良之人亦未可定今將伊等遣一人于丹津俄木布遣一人于阿喇卜灘自備馬匹副以蒙古將領筆帖式曉諭噶爾丹已死招撫其衆伊等若招得阿喇卜灘丹津俄木布即與俱來如事不成或未至其地半塗而囘著大將軍即于軍前梟示授副將麦良璽為肅州總兵官上諭議政諸臣曰肅州總兵官李世達病故肅州地方甚屬緊要定邊副將麦良璽貎偉材優著授為肅州總兵官速檄令赴任不必從征命賜厄魯特投誠人自台吉以下閒散人以上遍給馬匹上諭太僕寺曰厄魯特台吉等各馬八匹散秩大臣等各馬八十一匹一等下等各馬五十匹二等下等以下閒散人以上各馬三十匹俱自太僕寺支取給賜甲申駐蹕色徳勒黑地方安揷厄魯特降人于張家口外内大臣索額圖奏曰大將軍伯費揚古差小校柰馬代送厄魯特鄂里哈之子車陵下龔格額爾克到臣查先是奉諭㫖曰厄魯特來降問其情由具奏來降之人留于汝處應遵㫖將車陵留于臣處但車陵者厄魯特部落名族之子而費揚古又檄送御營是以將車陵遣赴御營外其車陵屬下同降七十餘户男婦共二百五十許口以後或留臣所或解張家口請㫖定奪命議政諸臣議奏僉議以為厄魯特來降人等俱留張家口外撫養車陵本身現又解來以後二百五十許人口俟解到後即令内大臣索額圖解至張家口交監養厄魯特官員上可其奏乙酉上駐蹕察木喀地方賜蒙古諸王貝勒馬上諭侍郎安布禄曰諸王貝勒昨觀馬厰著賜阿霸垓多羅卓禮克圖郡王達馬林扎卜多羅郡王呉爾占噶喇卜蘇尼特多羅杜稜郡王達林扎卜蒿齊忒多羅郡王雅木批兒各馬五十匹阿霸哈納爾多羅貝勒布昭阿霸垓固山達爾漢貝子車陵多羅􅁲阿霸哈納爾固山貝子額林臣達什等各馬三十匹丁亥上駐蹕魁吞布拉克地方命台吉薩馬第兄弟完聚喀爾喀土謝圖汗屬部台吉巴陵旗下台吉薩馬第奏曰我國既破無以自存以臣兄達尼交太僕寺牧人喀蘭泰家寄養今臣身仗皇恩已足謀生臣兄年老而妻又亡臣願收養臣兄臣兄達尼有二子家奴男子三人婦女一口命達尼與其弟薩馬第完聚庚寅上駐蹕宣化府城内厄魯特人呉蘭等來降大將軍伯費揚古奏言都綂碩鼐送到厄魯特呉蘭夫婦呉蘭之弟察罕禀曰我等乃伊拉古克三庫圖克圖屬下人去年九月伊拉古克三庫圖克圖離噶爾丹採稆為食至伊克敖拉等處度冬今年三月自納黙黑圖雅蘇圖向西游牧四月二十一日至洪郭羅阿濟爾罕之夜我等取馬七匹逃出來歸聖上我等所携馬七匹于次日翁塔地方遇丹巴哈什哈等皆乘之而去留其瘦馬二匹駱駞一頭而遣之問呉蘭等曰伊拉古克三向西游牧將往何處人有多少答曰彼言與噶爾丹素好今不幸而敗不當遽棄之將往覓噶爾丹其弟孟格壘及衆下人俱言往覓噶爾丹無益何不往投䇿旺喇卜灘我等來時仍未定其所往也彼有箭手百人子女共三百許問呉蘭等曰丹濟拉現在何處爾等曾聞噶爾丹之死否答曰噶爾丹丹濟拉進洪郭爾聞之于格壘沽英杜喇爾之人者如此不聞噶爾丹之死驛逓丹巴呈言二十二日暮時于温塔地方路中見三人牽馬四匹入山而去追而執之是二男一婦問曰爾等係何等人言從伊拉古克三逃出之厄魯特問何時逃出伊拉古克三何所往言我等二十一夜逃出伊拉古克三即從此路向薩克薩特呼里克而去我等之行甚速兩日内即可追及因我等人少故尋他徑遶去為路途遙遠取呉蘭等騎來馬七匹以我等騎來馬二匹駱駞一頭二十日所食米肉給之計厄魯特人等自伊拉古克三處逃來以及到大軍軍前之日宿九夜第十日乃到是以臣等率領大兵照常前進一面選前鋒二百䕶軍鎗手三百前鋒叅領侍衞則半之䕶軍行營協領叅領則照兵數撥發交議政大臣昭武將軍馬思喀同叅謀都綂齊什綂領碩鼐都綂石文瑛往追伊拉古克三務期𠞰滅即遣降人呉蘭在馬思喀軍中引路外其呉蘭之妻達什弟察罕又極㓜並無所知是以即將丹巴所換馬駞給之乘坐交坐塘官員轉逓送至張家口奏至上以示議政大臣收服齊卜齊努特等員外常禄奏言臣偕喀爾喀伊爾登濟農多羅郡王彭蘇克往收齊卜齊努特人等于閏三月初四日至噶兒達台河收服齊卜齊努特之窩齊爾圖等本月十二日至魁禄爾河收服齊卜齊努特之孟克舒稜格俄羅木蘇之俄木布十八日至魁吞布拉克收服齊卜齊努特之齊齊克土卜新等問窩齊爾圖孟克舒稜格俄木布齊齊克土􅁲新等原屬誰氏之人何以至此地爾等人數幾何窩齊爾圖孟克舒稜格等答曰我等乃喀爾喀多羅貝勒汪扎兒祖母菩提素克之人現在弓箭手一百二人婦人八十六口子女一百三人俄木布齊齊克土卜新等答曰我等亦係多羅貝勒汪扎兒旗下台吉額爾克綽克托之人現在弓箭手五十三人婦人四十一口子女三十七人康熙三十四年聞噶爾丹至克魯倫劫掠喀爾喀納木扎爾陀音我等各自逃避至此地方是以帶伊等與王彭蘇克㸔視安插于呉禮孫河奏至上報聞辛卯上駐蹕新保安城内革溫保甘度職交刑部上諭議政諸臣曰溫保居官極惡刻剥百姓至不忍觀前者彼自謂居官好民甚頌之欲為之立碑今觀沿途之民無不切齒思食其肉况温保不比他人嘗為學士朕愛惜斯民之意不可謂不知之甘度居官亦極惡今蒲州之民皆叛入山中伊等若善民豈肯逃叛乎倭倫往撫如不肯降即押温保甘度至彼處處斬再言用兵伊等居官極惡刻剥斯民朕甚恨之如此貪官若不誅戮何以懲衆著議政諸臣㑹同部院大臣議奏僉謂巡撫布政司有牧民撫綏之專責理應仰體聖上保民若赤子之至意温保居官惡極刻剥小民至不忍觀沿途之民無不切齒思食其肉甘度居官亦惡極是以蒲州之民至於反叛諭㫖誠是也應將伊等皆立斬以儆衆人請將温保甘度革職今即將温保嚴拿赴京交刑部差兵部官一員亦將甘度嚴拿交刑部俱擬斬具奏上從之壬辰上駐蹕懐來縣城外黄寺皇太子率大學士阿蘭㤗尚書馬齊佛倫等來迎䇿旺喇卜灘遣使上書䇿旺喇卜灘遣使格色爾上書曰奉到勅書賜物無任懽忭此地叨安一概勅書俱到七十餘年敬守法度至今寧居詎意博碩克圖自以為是罔知禮法以彼一人累及衆庻然而無如達賴喇嘛班禪及天朝三方威力何也今道法有歸伏祈仍加慈照乂安衆生上以示議政諸臣甲午上駐蹕清河地方副都綂阿南達報起行赴噶思追丹濟拉日期阿南達等奏曰准行兵部咨云著大將軍精選兵馬往覓丹濟拉所在招之俱來阿南達一路兵著撤囘查前因丹濟拉携噶爾丹骸骨由噶思取路往投達賴喇嘛請往噶思地方以堵截之已經具奏是以臣等率兵于五月初五日至布隆吉爾初六日向噶思起行上報聞乙未上凱旋京師行告廟禮上自清河起行大設鹵簿皇太子率諸王皇子及在京文武大小官員俱蠎袍補服出郭外五里跪迎道旁八旗䕶軍驍騎步軍及京城附近紳衿士庻工商耆老男婦俱扶老携㓜陳設香案沿門結綵各執香跪迎上由徳勝門入詣堂子行禮畢由午門入宫是日上詣寧壽宫問安丙申召大學士學士九卿入面諭曰塞外情形不可臆度必身歴其境乃有確見昔朕欲親征噶爾丹衆皆不欲惟費揚古與朕欲討之後兩次岀師衆愈不欲苦非朕親綂大軍追襲噶爾丹使之少留餘息彼必復聚難以遽滅矣明時為恢復河套議論紛紜致大臣夏言曾銑受戮自朕觀之此地無甚闗係若控馭蒙古有道則河套雖為所據安能為患控馭無道則何地不可為亂蒙古游行之地防之不勝防專言收復河套亦何益乎至行師之道調軍轉餉必一人兼綜其成事乃易濟前西路進兵時將軍博濟孫思克等專管軍務不與輓運專責地方巡撫等官轉餉迨後糧餉稽遲兵丁困餒致有道殣頃朕自白塔至船站猶見有遺骸皆遣鄉導沿途掩埋朕綂大兵由中路進時多方籌畫催督運餉比及旋師無一人受餒且資給西路之兵俱獲全還又令沿途各站多貯米糧雖隨營貿易之人皆不乏食此役寧夏之行料理糧餉悉有次第然後進兵所以直至囘軍供應皆足無或稍悞以此觀之兵食兩事斷宜一手區畫此後倘遇行師當永以為法朕又觀塞外運糧最難昔唐宋及明嘉靖時皆用兵西陲不知當日作何轉運之法朕此役寧夏之行不用車輛所需駞馬騾驢悉自京城發往恐有不敷復給公帑採買預備一切什物皆由官運畧不累民諸臣叩首奏曰轉餉數千里而不煩民力洵前古所未有也戊戌申飭山陜督撫察吏安民上諭吏部等衙門朕頃以狡㓂噶爾丹未滅調度軍務親蒞塞外因念切民依巡歴邊境所至咨訪目擊山西陜西縁邊一路地皆沙磧難事耕耘人多穴居類鮮恒業其土壤磽瘠固己生計維艱而地方遼遠疾苦無由上聞大小官吏不能子愛小民更恣横索遂使里井日漸虛耗比年用兵以來一應軍需芻糗俱動支正項錢糧儲偫供應從不取辦閭閻乃各府州縣官員借端私徴重收火耗督撫布政使等官又不仰體朝廷恤民至意糾察貪汚禁革加派反多瞻狥曲庇又或該督撫庸懦懈弛因而筆帖式及衙門人役無所忌憚擅作奸弊以致民生滋蹙朕心深切軫惻今外㓂已經蕩平惟以綏乂地方拊循百姓為急務山陜兩省闗係緊要應作何撫恤休養著九卿詹事科道詳議以聞奏言欽惟我皇上聖徳至仁光昭天壤鴻猷駿烈超越古今猶恐一民有饑一民有寒連歳蠲免各省正賦數千萬併漕糧數百萬以及積年民欠税賦蠲免不可勝數盛徳宏恩亘古未有如康熙三十年陜西西安等處灾荒將未報灾荒之督撫當即重處將内帑并各省錢糧協解數百萬連遣大臣四次賑濟其襄陽收貯糓石復節次遣大臣運送又命原任總督河道靳輔截留漕糧二十萬石由黄河輓運又將大同米運至湖灘河朔亦由黄河運至西安此項漕糧并襄陽大同等處米石我皇上切念億兆深謀預籌於從古未經行運之河創運賑濟又勅直𨽻河南湖廣督撫將流移之民所到之處即令賑濟遣囘原籍動支正項錢糧給發牛種多方招徠又將三十三十一二三年賦税蠲免數百萬陜西億萬生靈即於彼年賴以全生地方安輯民得復業又三十四年山西平陽府被灾特遣大臣賑濟又發帑銀修理城郭民居兼免錢糧俾軍民獲有寧宇近又於甘肅等處蠲免糧餉八十餘萬今歳聖駕清問沿邊疾苦布徳施惠將保徳等州縣衞所錢糧盡行蠲免我皇上愛民之至無微不照即連年逆㓂噶爾丹狂逞塞外皇上念切救民乂安内外躬綂六師三臨絶徼且深入荒遠無水草之地親行調度睿筭如神天人恊應以致逆賊困斃部落潰散妻孥俘繫餘黨盡降西北萬里疆圉之外古未馴服者罔不懐徳畏威沐浴聖化中外臣民歡忻皷舞歌詠昇平此自古載籍以來未之見者也從來軍興芻糗多資民力我皇上睿慮周詳一絲一毫皆出公帑不以累民又鑾輿所至地方必廣行蠲免賞賚優渥撫恤兵民淪膚浹髓竆鄉僻壤兒童父老靡不環繞駕前瞻仰天顏歡呼雷動感激皇上永無既矣今蒙聖諭山西陜西緣邊一路地皆砂磧難事耕耘人多穴居類鮮恒業其土壤磽瘠固己生計維艱而地方遼遠疾苦無由上聞大小官員不能子愛小民更恣横索遂使里井日漸虚耗乃各府州縣官員借端私徴重收火耗督撫布政使等官又不仰體朝廷恤民至意糾察貪汚禁革加派反多瞻狥曲庇今外㓂已經蕩平惟以綏乂地方拊循百姓為急務大哉王言此誠古帝王視民如傷之盛心而億萬年長治乆安之要道也臣等竊思我皇上蠲賦賑濟輓運糧餉愛養元元至矣極矣今山陜里井艱苦者皆緣督撫有司不能仰體皇上軫恤黎民之意横索小民借端私徴重收火耗之所致也應請勅下山陜督撫仰體皇上撫恤休養之至意務期洗心滌慮正已率屬嚴飭所屬官員屏絶苞苴嚴禁私徴革除重耗其貪汚虐民者立行糾叅至筆帖式及衙門人役擅作奸弊滋擾地方者亦必嚴加懲處凢有不利於民應革事宜督撫即為確查革除或遇水旱灾傷當即奏聞不得隠匿如督撫仍前因循狥庇屬員不能撫綏百姓將督撫革職從重治罪可也上可其奏臣謹按山陝為沿邊重地疆宇遼濶山高土瘠民俗勁悍與他省不同尤國家所宜加諸意者皇上于此嵗兩省灾傷多方拯濟徳洋恩溥既已人慶更生至澄清兩省官方屢更大吏嚴禁私派重耗煌煌令甲申至再三兼之蠲貸頻頒遐邇胥悦近又因車駕出塞親見邊土磽薄民生艱窘之故恫瘝動念既訓飭寕夏人民謀生之道禮義之方又重飭官箴期於悉杜侵漁永除扣尅務使小亷大法上下肅清葢於凱旋振旅之時即更為綢繆桑土之計皇上洞鑒西陲之土俗民風優加徳意聖慮之深長誠無所不到也癸卯舉行祭告天地宗廟山川諸典禮停止崇上尊號先是議政大臣以平定厄魯特噶爾丹武功吿成奉表奏賀事下議曹詳查典例以聞至是禮部言臣等恭惟皇上仁並堯天化同舜日至聖作覩萬國咸寧四海時雍羣生樂育惟此厄魯特噶爾丹狡詐性成兇頑樂禍跳梁荒徼自外生成累年以來擾亂邊境與臣服我之喀爾喀為讐遂將喀爾喀凌虐侵殺闌入我境内烏闌布通之地與大臣拒戰為我師所擊大敗斯時因聖駕未親蒞軍致彼脱逃比噶爾丹跪於達賴喇嘛所與威靈佛像之前立誓再不敢干犯天朝皇帝之喀爾喀及邊界人民等語方免其追𠞰釋之而歸彼乃背負仁恩復行狂逞悖天虐衆違蔑誓言潛入巴顏烏喇地方奸宄不測煽誘蒙古諸部落皇上屢頒諭㫖曉以禍福許其投順彼仍怙惡不悛王上念此賊若不即行撲滅邊境人民必不獲遂其安養於是睿謀乾斷特申天討勒兵從三路出皇上祗告於天地宗廟社稷禡旗祭軷親綂中路大兵聲罪徂征遠踰瀚海素無水草之地直抵克魯倫土喇地方躬先士卒指示調度天威所至噶爾丹聞風喪胆棄其子女廬舍中夜潰遁皇上洞察噶爾丹狡詐預定謀畧料其必由西路逃遁果遇西路堵截之兵盡被𠞰殺潰散竊思噶爾丹在邊陲之西肆行兇惡而無忌憚者數十年皇上籌畫萬全綂率六師一皷而覆其巢一戰而奪其魄陣戮其妻孥薙獮其部曲盡收其輜重賊跳身潰遁殘喘遊魂狼狽困蹙茍延旦夕雖生猶死厄魯特之殄滅實在此舉矣皇上仍頒諭㫖許其來降而此賊狡黠昏迷猶思竄匿皇上神謨密運留將軍於塞上駐勁旅於肅州聯指臂之形竆狡兎之窟皆非衆人所能測度者也丹濟拉奔敗之餘覬覦餘糧復為我師奮擊敗遁聖駕于去年冬復親蒞邊方渡河至鄂爾多斯之地經畫調遣恩威並用賊之黨與歸命輸誠者不絶於道皆加豢養撫恤賊之乞憐於他部落者皆以計擒獲其使令彼奸狡一無所施困廹倉皇已至其極今年春聖駕復臨邊方西踰寧夏駐蹕於狼居胥山震揚天威分布禁旅授諸將方畧盡堵截其遁匿之路必期戮此小醜其子檻車就縛青海諸人又率衆來降苐巴奏請謝罪丹濟拉及阿喇布灘丹津俄木布等皆遣人輸誠嚮順賊氣索途竆自料擒獲誅戮决不能逃遂於閏三月十三日服藥自殺其黨丹濟拉等收其孥挾其骨引衆來歸厄魯特盡皆蕩平噶爾丹父子皆獻屍成俘塞外蒙古盡稽顙歸順神功駿烈顯爍如此洵亘古之所罕覩者也從此塞徼永享清寧昇平極於萬世皆由我皇上乂安中外之心至誠至仁行健之徳如天而堅定不移於終始决勝之智如神而首尾總歸於成算聖駕三次臨邊躬擐甲胄調兵籌餉備極焦勞冒暑衝寒乆歴煩苦惟以寧民為心安邊為念而聖躬之勞勩皆所不計是以昭格天心感通烈祖成功若此之隆也仰惟我皇上自御極以來愛養臣民則膏澤極其深厚勵精政治則夙夜殫厥心思文徳邁於百王武功軼於萬禩前者征滅反叛察哈爾平定三逆收克䑓灣海外咸入版圖從來未通中國之倭羅斯皆已納貢喀爾喀之三君長率其衆數十萬歸附為臣今者親征絶塞累年之㓂賊一旦掃除異域之藩部罔不臣服威武奮揚萬世永賴功徳巍巍自古帝王無能比倫報至之日大小臣工遠邇軍民無不懽忭踴躍巷舞途歌咸謂太平之業從此益增太平矣臣等詳稽載籍慶典允宜舉行應遣官祭告天壇地壇太廟社稷永陵福陵昭陵暫安奉殿孝陵其旗纛天安門太歳砲神及五嶽五鎮四瀆四海歴代帝王陵寢闕里等處俱應遣官致祭以仰答天地祖宗神靈之貺皇太后前應加徽號皇上前應請上尊號以俯􅇺四海臣民及外藩君長籲望眷切之情頒詔天下皇上陞御座受皇太子諸王大臣進表行慶賀禮各省文武官員亦應進慶賀表文聖躬三次臨邊始終經畫大功告成應命史館編緝平定北㓂方畧昭示無極此皆典禮所闗悉宜舉行以永光史册埀憲萬世者也議上上曰喀爾喀厄魯特原皆納貢之國因其交相不睦屢諭和好乃仍搆釁致啟兵争噶爾丹曾破囘子中之薩馬拉罕布哈爾哈薩克布魯特牙爾勤哈思哈爾賽爾門土魯番哈密諸國其所攻取降服者千二百餘城乃習於戰鬭之國也喀爾喀焉能抵敵是以七旗數十萬衆一歳之中喪亡畧盡喀爾喀之汗諾顏台吉等知朕豢養蒙古夙有厚恩悉皆欵塞來歸其時若不允其内附恩養得所必皆淪入于厄魯特則爾時噶爾丹之勢力不言可知矣允其内附而恩養之噶爾丹必假此釁端與我朝搆難凢此情事皆經熟籌受納喀爾喀非漫然而為之也噶爾丹假索取喀爾喀為名遂犯我邊境尚書阿爾尼帥蒙古兵逆戰于烏爾㑹之地我師大北噶爾丹乘勢遂直抵烏闌布通距京師未及七百里斯時諸王大臣及國家諳悉軍務之人不在行間者少矣適朕躬以違和還京左翼軍雖能勝敵而右翼軍不能制勝大臣而下以至軍士陣亡被創者甚衆噶爾丹亦自知其無濟歸路遭罹瘟疫得還科卜多者不過數千人耳當是時即預知其勢雖大損必復稱兵報怨六年以來烏闌布通之役時厪朕懐因是訓練軍旅諮訪形勢正經武之時噶爾丹果復舉兵㓂掠喀爾喀之納木扎爾托音於克魯倫之地朕思此賊不可以尋常㓂盜視之詔武臣三品以上咸陳討賊方畧會同詳議舉朝皆以為難其言賊當討滅者不過四人朕以為此賊斷當亟圖遂昭宣大義祭告於天地宗社之靈克成厥勲倘事或未成則受喀爾喀之内附致厄魯特之兵争其名恐未能免矣縻中國之脂膏事朔荒之邊塞其名恐未能免矣遠事征討竆兵黷武其名恐未能免矣今我師所至上天佑助無水之地而靈泉湧出不毛之地而庻草蕃蕪事悉稱意者此皆國家之福將士之勞所致也今西北永遠寧謐其不致蒙咎者即幸矣自今以往務益殫勵精始終如一治安之日愈求治安其祭告諸典禮俱依議崇上尊號不必行尋和碩顯親王臣丹臻等上疏曰臣等恭捧手詔敬誦訓辭凢厄魯特噶爾丹之始而陸梁繼而潰北終而竆蹙自盡本末情狀無不備悉而睿謀黙運親將臨邊以獨斷决群疑以至明握勝算意主於民安㓂息而初非輕事徂征功成於徳盛威神而並無乆勞師旅宣示中外􅂷法來兹巍蕩之烈允高千古矣顧臣下私衷請加崇尊號以光鉅典未䝉俞允臣等不勝驚悚從來備非常之至徳始建非常之大業建非常之大業斯集非常之顯名欽惟十餘年以來皇上永清四海手致太平下臺灣殱察哈爾定俄羅斯收喀爾喀從古未經服屬之疆土悉𨽻版圖被以聲教其梗化於朔漠以外者獨厄魯特噶爾丹耳今噶爾丹又復𠞰滅無有遺類其同族之瑚瑚腦爾衆台吉皆刻期來朝又素臣服於厄魯特之哈密諸囘人亦皆輸誠效命於是邊塞萬里罔有不庭薄海一家無思不服治化之隆蔑以加矣昔年三逆蕩平群臣請崇上尊號奉㫖不允及收復喀爾喀又經上請亦未允行於時廷臣再疏陳奏曾有諭㫖以噶爾丹尚未撲滅命將原本收貯閣中去年噶爾丹敗後外藩科爾沁王等即具疏請上尊號兹噶爾丹既滅群臣遭遇昌時欣覩盛事合詞上籲實出至誠粤稽往昔懿軌肇自二典堯曰放勲舜曰重華雖於二聖之徳無所增益而當時尊之後世述之僉以為允恊且我太祖高皇帝踐祚初元即膺覆育列國英明皇帝之號太宗文皇帝俯俞衆請亦進寛温仁聖皇帝之稱臣等謹披瀝愚忱激切誠懇仰祈皇上遠嫓唐虞近法列祖曲鑒下情特賜俞允臣等幸甚天下臣民幸甚為此具本謹具奏聞上曰所奏已悉著仍遵前㫖行聖祖仁皇帝親征平定朔漠方畧卷四十四

body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷二十一三月丁巳朔駕至南口諭軍中潔水泉避毒草上諭内大臣等曰凡安營之處次日水皆穢惡後至之兵復駐營于此其水尚堪飲耶爾等宜嚴諭切禁勿致水有汚穢又諭曰坌道之東山有毒草恐不知者牧放馬匹致有損斃可遍行曉諭命内大臣明珠與議政之列大將軍伯費揚古奏報喀倫外掘井得泉先是上遣副都綂阿的等往喀倫地方視水草囘奏氷雪未化仍前凝凍未能掘井上以用兵之道以速為貴大兵行期斷不可緩大將軍費揚古兵已定于二月十八日起程京城兵以二月三十日起程正當春季地脉將融之時雖氷凍可以疏鑿隨遣副都綂阿玉璽等馳驛往喀倫外掘井至是大將軍費揚古奏至言阿玉璽等于二月二十四日至巴爾幾烏闌和朔哨口自己至午掘井數處去氷尺許清泉湧出浚鑿甚易奏至諭大學士伊桑阿等曰今日大將軍費揚古所奏騐試掘井事著送學士三寳處令三寳轉奏皇太子其來奏事之副都綂阿玉璽朕已問明言凍止尺許掘之甚易其水即湓溢而出將此亦奏聞皇太子頃朕所經行之路修治未善石塊亦未盡除三寳仍馳驛往古北口視所修道路其糧車已行一二日或有礙行走與否所修之路善與不善俱著察明并詢問運糧官員速來具奏戊午諭出口輜重毋得停留上諭議政諸臣曰聞車輛及䭾載駝馬皆阻獨石口凡先行之車輛馬匹俱屬軍需毋得停留若一停留必愈致壅塞可速遣人往令随到隨行命防降人喀爾喀洩漏軍情是日駕至榆林侍郎安布祿解降人喀爾喀庫布爾至疏稱二月初四日遣喀爾喀車里木等十七人往探噶爾丹情形踪跡于本月二十四日車里木等還言我等于本月十二日至扎爾柴呼户徳勒蘇台地方見有百餘駝馬之跡隨躡其踪追至車本洪俄爾地方見百餘人俱係喀爾喀及詢問之有一喀爾喀言我係公西布退哈灘巴圗爾之姪軰名庫布爾特歸附聖主而來故我等帶至乞為轉奏謹將庫布爾台吉及同來之貝代一併遣往謹題奏聞上諭理藩院曰貝代著留住此地此無他故誠恐其馳驛而還將出師事妄行招搖漏洩音耗噶爾丹聞知或至遁走亦未可定故留住于此俟出邊後酌遣前往再語筆帖式納延泰凡有問大軍行間之事者但云不知慎毋洩漏并語筆帖式納延泰同來之人此事若有洩漏即汝之由務宜緘口斷不可語人再語侍衛鄂齊爾都喇爾彼處喀爾喀等若問軍中信息亦但以不知答之勿致洩漏再向庫布爾台吉言爾之事至京時已經奏聞因爾屢次奪取厄魯特馬匹殺戮其人奉㫖極其褒奬其貝代因有别用故暫留住遣左副都御史阿山于居庸關祭山川之神文曰惟神擁衛神京控引朔塞地靈攸萃天險夙稱朕兹親蒞邊方掃除狡宼惟神黙佑迅奏膚功爰遣專官䖍申禋祀尚饗庚申駕發懐來駐蹕石河命侍郎馬爾漢駐劄土木飛報軍情上諭議政大臣等曰大將軍費揚古題報事情先經㑹議到京即行馳奏今土木地方距京二百餘里俟到京之時再奏不免紆遲重複應遣兵部大臣一員住于土木地方一則料理驛站一則費揚古題奏本章到時一面開拆謄寫啟奏皇太子一面將原本馳奏如此則事務不致重複著議政大臣及部院大臣等㑹議具奏大臣等㑹議上諭極其周詳應即遵行所派大臣恭候欽㸃得㫖著侍郎馬爾漢去凡事一面啟奏一面送京務加謹宻馬爾漢未到之先著侍郎朱都納暫住土木料理俟馬爾漢到交代畢即速來馬爾漢既來則兵部止存尚書索諾和一人著學士綏色署理朱都納既暫留土木嗣後凡關兵部事宜著交大學士伊桑阿管理又傳諭曰前曾以調養馬匹及飲馬之法通行曉諭今見沿途馬匹汗尚未乾輒行飲水往返應差馳走者甚多朕尚愛惜馬匹不輕驅使此後湏有不得已事方可乗用其飲馬務遵前諭俟汗乾時始令飲水著再嚴加傳飭是日學士覺羅三寳至入奏相視道途事上問爾至何處即來脩治道途如何三寳奏曰出古北口行二十餘里即來所見道途脩治極其平坦上問遇于成龍否三寳奏曰于成龍尚未起身遇運米郎中噶禮等據言道途脩治甚善車輛不致躭延仰賴皇上洪福諸處皆可行走又西路之兵于喀倫外掘井清泉湧出得水甚易奏聞皇太子皇太子甚喜言此真屬天助前者西路之兵惟以水為慮今無復憂矣臣奏畢出遇大學士阿蘭泰尚書馬齊等問知其故俱踴躍歡忭言從來蒙古地方至四五月時尚凍今二月内於喀倫外掘井水泉湧出不勞而得上天眷命國家佑助聖明凡事悉如皇上所料賊宼噶爾丹指日撲滅無可慮矣辛酉喀爾喀貝子盆楚克告請從軍許之是日上駐蹕真武廟地方喀爾喀貝子盆楚克同伊子台吉沙穆必爾至奏言皇上親綂大兵臣父子願于軍前効犬馬㣲勞上曰善爾父子可俱從行随賜以蟒衣綿甲袍服帳房駱駝羊馬等物又命其在京之子台吉根敦渣卜仍囘本部落盆楚克叩頭奏曰臣等遐荒蒙古受皇恩甚深今又荷此殊恩臣父子惟于行間致命効力而已乙丑申定出口軍行事宜是日上駐蹕毛兒峪諭議政大臣等曰先令夸色往歐徳哈爾哈等處偵探消息一切事宜已有諭㫖其間情事著夸色言之至出口後凡牧馬駐劄行走之處應行預議將此一併㑹議具奏議政大臣等㑹議奏曰查先經㑹議皇上駐蹕立一營八旗前鋒等二營䕶軍驍騎十六營漢軍火器營兵随礮兵丁炮手綿甲兵四營部院大臣官員筆帖式等一營左翼察哈爾兵二營宣化鎮綠旗兵一營又前曽奉㫖至多雲地方照舊排列環營又曽㑹議御營兵前鋒鑲黄旗正黄旗綠旗兵之馬于路左放牧正白旗正紅旗火器營兵之馬于路右放牧今議放馬列營之處仍照前議奉㫖照前議行甚當諭随軍車輛結隊前行上諭議政大臣等曰觀車輛輓行有越前者有在後者若出口後如此散行則在後車輛恐被掠奪應令車輛自出口後俱結隊前進若牲畜疲乏者留置著驛站官員看視命以掘井事宜交前鋒綂領碩鼐先是以掘井事務交署前鋒綂領夸色至是遣夸色至歐徳等處地方偵探上諭議政大臣等曰今遣夸色往歐徳地方約計兵丁所需應掘井幾處可交與前鋒綂領碩鼐料理命調京師馬匹至軍前備用上諭議政大臣等曰内廐馬撥一千匹兵部馬撥五百匹八旗佐領所養馬内擇其肥者撥一千五百匹共三千騎于每佐領所留䕶軍一名内酌量派出令同内廐人將此馬趕䕶于三月二十日啓行出張家口約行二十餘日可到此馬到時如正當對敵之際則給兵騎用甚有裨益即旋師時散給俾彼疲瘦之馬得以空行不致捐棄則于兵丁馬匹亦大有濟其趕䕶馬匹之䕶軍與内廐人亦應照出征人例給馬四匹著㑹議具奏議曰上諭所及已極周詳三千馬匹于三月二十日起程出張家口行二十餘日令至克魯倫河歐徳地方㑹齊其鄉導之人應交理藩院派出二人于張家口守候令領路前進奏入奉㫖朕已派副都綂管上駟院事宗室阿喀納二等侍衛鄂克濟哈阿齊圖架鷹人巴爾拔令賫囘皇太子所送馬匹可即以此馬令其帶來命侍衛馬武選擇宣鎮兵先是上諭兵部宣化府兵三千過多可减去二千止留一千則馬有餘至是諭議政大臣等及大學士伊桑阿曰聞前任宣化總兵官許盛推托有病並未操練兵丁所以宣化鎮兵甚不適用著遣侍衛馬武侍郎阿爾拜前去揀擇兵丁不堪用者撥囘惟二十四位礮需用䕶送兵丁著選足帶往前行随諭馬武阿爾拜曰爾等此去亦傳諭總兵官白斌云聞前任總兵官許盛推托有病兵丁未經操練所以宣化鎮兵舉無足觀亦甚不堪用兵丁全在精鋭若兵丁不堪則多帶反悞朕之行師矣諭尚書班第随大軍設驛理藩院等衙門奏言三月初五日奉㫖諭尚書班第云跟随大兵安站甚屬𦂳要爾可留後安站而來著再傳諭驛站官兵凡有患病物故留於驛站者令官兵善視之大軍囘槩加賞賚其某站現有某官著開明具奏兵丁馬匹駱駝有羸瘠者令管站諸人收養俟旋師時各歸本主庶不致遺棄著同大學士伊桑阿㑹議具奏議曰随師安站先曾詳奉諭㫖已經定議今又以驛站甚屬𦂳要令尚書班第留後安站及傳諭驛站官兵於諸事甚有裨益俱應欽遵上諭施行從之命早行晚炊上諭議政大臣等出口以後侵晨啓行日中駐劄衆皆每日一餐丙寅駕至獨石城命斬木以備兵器上諭領侍衛内大臣等曰兵刅之佳者人未必盡得口外遇有樹木著随從人等取以為梃無過五尺亦兵器也丁卯上出獨石口駐蹕齊倫巴爾哈孫諭犄角安營便宜取水上諭議政大臣等曰有河之處猶可相接駐營至掘井地方若不按營伍接連駐扎則鑲黄旗兩營之人取水飲馬皆穿大營而行或致爭水鬭毆亦未可知往前二三日程俱有河仍令照常緣河就水從便駐扎至掘井之處以井居中大營并鑲黄旗兩營互相犄角如此則取水飲馬甚易不致争鬬其井著派官兵看守無使汙壞後隊兵著接遞交付申令晚炊早發上諭内大臣等曰今日營中見仍有晨炊者在口内勿論自今日以後五皷起程時不得舉火晚刻舉火炊飯在所不禁可將此嚴加傳示又諭曰今地方寛廣不致擁擠三旗輜重令各按旗分列隊並行既不早餐則晨興時可各撤帳房速行裝載將此通行曉示是日頒賞各營軍士羊隻衆軍士跪奏曰我等未出兵時屢膺聖上重賞今出兵未乆並無汗馬㣲勞又䝉恩賜倘遇噶爾丹時惟有効力圖報使盡殱滅而已奉㫖已悉爾等歡欣奮勇前途遇賊惟視爾等之効力矣復賜貝勒額爾徳木圗巴克席胡爾親随台吉畢立克圗呉勒木濟呉爾圖納蘇圗畢羅札納札木素逹木楚克閒散台吉布逹喇席希卜及挽車喀喇沁蒙古羊隻自是以后随征出哨運米人員皆酌賜牛羊遣戸部侍郎阿爾拜致祭獨石口山川之神文曰惟神峙臨邊塞襟帶朔方峰壑髙深靈爽夙著朕兹親蒞邉外掃除寇氛特遣專官用申禋祀惟神黙佑迅奏膚功尚饗戊辰上駐蹕諾海和朔嚴飭晨炊晚發上諭領侍衛内大臣等曰今日朕自五皷起行見炊煙甚多朕每日一餐凌晨即撤營就道已有明㫖乃於朕起行之後軍士尚在營中眠食行李淹遲著領侍衛内大臣内務府總管武備院總管將鄉導及駱駝頭目等稽遲行李之故察明囘奏領侍衛内大臣佟國維蘇爾逹索額圗馬思喀同跪請罪曰今日軍士舉火炊飯併行李稽遲皆由臣等庸劣不能管攝之故也敢請皇上將臣等四人嚴加處分則衆皆知懲矣奉㫖爾等所奏亦是與軍士無渉記罪俟至京城議處此際爾等宜効力贖罪又諭曰兵丁有遲至三皷時始到者此時燈火自在所不禁若三皷後舉火張燈則斷不可矣著通行曉諭己巳上自出京常以休息士馬為念行十餘日皆以漏盡輙起程而行李尚不能早至軍士人等不得及早安營上因是五皷即興親視䭾載前發方啓行比駐營時日甫已刻行李已畢至矣於是士馬大得蘇息是日駕至青城傳諭領侍衛内大臣等曰今日行李行走甚善無可議矣但侍衛官員人等前令各領行李而行今並未見有随行者嗣後著各領行李至駐扎處各相助安營朕每日常於野次如此蹔坐若於朕前過者俱勿下馬又諭侍郎朱都納曰此後驛站馬匹勿令恣行馳騁如有應疾馳事務即以奏聞是日申刻上出行宫令喀爾喀貝子盆楚克等射射畢上親率諸皇子并侍衛等射上連發五矢俱中兩翼侍立蒙古諸王台吉及貝子盆楚克等皆驚異讚美曰射之神竒有如此耶矢不虛發非惟臣等目所未睹亦耳所未聞皇上英武誠邁世矣於是衆皆跪請視皇上之弓上笑以所持弓授親近侍衛呉什傳示衆皆遞相控引竟不能張乃復相顧驚嘆曰如此勁弓如何引滿耶既畢上入行宫薄暮又傳諭曰天氣隂晦恐即有雨各將馬匹加意苫䕶著通行曉諭庚午諭曰今日因天隂暫行駐扎馬匹加意苫䕶著於上駟院侍衛馬什所指引地方牧放又奏事敦住傳㫖今既駐蹕令衆皆炊食又傳諭領侍衛内大臣等曰今日當至滚諾爾地方駐蹕以天氣隂晦暫駐于此過滚諾爾至揆宿以前俱有可燃之薪目今樵薪缺乏各宜節省著通行曉諭領侍衛内大臣等遵㫖察閲官兵車輛共一千一百有餘具奏奉㫖爾等所􅂝車輛如許朕深以為喜是皆朕之軍資也除大臣官員富室人等外察其見在遲悞不能行者各給一牛俾令輓到大將軍伯費揚古等奏報率兵先進費揚古奏言副都統阿玉璽等於三月初八日已到臣處看得西路大兵甚衆如作一處行走則水草雖有而牲口衆多春草必至踏壊為此臣率領自京城發來大兵前行將右衛大兵留一日程使接續行走于十三日可至喀倫至喀倫時詢明喀爾喀之明白鄉導約計到翁金土喇日期另行具題外查得兵部移文内開侍衛海青傳㫖新經造出四十八位礮内著將八位每旗派礮手一名馳驛速送大將軍費揚古軍前等因于二十日文到即將右衛副都綂馮國相八旗章京八員兵八十名留于歸化城西四十里于山西捐助八百餘匹馬内撥給馬一百四十匹侯礮到日令收取速趕大軍前來一面行文驛站筆帖式等送往軍前礮位若到某驛到日即行申報又曽屢次遣中書筆帖式等催促前去據殺虎口驛站筆帖式碩色雖報稱自京送來礮八位于三月初三日已到殺虎口及問副都綂阿玉璽云我初六日到歸化城礮猶未到㸔此礮位勢必遲悞因接續安驛令將礮位作速送到已遣筆帖式前去若大軍至喀倫礮猶不至臣等恐因守候礮位以致師行遲延今酌量添留官兵著將礮位作速趕赴大軍謹具奏聞奉㫖著示議政大臣等令收貯辛未駕向滚諾爾前發雨雪交作上既至駐營處御雨具竚立曠野侍臣以行宫既張天寒雪大請上入行宫上曰軍士未盡安營朕何忍就帳房以自逸俟衆軍士結營畢始入行宫俟營中皆炊飯然後進御膳至晚遣親近侍衛海青以駱駝載􅃠城内所設帳房及食物柴炭賜輓車未至之人令棲息舉火是夜寒甚衣盡沾濕未得食者甚多忽見皇上欽遣人至衆皆歡呼曰我等得更生矣於是無一人為寒所苦者随諭曰雨雪如此天氣甚寒馬雖遮䕶亦寒慄不能食其痩者猶可無恙肥者却易致凍斃宜將寒慄之馬向順風馳二三里許令人圍繞之馬既稍溫自然便溺食草如此則無妨矣著通行曉諭壬申命黑龍江將軍薩布素率兵趨克魯倫先是上遣前鋒叅領納林往令將軍薩布素綂黑龍江及盛京寜古塔三路大兵前進至是納林還代薩布素奏言臣今老病衰殘嘗患不能仰副皇上諭㫖不勝惶恐業已具疏陳奏皇上若允臣請臣當率所屬兵丁竭力報効若仍命總管三處兵丁則衆兵㑹合雖在一路但係各處調集之兵人心不一亦未可料使俱在一處行走一處結營則不能整齊即至交戰之時欲參雜排列一同臨陣似亦甚難詢問喀爾喀之知地形者云行兵之路地多曠野雖間遇有山嶺皆可相並而行故臣意衆兵㑹合之後日間各取路並行各設斥堠昏夜駐扎亦各結營壘戰陣則各行排列分派隊伍遇有指揮則所指之處無可借端推諉而各所訓練官兵心皆固結其壯勇争先實意効力之人自不致遺漏而官兵皆無不鼓舞矣臣等之兵若于三月内起行俱遵皇上指示若三月内不出則于四月初草生之時豫先啓行於雅爾濟秦周圍形勝之地屯扎其寜古塔兵令往磨爾昏地方周圍相近處屯扎盛京兵令擇相宜處前進屯扎如此則或中路調用或遣赴别路俱不致遲悞于軍務甚為有益奏上得㫖盛京及寜古塔兵依將軍薩布素所奏前進屯扎薩布素著率所屬兵一千五百賫三月糧於四月初旬啓行前來克魯倫地方有生巴爾虎之人若來時相遇則收集同來又聞喀爾喀阿里雅扎薩克車陵渣卜等七台吉在俄濃地方此信不甚明晰應令行在兵部以印文遣理藩院才能撥什庫自邉外竭力星馳遞至薩布素處俟囘日重加賞賜一面移㑹京師亦行文知㑹彼處是日上仍駐蹕滚諾爾以軍士車輛有未至者諭皇長子及領侍衛内大臣馬思喀曰稽留嶺上車輛并䧟泥淖内者其車主令各帶行李俱留皇長子營内仍以牛賞之又諭領侍衛内大臣等曰凡有車輛之人欲往迎者即刻遣人迎之今内大臣等已率衆往矣著通行曉諭癸酉駕次揆宿布喇克申定軍行次序上諭領侍衛内大臣曰出古北口之前鋒兵現今已到應令合于前鋒兵營一同先行其次著兩路綠旗兵察哈爾兵随行其次著鑲黄旗正黄旗兵在朕軍前行朕軍後著正白旗正紅旗随行其餘各旗俱兩旗合軍照此随行命早炊歩行上諭議政大臣等曰沙崗難行馬匹勞苦是實自滚諾爾地方至撥宿布喇克原丈量六十七里今遣人丈量止五十九里相隔甚近自揆宿布喇克至和爾博四十二里自和爾博至胡什木克又六十里道途遼遠特分為兩程自胡什木克至噶爾圗四十里自噶爾圗至滚諾爾四十八里雖有沙礫途近易到但此數程盡皆沙礫僕從人等俱著歩行兵丁等有愛惜馬匹願歩行者亦聽既皆歩行仍令照常晨炊俟日出時起程可日食兩餐僕從人等若因歩行怨望則朕亦即歩行過此沙崗數處至平坦之地斯馬匹不必慮矣臣謹按大軍逺征莫要于糧餉馬匹理應樽節愛惜以留餘裕惟我皇上當糧餉豐足時即令每日一餐馬匹壯徤時即令衆皆徒歩人初以為難及時歴八旬軍食不致匱缺往返五千餘里馬力不致疲乏然後知聖慮深逺衆皆莫測開闢以來懋建宏勲未有若此之盛者豈偶然哉慰諭蘇尼特多羅郡王額駙薩瑪渣時薩瑪渣率領二等台吉渣卜等來朝願從軍効力奉㫖自噶爾丹作亂爾等旗分信使往來供應驛馬食物顯著勞績朕豈㤀之至秋間定行重賞爾囘時可徧諭爾旗諸王下軍民人等諭畢薩瑪渣等免冠頓顙奏曰臣等係窮荒蒙古叨蒙皇恩至有今日屢遭天灾困厄之際幸荷皇上頻加賑濟曲賜拯救此恩此徳雖多方盡力豈能報答馬匹糧餉又何足云今聖駕親臨臣等雖歩履匍匐亦願跟随効力仰奉聖㫖更無别言謹此謝恩上曰王既年邁又常足痛可免從征亦不必謝恩台吉渣卜垂渣卜蘇代納木渣卜畢立克等俱令随征諭畢薩瑪渣等不勝欣忭仍陳奏謝恩甲戌賜軍士牛以助輓稽滯車輛上諭議政大臣等曰朕令皇長子留後將車輛盡皆趲出惟餘八輛無車夫亦無牲口著傳諭此八輛車主即赴皇長子處以牛賞之又諭皇長子及内大臣馬思喀于滚諾爾地方察出車輛沉重牲口疲乏者賞挽車牛一百十頭命酌留凱旋糧米上諭議政大臣等曰朕囘軍時必由此道今于成龍所運米糧既留各站應將随軍之一千三百輛車内所載米糧亦量留庫勒諾爾地方俟囘軍時食用如此則目今前進之車輛既輕而囘軍時取米亦易這留米之處將蒙古官軍酌量派出令其㸔守所留米袋各寫本人姓名及米數明白交與蒙古官兵議政大臣等將所留米數人名可察明交付又諭尚書班第曰凡坐塘之處俱各安放米三石運獨石口所貯米十石分置第一第二第三驛自第四驛以前取于成龍運到之米每驛安放三石皇太子奏報選馬備用奏曰恭請父皇萬安欽遵父皇諭㫖解馬三千已于三月二十日發行外本月十二日臣諭大學士阿蘭泰曰馬者大兵之急需若不飼秣預備倘倉猝用馬則不能解往應付應將上駟院馬匹酌取肥秣其太僕寺孳生馬羣當如何取來令兵部飼秣可交議政大臣集議随議云據問太僕寺少卿佛保言孳生馬羣共二萬九千餘匹内可騎之無孕牝馬及四嵗馬駒可得二千許匹今方春時馬未蘇息往取至此則益痩損飼秣之時不能立肥迨四月間青草既出馬已蘇息遣太僕寺賢能章京前去除此二千許匹外再儘數選出另為一羣于水草佳處小心肥秣再于八旗察哈爾人等分喂馬匹中亦酌選其可騎者小心肥秣預備倘有取用即自牧養之地解往臣即令太僕寺少卿佛保前去揀選馬匹小心肥秣以備取用餘如所議緣秣馬事關重大謹具奏聞得㫖深嘉許焉尋皇太子又奏曰臣令牧羣侍衛常三同尚書馬齊内府大臣多璧㑹議據查上駟院定例御馬圏五所甕山一館每館有聽用常馬二百匹南苑六館每館有常馬一百匹此内御馬圏五所各馬一百四匹甕山館一百五十匹共留出六百七十匹其他俱于三月二十日起南苑放青自放青之日為始不支草料又查天津喂養十四大羣之馬挑出常馬兩羣共一千六十三匹此内除廢疾之馬合算廐中餘馬不足一千八百是以天津喂養十四大羣挑出常馬兩羣不令南苑放青全取至此除廢疾外儘數入館喂養盡肥之後再奏請㫖得㫖所奏甚是大抵我師中不湏復用馬矣不必待其以牧肥具報當不時察核之皇太子又奏曰前者議政大臣以採買蒙古馬匹事具奏奉㫖出兵之後著留京大臣啓皇太子有願賣者聽其收買不得抑勒頃欽遵㑹議查去年科爾沁和碩達爾漢親王額駙班第奏言今年兵丁馬匹俱乗坐出征應于來年五月間再買馬匹在上都等牧羣中肥秣備用等語科爾沁路逺往買馬匹必湏時日應停採買至兩烏朱穆秦兩巴林克西克騰兩蒿齊特喀爾喀羅卜臧貝勒三呉喇忒毛明安等旗馬匹稀少已經停其採買科爾沁土謝圗親王沙津屬下五旗喀爾喀車陳汗屬下旗分去年買馬竟無所得歸化城兩土黙特兩喇喀沁兩翁牛特阿祿科爾沁兩扎魯特兩阿霸垓兩阿霸哈納爾兩蘇尼特四子部落敖漢奈曼喀爾喀達爾漢親王諾内等旗買馬不能足額六鄂爾多斯等旗買馬足數今次應酌遣部院章京赴此項旗分共買馬二千或撥八旗蒙古驍騎叅領或賢能章京一同遣往與扎薩克王貝勒貝子協理台吉公視購買如抑勒強買者事發治罪所用銀兩自户部支取帶往所買馬匹各旗撥官兵趕解與去員一同押䕶前來到後兵部請㫖撥置臣已准其所請為此具奏上曰兩喀喇沁兩土黙特敖漢柰曼數旗著停其採買其他旗分共買二千匹可也乙亥大將軍伯費揚古奏報自喀倫分兵兩路進𠞰先是上有㫖諭費揚古大兵駐南口之日副都綂阿玉璽至聞鑿井易成不勝喜悦如以爾軍到喀倫來報可量擬到翁金之日具奏再將到土喇之日詢喀爾喀熟諳鄉導開具地名按日計期來奏至是費揚古奏言臣等率領大兵于三月十三日至喀倫十四日將京城兵右衛兵分派十五日臣費揚古率京城兵及大同之綠旗兵于東路前進揚威將軍覺羅恕書率右衛兵于西路前進細問鄉導等大槩分算程數計十八程于四月初三日至翁金二十一程于本月二十四日至土喇二十三程于二十七日至巴顔烏闌又據副都綂馮國相報稱皇上發來礮八位於三月初七日已到拖里胡地方臣等若等候則致遲悞遂留都綂伊勒慎每旗派䕶軍叅領二員䕶軍一百名留在喀倫䕶礮作速趕來俟至翁金時臣等另行奏聞奏至上命示議政大臣等議政大臣等閲畢奏大將軍費揚古所行甚善俟至翁金時再行奏聞今無庸議奉㫖若至翁金再議則四月初三日始抵翁金比至翁金啟奏又須數日俟其時再議豈不遲悞著將應否守候車輛前行之處再議具奏議曰每兵各馬四匹每四人令同往一處給騾一頭其米糧各物俱在此内並不致有悞凡此車輛原屬多帶若能趲至則令随行若不能至亦即聽之不便等候衆人車輛仍應照常前行奉㫖不等候車輛甚是大軍照常前進俟至喀倫將應留之處再議又傳㫖撫逺大將軍費揚古奏西路兵于四月初三日至翁金二十四日至土喇二十七日至巴顔烏闌著諭衆知之尋諭費揚古曰爾至喀倫擬到翁金土喇日期之奏於三月十九日駐揆宿之清晨已到據云到土喇在四月二十四日但我師畧阻雨雪守候輜重雖急行斷不能在二十四日之前到土喇爾軍於三月十六日之雨或有停留可將日期另開註具奏如無停留則到翁金具奏之時另行奏明爾兵馬如何糧車已到何地聞寜夏兵聲息否以上諸事有疏必奏以塞外軍行情狀諭皇太子上諭皇太子曰朕今逺出歴覽蒙古地方與所聞逈異水草既佳樵蘇頗足馬矢雖濕塞外榆栁百草皆可焚燎喀倫以内水泉無庸疏鑿雖大兵一處同行水草柴薪斷然無悞但慮天氣無常時忽隂晦可為憂耳惟晴燥斯大幸矣出行以來間遇雨雪數次而並無所苦靑草既茁羊可飽食馬亦從此可與枯荄并秣惟祈上天眷佑無雨無雪則可立奏膚功矣敬請皇太后萬安朕躬及皇子諸王以至臣工軍士皆無恙皇太子佳否酌留凱還糧米于揆宿布喇克上諭兵部理藩院曰所帶米糧與其載至庫勒諾爾地方留貯不若即留此處著每旗各派大臣一員部院大臣一員章京一員並内府驍騎各三名謹視收貯俟收貯畢大臣等即作速前來著所派章京驍騎同蒙古兵丁謹慎㸔守兵部随奏請派收貯米糧大臣得㫖著内大臣明珠散秩大臣博第蘇永祚侍郎戴通副都御史阿山留此收貯再將新滿洲侍衛派出十員令即刻伐取栁枝將所留之米下籍上覆周圍苫葢謹慎收貯交與㸔守之人㸔守之章京驍騎等各有所帶之米應無庸議其蒙古官兵應酌量給與米糧朕軍中尚有餘米著同大學士㑹議具奏随議蒙古官兵二十四人每名給兩月口糧得㫖蒙古官兵不必帶行糧前來將此米加一倍給與著尚書班第從于成龍處領取分給又諭領侍衛内大臣索額圗曰内大臣明珠散秩大臣博第蘇永祚等將所留米糧料理收貯畢著速行前來留侍郎戴通副都御史阿山在彼處此路漢軍火器營兵有願留米糧者著戴通阿山料理收貯交付看守之人亦速行前來是日西路督運侍郎王國昌等奏至言西路大兵五十日口糧已撥湖灘河朔倉米分為六隊于二月二十六日陸續起行丙子上駐蹕和爾博命趣中路兵前進上諭議政大臣等曰前曽著前鋒兵綠旗兵在察罕諾爾地方等候今大將軍伯費揚古兵業已前進若大兵到時始行起程則遲悞日期矣現今古北口綠旗兵在昻幾爾圗地方彼等皆有車輛若不令前進俟大兵到時始令起程則大兵又致稽留爾等其集議具奏議曰上諭極是大兵行程不為甚緩前鋒兵綠旗兵俱宜在前行走應即遣人諭令乗便先行奏入奉㫖既云應令前行其作何前行並應隔幾程行走至何處扎環營各兵於何處總㑹俱未向鄉導人訊明議及但云應令前行可乎著再議具奏議政大臣等又議前鋒兵綠旗兵不必在察罕諾爾地方等候著古北口綠旗兵現在昻幾爾圗地方者酌量䟎赴在前之綠旗兵其兩黄旗兵到察罕諾爾時令越過在前行走已經奉㫖應從察罕諾爾即扎環營問鄉導萬舒克云至克魯倫河俱可兩旗並行今仍著兩旗並行前鋒兵距綠旗兵察哈爾兵兩日程前行綠旗兵察哈爾兵距兩黄旗兵一日程前行在御營後之兵亦照此行走俟出喀倫時將各兵總㑹於何處及前鋒如何行走之處再題請㫖奉㫖前鋒兵著距綠旗兵察哈爾兵一日程行走餘依議丁丑上駐蹕昻幾爾圗侍衛馬武等甄别宣鎮兵復命先是上遣侍衛馬武侍郎阿爾拜察閲宣化府綠旗兵至是還奏臣等出獨石口於十四日至和爾博地方行及總兵官白斌之兵轉傳上諭白斌言聖明所聞甚確宣化府兵實屬不堪但此一千五百名兵經臣遴選其中雖有一二不堪用者然斷不至貽悞等語臣等觀張家口兵七百名甚優䕶送礮位兵百名看守礮位鳥鎗兵三百名此四百名兵斷不可少惟宣化鎮標馬兵四百名内有一二不堪者然亦决不至貽悞因令總兵官白斌仍率所帶兵一千五百名前往察罕諾爾地方候㫖命尚書班第前行設站上諭議政大臣等曰尚書班第随大兵後安站今若令其在前當於事有益著召班第來令於前途相距一宿地方安站又諭兵部曰前途既設立驛站凡疲乏馬匹駱駝等物令皆於驛站留養爾部給以印文囘時執文領取極為明晰不致遺悞仍傳示驛站人等若將所留駝馬等物如數全交本人則自加體恤如慢不經心致馬匹倒斃則留於伊處何益前已有㫖著再加曉諭又諭領侍衛内大臣等曰馬匹關係最要今沿途既設立驛站凡馬匹及輓車牲口如有疲乏可俱留於驛站此時青草正發旋師時此等馬匹必皆肥壯如此則不致傷損大有裨益凡疲馬切不可輕棄將此通行明白曉諭諭綠旗兵随大軍後行上諭領侍衛内大臣索額圗等曰今日在途見古北口綠旗兵車輛所載甚重又無相助之人若令伊等前行則其所䭾載行李每日有我兵重載躡後行走甚難若留伊等在後則彼皆得親身幇助而行著㑹議具奏議政大臣等奏上諭極是今應將古北口綠旗兵留御營兵後視其力能行則随所遇旗分在後行走如力不能行則于漢軍火器營後行走宣化鎮綠旗兵若力能行走仍照常在前行走若力不能行亦留在御營兵後同古北口綠旗兵一處行走可也奉㫖著馬武前往諭止命總兵官馬進良押紅衣礮随行上諭曰昨㑹議宣化鎮兵令其得便先行已經行文今古北口兵現在胡什木克地方著令駐扎等候自宣化府所帶紅衣礮二十四位著交付總兵官馬進良随大兵後行戊寅上諭曰今日所駐胡什木克地方止二十二里沙磧亦畧减各人車輛到時將馬匹于好草處放牧飲水休息牲口再行前進著傳諭知之命尚書庫勒納查核驛站上諭議政大臣等曰此番前來官兵皆係情願効力之人曽云應用物件豫備充足務期成功兵丁每名部給肥馬四匹今或將疲痩牲口兩匹牽挽車輛且於米糧之外裝載各物或有載鷄鵞等物者朕以成功為念鷄鵞等物尚不􅂝帶又將疲馬留于驛站喂養屢經傳諭並嚴諭驛站人等今見疲痩之馬並無一匹留于驛站雖極痩仍帶之而行此等馬匹若皆留養目前現有青草自然得肥囘時可以得力若帶往前去則徒然倒斃且或有馬匹已斃將僕從人不留置驛站攜帶前往者此不過耗費米糧而已又何益乎今著領侍衛内大臣内務府總管䕶軍綂領副都綂夸蘭大等嚴行稽察將兵丁疲乏馬匹交與驛站喂養部給四匹馬内若有疲乏二三匹者雖携去無益察明即並本身留于驛站將伊臕壯之馬别給與人其痩馬仍留與本人令于青草處牧放肥壯等候旋師其察核沿途驛站馬匹并存留牲口米糧等物俱係緊要著派在京尚書庫勒納自備馬匹前來自存留米糧馬匹之驛站以至喀倫令其往來稽查如此則于事大有裨益將此曉諭在後夸蘭大等知之諭皇太子塞外情形上諭皇太子曰朕躬安皇太子佳否皇子及臣工軍士皆無恙但雨雪雖不甚急亦不甚間斷朕心為此稍覺憂勞蒙古居此者喜云吾土歴年亢旱草不萌生窮困已極皇上駕臨始有雨雪草皆茂盛觀此則行路之人與居家之人其情大不相侔矣未知京師何如此間之草羊可飽食馬於沙際雜枯荄而食尚不得飽草色大槩漸佳水泉給用朕所經歴雖盡與大兵偕行亦可無悞薪燎具足後此則未之知也己卯上仍駐蹕胡什木克上諭曰問之鄉導據云察罕諾爾地方形勢藏蓄地寛草美凡應留牲口其能至察罕諾爾者令至彼處再留其必不能至者即留于此處可通行曉諭庚辰駕駐噶爾圖辛巳上仍駐蹕噶爾圖諭領侍衛内大臣等曰今日寒冷各將痩馬置帳房内以所帶餘米飼之亦為有益人尚可無恙也著諭衆知之命大學士伊桑阿致祭風雨及口外山川之神文曰兹因厄魯特噶爾丹逆天梗化擾亂邊徼朕綂率六軍聲罪致討親蒞塞外以期蕩宼安民必頼山川效靈風雨咸若始于師行克有攸濟比日以來雨雪間作節候未調恐稽征邁朕心夙夜靡寧惟神黙贊撻伐之逺圖益助羣情之豫順俾時和氣協早滌邊塵軍事有裨神功聿懋是用特遣專官䖍申告祭神其鑒之先是數日風雪時作致祭後風止雪霽天氣日漸融和矣壬午駕至滾諾爾命留疲馬牧于郭和蘇台察罕諾爾地方上諭領侍衛内大臣等曰明日駐宿處草甚豐美凡痩馬俱著留牧彼地癸未上駐蹕郭和蘇台察罕諾爾命蒙古監牧上諭理藩院曰所留牧放馬匹甚屬緊要凡水草俱美之地蒙古知之甚悉其牧放看守俱交與蒙古所留喀倫之馬已交阿霸垓呉爾占噶喇布王此處所留馬匹著交與該王所屬脩路都綂竒塔忒至所留跟役伊主不必給米俟在後于成龍等米車運到酌量撥給甲申駕至胡魯蘇台諭鄉導䕶軍綂領托倫曰今日天隂或恐有雨馬匹俱勿解鞍應苫葢者加意苫葢嚴蒙古盗馬罪先是上命領侍衛内大臣馬思喀查郭和蘇台地方驛站存留馬匹牲口僕從數目具奏至是馬思喀查明奏言阿霸垓卓禮克圖王之都綂竒塔忒等云此所留馬匹牲口既交與我等即派本旗驍騎八十名看守查現在所留馬匹牲口計一千四百有餘在後兵丁如有冄留馬匹牲口者則共至二千矣交與八十名驍騎看守似屬不足若將三百匹分為一羣可作七羣每羣計驍騎二十名則用一百四十名除此八十名驍騎外應増蘇尼特之薩瑪渣王阿霸垓之呉爾占噶喇布王兩阿霸哈納爾兩蒿齊忒此六旗每旗派章京一員驍騎十名擇好水草處謹慎放牧看守仍交與竒塔忒等又大兵馬匹已留與驛站恐有賊盗妄行倘被拿獲時當作何嚴行治罪之處請㫖遵行奉㫖被獲賊盗著拿候餘如議遣員外郎雅圖宣諭督運于成龍諭雅圖曰朕以糧運事務緊急特命侍讀學士喇錫馳召于成龍面有指授今思車上所載太重恐難速行又命爾雅圖傳諭于成龍爾既見于成龍令彼將多帶之米數千石酌留所過驛中交蒙古官兵看守其米既减車上遂輕其行可無悞矣俟至喀倫再將正額米留一千石其車上退出牲口即聽于成龍調用出喀倫後倘有用米之處朕即遣官催來倘無用米之處亦遣官止之乙酉上仍駐蹕胡魯蘇台申定行軍隊伍上諭議政大臣等曰兩黄旗已行在後六旗著每三旗結隊而行火器營陸續進發領侍衛内大臣公福善奏報漢軍火器營兵雪阻情事先是上諭福善爾留庫勒諾爾地方收貯出古北口王以下及官兵所帶餘米至是福善奏言臣於二十四日將滿洲四旗米已經收貯二十五日漢軍都統李正宗諾穆圗等咨稱沿途雨雪交作泥濘難行十九日派出官員兵丁我等親視脩道礮位火藥車輛僅能運過現今派夫搭橋修道等語據此奏聞奏至上命示議政大臣聖祖仁皇帝親征平定朔漠方畧卷二十一

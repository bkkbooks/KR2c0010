body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷十一七月甲申朔郞中格什等奏報巴圖爾額爾克濟農遁走格什等奏言臣等至寧夏會同將軍尼雅漢等率領西安滿兵全軍總兵官一員酌帶綠旗官兵四千因途徑窄隘恐難並驅定議將軍尼雅漢親率兵四千出汝吉口往覓巴圖爾額爾克濟農副都綂栢天郁總兵官馮徳昌等率兵四千出大威口圍截巴圖爾額爾克濟農住居西北及到口駐扎之日守口兵報稱口外附近居住巴圖爾額爾克濟農人内有四人來見拆邊牆即廻馬飛馳而去臣等隨星夜前追及之於阿里渾烏素之地令巴圖爾額爾克濟農跪宣聖㫖巴圖爾額爾克濟農言我爲噶爾丹所敗來歸皇上給臣以賀蘭山陰之地安插皆沐皇恩得以􅊃生今將置我等於察哈爾之地値此螡䖟交作之時難以遷徙聞大兵來拆邊牆恐將討我是以逃避臣等諭之曰大兵之來非討汝也因遷移汝等恐途中喀爾喀侵擾兼有盗賊故率兵而來乃欲送至歸化城也汝等妄動豈不悖哉雖經委曲勸諭而伊等竟不遵㫖臣等隨遣人報將軍將軍親率前鋒及頭隊兵來彼一聞聲息即乗馬遁去巴圖爾額爾克濟農又遣其蘭木扎木巴寨桑鄂木布至將軍所言我等居此遊牧已久復徙至察哈爾地方實爲未便我今往西喇布里圖水上以待將軍明日再請相見也將軍隨遣來使蘭木扎木巴寨桑鄂木布及筆帖式年圖等追及巴圖爾額爾克濟農告之曰我率兵來非征討也因汝等往徙恐途中喀爾喀擾害又有盗賊將送至歸化城也濟農言我來已遠不便回去請在前有水之地候見語畢即飛馳而去年圖歸告將軍將軍即分兵爲三隊追之追至西喇布里圖日暮將宿臣等言巴圖爾額爾克濟農不從聖㫖不肯遷移而逃當乗夜追及誅之今宿此地次日往追則難及矣將軍不聽次日追三十餘里仍回至西喇布里圖而宿臣等言如此進追何以能及當選人馬星馳電掣庶克有濟將軍復不聽至第三日踰西喇布里圖以外百餘里至庫克布里圖度不能及遂率兵還將軍查交臣等數目所殺厄魯特百餘人俘獲一百二十八人馬一百八十匹駱駝四十二頭除兵丁所食牛羊外現存牛一百五十八頭羊一萬五千餘隻降人噶爾旦多爾濟所屬納木喀班爾蘭木扎木巴五十餘戸又有喀爾喀之白蘇忒察罕巴爾族弟伊爾登和碩齊格寧兄弟四人率百餘戸來降言前者土謝圖汗往征噶爾丹我等投入土謝圖汗與噶爾丹戰敗逃來察罕巴爾等舍我等而先來歸皇上欲至賀蘭山捕獵近邊覓糧度日居巴圖爾濟農所今濟農違聖㫖不肯遷移棄之而走我等何故從彼去乎是以我等畱此求歸皇上冀與我兄白蘇忒之墨爾根濟農索諾木扎􅁲完聚一處安插臣等視巴圖爾額爾克濟農所走葢望西而去矣據此臣格什往甘州等處地方臣二郞保往凉州等處地方探視巴圖爾額爾克濟農駐牧之地奏入得㫖議政大臣集議議將安插巴圖爾額爾克濟農原由及違㫖奔遁情事着理藩院檄嘉峪關坐探員外本什曉諭西海諸台吉郞中格什員外郞二郞保既往甘州凉州等處探視巴圖爾額爾克濟農踪跡應俟探明時另行議奏伊爾登和碩齊等應着理藩院差官令其内徙歸併墨爾根濟農索諾扎􅁲其納木喀班爾等亦令暫住歸化城附近地方聽該部酌議安插所俘一百二十八人作何安置亦聽該部議奏所獲馬駝牛羊令交遷移伊爾登和碩齊人員均匀給還原被劫之喀爾喀丹津額爾徳尼等至遷移巴圖爾額爾克濟農之事前經奉㫖會議檄諭將軍尼雅漢者甚明乃漫不經心延捱時日直至十六日方始起行後格什等又遣人促尼雅漢等作速進兵而不急往窮追遂爾退回應令兵刑二部各差官一員往訊尼雅漢等延捱時日失機等情取供到日再議奏入奉㫖此議太輕爲將軍者俱如此違悞指授可乎即遣大臣鞫審嗣令刑部侍郞邁圖取口供奏至得㫖下該部議兵部議曰將軍尼雅漢於部檄到日不即星夜馳赴怯懦稽滯大失軍機應將尼雅漢革去將軍並拖沙喇哈番不准折贖鞭一百副都綂栢天郁稽遲怯懦大失軍機應將栢天郁革去副都綂郞中格什員外郞二郞保與將軍尼雅漢不能使巴圖爾額爾克濟農不致逃遁未克濟事至巴圖爾額爾克濟農逸逃欲脫其罪推諉將軍尼雅漢深爲不合應將格什二郞保俱革職副都綂党古禮病篤不曾往遷巴圖爾額爾克濟農應無庸議總督格思特係封疆重臣部檄到日應即會同將軍尼雅漢等公議使巴圖爾額爾克濟農斷不逃遁或擒或殺始爲勝任乃於事無濟至巴圖爾額爾克濟農逸逃遣大臣往訊始云曾諫將軍尼雅漢巧飾具奏殊爲不合應將格思特所加之級不准抵銷降二級調用奏入上曰栢天郁格思特各降五級留任逮將軍尼雅漢至京擬絞監候格什二郞保革職尼雅漢等率往官兵令總督格思特暫轄駐扎寧夏䕶軍綂領馬喇補授西安將軍甲午命喀爾喀新降之衆暫仍其俗理藩院奏喀爾喀人等既與四十九旗同列則衆扎薩克自親王以下驍騎校以上凡請安進貢奏事或遣使或親來俱應照四十九旗例土謝圖汗車臣汗旗内自王以下驍騎校以上凡行事亦應與四十九旗同土謝圖汗車臣汗其身僅存汗號應令進九白之貢伊等使人乃令照前例至折􅁲尊丹巴庫圖克圖亦照前例奏入得㫖喀爾喀人等初降新行安插俟三年後依此議行折􅁲尊丹巴庫圖克圖亦令貢九白己亥命撤歸化城預備兵上諭兵部曰歸化城兵無事當撤今値馬肥無事之際著都綂郞坦副都綂碩鼐於在彼大臣内酌帶一員沿邊直至寧夏延綏西寧往勘大軍可行可止之地至於巴圖爾額爾克濟農前者來歸給地安插而養之助喀爾喀往征厄魯特竟不爲効力且劫奪喀爾喀之事甚多灼知其必不能改故令遷徙居察哈爾之地奈彼素藏禍心是以遠遁彼雖遁去朕以向加養育初無困之殺之之意欲居何地惟其所擇但不得擾害邊塞地方可令達虎書此原由遣人往諭巴圖爾額爾克濟農著一併議奏議曰今歸化城兵無事應撤但留在歸化城之厄魯特尚未去應每佐領撥䕶軍二名火器營兵四百名照兵數派官在歸化城週圍暫駐餘俱撤回此所留兵俟歸化城所有頭隊厄魯特起程後即回其陜西調到大同宣府綠旗官兵亦令各回汛地前解大同宣府之礮仍留大同宣府外其䭾往輕礮俱令帶回蹔留大臣伏候上命應著達虎抄謄勅諭遣發巴圖爾額爾克濟農俟彼作何回覆即令奏報得㫖着都綂喀代李正宗副都綂田象坤郞化麟留後將軍印交與喀代叅領諾爾孫達米納夸色蘇丹古爾哈亦着與郞坦偕往着乘驛去勘視地方既畢着郞坦等一二緊要之人乘驛先來入奏後郞坦等勘回復奏言皇上所指諸地大軍行止無不允當壬寅將軍瓦代奏報回軍瓦代等奏至克魯倫遇西卜退哈灘巴圖爾納木扎爾托音伊等俱願來投鄂理肯等遍訪無踪哨探噶爾丹信息遁去已久遂於本月初四日回軍十八日進翁俄羅喀倫將入獨石口丙午土謝圖汗請給腴田耕種土謝圖汗奏䝉皇上仁恩臣與子及所屬人民不勝懽忭今思得一膏腴種植之地使我人民一二十戸出力相助春耕以資朝夕伏乞鑒恤上曰來年春理藩院遣官一員指授膏腴之地令其種植閏七月丙辰總督格思特奏報總兵官柯彩出邊𠞰殺厄魯特格思特奏言甘肅總兵官柯彩呈稱副將陳祚昌等奉差哨探至昌寧湖見廬帳有五百餘不知蒙古人數職即調集官兵出邊征𠞰濟農之弟愽吉遣格隆等數人來見言我愽吉乃善人並不敢背負皇恩欲假道以詣南山如不遣往請在昌寧湖牧馬職言汝既云不負皇恩當遵聖㫖䕶送汝等至歸化城答以我牲畜皆疲决不能往職查奸彜愽吉借名牧馬緩我軍機密通西海諸䝉古以相救援今欲往西海其情顯然矣若不𠞰除終爲後患一面將來差格隆監禁一面報臣又據總兵官報博吉所屯昌寧湖乃邊外野地離邊一百二十餘里甚爲遼濶且林木茂密易於藏匿必四路進𠞰乃可滅此狡寇隨遣提標前營遊擊李士達等率官兵一千從南方路入本標左營遊擊常應龍等率官兵八百從東南方路入本標後營遊擊杜思順等率官兵八百從西北方路入鎭番叅將張文輝等率官兵四百從東北方路入職與欽差員外郞二郞保居中督𠞰分頭前進䝉古放鎗迎敵我官兵奮勇力戰大敗䝉古殺五百餘獲傷者甚多生擒䝉古十五人博吉入林遁走又隨遣官兵躧踪撲殺追百餘里天晩昏黑不可深入收兵回營所獲䝉古牲畜器械查明另報其前監禁䝉古額林辰索諾木者乃博吉之親弟親子格隆者乃親信之喇嘛是以併生擒䝉古俱行斬訖㨗報到臣臣查博吉乃濟農之弟在賀蘭山三百里中衛邊外牧馬濟農逃遁時不及同去即往昌寧湖見我官兵有備自揣難脫是以遣其子弟格隆緩我軍機以冀潛逃雖總兵官柯彩率兵出邊征𠞰䝉古實藉皇上神威遠播官兵奮勇之所致也奏至得㫖總兵官柯彩出邊籌畫遣發官兵分頭前進𠞰殺厄魯特人衆可嘉在事人員著議叙以聞己未嚴打箭爐貿易之禁達賴喇嘛疏言竊思博碩克圖汗往追折􅁲尊丹巴恐有乖皇化乞遣回折􅁲尊丹巴土謝圖兩人不使及於惡前此所言非善巴陵堪布所私奏也實仰體聖主之心自厄魯特喀爾喀以及衆生俱令之共享昇平也如有不合祈睿鑒勿責至我打箭爐以外和占昌珠蘭等處前違法興兵大爲擾害恐不當聖心故不遣此地䝉古其打箭爐兩間之地雖奉有着照前行之㫖字係䝉古文漢人不識祈以漢文降勅奏入下所司議理藩院議康熙二十八年十二月達賴喇嘛使人善巴陵堪布來口奏伊等起行之前曾往達賴喇嘛所不令面見使立於達賴喇嘛所居户外諦巴出謂伊等曰達賴喇嘛令汝奏聖上乞擒喀爾喀土謝圖汗折􅁲尊丹巴庫圖克圖授厄魯特噶爾丹博碩克圖庶於生靈有益若此兩人之命我當保之其奏詞奉㫖存案今達賴喇嘛奏乞遣回折􅁲尊丹巴土謝圖兩人勿及於惡等語非善巴陵堪布之所私奏應無庸議前者康熙二十九年達賴喇嘛因大兵威力𠞰滅逆賊吳三桂衆皆歸化爲良民請於打箭爐地方互市曾許以地方平定之後照常貿易今達賴喇嘛以䝉古文漢人不識請以漢文降勅諭令照前行事應檄該省督撫提鎭打箭爐貿易勿得生事擾亂併檄諭達賴喇嘛嚴禁其所遣貿易人等勿得妄行生事上從之命定火器營賞例兵部以八旗火器營兵丁擊敗噶爾丹之功議叙具奏命議政大臣大學士八旗滿洲䝉古漢軍都綂副都綂集議議曰火器營兵排齊鹿角而戰不得與騎兵相同在本旗之前先進者有上等次等三等之别若臨陣放鎗之衆兵丁向無一槪議叙之例然不議叙又無以鼓勵軍士是以將列陣形勢問之總管火器營都綂諾邁等俱言齊排鹿角每架撥什庫一人身帶小旗立於前其餘兵丁一一調進撥什庫指示放鎗接戰次執大纛兵丁亦立而不動此兩種人最爲𦂳要至鳥鎗手一齊接戰似應一槪議賞查火器營帶小旗之撥什庫及執纛之人旣屬𦂳要則此交戰撥什庫等應各賞銀二十兩執纛之人賞銀十兩向無兵丁一槪議賞之例則槪行給賞之處無庸置議嗣後如仍排鹿角攻戰其戰功若以上上等議叙則帶小旗之撥什庫各賞銀三十兩執纛之人各賞銀二十兩若照此番軍功上等議叙則帶小旗之撥什庫各賞銀二十兩執纛之人賞銀十兩以軍功次等議叙則帶小旗之撥什庫賞銀十兩執纛之人賞銀五兩以軍功三等四等五等議叙則一槪不算若不用鹿角八旗騎兵與火器齊列擊敗對陣敵人則與騎兵相同在本旗大纛之前先進三人俟將軍大臣開册送部照前進之例議叙又一議以爲火器營兵一齊接戰聖諭之所洞鑒似應將鎗礮兵丁酌量一槪議賞此番火器營放礮放鎗之人執纛之人帶小旗之撥什庫押礮披甲共二千九百七十七人應交戸部給賞又挽車歩甲一百一人綿甲五十八人擡鹿角僕人五百七十九人共七百三十八人皆原文未開相應停給得㫖放鎗礮之人着一槪賞銀二兩著爲令挽車步甲綿甲擡鹿角僕人俱賞銀一兩九月丙辰遣官督視噶爾丹使人啓行噶爾丹使人阿􅁲都喇寨桑察罕古英寨桑等訴稱前聞尼喇巴噶􅁲楚以九月到其時令我等同歸今尼喇巴噶􅁲楚或已亡故或竟不來我等豈能久待理藩院㨿以奏聞上諭員外郞鐵圖乘驛往歸化城會副都綂阿廸督視啓行丁卯達賴喇嘛陳情請罪先是以噶爾丹敗遁之後懼我各路大兵堵禦請罪盟誓情節遣伊什格隆賫勅往諭達賴喇嘛至是達賴喇嘛疏言前者敬遵諭㫖曾遣噶爾亶西勒圖往和喀爾喀厄魯特値生靈有災之時至於敗亂不當皇上之心不能遂我初願凡諸諭㫖皆是愛養喀爾喀離散之人誠聖天子之洪仁也噶爾丹作亂追索折􅁲尊丹巴諸人而濟隆不能說止實爲非是濟隆報文言已竭力諭和兩家聽從立誓矣及見皇上有噶爾丹敗遯俯念衆生止勿窮追噶爾丹認罪立誓之㫖始知其實厄魯特不聽訓飭是以至此此地所遣人員有無知無識之處伏乞寛宥又使人徳木本爾囊素述達賴喇嘛口奏之言云喀爾喀厄魯特交戰之前土謝圖汗噶爾丹等遣使於西海台吉各請助兵達賴台吉來告於我我謂喀爾喀厄魯特皆我䕶法施主爾等和睦我則喜悅不得有所偏助也時於四川所屬打箭爐等地方令西海扎什巴圖爾台吉領兵駐防非有異念也其戍兵已早撤歸矣奏入上以達賴喇嘛向來恭順噶爾丹事差員及近侍通同䝉蔽非達賴喇嘛意也應賜勅諭之勅曰爾奏噶爾丹作亂追索折􅁲尊丹巴等諸人而濟隆庫圖克圖不能說止實爲非是濟隆報文言已竭力諭和兩家聽從立誓矣及見皇上有噶爾丹敗遁俯念衆生止勿窮追噶爾丹認罪立誓之㫖始知其實厄魯特不聽訓飭是以至此此地所遣諸人有無知無識之處伏乞寛宥朕綂御宇内以愛育黎庶爲本務使萬邦共享安樂前聞喀爾喀厄魯特交惡相攻屢遣使於爾喇嘛以和兩國爾喇嘛從來奉命不違敬順而行亦屢遣喇嘛說和奉差喇嘛諸人若能仰體朕與爾好生之意盡心行事則使喀爾喀厄魯特和好早息戰爭皆不至滅亡矣但爾近侍與濟隆庫圖克圖等皆有私意不體朕與爾之心濟隆庫圖克圖身在噶爾丹營中並不說和噶爾丹藉追喀爾喀爲名闌入邊汛劫掠烏朱穆秦諸地又不勸阻且噶爾丹與我軍交戰濟隆張蓋於山頂觀之况濟隆並未說和而報爾以爲竭力說和聽從立誓濟隆之去朕面諭以吿爾喇嘛之㫖亦不行傳諭以前項事情揆之未必濟隆一人之意如此行事也爾近侍之人通同貪利而欺蔽汝狥庇噶爾丹之所致也爾豈有如是之心乎朕灼見於爾喇嘛無渉是以朕不責汝朕與爾之心向來合一故將若軰行事違朕與爾之意遣勅使爾知之至噶爾丹乞兵於達賴台吉而不許駐防四川屬下打箭爐之兵盡撤已具悉所奏矣此勅交與來使德木本爾囊素賫去辛巳授土謝圖汗養子濟克巴等爲四等台吉時土謝圖汗以伊養子濟克巴乳母之子多爾濟扎􅁲阿必達伊妻乳母之子車陵蚌乞授職銜理藩院議以非例不准上曰土謝圖汗懇請誠切授濟克巴多爾濟扎􅁲阿必達車陵蚌俱著爲四等台吉勿爲例十月乙酉命發鄂爾多斯諸旗兵預備上諭侍衛阿南達曰朕思黃河冰凍之時恐有巴圖爾額爾克濟農等流兵至我西邊喀爾喀地方應令鄂爾多斯吳喇忒喀爾喀之墨爾根濟農郡王顧祿什希額爾克帶靑郡王善巴公託多額爾徳尼人等於冰解以前備之且以探信着理藩院諸臣會同詳議具奏議鄂爾多斯六旗一百七十二佐領内應令撥兵三千吳喇忒三旗三十佐領内應令撥兵五百扎薩克信順郡王善巴扎薩克公託多額爾徳尼扎薩克台吉圖巴丹津額爾徳尼此四旗四十二佐領内撥兵五百又札薩克墨爾根濟農郡王顧祿什希札薩克公蘇泰伊爾登札薩克台吉墨爾根帶靑車陵此三旗二十四佐領内撥兵五百令所撥兵各備於其地台吉都綂副都綂等管轄人員俱量兵數選擇材幹善約束者派出其鄂爾多斯貝勒宋喇􅁲札薩克信順郡王善巴札薩克墨爾根濟農郡王顧祿什希此三路每處撥官二員駐於適中之地探信其管兵人員即令前去部員閱發有事則一面報部一面酌量調兵應援其總綂三路兵之大臣伏候上裁得㫖所議發兵甚善著阿爾尼吉爾他布諾木齊代馬廸達賴英古巴札爾畢雅思呼朗等去仍令阿爾尼吉爾他布主之伊等前去一切俱便宜行事丁未提督孫思克奏報區處阿齊羅􅁲臧等劫奪之案先是遣侍讀學士達虎賫勅頒賞策旺喇􅁲灘阿奴等偵探噶爾丹與彼等交惡情節歸至嘉峪關外被阿齊羅􅁲臧等劫奪兵部檄令孫思克遣人諭羅􅁲臧等查劫侍讀學士達虎及殺傷官兵之䝉古應正法者正法應償還者償還如仍抗拒即行𠞰滅至是孫思克奏言阿齊羅􅁲臧者乃西海䝉古同族之人臣撥發官通各遣人於西海善圖墨爾根台吉等頭目令阿齊羅􅁲臧追取原劫牲畜等物不意阿齊羅􅁲臧遠逃催追不獲衆䝉古頭目雖各認請待草靑再行追取臣思阿齊羅􅁲臧未必從衆台吉之言臣酌議於𠞰滅噶爾丹之後視阿齊羅􅁲臧遊牧之遠近再請㫖𠞰殺奉㫖依議今西海善圖墨根台吉等差人解還阿齊羅􅁲臧所奪欽差官牲畜器械問之來差䝉古答曰阿齊羅卜臧劫欽差官員一案我衆台吉奉聖㫖各差寨桑追取阿齊羅􅁲臧牲畜我等追得阿齊羅􅁲臧馬三十二匹駱駝二十八頭盔甲十四副鳥鎗八桿撤袋十三副刀十六口弓二十張故衆台吉差我等解來竊思阿齊羅􅁲臧乃兇惡無知之人去年狂妄橫行忽劫欽差官員逆天之罪法所宜誅但臣前者撥發官兵殺狡部四百餘騎獲馬駝牛羊千數以示國法情罪亦略相當所劫馬駝盔甲等物理合照數追取臣奉部文遣官通於西海䝉古頭目衆台吉宣布國威陳說利害令伊等往追西海衆台吉遣人於阿齊羅􅁲臧遊牧之地追取馬駝器械等物雖不及原數但西海䝉古衆頭目差人言阿齊羅􅁲臧自劫欽差官員以後人逃牲斃貧苦已極儘其所有追取解來先所劫牲畜物件俱已費盡其餘實不能追又再三求臣代奏皇上請免此特畏懼天威求免日後之覈查也恩出皇上非臣所敢擅議至所劫營馬先以茶馬補給兵丁所劫盔甲以臣標裁兵所剰盔甲撥發令䝉古解還馬三十二匹留臣標營内喂養待有倒斃馬缺補給追來盔甲十四副亦貯臣標營内待兵丁缺甲撥發至追來鳥鎗弓箭等物乃兵丁自置之物仍給肅州營兵外其賠解駱駝二十八頭已非原物皆老而瘦小先是達虎等出邊帶去馬駝乃動支官庫採買者應將䝉古賠解駱駝交與地方官估價償庫亦於原項有小補也得㫖孫思克此事區處極當一切邊務盡心籌畫効力殊爲可嘉本内事俱如議十一月戊午授札薩克圖汗之子克色克爲輔國公札薩克圖汗之妻布尼達喇奏言皇上出臨會閱我與我子巴郞二人望塵赴會欲訴先祖父名爵及我汗身命被害兩大事而巴郞倐爾身故續欲率其弟功格台吉以往而又病殁屢遭變故不獲赴會今因札薩克圖汗身命被害及名爵之事迫欲叩陳攜六歳之克色克台吉而來寡婦孤兒惟聖上鑒恤此外他無所望奏入得㫖下所司議理藩院奏言今年會閱折􅁲尊丹巴庫圖克圖土謝圖汗等攻殺札薩克圖汗徳克徳黑墨爾根阿海之事已降勅寛宥其罪札薩克圖汗之位已封其弟策旺扎􅁲爲親王矣且克色克年幼未及應授封之時所奏扎薩克圖汗身命被害及名爵之處俱無庸議奏入上曰扎薩克圖汗被殺殊爲寃抑所存止此一子克色克從優授爲輔國公癸亥命西安官兵移駐寧夏上諭兵部曰陜西西安鳳翔所屬今年米穀無收特遣學士布喀往勘今㨿回奏米價騰貴供應駐防官兵糧料採買累民聞甘肅廵撫所屬地方米穀有收應將西安官兵於收麥以前暫行移駐寧夏則西安供應有餘亦於民有益爾部會同戸部核議具奏議西安滿兵漢軍内應撥四千兵往駐寧夏官則量兵遣發着該將軍總督相視寧夏等處指出何地有糧暫於收麥之前駐守此兵原係閒住應將常給馬匹草料三分中減去一分此所移駐官兵僕從口糧馬匹草料既在現住地方支給則西安應停支給僅於所存人口給以口糧至所餘住居西安之官兵馬匹應支草料亦應減半支給俟收榖時照常給發如此則採買糧料實爲有益至綂率此兵前往者於將軍副都綂内請㫖點定得㫖令將軍馬喇帶去丁卯命定從征迷失人等給身價例先是西安披甲額􅁲特大小子因覓馬迷失兵部將署叅領葉黑布等擬罪具奏得㫖嗣後出兵迷失者作何給與身價併議定例具奏至是兵部奏言葉黑布格美皆管兵夸蘭大叅領而甲兵額􅁲特大小子遺失馬匹往覓不歸不即禀知大臣發官兵追尋越五日始言於理不合應將佐領署叅領葉黑布降二級調用拜他喇布勒哈番兼佐領署夸蘭大格美降一級調用但格美有拜他喇布勒哈番之職無級可降應罰俸年半免其調用甲兵額􅁲特大小子迷失不獲其尸應照陣亡例給與身價葉黒布格美怠玩已甚應將額􅁲特大小子身價銀兩於葉黑布格美名下追給驍騎校署散騎校瓦爾達係管馬之兵丁遇額􅁲特大小子既不收留又不遣人送回本軍應將瓦爾達罰俸一年嗣後行軍之地兵丁有迷失者治罪及追給身價俱照此例編入條例遵行命下之日通行八旗包衣佐領及官兵駐防奉天等處奏入上從之聖祖仁皇帝親征平定朔漠方略卷十一

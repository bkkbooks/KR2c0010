body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷九康熙三十年正月癸巳諭儆備噶爾丹時噶爾丹奏言其下人如狼有一二妄行者祈勿介意奏至上諭大學士伊桑阿等曰閲噶爾丹所奏不可謂無作亂之事今噶爾丹所屯自俄儂向喀爾喀墨爾根濟農而來火器重物難以應時即至應令八旗漢軍都綂選舉能員預運大礮前至大同宣府駐劄山中有木随便採取置備鹿角應運礮㡬門如何運致造鹿角㡬何八旗漢軍都綂議奏又前曽令各佐領秣馬十五匹後减去五匹今仍令如數秣養所養馬數令兵部記册又聞此番出征厄魯特兵丁甲胄既不相稱又不堅固今𫝊令好為配合整頓堅固有欲製䕶心綿甲者随便製造出征大小官員將所有丁壯抽取䕶身致戰陣之上反無丁壯大小官員親随甲士各有家人以後軍中抽取應令停止亦令兵部議奏此番兵丁原令帶兩月米聞僅帶有二十日亦令嚴飭以後照數攜帶戊申命戒會閱之期上諭内大臣蘇爾達等曰喀爾喀案件宜速斷理擬於清明前後青草發萌時出臨㑹閱其集議之議三月青草發萌時應出臨㑹閱其随從大臣官員兵丁及㑹閱應行事宜令各部院請㫖啟行日期恭候上裁奏入上從之封阿魯科爾沁貝勒垂為多羅郡王先是貝勒垂於烏爾揮地方與厄魯特戰衆皆奔潰垂獨止力戰致受重創被執不屈上嘉之至是封為多羅郡王其在事陣亡阿魯科爾沁等部落十二旗台吉官員理藩院分别議叙具奏上曰扎魯特四等台吉滚楚克塞爾濟額爾徳尼及阿魯科爾沁二等台吉董約特勞績顯著殁於戰陣其優贈為一等台吉賜達爾漢之號令其子承襲全給身價餘俱全給身價命都綂瓦代郎坦往備大同張家口先是噶爾丹認罪立誓上書請降上以噶爾丹人殊狡詐宜發兵預備著每佐領派䕶軍七名驍騎五名前鋒一名火器營兵二千整頓備之至是上諭内大臣蘇爾達等曰噶爾丹來至克魯倫又劫掠喀爾喀今或乗雪前來為宼亦未可知所發備兵宜前往張家口獨石口等地方備之著議政大臣領侍衞内大臣八旗滿洲䝉古漢軍都綂集議議曰前派兵每佐領䕶軍七名驍騎五名前鋒一名火器營兵二千今以此軍分遣張家口獨石口則張家口應遣每佐領䕶軍四名驍騎二名前鋒兩佐領合一名火器營兵一千獨石口應遣每佐領䕶軍三名驍騎三名前鋒兩佐領合一名火器營兵一千奏入得㫖赴張家口軍令往大同赴獨石口軍令往張家口其張家口一路都綂瓦代總領之與都綂喀代王永譽䕶軍綂領洪海副都綂方格柯爾對喻維邦偕往大同一路都綂郎坦總領之與都綂公宗室華善都綂李正宗䕶軍綂領宗室惠藍署前鋒綂領副都綂碩鼐副都綂馬齊田象坤郎化麟偕往此二路俱授將軍印自漢軍副都綂以上俱令叅贊餘如議随授瓦代定北將軍印郎坦安北將軍印辛亥命派發㑹閱官兵兵部奏言車駕出閱應撥前鋒營則前鋒綂領一員每翼叅領各一貟侍衞各一員每旗前鋒校各二員前鋒兵三十名䕶軍營則每翼䕶軍綂領各二貟每旗䕶軍叅領各七員每叅領䕶軍校各五員每佐領䕶軍各五名驍騎營則每翼都綂各二員副都綂各四員滿洲蒙古每旗叅領各一員每叅領賢能將領各二員驍騎校各二員小校各四名驍騎每佐領各三名其都綂副都綂前鋒綂領䕶軍綂領惟上簡命其八旗每旗礮位火器攜帶㡬何大臣官員兵丁撥發㡬何俱聽火器營都綂副都綂等具奏請㫖䕶軍每旗帶纛一桿驍騎每叅領帶纛各一桿除上三旗䕶軍守衞御營外其五旗䕶軍八旗驍騎火器營兵每旗各扎一營以為行止奏入上從之随令都綂莽吉禄喇克達諾敏希福蘇努前鋒綂領穆圖䕶軍綂領四哥托倫馬喇苗齊納副都綂馬思喀沙納海碩代伊勒慎趙山勞滿塞牛鈕葉楚赫等随赴會閱壬子命西安將軍尼雅漢等往備寧夏上諭大學士伊桑阿等曰聞噶爾丹劫掠墨爾根濟農巴圖爾額爾克濟農向西海而去著將陜西西安兵酌留守城外其餘兵丁命將軍親率之其川陜督標緑旗兵命總督親率之寧夏鎮標兵命總兵官親率之俱於寧夏備噶爾丹趙良棟現在寧夏熟習軍務令與將軍總督指揮商略而行時勇略将軍趙良棟解任見住寧夏故有是命諭給賞宣府大同兵上諭大學士伊桑阿等曰宣府大同兵雖未嘗攻戰而兩次出邊修整器械亦已勞矣今又令將軍等於有事時便宜率之而行宜加恩賚每一兵賞銀四兩交大同宣府總兵官頒給二月戊午策旺喇卜灘及阿奴等覆奏與噶爾丹交惡情事策旺喇卜灘疏曰侍讀學士達虎頒到勅書恩賞不勝欣幸我國内自交惡因柰冲鄂木卜擅權毒殺我弟與我亦不睦我國人民交惡離散職此之故阿奴疏曰我等奉達頼喇嘛之令分出愽碩克圖汗違達頼喇嘛教多為不義殺索諾木喇卜灘又與策旺喇卜灘及我亦皆反顔是以各自分散嗣後大君凡有諭㫖俱願遵行理藩院以聞上命厚加恩賜而遣之并令郎中桑格䕶其行其使人起行之前令見噶爾丹來使告以故丁卯遣使賫勅諭噶爾丹上諭大學士伊桑阿阿蘭泰尚書馬齊班第等曰侍衞阿南達來奏言適獲一噶爾丹營中同行喀爾喀問之言噶爾丹去年敗走以來日以北徙人畜屢斃劫掠無所獲近者噶爾丹親率兵來劫喀爾喀至阿爾哈頼地方又無所得皆徒歩而返困敝已極今應於現在此地噶爾丹使人内撥發數人令巴扎爾賫勅乗驛與之同往噶爾丹所至巴圖爾額爾克濟農墨爾根濟農善巴額爾克帶青處各遣官一員令伊等皆内徙逺置哨探再語伊拉古克三庫圖克圖令明告此去噶爾丹使人云汝軰厄魯特之人從噶爾丹而行失其生計主上憐之故遣汝等𫝊諭噶爾丹若降當厚加恩養若上果念汝等厄魯特前惡則不令策旺喇卜灘使人見汝等矣巴圖爾額爾克濟農遣二郎保往墨爾根濟農善巴額爾克帶青著與阿南達議亦遣向日往來相識之人往賜噶爾丹勅曰朕為天下一綂主務使四海之内人民咸獲其所以享太平雖向與本朝抗拒之國如窮迫來歸必拯而養之無不使得其所者喀爾喀向曾與本朝交戰窮而來歸朕並不念前罪受而撫養之朕濟困繼絶之心不但於喀爾喀為然也諸國有窮迫來歸者朕之撫養皆與此同前已有㫖諭汝矣今聞喀爾喀逃來人等言汝厄魯特牲畜已盡無以為食極其窮困人被疾疫死亡相繼朕重念天下率土人民之命聞此困敝有不惻然軫念者乎况前已致諭於達頼喇嘛言噶爾丹如不得已而來歸朕亦受而養之使之得所今果窮困無食不能歸故土其移近邊汛朕當厚加恩賜如决計入降益從優撫養斷不辱汝此朕俯視率土人民一體之實心勿貳勿疑汝亦曾誓不侵擾喀爾喀况我軍已在在設備矣若朕果有蹙汝困窮之事則不使策旺喇卜灘使人見汝之人如此情事汝使亦皆知之自此以後汝之人無所劫奪不能歸故土衆庶益至死亡雖悔莫及汝當熟籌之特遣員外郎巴扎爾偕汝使内七人往諭汝其定計具本來奏臣謹按帝王之量主於兼容并包故雖遐荒負固自外於聲教之倫未嘗不閔其昏迷而冀其覺悟思引掖以歸大化此至仁者之用心也我皇上於噶爾丹欲令保境息爭前此屢遣使臣申以勅命不憚再三至其入犯邊哨既以逆我顔行天戈所指人切同仇而帝徳好生猶望其親見用兵之害庶㡬窮蹙來歸故重宣使命開以自新於其屬下人等亦徧示招徠以定反側所謂推赤心置人腹中毫無芥蔕於夙釁者也聖度如天因噶爾丹之㝠頑不悟而益顯矣乙亥將軍郎坦等請帶緑旗官兵前進兵部奏將軍郎坦等咨稱本路兵於二月十三日至大同與叅贊諸大臣及總兵官王弼等同議地方緑旗兵共一萬五千餘人陜西撥來緑旗兵一千人如行軍之時宜發陜西調來兵一千大同兵四千共五千人前往其管領將弁亦量兵數派出又訓練大同緑旗兵礮火遣有八旗漢軍將校各一員礮手各一名教習今猶未盡嫻熟倘有行軍之事亦併帶往應准該將軍所請奏入得㫖此所請帶往之兵過多如有事著帶陜西調來兵一千大同鎮標兵二千前往餘如議丁丑命増設西安八旗火器兵將軍尼雅漢奏言目下將西安所有漢軍二千内擇一千官員亦分半教習鳥鎗實大有禆於地方戰守但陜省遼濶境土皆切近外藩三面交界不同他省如有軍機之事各處調度必將此一千火器兵分用力分則不全矣火器者所以攻堅䧟陣之急需也必多而整始大有濟今擬將西安八旗滿洲蒙古漢軍丁壯及家人厮役内不論旗分擇其人材雄偉者創增一千人専管教習滿洲官亦創令増設共以兵二千為全數設立火器營遵欽定之式用心訓練於七千兵内撥滿兵一千漢軍一千連家口安插蘭州城附近邊塞倘有軍務連綿絡繹不悞軍機而兵威震耀於内外皇上似可少紓西顧之憂矣奏至命議政王貝勒大臣集議議曰應照該將軍所奏將西安八旗滿洲蒙古漢軍之丁壯及家人厮役内創増一千教習鳥鎗西安之滿洲蒙古八旗每旗有協領各一員佐領各七員拖沙喇哈番等官各七貟驍騎校各七員不必創増専管官即於其内撥每翼協領各一員佐領各二員拖沙喇哈番等官各二員驍騎校各二貟附於現在火器兵専管教習令滿洲將軍副都綂漢軍副都綂總理之上從之己卯都綂公蘇努等率八旗將士謝恩時上大發帑金厚賞八旗官兵盡償其積負於是將士懽忭頂感叩懇蘇努等代陳謝恩蘇努等轉奏曰八旗叅領佐領驍騎校等率軍士口稱我衆父子兄弟蒙皇上數十年豢養給之田舍月糧近因小旱又蒙皇上軫念發倉粟賑濟又俯憐窮兵増加餉銀用是我衆畜養家口從容閒暇得以習學武藝聖恩髙厚有如天地至我等家口漸増衣食用度不敷以至稱貸皆我衆人之私也何敢上凟聖聽今皇帝洞見纎微軫念貧苦大賚帑金盡償積負又均平分給困者皆蘇貧者皆足如甘霖之霈萬物皆生我衆蒙皇帝山海洪恩願加勉勵効力戎行乞代衆恭謝天恩臣等伏覩敷天胥慶薄海同歡兵士無憂彌増壯志禁旅强而本根永固四海靖而率土安寧皆皇上聖徳仁恩溥被之所致也臣等幸際隆時得逢大賚仁恩周於禁近忭舞遍於九衢大小臣工歡呼階陛内外文武歌頌聖仁臣等無任感激代達輿情謹具奏以聞即率八旗將士在午門前謝恩臣謹按國家之設兵豢畜之於平日而驅策之於一時安其身則心可得而用也安其心則力可得而用也我朝承平日久士飽馬騰人思自効近者狡宼犯順皇上聲罪致討八旗擐甲執戈之士莫不踴躍爭先以不與戎行為耻誰復以室家為念者而皇上猶曲加軫恤大施浩蕩之仁發帑金數百萬償其私貸恩何渥也夫無事有坐食之安而徴發邀破格之賞宜其感激思奮期於滅此而後朝食矣用兵之道有未見敵而先勝者其此之謂歟三月丁酉諭詳視寧夏黄河船運事宜將軍郎坦等奏言臣等自京起行時曽經奏請駐軍大同養馬俟青草出邊環歸化城駐防探噶爾丹聲息今反復詳視地圖黄河之流自蘭州城東北而行過寧夏出邊近瀚海又折而南行入邊今收衆喀爾喀内向噶爾丹不知率兵來襲一無所遇無從擄掠則其返也人馬困乏勢必沿河套之外西趨賀蘭山金塔寺而去大軍自歸化城往追亦一時難及應於黄河北套灣之地或黄河交界喀喇穆冷河地令大兵駐備南有黄河北有瀚海勢與關隘等既可以俯䕶墨爾根濟農等之衆喀爾喀而敵人亦不得踰越矣至噶爾丹或不當黄河北灣而行自克魯倫土喇前繞杭愛阿爾泰山趨嘉峪關來其時有用大兵之處則前踰寧夏往甘肅之地亦可相援也如駐黄河套内要地而猶不獲噶爾丹實信則大兵駐久需餉為急請將蘭州北所備浮橋之船及寧夏所有渡船酌量修葺裝載大軍糧餉順流而下於事有禆奏至命議政諸臣集議議曰大兵如駐黄河交界喀喇穆冷等處則距蘭州既逺而寧夏皆係小船裝載糧餉數不能敷致之亦甚難且近以西安滿兵陜督及寧夏延綏兩鎮兵令將軍總督總兵官親率之往備寧夏又令墨爾根濟農巴圖爾額爾克濟農等入内遊牧設立哨汛則將軍郎坦等所奏無庸置議仍令於草青時率兵出邊環歸化城駐防以時偵探如有可乗之機别令奏聞奏入上令郎坦乗此閒暇於偕行大臣官員中擇賢能者自寧夏以内至於黄河閱視可否以船運糧來奏餘如議尋郎坦遣署前鋒綂領副都綂碩鼐等閱視還言自寧夏以内泛舟由黄河而下無有阻礙據以奏聞戊戌山西大同總兵官王弼請率兵從大軍進𠞰王弼奏言臣備兵二千以待調遣前兵部檄臣操練放礮每礮用礮手三名礮四十門應共選礮手一百二十名臣與各旗員選擇操練俱已習熟現皆可用臣又遵檄撥舉鹿角兵每架四名至解礮及火藥等物出邊俱當以兵䕶送邊外所用車馬為要營將向無管車馬之職理合奏請伏乞俯念微臣愚忠出邊之時准臣即率臣標下官兵同大兵而行則可以少効犬馬之力奏至上從之庚子命詳定㑹閱事宜理藩院奏言臣等與内大臣阿爾廸等議應於上都河額爾屯河兩間七溪之地㑹閱俟車駕到彼戒期之後遣人調集左翼喀爾喀部落諸王前至上都土爾根伊扎爾交界之地右翼喀爾喀部落諸王前至上都黒棚交界之地以待奏至得㫖命大學士與兵部大臣集議議曰喀爾喀等在兩處㑹集遣大臣分道先往先往大臣伏候欽定其理藩院以㑹閱應議事宜分遣先往大臣各令所在地方蒙古駐於㑹閱七溪百里以外議事駕至之前檄令前來至從閱官兵若隨駕往覺其繁雜僅以前鋒全隊每佐領䕶軍二名隨駕外其每佐領䕶軍三名驍騎三名及火器營兵俱出獨石口擬於駕至七溪之時來㑹至大閱應備器物理當先發俱令各該部院奏請前遣其喀爾喀等已𫝊諭於四月十五日來㑹於期約之地問之度地内大臣等俱言四月十五日前後青草可得欽天監擇日亦擬四月十二日起行吉駕發日期并請於命下之日諭衆知之奏入得㫖四月十二日啟行前行大臣如何差遣喀爾喀等如何分别何地安插喀爾喀作何坐次又前有噶爾丹之警備發之兵頗多今噶爾丹逺去其兵應减爾等㑹同滿洲九卿詹事科道定議議喀爾喀遇亂離散先後來降皇上不忍坐視伊等滅亡安插邊汛内外賑給米榖牲畜各令得所又念喀爾喀離散之國若無法度撿束益至散亡已將車臣汗人等編列旗隊矣喀爾喀瞻仰皇上請降者有之請附者有之願入効力者有之前俱准其㑹閱集議在案今出臨㑹閱應一併酌定前遣兩路議事大臣伏候簡用如安插伊等於内地則土喇俄儂克魯倫等地空虚如即遣屯於此等之地則厄魯特事尚未定俟㑹閱既畢指授喀爾喀人等現在遊牧所在後再遣大臣官員查核人丁數目令此去大臣視喀倫四周暫令遊牧厄魯特事定後仍遣往土喇俄儂等處安插至喀爾喀人等零星散失或有未經親來報部未曽投入者亦未可定倘後有接踵來投者該部請㫖裁奪今噶爾丹逺去此一㑹閱也應將前所發八旗兵减去率每佐領䕶軍四名前鋒全隊漢軍火器營兵而往其每佐領䕶軍一名驍騎三名俱不必帶往滿洲火器營䕶軍正當操練亦不必帶往帶往之兵上三旗則隨駕而行下五旗則出獨石口往赴御營除三旗都綂䕶軍綂領前鋒綂領副都綂隨駕外下五旗都綂䕶軍綂領副都綂亦同兵士齊出獨石口至張家口所備兵應俟駕發之後令將軍瓦代等率滿洲官兵漢軍火器營官兵支兩月糧馬䭾輕礮出張家口往正白鑲白察哈爾遊牧之地隨其水草在彼遊牧緑旗操練大礮鹿角及緑旗兵不必帶往㑹閱之地全軍建營置哨及蒙古作何屯扎之事令兵部理藩院與鄉導大臣官員同議具奏㑹閱既畢將軍瓦代等之兵如何措置該部請㫖至㑹閱之地應先遣備器物俱令各該部院奏遣前行奏入得㫖如議左翼著馬齊布顔圖額爾黒圖西喇吉爾他布往右翼著班第索諾和温達達虎阿爾尼往尋兵部理藩院及嚮導大臣議奏御駕出閱定議喀爾喀案件今將會閱之地全軍布營設哨衆扎薩克蒙古喀爾喀屯扎之事酌量編次御營内令三旗䕶軍共為一營居中屯扎其八旗前鋒為二營五旗䕶軍為十營火器營兵為四營共十六營環御營屯扎八旗前鋒為四哨八旗䕶軍為二十四哨繞營酌量逺設汛哨如有不足另行添設往哨人等令帶廬帳而往兵丁馬匹俱放哨内四十九旗諸王台吉及喀爾喀人等目前俱令屯會閱之地百里以外駕到之後令前附御營五十里屯扎不得入哨内如有會集營中之事理藩院官員筆帖式帶來放入四十九旗蒙古前來貿易問明旗號名字放入住營外互易其哨地於都綂副都綂内遣每翼二員及每旗䕶軍叅領一員不時廵察牧馬之地應遣出官監視奏入上曰汛哨令都綂副都綂兩兩分班廵察餘如議辛丑授林興珠等官秩有差兵部奏兼管火器營都綂諾邁咨送去年出兵帶往林興珠楊懋烈楊天樞等交部議叙應酌量將林興珠楊懋烈以火器營拖沙喇哈番用楊天樞以驍騎校用奏入得㫖林興珠從征俄羅斯厄魯特屢著勞績著授三品官餘加議甲辰總兵官許盛奏請預備解礮車馬許盛奏言所解礮俱到宣府但前裝車解來俱自驛中換馬牽挽若出邊而行逺道必須倍加馬匹更迭牽挽共需馬四百五十二匹作何措辦及礮位火藥砲子等物所需車一百二十輛伏乞勅下該地方官豫備奏至上諭所需車直𨽻廵撫簡賢能官量支現存庫銀照數堅固製造交該總兵官其所需馬四百五十二匹現買則難得肥馬而目下預行備買喂養縻費錢糧應於有事之時在該鎮標下兵丁馬内照數取用諭停運米豆上諭戸部曰目前青草發生之時駐扎大同宣府大兵不久出邊應支米豆恐小民不能挽輸至於困苦令停其運解將現在米豆於出邊之前節省支給戊申命總兵官許盛率標兵從大軍前行許盛奏言臣撥臣標右營遊擊耿如倫専管大礮左營遊擊呉良駿専管鹿角二百架以備調遣伏乞准臣酌率臣標下官員馬歩兵及藤牌手隨大軍前行効力上從之四月壬戌御史沈愷曾奏請暫緩行邊愷曾奏言執要不煩者聖主之常經趨事不遑者人臣之大義近聞本月十二日皇上有廵行邊外之舉臣雖愚昧無知仰體皇上此行無非為蒙古諸臣定賞罰編户口安插新附諸人此誠皇上如天之仁欲使百萬生靈無一夫不獲之意但邇來京師膏雨未足睿慮焦勞兼之聖躬逺出間關﨑嶇之地為臣子者何以為心且臣聞其地未雨先寒未暑先熱與内地逈不相同值此夏令初交寒暑不均之候皇上服食起居亦未必與時順適乗輿勞頓於外羣臣偃息於家揆之於心有惄然不自安者近今已命部院大臣先行料理止須令其逐一奏聞於記功録過之中寓慶賞刑威之意仍與皇上親臨無異且皇上宸謀雖逺隔萬里有如指掌豈區區藩服有不在坐照之内者乎叩乞𫝊㫖暫緩此行庶聖躬得以稍節而臣心遂各安矣奏入得㫖喀爾喀向來雖經進貢但伊汗從未嘗輸誠來朝而喀爾喀諸汗親率所屬數十萬衆傾心歸附一切行賞定罰安插撫綏關繫甚大所以朕躬親往廵狩沈愷曽所奏已悉所司知之丙寅命副都綂蘇黒等督噶爾丹使人起行先是令蘇黒等送噶爾丹使人由歸化城出格徳勒古口至噶爾丹舊牧之地至是上諭理藩院曰厄魯特使人應分為三隊發行彼孰當先發孰當後發其問明議奏議巴圗爾寨桑阿哈奈乃噶爾丹之使應第一隊起行滚楚克乃台吉之使應第二隊起行達爾漢寨桑愛齊率回子而來應第三隊起行令伊等自京城一齊起行到歸化城後併合察罕古英寨桑阿卜都喇額爾克寨桑等分為三隊即令前所派副都綂蘇黒員外郎二郎保等帶往督視遣行至應否仍令蘇黒二郎保送此使至噶爾丹所在伏候上裁奏入得㫖令蘇黒二郎保帶伊等至歸化城督視第一隊人起行查明伊等人數及駝馬牛羊糗糧器用數目送部具奏其兩隊暫止勿遣俟朕還日再奏遣發不必令蘇黒二郎保送此使至噶爾丹所在俟後兩隊起行之後方令伊等回京丁卯車駕發京師安輯來降喀爾喀甲申命尚書馬齊等詳定賞喀爾喀次第上諭馬齊等曰爾等其將喀爾喀詳定次第分别條列行文部院馬齊等遵㫖分别喀爾喀汗濟農台吉次序請以折卜尊丹巴庫圗克圗土謝圗汗扎薩克圗汗之弟䇿旺扎卜車臣汗為第一等扎薩克墨爾根濟農顧禄什希等六人為第二等扎薩克額爾徳尼濟農布達扎卜等八人為第三等扎薩克台吉車木楚克納木扎爾等十四人為第四等土謝圖汗親弟台吉羅卜臧多爾濟等三十四人為第五等扎薩克台吉西地西里之孫垂旺多爾濟等七十五人為第六等扎薩克台吉色稜阿海族中台吉杜黙等四百一十人為第七等土謝圖汗之衞寨桑顧什等十七人為第八等折卜尊丹巴庫圖克圖土謝圗汗扎薩克圖汗之弟䇿旺扎卜車臣汗新舊扎薩克之隨從寨桑䕶衞寮屬等為第九等咨理藩院奏覽得㫖此叙賞事宜令内大臣明珠内務府總管費揚古戸部侍郎阿山禮部侍郎席爾達會同頒賞内台吉車卜登曾從我大軍効力令於此叙賞中照會閱大臣一體條上賞時舉出台吉車卜登奏聞聖祖仁皇帝親征平定朔漠方略卷九

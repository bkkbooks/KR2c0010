body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方畧卷十六八月庚寅朔喀爾喀台吉哈瑪爾帶青等吿請効力哨探副都統阿南達奏言臣來寧夏有喀爾喀四等台吉哈瑪爾帶青等要於路而告曰聞遣厄魯特之巴圖爾額爾克濟農之人坐哨我等雖屬庸劣願與伊偕往邊哨倘可自効當竭力報稱奏至上許之己亥将軍伯費揚古奏報噶爾丹使人梅寨桑等起行費揚古奏言侍郎滿丕欽奉上諭於是月初七日到喀倫召噶爾丹使人梅寨桑等至授以勅書梅寨桑等跪而受之隨以土默特之都統副都統及諸官員願助羊四十隻賞給之梅寨桑等率其下人叩頭謝恩於初八日親視其起行謹具奏聞辛丑命暫留噶爾丹使人回子塔什蘭和卓等於邊内将軍博濟奏言臣欽奉上諭備兵邊塞以扼噶爾丹經行之地因思邊外有水草要地不可不豫為據守乃遣肅州總兵官潘育龍率精兵二千駐防三岔河隨據報稱噶爾丹屬下回子塔什蘭和卓等五百許人過我汛哨而來擒解軍前據塔什蘭和卓言我等被逐自喀倫博羅鄂博行至烏蘭厄爾幾遇噶爾丹使人梅寨桑等彼選擇馬畜賫皇上勅書赴噶爾丹處我輩因馬畜不堪不能同行是以留此合計妻子約五百許口我等向沐聖主洪恩得以生全不知噶爾丹作何陳奏将我等逐出今在生死之間所以茫茫奔走臣竊思西寧等處亦係内地不便使若輩貿易即應遣回但目下正在防禦噶爾丹之來又不便遣之迎徃請将此回子等發兵督後押至肅州邊内暫行拘留俟青草枯後遣人将昆都倫及厄濟内河以内邊城以外凡有草處盡行燒荒所備綠旗官兵各回本汛後再将此回子輩撥官兵押䕶從彼來路逐回疏至上從之丙午調兵備噶爾丹先是京城預備大兵已派為三隊第一隊都統公宗室蘇努都統李正宗諾穆圖前鋒統領碩鼐䕶軍統領蘇赫副都統張所知孫徴灝扎喇克圖納秦喻維邦宗室巴賽張朝午前鋒及八旗滿洲漢軍礮鳥鎗俱往毎佐領下䕶軍一名上三旗包衣䕶軍六十名第二隊都統阿什坦噶爾馬副都統摩爾渾碩岱䕶軍各二名第三隊都統胡巴伊勒慎副都統秦布龍什庫䕶軍各二名至是上廵視口外諭内大臣明珠等曰聞噶爾丹有順克魯倫而來之信京城所派預備兵三隊應令作速起行第一隊著於是月二十四日啓行所派諸王及兩班侍衞與俱二三隊行期各間一日盛京預備兵二千寧古塔預備兵一千著尅期㑹集於烏爾惠之地再檄知黑龍江将軍薩卜素令遠行偵探倘噶爾丹侵犯車陳汗地方聽酌量行事設有來前聲息即踵其尾以進薩卜素有用烏喇兵處可率之去不用仍著往㑹盛京兵盛京烏喇二處命副都統齊蘭布往諭之科爾沁兵著派二千名來㑹於烏爾惠地土默特貝勒額爾徳穆圖令速囘将伊所屬并貝子喇思查普旗兵酌量派出亦往與盛京兵㑹遣理藩院官一員赴敖漢柰曼亦将兵酌派帶至巴林台吉阿喇卜坦處京城預備兵令勿裹糧輕身前來支領坡賴村米此處大臣侍衞官員等所有駱駝令往運坡賴村米給放在此兵卒前鋒叅領夸色著署左翼前鋒統領其前鋒叅領可於新滿洲内選署之再著古北口總兵官何應元石匣副将馬進良於兩處官員内将人材健壯兼有馬匹者約選二十員帶來其前來官員著各携軍器鳥鎗以至速檄知之丁未命減預備兵數上諭議政大臣曰預備兵數過多可減至八千爾等其集議之議曰原派八旗䕶軍親隨䕶軍鳥鎗䕶軍前鋒軍驍騎兵及内府驍騎兵滿洲火器營兵漢軍鳥鎗兵共一萬三千九百六十八名今遵諭減派除滿洲漢軍隨礮官兵不減外毎佐領下止派䕶軍五名前鋒一名鳥鎗䕶軍一名八旗滿洲火器營兵四百名漢軍鳥鎗兵二千名共兵八千三百八十四名餘悉減去其預備大臣俱令率兵全來毎旗照所出兵數派官五員統之議入上從之復諭議政大臣曰現今無甚𦂳急聲息頭隊兵行期定於二十六日二隊兵定於二十八日三隊兵定於三十日俱令齊備以待如有急務星速往調來兵三隊須擇水草善地牧養馬匹緩緩前來命撤副都統阿南達囘上諭大學士伊桑阿曰聞噶爾丹果有來克魯倫之信可令副都統阿南達自甘州囘其兵仍留駐防禦将軍博濟亦著囘寧夏速檄知之己酉上宻授科爾沁土謝圖親王沙津方略時上獵於木蘭駐蹕克勒吳掠蘇台土謝圖親王沙津來請安上召入行宫宻諭曰噶爾丹為人極其狡猾不得不迅速掃滅欲發大兵往征恐彼聞風逺遁及至撤兵彼又復來擾爾䝉古是諸部落不得寧居矣今畢立克圖獲噶爾丹遺爾書内既有乞爾遣人於彼之語爾可藉此遣人語噶爾丹云我科爾沁十旗俱已附爾矣爾可前來我等當從此地接應以此説之誘至近地於時朕親統大軍風馳電擊彼不及逺遁斷可滅矣爾可仍遣前所差俄齊爾往遂以御服龍袍一銀鼠褂一賜之既而上遣侍郎西喇往與土謝圖王沙津宻授俄齊爾説噶爾丹之計視其起行其時西喇即以遣俄齊爾之故差人宻諭達爾漢親王班第及諸台吉臣謹按噶爾丹性生狡黠乆習戰鬭見易則進知難而退往來飄忽踪跡無常誠非可一朝繫頸制命之寇也曩年噶爾丹逆謀狂逞入我烏闌布通之地領兵諸王大臣雖擊却之而不能殱𠞰反遣人語内大臣蘇爾達使盛京烏喇科爾沁諸路兵勿與之戰是以噶爾丹奔竄竟不邀擊縱之逸去蘇爾達與土謝圖親王沙津達爾漢親王班第等共商遣阿喇善之人俄齊爾等使噶爾丹暫止而竟不肯少留倉皇急走於是衆皆疑科爾沁以為已附噶爾丹矣将軍薩卜素等亦宻奏科爾沁有異心皇上絶不之疑既而噶爾丹遺土謝圖王沙津書佐領畢立克圖得之出首皇上睿謨深逺又隱之不洩後沙津元旦來朝皇上以薩卜素等宻奏及畢立克圖首書當諸王台吉前宣示沙津復諭之曰爾科爾沁自太祖太宗之時歸附以來世世職貢相為婣親厯有年所爾等斷無此意朕衷略無所疑果有可疑亦不如是宣諭矣溫㫖下頒沙津及諸台吉皆叩首奏云衆皆宻奏言我科爾沁已附噶爾丹而畢立克圖又宻首噶爾丹遺我之書䝉皇上略不疑我反明白宣諭臣等亦復何言但效死以報髙厚之恩而已其意既誠皇上仍俟時而動未幾獲敵人情形實跡見有可乗之機遂宻授沙津誘致噶爾丹之計沙津感戴聖上仁恕不疑謹遵諭㫖仍遣俄齊爾往與噶爾丹約噶爾丹果來近地大為我師所敗隨抵滅亡由是觀之自噶爾丹烏闌布通逸去之後皇上時厪於懐早夜籌所以圖噶爾丹之策至獲噶爾丹遺沙津等書乃因其計而用之引之前來深勞睿慮始得奏勲聖徳神功誠邁於古帝王之上矣庚戌尚書班第奏報噶爾丹情形班第奏言臣遣喀爾喀貝勒汪扎爾部下兵孟索和等四人於本月初三日賫文往送公西卜退哈灘巴圖爾及納木扎爾陀音扎薩克台吉阿里雅貝勒根敦帶青十三日孟索和等還言我等於初七日至台吉阿里雅處阿里雅等聞噶爾丹聲息皆㑹集一處現居俄儂額竒河根敦帶青居烏蘭阿拉兒地方我等於初八日自阿里雅處起行至巴爾泰罕地方遇厄魯特兵前來追逐我等奔出立於髙阜處逺望見厄魯特兵沿克魯倫河屯劄踪跡甚衆我等向内來時視其行蹤西卜退哈灘巴圖爾納木扎爾陀音等已往隂山之北而去見噶爾丹兩枝兵隨後往追之謹具狀以聞增發官兵上諭議政大臣曰前因備兵過多曾經減退朕今思之仍宜備兵一隊此所備者於前減䕶軍三名親隨䕶軍一名再增每佐領下䕶軍各一名鳥鎗驍騎一千二百名鳥鎗䕶軍四百名按鳥鎗驍騎之數派夸蘭大及章京統之其增發之䕶軍俱派實授叅領統之至諸王不必隨現來之兵而來可於後隊兵内一同預備至八旗察哈爾地方所有牧羣内現在可用之騸馬二千餘匹着交都統将各旗馬匹調取交部分給八旗現備之兵以充拴養馬額至都統胡巴伊勒慎諾穆圖䕶軍統領蘇赫副都統龍什庫張所知目下不必前來亦着於後隊兵預備此軍未出之前朕當到京其增發之大臣俟朕進京另奏辛亥命䕶軍統領鄂克濟哈副都統扎喇克圖廵行邊哨遣使賫勅往諭噶爾丹時噶爾丹劫掠喀爾喀漸入内地上特使阿爾必特祜賫勅往諭之勅曰尚書班第於八月二十二日奏報爾擁兵來西卜退哈灘巴圖爾及納木扎爾陀音等所居近地肆行掠害前爾自烏闌布通敗竄時於内大臣吳丹前跪禮威靈佛像誓不再侵中華皇帝之喀爾喀與衆生靈爾之印文誓書昭昭具在也且爾毎有奏疏自謂遵行達賴喇嘛之教廼於朕與達賴喇嘛議結之事屢生釁端蔑棄誓言是爾於其教名為遵奉實則悖違朕前已有㫖詳悉示爾兹無他諭但爾今之來必有其意應備奏陳朕自有裁奪此兵果爾親帥與否差五品官阿爾必忒祜前往確詢故諭癸丑将軍伯費揚古奏請率兵相機行事費揚古奏言尚書班第移文内稱探得西卜退哈灘巴圖爾等已往隂山之北而去噶爾丹率兵尾進先是臣因未獲噶爾丹確信謂察馬哈地方乃東西通衢故統大兵駐此今閱班第來文則偏在歸化城之東北是以臣等公商一面差人令王善巴及喀爾喀諸扎薩克移入哨内一面将右衞兵交副都統党愛使守歸化城臣親率大兵往四子部落蘇尼特等處駐劄相機行事奏至上從之九月戊辰副都統齊蘭布奏發盛京官兵先是上諭副都統齊蘭布侍衞臘八什曰盛京年來歲歉恐軍士難以征行朕甚念之爾等前往可㑹同彼處将軍副都統詢明軍衆令其出征官兵可給糧兩月併給來歲一年俸餉至是齊蘭布等奏言臣等至盛京宣㫖其軍士皆以歲值洊饑屢䝉聖鑒賜銀發粟咸俾更生願得竭力軍前以仰答皇上愛養至意環跪陳請於是官兵各與兩月糧及來歲一年俸餉辦裝畢於九月初六日将軍綽克托副都統穆泰率之起行具状以聞己巳諭各路還師秣馬時将軍伯費揚古奏言坐臺員外郎博洛叩報稱八月二十九日暮有昆都倫博碩克圖王所差探聽噶爾丹聲息人還言我等於是月二十一日至克魯倫河源巴顔烏䦨處視之並不見西卜退哈灘巴圖爾等遊牧屬裔地方皆已蹂躪取視牛矢猶然濕潤因思伊等必被噶爾丹劫掠未乆隨行前進至拖諾立山岡逺望有大隊蔽地而來並無旗幟我等匿身山㘭見頭隊輜重於薄暮時抵拖諾河屯劄首尾絡繹不絶直至夜半始安營畢跨河而駐者殆三十里營内廵警之人皆歌笑廵行聞彼歌聲乃知為厄魯特翼日我等欲審厄魯特所向潛於山中逺㘭見頭隊輜重黎明動身驅牲畜度拖諾嶺其尾隊至日昃後方度畢羊少而駝馬甚蕃皆沿土喇河順流西去揆其去向有趨庫黑納塔爾納之狀大約人馬行踪二萬有餘俟噶爾丹兵過畢我等始歸謹具奏聞上諭議政大臣國舅佟國維等曰将軍費揚古報稱噶爾丹将喀爾喀西卜退哈灘巴圖爾及納木扎爾陀音等恣行劫掠即竄往土喇河順流而下西向庫黑納塔爾納以去以此揆之彼實無意内來京城所發大兵可暫還秣馬以待更行文諭盛京烏喇黑龍江将軍及科爾沁等諸扎薩克其預備兵且止仍檄知将軍費揚古彼所領兵衆亦權囘本汛将馬匹加意餧養若放喀爾喀等入喀倫内遊牧恐有互相竊奪之事可檄尚書班第令彼在喀倫外附近處暫居壬午命八旗武職大臣官員各陳所見上諭大學士伊桑阿等曰噶爾丹侵擾外藩去來無定備師𠞰寇共當熟籌着八旗滿洲䝉古漢軍凡都統以下阿達哈哈畨叅領以上各官於各旗聚議噶爾丹若何𠞰除我兵若何設備議定由本旗陳奏茍言有可採朕即允行爾等其通諭知甲申命發四十九旗䝉古及喀爾喀兵聮屯於正藍旗察哈爾界上至喀爾喀河上諭大學士伊桑阿等曰着於四十九旗䝉古毎佐領挑選三四名令本佐領中毎人各給馬三匹及甲胄助弓矢全副毎月人給銀一兩又喀爾喀兵亦選二千名俱照此例為之遣我内地章京操練聯屯於正藍旗察哈爾界上以至喀爾喀河倘有舉動該王貝勒貝子公台吉有願効力者即率此軍而行則於事大有裨益俟噶爾丹事畢之時令是軍各歸本旗當於今冬定議至來春草青時行之爾等其㑹同議政大臣議議曰噶爾丹刧掠喀爾喀之納木扎爾陀音西卜退哈灘巴圖爾則挑選䝉古兵預備甚屬𦂳要宜欽遵上諭而行今請於四十九旗毎佐領或精壯甲丁或附丁以五名筭共挑選六千六百名至喀爾喀衆扎薩克亦應挑選二千名差大臣同該扎薩克公閱挑選所選兵或缺有子弟精壯者補之子弟孱弱自該佐領挑選補之兩佐領十人内委署十長一員令所選兵自正藍旗察哈爾界上至喀爾喀河隨宜結隊屯劄其屯是軍也不可不就水草佳處其相水草也亦應差大臣往視俟相地歸将所屯幾處以幾旗為一隊編列進呈御覽至來年草青時各就所指之地屯劄此所屯四十九旗兵原有甲胄俱自木佐領内凑給毎人馬三匹喀爾喀之兵原無甲胄旗幟應令工部照數製造驛遞解往至給此衆扎薩克兵之弓矢應令京城大小各官助給此所屯兵毎月人給餉銀一兩所給銀自户部解往所屯兵不可不操練應各處挑選叅領一員散騎校二員䕶軍校驍騎校二員遣往管領操練應撥各章京職名著該部奏㸃此所㸃章京六個月一更換如此軍有出行之事著該王貝勒貝子公台吉有願効力者各率屬下所備兵而行俟噶爾丹事畢之時是軍各歸本旗至總統是軍而行之大臣臨時該部請㫖其往視水草往選兵丁應差之大臣名銜該部開列引見欽㸃奏入上從之尋理藩院以往視屯地及往選屯兵之大臣入奏上曰尚有與䝉古諸王共商之處姑停之俟來年正月開印後具奏亦無所悞也後以三路大兵進發遂寢其事十月壬辰命議中西二路進𠞰事宜上諭議政大臣國舅佟國維等曰二十九年噶爾丹大敗逃竄懼我軍窮追誓不復犯我朝降人喀爾喀近者背棄前誓肆掠納木扎爾陀音以去彼既食言在我亦當商確舉事可𣲖西安寧夏滿漢兵從西路進京師兵從中路進𣲖出之兵乗雪而行到彼時塞草青發可以前進其官兵作何議𣲖師行糧食宜親攜幾月隨運幾月隨運之米或車載或駝負所需駱駝車輛幾何及厮役之名數口糧一併核算其集議之議曰𣲖發京師官兵前鋒八百名以毎旗前鋒叅領前鋒侍衛各一員前鋒校六員率之親隨䕶軍兩佐領下合一名䕶軍毎佐領下各一名以毎旗䕶軍叅領三員毎叅領下䕶軍校二員率之鳥鎗䕶軍八百名以毎旗䕶軍叅領一員䕶軍校七員率之鳥鎗驍騎四百名以毎旗驍騎叅領一員散騎尉二員驍騎校四員率之八旗漢軍火器營兵共二千名毎旗綿甲軍各八十名以毎旗或協領或叅領一員操練尉操練校各五員率之滿洲礮毎旗五門各隨以撥什庫及驍騎三十七名以毎旗散騎尉二員驍騎校二員率之漢軍礮毎旗十門冲天礮毎翼一門毎旗各𣲖礮手二十一名綿甲軍十名撥什庫及驍騎六十名以驍騎叅領各一員散騎尉各十一員率之再毎旗𣲖弓匠二名傳宣二名毎翼傳宣校一員其總領官兵大臣都統毎翼二員䕶軍統領各一員前鋒統領兩翼一員副都統毎旗一員漢軍火器營毎翼都統一員副都統一員管漢軍礮都統一員副都統三員其察哈爾兵二千毎旗𣲖叅領或次頭領一員閒散章京及驍騎校各五員喀喇沁翁牛特兵一千𣲖夸蘭大八員叅領及閒散章京各四十員盛京兵二千烏喇兵一千𣲖夸蘭大八員叅領及散騎尉驍騎校各四十員其所帶厮役名數将軍十人都統八人前鋒統領䕶軍統領副都統七人夸蘭大及叅領六人前鋒侍衞署叅領五人散騎尉四人䕶軍校驍騎校三人䕶軍撥什庫驍騎一人礮手綿甲軍二人合一人共計人口三萬五千四百三十餘毎口月計米二斗兩月需米共一萬四千一百七十四石有竒如用駝負計用駱駝九千四百四十餘如用䝉古車載其車數與駱駝同若以牛羊代一月行糧八十人計牛一頭半月需牛六千六百四十餘十五人計羊一隻半月需羊三萬五千四百三十餘再西路進兵誠為勝筭應選發西安滿洲兵三千漢軍兵一千綠旗兵六千𣲖官分領其官兵人口幾何所需五月口糧作何親攜隨運應着彼處将軍總督廵撫提督總兵官㑹同確議以聞議入上從之復遣刑部尚書圖納赴陜西與将軍總督等㑹議癸巳命伯費揚古為右衛将軍上諭大學士伊桑阿等曰右衛地方甚要将軍責任甚重朕再四思維惟費揚古堪任是職着授伊為右衛将軍仍兼攝歸化城将軍事務己亥命喀爾喀等仍於喀倫内遊牧先是有喀倫内遊牧之喀爾喀使在喀倫外地方遊牧之㫖至是侍讀學士伊道奏言臣往躧探厄魯特聲息自克魯倫囘至烏朱穆秦其地名吳爾揮見喀爾喀之達賴濟農告曰䝉皇上俯憐喀爾喀諭使入喀倫内遊牧我等即遷來已至喀倫内兩三日程之地今又使我等囘至喀倫左側駐牧目下雪大退囘路逺牲口不能到即勉强退去不免遭厄魯特巴爾虎之害欲不退囘又恐罹違㫖之罪欲遣使奏聞又路逺不能立達據此具奏得㫖使喀爾喀遊牧者特憐之欲其生遂也今大雪之時使之退囘反致困苦伊道爾可與大學士理藩院速議之議曰皇上使喀爾喀於喀倫内遊牧原欲令其生遂特加矜恤之至意今於大雪時遣之退回則反困苦矣請諭尚書班第令喀爾喀在喀倫内距扎薩克䝉古一二日程地方離空游牧如有互盜駝馬牛羊諸畜者着尚書班第㑹同該扎薩克審明立行正法使之知儆仍速檄駐劄喀爾喀扎薩克地方管理盗賊偵探聲息官員遵照曉諭喀爾喀可也上從之庚子命預備官兵時尚書班第奏言臣遣人赴克魯倫等處偵得噶爾丹在峩格穆爾布爾哈蘇泰之地度冬俟雪後乃行因真偽未審復遣員外郎達賴台吉格根鄉導萬舒克等佐以四十人往視厄魯特大勢踵其踪跡實探所往之地達賴等於十月初六日囘稱至克魯倫峩格穆爾布爾哈蘇泰地方匿身河岸望見對河有厄魯特人衆自多羅忒延及巴顔額爾黑圖駐劄約三百户駱駝牛馬共千餘頭毳幙敝壞絶無羊羣其人出入徃來故未能悉數謹據奏聞奏至上諭議政大臣國舅佟國維等曰噶爾丹情性奸狡前已有下雪時行走聲息今所報與前相符應飭兵預備設彼數盡敢於嚴冬妄進我大軍可即行𠞰滅矣今毎佐領派前鋒一名親隨䕶軍一名鳥鎗䕶軍二名䕶軍五名鳥鎗驍騎一名漢軍火器營兵二千以備所𣲖兵卒可視人材矯健者選之其領兵大臣着兵部奏請再宣化府具有草豆於京師所畜馬匹内毎佐領派馬十匹發往飼養咸令肥澤俟大兵行日毎兵給京師馬三匹宣化府馬一匹其宣化府飼養之事應差部院大臣一員及旗下大臣一員前往親督差往大臣着該部請㫖又時值嚴冬倘行進𠞰可令派出兵衆将所備禦寒之羊裘煖帽諸物務須温厚右衛将軍費揚古處可令檄知其所屬兵衆亦預備以待尋以宣化府督飼馬匹𣲖出副都統凱音布學士博濟前往壬寅命都統噶爾馬等赴察哈爾左翼駐劄偵探上諭大學士伊桑阿等曰都統噶爾馬副都統碩岱着往駐左翼察哈爾地偵探厄魯特聲息設有警可傳集左翼察哈爾兵衆以待京師之兵丙午宥喀爾喀納木扎爾陀音等罪先是遣尚書班第傳諭納木扎爾陀音内移納木扎爾陀音等不遵諭㫖潛於克魯倫處遊牧至是被厄魯特大掠且将噶爾丹所差致書之人不行拘拿縱之使歸以是納木扎爾陀音及其弟諾爾布額爾克台吉弟之子龔厄多爾吉族兄之子諾爾布林陳等至理藩院面縛跪訴服罪請死隨據奏聞事下議政大臣議議以納木扎爾陀音等違諭被掠且私自遣回遞書人大干國典應正法議入上從寛宥之丁未命詳議征𠞰噶爾丹事宜上諭議政大臣公宗室蘇努等曰噶爾丹侵擾邊疆之事日厪朕懷故凡一切遣使及素所往來之人不憚諮問以是知其部落不過五六千人我大兵踴躍爭奮有願戰心而大臣官員逡廵退縮無意自効但云俟彼來前可與一戰若逺在克魯倫必待塞草萌達方可前行朕因憶曩日誘噶爾丹至烏闌布通我軍威甚盛不即為𠞰除致令逸去毎一念及心竊恨之匪獨在朕即下至編伍厮卒亦罔弗怨悔者近觀噶爾丹於巴顔烏闌屯聚果有乗雪蠢動之意朕欲如前誘入内地諒其創痛之餘不復再至然彼縱不敢深入或潛來邊徼掠我外藩亦未可定聞警後始遣大兵勢不能朝發夕至我進彼退我還彼來再三若此凡䝉古諸部亦大遭其蹂躪矣是噶爾丹一事爾諸王大臣亦當留意可與八旗滿洲䝉古漢軍都統前鋒統領䕶軍統領副都統等公同籌畫作何進止其詳議之議曰睿照旁燭誠如所慮今宜遣發師徒一舉殄滅請将前議宣化府飼養馬匹停其發往毎佐領下照派出兵數畜馬四十匹毎匹給銀四兩限四十日速令肥健馬力一足即攜兩月糧赴巴顔烏闌進𠞰倘馬力未壯之先噶爾丹遽侵邊境可於諸王及大臣官員自養馬匹内選擇可用者儘給兵衆資其前進議上上曰毎佐領下馬十匹着仍發宣化府飼養命調外藩兵兩路分防噶爾丹上諭議政大臣公宗室蘇努等曰方今冬令噶爾丹雖不能親率其妻孥輜重前來或以遊騎潛掠喀倫近地亦未可定然諒其人無多我京師大兵不便輕於選發即遣往亦未必與彼相值朕再四圖維莫若以䝉古兵應之爾大臣前以其兵為不可用朕黙無一語今視䝉古兵無不可用者現今墨爾根濟農沙木巴帶青各備兵一千歸化城有将軍費揚古駐劄西路事柄應全付與右翼察哈爾兵歸化城兵及四子部落以西所有各扎薩克兵俱令伊酌量徵調分屯要害嚴斥堠逺偵探倘噶爾丹掠其附近邊境費揚古即率所備兵衆及墨爾根濟農等兵立行進𠞰其東路派出願効力大臣畀以重權凡左翼察哈爾兵兩蘇尼特兩阿霸垓兩阿霸哈納爾兩蒿齊忒兩烏朱穆秦及喀爾喀主謝圖汗折卜尊丹巴貝勒席地西里班朱兒多爾濟並左近所有喀爾喀扎薩克兵亦聽其酌量徵調屯駐要地逺設遊偵倘噶爾丹掠其相近邊境亦即率所備之兵立行進𠞰其東西二路大臣凡有機宜互相關白甚於事有濟爾等其即集議議曰聖謨周至應各祗承除東路大臣另題請外其西路兵衆即檄知将軍費揚古速行徴調倘噶爾丹小隊遊掠可即撲滅若大衆入犯著一面奏報一面調取右衛兵以備議上上曰所議甚善移費揚古之文交關保賫往尋蘇努等以遣往東路大臣恭請親簡令往㑹都統噶爾馬副都統碩岱公同徴調諸䝉古兵上曰兩蘇尼特兩阿霸垓兩阿霸哈納爾旗兵著索額圖前往收集鄂克濟哈扎喇克圖現赴喀倫索額圖可偕之去喀爾喀土謝圖汗等及兩蒿齊忒兩烏朱穆秦旗兵著明珠偕阿爾尼恩格森前往收集俱令各駐要地探聽聲息噶爾馬碩岱朕已令於察哈爾左翼駐劄毋庸遣動設有必不可已機務再行調取㑹同索額圖明珠等以行其理藩院官或别部院官聽所遣大臣酌量題帶伊等兹遣非取其奮勇一試也惟期一應聲息得其真實耳尚書班第雖現在彼偵探猶恐京師大兵難遽定行止故復有此遣師之進否俟伊等報聞定奪其立馳驛前去毋緩聖祖仁皇帝親征平定朔漠方畧巻十六

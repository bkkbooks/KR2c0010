body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略巻二十九九月甲寅朔檄䇿旺喇卜灘保䕶回回國王阿卜都里什特阿卜都里什特奏言臣為噶爾丹所擒受寃苦十有四年仰仗聖上威靈滅噶爾丹臣得出而來降合家既䝉聖上髙厚之恩今又使送臣歸故土差官併備坐騎食物而遣之臣到土魯畨探信或誅噶爾丹或擒解噶爾丹俟得實音歸臣舊居葉爾欽地方再來進貢請皇上萬安但往葉爾欽必過䇿旺喇卜灘地方恐厄魯特之心無常若無皇上勅㫖未必不虐害臣請給勅書開明臣係歸降皇上之人爾勿得虐害給之前往彼知臣已降皇上必畏天威而不害臣矣上以為當給發部文着大學士與議政大臣㑹議撰文奏覽議曰回回國王阿卜都里什特之父子為噶爾丹所擒受寃苦十有四年幸逢皇帝親統大軍之威𠞰滅噶爾丹阿卜都里什特得乘間而來降皇上憐其逺離鄉土在噶爾丹處歴年患難擕之到京賜之御用衣冠諸物以及銀幣又使送歸故土特撥官全備什物而遣之但往葉爾欽地方恐䇿旺喇卜灘人衆攔阻此無庸發勅應該部備文檄知䇿旺喇卜灘開明阿卜都里什特等已歸降本朝䝉皇上恩恤送歸故土原由勿致虐害嗣是以後厄魯特與回子當相與和好撰文奏覽上從之乙卯命西寧多撥人員送回回國王阿卜都里什特等至哈宻給弓矢諸物理藩院奏言據回回國王阿卜都里什特吿稱䝉聖上𠞰滅噶爾丹我乃得脱來投皇上䝉皇上加以非常之厚恩今遣我歸故土又特撥官沿途備給坐騎衣服食用諸物直至嘉峪關使我略無艱苦但嘉峪關以外既不諳道路而夥伴人少乞撥人䕶送我等至哈宻且我等無弓矢撒袋諸物請至嘉峪關頒給我等據此具奏上命該地方官交喀什撥回子二三十人送至哈宻行文地方官給之弓矢諸物阿卜都里什特恩賜已畢請今於是月初三日起程上准其起行命發厄魯特降人至京附入旗伍有不願者遣往大將軍伯費揚古軍前招撫噶爾丹先是理藩院奏言據臣部郎中滿都報稱今已凉爽必遷厄魯特入京查陸續來降之厄魯特大小人口共一千五百三十七人内除取至京城喇嘛羅壘厄木齊格楚兒席喇卜喇木札木巴等夥伴回回國王阿卜都里什特等夥伴隨員外舎稜前往之唐古特寨桑等共二十口死者八口所剩大小人口共一千五百九人内有乘驛送來者又有無馬畜者如令伊等赴京其無馬匹者或給驛車或另設法候部裁奪至伊等沿途口糧如從張家口支去則費牲口䭾負乞咨該部行文沿途支給口糧每人給肉其丹巴哈什哈等六百餘口係左翼察哈爾官兵看守台吉塞冷札卜米寨桑等八百九十許口係八旗章京率兵三百看守倘遷厄魯特降人入内或仍令原舊看守官兵䕶送或令邊闗之兵緑旗官兵沿途䕶送候部裁奪又據滿都呈稱康熙三十五年八月二十四日丹巴哈什哈來吿曰我妻達什言前次降人代綽特之西里杜喇兒和碩齊等六人其妻子不來其意有仍歸噶爾丹之狀此軰不可信爾等當防之我以為聖上如此加恩伊等焉往是以不吿近來西里杜喇兒和碩齊來告我曰聞我妻子俱在噶爾丹所此地無一依靠之人難以為生我等意既無所定天又寒矣無人縫補炊㸑何以度日八旗營内有我一舅母阿民台其子阿咱喇僕婦和洛里請使伊等與我等完聚以此言觀之則與我妻達什前言相符且西里杜喇兒和碩齊常與噶爾丹僕人亦無妻者名孟克偶語沙中是以我吿彼曰聖上寛宥我等待以不死又如此恩養奈何作此意雖目下無歸若到聖上馬足之下自有妻矣今為此等人不可信請謹防之據此責令看守厄魯特之四旗察哈爾叅領等官龔格額兒追等小心防備嚴加巡警外恐西喇杜喇兒和碩齊等脱逃飭令防䕶於鑲黄旗營中取彼舅母阿民台等一同安挿至此等妻子不來者思念妻子雖不能去未必不揺動衆心應將此軰作何措置乞大部速行定奪為此奏聞上諭内大臣索額圖明珠大學士伊桑阿阿蘭泰尚書馬齊曰今天時已凉着取丹巴哈什哈等來京令副都統吳達禪乘驛而往同納喇善滿都遷來又滿都報稱無妻子者心無所定倘厄魯特有不願内來者即從彼處送赴大將軍伯費揚古軍前着將軍伯費揚古給不願來者各馬一匹遣回令彼往諭噶爾丹言彼若來降亦待以顯榮其看守厄魯特等之察哈爾兵各歸本地至解厄魯特降人到京着邊關官兵緑旗官兵轉逓押解并令戸部理藩院賢能官各一員前往沿途給口糧食物及馬草料小心解來内有幼童婦女無馬匹則酌給驛馬驛車既取伊等到京應令議政諸臣㑹議編入隊伍具奏至是議政諸臣議曰據郎中滿都報稱降人丹巴哈什哈等厄魯特共一千五百九口内除歸併先降之巴拜者人口一百七十五名回回國王阿卜都里什特人口十二名外現存厄魯特人口一千二百零應編入鑲黄正黄正白三旗滿洲佐領其内有父子兄弟不可離者如編入一佐領為數浮多則扣筭一佐領人口其餘編入本叅領内之佐領以丹巴哈什哈等七十五户為一旗以察罕西達爾哈什哈等八十二户為一旗以台吉憨都等七十五户為一旗伊等目下既到其所居住應着都統副都統佐領以本佐領下房屋暫行安插所給伊等房屋該部另奏請㫖其六十嵗以下十五嵗以上人等於佐領披甲額外令其披甲食糧其内喇嘛之厮役及有主之厮役各附其主不准給糧其各項工匠不令披甲給以工匠之糧在工匠内服役俟到日起各項食物照新滿洲例給與丹巴哈什哈察罕西達爾哈什哈台吉憨都等應以何人為何旗授以何職伏候皇上指示其六十餘喇嘛着理藩院交黙爾根綽爾濟安插何廟具奏請㫖此安插之厄魯特内日後有增有減另議俟命下之日將扣抵三旗口數名字彚造清册各給本旗厄魯特一到各旗差官收領内有年老孤身附入人口少者之家給米贍養奏入上從之丙辰勅詰大將軍伯費揚古諭費揚古曰據此際噶爾丹地方逃來人言迫於饑凍此大機會有上天眷佑授我之象此不可復失爾等當着實留心前朕親至克魯倫之時若爾等之兵能䟎行三日到巴顔烏蘭左側噶爾丹何能得脱設商南多爾濟來後或以所到之地奏聞一次或朕所差殷扎納額林辰等於十三日前到則朕軍何故回師因爾軍斷斷不到俱至饑餒故回師調撥軍糧然而脱出如許人降者逃回誠不料及此也此等之事至今追悔不盡爾兩大將軍相會之時朕軍之馬甚壯理當選擇換馬追之收取離散之人其時雖散因無人收之故一一聚而成羣宜矣今爾等成算如何噶爾丹形勢如何朕因懸隔急欲聞之特發手書往諭川陜總督吳赫奏報哈宻回子頭目額貝杜拉達爾漢白克遣人進貢來降吳赫奏言據署理肅州總兵官印務副將韓成呈稱哈宻回子頭目額貝杜拉達爾漢白克差回子阿林白克賫奏章及進貢獨峰駱駝一頭馬二匹駱駝八頭小刀一柄誠心歸投皇上等因到臣臣思哈宻回子頭目額貝杜拉達爾漢白克差阿林白克誠心向化來降真皇帝德威逺播之所致也於是往取臨洮道勘合俟到時撥官及通事令阿林白克起程赴京為此奏報以郭爾羅斯台吉畢立滾俄齊爾助馬命陞為一等台吉先是上諭理藩院曰郭爾羅斯扎薩克四等台吉吳爾圖那蘇圖鄂齊爾旗下二等台吉畢立滾俄齊爾是役軍中助馬較衆最多着部議奏至是理藩院奏康熙十六年十月内陜省花馬池等處効勞俄爾多斯多羅貝勒索諾木旗下四等台吉吳魯雅克等十六員因從軍各陞一級後議叙有出征頭等功牌又陞一級今二等台吉畢立滾俄齊爾雖無功牌而是役軍中助馬較衆最多應陞畢立滾俄齊爾一級為一等台吉上從之命給將軍孫思克博濟赴京官兵口糧馬匹草料兵部奏言將軍孫思克博濟咨稱某等奉㫖已於八月十七日到京除本將軍副都統及總兵官等不支口糧草料外西安將軍帶來八旗滿兵漢軍官二十六員兵五百名僕從共一千九十三名馬共一千四百十七匹孫思克帶來官十二員兵一百三十二名馬共二百十六匹乞自入京之日為始給伊等口糧草料據該將軍既稱本身及副都統總兵官不支口糧草料應不議外滿洲官兵及緑旗官兵俱係奉㫖來京之官兵應檄户部於此項官兵自該將軍九月初一咨部之日為始算到起行以前照例給口糧草料奏入上從之丁巳有㫖出巡張家口發兵擇日先是大將軍伯費揚古奏王善巴哨卒來報八月二十四日在達䦨土魯地方見有厄魯特形影因調右衞兵一半前來上曰前命安王將軍薩卜素來京今着停止各率其兵赴大將軍伯費揚古軍前着議政諸臣集議至是議政諸臣議以為應令安王將軍薩卜素赴大將軍伯費揚古軍中得㫖朕將往宣化府地方試鷹當減從而往侍衞撥二百員御營撥三旗新滿洲䕶軍驍騎三百名着帶子弟以代僕從撥三旗親隨䕶軍每旗三十名八旗前鋒四百名火器䕶軍一千名每旗帶馬上礮三門此次隨駕前鋒䕶軍驍騎以佐領内拴喂之馬每人各給四匹乘坐侍衞内有無馬之人亦各給馬四匹乘坐此從行侍衞䕶軍不論曾否出征俱閲家足人强者派出火器䕶軍千名分為兩營其坐馬將漢軍旗内所拴之馬亦選與坐用此行不過試鷹諸色人等不得告請從行其料理馬匹着户兵二部料理起行日期於九月初十日以外十五日以内揀擇其部院官員不得多派照哨鹿例從少派出兵丁之糧亦從少支取張家口貯有米在到彼再給督理運務于成龍等回京中路督運都御史于成龍通政使喀拜於科圖地方撥給口糧事畢回京復命于成龍等奏曰臣等督運正米二萬七千石給過中西兩路滿洲緑旗官兵挽車人夫及絶糧諸人一萬八千石有零外所餘八千一百九十六石五斗零内堆貯揆素地方之米三千六百六十石七斗零給過三省挽車人夫及緑旗兵所餘堆貯小米四千五百六十石八斗零堆貯察罕腦兒之米四千五百二十九石三斗零小米四十七石零以上正米小米共一萬二千八百六石三斗零俱小心堆貯其米上空布袋一層蓆二層布油单二層共葢五層緊急拴繫其米下墊以破車松板堆貯地方兩處週圍掘壕深五尺濶六尺此米同理藩院尚書班第親交蘇尼特阿霸垓等旗台吉祁他特都統畢瑪喇等小心看守謹奏戊午命隨便安設驛站兵部奏言是行也除内地驛站照常安設外但今春出兵因䝉古馬匹羸瘦調内地驛馬一千匹協助是行或仍前以内地驛馬協助或僅用䝉古馬匹安設俟命下之日會同理藩院議之上曰䝉古驛站不至有悞朕亦沿邊而行所行不逺調馬之事無庸預議如或出邊再酌量施行右衞䕶軍統領費揚固等奏報率兵起行赴大將軍伯費揚古軍前副都統拜音布馮國祥等報曰據大將軍伯費揚古咨稱善巴王巡哨之人言在達䦨圖魯地方見有厄魯特形影飛塵着將爾右衞䕶軍統領副都統夸蘭大駐防協領各章京及䕶軍驍騎火器營兵皆撥一半以留下官兵之馬填給乘坐文到次日起程中途一宿次日到歸化城自歸化城踰翁滾嶺第六日到巴顔布喇克再帶子母砲十六門每旗各給二門支百次火藥鉛子而來據此䕶軍統領宗室費揚固瓦爾達副都統黨愛柯爾對夸蘭大駐防協領各章京䕶軍驍騎火器營兵俱率其半於九月初二日起程矣為此奏報黑龍江將軍薩卜素以赴京奏聞薩卜素奏曰臣遵㫖以兵四百交駐防協領胡布納等由口外遣回臣率兵一百赴京己未尚書班第以給賞之事奏聞先是有㫖謂是役修道鑿井監牧坐塘䝉古台吉官兵應給恩賞至是班第奏言臣等遵㫖查修道監牧鑿井兩阿霸垓兩阿霸哈納爾兩蒿齊忒兩蘇尼特及坐塘兩烏朱穆秦克西克騰十一旗共賞過銀二萬四千九百四十兩其銀自都御史于成龍處支用至給賞之時台吉官兵跪吿臣曰我䝉古幸逄皇上昇平之世安居樂業而噶爾丹擾害邊人竊踞巴顔烏䦨等處地方使我軰不得安生䝉聖主為我沿邊䝉古親綂大軍深入敵境𠞰滅噶爾丹自兹以後我等永得安寧矣少長歡呼無不向闕稽顙今又䝉聖上慰勞加以洪恩賞賚不勝感激乃望闕謝恩臣欽惟皇帝以噶爾丹逆天刼奪北邊掠喀爾喀納木扎兒陀音竊踞巴顔烏䦨等處復伺刼喀爾喀皇上預籌熟計欲一舉滅之乾剛獨斷發大兵各路堵𠞰御駕親統六師而出天威難抗中夜遁逃皇上統大軍深入敵境追至拖諾等處噶爾丹窘迫已極僅圖亡命盡棄諸物日夜奔逃值皇上預定廟謨詳加指示遣費揚古之兵堵禦𠞰除擊而殺之俱與聖上謨略纎毫不爽事事符合允如皇上百日成功之諭十旬之内竟滅噶爾丹亘古以來未有如皇帝之勇略俱全殊猷異績也臣等愚劣不能記憶筆不勝書幸逄聖世聞此凱音無任懽忭謹頓首稽首上聞辛酉命總兵官王化行協助巴圖爾額爾克濟農上諭户部尚書馬齊兵部尚書凱音布等曰噶爾丹窘迫已極近朕差阿南達以巴圖爾額爾克濟農之兵堵禦其外恐噶爾丹乘虚往巴圖爾額爾克濟農行刼着爾兩部檄總兵官王化行如噶爾丹往巴圖爾額爾克濟農處即率其兵往援併諭巴圖爾額爾克濟農知之壬戌命寛喀瓦爾達阿喇卜灘等免革職先是上撥前鋒二百往送使人以喀瓦爾達阿喇卜灘為首領有勿過燕圖庫勒圖即從彼地縱使人前去之諭伊等違㫖出其外馬被厄魯特所奪交該部察議至是兵部奏曰喀瓦爾達阿喇卜灘違㫖越過燕圖庫勒圖巡警不嚴被厄魯特奪去如許馬匹應將喀瓦爾達一等侍衞佐領俱革去鞭一百不准折贖令披甲効力將阿喇卜灘多羅額駙一等台吉革去罰九九牲畜入官其額駙噶爾臧台吉俄齊爾不為首領無庸議奏入上曰喀瓦爾達阿喇卜灘等並非戰敗着從寛免罪命宥修路侍郎多奇等罪先是上諭大學士伊桑阿曰獨石口之路竟不修治經行路中此路最不堪着發部嚴加察議關係軍務不得議以尋常之罪侍郎多奇乃専管修路之人其事惟何朕再三申諭修路之事重大今值寒凍當先修石嶺等處暫緩結氷之地勘明備工俟地將融動工修治則力不勞而行不悞爾當儆之乃違朕指揮不加詳閲在凍處草草塞責及至地融已成泥濘致悞大軍行路殊為可惡至是吏部議侍郎多奇口北道常明揚赤城縣縣丞程揚洪俱革職交刑部拿問從重治罪上曰前以行軍凡事不可不嚴故將多奇交該部議罪今自軍中來見多奇等所修之路大兵往返并無所悞着俱從寛免罪癸亥命撥侍郎多奇席米圖於大同宣府地方喂右衞兵丁馬匹先是上諭公常泰尚書馬齊曰據將軍費揚古奏言厄魯特見我邊汛備兵而遁應於十四日發兵起程朕躬於十九日發駕着議政大臣會議議政大臣遵照諭㫖請於十四日發兵起程御駕於十九日啟行上命議政諸臣會集面議至是議政諸臣入奏上曰朕躬仍於十四日前往試鷹所發兵照常在京預備如有所用再來調發目下着右衞兵一半秣馬俟肥後換費揚古帶往之兵前來秣馬大同則着撥侍郎多奇宣化則着撥侍郎席米圖監督喂養命撥扈從大臣兵部開列大臣名姓奏請分别隨駕前行留京備兵之人上命都統周卜世綂領托倫蘇丹塞稜格副都統吳達禪等䕶駕前行其餘大臣俱與大兵一同預備乙丑命定軍行日期上諭兵部曰除前撥八旗前鋒四百名外再増撥前鋒四百名朕於十九日發駕令大兵於十九日一二日前起行軍行日期着欽天監選擇具奏侍讀學士喇什奏報噶爾丹情形喇什奏言噶爾丹屬下人克齊克黙爾根等來降言丹津俄木布叛噶爾丹而去噶爾丹發輜重往庫冷白兒齊爾使之待已其身率兵往追之臣等欲探其聲息若何且以收其零散之人故親駐憨山左側自憨山遣鄉導叅領達爾漢伊羅兒圖等率兵往探伊羅兒圖還吿曰我等從克齊克黙爾根逃來踪跡前行到一地與過抗愛之嶺相對見有數道踪跡俱逾抗愛山而去無他往踪跡在我等未到之前已過去十餘日故我等即從彼地還八月二十七日丹巴哈什哈親弟吳黙叩黙爾根寨桑等男子四人婦女四人至喀倫降言我向為丹津俄木布之䕶衞近身隨行我兄丹巴哈什哈來降聖上之後噶爾丹使我代吾兄管倬和爾部落人衆授為寨桑早欲來歸皇上奈不得脱身之便及丹津俄木布與噶爾丹反顔叛之而去我隨丹津俄木布亦去噶爾丹追至額德爾齊牢時已昏是日不戰丹津俄木布知噶爾丹力尚强語衆曰我等與戰則不能敵同行必為所掩我等當各自分行會於阿兒台地方往投䇿旺喇􅁲灘於是零星分散丹津俄木布率六七十人而去丹津俄木布之妻父察渾台吉率百餘人向圖爾古特而去明安特之納瑪什希台吉率四百餘人向洪郭賴而去噶爾丹收取百餘人原欲往庫冷白兒齊爾不知其已去與否阿喇卜灘一概不預往空奎扎巴喀居住目下噶爾丹人有千餘阿喇卜灘雖無牛羊而馬駞尚多噶爾丹即馬駞亦殊少今天時漸寒大半無居無食噶爾丹未必能保有其下人殆必散盡矣副都綂阿南達奏報設哨於布隆吉爾等處阿南達奏言遵奉聖上成算於布隆吉爾之巴爾庫兒塔兒納親等路其地名博羅川濟則遣藍翎布達及巴圖爾額爾克濟農之布兒噶齊達爾漢寨桑馬賴額爾克哈什哈率十人駐劄於額布格特阿木格特地方則遣巴圖爾額爾克濟農之祁勞黙爾根薩里呼納親率十人駐劄於布隆吉爾之敖齊喀喇莽奈地方則遣驍騎校齊倫喀爾喀白蘇特扎薩克黙爾根濟農一等台吉索諾木伊思扎卜旗下都綂額爾德尼寨桑達爾漢他布囊率三十人駐劄於昆都倫額濟内地方則遣喀爾喀台吉帶青巴圖爾哈米爾巴圖爾額爾克濟農之渾他漢占哈什哈布達禮杜喇兒和碩齊率五十人駐劄九月初一日遣使起行矣竊思坐哨之人若至嘉峪闗肅州等處來報而後趨赴恐其已過有失機會若阿南達親身至布隆吉爾之都爾白兒濟形勢地方乃兩邊哨卒逓報之路僅率巴圖爾額爾克濟農等設哨餘剩之兵一百五十人往則為力甚薄故與提督李林隆共議增緑旗兵四百子母砲二十門臣親率之於九月初三日自肅州起行矣為此奏報副都綂阿南達奏報遣人曉諭哈宻回子阿南達奏言臣向甘州而來遇進降表回子令此内回子名俄羅斯者配以通事任義甫及臣家人二名往吿其頭目如噶爾丹來人力少則擒之人力多則驗明數目來報若噶爾丹至汝地給之糧馬縱之使去或不來報則爾等所奏無信矣噶爾丹豈能居此守䕶汝乎當熟籌之又教通事任義甫及臣家人使探常明英古出差䇿旺喇卜灘歸信及噶爾丹消息俟彼回時另行奏報副都統阿南達以喀爾喀白蘇特扎薩克黙爾根濟農等吿請効力之事奏聞阿南達奏言喀爾喀白蘇特扎薩克黙爾根濟農一等台吉索諾木伊斯扎卜協理旗務台吉伊爾登和碩齊格寧台吉帶青巴圖爾哈米爾畢力克圖胡魯木什俄木布西第巴喇額爾德尼俄木布等來吿曰我等䝉皇上豢飬之恩圖報無地請於戍哨偵探之事効力為此奏聞員外二郎保奏報青海聲息二郎保報言八月二十二日差守備平朝正撥什庫哈什台於善巴陵堪布曰汝前謂一槩言語若不啟聞達賴喇嘛不得擅以己意相覆俟啟聞達賴喇嘛其言如何當據實報聞未知汝差彼西方之人已歸否如已歸其言云何噶爾丹三十許人逃至青海地方矣其人衆寡姓名及諸凡聲息俱宻探而歸平朝正等九月初二日還言我等八月二十三日至善巴陵堪布所以所諭之言吿之堪布言達什巴圖爾台吉曾遣其人往使西方爾等往問巴圖爾台吉台吉殆知之我等往台吉所以是言告之台吉言我使人往西方未歸俟歸後達賴喇嘛如何諭我等當以其言吿汝又問之曰聞噶爾丹三十許人逃至青海地方其人何名共有幾人噶爾丹逃向何方巴圖爾台吉吿曰前年噶爾丹興兵掠厄魯特之杜爾伯特國有一逃來者乃杜爾伯特國之人其名綽克圖率其人三十許逃來在阿齊巴圖爾台吉所此綽克圖乃歸降聖上之人陀音之子巴拜台吉一族綽克圖言噶爾丹已向洪郭賴而去殆往投烏郎哈木多爾諸人爾又各處細訪杜爾伯特三十許人逃來在阿齊巴圖爾處是實别無異聞為此奏報丙寅大將軍伯費揚古以丹濟喇遁走之事奏聞費揚古奏言臣等遣善巴王旗下副都統善巴爾等偵探彼差人來報曰我等於阿濟爾布都納以南地方見有厄魯特屯劄布都納即退回數里藏於隠宻之處覘其行踪之多寡次日不見彼前來善巴爾等又前往視之使以此情來報八月三十日到臣等料厄魯特未必不退故遣人招降以覊縻之語噶爾丹爾戰敗無糧難以度冬不知大兵在此欲剽掠零星之喀爾喀度今冬耳聖上洞鑒此情早遣大兵俟爾於邊塞之地今聖上猶不忍爾破壞失其生業遣卓力克圖達爾漢巴克什等傳諭爾爾當熟籌久逺謀生之䇿遵㫖來歸聖化則爾必依舊得所矣不但爾噶爾丹然也凡人來降皇上亦必使之得所以此備文使員外舎稜解來厄魯特降人馬尼黙德賫之交鄉導阿南達引路令見厄魯特形影縱而遣之又副都統善巴爾等遇厄魯特納瑪喇什來降九月初一日解到臣所問據納瑪喇什曰我乃阿喇爾拜之人住居頽河噶爾丹戰敗無食窮困已極噶爾丹言滿兵大勝俱已進京喀爾喀等必出塞游牧可乘其隙取糧於喀爾喀以度此冬故使丹濟喇等率兵一千五百南來既到阿濟爾布都納地方此地所遣厄魯特卓力克圖達爾漢巴克什津巴到吿之以聖上遣兵堵禦邊汛丹濟喇等聞之遂紛紛遁去我乘此隙内來歸降卓力克圖達爾漢巴克什等初相見之際言我等逃出丹濟喇不信而窮詰之又對以釋之而歸其他言語我未之聞也於是臣等率黑龍江兵衆扎薩克䝉古兵欲往阿濟爾布都納隨勢相機而行已於次日初二起程檄右衞兵作速踵我軍而來外具本同降人納瑪喇什一並賫送又奏言善巴爾等以厄魯特降人十名來言我等至阿濟爾布都納乃厄魯特屯劄之地見無一人但有所食馬骨棄其鎗柄而去正查視之時有厄魯特俄兒都孫伊爾都齊阿哈里查木楊彭楚克西喇卜達爾扎賈圖額爾克杜喇兒達爾巴格隆阿哈第等十人自郭多里地方來降言丹濟喇之行甚速自郭多里而前去矣我等又前行數里以觀之馬疲不能急行而回視其行踪有一千四五百人問俄兒都孫伊爾都齊等與前降人之言無異是以將俄兒都孫伊爾都齊等十人解交收集降人郎中滿都其厄魯特陸續人降不絶問之俱與前降人之言無異亦解郎中滿都訖謹奏命給黑龍江將軍兵從口糧裘帽先是將軍薩􅁲素奏言據兵部咨稱奉㫖命安王將軍薩卜素來京今着停止各率其兵赴大將軍軍前欽此前奉八月二十三日之諭分兵四百從口外遣回臣率兵一百前來今謹遵㫖率此一百兵星赴大將軍軍前但我軍出行原帶糧米算至七八月回汛故無冬衣裘帽者多伏祈勅部頒給兵從裘帽等物并議本軍口糧何處支取奏至命交兵部理藩院會議至是議前者給過黑龍江兵口糧算至十月初一日為止如未到大將軍伯費揚古軍前其糧或完則至歸化城後計其兵到日支米俟到大將軍軍前將王國昌所運米内截留之一千石按兵支取其兵從既無冬衣裘帽應自工部取大羊皮裘大羊皮帽各二百撥兵部理藩院司官各一員速送至將軍薩卜素軍前散給兵從奏入上從之命自張家口設驛至大將軍伯費揚古前進地方先是上諭尚書馬齊等曰着撥爾部賢能司官一員自張家口設䝉古驛至將軍費揚古所往地方至是理藩院奏自張家口以外設䝉古驛至大將軍費揚古所往地方應撥臣部司官乘驛先往於歸化城衆喇嘛殷户附近旗分取馬每驛安設馬二十匹䝉古章京一員兵十名其設驛時取各部院筆帖式八員前往至撥什庫則遣臣衙門撥什庫去奏入上從之命授丹巴哈什哈等職先是上諭議政諸臣曰丹巴哈什哈等雖敗後來降着以大職議叙其先降之俄欣阿穆呼郎等在其次議叙俄欣既係先降而是役於西路軍中甚為効力至本第達爾扎又在其次議叙至是議政大臣議曰丹巴哈什哈察罕西達爾哈什哈雖敗後來降既特來投皇上請加恩優授為二品官其梅寨桑憨都等彼在本地原係顯職請加恩優授為三品官其五品官俄欣早已來降而是役西路軍中殊為効力亦請優陞為三品官其與俄欣同降之六品官多爾濟塞稜博托請陞為五品官先降之六品官阿穆呼郎額墨根布林舒格卓里克俱陞授為五品官至附於正黄旗之索諾木在五品官俄欣之後續降請加恩優授為五品官達爾扎雖微賤之人然在噶爾丹未敗之時先降請加恩優授為五品官本第於兵將敗先降請加恩優授為六品官是役厄魯特降人内有當給官職者俟大將軍伯費揚古到日再議具奏上曰丹巴哈什哈西達爾哈什哈着授二品官為散秩大臣梅寨桑憨都着授三品官俄欣着取為一等侍衞餘如議聖祖仁皇帝親征平定朔漠方略卷二十九

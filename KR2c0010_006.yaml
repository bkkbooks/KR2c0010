body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷六康熙二十九年正月庚申遣官賑喀爾喀時土謝圖汗以所部六千餘人乏食請賑部議不許上特命給以獨石倉粟戶四斗遣理藩院及尸部司官各一員會同土謝圖汗監視散給自後車臣汗折卜尊丹巴庫圖克圖等乏食來告者前後千萬計上皆命按口量給之辛酉遣侍郎溫達覘噶爾丹情形時因噶爾丹肆掠喀爾喀上命理藩院侍郎溫達至喀爾喀墨爾根濟農所確覘噶爾丹情形三月癸巳命定大閲日期上諭尚書阿爾尼等曰今喀爾喀汗等率衆來降應令四十九旗與之會同大閲其令議政王貝勒大臣集議議曰皇上聲教逺被喀爾喀土謝圖汗車臣汗諸濟農諾顏等皆傾心來歸應出臨大閲永使奠定其四十九旗會閲之事今嵗暫停俟來年照例與喀爾喀大台吉等會閲奏入得旨著於七月舉行餘如所議庚子命尚書阿爾尼等往探厄魯特所向先是喀爾喀拖多額爾德尼台吉與厄魯特戰敗時有達爾濟者為厄魯特所執至是逃出詣軍前來歸言厄魯特掠拖多額爾德尼時雖獲其牛羊不敷軍食頃聞噶爾丹率兵萬餘將至或言留其孥於額德爾地方又曰噶爾丹令奈沖鄂木布卜行師不吉因居巴顏烏闌誦經三日沿克魯倫河下流而去侍郎溫達以聞上命阿爾尼吉爾他布前往偵厄魯特情形如彼尾追喀爾喀而來即調所備之兵以防之一面疾速奏聞壬寅命給發伊拉古克三庫圖克圖等行糧伊拉古克三等奏言臣等去年九月自肅州起行十一月初三日至通欽腦兒遣噶卜楚等前偵噶爾丹所在行十五日見噶爾丹告以故噶爾丹曰我軍已起行且曠野不能會也其約見於他米爾地方且遣使鄉導臣等遂輕裝疾馳十二月初五日至他米爾之北齊勞圖河噶爾丹不至遣人至額德爾河偵探之河之兩岸俱有噶爾丹兵馬行蹤臣與濟隆庫圖克圖尾之前往令商南多爾濟攜疏歸奏且請運糧以繼之上命給太僕寺駱駝三十頭運殺虎口倉米三十石隨商南多爾濟往塞內交緑旗兵塞外交蒙古兵護送癸卯命調外藩官兵併設驛站先是理藩院以大閲事奏遣司官二員乘驛赴阿南達溫達所預調俄儂土喇等處駐扎之喀爾喀諾顏台吉集兵設站以待至商南多爾濟歸奏知噶爾丹情形上因諭尚書阿爾尼曰爾院昨議遣司官二員今命一員至鄂爾多斯發兵一千五百以貝勒宋拉卜率之一員至歸化城發兵五百喀爾喀達爾漢親王及四子部落共發兵一千以達爾漢親王諾內率之而檄侍郎溫達令預發喀爾喀墨爾根濟農敖巴額爾克阿海蘇泰伊爾登台吉之兵共三千名以待以蘇泰伊爾登拖多額爾德尼率之偕調兵司官往溫達所賫三月糧隨溫達赴土喇河仍自京遣大臣一員與溫達阿南達偕統其軍爾同吉爾他布速赴阿南達所往之地先檄阿南達來京再詣溫達所自屯軍之地至喀倫酌派喀爾喀人等安設驛站命都統額黑訥護軍統領馬喇前鋒統領碩鼐等出征額黑訥等瀕行上召至乾清宫諭之曰朕已遣侍郎溫達往調喀爾喀親王諾內等兵共三千爾等至歸化城與溫達即率其兵赴土喇與阿爾尼吉爾他布等會爾等習於兵事機宜無俟朕言其就水草善地放養馬駝一路前進仍各賜內廄馬駝以行丙午授喇嘛商南多爾濟應對噶爾丹之詞商南多爾濟將行上諭曰汝往偵實速馳報聞汝見噶爾丹如問溫達等至土喇之故則曰往迎濟隆庫圖克圖等耳且因塞外多岐不知歸自何路似此在在遣迎吾烏得而知之彼如問兵來之故則曰非兵也乃往勘展界耳如噶爾丹敗竄則諭之歸降如其勢尚強歸故巢則往説之若問其使人則曰汝古英寨桑等在京俟草長始遣之也此兵事機宜汝宜書之以往庚戌侍衛阿南達奏報噶爾丹情形阿南達奏言臣於二月二十日至車臣汗納木扎爾額爾德尼濟農所宣上諭曰近已遣使與噶爾丹約信而歸今其奏使尚在京師興兵之事必傳聞不實然噶爾丹狡不可信倘沿克魯倫河而來至車臣汗之地則令車臣汗土謝圖汗墨爾根濟農等協力相機行事其車臣汗之兵令納木扎爾額爾德尼濟農領之洪俄爾帶青副之宣一諭畢皆稽首言曰我等藉聖上威靈何畏於噶爾丹彼兵果來我等協力捍禦當分十二扎薩克之兵一萬備之臣復至車卜登台吉所遣筆帖式色稜敦住等前往偵探噶爾丹已於正月十六日親率兵從吳達漢嶺而别遣阿拉卜灘滚占罕都等率兵從木代喀拉色古爾山陰俱會於烏爾扎河往掠昆都倫博碩克圖復回劫車臣汗部衆乃歸杜爾伯特之鄂勤台吉率兵千餘過拖諾向克魯倫河下流而去色稜敦住歸報臣即檄遣車臣汗納木扎爾額爾德尼濟農等集兵衆徙輜重於近邊古爾班哈達土之地而身率四阿霸哈納爾兵四千往會之甲寅侍讀學士達虎奏報噶爾丹情形時達虎奉命取巴圖爾額爾克濟農羅卜臧額林宸韓都台吉等口供畢聞達賴喇嘛使人他賴堪卜自噶爾丹處歸至嘉峪關外駐大草灘因往見問其情事他賴堪卜曰伊拉古克三庫圖克圖商南多爾濟及達賴喇嘛使人濟隆庫圖克圖等於十二月初三日已見噶爾丹初五日噶爾丹遣使偕我赴達賴喇嘛所汝使臣我等已見之我等往達賴喇嘛處復來汝使臣方歸也又問曰然則噶爾丹今在何處見我使臣於何地今留我使而遣汝於達賴喇嘛何也我使臣有書附汝乎曰噶爾丹在和卜多選兵征喀爾喀至扎卜喀之地見汝使臣其情事具噶爾丹書內我不得而知也汝使臣並無書附我又密問其隨行人喀爾喀等言噶爾丹原向洪郭羅而進因聞阿奴可敦䇿旺喇卜灘等漸徙入其故巢遂往入和卜多地方冦盜滋生飢斃甚衆他賴堪卜等於十二月初五日自和卜多起行後聞噶爾丹分其部貧人令丹津鄂木卜率之居守而身與丹濟喇格罍古英奈沖鄂木卜等收兵自和卜多東向往征喀爾喀等部其所云已見使臣之説妄也又問噶爾丹兵力強弱如何曰其屬雖有兵數千然馬甚少且聞其下多有逃歸䇿旺喇卜灘者其往征喀爾喀有所掠猶可不則將自內亂矣達虎具疏奏聞上命檄尚書阿爾尼知之四月甲子命調察哈爾兵從征阿南達至入見面奏畢上諭內大臣國舅佟國維等曰據阿南達奏言厄魯特與拖多厄爾德尼戰頗被殺傷其襲西布推哈灘巴圖魯時兩人共一騎有斬木為兵者且聞來侵昆都倫博碩克圖而至今未到想已狼狽必有退回俄儂之勢阿南達欲帶行炮併禁軍前往相機征𠞰朕非不知禁軍足以克敵但路逺艱於糧運朕前率察哈爾兵行獵見其人材壯健皆思效力可選精鋭六百左翼令阿要率之右翼令博爾和代率之馬駝牛羊於八旗大場內派出兵各攜五月糧再於漢軍每旗選章京一員領行炮八門及炮手前往檄阿爾尼額黑訥知之敕訊策旺拉卜灘及阿奴與噶爾丹交惡情由上諭內大臣國舅佟國維等曰比聞厄魯特䇿旺拉卜灘阿奴與噶爾丹交惡情事未悉應頒敕書詢其故并量加恩賞前達虎出使尚在嘉峪關即令達虎前往宣諭因賜䇿旺拉卜灘及阿奴敕曰朕撫育萬邦率土之人皆欲其協和安輯今聞爾等與噶爾丹不和致啓爭端爾厄魯特向修職貢恭順惟謹今乃內自交惡必有其因朕甚憐之逺聞之言虛實難據特遣侍讀學士達虎賫御用各色縀二十匹賜䇿旺拉卜灘阿奴其以爾等交惡之由明告使臣毋隱己巳命副都統李林隆賫炮與侍衛阿南達同赴土喇漢軍都統副都統會議火炮實軍中利器每旗各發一具尚少請倍之每炮令將領一員軍校炮手二名與俱於臣等內遣一二人率之前赴土喇奏入得旨李林隆人才雄偉練習軍務著總管火炮與阿南達偕往尋又令都統楊文魁副都統伊壘率漢軍二百名繼之行甲戌喀爾喀請購辦軍器先是喀爾喀厄魯特不得購辦軍器至是理藩院奏喀爾喀濟克巴台吉等請市軍器以備噶爾丹上許之乙亥命侍衛阿南達率兵赴都統額黑訥軍先是阿南達奏言臣所率兵請與阿爾尼兵合為一勢方壯上曰兵事重大其令阿爾尼等各陳所見至是阿爾尼吉爾他布奏曰臣等竊思額黑訥等若沿邊來時候非宜恐跋涉艱苦況廟謨已定應遵前諭赴所指之地以行至阿南達所領察哈爾兵及行炮令前赴臣軍其諸部落兵期會於綽嫩河今車臣汗已抵綽嫩河西北洮瀨河矣臣等亦驛召所調扎薩克兵來會於洮瀨河至噶爾丹來從何路及昆都倫博碩克圖在何處訪問未的俟所調到即遣人偵探事當急行則臣奏聞即發緩則請旨後行奏至上諭曰阿爾尼吉爾他布仍往前所指示之地額黑訥等既往西路止帶諸扎薩克及喀爾喀兵恐力寡不敵阿南達速領軍往額黑訥所䇿應仍遵前諭行五月乙未命歸化城副都統阿玉璽輸運軍糧時都統額黑訥等率兵前進需用軍糧上令歸化城副都統阿玉璽取殺虎口倉粟二百石負以太僕寺駱駝隨車輸運辛丑扎薩克圖汗子額爾克阿海巴郎具疏請襲汗號額爾克阿海巴郎奏言臣父扎薩克圖汗喀爾喀七旗之長君也為左翼土謝圖汗所殺屬裔分散我身又為厄魯特所收棲我於阿爾泰山之南今乘間得出來投皇上伏乞聖恩賑恤恩養俾得繼立其所屬諾顏達爾馬什里亦以此情事具疏奏聞事下議政王貝勒大臣議議曰扎薩克圖汗歷世恭順職貢有年似應繼立查今年衆喀爾喀來降已定期會閲而永奠之其所請應於盟地定奪上是之癸丑命外藩王等率兵同禁軍赴尚書阿爾尼軍先是阿爾尼遣蒿齊忒都統勞章等與郎中馬迪訪昆都倫博碩克圖所在至是歸報曰渡克魯倫河遇昆都倫博碩克圖言我於正月自俄儂遊牧思近邊依我皇上威靈而聞厄魯特漸近避之至烏爾呼訥河今厄魯特不知其何往我兵微不敵兩尚書駐軍洮瀨河今將至軍前聽調遣馬迪促其前進仍遣勞章等偵噶爾丹至博爾濟河有馬濟者折卜尊丹巴屬下人自厄魯特逃歸問之曰噶爾丹於五月初三日率兵渡烏爾扎河將襲昆都倫博碩克圖車臣汗及土謝圖汗其兵四營號四萬實不過三萬耳又將請兵於俄羅斯會攻喀爾喀阿爾尼以聞上曰似此則阿爾尼兵弱宜發科爾沁十旗預備之兵二千及禁軍每佐領護軍一名前往其令議政王貝勒大臣議議曰兵宜速發應令理藩院遣官乘驛前往科爾沁於前所調預備兵內選發二千及台吉都統副都統各二員佐領驍騎校各八員賫四月糧速赴阿爾尼軍前其統轄是軍者惟上特簡其八旗滿洲蒙古前鋒二百名每佐領護軍一名每翼副都統一員前鋒參領一員前鋒侍衛署參領一員前鋒校署侍衛二員每旗護軍參領一員護軍校署參領七員其每翼所派副都統一員亦惟上特簡奏入得旨科爾沁兵令土謝圖親王沙津率之左翼四旗居逺難待令沙津王儘所有兵率之先往其四旗兵隨後進發再令喀喇沁杜稜郡王扎錫旗分發兵五百以扎錫率之兩翁牛特旗分發兵四百以杜稜郡王畢力滚達賴率之兩巴林旗分發兵四百以額駙阿喇卜灘率之俱赴阿爾尼軍前其禁軍令副都統噶爾馬老滿色率之每翼漢軍兵一百名帶前炮去滿洲蒙古漢軍各佐領出駱駝一頭運糧命內大臣索額圖諭俄羅斯使人上既聞噶爾丹將借兵俄羅斯其使人吉里古里伊法尼齊等時在京諭內大臣索額圖曰爾曾至泥卜潮俄羅斯人識汝汝可諭其使人言噶爾丹迫於內亂食盡無歸內向行劫今乃揚言會汝國兵同侵喀爾喀喀爾喀已歸順本朝倘誤信其言是負信誓而開兵端也汝等可疾遣善馳者二人歸告泥卜潮頭目伊凡遍諭俄羅斯之衆索額圖即日宣諭令俄羅斯瓦什力齊克滿馳驛先往越三日遣吉里古里伊法尼齊等歸乙卯發官兵護送軍糧兵部奏言護糧官兵應於八旗滿洲蒙古漢軍各派將領八員軍校八人每駝押兵一名出口外交蒙古遞運并以駱駝數目及起行日期上聞上命於大兵起行後四五日遣發取太僕寺駱駝十二以足一千二百之數己未命諸路兵速赴尚書阿爾尼軍阿爾尼等奏言郎中馬迪報稱自烏爾扎河前踰一日程有厄魯特列營狀乞敕額黑訥阿南達兩軍速赴臣營并以炮來會上諭曰八旗兵及炮即擇日啓行阿南達不必待額黑訥即載炮以往其額黑訥及科爾沁巴林翁牛特兵俱著星馳赴阿爾尼軍六月壬戌遣侍郎阿山古北口監發軍糧户部侍郎賽必漢阿山入奏軍行需兩月糧請以古北口倉粟支給臣部遣司官二員往同霸昌道監發上諭曰兵糧力能帶者給以兩月不能者減不則或鬻之或棄之可慮也爾阿山前往監發恩賜出征軍士户部請預給出征官秋季俸兵四月錢糧上曰兵丁倉卒出行其各賜銀十兩修整器械仍給一月錢糧丁卯喀喇沁杜稜郡王扎錫奏請率所部從軍先是上諭扎錫率兵護餉不必隨征至是遣其子垂扎木素奏曰恩命令臣輸運軍糧所以體恤臣者甚至但臣雖不材久蒙恩養茍可自效敢不報稱臣先奏請備兵九百為國先驅今願以臣所屬他布囊巴圖爾等率兵五百護餉臣身率兵四百效力軍前上許之壬申諭趣外藩兵及禁軍速發喇嘛商南多爾濟於五月初四日至達漢德爾遇伊拉古克三及濟隆以米餉之見厄魯特與俄羅斯使人同行厄魯特自言已請兵二萬於俄羅斯矣俄羅斯使曰請則有之允發則未也濟隆遂偕厄魯特使偵噶爾丹沿烏爾扎河下流而往商南多爾濟偕伊拉古克三沿克魯倫河下流行二十九日至河南岸詢知噶爾丹前一日駐此糧盡殺馬為食僅有兵萬餘商南多爾濟奏至上諭議政王等曰頃聞厄魯特窮困沿克魯倫河下流而來其遣人諭科爾沁巴林翁牛特兵速赴阿爾尼所遣員外鐡圖往諭兩烏朱穆秦兩蒿齊特兩阿霸垓兩蘇牛特八旗除前所發外自王以下有願效力者速赴阿爾尼所令鐵圖視其啓行令學士布顏圖催督全軍駐邊不時至軍前探聽我禁軍及火炮俱速令前往再發八旗前鋒二百名每佐領護軍二名預備以待噶爾丹來市易者有阿卜都喇額爾克寨桑等尚在歸化城理藩院其遣官往諭言噶爾丹且至爾等毋妄動行且有所差遣其集人畜以待癸酉命宗室公都統蘇努總領預備軍兵部遵旨議發八旗滿洲蒙古前鋒二百名每佐領護軍二名每翼派前鋒參領一員前鋒侍衛署參領一員前鋒校署侍衛二員每旗委前鋒校二員派護軍參領二員護軍校署參領六員每參領委護軍校三員其統領全軍大臣伏候特簡上命宗室公都統蘇努統領全軍鑲黃旗副都統覺羅海都領左翼鑲紅旗副都統牛鈕領右翼即日又令議政王貝勒大臣以克魯倫等處地名及程途逺近詢問新來喀爾喀戊寅命增派禁軍及外藩兵時尚書阿爾尼等奏言臣等聞厄魯特兵駐扎克魯倫之阿爾灘額墨爾地方欲待欽調大兵而行恐厄魯特兵進躡昆都倫博碩克圖沿烏爾順河至喀爾喀河地方不得不急往防護於六月初五日向波衣爾進發至博洛達卜素地方又恐厄魯特兵前進先往據波衣爾於是遣軍校諾爾布探視並無蹤影遇一喀爾喀自厄魯特所逃來執而訊之曰厄魯特兵是月初六日已渡烏爾順河其兵號稱四萬近日至烏爾扎河內見俄羅斯布敦諾顏使者率百許人至噶爾丹所即急歸去矣不知其故又皇上使臣及達賴喇嘛使人庫圖克圖等追及噶爾丹與之議和不得見庫圖克圖等仍隨厄魯特而行臣等聞昆都倫博碩克圖前來將至喀爾喀河遣人諭令移其子女入喀倫而身率兵速至臣所所遣人猶未歸不知昆都倫博碩克圖所在烏爾順河距喀爾喀河甚近喀爾喀河距喀倫僅一日程臣軍若仍往波衣爾之地慮反出其後以此竟赴波衣爾之南他奔他什海以禦之若厄魯特兵或追襲昆都倫博碩克圖之後或至邊汛近地臣等相機而行并遣人曉諭附近邊汛科爾沁右翼烏朱穆秦諸旗各令防守奏至上諭曰噶爾丹踰枯倫波衣爾深入事關緊要理宜豫備王沙津如未起行令率所調科爾沁兵往前年吉爾他布駐防之地備之若沙津已起行著達爾漢親王班第率兵往備之其敖漢奈曼貝勒額爾德木圖公敖忒巴喇等旗兵之未調者令往備達爾腦兒前所派出每佐領禁兵二名作速遣行再於每佐領下應派護軍驍騎各五名預備以待其以阿爾尼奏速檄額黑訥知之議政王貝勒大臣其集議議曰應如敕諭令理藩院遣官馳驛前往如沙津王已起行著於科爾沁十旗派兵一萬令達爾漢親王班第率赴前年駐防之地其管兵台吉都統以下官員俱著班第酌選帶往其統領大臣伏候特簡至敖漢奈曼貝勒額爾德木圖貝子滚濟思扎卜公敖忒巴喇五旗選發兵三千其管兵台吉他布囊都統以下官員亦俱選擇派出其總率是軍者於王貝勒貝子公內伏候特簡理藩院速遣司官一員乘驛往派令至達爾腦兒備之兵行俱攜三月糧又前所撥備兵前鋒二百名每佐領護軍二名令來月初旬起行其起行之日領兵大臣具奏請旨現今備兵八旗前鋒四百每佐領各護軍三名驍騎二名每參領下各小校三名此所撥前鋒護軍小校驍騎俱選擇派出每翼撥前鋒參領一員侍衛署參領二員前鋒校署侍衛二員每旗前鋒校各以四人署之護軍每旗撥參領二員護軍校署參領六員每參領護軍校各以五人署之驍騎每旗撥實授參領一員每參領署參領一員散騎校一員驍騎校一員此所撥前鋒參領前鋒侍衛護軍參領驍騎參領委署夸蘭大俱著各旗都統前鋒統領護軍統領引見用其署參領散騎校俱著各旗都統護軍統領會同兵部派出是軍每翼撥都統一員副都統二員該部奏請其總統前往者伏候特簡又漢軍火器營兵亦應派發其官兵作何撥出應令總管火器營都統請旨奏入上諭曰蒙古兵令攜兩月行糧其敖漢奈曼科爾沁土默特兵令貝勒額爾德木圖公敖忒巴喇統之其率科爾沁兵往吉爾他布駐防之地令內大臣蘇爾達率前次將校乘驛前往其再發之軍每佐領撥護軍五名驍騎三名府兵亦照此派發令都統宗室喇克達彭沖護軍統領苖齊納楊代副都統扎木素海瀾色黑康喀喇統之其副都統邁圖署為前鋒統領前去再派出漢軍都統國舅佟國綱都統諾邁凡派發火器營兵之事令彼請旨是役也亦將諸王從征軍行日期交欽天監選擇令前所撥兵輕裝於初旬速行其輜重令每翼留官校押往餘如所議尋命康親王傑淑恪慎郡王嶽希從征己卯都統額黑訥等奏報率兵往赴尚書阿爾尼軍時侍衛阿南達副都統李林隆率察哈爾兵并炮至伊黑噶扎爾之地與額黑訥軍遇聞往會阿爾尼軍之命阿南達先率兵北渡瀚海額黑訥等俟諸部兵喀爾喀兵至選三千餘起行就水草善地養馬向克魯倫河南往會阿爾尼軍額黑訥等具狀以聞科爾沁土謝圖親王沙津奏報噶爾丹情形沙津奏言臣親率兵於是月十三日起行至敦達見喀爾喀之衆倉惶奔來問之言濟農阿難大賚我鄰也聞為厄魯特所掠我懼故遷徙來奔臣遣人偵之遇烏朱穆秦之人名墨爾根者言十四日厄魯特自烏爾會河東北兩路而來兵有二千許我台吉巴郎沖諾和等各率所屬百許人甲而迎之厄魯特曰初以汝為喀爾喀及至此乃知中華皇帝兵也我等同一部落何甲而待我乎惟喀爾喀我仇也當示我所在耳我主答曰喀爾喀已南徙不知所往厄魯特曰吾與汝友也吾不汝害請以刀戟指日立誓又曰伊拉古克三庫圖克圖在我所如或不信爾可隨我行遂挾我台吉及護衛額克濟兒而去次日又執我台吉妻子及部人六十餘我逃入深草中得奔而來恰遇所遣偵者因得至此又言率兵者非噶爾丹乃噶爾丹弟也庚辰命調盛京兵赴達爾漢親王班第軍班第奏言科爾沁台吉畢力滚達賴領兵至朱路木之地遇喀爾喀人自厄魯特逃來言厄魯特追之已至蒿爾河矣臣據報親率本旗每佐領披甲各十人台吉八員副都統一員參領二員佐領六員於六月二十日起行往禦奏至上諭曰前遣敖漢奈曼諸部落兵備達爾腦兒者今不必前赴令其追及蘇爾達與之同往如先於蘇爾達則速赴科爾沁達爾漢親王軍前兵部選材能司官四日馳至盛京發兵二三千令將軍副都統領之速赴達爾漢親王班第軍前兵部承旨遣郎中恩丕馳至盛京將軍綽克托副都統博定隨發盛京及開原興京東京遼陽廣寧錦州易州六城兵共三千率之以行辛巳定諸軍起行日期上諭兵部曰噶爾丹追喀爾喀已進喀倫出征諸王出喜峰口公蘇努等所領之軍隨朕行令諸王先朕進發先檄知尚書阿爾尼等理藩院遣司官星馳以往其令議政王貝勒大臣集議議曰諸王軍七月初四日起行其從征之兵每翼遣副都統一員駕發日期初六日為宜奏入諭曰前所發每佐領護軍二名初一日先發諸王率每佐領驍騎一名於初四日繼發朕於初六日啓行方農時邊內不必列營海都牛鈕才優從諸王行扎木素康喀喇同蘇努行所發驍騎署參領與王偕行其中著有勞績人材雄健者詢該都統委為夸蘭大其所遺參領事散騎校署之癸未命增發官兵及火器烏朱穆秦額爾德尼貝勒博木布奏言六月十四日厄魯特至烏爾會河東烏闌之地臣屬人民多被劫掠臣遣護衛額克濟爾往視見噶爾丹之弟韓都台吉送之至噶爾丹所謂曰我攻我仇喀爾喀耳不敢犯中華界聞尚書阿爾尼發兵而北何故折卜尊丹巴土謝圖汗車臣汗皆在何地額克濟爾以不知對奏至上諭曰噶爾丹已至烏爾會河軍宜速出其軍中無火器者與禁軍前所發兵及盛京兵俱應增發令議政王貝勒大臣速行詳議議曰應於馬場催取馬匹公蘇努之兵仍於初一日起行前所發之先鋒護軍攜現馬於初二日發後派之前鋒護軍驍騎於初三日俱發令各都統一員護軍統領一員副都統一員率之至邊外水草寬衍之地駐候諸王軍於初四日起行直𨽻巡撫天津鎮三屯營協標下火器兵再發一千併宣府鎮標兵一千藤牌兵一千俱令宣府總兵官許盛率之與諸王同發京城兵每佐領應增派護軍二名每旗護軍參領一員每參領護軍校署參領一員每翼副都統一員八旗火器營兵增發一千所增發護軍及火器營官兵俱護駕而行至盛京兵增發二千令將軍若副都統統之紀林烏喇兵二千將軍親率之俱令赴科爾沁達爾漢親王軍前與前所發盛京兵會遣兵部官乘驛往再取巡捕三營馬八百給與軍士京城大兵陸續遣發皇上親統大軍相繼而行理藩院檄諭四十九旗令各備兵分汛哨探并檄阿爾尼額黑訥阿南達等軍知之奏入上諭曰後所發護軍各二名令都統阿錫坦副都統納秦希禪率之俟朕啓行後續發至副都統噶爾馬等所領兵并炮令內大臣阿密達往統之不時偵探奏報以候朕至總兵官許盛既帶操練藤牌軍一千名其標兵可選六百出張家口令前鋒參領索柱巴圖魯引之由岱陰達巴漢之路往赴阿密達軍前其直𨽻巡撫天津鎮標兵一千令三屯營副將師帝賓率之隨諸王而行俱攜兩月糧巡捕營馬八百匹給火器營兵比聞驛站廢弛令直𨽻巡撫于成龍整理其緑旗候選軍官武進士舉人及林興珠等革職官員有願效力者令與火器營兵同行如有勞績酌量擢用其曉諭之都統彭沖護軍統領楊代副都統色黑於初二日起行都統喇克達護軍統領苖齊納副都統海瀾於初三日起行未幾許盛已行復令回宣府聽調甲申遣使賫敕諭噶爾丹上將出軍先遣理藩院員外郎阿爾必特祜達賴賫敕書往諭噶爾丹命之曰爾至噶爾丹所語之曰汝昔職貢往來未嘗失禮今乃闌入邊汛掠我屬國是何意耶皇上特遣使者詰汝其竭誠以對又念汝向來恭順令塞外諸部且未興兵擊汝尚可改圖我使臣久留汝地而不令歸何也彼如遣喇嘛等歸則攜之而來不遣則已務婉言相慰羈縻其前行勿怒而激之也如彼欲辨釋則攜彼要人來面奏如問汝中國發兵乎則曰聞汝無故闌入發兵以備邊也如彼問聖駕及諸王來則曰不得而知如彼不遣使來則汝等一人星馳來奏一人率筆帖式馳赴諸軍密諭之曰上遣我等羈遲其前行大兵不日至矣其各集兵增備姑勿與戰以待而每夜輒張兩翼嚴巡警防其夜襲如噶爾丹見敕諭而退兵則止之令勿退其或不止則令諸軍疾發擊之如或奔潰務必窮追賜噶爾丹敕曰朕統御宇內懷柔萬邦惟願率土生民咸得其所相與協和無分中外夫兵凶器戰危事互相仇怨無有己時非計也故遣尚書阿爾尼散秩大臣吳巴什扎薩克大喇嘛阿齊圖綽爾濟一等侍衛阿南達傳諭令罷兵息戰爾回奏云聖主施仁撫育令共相協和以享康泰我亦與焉伏願指示安樂之䇿聞聖上將盡驅出喀爾喀之人不勝歡忭不敢以殺我弟多爾濟扎卜為憾所奏甚明今乃聞爾復興兵伐喀爾喀故遣尚書阿爾尼防境內之不靖者今烏朱穆秦遣使至爾所爾言中華與我一道同軌我不敢犯界內地方而又闌入邊汛掠烏朱穆秦人畜是背前言而隳舊好也且我前所遣伊拉古克三庫圖克圖等至今不歸爾誠何意耶今遣員外郎阿爾必特祜達賴賫敕諭爾爾尚可以改圖爾既入邊我諸部王及貝勒台吉行且興兵擊爾故亦遣來使止之恤爾至矣其速給還所掠歸我使人爾其明白回奏是日即以遣使諭噶爾丹事檄知諸軍丁亥授尚書阿爾尼等進兵機宜時噶爾丹沿喀爾喀河而進追及昆都倫博碩克圖昆都倫不能禦僅以身免所有牛羊盡為所虜阿爾尼聞噶爾丹駐兵索約爾濟河連夜率兵往襲之至則噶爾丹已從濟達齊牢之東向烏爾會河去矣喀爾喀偵者報稱厄魯特兵二萬餘往追車臣汗土謝圖汗挾使臣伊拉古克三商南多爾濟而行問盛京與歸化城所在阿爾尼等率軍前進遣人檄諸軍速發具疏以聞上命阿爾尼等仍躡厄魯特後偵其所至奏報額黑訥等軍到且勿與戰俟達爾漢親王班第兵盛京烏喇滿洲兵齊集同夾擊之如噶爾丹潰敗令阿爾尼等引兵窮追便宜行事檄諸軍量馬力疾行齊會形勝之地以俟禁軍戊子命康親王傑淑恪慎郡王嶽希率禁軍駐歸化城西安將軍尼雅漢等率西安兵駐寧夏上諭議政王等曰康親王恪慎郡王副都統海都牛鈕率前所發驍騎每佐領各一名於初二日起行出張家口屯歸化城如大同兵可用聽王等隨宜調遣其厄魯特貿易人馬匹託言乘用盡收之直𨽻巡撫率兵一千駐遵化西安將軍尼雅漢副都統巴賽柏天郁率滿洲兵二千漢軍兵一千屯寧夏其寧夏緑旗兵亦令預備尚書阿爾尼等奏報與厄魯特戰於烏爾會河地方厄魯特兵二萬餘掠烏朱穆秦男女牲畜輜重徐行遡水上流遊牧阿爾尼偵之分兵二隊乘夜往襲二十一日昧爽於烏爾會河地方及其營令所選蒙古勇士二百餘攻之令喀爾喀兵五百驅其所掠未及戰諸部落及喀爾喀兵爭取其子女牲畜陳動不能止遂退厄魯特分兩翼陳而立我軍次隊繼進厄魯特發鳥鎗軍退前隊兵及喀爾喀兵復進喀爾喀畏其鳥鎗先却諸部落兵力薄亦退厄魯特增兵從山上繞出我左右我軍不能進遂斂兵歸是役也厄魯特多火器而我火器營未至是以不得前進乃駐軍烏朱穆秦之鄂爾折伊圖以俟諸軍阿爾尼等具狀以聞上以示議政王貝勒大臣尋兵部議阿爾尼吉爾他布等違命輕戰以致敗績俱應革職同往官員亦俱革職得旨阿爾尼吉爾他布革去議政降四級調用吉爾他布仍留佐領餘如所議遣使申諭噶爾丹時噶爾丹歸我使商南多爾濟以其情陳奏上起滿丕為理藩院郎中鄂齊爾為員外郎往諭噶爾丹命之曰爾等往語噶爾丹據商南多爾濟來奏言尚書阿爾尼等與汝交戰阿爾尼不請旨而即擊汝非本朝意也阿爾尼本奉命率諸部兵防守地方汝闌入邊汛肆行劫掠職寄所關不得不戰假有他部入汝界汝防邊者能默默已乎皇上聞汝在邊恐諸部擊汝前已遣使諭止之今聞交戰故又遣我等來諭噶爾丹若問曰商南多爾濟議驅逐土謝圖汗折卜尊丹巴庫圖克圖此言已上聞否則答曰不知也若問中國有兵來乎則告之曰來如又問何人率之而來則曰我來急不知也再語之曰商南多爾濟奏汝言與中華一道同軌我但索土謝圖汗折卜尊丹巴而已至邊境之內不敢纎芥犯方議遣使而我尚書阿爾尼等遽加以兵甚為過當商南多爾濟亦以阿爾尼之舉為非其以此曉諭之倘阿爾必特祜等未到汝等攜之偕行己丑調察哈爾兵防護馬場上以厄魯特兵入喀倫馬場急宜防護乃遣副都統馬什調察哈爾兵往駐形勝之地以備之設邊外驛站喀爾喀扎薩克台吉額爾克阿海等率千餘人作亂縛驛吏劫馬匹弓矢而去學士布顏圖以聞上諭發察哈爾兵備之遣軍校檄阿爾尼令與額黑訥阿南達兵會毋以前戰未捷遽懷退怯其收集兵馬嚴行警哨如各部之兵不足恃皆令內移喀爾喀有橫行者禁輯之自古北口至十八里臺令兵部遣坐驛筆帖式設站自十八里臺至阿爾尼所令蒙古設站學士布顏圖設站畢撤張家口驛其坐驛筆帖式軍校赴伊處酌用兵部侍郎薩木哈前往安驛直至布顏圖所令巡撫于成龍星速來京整理近京驛站其標下所調之兵及天津鎮標兵俱選賢能將辨率往遵化兵部遣官疾馳往諭聖祖仁皇帝親征平定朔漠方略卷六

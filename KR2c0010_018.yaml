body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷十八十二月癸巳中路督運于成龍奏請押運人員于成龍奏言中路米車四千輛絡繹前進約長百有餘里凡陟嶺渡河及泥濘難行之處未免耽延應兼用小車及駱駝騾馬分載遞運至押運僅用司官十二人惟恐鞭長不及必得情願效力人員准臣等帶往以備䇿用庶可無虞遲誤更得久歷邊疆能聲夙著之將辨數員責令巡徼捍衛後先非惟有濟軍需亦且威揚域外奏上得㫖于成龍以軍需緊急必用駝馬小車分載遞運奏請甚是但此路朕經親歷俱係大道並無險嶺大河泥濘難行之處若用駝馬小車反覺煩雜不必兼備餘著會同大學士戶兵二部僉議議中路米車官少似難分押請不論旗民有官無官人願隨運效力者准于成龍盡行題帶至米車分行前後晝夜巡防千把微員恐難勝任可調取副將王起龍遊擊劉虎守備林之本等協力前往議入上從之尋于成龍奏以效力人員內分百人給西路命撥宣化山西馬匹隨西路進𠞰之兵時大學士伊桑阿等同兵部議現在宣化府喂養之馬并山西急公捐助馬騾合計一萬二千一百九十匹請於西路進𠞰右衛兵五千及京城增發之兵按名給與一馬隨行餘馬仍留宣化府以為中路大兵之備上是之甲午命增派原任兵部督捕右侍郎王國昌太常寺卿喻成龍督運西路軍糧上諭大學士伊桑阿等曰西路挽輸較中路尤為緊要除左都御史于成龍外可撥一大臣往督西路運務其效力人員亦應酌撥爾等㑹同于成龍公議議曰請上於李鈵等三大臣內簡撥一員分督西路更請敕山西一省有願西路效力者令督運大臣帶往除前造米車一千一百輛外應增造四百輛其挽此增造車者仍令山西撫標鎮標兵充用口糧及車上需用什物亦行該撫備給議入得㫖西路運米著侍郎王國昌正卿喻成龍往督之增造運車四百輛亦著動支正項錢糧其情願效力人員無論山西及他省文武職官閒散人等俱准前去事竣凱旋之日中西兩路凡運米人員定照軍功議叙餘如所議丙申增派中路軍中護軍參領上諭大學士伊桑阿等曰西路大軍既合四人為一朋中路兵亦應如是此軍前進務照旗分令各該參領率其兵之輜重行囊按隊聨行加意管攝中路護軍參領每旗原派八員今既以四員撥往西路應每旗增派四員交兵部作速傳示丁酉刑部尚書圖納等條奏西路進𠞰機宜先是上命圖納赴陜會集將軍總督巡撫提督總兵官等於莊浪要地議西路進𠞰事至是圖納等密奏言上命分兵兩路進𠞰使噶爾丹東西瞻顧不暇我軍進退無憂睿算實出萬全今應自陜西一路進兵使出鎮彛由黑河托賴河交流處取昆都倫而進選熟諳路徑蒙古以為嚮導但我軍進討糧糗俱係親攜倘事起卒然接戰之兵分力必多請於萬名兵外益以緑旗兵三千著一總兵官統領尾大軍之後而進如是縱猝遇冦至行囊輜重不憂守護無人至我兵深入恐附近蒙古乘虛煽搖宜酌調固原提標官兵為之防禦再檄諭西海諸台吉與䇿旺喇卜灘及土魯番等使知罪在噶爾丹與衆無預至內地多巴係市賈集場恐噶爾丹奸宄百出使人潛居窺伺應令該地方文武官不時嚴察奏至㫖下議政大臣及大學士等集議議以此路進𠞰官兵令於來年三月二十日前後啓行其所請嚮導蒙古應馳驛召副都統阿南逹回同理藩院司官筆帖式往喀爾喀諸扎薩克旗分選撥能識和卜多路徑者二十人再選巴圖爾額爾克濟農屬下十人著阿南逹帶赴孫思克軍前同進餘悉如尚書圖納奏議入上從之命以都統伊勒愼等為西路參贊上諭大學士伊桑阿等曰撫遠大將軍費揚古軍中著都統伊勒愼護軍統領宗室費揚固瓦爾逹副都統碩岱為參贊併將軍舒恕亦為參贊西路大臣既已足用護軍統領蘇丹可使在中路戊戌命給西路增發官兵行糧及飼馬芻豆兵部奏言據統領西路大兵都統伊勒愼等咨稱擬於是月二十日起行請支自京至大同十日之米到大同後計喂馬日期支米併請給官兵行糧及喂馬草豆查行糧定例每月給將軍二十兩參贊大臣十七兩都統十五兩前鋒統領護軍統領副都統各九兩夸蘭大前鋒參領各七兩參領學士一等侍衛各五兩散騎尉侍讀學士前鋒侍衛二等三等侍衛各四兩署散騎尉侍讀中書各三兩護軍校驍騎校六品七品筆帖式匠局長等員各二兩五錢署護軍校驍騎校及兵丁各二兩匠役各一兩又查喂馬定例將軍二十五匹都統二十匹前鋒統領護軍統領副都統各十八匹夸蘭大等各十四匹參領侍讀學士各十二匹前鋒侍衛散騎尉侍讀各十匹護軍校驍騎校中書署護軍校驍騎校等各八匹護軍撥什庫各四匹驍騎三匹匠役二匹每馬一匹給豆八倉升七斤草二束今此前往西路大臣官員以及兵丁執事應給五月行糧現於京城支放兩月由大同前進時再令晉撫散給三月其官兵赴大同十日之糧照前會議之數於京城支給在大同喂馬四十日由大同至湖灘河朔按日計口之糧行文晉撫亦照前僉議之數支給再大同喂馬之草豆交晉撫照前定例給散大臣官員其兵丁俱准給四匹之草豆議上上曰此去西路兵衆著於京城現給三月行糧至大同喂馬起行時再給四月餘如所議命曉諭隨軍效力人員准與議叙上諭大學士伊桑阿等曰凡革職候缺官員及進士舉監生秀與無頂帶筆帖式烏林人內有願身入戎行竭力自效者准其前去凱旋之日革職等人以原官起用候缺及進士等人以應升先用倘被傷陳亡則革職者照其原官賞賚議叙候缺及進士輩照其官之品級賞賚議叙倘本人年衰疾廢身不能前遣伊弟昆子姪代行亦如本人賞賚議叙可著兵部通行曉諭己亥命將軍博濟統滿洲兵將軍孫思克統緑旗兵偕副都統席爾哈逹祖良璧馬自德巴陵從西路進𠞰命固原提督李林隆留守陜西甘肅副都統阿蘭泰兼管緑旗兵駐寧夏副都統費揚固駐西安命總兵官殷化行等西路從征時將軍孫思克奏請西寧總兵官韓弼留守地方其寧夏總兵官殷化行凉州總兵官董大成肅州總兵官潘育龍直𨽻總兵官嶽升龍貴州威寧總兵官唐希順及陜西延綏鎮遊擊祁朝祥建昌路都司方凱俱令從征上命議政大臣集議議曰總兵官嶽升龍都司方凱已撥往中路可無議餘俱如該將軍孫思克所請帶往其甘肅陝西副將以下俱照兵數帶往至尚書圖納議奏隨大軍緑旗兵三千亦令該將軍於四總兵官內酌撥統領議上上從之命賞賚西路兵卒上諭議政大臣宗室蘇努等陜西一路進𠞰大兵及緑旗兵按名賞銀十兩以整理器械務使均沾實惠毋虛朕意其西路進𠞰右衛兵察哈爾兵亦著一體賞賚命定隨軍火炮上諭兵部前烏闌布通所攜大炮太重今次出師應選比前稍輕者令每旗各帶一門前去著查閲現在火炮議奏兵部會同漢軍都統副都統等查閲議奏八旗炮局所有成威永固大將軍炮六十一門鐵紅衣炮十八門臺灣解到大銅炮十九門神威無敵大將軍炮十七門大銅炮五十四門西洋銅炮七門木鑲銅炮十九門神濟將軍炮四十門諸炮重八千斤至一千斤有差冲天炮三門臺灣解到小銅炮八門神威炮一百六十門得勝炮法功炮鐵心銅炮小銅炮共一百四門諸炮重八百斤至一百斤有差查軍中現備火炮八旗滿洲每旗馬䭾子母等炮各五門漢軍每旗馬䭾子母等炮各九門龍炮各一門每翼冲天炮各一門應照原奏帶往外大同府所有神威炮二十四門應交該總兵官遣赴西路大軍宣化府所有神威炮二十四門應交該總兵官帶赴中路大軍其臺灣解到神威炮約重四百斤舉行輕便應將此炮每旗各增帶一門奏入得㫖所議宣化府炮定為中路甚善爾等可將神濟將軍炮神威炮各一門送至景山朕親覽兵部隨呈送上閲畢諭曰朕今新鑄炮十六門每門約重五百斤力可敵神濟將軍炮俟鑄成其載炮車式即照載神威者製造臣謹按軍器之中無猛於鳥鎗火炮者其勢甚烈其力甚大誠戰陳之利器也皇上深念𠞰滅噶爾丹當以火器為要特廣設鎗炮别建一營不時訓練又以舊炮重滯艱於運致新鑄炮式輕便易行力凖大炮後擊敵時得火器之利居多昔之用兵者雖嘗用火攻而制度精妙士卒嫻習未有如今日者良由聖慮周詳無微不到隨機制械以利大兵之用是以能破敵而奏膚功也尚書圖納核奏陜西進𠞰官兵及糧餉數目圖納等奏言陜西一路大兵進𠞰應如議政大臣所議發西安滿洲兵三千派副都統二員署前鋒總尉二員署前鋒參領八員署前鋒校十六員夸蘭大八員參領五十六員驍騎校二十四員火器營夸蘭大一員參領四員驍騎校四員再發漢軍火器營兵一千派副都統一員夸蘭大八員參領二十四員驍騎校二十四員其所帶厮役自將軍以下綿甲軍以上數悉與中路同又發緑旗兵共九千派總兵官及副將參將各四員遊擊及守備各八員千把總各三十三員其厮役名數提督十總兵官七副將參將各六遊擊五守備四千總把總各三合滿漢緑旗官兵厮役等共二萬二千四百餘人每口按月給倉斛米二斗通計五月共需米二萬二千四百石餘若盡以駝負則所需駝數甚多亦應如所議以牛羊代一月之糧其餘四月米令將軍提督副都統總兵官各攜五斗夸蘭大參領副將參將各攜三斗署參領遊擊守備各攜二斗自前鋒校驍騎校千總把總以至兵衆各攜五升餘一萬七千二百石零皆以駝運設駝不足即以茶易之馬匹用又不足請動支正項錢糧購買至甘肅所屬地方素無儲積若以西安倉貯米石令其盤運則為路既遙殊多腳費宜令於附近採買為便滿漢緑旗兵各給以五月行糧其緑旗兵按月應得之米仍照例給與其家為妻孥養贍奏至上從之庚子命撫逺大將軍伯費揚古以其將軍事務暫授舒恕乘驛速赴京師辛丑命和碩簡親王雅布效力中路時和碩簡親王雅布以願從西路之軍請㫖上命雅布候中路軍效力命丁憂總兵官許靖國率晉撫標兵西路押運壬寅訓諭侍即王國昌等嚴護糧運時王國昌喻成龍於是月十五日起行恭請訓㫖上曰運米一事朕視西路尤為緊要爾等各體朕意嚴督押運人員行則結隊而前止則擇地而處後先聨絡晝夜分巡毋致疏虞以誤軍務所用嚮導官䝉古章京可向大將軍費揚古酌取甲辰命刋頒軍令上諭兵部曰師出以律可奏膚功自我太祖太宗世祖以至於今野戰必勝攻城必克所向無前雖士卒世受國恩捐軀報效實由我朝軍紀森嚴信賞必罰兼以兵馬精强器械整齊之所致也朕今次軍行特規酌舊制參以新謨爰著為令告我六師一大軍出征本都統護軍統領副都統參領等審視官兵甲胄弓矢暨一切軍中器用務期堅利兵之盔尾甲背及戰矢之幹各記名其上馬烙以印鬃尾處繫小牌書旗分佐領姓氏以為記號馬不烙印追銀二兩箭不書名追銀十兩給首舉之人一啓行時凡兵衆必各率行裝按旗隊以次前進不得零星散亂後先越走自出國門以至旋師當各遵守違者鞭責示警一在道毋離纛毋酗酒毋喧譁毋呌呼不遵者該管官即行捕責一所過地方不得擾害居民及䝉古部落如侵犯子女掠奪馬畜蹂躪田禾及擅離營伍入村莊山谷强取一物者兵丁厮役俱從重治罪其該管官及厮役之主一併議罪一邊境以內凡兵役在逃立刻緝拿依定例治罪出邊而逃該管大臣即發官兵務窮追捕以正軍法設追緝不獲往追人從重治罪伊主併該管官一併嚴處一下營務按旗列幕不密不踈如越旗亂次前後攙雜者將該管大臣官員分别治罪其兵役內有愍不畏法盜馬上零星諸物者懲以鞭責盜馬匹及鞍轡者視盜贓多寡按律治罪一出哨毋攜大纛各帶本旗顔色小旗逺距大營設哨勤加巡視比暮則還就近地勿舉火勿攜帳一人一騎其馬備鞍以待晝則近身牧放夜則刈芻拴喂設冦至探明即飛報大營若無冦妄報與冦近不知以致傳報稽遲者主將即將該汛坐哨官兵立刻正法軍前示衆一值夜巡徼官兵必張弓束服跨鞾并解甲囊以備不可怠忽無事人昏夜不得擅行行者必問如衣服器械有異即行擒拿茍貪睡偷安或人數缺少該管大臣察出嚴治其罪一與冦相近管兵將軍大臣酌派前鋒參領率兵往探務詳審賊情虛實地勢險易并嚴飭營中夜勿燃火一對敵列陳時主將必度地據險冦或布野或結駱駝鹿角為營我軍分列行陳指明某隊某旗當擊敵陳某處戰時鳴角進兵戰畢仍鳴角收兵官兵或棄其部伍混入他人部伍或軼出本陳往附他人尾後或逡巡觀望逗遛不進照所犯輕重正法籍沒鞭責革職至我軍分陳進擊某旗對陳敵堅不動即發所備援兵助擊之又對面臨陳時王貝勒貝子公大臣官員或不依次喧闐擁入或見敵寡不請擅進此一次功不議仍以罪論一敵陳動搖我軍攻入當嚴禁官兵不得掠人畜財物如不遵軍法貪行攫取者重懲不貸一敵敗北即選兵馬追之隨派隊伍接踵繼進倘追兵墮其伏中或遇冦遊兵我後隊兵與之接戰前隊兵仍行追進一師旋日當嚴行禁止凡軍器不得售賣存留與諸䝉古違者從重治罪該管官一併議處一駝馬為師行要需須擇水草善地牧放夜則加意巡防起營時留官兵於後收察遺失駝馬審其印烙牌記各交原主其疲乏者即於就近地方官或村莊居民或扎薩克䝉古處辨色登數交與飼養仍以其數報明兵部如有將遺失駝馬隱匿乘用或因其疲乏委棄宰殺者嚴治以罪令駝馬原主開明遺失疲乏駝馬顔色數目亦報兵部登記一軍糈關繫綦重凡出征官兵須各計口按日支領攜帶倘不如額查出即從重治罪一有職掌大臣官員原各有親隨兵卒不得復於大兵內抽取以分兵勢如委署人員及官之原無親隨兵卒者許各抽一名一凡大兵存駐處毋令閒惰每日較射磨礪器械所頒軍令不時宣諭令其詳悉夫兵者所以討逆安民朕不得已而用統兵大臣能體朕意嚴束屬下官兵於所過邊境內外不輕取一笠使人民安堵如故奏凱日自行升賞如縱官兵為非擾害生事者定加重處凡兹軍令應通行曉諭各路官兵如傳示不到即將傳示之人以軍法從事爾部其以朕諭與前南苑所降之㫖一併刋頒俾各凛遵毋忽命以用印空劄頒發將軍提督等奬勵緑旗效力官兵上諭議政大臣國舅佟國維等曰緑旗兵卒內有從本陳前進超入駱駝營鹿角營衆人接踵齊進殺敗敵冦者第一名優升千總其督戰之員優升二級擢用至緑旗將辨內有親身超入駱駝營鹿角營敗敵者優升三級擢用著以用印空劄頒發將軍提督總兵官凡緑旗官兵有顯著勞績者即照所定職銜填注給與戊申命發盛京積貯草豆給官兵秣馬先是上諭盛京將軍綽克託曰軍中馬匹關繫重大可加意飼秣務令肥健至是綽克託奏言臣遵兵部咨備兵二千所需馬匹共計八千餘匹臣地方今歲歉收恐芻飼之需難於速購請於盛京戶部與奉天府尹所屬州縣內暫借豆五千石草三十萬束為秣養用俟來秋依數償納更請照前預支官兵一年俸餉使備器械衣服亦俟來歲如數扣還奏至上諭議政大臣都統公宗室蘇努等曰前議討噶爾丹陜西兵由鎮彛取昆都倫一路進發大將軍費揚古兵由歸化城一路進發京師大兵由中一路進發既有此三路分𠞰則盛京寧古塔黑龍江兵尚無所用但軍需以馬為重兵雖暫停馬宜預養其照將軍綽克託所請給與草豆飼養之責選才能章京專董其事該將軍副都統等公同巡督其預支俸餉一年俟有出師定期查所派官兵內前曾支領者止給半年未經支領者可給一年親賫口糧每名著攜三月至我軍三路進𠞰噶爾丹或勢窮力竭沿俄儂東竄逃生令盛京寧古塔黑龍江三將軍除前派定兵數外再酌量增發相機撲滅可著副都統齊蘭布馳驛往諭中路督運于成龍等奏請量增挽運夫馬時于成龍等奏言駕車馬騾應令三省撫臣於原派數外酌量多備以防倒斃設一時難以購買請將江北湖北驛馬內通融借用俟大兵啓行後令三省如數補償其挽車兵卒在宿處有守糧牧馬掘井具炊之事一車一人似難兼攝更請或五輛或十輛量增夫一名以備更替奏入上從之命古北鎮標兵從征先經僉議發古北口兵二千名挽中路米車至是上諭于成龍等古北鎮兵素稱徑卒運米之役著另派其二千兵俱令從征所需口糧爾等議奏議曰挽車兵卒止派直𨽻撫標及天津鎮標二處古北口兵原未派及以之出征甚便但地屬邊陲需兵捍禦應以一千五百名從軍五百名居守其所需口糧應照進𠞰大兵各親賫八十日其隨運兩月之米以臣等增造車輛裝運議入上從之命寧古塔將軍佟保備兵秣馬佟保奏言臣等此地官兵聞令備兵皆跪而請曰身等窮邊小民䝉聖上揀為將卒飼以俸餉今願得自效以報主上豢養之隆恩臣詳閲所轄烏喇及寧古塔官兵弓徑矢强馬上嫻熟又教之以皇上製發鳥鎗愈加威壯且若輩俱耐勞苦臣請率一千五百名而往合軍中所有馬匹計二千九百有竒嚴督官兵加意飼養臣身不時稽察不足之馬現有白都納地方西白兵二千此兵既不動應派伊等出馬一千五百匹以充撥軍中取牛五百頭用以駕載火藥鉊子等物之車此馬牛交副都統沙納海監視肥秣不使貽誤寧古塔兵既發三百應檄副都統耿額盡收兵丁所有馬匹亦親身督視喂養肥澤倘馬匹又或不足則將烏喇捕獵人等之馬亦酌量查取備用再前所備支之錢糧於九月發兵時已經發給此項應將三十五年兩季俸餉扣除停給但以新年後又復行兵請暫停扣除仍照常支放俟旋師之時再議扣具奏此軍除臣身必往外其副都統沙納海耿額應著何人從征伏候上裁奏至上諭議政大臣都統公宗室蘇努等曰前者爾等僉議以盛京兵二千寧古塔兵一千黑龍江兵酌量派發應令將軍佟保不必增兵五百仍照爾等前奏俟行時令各賫三月口糧至中西二路之兵俱每人帶厮役一名馬四匹此軍亦應照此例合烏喇現在二千九百餘匹之馬共派足四千之數加意飼養烏喇捕獵人另有職役可無庸派其各處馬匹著該將軍副都統官員嚴加監視務令肥澤如兵丁怠惰以致盜去遺棄從重治罪仍令賠償倘疲瘦瘐斃令該管官保結將軍副都統親身詳查造冊報部中西二路鳥鎗兵並未給與車輛其派牛駕車之請不准行至官兵啓行時可照常給一年俸餉副都統沙納海耿額著該將軍酌量帶往此㫖亦令副都統齊蘭布前往宣諭己酉命恩賚從征緑旗官兵上諭兵部曰軍行伊邇所派從征緑旗官兵應加賞賚宣化府兵三千古北口兵一千五百大同府兵五千著戶部按名賞銀十兩務使均沾實惠命天津總兵官嶽升龍中路護運先是嶽升龍奏請從征准於先鋒營效力至是上諭兵部曰軍糈事重護運之任與行兵同可令嶽升龍隨于成龍等護運中路米糧俟别有所用再行調取命操演運米官兵時直𨽻巡撫沈朝聘山東巡撫楊廷耀河南巡撫李輝祖各率押運道府州縣等官先後抵京三省挽車兵卒亦將齊集上命大學士伊桑阿傳諭于成龍等直𨽻山東河南三省兵夫到齊務令操演熟習進止安閒并使與押運官各相識認庶有呼必應驅䇿始靈翼日于成龍等口奏演車兵卒兼習放鎗請八旗漢軍火器營官數員訓練之上曰爾等其酌量咨取於南苑內操演辛亥擢副將馬進良為古北口總兵官白斌為宣化總兵官上諭大學士伊桑阿等曰古北口總兵官李士達患病不能前來著解任時方用兵可將石匣副將馬進良升授其副將員缺以劉虎升授宣化府總兵官許盛年老患病亦著解任其缺以通州副將白斌升授令伊等俱於歲前星速赴任白斌抵任後可遴選本標兵帶往軍前命懷慶總兵官劉國興護中路運上諭中路督運于成龍等曰中路挽輸較鎮守之寄更為重大總兵官劉國興人材矯健著偕汝等押護糧運壬子賜喀爾喀台吉占巴喇等服物先是原任郎中阿必達奉命往令喀爾喀諸扎薩克內移至是奏言臣至喀爾喀王納木扎爾處聞憨都叛去即㑹同王納木扎爾暨貝子阿難大旗下台吉丹津車陳汗旗下台吉陶賴等併力往追以馬疲雪阻不獲前進時憨都屬下協理旗務台吉占巴喇貝子阿難大旗下綽諾色楞等力微勢弱被憨都逼往隨牧後至海魯爾河遂入據林中不隨遊牧憨都率兵來擊占巴喇等即裂幕為盾領衆逆戰殺傷相當奔還自訴又貝子盆楚克聞變率兵來㑹臣軍約二百名追憨都與戰於呼拉濟地方憨都敗走欲遣人躡其蹤跡奈台吉旺扎兒所屬胡進隱匿馬羣不付驛傳以致稽誤上諭理藩院曰占巴喇等據險距冦力戰來歸且會同盆楚克等兵窮入追殺殊屬可嘉著賜與蠎服緞布以示奬勵王納木扎爾貝子盆楚克等聞憨都叛逃即合力往追奮身與戰具見報效忠忱著行文阿必達將陳亡被傷姓名人數查明報部另行議叙胡進隱匿馬羣致誤機務可交該扎薩克鞭責一百示警嗣後凡有馳驛情事立行應付勿得遲誤再檄知阿必達當嚴查盜竊橫行仍不時偵探聲息命增撥䝉古兵挽中路米車先是上命撥喀喇沁兵一千名挽添造車輛至是于成龍等以三省撫臣每車已添派兵夫啓奏上諭曰挽運兵夫三省巡撫雖已按車增派䝉古兵膂力壯健能耐艱辛且習於牽挽著再撥翁牛特兵五百名前去命中路督運于成龍等照時值採辦車馬勿纍工商癸丑命內府佐領兵照旗兵分朋總管內務府奏言內府佐領備征之護軍校護軍計一百一十人照旗兵四人為一朋定為二十六朋餘六人分為二朋撥什庫驍騎計一百五十六人以四人為一朋定為三十九朋除護軍校護軍撥什庫廢官外驍騎計一百八人雖各有馬二三匹軍行時尚缺一匹今一應俱照旗兵例分派行裝請以內府各佐領下現養一百四十二匹之馬內每驍騎各給馬一匹上是之尋都統公俄倫岱以八旗漢軍所養馬匹除給鎗炮驍騎外餘者請給綿甲軍各一匹以為駕車裝載口糧之用上從之乙卯命選察哈爾兵分翼就宣化大同養馬上諭大學士伊桑阿等及兵部理藩院曰朕思察哈爾左右二翼每翼可各得鋭卒八百人左翼定為中路每兵令自攜馬三匹至宣化府交養馬大臣協同喂飼右翼定為西路每兵亦令自攜馬三匹至大同府與地方官協同喂飼務令肥澤隨大軍進發不致有誤可著上駟院侍衛馬什赴左翼鑲藍旗䝉古護軍參領羅米赴右翼將所有兵馬各按數選集速令赴宣大二府其兵衆內或馬數不足三匹者即以官員馬匹充數驅養又聞大同草豆殊少其即於附近州縣足供芻秣處分羣往飼亦可聖祖仁皇帝親征平定朔漠方略卷十八

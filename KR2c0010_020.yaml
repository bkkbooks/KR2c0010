body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷二十二月己丑命黑龍江副都統喀特虎從軍黑龍江將軍薩卜素奏言副都統喀特虎喇子二人俱告請願赴軍中竭力以效犬馬之勞臣欲帶兩副都統出征奏至得㫖喀特虎著從軍喇子著鎮守地方辛卯命更定出兵日期並增發偵探官兵上諭內大臣國舅佟國維等曰噶爾丹為人狡詐未必不指西向東我大兵若於三月初十起行則四月二十五間方得至巴顔烏闌今不便待陜西兵中路行期宜改在三月初間西路費揚古兵行期亦改在二月望間著交欽天監選擇具奏至於喀倫地方偵探情形事屬緊要宜增派官兵發往侍郎安布祿處駐劄俟厄魯特來時視其兵力仍前單弱即著擒𠞰倘力不相敵擇便退回星飛馳報爾等其集議之議曰聖諭周詳俱應欽遵而行其派發喀倫官兵請於每旗派不出征之前鋒五名並不出征之王貝勒貝子公等屬下擇其人材壯健家道殷實護衛及新滿洲共派百名給以肥馬令其速赴安布祿處駐劄喀倫一同偵探俟大軍到日其護衛及前鋒兵俱令撤回此事仍應檄將軍舒恕孫思克等知之奏上得㫖此發往喀倫官兵共派七十人足矣所派前鋒仍著於出征之前鋒內選派四十名再將出征上三旗及王貝勒貝子公等情願效力之護衛人員內共派三十名護衛俱著乘自備馬匹前鋒兵著給上駟院及兵部馬各三匹計其口糧行裝給與駱駝負載伊等分內之馬匹輜重著隨大軍前去俟大軍到喀倫仍各乘自備馬匹其帶往之駝馬可交上駟院兵部查收諭從征人員愛護馬匹上諭內大臣國舅佟國維等曰方今春令肥馬若被雨淋恐致倒斃著通行曉諭出兵人員及于成龍等預備油單中途如遇雨雪即以苫蓋壬辰命䝉古官兵預備于烏爾揮河聽用先是理藩院奏言四子部落六鄂爾多斯兵俱派隨西路出征兩翁牛特兩喀喇沁兵已派挽中路米車不議外其兩烏朱穆秦兩蒿齊忒兩阿霸哈納爾兩阿霸垓兩蘇尼特十科爾沁兩扎魯特阿祿科爾沁兩巴林克西克騰敖漢奈曼兩土默特及喀爾喀羅卜臧貝勒等旗扎薩克王貝勒貝子公台吉等官兵應派在何路伏候欽定得㫖俟出兵臨期傳諭衆扎薩克等酌率本旗官兵于各邊界預備來者帶往不來者聽之至是上諭曰目今䝉古兵衆正當馬匹羸瘦之時可止其來㑹大軍著都統杜思噶爾理藩院章京達賴馳驛前往令䝉古王等將所屬兵丁內情願效力馬匹足供驅䇿者儘數派出駐烏爾揮河地方預備乘青草牧肥馬匹以待遣用杜思噶爾等宣諭畢可于喀倫內來赴軍前定中西二路大軍起行日期欽天監奏二月三十日丙辰寅時中路大兵自京城起程大吉二月十八日甲辰巳時西路大兵自歸化城起程大吉奏聞上諭內大臣蘇爾逹等曰中路大兵行期可定于二月三十日此選定日期著速檄大將軍費揚古知之命廢官中路坐塘效力兵部理藩院奏中路大兵例應設驛自京城至獨石口請設四驛其間有額定驛馬不必增加外每驛用筆帖式一員撥什庫二名自獨石口外五六十里一驛約設六十驛每驛馬四十匹共需馬二千四百匹應于直𨽻山東河南三省捐助之馬京城大小官員捐助之馬兵部館所之馬內取一千九百匹兩阿霸垓兩阿霸哈納爾兩蘇尼特旗分內取馬五百匹安設至中路大兵到喀倫後沿喀倫迎西路聯絡設十五驛所需馬三百匹亦取捐助之馬兵部館所之馬每驛安設二十匹如兩路大兵中間相隔遙逺驛或不足酌量增設中路大兵正站腰站俱兩驛合設筆帖式一員撥什庫二名扎薩克䝉古官一員兵十名其筆帖式取自各部院撥什庫取自八旗滿洲蒙古旗下其管理正站驛馬行止安設之事應撥理藩院兵部章京各二員腰站亦撥章京各一員前去至捐助之馬無夫押送以四馬一夫算共需夫四百名應檄直撫將附近僻地驛夫照數酌撥備帶口糧押送馬匹奏上得㫖此番出師諸物朕皆全備並無待後賫送之物飛馳之事亦少一驛設馬四十匹則太多况發直𨽻河南兩省驛馬人夫伊等亦甚勞苦著每驛用捐助馬二十匹部院章京筆帖式撥什庫調用將盡今設此驛有革職文官情願告請效力者甚多若輩不習軍務可令伊等一驛兩三人坐塘效力報馬不足令自備馬匹馳報其口糧令自備人夫運送亦彼出力自效之事也併酌撥扎薩克䝉古內台吉章京兵丁監視馬匹如驛馬失盜被劫即依律治罪至草青後將䝉古之馬著該管台吉各自本旗酌帶赴驛協助傳報以此傳諭設驛地方衆扎薩克可也如此則驛務不致有誤而坐塘者亦大有裨益矣餘如議行癸巳諭安郡王馬爾渾等駐防歸化城遠偵聲息先是命安郡王馬爾渾輔國公來僖副都統雅圖率宣化府緑旗兵一千歸化城土默特兵二千往歸化城駐防至是馬爾渾等瀕行恭請訓㫖上曰爾等往歸化城務揚軍威以示兵力强盛各處遠行偵探最為要緊爾等三人須同心效力不可于事後但云我意原欲如此曾經言過彼此互相推諉王與公皆年幼未曾歷練凡事宜與雅圖商酌而行爾雅圖乃曉事之人不可推托王等至朕行在與歸化城相近此時正當用兵之際不必差人請安甲午命頒賜綿甲于從征將士時浙江等五省製造綿甲陸續解至京師上命頒給從征將士復傳諭曰此甲朕曾親試進退周旋毫無阻礙甚覺輕便此外更加以一層鐡葉一切鳥鎗無有貫入之理此甲表裏皆係單層絲綿尚易透出或緞或布內外再加襯貼則益覺堅好矣甲背上亦照鐡甲式各書旗分佐領姓名綴之此皆動用正項錢糧特為製造不可棄擲所給之人記名存案命加運軍糧以備虧耗上諭總理運務于成龍等曰爾等所運軍糧係計日按口而備一路風吹日曝車軸動搖或致虧耗可于每石加米一斗運往如此則臨期支放庶不致缺少大將軍伯費揚古自京起行赴歸化城增發火炮於西路先是以冲天炮三門神威炮十門景山製造子母炮二十四門江南炮五十五門發往大同以備西路兵之用至是上諭兵部曰著於新造炮四十八門內選八門派每旗炮手一名作速增解大將軍費揚古軍中命開明口外來報聲息檄知將軍薩卜素等上諭內大臣國舅佟國維等曰前令黑龍江寧古塔盛京立刻備兵各居其地者恐噶爾丹知我三路大兵進𠞰惶迫東行是以使之預備也今視口外來報情形亦有東行之狀著薩卜素立刻整備屬下兵馬遠設偵探如有用盛京寧古塔兵之處許彼星速往召總轄調遣其左近䝉古亦當小心防備因薩卜素所居懸隔報京聲息不得聞知可將凡屬噶爾丹之事口外報文一一查出開明月日發與薩卜素使彼知之以便准備行事盛京寧古塔將軍處亦著遣檄知之丁酉命以所餘綿甲解右衛軍中先是曾以綿甲五千發給大將軍費揚古軍中至是上諭內務府總管曰所餘綿甲內著取二千領交兵部解往右衛軍中戊戌命選侍衛章京為傳宣上諭內大臣國舅佟國維等曰現在傳宣皆卑微之人重大事務不足差遣除平常小事差遣若輩外著每旗簡選賢明侍衛章京四員附御營預備如有緊急大事使持令箭以聽差遣其令箭交內府大臣製造己亥敕奬䇿旺喇卜灘時䇿旺喇卜灘遣使囊素齎疏請安并貢方物又陳噶爾丹奸惡乞遣還回子歸已上嘉之賜以敕書敕曰朕為萬國元后惟以率土乂安咸享樂利為心其能體朕覆載之懷敬順自持者朕必愛養教育之其或違朕兼容懷保之意不循分誼包藏禍心悖安和之理者朕必懲創匡正之此朕統御寰區為人君之大道也今爾䇿旺喇卜灘仍踐前好遣使請安貢獻方物不絶又以噶爾丹奸詐為所侵凌與爾有不共戴天之讐披瀝情實遣使囊素齎奏入告誠心求恤敬順可嘉朕為一統萬邦之主有不眷爾誠心效順之人乎查爾所奏回子之事今噶爾丹處雖無回子前來貿易此後或來朕必交該部查明如爾所請發往朕嘉爾恭謹受爾貢獻爾尚永懷敬順朕將洊加恩賜焉昔噶爾丹擾我郅治猖獗橫行闌入烏闌布通之時朕遣偏師大敗之欲即窮追將盡殲矣而噶爾丹乃長跪于達賴喇嘛所遺威靈佛前而誓曰不敢復侵中華皇帝之喀爾喀與衆人民載書加印始免其誅滅而縱之朕向者殊不喜征誅今噶爾丹悖棄誓言戕我賚汝之使劫喀爾喀之人阻止班禪庫圖克圖之來今又至巴顔烏闌動搖我人民內懷詭詐欲行禍亂其跡顯然朕為一統萬邦之主若此擾我升平之人何得不加創艾是以發三路大軍誅討凡罪皆在噶爾丹他無與也但三路大軍甚衆聲靈赫濯恐邊外之民不無震驚爾其遍諭爾之屬衆以至土魯番諸處各令照常安居勿致驚潰特遣內閣侍讀常明理藩院司務英武為使賜爾花緞二十匹銀茶桶茶盆各一具狐腋蠎袍一襲貂帽一頂玲瓏鞓帶一圍皮靴蠎襪各一對爾如有所欲言其遣人偕使臣來奏尋理藩院以嗣後䇿旺喇卜灘使人不得過二百名具奏上命使人往來以三百為限辛丑命大將軍伯費揚古遣人于喀倫外掘井費揚古奏言臣於二月十二日至洋河地方遇遣往看路之副都統阿迪等告臣云自歸化城至喀倫有二路若自穆鼐一路前進二十日可至喀倫或從昆都倫一路前進十九日可至喀倫此二路皆有溪河清泉不須掘井喀倫以外郭多里巴爾哈孫一路共十三站每站有井十餘處噶爾拜察罕庫騰一路共十七站每站亦有井十餘處此二路俱令其再行浚鑿有掘至五六尺者有掘至二三尺者深掘處尚可得水其淺掘處水共沙泥凍合竟不可得水臣等以阿迪等所看二路皆可前行即率兵進發俟到喀倫外當酌量掘井以往奏至上諭議政大臣等曰據副都統阿迪等奏其浚鑿之處仍係舊所並未另行掘視掘井之事關係軍行著喇嘛商南多爾濟同副都統阿玉璽等馳驛前赴費揚古處諭㫖一到即令遣人前往掘井大兵仍照常進發商南多爾濟滿洲䝉古文義兼通凡有行文及差遣之處俱屬可用著留費揚古處一同辦事壬寅發訓諭大將軍伯費揚古上諭費揚古曰進兵之事朕已與諸臣酌議檄諭爾知之矣今聞根敦帶青貝勒已進洪郭賴之內齊斯希卜地方恐爾兩隊兵誤認喀爾喀為厄魯特此當微諭阿南逹知之至於商南多爾濟當俟爾等過翁金後給之鄉導從可通之路限日差至御營為宜此兩事雖不甚緊要意之所及交阿迪傳諭尋又諭費揚古曰據總兵官康調元疏有晉撫捐助騾子米糧俱未解到諸語以此揆之因大兵趲期稍有未及亦未可定米糧牲口所關甚重爾將軍當防護其前後爾等路遠糧運較中路倍難萬一食有不繼則爾兩隊之兵不至窘乏乎朕心深憂之特作手書飛遞傳諭甲辰命詳議親征事宜上諭禮兵二部曰朕統御中外念切撫綏惟務休養民生未嘗遠事征討比年以來海宇升平閭閻樂業四方固已無事獨噶爾丹荒裔狡冦肆逞凶頑自烏闌布通敗遁之後不自悔禍仍行狂逞悖天虐衆違蔑誓言侵掠我臣服之喀爾喀竊踞巴顔烏闌之地詭謀叵測逆狀已彰乘其竄伏近邊自應及時撲𠞰倘目今不行剪滅恐致異日沿邊防戍益纍兵民聲罪迅討事不容已用是遣發各路大兵分道並進朕特躬蒞邊外相機行事以衆擊寡以正誅逆天意人謀無不允協此冦一殄則邊塵蕩滌疆圉輯寧內安外攘實在此舉告祭天地宗廟社稷並一切應行事宜著察例詳議具奏議曰上躬統大軍進發應遣大臣告祭于天地宗廟社稷再起行之禮道路神太歲炮神俱應遣大臣致祭出師之日上親詣堂子行禮畢由安定門大街出德勝門至土城關外八旗兵分兩翼陳列陳兵時以前鋒軍為始其次俱按旗分左翼先列鑲黃旗鳥鎗護軍次護軍鳥鎗驍騎次三旗俱照此依次排列出征皇子王等旗纛護衛俱各于夲旗護軍之中排列末旗鳥鎗驍騎之下列滿洲炮兵次漢軍炮兵次漢軍火器營兵右翼亦照此排列見駕出郭師中以啓行禮三舉炮皇上至陳兵處官兵皆於馬上俯伏候駕過其不隨征王以下有頂帶官員以上俱過大軍排列之前在路兩傍分列跪送并派八旗官兵肅清道路嚴禁僕從馬匹喧雜之聲駕過後隨駐御營人等按隊前進其次出獨石口兵丁各按隊伍隨行皇上至駐驆處前鋒應令過御營前駐劄隨駕四旗官兵皆啓行畢然後令出古北口四旗兵亦照旗分各按隊伍赴扎營之處奏入得㫖出師後京師關係甚要其不隨征都統等免其送駕再護軍統領副都統參領步軍統領步軍校等各有防守之責亦俱免其送駕餘如議行命副都統趙玥隨征𨽻火器營中丙午命預定接戰隊伍上諭內大臣馬思喀等曰軍士接戰當預編隊伍頭隊兵必多諸王可俱編入二隊兩脅兵亦應派定所選取勇士可編入頭隊頭隊二隊及左右兩脅之兵為最要軍士不得以前進相爭爾等其集議之議曰頭隊軍之正中排設鹿角及緑旗兵次以左右翼漢軍火炮鳥鎗之兵繼之繼此則派左右翼滿洲火炮兵四百鳥鎗護軍每佐領一名護軍一名親隨護軍兩佐領合一名鳥鎗驍騎亦兩佐領合一名勇士及情願效力者俱派在頭隊其二隊每佐領護軍一名親隨護軍兩佐領合一名皇子及王貝子公等俱定在二隊其左右兩脅每佐領護軍一名鳥鎗護軍兩佐領合一名鳥鎗驍騎亦兩佐領合一名行李令在二隊後各隨本旗本參領立于百步之末再每佐領前鋒一名鳥鎗護軍兩佐領合一名內府護軍各執事人等及部院大臣官員筆帖式俱令在御前以備調用察哈爾兵八百扎什王兵五百另作一隊預備追擊衆扎薩克之兵一至即令與察哈爾兵㑹合其派領兵接戰之大臣伏候欽㸃奏入上從之又諭曰火器營軍士既派在頭隊二隊其火器營大臣即率之接戰至于都統護軍統領副都統等俱係特簡大臣人材偉岸並無庸懦者頭隊二隊及兩脅可各照各翼掣籖以定昔太宗皇帝時公彭春之祖和碩圖於南苑交戰橫衝而出奮勇破賊故封以公爵今有能越衆效力者朕自不靳爵賞若退縮不前者治罪無赦都統兼前鋒統領碩鼐著統前鋒而行提督張雲翼著與都統鄂倫代一處效力副都統吳達禪齊藍布令隨駕行穆森等隨從皇子不必編入隊伍領侍衛內大臣目下無庸派出俟臨期再行撥派于是從征大臣公同掣籖都統蘇努杜思噶爾石文煐護軍統領鄂克濟哈蘇丹副都統崇古禮胡什巴阿爾納莫洛渾龍什庫掣得頭隊都統齊世噶爾馬副都統錫柱噶爾必阿喀納塢赫掣得二隊都統阿錫坦副都統達禮善納秦掣得左脅都統周卜世副都統法喀渣喇克圖掣得右脅奏上得㫖渣喇克圖著派在頭隊龍什庫調撥右脅隊內定中路軍營上諭內大臣馬思喀等曰中路護軍及驍騎可列為十六營爾其酌量集議議曰皇上駐蹕處為一營八旗前鋒軍列作二營八旗護軍及驍騎列作十六營八旗漢軍火器營兵隨炮兵炮手綿甲兵列作四營部院大臣官員筆帖式等列作一營左翼察哈爾兵列作二營宣化府及古北口緑旗兵各為一營至守護御營官兵亦應派定查內府護軍及執事人員總計四百二人網城內安設巡警二十一處每處派章京一員內府護軍及執事人十名守之網城三門每門派護軍及執事人十名守之外營安設巡警八處每處派章京一員侍衛鑾儀衛官執事人共十名守之外營四門共派護軍執事人四十名守之馬匹牧場于上三旗每旗派章京一員侍衛及鑾儀衛官執事人三十名守之禁止喧譁者于上三旗每旗派章京一員護軍併執事人役共二十名督之通計一班需用五百四十人此分編營壘以及守視御營諸事俱交領侍衛內大臣護軍統領及總管內務府大臣約束督理奏入上曰鑲黃旗大營內著皇七子𦙍祐都統杜思噶爾副都統達禮善內大臣額駙尚志隆督捕理事官溫達鑲黃旗小營內著貝子蘇爾發副都統喀爾沁副都統錫柱正黃旗大營內著皇五子𦙍祺都統侯巴渾泰副都統阿喀納學士宋柱內大臣布克韜正黃旗小營內著宗室公蒲圻都統周卜世副都統莫洛渾正白旗大營內著信郡王鄂扎都統阿錫坦副都統阿爾納學士席爾登正白旗小營內著宗室公吞珠都統石文煐副都統胡什巴正紅旗大營內著皇四子公常泰都統齊世副都統法喀原任尚書顧八代侍讀學士覺羅華顯正紅旗小營內著宗室公齊克塔哈護軍統領鄂克濟哈副都統渣喇克圖鑲白旗大營內著恪愼郡王嶽希都統噶爾馬署護軍統領桑格副都統納秦鑲白旗小營內著貝子吳爾占護軍統領蘇赫鑲紅旗大營內著皇三子𦙍祉公福善副都統孫渣齊侍郎度爾達學士三寶鑲紅旗小營內著宗室公蘇努副都統塢赫正藍旗大營內著顯親王丹臻副都統柴穆布學士常綬正藍旗小營內著閒散宗室哈爾薩副都統崇古禮鑲藍旗大營內著康親王傑淑原任內大臣阿密達副都統宗室鄂飛鑲藍旗小營內著貝子魯賔原任都統喀代副都統龍什庫率領再八旗漢軍火器營鑲黃正白兩旗合為一營著都統公鄂倫代副都統公孫徴灝正黃正紅兩旗合為一營著副都統張所知都統王永譽鑲白正藍兩旗合為一營著副都統雷繼尊都統李正宗副都統喻維邦鑲紅鑲藍兩旗合為一營著副都統費揚固趙玥都統諾穆圖副都統宗室巴賽副都統張朝午率領其察哈爾兵著貝勒多爾濟渣卜閒散大臣吳巴什統領餘如議行尋以侍郎席爾達為部院營夸蘭大嚴禁䝉古盜竊上諭理藩院曰官兵馬駝及坐臺馬匹關係緊要應檄知衆扎薩克及喀爾喀扎薩克等嚴禁各旗偷盜如有干法者即按軍法梟首示衆家産籍沒入官其該扎薩克以及該管人員從重治罪爾部院即遣撥什庫馳驛前往遍行曉諭申命整修運道先是上命內閣學士齊穡監修塞外路徑至是復諭總理運務于成龍等曰朕為運米一事于口外應修之路已派大臣監理爾等敕書內亦有貽誤修路搭橋者即行指名題參語今運車以次經行茍一有傾圯即著修路大臣立行整治毋貽後至之憂速趣知之丁未申諭行軍法禁上諭議政大臣等曰軍士所賫米糧務如數攜帶自啓行以至在途該管官員不時嚴查倘有減數帶往者將本身及該管官員一併從重治罪有盜米糧馬匹逃回者擒之殺無赦軍士有縱酒殺人或鬭毆傷人者不俟秋後立行正法扎薩克䝉古等有盜我軍馬匹者即行梟示軍士及厮役等有盜貿易䝉古之馬匹者亦即誅戮昔時行軍以厮役牧放馬匹此番既派出軍士守視其庸劣不堪之厮役可停其帶往至于隨軍貿易之人固不可禁若縱其貿易又至紊亂應于某營相近即令某營之夸蘭大派出章京于一里外指地駐劄准其貿易嚴禁喧譁火燭并戒沽酒倘貿易人不遵法禁偷盜馬匹米糧者亦殺無赦帶往之人一併治罪軍士或盜米售與貿易之人或强買搶奪者定加以重罪可遍行曉諭使咸知凛遵尋理藩院以大兵經行䝉古地方准令䝉古等沿途販賣駝馬牛羊等物奏請得㫖爾院可另設一營其販賣人等即在爾營內貿易大軍十六營中每營派官一員專司貿易之事如有指稱貿易行竊者不分首從梟首示衆妻子家産籍沒入官爾院即行傳諭戊申內齊陀音庫圖克圖等賫達賴喇嘛等奏章還復命先是差喇嘛內齊陀音庫圖克圖御史鍾申保往召班禪庫圖克圖至是內齊陀音庫圖克圖等還賫逹賴喇嘛奏章至其詞曰謹奏聖主睿覽我自壬辰年入京得覲聖明中國與西域道法歸一以來嘗以應行事宜上奏聖明近緣召見喇什龍布班禪備遣使幣謹以皇上寵眷之意宣告班禪而不能趨赴伏祈鑒宥尤冀宇內元后至仁至明立化昏悖之徒永開非常無量善門班禪庫圖克圖疏曰奉到敕書賜物不勝歡忭臣自有生以來與徒衆焚誦上祝聖明未嘗少懈又䝉皇上寵眷降㫖召赴金闕以覲天顔理應趨赴仰答無量隆恩但我土伯特國俗大忌痘疹是以甚畏之且奈冲占得大凶不利有攸往之兆不能上副皇上之意謹銘刻于中在西方與僧衆誦經不絶伏乞仍前鑒恤頻加教誨第巴疏曰博碩克圖汗在本地聞皇上召班禪遣其喇木扎木巴納木喀林辰沮班禪庫圖克圖勿行職以此故班禪庫圖克圖不行之意遂定想或因未出痘疹懼而不往耳臣遣使往諭班禪庫圖克圖彼竟不允伏乞鑒宥達賴汗疏曰為召喇什龍布班禪事臣致書兩次以為當行而彼竟不從伏乞睿鑒據此奏聞得㫖下所司內齊陀音庫圖克圖賫逹賴喇嘛等疏至留其使于西寧應否放入著議政大臣集議隨議逹賴喇嘛等遣使陳奏班禪庫圖克圖不來情由及噶爾丹之昏悖其使理應放入請差理藩院官一員往取逹賴喇嘛使人戈尼爾羅卜臧帕克巴格隆及諦巴使人羅卜臧蓋遵等來京其貢物令交所司奏入上從之庚戌命大軍兩路出口并分翼牧馬上諭兵部曰此番出征兵馬衆多可分為兩路出口前隊者牧馬于路左仍留路右以待後隊之牧放則牧場不傷于軍士大有禆益可將鑲黃正黃正白正紅此四旗前鋒軍并緑旗營前鋒軍為一隊繼以宣化府緑旗兵左翼察哈爾兵為一隊繼以御營又分四旗兵為四隊漢軍火器營兵為一隊出獨石口再將鑲白鑲紅正藍鑲藍此四旗前鋒軍并緑旗前鋒軍為一隊繼以古北口緑旗兵為一隊再繼以四旗兵分為四隊漢軍火器營兵為一隊令其出古北口軍行一日一隊接踵進發出獨石口之前鋒軍鑲黃旗正黃旗兵緑旗兵馬匹俱牧于路左正白旗正紅旗兵及漢軍火器營兵馬匹俱牧于路右其出古北口之前鋒軍鑲白旗鑲紅旗兵緑旗兵馬匹俱牧于路左正藍旗鑲藍旗兵及漢軍火器營兵馬匹俱牧于路右可通行傳諭將軍孫思克等奏報進𠞰事宜及率兵起行日期孫思克等奏臣等率總兵官董大成潘育龍等之兵急行而來俱于二月二十二日前已到寧夏簡閲肥馬選得臣孫思克標兵一千八百董大成兵一千二百潘育龍兵一千併計殷化行兵三千凑足七千合滿洲兵三千共為一萬至榆林總兵官柯彩雖身帶本標兵前來因向未派出故諸物不備且各處總兵官俱經調發邊疆地方不便盡令空曠是以令柯彩及其兵一併遣回本汛至進𠞰緑旗兵除本身之馬一匹外增給馬一匹及滿洲緑旗官兵僕從䭾糧馬一匹俱于留住兵丁及採買馬匹與捐助駝馬內視臕大者撥給前議以牛羊為一月糗糧攜帶四月米今方春令牛羊甚瘦雖驅之而往亦無實濟故羊一隻折給銀五錢令各自備一月糗糧其前進之兵親攜四月之米則滿兵僕從少緑旗兵並無僕從難以攜行是以臣等公議減去三千僕從之米令前進之兵攜帶三月米一月糗糧留回時所食一月之米隨後追送翁金臣等酌留官兵于翁金收此解往一月之米此米關係甚大不得不選文武材能大員多帶兵丁護送故簡鞏昌按察使囊吉里漢中副將楊琳洮岷道董紹孔又酌撥同知知州知縣參將遊擊守備千總把總等官發步兵二千令牽趕米䭾發馬兵五百護送酌撥副都統阿南達帶來理藩院筆帖式撥什庫率鄉導引路使至翁金臣等料理出兵諸務俱已完畢將軍孫思克博濟等兵于二月二十二日自寧夏起行總兵官董大成殷化行潘育龍等俱陸續進發矣為此奏聞辛亥命以車馬撥給護運兵上諭總理運務于成龍等曰總兵官嶽升龍劉國興所率騎兵五百名護運米車亦殊勞苦伊等除本身所乘馬外並無餘騎爾等可於預備車馬內酌量撥給以為彼乘坐裝載之用壬子諭總理運務大臣等先事奏請指授先是上以備運米數過多恐車重難行命于成龍等于正額米外祇備帶八千石前往至是上復諭于成龍等曰餘米一減車行必至輕快嗣後爾等凡事遇疑難即行入告朕當立加指示倘不先事奏請以致臨期有誤朕何難治爾之罪但受譴事後於爾當矣朕何補焉爾等自今其臨事毋忽癸丑命部院大臣分入皇子諸王營中佐理軍務上諭從征部院諸大臣曰皇子等雖習練馬步騎射然未經大事即諸王中之經事者亦少爾部院諸臣效力年深曉暢事務朕特加選擇更調旗分派入皇子及諸王營內凡一切法度及號令軍士諸務令與皇子諸王公同議行戰陳事亦共相籌畫皇子諸王設有過愆即正容勸導如不聽納即以奏朕倘負朕委任之意致營壘不整軍紀不肅或皇子諸王過愆不行勸導不即奏聞者朕定以軍法治罪不恕命給挽車䝉古兵行糧軍器時派出挽運中路米車之喀喇沁兵一千翁牛特兵五百至京上諭總理運務于成龍等曰喀喇沁及翁牛特兵內凡無弓矢者按名給弓一張戰箭二十枝并撒袋俱取之兵部如不足則于內庫領給無鳥鎗者可給與鳥鎗鉛子火藥取之工部伊等驅車勞苦著三省巡撫每兵各給以衣一襲鞋一雙并照滿洲緑旗兵例給與行糧甲寅申諭師行紀律上諭議政大臣等曰前者征討噶爾丹因師行無紀以致彼此不能相續今親統六師前進法律須加嚴明師行之日軍士俱先于郊次排列俟朕啓行後仍復入城按日逐旗而出務必隊伍嚴整夸蘭大參領等各率本營行裝按隊前進不得畏避塵土分散錯亂倘馬驚人墮致失馬匹者令該夸蘭大章京及護軍校等親往尋獲中路軍雖行尚俟西路消息倘值天雨即令駐劄其後隊營伍不必等候傳示亦行屯駐再每營俱撥給醫藥凡軍士及僕從有患病者該夸蘭大即發醫調治倘病勢危篤即報知該營皇子王等留住臺上將伊分內之米一併留給病痊仍令前進或有病故者即留臺上俟旋師日帶回凡一應細事該營之皇子及諸王大臣夸蘭大等公同結案事關重大再行請㫖凡遇敵兵令我軍攻擊朕必詳審可攻之處始令前進必不以軍士軀命為嘗試如臨陳遇敵不能奮勇敗賊雖皇子諸王亦在不赦必治以罪前行之前鋒倘望見敵兵必視有水草處駐劄以俟後隊軍至可通行曉諭八旗至于大將軍伯費揚古處亦應檄知令其遍示諭後派護軍留京師以備調遣上諭大學士阿蘭泰等曰中路軍士甚衆後派之每佐領護軍一名無庸帶往取其肥健馬匹給發前去軍士則馬匹充裕矣此存留每佐領護軍一名仍令照常預備俟有需用之處一行徴調即速起行再後隊之章京護軍校等亦俱停其前去著在京預備丙辰上統大兵發京師討噶爾丹先是科爾沁土謝圖王沙津於木蘭行獵之地來請安上召沙津入行宫密諭曰爾可遣人說噶爾丹來至近地沙津遵諭潛遣俄齊爾約之噶爾丹果沿克魯倫而下掠喀爾喀納木扎爾陀音遂踞巴顔烏闌上聞之思機㑹不可失當亟行事遂經畫糧餉調度各路兵馬不俟草茁親統六師即於是日啓行瀕行分遣內大臣國舅佟國維等告祭于天地宗廟社稷太歲壇其文曰維康熙三十五年歲次丙子二月丁亥朔越二十七日癸丑臣敢昭告於皇天上帝曰臣仰承鴻祐臨御兆民夙夜恪恭罔敢逸豫惟期中外乂安咸遂生養比年以來厄魯特噶爾丹荒陬狡冦悖逆天常肆行凶虐曾經征𠞰窮冦敗遁乃猶怙終不悛蔑棄誓言侵掠喀爾喀潛伏近塞詭詐跳梁稔惡已極久為人心所共憤自為上蒼所不容臣兹恭行天罰聲罪致討遣發大兵分道並進臣特躬涖邊外相機行事用掃除頑梗之患以永綏荒徼之民擇于二月三十日啓行伏祈帝鑒謹告其祭地壇諸處祝文略同至是日寅時上恭詣皇太后宫問安畢出午門排儀仗率諸王文武大臣詣堂子行禮將至鳴角入堂子禮畢出內門致禮于旗纛既畢出德勝門至排軍處三舉炮八旗前鋒護軍火器營兵分兩翼以次排列駕過官兵各整隊伍相隨進發諭內大臣公福善嚴督所領軍士上諭福善曰出古北口一路兵衆惟爾督率而行凡所過城池村舍恐軍卒或入搶虜當行嚴禁兵丁馬匹最要須加意牧養朕前所示法令極明毋使有違爾身係內大臣雖諸王亦聽爾言出古北口後或有無知之徒以捕獸馳騁勞苦馬匹者當嚴行禁止務須按路進發上又諭內大臣國舅佟國維等曰軍行以馬為重防汛務須嚴密倘不嚴慎馬匹被盜必驅回京師仍賣與我軍應交該管大臣將牧場加意謹防毋致踈忽命總理運務于成龍等修理道路上諭內大臣國舅佟國維等曰朕觀所修道路甚屬不堪可著總理運務左都御史于成龍等俟米車過後即行修理再軍士車輛不以次前進俱並軌而行倘遇隘口阻滯則後軍必致遲誤嗣後大軍車輛俱著依次前進毋得爭先壅塞恩賜喀爾喀台吉波羅吳納漢銀兩駝馬時台吉波羅吳納漢以願從軍奏請上諭署理藩院事尚書馬濟曰波羅吳納漢遠來歸順且欲從征殊屬可嘉著賜白金百兩其所乘馬駝及需用什物爾等可查明辦給令于翌日起程隨行遣內大臣馬思喀致祭火炮之神文曰惟神德秉祝融功侔上將聲騰塞外山嶽動搖勢振師中雷霆飛掣爰藉摧堅之力丕彰𠞰逆之勳朕親蒞邊方掃除狡冦用資神武遠播英風特遣專官聿申祖祭尚饗遣副都御史席密圖致祭道路之神文曰惟神翊衛周廬肅清蹕路師中助順塞外宣威朕兹親蒞邊方掃除狡冦惟神默佑利導前驅特遣專官䖍申禋祀尚饗聖祖仁皇帝親征平定朔漠方略卷二十

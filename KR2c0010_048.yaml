body:
  text: 欽定四庫全書聖祖仁皇帝親征平定朔漠方略卷四十八康熙三十七年正月辛巳命授青海諸台吉封爵上諭議政諸臣曰扎西巴圖爾等應授封爵著議政諸臣詳議具奏議曰恭惟皇上聖謨廣運神武懋昭普天同慶四海協和有生之倫咸得其所雖古昔帝王莫之能比西寧外厄魯特扎什巴圖爾台吉乃青海台吉之統領也今聞皇帝至仁盛徳傾心嚮化土謝圖帶青額爾徳尼納木占台吉彭蘇克台吉率其所屬誠心歸皇上之化當封何爵伏候上裁奉㫖封札什巴圖爾為親王土謝圖帶青額爾徳尼納木占為貝勒彭蘇克為貝子壬寅命授喀爾喀扎薩克台吉索諾木伊思扎卜封爵上諭理藩院曰䝉古諸王台吉軍中殊為効力坐塘運米捐助牛羊俱著一併議奏議曰喀爾喀扎薩克台吉索諾木伊思扎卜軍中効力應封為輔國公給之誥命喀爾喀台吉哈米爾帶青巴圖爾亦在軍中効力應封為一等台吉賜之蠎袍貂帽上從之二月壬子命授厄魯特台吉玉穆春等封爵理藩院奏言貝勒巴圖爾額爾克濟農之子玉穆春軍前効力應封為輔國公給之誥命上從之理藩院又奏言喀爾喀扎薩克台吉額爾徳尼旗下台吉沙魯伊兒都齊疏稱前賽音諾顔十三男之後人俱已為部長在本地行事有納木扎兒阿海呉巴什部長蘇達尼部長兩人臣較之差大今此兩部長仍為部長臣遭厄魯特憨都台吉之刧掠諸物缺少今臣所有百人而已土謝圖汗與噶爾丹交戰時托多及我兩人與戰兩日後又與侍衞阿南達同行在昭木多地方擒賊手傷而仍前進復偕大將軍追噶爾丹今惟臣一人未得品級為此轉奏上以沙魯伊兒都齊効力行間勤勞頗著著授為一等台吉仍賜蠎袍貂帽安挿降人厄魯特憨都理藩院奏言將軍孫思克解到厄魯特䝉古憨都本身及其妻併一女男子六人婦人一人共十口問之憨都答曰我乃杜哈爾阿喇卜灘親兄噶爾丹族姪烏闌布通之戰與噶爾丹同敗於王師奔回之後我謂吾弟阿喇卜灘曰噶爾丹與䇿旺喇卜灘兩人交惡相攻我軰居此無用當另居一地遣使於皇上及達賴喇嘛以和噶爾丹䇿旺喇卜灘之争否則大家各居我兄弟言定誓不以告一人乃吾弟阿喇卜灘背誓以此故告之噶爾丹我不便與若軰同處欲避之另居而人少不能自立無可柰何往投䇿旺喇卜灘䇿旺喇卜灘使我娶吾兄達都虎之妻吾嫂不從意欲各居䇿旺喇卜灘謂我曰爾嫂與額爾克格隆通矣吾心以為我欲娶之而不可反與人通故恨之即以兵二百給吾兄達都虎原妻之子達爾扎令収之來達爾扎遂往殺其繼母焉䇿旺喇卜灘謂我等不聞之於彼併執達爾扎而禁之七年盡取我屬裔後噶爾丹敗於昭木多吾兄之子滾楚克率四十户人來投䇿旺喇卜灘䇿旺喇卜灘乃釋我交吾姪滾楚克去嵗十一月䇿旺喇卜灘征哈薩克出兵之後思吾父吾身向來職貢天朝盍歸聖上我遂率屬下百餘户人内向逃來至齋爾納木地方見吾弟阿喇卜灘住居彼地我欲率衆人逃出而雪大子女多不能行故盡留衆人吾身僅率此數人内來至巴爾庫兒地方遇郭帕白克之回子我等忽見衆人形影恐係䇿旺喇卜灘貿易之回子故令我下喇嘛一人謬告以達賴喇嘛使人領憨都等行路而郭帕白克執我送將軍孫思克解部我等特來歸聖上我三子死於路現在十口到此上賜憨都羊裘貂褂傳諭曰爾來歸朕殊可憐憫帶來屬裔雖少而爾乃顯者之子朕仍照爾地授爾為台吉附鑲黄旗察哈爾内阿喇卜灘所屬馬穆馬穆特等佐領中安挿暫留爾數日遣爾起行隨又傳諭憨都曰爾顔甚不嘉爾可往察哈爾地方馬穆馬穆特皆爾同處之人且暫居於彼俟有厄魯特來同之來其時給爾牲口三月己卯遣使諭䇿旺喇卜灘䇿旺喇卜灘遣使進疏云伏讀中外逺邇總為一體其於道法有益者即褒䘏之逆行者即懲治之之㫖因達賴喇嘛湼槃之事未悉是以凡事不能明奏今細思諭㫖第巴於内外諸事全然不堪其在内之不堪者云何舊例以能掌教者使之掌教自宗門以來至普通菩薩海潮大士無不如是達賴喇嘛圓寂之事匿之不宣鈞是師弟也而斥正傳之聖徒班禪自尊其身有玷道法詐稱達賴喇嘛法㫖以混亂七旗四厄魯特至今未定生事往犯天朝想已洞鑒之矣恐好事樂禍如此此等諸禍正未有已也前奉諭㫖有云兩聖掌宗門之教相敬已七十餘年其時法無玷而道蕩平凡宥於教中者皆得安樂衆皆知之祈大君睿鑒現在兩聖性體不愆宗門法律無玷使衆生爭自濯磨不勝幸甚䝉有陳奏所見毋得忌諱之㫖是以抒情明奏上差内閣侍讀學士伊道侍讀常明親隨侍衞喇什二等侍衞克什圖三等侍衞津巴為使往諭䇿旺喇卜灘勅諭文云皇帝勅諭台吉䇿旺喇卜灘曰覽爾疏言第巴掩匿達賴喇嘛圓寂之事斥聖徒班禪而自尊有玷道法好事如此恐禍正無已又爾所遣彭蘇克喇木扎木巴多爾濟寨桑口奏爾之言云第巴監禁聖徒班禪不使人見奉事紅帽兩喇嘛名徳爾端多爾濟扎卜者即現世達賴喇嘛化身亦以是兩喇嘛之言謂之達賴喇嘛而已並非聖徒班禪之言是以可疑第巴壊宗門之教罪不可容今即本朝亦䕶持宗門之法為達賴喇嘛班禪庫圖克圖之施主相敬七十餘年第巴原係達賴喇嘛執事下人因軫念達賴喇嘛欲使扶持道法是以優封為土伯特國王乃以久故之達賴喇嘛詐稱尚存以欺衆唆噶爾丹興戎所行不軌今又奏稱俟班禪庫圖克圖往覲之時奏明而又不遣班禪致書求汝勿遣觀此則其情已極昭著矣爾使彭蘇克喇木扎木巴多爾濟寨桑等到時正値青海諸台吉及西寜口外各寺廟囊素俱來朝在京又遇年節各地方部落䝉古諸王貝勒台吉俱在聞第巴不禮班禪庫圖克圖常加謗毁此彭蘇克喇木扎木巴多爾濟寨桑所目擊爾台吉可詳詢彭蘇克喇木扎木巴多爾濟寨桑自知也爾所奏良是爾抒眞情思為宗門之教班禪庫圖克圖之事而劾奏第巴朕深許之為此特差内閣侍讀學士伊道親隨侍衞喇什二等侍衞克什圖内閣侍讀常明三等侍衞津巴為使以伴勅例賜御用綵縀十端壬辰以厄魯特投誠官兵𨽻察哈爾旗分内大臣索額圖等奏稱歸併鑲黄旗察哈爾旗分者厄魯特散秩大臣諾爾布一佐領阿拉卜灘屬人一佐領也其諾爾布佐領下乃一等侍衞圖克齊二等侍衞哈爾巴達木巴三等侍衞鄂羅思藍翎卜貝羅卜臧達什五品官滿濟壯丁一百九人僕從五十一人喇嘛四人以驍騎和托羅克為驍騎校領之其阿拉卜灘屬人佐領下係二等侍衞馬穆三等侍衞達克巴臧布四品官噶羅卜臧壯丁一百七十四人僕從二人喇嘛五人以四品官噶羅卜臧為驍騎校領之歸併正黄旗察哈爾旗分者散秩大臣達木巴一佐領頭等侍衞多爾濟塞卜騰一佐領也其達木巴佐領下乃頭等侍衞津巴車爾貝三等侍衞津巴藍翎索諾穆雅克錫齊倫七品官和代達穵海虎爾海壯丁一百三十五人僕從十八人喇嘛九人以七品官和代為驍騎校領之其多爾濟塞卜騰佐領下乃丹濟喇三品官楚魯客六品官杜拉都西本唐古特壯丁一百一十人丹濟喇僕從三十三人又僕從七人喇嘛十二人以六品官唐古特為驍騎校領之歸併正白旗察哈爾旗分者散秩大臣車陵一佐領二品官巴拜一佐領也其車陵佐領下乃六品官奔第畢力克壯丁一百二十人僕從三十七人喇嘛五人以驍騎功格為驍騎校領之其巴拜佐領下乃五品官戴和碩齊那木喀林臣厄爾徳尼達木巴六品官達爾扎巴圖孟克色楞台黙爾根伊西徳克壯丁一百二人僕從十四人喇嘛十六人以五品官達木巴為驍騎校領之歸併正紅旗察哈爾旗分者散秩大臣沙克朱穆一佐領也此佐領下乃頭等侍衞米喇馬扎卜三品官車陵敦多卜藍翎杜哈爾壯丁一百三人僕從八人喇嘛十一人以驍騎敦都克為驍騎校領之歸併鑲白旗察哈爾旗分者二等侍衞鄂嫩巴圖爾一佐領也此佐領下乃三等侍衞達爾扎壯丁一百五人僕從四人喇嘛三人以驍騎馬厄為驍騎校領之歸併鑲紅旗察哈爾旗分者三等侍衞呉巴什一佐領也此佐領下乃散秩大臣格壘藍翎呉山代七品官庫濟祭斯壯丁一百一十七人僕從十四人喇嘛六人以驍騎納黑圖為驍騎校領之歸併正藍旗察哈爾旗分者三品官卜爾器一佐領也此佐領下乃四品官塞楞達木巴呉拉木濟壯丁一百一十七人僕從六人喇嘛四人以四品官塞楞為驍騎校領之歸併鑲藍旗察哈爾旗分者頭等侍衞韓都一佐領也此佐領下乃三等侍衞巴拔器閒散拉思倫壯丁一百一十九人僕從五人喇嘛九人以驍騎厄林臣為驍騎校領之共計十一佐領俱照例各設前鋒二名親隨䕶衞二名䕶衞十七名撥什庫六名驍騎二十四名跟隨兵一名俱照伊等族屬分編奏至上報可四月癸亥䇿旺喇卜灘陳奏哈薩克搆兵及拘禁丹津俄木布情由䇿旺喇卜灘奏言恭請皇上萬安臣仰沐聖恩至於榮顯臣之與哈薩克搆兵非願為此也昔噶爾丹擒哈薩克頭克汗之子以畀達賴喇嘛故頭克使人乞臣闗説求還其子與彼完聚願與之好臣乃使人於達賴喇嘛索得頭克之子撥五百人䕶送歸之頭克反盡殺臣五百人後乂殺臣屬下呉爾赫徳巴圖爾台吉掠取其人民續又掠我呉禮楊罕百餘户人臣妻父阿毓竒以其女歸臣使妻兄三濟扎布送臣之妻彼又要戰於路去嵗秋臣商人自鄂羅斯歸彼又掠之哈薩克屢來犯臣有如許過惡臣是以興兵而往恐聖上謂臣喜事好兵故陳此自白又丹津俄木布聽讒與噶爾丹同殺其兄索諾木阿拉布坦後臣與噶爾丹分散各自游行丹津俄木布又偕阿奴喀屯往就噶爾丹今窮廹而後來歸始知以臣為兄臣非與弟争名也若使彼逸居恐又聽讒害臣臣是以拘而禁之為此遣使阿布都拉厄爾克寨桑薩木坦達爾漢俄母布等賫本奏聞理藩院為之轉奏命示議政諸臣六月戊午宥濟隆庫圖克圖死議政諸臣奏言班禪庫圖克圖王布特達阿卜廸疏稱濟隆厄爾徳尼向日行事因初到厄魯特地方故不能成功實出無可奈何非敢奉國家大事明知故犯也今濟隆庫圖克圖有疾勉强支撐是以畧至遲延此時前去心殊憂慮祈如前㫖勿致傷其身命念宗門之教鑒宥遣回等語查康熙三十六年三月諭王布特達阿卜廸勅文内開濟隆庫圖克圖乃達賴喇嘛特遣之以和喀爾喀厄魯特之人也乃彼並不和喀爾喀厄魯特反導厄魯特入邊汛之地與我軍交戰情罪殊為可惡務必解來朕允爾所請寛宥其身命在案今王布特達阿卜廸既遣使解濟隆庫圖克圖來則所請勿傷濟隆庫圖克圖身命遣回之語無庸議又班禪庫圖克圖疏稱前差内齊陀音宣皇上勅㫖召臣入京達賴喇嘛第巴亦曾遣使相促思遵㫖應召則臣身受福且極榮顯但臣所學者淺畧不能為功於道法且未出痘疹諸凡情節俱已奏明是以不往並非第巴沮止伏乞明鑒諸情俯念佛法俾得安寜等語查近者已差員外保住賫勅往使於班禪庫圖克圖此所奏無庸議又王布特達阿卜廸疏稱噶爾旦多爾濟與衆厄魯特同為施主而不與達頼喇嘛同其憂樂前曾以此上奏矣曩者此地並無奏請之事而呉勒木濟喇木扎木巴庫圖克圖弟子亦與伊等同往中國乞使其弟子歸來為第六代達賴喇嘛結善縁併乞降㫖禁境上人不得為非又使人占齋巴額木齊言西寧行商之人雜居青海貿易既畢歸來之時常有拐帶㓜童稚女者請禁境上之人等語應檄川陜總督甘肅廵撫責令西寧等處官員將上項原由禁約青海行商人等至呉勒木濟喇木扎木巴庫圖克圖弟子不知今在何處亦無庸議命議政諸臣將濟隆庫圖克圖之事確議來奏集議以為第巴以久故之達賴喇嘛詐稱尚在差濟隆庫圖克圖於噶爾丹所烏闌布通之役濟隆庫圖克圖為噶爾丹誦經擇日交戰且第巴目下疏稱噶爾丹與尚書阿爾尼交兵之時濟隆獻噶爾丹手帕夫濟隆庫圖克圖既為噶爾丹誦經擇戰日又獻噶爾丹手帕情罪甚大理當立斬之人但為濟隆庫圖克圖事諭第巴之㫖内有朕當寛宥其身命之語請將濟隆本身併其弟子發正陽門東城下龍泉庵交九門提督及近廟伏路官兵㸔守其飲食扣數該部支給第巴所請遣回濟隆之語無庸議上是之九月癸未䇿旺喇卜灘遵㫖遣使來獻噶爾丹之尸先是䇿旺喇卜灘遣使格色爾寨桑等來貢上賜䇿旺喇卜灘使人格色爾寨桑土魯克拜人等蟒袍彩縀復遣内閣侍讀學士喇什理藩院司務英古賫勅使於䇿旺喇卜灘所勅文云皇帝勅諭策旺喇卜灘曰爾與爾叔噶爾丹分離以來誠心恭順聘貢不絶朕亦不時加恩遣問噶爾丹逆天違背朕㫖今永滅矣其屬下大寨桑諸喇嘛俱已來降但丹濟拉呉爾占扎卜數人無所於歸流行而已近者副都統阿南達報稱丹濟拉携其子多爾濟塞卜騰拉思倫等來降噶爾丹之尸噶爾丹之女鍾齊海程貝臧布伊妻及其穉子諾顔格隆俱被爾所遣堪都截留伊拉古克三庫圖克圖往投汝所呉爾占扎卜色稜阿巴等爾已擒之阿喇兒拜自縊死車林布木往投丹津俄木布此項人等皆黨惡之人不可一日容者也若在爾地亦不利於爾故特遣勅諭爾朕㫖一到爾立刻一併查拿及噶爾丹之尸與其女鍾齊海同朕使臣差人䕶解如此則爾始終確然恭順之心著亦得長沐朕寵榮高厚之恩於無窮矣倘若隠匿不行擒解不但爾歴年之恭順皆虚即爾貿易之人亦永不許通行矣上項情事亦已明諭爾使格色爾寨桑等恐不能全記告汝特遣内閣侍讀學士喇什理藩院司務英古賫勅往諭以伴勅例賜彩縀十端喇什等奉勅至䇿旺喇卜灘所宣㫖之後䇿旺喇卜灘言我厄魯特風俗不與死尸女子為讐况以死尸畀人大有禁忌不然則噶爾丹存日我尚思執之殺之豈有惜此無用之尸者乎然而奉㫖特差諸公來取噶爾丹之尸我若拘於禁忌而不發去恐謂我飾説也雖於我有災我不敢拂當遵㫖給發至鍾齊海呉爾占扎卜事我當奏請因付噶爾丹之尸以雲端格隆充使來奏其奏詞云䝉皇上惠頒勅書賜物並到前者歴奉眷恤之㫖故遣格色爾隨兩使臣往請屬裔之事未䝉賜覆想或所奏未悉故爾至在此人等及臣所應轄人等在中國者前雖已奏今仍奏請鑒恤鍾齊海及噶爾丹骸骨已白之侍即侍讀學士侍衞克什圖阿喇木扎巴彭蘇克丹津多爾濟寨桑哈什哈上奏矣然大君特遣使來是以將噶爾丹骸骨遵㫖而行縁許臣陳奏毋諱是以罔知所忌有此陳奏噶爾旦多爾濟及他諸事俱雲端格隆口奏雲端格隆云䇿旺喇卜灘使我口奏云噶爾旦多爾濟逃來並不至我處居在郭蠻喇嘛所後我欲征哈薩克彼誑言亦欲隨征我到伊里河彼又從厄冷哈必爾漢逃去往回子所居庫察城被揮特人等所殺其下人俱四散噶爾旦多爾濟之母率寨桑數人向西而去矣至噶爾丹之尸鍾齊海呉爾占扎卜之事我前已曾奏請雖經奏請而奉聖㫖特遣使臣來是以將噶爾丹骸骨遵㫖遣發至鍾齊海乃一女子也且係吾妺我厄魯特風俗向不與女子為讐皇上垂慈請以畀我呉爾占扎卜等寨桑並非我祖父之舊人我所得分之軰但我人力甚少哈薩克等類俱與我為難我得伊等可以助力倘皇上諭㫖必欲索取我亦安敢有違理藩院據此為之轉奏上命議政諸臣議奏議曰噶爾丹者乃逆天負恩之賊也而將其子塞卜騰巴兒珠爾暫行收禁者聖上特俟噶爾丹骸骨到後一併處置耳今侍讀學士喇什既取噶爾丹骸骨來應俟彼到後照呉三桂粉骨揚灰例將噶爾丹骸骨擣為細末至法塲通衢抛撒塞卜騰巴兒珠爾乃逆賊噶爾丹之子不當存留應俟噶爾丹骸骨到時將塞卜騰巴兒珠爾綁赴兩黄旗教塲立斬梟示差理藩院司官一員乗驛帶塞卜騰巴兒珠爾首級往示四十九旗喀爾喀各部落帶回仍懸原處至塞卜騰巴兒珠爾乳父徽特和碩齊乃擒獲之人亦應處斬免梟示至程貝臧布奉㫖暫且停决有要言質訊今即解來兹事已畢應將程貝臧布亦處斬布林察罕兩婦人交該部處置奏入得㫖徽特和碩齊當免程貝臧布當誅此事俟朕回鑾可也喇什到日著單身乗驛追赴行在㝷侍讀學士喇什既到趨奏行在上命喇什帶噶爾丹骸骨置城外爾親入城啟皇太子在駕未到之前懸諸國門候駕著交理藩院議奏奏曰厄魯特降人俱係噶爾丹屬下噶爾丹逆天違㫖毒害生靈皇上親統六師三臨絶塞討而滅之俘其屬衆招之使來者有之陸續來降者亦有之並非䇿旺喇卜灘之人則奏請仍加眷恤之處無庸議至噶爾旦多爾濟往回子所居庫察城而被殺亦無庸議查前諭䇿旺喇卜灘文内開若隠匿呉爾占扎卜等人不行擒解則爾歴年之恭順皆虚即爾使人貿易者亦永逺不許通行特差侍讀學士喇什等賫勅往諭今䇿旺喇卜灘雖發噶爾丹骸骨而鍾齊海者乃逆賊噶爾丹之女呉爾占扎卜等人乃助噶爾丹作惡之人此軰不便容留䇿旺喇卜灘所應令將噶爾丹之女鍾齊海呉爾占扎卜色稜阿巴車林布木塔爾諾顔格隆等人仍遵前㫖擒拿差人起解以臣部文發去上又遣侍讀學士伊道往諭至是䇿旺喇卜灘以諾顔格隆納爾巴噶卜楚付伊道等遣使滾楚克覆奏疏云謹奏聖上睿覽臣前抒誠上奏䝉天語褒嘉特異凡衆又延請聖徒之㫖亦諭以扶掖宗門之教不勝懽忭臣亦思竭力以裨宗門之教為念至於第巴自臣前次上奏後聞其凡事越理而行中國亦當明鑒之矣果其如是又有欺誑亦未可知前經具奏今亦如是使人口中當詳奏之其使人滾楚克達爾漢囊蘇告曰我策旺喇卜灘使我等奏言自使臣達虎首先下臨以來歴奉聖㫖言於道法有禆者朕則眷之於道法無禆者朕則懲之節次頒諭臣以利濟宗門道法仍前使我衆俱得安樂為請隨又有侍郎常綬等來索呉爾占扎卜諸人乃視臣所當留者留之擒噶爾丹博碩克圖之子車陵薩羅卜及其母伊拉古克三庫圖克圖兄弟差彭蘇克丹津喇木扎木巴多爾濟寨桑等盡將臣情事奏請㝷侍讀學士喇什等來遂發噶爾丹骸骨托愽克妻子又以原由具奏今侍讀學士伊道等來索臣又發諾顔格隆納爾巴噶卜楚前去乂聖上歴有諭㫖謂臣且與噶爾丹通其間豈有人䜛譛乎抑見臣有何罪惡乎為此覆奏理藩院以所言奏上命發議政諸臣議曰查厄魯特來降之人原皆噶爾丹屬下之人並非䇿旺喇卜灘之人則所奏仍加眷恤之處無庸議但䇿旺喇卜灘以呉爾占扎卜阿巴色稜等人原非臣所應分之人因臣之人力甚少而哈薩克等人乂皆與臣興戎倘得留此可以增力懇切籲請應停解呉爾占扎卜等留給䇿旺喇卜灘至鍾齊海者乃叛逆噶爾丹之女不得與他人比例不許容留䇿旺喇卜灘處此應照舊施行如不解來不許通使行商至䇿旺喇卜灘疏言臣前抒誠上奏䝉天語褒嘉特異凡衆又延請聖徒之㫖亦諭以扶掖宗門之教不勝懽忭臣亦思竭力以裨益宗門之教為念至於第巴自臣前次上奏後聞其凡事越理而行中國亦當明鑒之矣果其如是又有欺誑亦未可知前經具奏今亦如是查嚴勅第巴使遣班禪即回奏欽遵上諭擬於來年三月遣發班禪則䇿旺喇卜灘所奏之處無庸議命下之後將此原由撰勅發䇿旺喇卜灘勅文交内閣撰擬呈覽不必遣使即付來使滾楚克達爾漢囊素可也上從之諭䇿旺喇卜灘勅文皇帝勅諭厄魯特䇿旺喇卜灘曰朕撫養億兆凡恭順竭誠者必厚待加恩前以呉爾占扎卜阿巴色稜等軰皆助噶爾丹之人恐留於爾地又復作亂亦未可定故命爾解來今爾疏言呉爾占扎卜阿巴色稜等軰非臣所應分之人但臣人力甚少而哈薩克等人又皆與臣為難臣得伊等可以助力據實陳情朕矜爾諄懇之意許停解呉爾占扎卜阿巴色稜矣至鍾齊海爾疏言於爾為妺厄魯特風俗不與女子為讐乞皇上垂憐即以畀臣但鍾齊海乃噶爾丹親女不得與他人為比此斷不許留於爾地務必差人解來如此則許爾照常通使行商爾若仍不肯解來爾不得復通使矣至厄魯特來降朕者原皆噶爾丹屬下人噶爾丹違朕之㫖毒害生靈朕親率兵𠞰滅其屬衆有俘獲而來者有陸續歸降者並非爾之人所奏不准行又爾疏言第巴自臣前次奏後聞其凡事背理而行中國亦常洞鑒之矣果其如是又為欺誑亦未可定前經上奏今亦如是朕嚴勅第巴使遣班禪第巴已欽遵朕㫖奏覆於來年三月遣班禪來爾之所奏朕已知之特諭㝷班禪以其身未出痘疹且學問淺陋不敢赴京奏請鑒恤上免班禪赴京後辛巳年䇿旺喇卜灘遵㫖解噶爾丹之女鍾齊海到京同其弟塞卜騰巴兒珠爾一處居住俱加撫恤授塞卜騰巴兒珠爾一等侍衞給之妻室以鍾齊海婚配二等侍衞沙克都爾咸令得所臣謹按噶爾丹搆亂之後皇上降勅開諭遣使招撫者屢矣總之皆委曲保全之至意也噶爾丹若遵諭來降則至今尚得留其殘喘不意彼昏罔覺終底滅亡但因其變數年以來皇上統師親征經理糧餉調遣將卒不避寒暑艱苦備嘗舉朝内外之人無不痛心切齒噶爾丹之頻煩聖躬重勞睿慮兇惡已極雖滅其族猶未足以蔽其辜也乃復䝉皇上赦其子而不誅益加撫視使彼男有室女有家下至屬裔咸令得所皇上仁徳大度何如天地之寛宏耶御筆勒銘察罕七羅拖諾昭木多及狼居胥山併建碑太學先是禮臣題請曰恭惟皇上親統六師至狼居胥山等處地方調度削平逆冦此後邊境永清理合勒碑刻銘以垂無竆至皇上親幸拖諾山滅賊昭木多及太學中亦當建碑刻文紀勲以垂奕禩上從之至是親製碑銘頒發建立察罕七羅碑文曰康熙三十五年嵗次丙子四月丙戌朔十三日戊戌大清皇帝征討厄魯特噶爾丹將六軍過此御筆勒銘惟天所覆皆吾赤子綏靖邊陲殄滅蛇豕山澤効靈草蕃泉㫖羽衞斯經貞石用紀拖諾山碑文曰康熙三十五年嵗次丙子五月丙辰朔十二日丁卯大清皇帝征討厄魯特噶爾丹駐蹕拖諾山御筆勒銘瀚海蕩蕩臚朐泱泱親御六師我武維揚震雷霆威讋日月光剪厥兇醜安定遐荒昭木多碑文曰康熙三十五年嵗次丙子五月丙辰朔十三日戊辰大清皇帝征討厄魯特噶爾丹大兵邀擊於昭木多之地盡殱賊衆御筆勒銘天心洪佑剪逆摧兇困獸西竄膏我軍鋒一皷而殱漠庭遂空磨崖刻石不振武功狼居胥山碑文曰康熙三十六年嵗次丁丑四月庚戌朔大清皇帝討滅厄魯特噶爾丹駐蹕狼居胥山御筆勒銘登狼居胥遡大河曲遐播徳威以綏荒服殄冦寧人義正仁育絶域來同敷天永福太學碑文曰惟天盡所覆海内外日月所出入之區悉以畀予一人自踐祚迄今蚤夜殫思休養生息冀臻熙皥以克副維皇大徳好生之意庶幾疆域無事得以偃兵息民廼厄魯特噶爾丹阻險北陲困此一方人既荼毒塞外輒狡焉肆其兇逆犯我邊鄙虐我臣服人用弗寧夫蕩冦所以息民攘外所以安内邊冦不除則吾民不安此神人所共憤天討所必加豈憚一人之勞弗貽天下之逸於是斷自朕心躬臨朔漠欲使悔而革心故每許以不殺彼怙終不悛我師三出絶塞朕皆親御以行深入不毛屢渉寒暑勞苦艱難與偏裨士卒共之迨彼狂授首脅從歸誠荒外君長來享闕下西北萬里灌燧銷烽中外乂謐惟朕不得已用兵以安民既告厥成事乃蠲釋𤯝災㓗事禋望為億兆祈昇平之福而廷臣請紀功太學垂示來兹朕勞心於邦本嘗欲以文徳化成天下顧兹武略廷臣僉謂所以建威消萌宜昭斯績於有永也朕不獲辭攷之禮王制有曰天子將出征受成於學出征執有罪反釋奠於學以訊馘告而泮宫之詩亦曰矯矯虎臣在泮獻馘又禮王師大獻則奏凱樂大司樂掌其事則是古者文事武事為一折衝之用具在樽爼之間故受成獻馘一歸於學此文武之盛制也朕嚮意於三代故斯舉也出則告於神祗歸而遣祀闕里兹允廷臣之請猶禮先師以告克之遺意而於六經之指為相符合也爰取思樂泮水之義為詩以銘之以見取亂侮亡之師在朕有不得已而用之之實或者不戾於古帝王伐罪安民之意云爾銘曰巍巍先聖萬世之師敬信愛人治平所基煌煌聖言文武道一禮樂征伐自天子出朕臨域中逾兹三紀嘗見羮牆寤寐永矢下念民瘼上承帝謂四海無外盡𨽻侯尉維彼兇醜凟亂典常既梗聲教遂窺我疆譬之於農患在螟螣秉畀不施將害稼穡度彼㳺魂險逺是怙震以徳威可往而取朕志先定龜筮其依屬車萬乗建以龍旂祝融驂鸞風伯戒途宜暘而暘利我樵蘇大野水涸川瀆効靈泉忽自湧其甘如􅌬設為犄角一出其西一出其東中自將之絶域無人獸羣受掩五日窮追彼狂走險大殱於路波血其孥剪其黨孽俘彼卒徒衆烏晝號單馬宵遁恐久駐師重為民困愼固戍守還轅於京自夏徂東雨雪其零載馳載驅我行再至蠢兹窮冦昏惑不悔我邊我氓以休以助爰寧其居爰復其賦藩落老稚斯恬斯嬉嵗晏來歸春與之期春風飄翩揚我旌旓我今於邁如渉我郊言秣我馬狼居胥山登高以眺閔彼彈丸天降兇罰孤雛就羈三駕三㨗封狼輿尸既腊梟獍既獮豺貙大漠西北解甲棄殳振旅凱入澤霈郊卜明禋肆赦用迓景福昔我往矣在泮飲酒陳師鞠旅誓屈羣醜今我來思在泮獻功有赫頌聲文軌來同采芹采藻頌興東魯車攻馬同亦鐫石皷師在安民非出得已古人有作昭示此㫖緬彼虞廷誕敷文徳聖如先師戰愼必克惟兵宜戢惟徳乃綏億萬斯年視此銘詞欽惟皇上如天覆幬中外一視雖在荒遐絶塞之域非至頑梗不率盡欲扶持而安全之此聖心也即天心也自往年滅察哈爾撫俄羅斯而後東西南朔靡不喁喁嚮風來王來享其世奉職貢未𨽻臣屬者惟喀爾喀厄魯特二部落而已厄魯特與喀爾喀交惡嵗久日㝷干戈皇上憫其相殘曾屢下勅㫖諭令和協厄魯特噶爾丹抗命肆虐喀爾喀困蹙不支遂叩闕内附而噶爾丹乃獨狂逞於朔漠之地恣行無忌葢噶爾丹者西北塞外習於戰鬬之勁冦也初厄魯特有四部落噶爾丹戕害其兄兼而併之劫服諸番部攻克回子千有餘城破降喀爾喀七旗數十萬衆其熖日張其志日侈康熙二十九年借辭追喀爾喀闌入烏闌布通上簡諸王大臣統兵往討指授方畧諸王大臣雖擊却之而不能窮追殱滅反信濟隆庫圖克圖議好之誑詞遣人語内大臣蘇爾達等令盛京烏喇科爾沁諸路兵勿與之戰是以竟不邀擊縱之逸去時蘇爾達與土謝圖親王沙津達爾漢親王班第等共商欲覊縻噶爾丹之兵遣科爾沁人俄齊爾等令噶爾丹且止而竟不少留狼奔鼠竄僅圖亡命詐獻誓書倉皇宵遁縁遣俄齊爾於噶爾丹之故衆遂疑科爾沁已附噶爾丹將軍薩卜素等亦密奏科爾沁有異心皇上絶不之疑佐領畢立克圖復首噶爾丹遺土謝圖王沙津書皇上又隠而不泄欲乗此用䇿故於外藩來朝時以薩卜素密奏之事並畢立克圖舉首之書當衆宣示且慰諭科爾沁諸部隨以密䇿授土謝圖王沙津令誘致噶爾丹沙津感寛大不疑之聖恩謹遵諭㫖仍遣俄齊爾受計往約噶爾丹噶爾丹果如我成算沿克魯倫而下掠喀爾喀納木扎爾陀音遂踞巴顔烏闌上聞之簡練將卒經畫糧餉整飭駝馬軍仗料賊出入之境分道環擊一遣重兵邀其歸路一調盛京諸軍禦其東走之路上躬率大兵由中路直入進𠞰以三十五年二月發京師縁途所至與士卒同甘苦馬畜之飼秣僕從之勞瘁隠微纎悉具厪宸衷比出塞駐蹕拖陵偵得賊軍確音遂疾趨克魯倫河上手繪陣圖指授諸臣賞勵將卒凡斥堠哨探防衞諸事悉經睿算開示於是隊伍行列嚴肅整齊旌旗砲火發揚蹈厲噶爾丹遥望軍容倉皇宵遁上躬率前鋒軍追至拖諾山賊衆心膽迸裂棄妻子駝馬於道紛紛奔潰適西路大兵遇於昭木多奮擊大敗之丹木巴哈什哈等率其衆迎降噶爾丹僅以數人跳身走夫以二十餘年習戰之冦一旦霆擊電掃鳥獸駭散是皇上親駕出師設竒制勝大創厄魯特之神畧也迨六師既已奏凱上念噶爾丹勢雖殘破餘黨尚存未必散者不能復聚乃遣使賫諭徧加招撫於是年冬月不避嚴寒復幸塞外乗冰濟河駐鄂爾多斯經理邊務撫綏藩部奬賞其君長簡閲其士馬於是噶爾丹所屬寨桑諾爾布等各携其妻子人口絡繹請降其所親任之人遣充信使如格壘沽英者亦吐露情實約期率妻子歸命葢皇上除暴安民之心至殷且切雖㝠頑附逆者罔不悔禍輸誠是皇上再駕出師剪鎩賊黨漸滅冦氛之神畧也至三十六年二月上以噶爾丹屢經開諭狡詐昏迷非親行調遣相度機宜不能滅此朝食乃命駕出雲中直抵寧夏所過郡邑澄叙官吏蠲豁農租邊地父老人民環跪道左悉令近前諮訪俾仰覩天顔懽呼之聲遍於郊野時青海諸台吉向未臣服者咸請期入覲哈密國素供噶爾丹賦税者生擒其子塞卜騰巴爾珠兒獻於行在格壘沽英挈妻子如約來歸丹濟拉阿喇卜灘丹津俄木布為賊所倚任者並潜遣人輸情嚮順至是賊之黨益孤賊之勢亦益蹙矣聖駕循賀蘭山出邊次狼居胥山麓遣將軍馬思喀率兵搜討又遣大將軍費揚古兵自郭多里巴爾哈孫前進夾攻調西方諸軍截賊歸路刋布勅文曉譬利害昭揭四野申諭其屬人噶爾丹進退無依計窮力竭遂仰藥自殺繇是丹濟拉以其部衆乞降䇿旺喇卜灘以噶爾丹骸骨及其女來獻巢穴既空根株盡絶是皇上三駕出師廓清朔漠永定邊陲之神畧也臣等伏覩皇上聖徳好生神武不殺以噶爾丹之兇惡貫盈猶欲曲賜生全屢頒溫諭迨至執迷罔悟怙終不悛乃不得已興師𠞰滅之其脅從之衆陣降者赦而不誅來歸者悉予官職亂離俘掠者皆發帑贖還俾完骨肉而且恩淪乳哺澤潤枯骸種種徳施咸孚蒼昊以此師行萬里風雨時若山川効靈大漠泉流不毛草茁神佑人助豈偶然之故哉至於用師之道無慮不周有謀必中灼見敵情於指掌之上洞矚荒逺於耳目之前躬任勤勞膚功立奏自古大有為之君肇造區夏開拓疆宇者未有比隆於今日之盛者也臣等幸際昌期職司鉛槧智識謭陋莫測高深而廟謨巍煥據事直書隻字片言無所增飾播諸四海仰允文允武之難名垂示後人知卜世卜年之永賴猗歟休哉誠邁百王而越千古矣聖祖仁皇帝親征平定朔漠方略卷四十八
